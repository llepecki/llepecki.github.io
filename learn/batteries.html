        function renderBulb() {
          const g = svgEl("g", { class: "bulb-group" });
          const cx = BULB_CX;
          const cy = BULB_CY;
          const r = BULB_R;

          // Screw base (below glass)
          const baseW = 22;
          const baseH = 20;
          const baseY = cy + r - 8;
          g.appendChild(
            svgEl("rect", {
              x: cx - baseW / 2,
              y: baseY,
              width: baseW,
              height: baseH,
              rx: 2,
              fill: "url(#screwBase)",
              stroke: "#4b5563",
              "stroke-width": 0.8,
            }),
          );

          // Screw threads (horizontal lines on base)
          for (let i = 0; i < 3; i++) {
            g.appendChild(
              svgEl("line", {
                x1: cx - baseW / 2 + 2,
                y1: baseY + 5 + i * 6,
                x2: cx + baseW / 2 - 2,
                y2: baseY + 5 + i * 6,
                stroke: "#4b5563",
                "stroke-width": 0.8,
              }),
            );
          }

          // Contact point at bottom
          g.appendChild(
            svgEl("circle", {
              cx,
              cy: baseY + baseH + 3,
              r: 4,
              fill: "#374151",
              stroke: "#4b5563",
              "stroke-width": 0.5,
            }),
          );

          // Glass envelope (bulb shape - ellipse wider at top, narrowing at neck)
          const bulbPath = svgEl("path", {
            d: `M${cx - 12},${baseY} Q${cx - r - 2},${baseY - 8} ${cx - r},${cy - 4} Q${cx - r - 1},${cy - r + 4} ${cx},${cy - r} Q${cx + r + 1},${cy - r + 4} ${cx + r},${cy - 4} Q${cx + r + 2},${baseY - 8} ${cx + 12},${baseY} Z`,
            fill: "url(#bulbGlass)",
            stroke: "rgba(150,170,190,0.35)",
            "stroke-width": 1,
            class: "bulb-body off",
            id: "bulbBody",
          });
          g.appendChild(bulbPath);

          // Glass highlight (specular)
          g.appendChild(
            svgEl("ellipse", {
              cx: cx - 8,
              cy: cy - 8,
              rx: 6,
              ry: 10,
              fill: "rgba(255,255,255,0.08)",
              transform: `rotate(-20,${cx - 8},${cy - 8})`,
              "pointer-events": "none",
            }),
          );

          // Filament supports (two thin lines going up from base)
          g.appendChild(
            svgEl("line", {
              x1: cx - 5,
              y1: baseY,
              x2: cx - 6,
              y2: cy + 4,
              stroke: "#6b7280",
              "stroke-width": 1,
              opacity: 0.6,
            }),
          );
          g.appendChild(
            svgEl("line", {
              x1: cx + 5,
              y1: baseY,
              x2: cx + 6,
              y2: cy + 4,
              stroke: "#6b7280",
              "stroke-width": 1,
              opacity: 0.6,
            }),
          );

          // Filament (zigzag coil)
          const filament = svgEl("path", {
            d: `M${cx - 6},${cy + 4} L${cx - 4},${cy - 6} L${cx - 1},${cy + 2} L${cx + 2},${cy - 8} L${cx + 4},${cy + 2} L${cx + 6},${cy + 4}`,
            fill: "none",
            stroke: "#9ca3af",
            "stroke-width": 1.5,
            "stroke-linecap": "round",
            "stroke-linejoin": "round",
            id: "bulbFilament",
          });
          g.appendChild(filament);

          // Warning ring (hidden by default)
          g.appendChild(
            svgEl("circle", {
              cx,
              cy,
              r: r + 6,
              class: "bulb-warning-ring",
              id: "bulbWarning",
            }),
          );

          svg.appendChild(g);
        }

        function renderPlacedBattery(slotDef, orientation, isDanger) {
          const existingGroup = svg.querySelector(
            `[data-placed="${slotDef.id}"]`,
          );
          if (existingGroup) existingGroup.remove();

          const g = svgEl("g", {
            class: "placed-battery",
            "data-placed": slotDef.id,
          });

          const isForward = orientation === "forward";
          const bx = slotDef.x - SLOT_W / 2 + 4;
          const by = slotDef.y - SLOT_H / 2 + 3;
          const bw = SLOT_W - 8;
          const bh = SLOT_H - 6;

          // Golden cell body with 3D gradient
          g.appendChild(
            svgEl("rect", {
              x: bx,
              y: by,
              width: bw,
              height: bh,
              rx: 5,
              fill: "url(#batBody)",
              stroke: "#8b6914",
              "stroke-width": 1.5,
            }),
          );

          // Top highlight strip for cylindrical effect
          g.appendChild(
            svgEl("rect", {
              x: bx + 2,
              y: by + 1,
              width: bw - 4,
              height: 4,
              rx: 2,
              fill: "rgba(255,255,255,0.15)",
              "pointer-events": "none",
            }),
          );

          // Positive cap (red, prominent)
          const plusX = isForward ? bx + bw - 16 : bx;
          g.appendChild(
            svgEl("rect", {
              x: plusX,
              y: by + 2,
              width: 16,
              height: bh - 4,
              rx: 3,
              fill: "#dc2626",
              stroke: "#991b1b",
              "stroke-width": 0.8,
            }),
          );

          // Positive nub (small brass bump)
          const nubX = isForward ? bx + bw - 1 : bx - 4;
          g.appendChild(
            svgEl("rect", {
              x: nubX,
              y: slotDef.y - 5,
              width: 5,
              height: 10,
              rx: 2,
              fill: "url(#batPos)",
            }),
          );

          // Negative cap (dark flat)
          const minusX = isForward ? bx : bx + bw - 14;
          g.appendChild(
            svgEl("rect", {
              x: minusX,
              y: by + 2,
              width: 14,
              height: bh - 4,
              rx: 3,
              fill: "#374151",
              stroke: "#1f2937",
              "stroke-width": 0.8,
            }),
          );

          // + label on cap
          const pLbl = svgText(
            isForward ? plusX + 8 : plusX + 8,
            slotDef.y,
            "+",
            "",
            12,
          );
          pLbl.setAttribute("fill", "#fff");
          pLbl.setAttribute("pointer-events", "none");
          pLbl.setAttribute("font-weight", "700");
          g.appendChild(pLbl);

          // − label on cap
          const mLbl = svgText(
            isForward ? minusX + 7 : minusX + 7,
            slotDef.y,
            "\u2212",
            "",
            12,
          );
          mLbl.setAttribute("fill", "#9ca3af");
          mLbl.setAttribute("pointer-events", "none");
          g.appendChild(mLbl);

          // 1.5V label centered on body
          const vLbl = svgText(slotDef.x, slotDef.y, "1.5V", "", 11);
          vLbl.setAttribute("fill", "#3d2200");
          vLbl.setAttribute("pointer-events", "none");
          vLbl.setAttribute("font-weight", "700");
          g.appendChild(vLbl);

          // Remove button (X)
          const rmG = svgEl("g", { class: "remove-btn" });
          rmG.appendChild(
            svgEl("circle", {
              cx: slotDef.x + SLOT_W / 2 - 8,
              cy: slotDef.y - SLOT_H / 2 + 2,
              r: 8,
              fill: "var(--error)",
              opacity: 0.8,
            }),
          );
          const rmTxt = svgText(
            slotDef.x + SLOT_W / 2 - 8,
            slotDef.y - SLOT_H / 2 + 2,
            "\u00d7",
            "",
            12,
          );
          rmTxt.setAttribute("fill", "#fff");
          rmTxt.setAttribute("pointer-events", "none");
          rmG.appendChild(rmTxt);
          rmG.addEventListener("pointerdown", (e) => {
            e.stopPropagation();
            if (state.editLocked) return;
            removeItem(slotDef.id);
          });
          g.appendChild(rmG);

          // Click to flip
          g.addEventListener("pointerdown", (e) => {
            if (state.editLocked) return;
            if (e.target.closest(".remove-btn")) return;
            flipBattery(slotDef.id);
          });

          // Mark slot as occupied visually
          const slotRect = svg.querySelector(`[data-slot="${slotDef.id}"]`);
          if (slotRect) {
            slotRect.classList.add("occupied");
          }

          // Hide polarity hints
          svg
            .querySelectorAll(`[data-slot-hint="${slotDef.id}"]`)
            .forEach((el) => (el.style.display = "none"));

          // Hide danger icon
          const icon = svg.querySelector(`[data-slot-icon="${slotDef.id}"]`);
          if (icon) icon.style.display = "none";

          svg.appendChild(g);
        }

        // ══════════════════════════════════════════════
        // SLOT FINDER
        // ══════════════════════════════════════════════
        function findSlotDef(slotId) {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return null;
          const found = tpl.slots.find((s) => s.id === slotId);
          if (found) return found;
          if (tpl.dangerSlots) {
            return tpl.dangerSlots.find((s) => s.id === slotId);
          }
          return null;
        }

        function findSlotAtPoint(px, py) {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return null;
          for (const s of tpl.slots) {
            if (
              ptInRect(
                px,
                py,
                s.x - SLOT_W / 2,
                s.y - SLOT_H / 2,
                SLOT_W,
                SLOT_H,
              )
            ) {
              return s;
            }
          }
          if (tpl.dangerSlots) {
            for (const s of tpl.dangerSlots) {
              if (
                ptInRect(
                  px,
                  py,
                  s.x - SLOT_W / 2,
                  s.y - SLOT_H / 2,
                  SLOT_W,
                  SLOT_H,
                )
              ) {
                return { ...s, isDanger: true };
              }
            }
          }
          return null;
        }

        // ══════════════════════════════════════════════
        // BATTERY PLACEMENT
        // ══════════════════════════════════════════════
        function placeBattery(slotId, orientation, isDanger) {
          state.slots[slotId] = {
            type: "battery",
            battery: true,
            orientation: orientation || "forward",
            isDanger: !!isDanger,
          };
          if (!isDanger) state.trayCount = Math.max(0, state.trayCount - 1);
          const slotDef = findSlotDef(slotId);
          if (slotDef) {
            renderPlacedBattery(slotDef, orientation || "forward", isDanger);
          }
          updateTrayVisuals();
          computeReadouts();
          clearTestState();
        }

        function placeWire(slotId) {
          state.slots[slotId] = { type: "wire" };
          state.wireCount = Math.max(0, state.wireCount - 1);
          const slotDef = findSlotDef(slotId);
          if (slotDef) {
            renderPlacedWire(slotDef);
          }
          updateTrayVisuals();
          computeReadouts();
          clearTestState();
        }

        function renderPlacedWire(slotDef) {
          const existing = svg.querySelector(`[data-placed="${slotDef.id}"]`);
          if (existing) existing.remove();

          const g = svgEl("g", {
            class: "placed-wire",
            "data-placed": slotDef.id,
          });

          const x1 = slotDef.x - SLOT_W / 2 + 8;
          const x2 = slotDef.x + SLOT_W / 2 - 8;
          const cy = slotDef.y;

          // Conductor line
          g.appendChild(
            svgEl("line", {
              x1,
              y1: cy,
              x2,
              y2: cy,
              stroke: "var(--wire)",
              "stroke-width": 6,
              "stroke-linecap": "round",
            }),
          );

          // Left connector dot
          g.appendChild(
            svgEl("circle", {
              cx: x1,
              cy,
              r: 6,
              fill: "var(--wire-glow)",
              stroke: "var(--wire)",
              "stroke-width": 1.5,
            }),
          );

          // Right connector dot
          g.appendChild(
            svgEl("circle", {
              cx: x2,
              cy,
              r: 6,
              fill: "var(--wire-glow)",
              stroke: "var(--wire)",
              "stroke-width": 1.5,
            }),
          );

          // Remove button
          const rmG = svgEl("g", { class: "remove-btn" });
          rmG.appendChild(
            svgEl("circle", {
              cx: slotDef.x + SLOT_W / 2 - 8,
              cy: slotDef.y - SLOT_H / 2 + 2,
              r: 8,
              fill: "var(--error)",
              opacity: 0.8,
            }),
          );
          const rmTxt = svgText(
            slotDef.x + SLOT_W / 2 - 8,
            slotDef.y - SLOT_H / 2 + 2,
            "\u00d7",
            "",
            12,
          );
          rmTxt.setAttribute("fill", "#fff");
          rmTxt.setAttribute("pointer-events", "none");
          rmG.appendChild(rmTxt);
          rmG.addEventListener("pointerdown", (e) => {
            e.stopPropagation();
            if (state.editLocked) return;
            removeItem(slotDef.id);
          });
          g.appendChild(rmG);

          // Mark slot as occupied
          const slotRect = svg.querySelector(`[data-slot="${slotDef.id}"]`);
          if (slotRect) slotRect.classList.add("occupied");

          // Hide polarity hints
          svg
            .querySelectorAll(`[data-slot-hint="${slotDef.id}"]`)
            .forEach((el) => (el.style.display = "none"));

          svg.appendChild(g);
        }

        function removeItem(slotId) {
          const slotState = state.slots[slotId];
          if (!slotState) return;
          const isWire = slotState.type === "wire";
          const isDanger = slotState.isDanger;
          delete state.slots[slotId];

          if (isWire) {
            state.wireCount = Math.min(state.wireMax, state.wireCount + 1);
          } else if (!isDanger) {
            state.trayCount = Math.min(state.trayMax, state.trayCount + 1);
          }

          // Remove visual
          const el = svg.querySelector(`[data-placed="${slotId}"]`);
          if (el) el.remove();

          // Restore slot outline
          const slotRect = svg.querySelector(`[data-slot="${slotId}"]`);
          if (slotRect) slotRect.classList.remove("occupied");

          // Show polarity hints again
          svg
            .querySelectorAll(`[data-slot-hint="${slotId}"]`)
            .forEach((el) => (el.style.display = ""));

          // Show danger icon
          const icon = svg.querySelector(`[data-slot-icon="${slotId}"]`);
          if (icon) icon.style.display = "";

          updateTrayVisuals();
          computeReadouts();
          clearTestState();
        }

        function flipBattery(slotId) {
          const slotState = state.slots[slotId];
          if (!slotState || !slotState.battery) return;
          slotState.orientation =
            slotState.orientation === "forward" ? "reverse" : "forward";
          const slotDef = findSlotDef(slotId);
          if (slotDef) {
            renderPlacedBattery(
              slotDef,
              slotState.orientation,
              slotState.isDanger,
            );
          }
          computeReadouts();
          clearTestState();
        }

        // ══════════════════════════════════════════════
        // DRAG & DROP + TAP
        // ══════════════════════════════════════════════
        let dragGhost = null;
        let dragActive = false;
        let dragType = "battery";

        svg.addEventListener("pointerdown", (e) => {
          if (state.editLocked) return;

          const pt = svgPoint(e.clientX, e.clientY);
          const trayCell = e.target.closest(".tray-cell");
          const trayWire = e.target.closest(".tray-wire");

          // Battery tray interaction
          if (trayCell && !trayCell.classList.contains("disabled")) {
            if (state.trayCount <= 0) return;
            disarmAll();

            if (e.pointerType === "touch") {
              armBattery();
              return;
            }

            // Desktop drag battery
            dragActive = true;
            dragType = "battery";
            svg.setPointerCapture(e.pointerId);

            dragGhost = svgEl("g", { class: "drag-ghost" });
            const gw = 110;
            const gh = 38;
            dragGhost.appendChild(
              svgEl("rect", {
                x: pt.x - gw / 2,
                y: pt.y - gh / 2,
                width: gw,
                height: gh,
                rx: 5,
                fill: "#e5a825",
                stroke: "#b8861a",
                "stroke-width": 1.5,
              }),
            );
            dragGhost.appendChild(
              svgEl("rect", {
                x: pt.x + gw / 2 - 14,
                y: pt.y - gh / 2 + 3,
                width: 14,
                height: gh - 6,
                rx: 3,
                fill: "#dc2626",
              }),
            );
            dragGhost.appendChild(
              svgEl("rect", {
                x: pt.x - gw / 2,
                y: pt.y - gh / 2 + 3,
                width: 12,
                height: gh - 6,
                rx: 3,
                fill: "#374151",
              }),
            );
            dragGhost._ox = pt.x;
            dragGhost._oy = pt.y;
            svg.appendChild(dragGhost);
            e.preventDefault();
            return;
          }

          // Wire tray interaction
          if (trayWire && !trayWire.classList.contains("disabled")) {
            if (state.wireCount <= 0) return;
            disarmAll();

            if (e.pointerType === "touch") {
              armWire();
              return;
            }

            // Desktop drag wire
            dragActive = true;
            dragType = "wire";
            svg.setPointerCapture(e.pointerId);

            dragGhost = svgEl("g", { class: "drag-ghost" });
            const wHalf = 50;
            dragGhost.appendChild(
              svgEl("line", {
                x1: pt.x - wHalf,
                y1: pt.y,
                x2: pt.x + wHalf,
                y2: pt.y,
                stroke: "var(--wire)",
                "stroke-width": 6,
                "stroke-linecap": "round",
              }),
            );
            dragGhost.appendChild(
              svgEl("circle", {
                cx: pt.x - wHalf,
                cy: pt.y,
                r: 5,
                fill: "var(--wire-glow)",
              }),
            );
            dragGhost.appendChild(
              svgEl("circle", {
                cx: pt.x + wHalf,
                cy: pt.y,
                r: 5,
                fill: "var(--wire-glow)",
              }),
            );
            dragGhost._ox = pt.x;
            dragGhost._oy = pt.y;
            svg.appendChild(dragGhost);
            e.preventDefault();
            return;
          }

          // Tap on empty slot when armed (touch)
          if (state.armedBattery || state.armedWire) {
            const slot = findSlotAtPoint(pt.x, pt.y);
            if (slot && !state.slots[slot.id]) {
              if (state.armedBattery) {
                placeBattery(slot.id, "forward", slot.isDanger);
              } else {
                placeWire(slot.id);
              }
              disarmAll();
            } else {
              disarmAll();
            }
            return;
          }
        });

        svg.addEventListener("pointermove", (e) => {
          if (!dragActive || !dragGhost) return;
          const pt = svgPoint(e.clientX, e.clientY);
          const dx = pt.x - dragGhost._ox;
          const dy = pt.y - dragGhost._oy;
          dragGhost.setAttribute("transform", `translate(${dx},${dy})`);

          // Highlight potential slot
          const slot = findSlotAtPoint(pt.x, pt.y);
          svg
            .querySelectorAll(".slot-outline, .danger-outline")
            .forEach((r) => {
              r.classList.remove("armed-target");
            });
          if (slot && !state.slots[slot.id]?.battery) {
            const r = svg.querySelector(`[data-slot="${slot.id}"]`);
            if (r) r.classList.add("armed-target");
          }
        });

        svg.addEventListener("pointerup", (e) => {
          if (!dragActive) return;
          dragActive = false;
          svg.releasePointerCapture(e.pointerId);

          const pt = svgPoint(e.clientX, e.clientY);
          const slot = findSlotAtPoint(pt.x, pt.y);

          if (dragGhost) {
            dragGhost.remove();
            dragGhost = null;
          }

          svg
            .querySelectorAll(".slot-outline, .danger-outline")
            .forEach((r) => {
              r.classList.remove("armed-target");
            });

          if (slot && !state.slots[slot.id]) {
            if (dragType === "wire") {
              placeWire(slot.id);
            } else {
              placeBattery(slot.id, "forward", slot.isDanger);
            }
          }
        });

        svg.addEventListener("pointercancel", () => {
          if (dragGhost) {
            dragGhost.remove();
            dragGhost = null;
          }
          dragActive = false;
          svg
            .querySelectorAll(".slot-outline, .danger-outline")
            .forEach((r) => {
              r.classList.remove("armed-target");
            });
        });

        function highlightEmptySlots() {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return;
          const allSlots = [...tpl.slots, ...(tpl.dangerSlots || [])];
          allSlots.forEach((s) => {
            if (!state.slots[s.id]) {
              const r = svg.querySelector(`[data-slot="${s.id}"]`);
              if (r) r.classList.add("armed-target");
            }
          });
        }

        function armBattery() {
          state.armedBattery = true;
          svg
            .querySelectorAll(".tray-cell:not(.disabled)")
            .forEach((c) => c.classList.add("armed"));
          highlightEmptySlots();
        }

        function armWire() {
          state.armedWire = true;
          const wireEl = svg.querySelector(".tray-wire");
          if (wireEl) wireEl.classList.add("armed");
          highlightEmptySlots();
        }

        function disarmAll() {
          state.armedBattery = false;
          state.armedWire = false;
          svg
            .querySelectorAll(".tray-cell")
            .forEach((c) => c.classList.remove("armed"));
          const wireEl = svg.querySelector(".tray-wire");
          if (wireEl) wireEl.classList.remove("armed");
          svg
            .querySelectorAll(".slot-outline, .danger-outline")
            .forEach((r) => r.classList.remove("armed-target"));
        }

        // ══════════════════════════════════════════════
        // READOUTS
        // ══════════════════════════════════════════════
        function computeReadouts() {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return;

          const result = computePack(tpl);
          state.packVoltage = result.voltage;
          state.packLife = result.life;
          state.currentStructure = result.structure;

          // Update meters
          const tgtV = state.targetVoltage || 4.5;
          const tgtL = state.targetLife || 3;
          const vRatio = Math.min(state.packVoltage / Math.max(tgtV, 4.5), 1);
          const lRatio = Math.min(state.packLife / Math.max(tgtL, 3), 1);

          $("valVoltage").textContent = state.packVoltage.toFixed(1) + " V";
          $("fillVoltage").style.width = Math.round(vRatio * 100) + "%";
          $("valLife").textContent = "x" + state.packLife;
          $("fillLife").style.width = Math.round(lRatio * 100) + "%";

          const structKey = {
            Series: "structureSeries",
            Parallel: "structureParallel",
            Mixed: "structureMixed",
            Incomplete: "structureIncomplete",
            Invalid: "structureInvalid",
          };
          $("valStructure").textContent = T(
            structKey[state.currentStructure] || "structureIncomplete",
          );
        }

        function computePack(tpl) {
          const branches = {};
          tpl.slots.forEach((s) => {
            if (!branches[s.branch]) branches[s.branch] = [];
            branches[s.branch].push(s);
          });

          if (tpl.kind === "series") {
            const main = branches["main"] || [];
            let batteries = 0;
            let hasReverse = false;
            let hasEmpty = false;
            for (const s of main) {
              const ss = state.slots[s.id];
              if (ss?.type === "battery") {
                batteries++;
                if (ss.orientation === "reverse") hasReverse = true;
              } else if (ss?.type === "wire") {
                // Wire fills position but adds no voltage
              } else {
                hasEmpty = true;
              }
            }
            if (batteries === 0 && !hasEmpty)
              return { voltage: 0, life: 0, structure: "Incomplete" };
            if (hasEmpty)
              return {
                voltage: batteries * CELL_VOLTAGE,
                life: 0,
                structure: "Incomplete",
              };
            if (hasReverse)
              return {
                voltage: batteries * CELL_VOLTAGE,
                life: 1,
                structure: "Invalid",
              };
            return {
              voltage: batteries * CELL_VOLTAGE,
              life: batteries > 0 ? 1 : 0,
              structure: "Series",
            };
          }

          // Parallel / Mixed
          const activeBranches = [];
          let hasPartial = false;
          let hasReverse = false;

          for (const [brId, brSlots] of Object.entries(branches)) {
            let batteries = 0;
            let occupied = 0;
            const total = brSlots.length;
            let reversed = false;
            for (const s of brSlots) {
              const ss = state.slots[s.id];
              if (ss?.type === "battery") {
                batteries++;
                occupied++;
                if (ss.orientation === "reverse") reversed = true;
              } else if (ss?.type === "wire") {
                occupied++;
              }
            }
            if (occupied > 0) {
              if (occupied < total) hasPartial = true;
              if (reversed) hasReverse = true;
              activeBranches.push({
                id: brId,
                filled: occupied,
                total,
                reversed,
                voltage: batteries * CELL_VOLTAGE,
              });
            }
          }

          if (activeBranches.length === 0)
            return { voltage: 0, life: 0, structure: "Incomplete" };

          if (hasPartial)
            return {
              voltage: activeBranches[0].voltage,
              life: activeBranches.length,
              structure: "Incomplete",
            };

          if (hasReverse)
            return {
              voltage: activeBranches[0].voltage,
              life: activeBranches.length,
              structure: "Invalid",
            };

          if (tpl.kind === "mixed") {
            if (activeBranches.length < 2)
              return {
                voltage: activeBranches[0].voltage,
                life: 1,
                structure: "Incomplete",
              };
            const voltages = activeBranches.map((b) => b.voltage);
            const allEqual = voltages.every((v) => v === voltages[0]);
            if (!allEqual)
              return {
                voltage: voltages[0],
                life: activeBranches.length,
                structure: "Invalid",
              };
            return {
              voltage: activeBranches[0].voltage,
              life: activeBranches.length,
              structure: "Mixed",
            };
          }

          // Parallel
          const voltages = activeBranches.map((b) => b.voltage);
          const allEqual = voltages.every((v) => v === voltages[0]);
          if (!allEqual)
            return {
              voltage: voltages[0],
              life: activeBranches.length,
              structure: "Invalid",
            };
          return {
            voltage: activeBranches[0].voltage,
            life: activeBranches.length,
            structure: "Parallel",
          };
        }

        // ══════════════════════════════════════════════
        // EVALUATION
        // ══════════════════════════════════════════════
        function evaluate() {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return "openCircuit";

          // 1. Short circuit - any occupied danger slot
          if (tpl.dangerSlots) {
            for (const ds of tpl.dangerSlots) {
              if (state.slots[ds.id]) {
                return "shortCircuit";
              }
            }
          }

          // Gather branch info
          const branches = {};
          tpl.slots.forEach((s) => {
            if (!branches[s.branch]) branches[s.branch] = [];
            branches[s.branch].push(s);
          });

          if (tpl.kind === "series") {
            const main = branches["main"] || [];
            let hasEmpty = false;
            let hasReverse = false;
            let batteries = 0;

            for (const s of main) {
              const ss = state.slots[s.id];
              if (!ss) {
                hasEmpty = true;
              } else if (ss.type === "battery") {
                batteries++;
                if (ss.orientation === "reverse") hasReverse = true;
              }
              // wire: occupied, not empty, no voltage
            }

            // 2. Open circuit
            if (hasEmpty) return "openCircuit";
            // 3. Battery backwards
            if (hasReverse) return "batteryBackwards";

            const packVoltage = batteries * CELL_VOLTAGE;
            const packLife = batteries > 0 ? 1 : 0;

            return compareGoal(packVoltage, packLife, "Series");
          }

          // Parallel / Mixed
          const activeBranches = [];
          let allBranchesEmpty = true;

          for (const [brId, brSlots] of Object.entries(branches)) {
            let batteries = 0;
            let occupied = 0;
            let reversed = false;
            for (const s of brSlots) {
              const ss = state.slots[s.id];
              if (ss?.type === "battery") {
                batteries++;
                occupied++;
                if (ss.orientation === "reverse") reversed = true;
              } else if (ss?.type === "wire") {
                occupied++;
              }
            }
            if (occupied > 0) {
              allBranchesEmpty = false;
              activeBranches.push({
                id: brId,
                filled: occupied,
                total: brSlots.length,
                reversed,
                voltage: batteries * CELL_VOLTAGE,
              });
            }
          }

          // 2. Open circuit
          if (allBranchesEmpty) return "openCircuit";

          // Check for partially filled active branches -> open circuit
          for (const br of activeBranches) {
            if (br.filled < br.total) return "openCircuit";
          }

          // 3. Battery backwards
          for (const br of activeBranches) {
            if (br.reversed) return "batteryBackwards";
          }

          if (tpl.kind === "mixed") {
            // 4. Need both branches
            if (activeBranches.length < 2) return "needBothBranches";

            // 5. Branches mismatch
            const voltages = activeBranches.map((b) => b.voltage);
            const allEqual = voltages.every((v) => v === voltages[0]);
            if (!allEqual) return "branchesMismatch";

            const packVoltage = activeBranches[0].voltage;
            const packLife = activeBranches.length;
            return compareGoal(packVoltage, packLife, "Mixed");
          }

          // Parallel
          // 5. Branches mismatch
          const voltages = activeBranches.map((b) => b.voltage);
          const allEqual = voltages.every((v) => v === voltages[0]);
          if (!allEqual) return "branchesMismatch";

          const packVoltage = activeBranches[0].voltage;
          const packLife = activeBranches.length;
          return compareGoal(packVoltage, packLife, "Parallel");
        }

        function compareGoal(packVoltage, packLife, structure) {
          if (state.mode === "sandbox") return "correct";

          const tv = state.targetVoltage;
          const tl = state.targetLife;

          // 6. Too little voltage
          if (packVoltage < tv - 0.01) return "tooLittleVoltage";
          // 7. Too much voltage
          if (packVoltage > tv + 0.01) return "tooMuchVoltage";
          // 8. Need more battery life
          if (packLife < tl) return "needMoreLife";
          // 9. Correct
          return "correct";
        }

        // ══════════════════════════════════════════════
        // TEST ANIMATION
        // ══════════════════════════════════════════════
        function runTest() {
          if (state.editLocked) return;
          state.editLocked = true;
          disarmAll();

          const verdict =
            state.mode === "sandbox" ? sandboxBulbVerdict() : evaluate();
          state.lastVerdict = verdict;

          // Clear previous animation state
          clearAnimState();

          // Animate wires
          const wires = svg.querySelectorAll(".wire-trace");
          const buses = svg.querySelectorAll(".bus-line");

          state.animTimeouts.push(
            setTimeout(() => {
              if (verdict !== "openCircuit" && verdict !== "shortCircuit") {
                wires.forEach((w) => w.classList.add("active"));
                buses.forEach((b) => b.classList.add("active"));
              }

              if (verdict === "shortCircuit") {
                // Red danger wires
                svg
                  .querySelectorAll('[data-danger="true"]')
                  .forEach((w) => w.classList.add("error"));
                buses.forEach((b) => b.classList.add("error"));
              }
            }, 100),
          );

          // Update bulb
          state.animTimeouts.push(
            setTimeout(() => {
              updateBulbState(verdict);
            }, 500),
          );

          // Highlight problem batteries
          state.animTimeouts.push(
            setTimeout(() => {
              if (verdict === "batteryBackwards") {
                highlightReversed();
              }
            }, 400),
          );

          // Show verdict
          state.animTimeouts.push(
            setTimeout(() => {
              showVerdict(verdict);
              state.editLocked = false;

              if (verdict === "correct") {
                onCorrect();
              }
            }, ANIM_DURATION),
          );
        }

        function clearAnimState() {
          state.animTimeouts.forEach((t) => clearTimeout(t));
          state.animTimeouts = [];
          svg.querySelectorAll(".wire-trace").forEach((w) => {
            w.classList.remove("active", "error");
          });
          svg.querySelectorAll(".bus-line").forEach((b) => {
            b.classList.remove("active", "error");
          });
          svg
            .querySelectorAll(".placed-battery")
            .forEach((b) => b.classList.remove("pulse-red"));
        }

        function clearTestState() {
          clearAnimState();
          state.lastVerdict = null;
          state.lessonComplete = false;
          $("btnNext").classList.add("hidden");
          updateBulbState(null);
          setStatus(
            state.mode === "sandbox" ? T("statusSandbox") : T("statusReady"),
            "",
          );
          $("takeawayText").textContent = "";
          $("starsSection").classList.add("hidden");
        }

        function updateBulbState(verdict) {
          const bulb = $("bulbBody");
          const warning = $("bulbWarning");
          const filament = $("bulbFilament");
          if (!bulb) return;

          bulb.className.baseVal = "bulb-body";
          warning.classList.remove("visible");
          if (filament) filament.setAttribute("stroke", "#9ca3af");

          if (!verdict) {
            bulb.classList.add("off");
            return;
          }

          switch (verdict) {
            case "shortCircuit":
            case "openCircuit":
            case "batteryBackwards":
              bulb.classList.add("off");
              if (verdict === "shortCircuit" || verdict === "tooMuchVoltage") {
                warning.classList.add("visible");
              }
              break;
            case "needBothBranches":
            case "branchesMismatch":
            case "tooLittleVoltage":
              bulb.classList.add("dim");
              if (filament) filament.setAttribute("stroke", "#d4a017");
              break;
            case "tooMuchVoltage":
              bulb.classList.add("bright");
              warning.classList.add("visible");
              if (filament) filament.setAttribute("stroke", "#fff");
              break;
            case "needMoreLife":
            case "correct":
              bulb.classList.add("good");
              if (filament) filament.setAttribute("stroke", "#fbbf24");
              break;
            default:
              bulb.classList.add("off");
          }
        }

        function highlightReversed() {
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return;
          for (const s of tpl.slots) {
            const ss = state.slots[s.id];
            if (ss?.battery && ss.orientation === "reverse") {
              const el = svg.querySelector(`[data-placed="${s.id}"]`);
              if (el) el.classList.add("pulse-red");
            }
          }
        }

        function showVerdict(verdict) {
          const verdictKeys = {
            correct: "correct",
            tooLittleVoltage: "tooLittleVoltage",
            tooMuchVoltage: "tooMuchVoltage",
            needMoreLife: "needMoreLife",
            batteryBackwards: "batteryBackwards",
            openCircuit: "openCircuit",
            shortCircuit: "shortCircuit",
            needBothBranches: "needBothBranches",
            branchesMismatch: "branchesMismatch",
          };

          const cls =
            verdict === "correct"
              ? "verdict-correct"
              : verdict === "tooLittleVoltage" ||
                  verdict === "needMoreLife" ||
                  verdict === "needBothBranches" ||
                  verdict === "branchesMismatch"
                ? "verdict-warn"
                : "verdict-error";

          setStatus(T(verdictKeys[verdict] || verdict), cls);
        }

        function setStatus(text, cls) {
          const el = $("statusText");
          el.textContent = text;
          el.className = "status-text" + (cls ? " " + cls : "");
        }

        // ══════════════════════════════════════════════
        // CORRECT HANDLER
        // ══════════════════════════════════════════════
        function onCorrect() {
          if (state.mode === "learn") {
            state.lessonComplete = true;
            const lesson = LESSONS[state.lessonIdx];
            if (lesson) {
              $("takeawayText").textContent = T(lesson.takeawayKey);
            }
            if (state.lessonIdx < LESSONS.length - 1) {
              $("btnNext").classList.remove("hidden");
            }
            // Unlock next lesson
            if (state.lessonIdx >= state.maxLesson) {
              state.maxLesson = state.lessonIdx + 1;
              localStorage.setItem("bat-lesson", String(state.maxLesson));
            }
          } else if (state.mode === "challenge") {
            const mission = state.currentMission;
            if (!mission) return;

            const placed = countPlacedCells();
            let earnedStars = 1;
            if (state.hintsUsed === 0) earnedStars = 2;
            if (state.hintsUsed === 0 && placed <= mission.minimalCells) {
              earnedStars = 3;
            }

            // Persist best
            const prev = state.stars[mission.id] || 0;
            if (earnedStars > prev) {
              state.stars[mission.id] = earnedStars;
              localStorage.setItem("bat-stars", JSON.stringify(state.stars));
            }

            showStars(Math.max(earnedStars, prev));
          }
        }

        function countPlacedCells() {
          let count = 0;
          for (const ss of Object.values(state.slots)) {
            if (ss.battery) count++;
          }
          return count;
        }

        function showStars(count) {
          $("starsSection").classList.remove("hidden");
          const container = $("starsDisplay");
          while (container.firstChild)
            container.removeChild(container.firstChild);
          for (let i = 0; i < 3; i++) {
            const span = document.createElement("span");
            span.className = i < count ? "star-on" : "star-off";
            span.textContent = "\u2605";
            container.appendChild(span);
          }
        }

        // ══════════════════════════════════════════════
        // HINT SYSTEM
        // ══════════════════════════════════════════════
        function giveHint() {
          state.hintsUsed++;
          state.hintLevel = Math.min(state.hintLevel + 1, 3);

          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return;

          // Clear previous hints
          svg
            .querySelectorAll(".hint-ghost, .hint-highlight")
            .forEach((el) => el.remove());

          // Determine topic-specific hint text
          let hintKey = "hintSeries1";
          if (state.topic === "parallel") hintKey = "hintParallel1";
          if (state.topic === "mixed") hintKey = "hintMixed1";

          // Check for danger slots
          if (tpl.dangerSlots) {
            for (const ds of tpl.dangerSlots) {
              if (state.slots[ds.id]?.battery) {
                hintKey = "hintShort1";
                break;
              }
            }
          }

          $("takeawayText").textContent = T(hintKey);

          if (state.hintLevel >= 1) {
            // Highlight first problem slot
            const problemSlot = findFirstProblem(tpl);
            if (problemSlot) {
              const r = svg.querySelector(`[data-slot="${problemSlot}"]`);
              if (r) {
                const highlight = r.cloneNode();
                highlight.classList.add("hint-highlight");
                highlight.removeAttribute("data-slot");
                svg.appendChild(highlight);
              }
            }
          }

          if (state.hintLevel >= 3) {
            // Ghost preview - show correct answer faintly
            showGhostPreview(tpl);
          }
        }

        function findFirstProblem(tpl) {
          // Find first empty slot or reversed battery
          for (const s of tpl.slots) {
            const ss = state.slots[s.id];
            if (!ss?.battery) return s.id;
            if (ss.orientation === "reverse") return s.id;
          }
          // Check danger slots that should be empty
          if (tpl.dangerSlots) {
            for (const ds of tpl.dangerSlots) {
              if (state.slots[ds.id]?.battery) return ds.id;
            }
          }
          return null;
        }

        function showGhostPreview(tpl) {
          // Show ghost batteries in correct positions
          for (const s of tpl.slots) {
            if (!state.slots[s.id]?.battery) {
              const g = svgEl("g", { class: "hint-ghost" });
              const bx = s.x - SLOT_W / 2 + 4;
              const by = s.y - SLOT_H / 2 + 3;
              const bw = SLOT_W - 8;
              const bh = SLOT_H - 6;

              g.appendChild(
                svgEl("rect", {
                  x: bx,
                  y: by,
                  width: bw,
                  height: bh,
                  rx: 5,
                  fill: "#e5a825",
                  stroke: "#b8861a",
                  "stroke-width": 1,
                }),
              );

              // + on right (forward)
              g.appendChild(
                svgEl("rect", {
                  x: bx + bw - 14,
                  y: by + 3,
                  width: 14,
                  height: bh - 6,
                  rx: 3,
                  fill: "#dc2626",
                }),
              );

              svg.appendChild(g);
            }
          }
        }

        // ══════════════════════════════════════════════
        // MODE MANAGEMENT
        // ══════════════════════════════════════════════
        function loadMode() {
          clearTestState();
          state.hintsUsed = 0;
          state.hintLevel = 0;

          const isLearn = state.mode === "learn";
          const isChallenge = state.mode === "challenge";

          // Show/hide difficulty
          $("diffGroup").style.display = isChallenge ? "" : "none";

          // Topic toggles
          const topicBtns = document.querySelectorAll("[data-topic]");
          topicBtns.forEach((b) => (b.disabled = isLearn));

          // Button states
          $("btnHint").style.display = isLearn || isChallenge ? "" : "none";
          $("btnNext").classList.add("hidden");

          if (isLearn) {
            loadLesson(state.lessonIdx);
          } else if (isChallenge) {
            generateChallenge();
          } else {
            loadSandbox();
          }
        }

        // ══════════════════════════════════════════════
        // LEARN MODE
        // ══════════════════════════════════════════════
        function loadLesson(idx) {
          clearTestState();
          if (idx < 0 || idx >= LESSONS.length) idx = 0;
          state.lessonIdx = idx;
          const lesson = LESSONS[idx];

          state.targetVoltage = lesson.targetVoltage;
          state.targetLife = lesson.targetLife;
          state.expectedStructure = lesson.expectedStructure;
          state.topic = lesson.topic;

          // Update topic buttons
          document.querySelectorAll("[data-topic]").forEach((b) => {
            b.classList.toggle("active", b.dataset.topic === lesson.topic);
          });

          // Resolve template
          const resolved = resolveTemplate(lesson.template);
          state.templateId = resolved.tplId;
          state.slots = {};
          state.dangerSlots = {};

          // Set tray
          if (resolved.presetTrayCount !== undefined) {
            state.trayCount = resolved.presetTrayCount;
            state.trayMax = resolved.presetTrayCount;
          } else {
            state.trayCount = lesson.trayCount;
            state.trayMax = lesson.trayCount;
          }
          const lessonWires = lesson.wireCount || 0;
          state.wireCount = lessonWires;
          state.wireMax = lessonWires;

          // Apply prefilled
          if (resolved.prefilled) {
            for (const [slotId, orient] of Object.entries(resolved.prefilled)) {
              if (orient !== "empty") {
                const isDanger =
                  resolved.tpl.dangerSlots?.some((ds) => ds.id === slotId) ||
                  false;
                state.slots[slotId] = {
                  battery: true,
                  orientation: orient,
                  isDanger,
                };
              }
            }
          }

          renderBoard();
          computeReadouts();

          // Panel
          $("lessonTitle").textContent = T(lesson.titleKey);
          $("goalVoltage").textContent =
            T("needVoltage") + ": " + lesson.targetVoltage.toFixed(1) + " V";
          $("goalLife").textContent = T("needLife") + ": x" + lesson.targetLife;
          $("introText").textContent = T(lesson.introKey);
          $("takeawayText").textContent = "";
          $("starsSection").classList.add("hidden");

          setStatus(T("statusReady"), "");
        }

        // ══════════════════════════════════════════════
        // CHALLENGE MODE
        // ══════════════════════════════════════════════
        function generateChallenge() {
          const pool = CHALLENGE_POOLS[state.topic]?.[state.difficulty] || [];

          if (pool.length === 0) {
            // Empty pool (mixed+easy)
            state.currentMission = null;
            state.templateId = null;
            while (svg.firstChild) svg.removeChild(svg.firstChild);
            $("lessonTitle").textContent = "";
            $("goalVoltage").textContent = "";
            $("goalLife").textContent = "";
            $("introText").textContent = T("mixedStartsAtMedium");
            $("takeawayText").textContent = "";
            $("starsSection").classList.add("hidden");
            setStatus(T("mixedStartsAtMedium"), "verdict-warn");
            return;
          }

          // Pick random, avoid repeat
          let mission;
          if (pool.length > 1 && state.currentMission) {
            const filtered = pool.filter(
              (m) => m.id !== state.currentMission.id,
            );
            mission = filtered[Math.floor(Math.random() * filtered.length)];
          } else {
            mission = pool[Math.floor(Math.random() * pool.length)];
          }

          state.currentMission = mission;
          state.hintsUsed = 0;
          state.hintLevel = 0;
          state.targetVoltage = mission.targetVoltage;
          state.targetLife = mission.targetLife;
          state.expectedStructure = mission.expectedStructure;

          const resolved = resolveTemplate(mission.template);
          state.templateId = resolved.tplId;
          state.slots = {};

          if (resolved.presetTrayCount !== undefined) {
            state.trayCount = resolved.presetTrayCount;
            state.trayMax = resolved.presetTrayCount;
          } else {
            state.trayCount = mission.trayCount;
            state.trayMax = mission.trayCount;
          }
          const missionWires = mission.wireCount || 0;
          state.wireCount = missionWires;
          state.wireMax = missionWires;

          if (resolved.prefilled) {
            for (const [slotId, orient] of Object.entries(resolved.prefilled)) {
              if (orient !== "empty") {
                const isDanger =
                  resolved.tpl.dangerSlots?.some((ds) => ds.id === slotId) ||
                  false;
                state.slots[slotId] = {
                  battery: true,
                  orientation: orient,
                  isDanger,
                };
              }
            }
          }

          renderBoard();
          computeReadouts();

          $("lessonTitle").textContent = T(state.topic);
          $("goalVoltage").textContent =
            T("needVoltage") + ": " + mission.targetVoltage.toFixed(1) + " V";
          $("goalLife").textContent =
            T("needLife") + ": x" + mission.targetLife;
          $("introText").textContent = "";
          $("takeawayText").textContent = "";

          // Show previous best stars
          const best = state.stars[mission.id] || 0;
          if (best > 0) {
            showStars(best);
          } else {
            $("starsSection").classList.add("hidden");
          }

          setStatus(T("statusReady"), "");
        }

        // ══════════════════════════════════════════════
        // SANDBOX MODE
        // ══════════════════════════════════════════════
        function loadSandbox() {
          // Pick default template for topic
          const defaults = {
            series: "series_2",
            parallel: "parallel_2",
            mixed: "mixed_2s2p",
          };
          const tplId = defaults[state.topic] || "series_2";

          state.templateId = tplId;
          state.slots = {};
          state.targetVoltage = 0;
          state.targetLife = 0;
          state.expectedStructure = null;
          state.trayCount = 6;
          state.trayMax = 6;
          state.wireCount = 4;
          state.wireMax = 4;
          state.currentMission = null;

          renderBoard();
          computeReadouts();

          $("lessonTitle").textContent = T("sandbox");
          $("goalVoltage").textContent = "";
          $("goalLife").textContent = "";
          $("introText").textContent = "";
          $("takeawayText").textContent = "";
          $("starsSection").classList.add("hidden");

          setStatus(T("statusSandbox"), "");
        }

        // ══════════════════════════════════════════════
        // SANDBOX BULB (no target)
        // ══════════════════════════════════════════════
        function sandboxBulbVerdict() {
          if (state.currentStructure === "Invalid") return "batteryBackwards";
          if (state.currentStructure === "Incomplete") return "openCircuit";
          if (state.packVoltage === 0) return "openCircuit";
          if (state.packVoltage <= 1.5) return "tooLittleVoltage";
          if (state.packVoltage <= 3.0) return "correct";
          return "tooMuchVoltage";
        }

        // ══════════════════════════════════════════════
        // TRANSLATIONS
        // ══════════════════════════════════════════════
        function applyTranslations() {
          document.documentElement.lang = state.lang;

          $("titleText").textContent = T("title");
          $("subtitleText").textContent = T("subtitle");
          $("langBtn").textContent = state.lang === "en" ? "PL" : "EN";
          $("lblMode").textContent = T("mode");
          $("lblTopic").textContent = T("topic");
          $("lblDiff").textContent = T("difficulty");
          $("btnLearn").textContent = T("learn");
          $("btnChallenge").textContent = T("challenge");
          $("btnSandbox").textContent = T("sandbox");
          $("btnSeries").textContent = T("series");
          $("btnParallel").textContent = T("parallel");
          $("btnMixed").textContent = T("mixed");
          $("btnEasy").textContent = T("easy");
          $("btnMedium").textContent = T("medium");
          $("btnHard").textContent = T("hard");
          $("btnNew").textContent = T("new");
          $("btnTest").textContent = T("test");
          $("btnHint").textContent = T("hint");
          $("btnReset").textContent = T("reset");
          $("btnNext").textContent = T("next");
          $("lblGoal").textContent = T("goal");
          $("lblReadouts").textContent = T("readouts");
          $("lblVoltage").textContent = T("currentVoltage");
          $("lblLife").textContent = T("currentLife");
          $("lblStructure").textContent = T("currentStructure");
          $("safetyNote").textContent = T("safetyNote");

          // Re-apply current mode content
          loadMode();
        }

        // ══════════════════════════════════════════════
        // EVENT HANDLERS
        // ══════════════════════════════════════════════
        $("langBtn").addEventListener("click", () => {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        });

        $("themeToggleBtn").addEventListener("click", () => {
          const html = document.documentElement;
          const isLight = html.getAttribute("data-theme") === "light";
          if (isLight) {
            html.removeAttribute("data-theme");
            state.theme = "dark";
            $("themeIcon").textContent = "\u2600";
          } else {
            html.setAttribute("data-theme", "light");
            state.theme = "light";
            $("themeIcon").textContent = "\u263D";
          }
          localStorage.setItem("bat-theme", state.theme);
        });

        // Mode toggles
        document.querySelectorAll("[data-mode]").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll("[data-mode]")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            state.mode = btn.dataset.mode;
            loadMode();
          });
        });

        // Topic toggles
        document.querySelectorAll("[data-topic]").forEach((btn) => {
          btn.addEventListener("click", () => {
            if (btn.disabled) return;
            document
              .querySelectorAll("[data-topic]")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            state.topic = btn.dataset.topic;
            if (state.mode === "challenge") {
              generateChallenge();
            } else if (state.mode === "sandbox") {
              loadSandbox();
            }
          });
        });

        // Difficulty toggles
        document.querySelectorAll("[data-diff]").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll("[data-diff]")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            state.difficulty = btn.dataset.diff;
            if (state.mode === "challenge") {
              generateChallenge();
            }
          });
        });

        // Action buttons
        $("btnNew").addEventListener("click", () => {
          if (state.mode === "learn") {
            loadLesson(state.lessonIdx);
          } else if (state.mode === "challenge") {
            generateChallenge();
          } else {
            loadSandbox();
          }
        });

        $("btnTest").addEventListener("click", runTest);

        $("btnHint").addEventListener("click", giveHint);

        $("btnReset").addEventListener("click", () => {
          if (state.mode === "learn") {
            loadLesson(state.lessonIdx);
          } else if (state.mode === "challenge") {
            // Re-load current mission
            if (state.currentMission) {
              const mission = state.currentMission;
              state.hintsUsed = 0;
              state.hintLevel = 0;
              state.slots = {};

              const resolved = resolveTemplate(mission.template);
              state.templateId = resolved.tplId;

              if (resolved.presetTrayCount !== undefined) {
                state.trayCount = resolved.presetTrayCount;
                state.trayMax = resolved.presetTrayCount;
              } else {
                state.trayCount = mission.trayCount;
                state.trayMax = mission.trayCount;
              }
              const resetWires = mission.wireCount || 0;
              state.wireCount = resetWires;
              state.wireMax = resetWires;

              if (resolved.prefilled) {
                for (const [slotId, orient] of Object.entries(
                  resolved.prefilled,
                )) {
                  if (orient !== "empty") {
                    const isDanger =
                      resolved.tpl.dangerSlots?.some(
                        (ds) => ds.id === slotId,
                      ) || false;
                    state.slots[slotId] = {
                      battery: true,
                      orientation: orient,
                      isDanger,
                    };
                  }
                }
              }

              renderBoard();
              computeReadouts();
              clearTestState();
            }
          } else {
            loadSandbox();
          }
        });

        $("btnNext").addEventListener("click", () => {
          if (state.mode === "learn" && state.lessonIdx < LESSONS.length - 1) {
            state.lessonIdx++;
            state.hintsUsed = 0;
            state.hintLevel = 0;
            loadLesson(state.lessonIdx);
          }
        });

        // ══════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════
        function init() {
          // Apply saved theme
          if (state.theme === "light") {
            document.documentElement.setAttribute("data-theme", "light");
            $("themeIcon").textContent = "\u263D";
          }

          applyTranslations();
        }

        init();
      })();
    </script>
  </body>
</html>
