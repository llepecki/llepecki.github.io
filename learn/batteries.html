    <title>Battery Connection Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e1a;
        --panel: #111827;
        --panel-border: #1e2a3a;
        --text: #c9d1d9;
        --text-dim: #6e7a8a;
        --text-head: #e6edf3;
        --accent: #f59e0b;
        --accent-series: #f59e0b;
        --accent-parallel: #06b6d4;
        --accent-mixed: #84cc16;
        --error: #ef4444;
        --success: #22c55e;
        --wire: #b87333;
        --wire-dim: #8b5e3c;
        --wire-glow: #d4956a;
        --slot-bg: #0f1520;
        --slot-border: #b8733366;
        --slot-hover: #b8733355;
        --tray-bg: #0c1018;
        --tray-border: #b8733344;
        --bulb-off: #1a1a2a;
        --bulb-dim: #d4a017;
        --bulb-good: #fbbf24;
        --bulb-bright: #fef9c3;
        --danger: #ef4444;
        --bar-bg: #1e2a3a;
        --bar-fill: #f59e0b;
        --bar-life: #06b6d4;
        --star-on: #fbbf24;
        --star-off: #2a3040;
        --board-bg: #080c16;
        --dot-color: #1a2535;
        --bus-color: #b87333;
      }

      [data-theme="light"] {
        --bg: #f0f2f5;
        --panel: #ffffff;
        --panel-border: #d0d5dd;
        --text: #1a1a2e;
        --text-dim: #6b7280;
        --text-head: #111827;
        --accent: #d97706;
        --accent-series: #d97706;
        --accent-parallel: #0891b2;
        --accent-mixed: #65a30d;
        --error: #dc2626;
        --success: #16a34a;
        --wire: #8b5e3c;
        --wire-dim: #a0826455;
        --wire-glow: #b87333;
        --slot-bg: #fef9f0;
        --slot-border: #92400e66;
        --slot-hover: #92400e33;
        --tray-bg: #fdf6ec;
        --tray-border: #92400e44;
        --bulb-off: #d0d5dd;
        --bulb-dim: #d4a017;
        --bulb-good: #f59e0b;
        --bulb-bright: #fef3c7;
        --danger: #dc2626;
        --bar-bg: #e5e7eb;
        --bar-fill: #d97706;
        --bar-life: #0891b2;
        --star-on: #f59e0b;
        --star-off: #d0d5dd;
        --board-bg: #faf8f5;
        --dot-color: #e5e0d8;
        --bus-color: #92400e;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      header {
        padding: 10px 20px;
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 4px 16px;
        position: relative;
        z-index: 2;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-head);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      header h1 a {
        text-decoration: none;
        color: inherit;
        transition: opacity 0.2s;
      }

      header h1 a:hover {
        opacity: 0.7;
      }

      .home-icon {
        font-size: 1.3rem;
      }

      header p {
        font-size: 0.85rem;
        color: var(--text-dim);
        flex-basis: 100%;
      }

      .header-right {
        position: absolute;
        right: 16px;
        top: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .lang-btn {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.8rem;
        background: transparent;
        border: 1px solid var(--text-dim);
        color: var(--text);
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .lang-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .theme-toggle {
        font-size: 1.1rem;
        background: transparent;
        border: none;
        color: var(--text);
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        transition: transform 0.2s;
      }

      .theme-toggle:hover {
        transform: scale(1.15);
      }

      .theme-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 16px 12px;
      }

      .config {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        align-items: center;
        padding: 8px 0 10px;
      }

      .config-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .config-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.78rem;
        color: var(--text-dim);
        white-space: nowrap;
      }

      .mode-toggles,
      .topic-toggles,
      .diff-toggles {
        display: flex;
        gap: 4px;
      }

      .toggle-btn {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        padding: 4px 10px;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
      }

      .toggle-btn:hover {
        border-color: var(--text);
        color: var(--text);
      }

      .toggle-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .toggle-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      .toggle-btn.active[data-topic="series"] {
        border-color: var(--accent-series);
        color: var(--accent-series);
        background: color-mix(in srgb, var(--accent-series) 12%, transparent);
      }

      .toggle-btn.active[data-topic="parallel"] {
        border-color: var(--accent-parallel);
        color: var(--accent-parallel);
        background: color-mix(in srgb, var(--accent-parallel) 12%, transparent);
      }

      .toggle-btn.active[data-topic="mixed"] {
        border-color: var(--accent-mixed);
        color: var(--accent-mixed);
        background: color-mix(in srgb, var(--accent-mixed) 12%, transparent);
      }

      .toggle-btn:disabled {
        opacity: 0.35;
        cursor: default;
        pointer-events: none;
      }

      .btn {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.78rem;
        padding: 5px 14px;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 8%, transparent);
      }

      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn:disabled {
        opacity: 0.35;
        cursor: default;
        pointer-events: none;
      }

      .btn-test {
        border-color: var(--success);
        color: var(--success);
      }

      .btn-test:hover {
        background: color-mix(in srgb, var(--success) 12%, transparent);
        border-color: var(--success);
        color: var(--success);
      }

      .btn-next {
        border-color: var(--accent);
        color: var(--accent);
        animation: pulseBtn 1.5s ease infinite;
      }

      @keyframes pulseBtn {
        0%,
        100% {
          box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent);
        }
        50% {
          box-shadow: 0 0 8px 2px
            color-mix(in srgb, var(--accent) 30%, transparent);
        }
      }

      .main-area {
        flex: 1;
        display: flex;
        gap: 12px;
        min-height: 0;
      }

      .board-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--board-bg);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .board-wrap svg {
        width: 100%;
        height: auto;
        max-height: 72vh;
        display: block;
      }

      .panel {
        width: 240px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        overflow-y: auto;
      }

      .panel-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .panel-title {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .goal-value {
        font-family: "Share Tech Mono", monospace;
        font-size: 1rem;
        color: var(--text-head);
      }

      .meter {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .meter-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .meter-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        color: var(--text-dim);
      }

      .meter-value {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.85rem;
        color: var(--text-head);
      }

      .meter-bar {
        height: 8px;
        background: var(--bar-bg);
        border-radius: 4px;
        overflow: hidden;
      }

      .hidden {
        display: none;
      }

      .meter-fill {
        height: 100%;
        width: 0%;
        border-radius: 4px;
        transition: width 0.3s ease;
        background: var(--bar-fill);
      }

      .meter-fill.life {
        background: var(--bar-life);
      }

      .structure-value {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.85rem;
        color: var(--text-head);
      }

      .tip-text {
        font-size: 0.8rem;
        color: var(--text-dim);
        line-height: 1.45;
      }

      .lesson-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-head);
      }

      .stars {
        font-size: 1.1rem;
        letter-spacing: 2px;
      }

      .star-on {
        color: var(--star-on);
      }

      .star-off {
        color: var(--star-off);
      }

      .safety-note {
        font-size: 0.72rem;
        color: var(--text-dim);
        border-top: 1px solid var(--panel-border);
        padding-top: 8px;
        line-height: 1.4;
      }

      .bottom-bar {
        padding: 6px 0 2px;
        text-align: center;
      }

      .status-text {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.82rem;
        color: var(--text);
        min-height: 1.3em;
        transition: color 0.3s;
      }

      .status-text.verdict-correct {
        color: var(--success);
      }

      .status-text.verdict-error {
        color: var(--error);
      }

      .status-text.verdict-warn {
        color: var(--accent);
      }

      /* SVG styles */
      .slot-outline {
        fill: var(--slot-bg);
        stroke: var(--slot-border);
        stroke-width: 1.5;
        rx: 6;
        cursor: pointer;
        transition:
          fill 0.2s,
          stroke 0.2s;
      }

      .slot-outline:hover {
        fill: var(--slot-hover);
        stroke: var(--wire);
      }

      .slot-outline.armed-target {
        stroke: var(--accent);
        stroke-dasharray: none;
        animation: slotPulse 1s ease infinite;
      }

      @keyframes slotPulse {
        0%,
        100% {
          stroke-opacity: 0.6;
        }
        50% {
          stroke-opacity: 1;
        }
      }

      .slot-outline.occupied {
        stroke-dasharray: none;
        cursor: default;
        pointer-events: none;
      }

      .danger-outline {
        fill: color-mix(in srgb, var(--danger) 8%, var(--slot-bg));
        stroke: var(--danger);
        stroke-width: 2;
        stroke-dasharray: 6 4;
        rx: 6;
        cursor: pointer;
      }

      .wire-trace {
        fill: none;
        stroke: var(--wire-dim);
        stroke-width: 3;
        stroke-linecap: round;
        transition:
          stroke 0.4s ease,
          filter 0.4s ease;
      }

      .wire-trace.active {
        stroke: var(--wire-glow);
        filter: drop-shadow(0 0 4px var(--wire-glow));
        stroke-dasharray: 10 10;
        animation: currentPulse 0.5s linear infinite;
      }

      .wire-trace.error {
        stroke: var(--danger);
        filter: drop-shadow(0 0 4px var(--danger));
      }

      @keyframes currentPulse {
        from {
          stroke-dashoffset: 20;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      .bus-line {
        fill: none;
        stroke: var(--bus-color);
        stroke-width: 4;
        stroke-linecap: round;
        transition:
          stroke 0.4s,
          filter 0.4s;
      }

      .bus-line.active {
        filter: drop-shadow(0 0 4px var(--wire-glow));
      }

      .bus-line.error {
        stroke: var(--danger);
        filter: drop-shadow(0 0 6px var(--danger));
      }

      .tray-cell {
        cursor: grab;
        transition: filter 0.15s;
      }

      .tray-cell:hover {
        filter: brightness(1.15);
      }

      .tray-cell.armed {
        filter: brightness(1.3) drop-shadow(0 0 6px var(--accent));
      }

      .tray-cell.disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }

      .placed-battery {
        cursor: pointer;
        transition: filter 0.15s;
      }

      .placed-battery:hover {
        filter: brightness(1.1);
      }

      .placed-battery.pulse-red {
        animation: pulseRed 0.5s ease 3;
      }

      @keyframes pulseRed {
        0%,
        100% {
          filter: none;
        }
        50% {
          filter: brightness(0.7) sepia(1) hue-rotate(-30deg) saturate(3);
        }
      }

      .placed-wire {
        cursor: pointer;
        transition: filter 0.15s;
      }

      .placed-wire:hover {
        filter: brightness(1.15);
      }

      .tray-wire {
        cursor: grab;
        transition: filter 0.15s;
      }

      .tray-wire:hover {
        filter: brightness(1.15);
      }

      .tray-wire.armed {
        filter: brightness(1.3) drop-shadow(0 0 6px var(--accent));
      }

      .tray-wire.disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }

      .remove-btn {
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .placed-battery:hover .remove-btn {
        opacity: 1;
      }

      .placed-wire:hover .remove-btn {
        opacity: 1;
      }

      .bulb-body {
        transition:
          fill 0.4s,
          filter 0.4s;
      }

      .bulb-body.off {
        fill: url(#bulbGlass);
        filter: none;
      }

      .bulb-body.dim {
        fill: color-mix(in srgb, var(--bulb-dim) 25%, transparent);
        filter: drop-shadow(
          0 0 8px color-mix(in srgb, var(--bulb-dim) 50%, transparent)
        );
      }

      .bulb-body.good {
        fill: color-mix(in srgb, var(--bulb-good) 35%, transparent);
        filter: drop-shadow(
          0 0 18px color-mix(in srgb, var(--bulb-good) 70%, transparent)
        );
      }

      .bulb-body.bright {
        fill: color-mix(in srgb, var(--bulb-bright) 50%, transparent);
        filter: drop-shadow(
          0 0 28px color-mix(in srgb, var(--bulb-bright) 80%, transparent)
        );
      }

      .bulb-warning-ring {
        fill: none;
        stroke: var(--danger);
        stroke-width: 3;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .bulb-warning-ring.visible {
        opacity: 0.8;
      }

      .hint-ghost {
        opacity: 0.3;
        pointer-events: none;
      }

      .hint-highlight {
        stroke: var(--accent);
        stroke-width: 3;
        stroke-dasharray: none;
        animation: slotPulse 1s ease infinite;
      }

      .drag-ghost {
        pointer-events: none;
        opacity: 0.85;
        filter: drop-shadow(0 0 8px var(--accent));
      }

      .polarity-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        fill: var(--text);
        pointer-events: none;
      }

      .dot-pattern {
        fill: var(--dot-color);
      }

      @media (max-width: 700px) {
        header {
          padding: 8px 14px;
        }

        .config {
          gap: 6px 10px;
          padding: 6px 0 8px;
        }

        .toggle-btn {
          padding: 5px 8px;
          font-size: 0.72rem;
        }

        .btn {
          padding: 6px 10px;
          font-size: 0.75rem;
        }

        .main-area {
          flex-direction: column;
        }

        .board-wrap svg {
          max-height: 55vh;
        }

        .panel {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
          gap: 8px 16px;
          padding: 10px;
        }

        .panel-section {
          min-width: 100px;
          flex: 1;
        }

        .safety-note {
          flex-basis: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wire-trace,
        .bus-line,
        .bulb-body,
        .bulb-warning-ring,
        .slot-outline,
        .toggle-btn,
        .btn,
        .meter-fill,
        .placed-battery,
        .tray-cell,
        .remove-btn {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>
        <a href="/learn/" aria-label="Back to Learn"
          ><span class="home-icon">&#x1F50B;</span></a
        >
        <span id="titleText">Battery Connection Lab</span>
      </h1>
      <p id="subtitleText">Build packs in series, parallel, and mixed.</p>
      <div class="header-right">
        <button
          type="button"
          class="lang-btn"
          id="langBtn"
          title="Switch language"
        >
          PL
        </button>
        <button
          type="button"
          class="theme-toggle"
          id="themeToggleBtn"
          aria-label="Toggle color theme"
        >
          <span id="themeIcon">&#9728;</span>
        </button>
      </div>
    </header>

    <main>
      <div class="config" id="configBar">
        <div class="config-group">
          <span class="config-label" id="lblMode">Mode:</span>
          <div class="mode-toggles" id="modeToggles">
            <button
              type="button"
              class="toggle-btn active"
              data-mode="learn"
              id="btnLearn"
            >
              Learn
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-mode="challenge"
              id="btnChallenge"
            >
              Challenge
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-mode="sandbox"
              id="btnSandbox"
            >
              Sandbox
            </button>
          </div>
        </div>
        <div class="config-group">
          <span class="config-label" id="lblTopic">Topic:</span>
          <div class="topic-toggles" id="topicToggles">
            <button
              type="button"
              class="toggle-btn active"
              data-topic="series"
              id="btnSeries"
            >
              Series
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-topic="parallel"
              id="btnParallel"
            >
              Parallel
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-topic="mixed"
              id="btnMixed"
            >
              Mixed
            </button>
          </div>
        </div>
        <div class="config-group" id="diffGroup">
          <span class="config-label" id="lblDiff">Difficulty:</span>
          <div class="diff-toggles" id="diffToggles">
            <button
              type="button"
              class="toggle-btn active"
              data-diff="easy"
              id="btnEasy"
            >
              Easy
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-diff="medium"
              id="btnMedium"
            >
              Medium
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-diff="hard"

        // ══════════════════════════════════════════════
        // STATE

        const state = {

        // ══════════════════════════════════════════════
        // DOM REFS
        // ══════════════════════════════════════════════
        const $ = (id) => document.getElementById(id);
        const svg = $("boardSvg");

        // ══════════════════════════════════════════════
        // SVG HELPERS
        // ══════════════════════════════════════════════
        function svgEl(tag, attrs) {
          const el = document.createElementNS(SVG_NS, tag);
          if (attrs) {
            for (const [k, v] of Object.entries(attrs)) {
              el.setAttribute(k, v);
            }
          }
          return el;
        }

        function svgText(x, y, text, cls, fontSize) {
          const el = svgEl("text", {
            x,
            y,
            class: cls || "",
            "font-size": fontSize || 12,
            "text-anchor": "middle",
            "dominant-baseline": "central",
            "font-family": "Share Tech Mono, monospace",
            fill: "currentColor",
          });
          el.textContent = text;
          return el;
        }

        function ptInRect(px, py, rx, ry, rw, rh) {
          return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
        }

        function svgPoint(clientX, clientY) {
          const pt = svg.createSVGPoint();
          pt.x = clientX;
          pt.y = clientY;
          const ctm = svg.getScreenCTM();
          if (!ctm) return { x: 0, y: 0 };
          return pt.matrixTransform(ctm.inverse());
        }

        // ══════════════════════════════════════════════
        // TEMPLATE RESOLVER
        // ══════════════════════════════════════════════
        function resolveTemplate(templateRef) {
          if (TEMPLATES[templateRef]) {
            return {
              tplId: templateRef,
              tpl: TEMPLATES[templateRef],
              prefilled: null,
            };
          }
          if (REPAIR_PRESETS[templateRef]) {
            const preset = REPAIR_PRESETS[templateRef];
            return {
              tplId: preset.template,
              tpl: TEMPLATES[preset.template],
              prefilled: preset.prefilled,
              presetTrayCount: preset.trayCount,
            };
          }
          return null;
        }

        // ══════════════════════════════════════════════
        // BOARD RENDERING
        // ══════════════════════════════════════════════
        function renderBoard() {
          while (svg.firstChild) svg.removeChild(svg.firstChild);
          const tpl = TEMPLATES[state.templateId];
          if (!tpl) return;

          // Defs: patterns and gradients
          const defs = svgEl("defs");

          // Dot grid pattern
          const pat = svgEl("pattern", {
            id: "dotGrid",
            width: 20,
            height: 20,
            patternUnits: "userSpaceOnUse",
          });
          pat.appendChild(
            svgEl("circle", {
              cx: 10,
              cy: 10,
              r: 1,
              class: "dot-pattern",
            }),
          );
          defs.appendChild(pat);

          // Battery body gradient (warm golden cylindrical)
          const batGrad = svgEl("linearGradient", {
            id: "batBody",
            x1: "0",
            y1: "0",
            x2: "0",
            y2: "1",
          });
          [
            ["0%", "#f5c842"],
            ["15%", "#e5a825"],
            ["50%", "#d4910e"],
            ["85%", "#b87a0a"],
            ["100%", "#96640a"],
          ].forEach(([o, c]) => {
            const s = svgEl("stop", { offset: o, "stop-color": c });
            batGrad.appendChild(s);
          });
          defs.appendChild(batGrad);

          // Battery label band gradient
          const lblGrad = svgEl("linearGradient", {
            id: "batLabel",
            x1: "0",
            y1: "0",
            x2: "0",
            y2: "1",
          });
          [
            ["0%", "#f59e0b"],
            ["50%", "#e5a825"],
            ["100%", "#d4910e"],
          ].forEach(([o, c]) => {
            const s = svgEl("stop", { offset: o, "stop-color": c });
            lblGrad.appendChild(s);
          });
          defs.appendChild(lblGrad);

          // Positive terminal gradient (brass)
          const posGrad = svgEl("linearGradient", {
            id: "batPos",
            x1: "0",
            y1: "0",
            x2: "0",
            y2: "1",
          });
          [
            ["0%", "#fbbf24"],
            ["40%", "#f59e0b"],
            ["100%", "#b45309"],
          ].forEach(([o, c]) => {
            const s = svgEl("stop", { offset: o, "stop-color": c });
            posGrad.appendChild(s);
          });
          defs.appendChild(posGrad);

          // Bulb glass radial gradient
          const bulbGlass = svgEl("radialGradient", {
            id: "bulbGlass",
            cx: "0.45",
            cy: "0.4",
            r: "0.55",
          });
          [
            ["0%", "rgba(220,235,250,0.18)"],
            ["60%", "rgba(180,200,220,0.10)"],
            ["100%", "rgba(120,140,160,0.22)"],
          ].forEach(([o, c]) => {
            const s = svgEl("stop", { offset: o, "stop-color": c });
            bulbGlass.appendChild(s);
          });
          defs.appendChild(bulbGlass);

          // Screw base gradient (metallic)
          const baseGrad = svgEl("linearGradient", {
            id: "screwBase",
            x1: "0",
            y1: "0",
            x2: "1",
            y2: "0",
          });
          [
            ["0%", "#6b7280"],
            ["30%", "#9ca3af"],
            ["50%", "#d1d5db"],
            ["70%", "#9ca3af"],
            ["100%", "#6b7280"],
          ].forEach(([o, c]) => {
            const s = svgEl("stop", { offset: o, "stop-color": c });
            baseGrad.appendChild(s);
          });
          defs.appendChild(baseGrad);

          // Wire trace highlight filter
          const wireGlow = svgEl("filter", {
            id: "wireHighlight",
            x: "-10%",
            y: "-50%",
            width: "120%",
            height: "200%",
          });
          const feFlood = svgEl("feFlood", {
            "flood-color": "var(--wire-glow)",
            "flood-opacity": "0.25",
            result: "glow",
          });
          wireGlow.appendChild(feFlood);
          const feComp = svgEl("feComposite", {
            in: "glow",
            in2: "SourceGraphic",
            operator: "atop",
          });
          wireGlow.appendChild(feComp);
          defs.appendChild(wireGlow);

          svg.appendChild(defs);

          // Background
          svg.appendChild(
            svgEl("rect", {
              x: 0,
              y: 0,
              width: 960,
              height: 560,
              fill: "url(#dotGrid)",
            }),
          );

          // Tray area
          renderTray();

          // Wiring
          renderWiring(tpl);

          // Slots
          tpl.slots.forEach((slot) => {
            renderSlotOutline(slot, false);
          });

          // Danger slots
          if (tpl.dangerSlots) {
            tpl.dangerSlots.forEach((ds) => {
              renderSlotOutline(ds, true);
            });
          }

          // Bulb
          renderBulb();

          // Polarity labels on rails
          renderPolarityLabels(tpl);

          // Place prefilled items
          for (const [slotId, slotState] of Object.entries(state.slots)) {
            const slotDef = findSlotDef(slotId);
            if (!slotDef) continue;
            if (slotState.type === "wire") {
              renderPlacedWire(slotDef);
            } else if (slotState.battery) {
              renderPlacedBattery(
                slotDef,
                slotState.orientation,
                slotState.isDanger,
              );
            }
          }

          // Update tray visuals
          updateTrayVisuals();
        }

        function renderTray() {
          const g = svgEl("g", { class: "tray-group" });

          g.appendChild(
            svgEl("rect", {
              x: TRAY_X,
              y: TRAY_Y,
              width: TRAY_W,
              height: TRAY_H,
              rx: 8,
              fill: "var(--tray-bg)",
              stroke: "var(--tray-border)",
              "stroke-width": 2,
            }),
          );

          // Tray label
          const lbl = svgText(
            TRAY_X + TRAY_W / 2,
            TRAY_Y + 18,
            "1.5 V",
            "polarity-label",
            11,
          );
          lbl.setAttribute("fill", "var(--text-dim)");
          g.appendChild(lbl);

          // Tray battery slots (up to 6)
          const cellW = 56;
          const cellH = 24;
          const cols = 2;
          const padX = (TRAY_W - cols * cellW - (cols - 1) * 8) / 2;
          const startY = TRAY_Y + 36;

          for (let i = 0; i < 6; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cx = TRAY_X + padX + col * (cellW + 8) + cellW / 2;
            const cy = startY + row * (cellH + 14) + cellH / 2;

            const cellG = svgEl("g", {
              class: "tray-cell",
              "data-tray-idx": i,
            });

            // Golden cell body
            cellG.appendChild(
              svgEl("rect", {
                x: cx - cellW / 2,
                y: cy - cellH / 2,
                width: cellW,
                height: cellH,
                rx: 4,
                fill: "url(#batBody)",
                stroke: "#8b6914",
                "stroke-width": 1,
              }),
            );

            // Top highlight
            cellG.appendChild(
              svgEl("rect", {
                x: cx - cellW / 2 + 2,
                y: cy - cellH / 2 + 1,
                width: cellW - 4,
                height: 3,
                rx: 1,
                fill: "rgba(255,255,255,0.15)",
                "pointer-events": "none",
              }),
            );

            // + cap (right, red)
            cellG.appendChild(
              svgEl("rect", {
                x: cx + cellW / 2 - 10,
                y: cy - cellH / 2 + 2,
                width: 10,
                height: cellH - 4,
                rx: 2,
                fill: "#dc2626",
              }),
            );

            // + nub
            cellG.appendChild(
              svgEl("rect", {
                x: cx + cellW / 2 - 1,
                y: cy - 3,
                width: 3,
                height: 6,
                rx: 1,
                fill: "url(#batPos)",
              }),
            );

            // - cap (left, dark)
            cellG.appendChild(
              svgEl("rect", {
                x: cx - cellW / 2,
                y: cy - cellH / 2 + 2,
                width: 8,
                height: cellH - 4,
                rx: 2,
                fill: "#374151",
              }),
            );

            // + label
            const pLbl = svgText(cx + cellW / 2 - 5, cy, "+", "", 9);
            pLbl.setAttribute("fill", "#fff");
            pLbl.setAttribute("pointer-events", "none");
            cellG.appendChild(pLbl);

            // - label
            const mLbl = svgText(cx - cellW / 2 + 4, cy, "\u2212", "", 9);
            mLbl.setAttribute("fill", "#9ca3af");
            mLbl.setAttribute("pointer-events", "none");
            cellG.appendChild(mLbl);

            g.appendChild(cellG);
          }

          // Wire tray item
          const wireY = startY + 3 * (cellH + 14) + 14;
          const wireG = svgEl("g", {
            class: "tray-wire",
            "data-tray-wire": "0",
          });
          const wireX1 = TRAY_X + 24;
          const wireX2 = TRAY_X + TRAY_W - 24;

          // Conductor line
          wireG.appendChild(
            svgEl("line", {
              x1: wireX1,
              y1: wireY,
              x2: wireX2,
              y2: wireY,
              stroke: "var(--wire)",
              "stroke-width": 5,
              "stroke-linecap": "round",
            }),
          );

          // Left connector dot
          wireG.appendChild(
            svgEl("circle", {
              cx: wireX1,
              cy: wireY,
              r: 5,
              fill: "var(--wire-glow)",
              stroke: "var(--wire)",
              "stroke-width": 1,
            }),
          );

          // Right connector dot
          wireG.appendChild(
            svgEl("circle", {
              cx: wireX2,
              cy: wireY,
              r: 5,
              fill: "var(--wire-glow)",
              stroke: "var(--wire)",
              "stroke-width": 1,
            }),
          );
          g.appendChild(wireG);

          svg.appendChild(g);
        }

        function updateTrayVisuals() {
          const cells = svg.querySelectorAll(".tray-cell");
          cells.forEach((cell, i) => {
            if (i < state.trayCount) {
              cell.classList.remove("disabled");
            } else {
              cell.classList.add("disabled");
            }
          });
          const wireEl = svg.querySelector(".tray-wire");
          if (wireEl) {
            if (state.wireCount > 0) {
              wireEl.classList.remove("disabled");
            } else {
              wireEl.classList.add("disabled");
            }
          }
        }

        function renderSlotOutline(slotDef, isDanger) {
          const sx = slotDef.x - SLOT_W / 2;
          const sy = slotDef.y - SLOT_H / 2;

          const rect = svgEl("rect", {
            x: sx,
            y: sy,
            width: SLOT_W,
            height: SLOT_H,
            class: isDanger ? "danger-outline" : "slot-outline",
            "data-slot": slotDef.id,
          });
          svg.appendChild(rect);

          if (isDanger) {
            // Lightning icon
            const bolt = svgText(slotDef.x, slotDef.y, "\u26A1", "", 18);
            bolt.setAttribute("fill", "var(--danger)");
            bolt.setAttribute("pointer-events", "none");
            bolt.setAttribute("opacity", "0.5");
            bolt.setAttribute("data-slot-icon", slotDef.id);
            svg.appendChild(bolt);
          } else {
            // Polarity hints inside empty slot
            const minus = svgText(sx + 12, slotDef.y, "\u2212", "", 12);
            minus.setAttribute("fill", "var(--text-dim)");
            minus.setAttribute("opacity", "0.4");
            minus.setAttribute("pointer-events", "none");
            minus.setAttribute("data-slot-hint", slotDef.id);
            svg.appendChild(minus);

            const plus = svgText(sx + SLOT_W - 12, slotDef.y, "+", "", 12);
            plus.setAttribute("fill", "var(--text-dim)");
            plus.setAttribute("opacity", "0.4");
            plus.setAttribute("pointer-events", "none");
            plus.setAttribute("data-slot-hint", slotDef.id);
            svg.appendChild(plus);
          }
        }

        function renderWiring(tpl) {
          const g = svgEl("g", { class: "wiring" });

          if (tpl.kind === "series") {
            // Single horizontal wire from left edge through slots to bulb
            const slots = tpl.slots.sort((a, b) => a.x - b.x);
            const leftX = Math.min(196, slots[0].x - SLOT_W / 2 - 30);
            const rightX = BULB_CX - BULB_R - 10;
            const y = 280;

            // Left wire to first slot
            const wl = svgEl("line", {
              x1: leftX,
              y1: y,
              x2: slots[0].x - SLOT_W / 2,
              y2: y,
              class: "wire-trace",
              "data-wire": "left",
            });
            g.appendChild(wl);

            // Wires between slots
            for (let i = 0; i < slots.length - 1; i++) {
              const w = svgEl("line", {
                x1: slots[i].x + SLOT_W / 2,
                y1: y,
                x2: slots[i + 1].x - SLOT_W / 2,
                y2: y,
                class: "wire-trace",
                "data-wire": "inter-" + i,
              });
              g.appendChild(w);
            }

            // Right wire from last slot to bulb
            const wr = svgEl("line", {
              x1: slots[slots.length - 1].x + SLOT_W / 2,
              y1: y,
              x2: rightX,
              y2: y,
              class: "wire-trace",
              "data-wire": "right",
            });
            g.appendChild(wr);

            // Return wire (bottom path)
            const retY = 420;
            g.appendChild(
              svgEl("line", {
                x1: leftX,
                y1: y,
                x2: leftX,
                y2: retY,
                class: "wire-trace",
                "data-wire": "ret-down-l",
              }),
            );
            g.appendChild(
              svgEl("line", {
                x1: leftX,
                y1: retY,
                x2: BULB_CX,
                y2: retY,
                class: "wire-trace",
                "data-wire": "ret-bottom",
              }),
            );
            g.appendChild(
              svgEl("line", {
                x1: BULB_CX,
                y1: retY,
                x2: BULB_CX,
                y2: BULB_CY + BULB_R + 10,
                class: "wire-trace",
                "data-wire": "ret-up-r",
              }),
            );

            // Polarity labels: left rail = −, right rail = +
            const mLbl = svgText(leftX, y - 16, "\u2212", "polarity-label", 16);
            mLbl.setAttribute("fill", "var(--text-dim)");
            g.appendChild(mLbl);
            const pLbl = svgText(rightX, y - 16, "+", "polarity-label", 16);
            pLbl.setAttribute("fill", "var(--error)");
            g.appendChild(pLbl);
          } else {
            // Parallel / Mixed / Repair with buses
            const buses = tpl.buses;
            if (!buses) return;

            // Left bus
            g.appendChild(
              svgEl("line", {
                x1: buses.left.x,
                y1: buses.left.y1,
                x2: buses.left.x,
                y2: buses.left.y2,
                class: "bus-line",
                "data-bus": "left",
              }),
            );

            // Right bus
            g.appendChild(
              svgEl("line", {
                x1: buses.right.x,
                y1: buses.right.y1,
                x2: buses.right.x,
                y2: buses.right.y2,
                class: "bus-line",
                "data-bus": "right",
              }),
            );

            // Branch wires for normal slots
            const branches = {};
            tpl.slots.forEach((s) => {
              if (!branches[s.branch]) branches[s.branch] = [];
              branches[s.branch].push(s);
            });

            for (const [brId, brSlots] of Object.entries(branches)) {
              const sorted = brSlots.sort((a, b) => a.x - b.x);
              const y = sorted[0].y;

              // Left bus to first slot
              g.appendChild(
                svgEl("line", {
                  x1: buses.left.x,
                  y1: y,
                  x2: sorted[0].x - SLOT_W / 2,
                  y2: y,
                  class: "wire-trace",
                  "data-wire": brId + "-left",
                  "data-branch": brId,
                }),
              );

              // Between slots in same branch
              for (let i = 0; i < sorted.length - 1; i++) {
                g.appendChild(
                  svgEl("line", {
                    x1: sorted[i].x + SLOT_W / 2,
                    y1: y,
                    x2: sorted[i + 1].x - SLOT_W / 2,
                    y2: y,
                    class: "wire-trace",
                    "data-wire": brId + "-inter-" + i,
                    "data-branch": brId,
                  }),
                );
              }

              // Last slot to right bus
              g.appendChild(
                svgEl("line", {
                  x1: sorted[sorted.length - 1].x + SLOT_W / 2,
                  y1: y,
                  x2: buses.right.x,
                  y2: y,
                  class: "wire-trace",
                  "data-wire": brId + "-right",
                  "data-branch": brId,
                }),
              );
            }

            // Danger slot wires
            if (tpl.dangerSlots) {
              tpl.dangerSlots.forEach((ds) => {
                g.appendChild(
                  svgEl("line", {
                    x1: buses.left.x,
                    y1: ds.y,
                    x2: ds.x - SLOT_W / 2,
                    y2: ds.y,
                    class: "wire-trace",
                    "data-wire": "danger-left",
                    "data-danger": "true",
                  }),
                );
                g.appendChild(
                  svgEl("line", {
                    x1: ds.x + SLOT_W / 2,
                    y1: ds.y,
                    x2: buses.right.x,
                    y2: ds.y,
                    class: "wire-trace",
                    "data-wire": "danger-right",
                    "data-danger": "true",
                  }),
                );
              });
            }

            // Right bus to bulb
            const midBusY = (buses.right.y1 + buses.right.y2) / 2;
            g.appendChild(
              svgEl("line", {
                x1: buses.right.x,
                y1: midBusY,
                x2: BULB_CX - BULB_R - 10,
                y2: BULB_CY,
                class: "wire-trace",
                "data-wire": "bus-to-bulb",
              }),
            );

            // Bulb return to left bus
            g.appendChild(
              svgEl("line", {
                x1: BULB_CX,
                y1: BULB_CY + BULB_R + 10,
                x2: BULB_CX,
                y2: BULB_CY + BULB_R + 30,
                class: "wire-trace",
                "data-wire": "bulb-ret-down",
              }),
            );
            g.appendChild(
              svgEl("line", {
                x1: BULB_CX,
                y1: BULB_CY + BULB_R + 30,
                x2: buses.left.x,
                y2: BULB_CY + BULB_R + 30,
                class: "wire-trace",
                "data-wire": "bulb-ret-left",
              }),
            );
            g.appendChild(
              svgEl("line", {
                x1: buses.left.x,
                y1: BULB_CY + BULB_R + 30,
                x2: buses.left.x,
                y2: buses.left.y2,
                class: "wire-trace",
                "data-wire": "bulb-ret-up",
              }),
            );

            // Polarity labels: left bus = −, right bus = +
            const mLbl = svgText(
              buses.left.x,
              buses.left.y1 - 14,
              "\u2212",
              "polarity-label",
              16,
            );
            mLbl.setAttribute("fill", "var(--text-dim)");
            g.appendChild(mLbl);
            const pLbl = svgText(
              buses.right.x,
              buses.right.y1 - 14,
              "+",
              "polarity-label",
              16,
            );
            pLbl.setAttribute("fill", "var(--error)");
            g.appendChild(pLbl);
          }

          svg.appendChild(g);
        }

        function renderPolarityLabels(tpl) {
