  state.lang = state.lang === 'en' ? 'pl' : 'en';
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';
  applyTranslations();
  refreshPreview();
}

function fisherYates(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function histogramScore(hist) {
  let sum = 0;
  let cnt = 0;
  for (let i = 0; i < 26; i++) {
    if (hist[i] > 0) { sum += hist[i]; cnt++; }
  }
  if (cnt === 0) return 0;
  const mean = sum / cnt;
  let variance = 0;
  for (let i = 0; i < 26; i++) {
    if (hist[i] > 0) { const d = hist[i] - mean; variance += d * d; }
  }
  return Math.sqrt(variance / cnt);
}

function getFilteredWordPool() {
  let pool;
  if (state.wordLang === 'both') {
    pool = WORD_LISTS.en.concat(WORD_LISTS.pl);
  } else {
    pool = WORD_LISTS[state.wordLang].slice();
  }
  return pool.filter((w) => w.length >= state.wordMinLen && w.length <= state.wordMaxLen);
}

function selectWordsFlat(pool, count) {
  if (pool.length === 0) return [];
  if (pool.length <= count) return fisherYates(pool);
  const hist = new Array(26).fill(0);
  const selected = [];
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let bestWord = null;
    let bestScore = Infinity;
    let ties = 0;
    for (const word of pool) {
      if (used.has(word)) continue;
      const trial = hist.slice();
      for (let c = 0; c < word.length; c++) {
        const ci = word.charCodeAt(c) - 65;
        if (ci >= 0 && ci < 26) trial[ci]++;
      }
      const score = histogramScore(trial);
      if (score < bestScore) {
        bestScore = score;
        bestWord = word;
        ties = 1;
      } else if (score === bestScore) {
        ties++;
        if (Math.random() < 1 / ties) bestWord = word;
      }
    }
    if (!bestWord) break;
    selected.push(bestWord);
    used.add(bestWord);
    for (let c = 0; c < bestWord.length; c++) {
      const ci = bestWord.charCodeAt(c) - 65;
      if (ci >= 0 && ci < 26) hist[ci]++;
    }
  }
  return fisherYates(selected);
}

function newSessionId() {
  let n;
  if (window.crypto?.getRandomValues) {
    const buf = new Uint32Array(1);
    window.crypto.getRandomValues(buf);
    n = buf[0];
  } else {
    n = Math.floor(Math.random() * 0xFFFFFFFF);
  }
  return '#' + n.toString(16).toUpperCase().padStart(8, '0').slice(0, 5);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '/' +
    String(d.getMonth() + 1).padStart(2, '0') + '/' +
    String(d.getDate()).padStart(2, '0');
}

function buildSenderCell(letter, idx) {
  return {
    stack: [
      { text: String(idx + 1), fontSize: 11, color: '#90A4AE', characterSpacing: 0.5 },
      { text: letter, fontSize: 26, bold: true, alignment: 'center', color: '#263238', margin: [0, 2, 0, 0] },
    ],
  };
}

function buildReceiverCell(idx) {
  return {
    stack: [
      { text: String(idx + 1), fontSize: 11, bold: true, color: '#263238', characterSpacing: 0.5 },
    ],
  };
}

function emptyCell() {
  return { text: '', border: [false, false, false, false] };
}

function buildWordSenderRow(word, idx, fontSize, vPad) {
  return [
    {
      stack: [
        { text: String(idx + 1), fontSize: 11, color: '#90A4AE', characterSpacing: 0.5 },
        { text: word, fontSize: fontSize, bold: true, color: '#263238', margin: [8, vPad, 0, 0] },
      ],
    },
  ];
}

function buildWordReceiverRow(idx) {
  return [
    {
      stack: [
        { text: String(idx + 1), fontSize: 11, bold: true, color: '#263238', characterSpacing: 0.5 },
      ],
    },
  ];
}

function wordsTableLayout() {
  return {
    hLineWidth: () => 0.6, vLineWidth: () => 0.6,
    hLineColor: () => '#B0BEC5', vLineColor: () => '#B0BEC5',
    paddingLeft: () => 4, paddingRight: () => 4,
    paddingTop: () => 2, paddingBottom: () => 2,
  };
}

function wordsReceiverLayout() {
  return {
    hLineWidth: () => 0.6, vLineWidth: () => 0.6,
    hLineColor: () => '#B0BEC5', vLineColor: () => '#B0BEC5',
    paddingLeft: () => 4, paddingRight: () => 4,
    paddingTop: () => 2, paddingBottom: () => 2,
  };
}

function buildGridBody(cellBuilder) {
  const total = COLS * ROWS;
  const body = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      if (idx < ALPHABET.length) {
        row.push(cellBuilder(idx));
      } else if (idx < total) {
        row.push(emptyCell());
      }
    }
    body.push(row);
  }
  return body;
}

function gridLayout() {
  return {
    hLineWidth: () => 0.6, vLineWidth: () => 0.6,
    hLineColor: () => '#B0BEC5', vLineColor: () => '#B0BEC5',
    paddingLeft: () => 4, paddingRight: () => 4,
    paddingTop: () => 2, paddingBottom: () => 2,
  };
}

function buildDocDefinition() {
  const headerBand = (labelKey, name) => {
    const label = T(labelKey);
    const titleParts = name
      ? [{ text: label + ' \u2014 ', color: '#90A4AE' }, { text: name, bold: true, color: '#263238' }]
      : [{ text: label, bold: true, color: '#455A64' }];
    return {
      columns: [
        { text: titleParts, fontSize: 11 },
        { text: state.sessionId + '  \u00B7  ' + todayStr(), alignment: 'right', fontSize: 9, color: '#90A4AE', characterSpacing: 0.5 },
      ],
      margin: [0, 0, 0, 6],
    };
  };
  const foldLine = { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 0.6, dash: { length: 3, space: 3 }, lineColor: '#90A4AE' }], absolutePosition: { x: 40, y: 421 } };

  if (state.mode === 'letters') {
    const senderBody = buildGridBody((idx) => buildSenderCell(state.sequence[idx], idx));
    const receiverBody = buildGridBody((idx) => buildReceiverCell(idx));
    return {
      pageSize: 'A4', pageOrientation: 'portrait', pageMargins: [40, 36, 40, 24],
      content: [
        headerBand('senderLabel', state.senderName),
        { table: { widths: ['*', '*', '*', '*'], heights: () => 42, body: senderBody }, layout: gridLayout() },
        foldLine,
        { text: '\u00A0', fontSize: 1, margin: [0, 16, 0, 16] },
        headerBand('receiverLabel', state.receiverName),
        { table: { widths: ['*', '*', '*', '*'], heights: () => 42, body: receiverBody }, layout: gridLayout() },
      ],
      defaultStyle: { font: 'Roboto', fontSize: 10, color: '#263238' },
    };
  }

  const count = state.sequence.length || 1;
  const rowHeight = Math.min(50, Math.floor(352 / count));
  const wordFontSize = Math.min(18, Math.max(13, Math.floor(rowHeight * 0.4)));
  const vPad = Math.max(0, Math.floor((rowHeight - wordFontSize - 6) / 2));
  const senderBody = state.sequence.map((w, i) => buildWordSenderRow(w, i, wordFontSize, vPad));
  const receiverBody = state.sequence.map((_, i) => buildWordReceiverRow(i));
  const senderTableH = rowHeight * count;
  const spacerH = Math.max(16, Math.round(669 - 2 * senderTableH));
  const spacerTopM = Math.floor(spacerH / 2);
  const spacerBotM = spacerH - spacerTopM;
  return {
    pageSize: 'A4', pageOrientation: 'portrait', pageMargins: [40, 36, 40, 24],
    content: [
      headerBand('senderLabel', state.senderName),
      { table: { widths: ['*'], heights: () => rowHeight, body: senderBody }, layout: wordsTableLayout() },
      foldLine,
      { text: '\u00A0', fontSize: 1, margin: [0, spacerTopM, 0, spacerBotM] },
      headerBand('receiverLabel', state.receiverName),
      { table: { widths: ['*'], heights: () => rowHeight, body: receiverBody }, layout: wordsReceiverLayout() },
    ],
    defaultStyle: { font: 'Roboto', fontSize: 10, color: '#263238' },
  };
}

function refreshPreview() {
  if (typeof pdfMake === 'undefined') return;
  const pdf = pdfMake.createPdf(buildDocDefinition());
  pdf.getDataUrl((url) => {
    document.getElementById('previewFrame').src = url;
    state.pdfReady = true;
  });
}

function renderHistogram() {
  const hist = new Array(26).fill(0);
  const chars = state.mode === 'letters' ? state.sequence : state.sequence.join('').split('');
  for (const ch of chars) {
    const ci = ch.charCodeAt(0) - 65;
    if (ci >= 0 && ci < 26) hist[ci]++;
  }
  const maxVal = Math.max(1, ...hist);
  const el = document.getElementById('histogram');
  el.textContent = '';
  for (let i = 0; i < 26; i++) {
    const col = document.createElement('div');
    col.className = 'hist-col';
    const countEl = document.createElement('div');
    countEl.className = 'hist-count';
    countEl.textContent = hist[i] || '';
    const barWrap = document.createElement('div');
    barWrap.className = 'hist-bar-wrap';
    const bar = document.createElement('div');
    bar.className = hist[i] === 0 ? 'hist-bar zero' : 'hist-bar';
    bar.style.height = (hist[i] > 0 ? Math.max(4, Math.round((hist[i] / maxVal) * 56)) : 0) + 'px';
    barWrap.appendChild(bar);
    const letterEl = document.createElement('div');
    letterEl.className = 'hist-letter';
    letterEl.textContent = ALPHABET[i];
    col.appendChild(countEl);
    col.appendChild(barWrap);
    col.appendChild(letterEl);
    el.appendChild(col);
  }
}

function regenerate() {
  if (state.mode === 'letters') {
    state.sequence = fisherYates(ALPHABET);
  } else {
    const pool = getFilteredWordPool();
    if (pool.length === 0) {
      const btn = document.getElementById('generateBtn');
      btn.style.background = '#C62828';
      setTimeout(() => { btn.style.background = ''; }, 1200);
      return;
    }
    const count = Math.min(state.wordCount, pool.length);
    state.sequence = selectWordsFlat(pool, count);
  }
  state.sessionId = newSessionId();
  document.getElementById('sessionIdVal').textContent = state.sessionId;
  document.getElementById('dateVal').textContent = todayStr();
  renderHistogram();
  refreshPreview();
}

let nameDebounceTimer = null;
function onNameChange() {
  state.senderName = document.getElementById('senderInput').value.trim();
  state.receiverName = document.getElementById('receiverInput').value.trim();
  clearTimeout(nameDebounceTimer);
  nameDebounceTimer = setTimeout(refreshPreview, 600);
}

function downloadPdf() {
  if (typeof pdfMake === 'undefined') return;
  const btn = document.getElementById('downloadBtn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = T('downloadBusy');
  const filename = 'morse-practice-' + state.sessionId.replace('#', '') + '.pdf';
  pdfMake.createPdf(buildDocDefinition()).download(filename, () => {
    btn.disabled = false;
    btn.textContent = originalText;
  });
}

function printPdf() {
  if (typeof pdfMake === 'undefined') return;
  pdfMake.createPdf(buildDocDefinition()).print();
}

const CUT_LINE_Y = 421;
const TOLERANCE_FOLD = 1.5;
const MIN_CLEARANCE = 15;
const MAX_BALANCE_DIFF = 8;

function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      res(window.pdfjsLib);
    };
    s.onerror = () => rej(new Error('Failed to load PDF.js'));
    document.head.appendChild(s);
  });
}

function runLayoutTest() {
  const btn = document.getElementById('testBtn');
  btn.disabled = true;
  btn.textContent = '\u2026';
  btn.style.background = '';
  btn.style.borderColor = '';
  btn.style.color = '';
  loadPdfJs().then((lib) => {
    const pdf = pdfMake.createPdf(buildDocDefinition());
    pdf.getBuffer(async (buf) => {
      try {
        const doc = await lib.getDocument({ data: new Uint8Array(buf) }).promise;
        const page = await doc.getPage(1);
        const viewport = page.getViewport({ scale: 1.0 });
        const ph = viewport.height;
        const mid = ph / 2;
        const textContent = await page.getTextContent();
        const items = textContent.items
          .map((t) => ({ text: t.str, y: ph - t.transform[5], fs: Math.abs(t.transform[3]) }))
          .filter((t) => t.text.trim());
        const senderItems = items.filter((t) => t.y < CUT_LINE_Y && t.y > 50);
        const lastSender = senderItems.reduce((a, b) => (b.y > a.y ? b : a), senderItems[0]);
        const firstReceiver = items.filter((t) => t.y > CUT_LINE_Y).reduce((a, b) => (b.y < a.y ? b : a), { y: ph });
        const foldOffset = Math.abs(CUT_LINE_Y - mid);
        const gapAbove = CUT_LINE_Y - lastSender.y;
        const gapBelow = firstReceiver.y - CUT_LINE_Y;
        const balanceDiff = Math.abs(gapAbove - gapBelow);
        const checks = [
          { name: 'Single page', ok: doc.numPages === 1, msg: doc.numPages === 1 ? '1 page' : doc.numPages + ' pages' },
          { name: 'Fold alignment', ok: foldOffset <= TOLERANCE_FOLD, msg: foldOffset.toFixed(1) + 'pt from midpoint (max ' + TOLERANCE_FOLD + ')' },
          { name: 'Sender clearance', ok: gapAbove >= MIN_CLEARANCE, msg: gapAbove.toFixed(1) + 'pt above (min ' + MIN_CLEARANCE + ')' },
          { name: 'Receiver clearance', ok: gapBelow >= MIN_CLEARANCE, msg: gapBelow.toFixed(1) + 'pt below (min ' + MIN_CLEARANCE + ')' },
          { name: 'Balance', ok: balanceDiff <= MAX_BALANCE_DIFF, msg: balanceDiff.toFixed(1) + 'pt diff (max ' + MAX_BALANCE_DIFF + ')' },
        ];
        const allPass = checks.every((c) => c.ok);
        const summary = checks.map((c) => (c.ok ? '\u2713' : '\u2717') + ' ' + c.name + ': ' + c.msg);
        const color = allPass ? '#4CAF50' : '#C62828';
        btn.style.background = color;
        btn.style.borderColor = color;
        btn.style.color = '#fff';
        btn.title = summary.join('\n');
        console.log('Layout test:\n' + summary.join('\n'));
      } catch (e) {
        btn.style.background = '#C62828';
        btn.style.borderColor = '#C62828';
        btn.style.color = '#fff';
        btn.title = 'Error: ' + e.message;
      }
      btn.disabled = false;
      btn.textContent = '\u2713';
      setTimeout(() => {
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 2000);
    });
  });
}

function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeLettersBtn').classList.toggle('active', mode === 'letters');
  document.getElementById('modeWordsBtn').classList.toggle('active', mode === 'words');
  document.getElementById('wordsControls').classList.toggle('visible', mode === 'words');
  regenerate();
}

function onWordLangChange(lang) {
  state.wordLang = lang;
  document.querySelectorAll('#wordLangToggle .type-btn').forEach((b) => {
    b.classList.toggle('active', b.dataset.wlang === lang);
  });
  regenerate();
}

let sliderDebounceTimer = null;
function onSliderChange() {
  const min = parseInt(document.getElementById('minLenSlider').value, 10);
  let max = parseInt(document.getElementById('maxLenSlider').value, 10);
  if (min > max) {
    max = min;
    document.getElementById('maxLenSlider').value = max;
  }
  state.wordMinLen = min;
  state.wordMaxLen = max;
  state.wordCount = parseInt(document.getElementById('wordCountSlider').value, 10);
  document.getElementById('minLenVal').textContent = min;
  document.getElementById('maxLenVal').textContent = max;
  document.getElementById('wordCountVal').textContent = state.wordCount;
  clearTimeout(sliderDebounceTimer);
  sliderDebounceTimer = setTimeout(regenerate, 300);
}

function init() {
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';
  document.getElementById('langBtn').addEventListener('click', toggleLang);
  document.getElementById('senderInput').addEventListener('input', onNameChange);
  document.getElementById('receiverInput').addEventListener('input', onNameChange);
  document.getElementById('generateBtn').addEventListener('click', regenerate);
  document.getElementById('downloadBtn').addEventListener('click', downloadPdf);
  document.getElementById('printBtn').addEventListener('click', printPdf);
  document.getElementById('testBtn').addEventListener('click', runLayoutTest);
  document.getElementById('modeLettersBtn').addEventListener('click', () => setMode('letters'));
  document.getElementById('modeWordsBtn').addEventListener('click', () => setMode('words'));
  document.querySelectorAll('#wordLangToggle .type-btn').forEach((b) => {
    b.addEventListener('click', () => onWordLangChange(b.dataset.wlang));
  });
  document.getElementById('minLenSlider').addEventListener('input', onSliderChange);
  document.getElementById('maxLenSlider').addEventListener('input', onSliderChange);
  document.getElementById('wordCountSlider').addEventListener('input', onSliderChange);
  applyTranslations();
  regenerate();
}

init();
