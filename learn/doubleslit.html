<style>

<script>
'use strict';
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const state = {
  lang: navigator.language?.startsWith('pl') ? 'pl' : 'en',
  mode: 'continuous',    // 'continuous' or 'photon'
  slitCount: 1,
  slitWidth: 5,
  slitSep: 20,
  speed: 1,
  autoFire: false,
  totalCount: 0,
  photons: [],
  hasFired: false,
  hits: [],
  histBins: new Array(120).fill(0),
};

// ══════════════════════════════════════════════
// SCENE LAYOUT (logical coords, 1000x750 space)
// ══════════════════════════════════════════════
const DS = {
  sourceX: 80,
  barrierX: 400,
  screenX: 880,
  centerY: 375,
  barrierTop: 75,
  barrierBottom: 675,
  screenTop: 75,
  screenBottom: 675,
  lambda: 18,
};

function getSlitGeometry() {
  const a = state.slitWidth * 3;
  const d = state.slitSep * 3;
  const cy = DS.centerY;
  if (state.slitCount === 1) {
    return [{ top: cy - a / 2, bottom: cy + a / 2 }];
  }
  return [
    { top: cy - d / 2 - a / 2, bottom: cy - d / 2 + a / 2 },
    { top: cy + d / 2 - a / 2, bottom: cy + d / 2 + a / 2 },
  ];
}

// ══════════════════════════════════════════════
// I18N
// ══════════════════════════════════════════════

    mode: 'Tryb',

function T(key) { return I18N[state.lang][key]; }

  const l = I18N[state.lang];

  document.documentElement.lang = state.lang;

  document.getElementById('lblSpeed').textContent = l.speed;

  document.getElementById('lblTot').textContent = l.tot;
  document.getElementById('frontLabel').textContent = l.screenView;
  document.getElementById('slit1Btn').classList.toggle('active', state.slitCount === 1);
  document.getElementById('slit2Btn').classList.toggle('active', state.slitCount === 2);
  document.getElementById('contBtn').classList.toggle('active', state.mode === 'continuous');
  document.getElementById('photonBtn').classList.toggle('active', state.mode === 'photon');
  document.getElementById('autoBtn').classList.toggle('active', state.autoFire);
  updateInfoText();
}

// eslint-disable-next-line no-unused-vars
function toggleLang() {
  state.lang = state.lang === 'en' ? 'pl' : 'en';
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';
  applyTranslations();
}

// ══════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const frontCanvas = document.getElementById('frontCanvas');
const fctx = frontCanvas.getContext('2d');
let W, H, scale, ox, oy;
let FW, FH;  // front view dimensions

function resize() {
  const dpr = window.devicePixelRatio || 1;

  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 1000, H / 750) * 0.95;
  ox = (W - 1000 * scale) / 2;
  oy = (H - 750 * scale) / 2;

  const frect = frontCanvas.parentElement.getBoundingClientRect();
  FW = frect.width; FH = frect.height;
  frontCanvas.width = FW * dpr;
  frontCanvas.height = FH * dpr;
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

function tx(x) { return ox + x * scale; }
function ty(y) { return oy + y * scale; }
function ts(s) { return s * scale; }

// ══════════════════════════════════════════════
// PHYSICS
// ══════════════════════════════════════════════
function computeIntensity(y) {
  const a = state.slitWidth * 3;
  const d = state.slitSep * 3;
  const L = DS.screenX - DS.barrierX;
  const lam = DS.lambda;
  const dy = y - DS.centerY;
  const sinTheta = dy / Math.sqrt(dy * dy + L * L);

  const alpha = Math.PI * a * sinTheta / lam;
  const sinc2 = Math.abs(alpha) < 0.001 ? 1 : (Math.sin(alpha) / alpha) ** 2;

  if (state.slitCount === 1) return sinc2;

  const delta = 2 * Math.PI * d * sinTheta / lam;
  return sinc2 * Math.cos(delta / 2) ** 2;
}

function sampleDetectionY() {
  const yMin = DS.screenTop, yMax = DS.screenBottom;
  let Imax = 0;
  for (let y = yMin; y <= yMax; y++) {
    const I = computeIntensity(y);
    if (I > Imax) Imax = I;
  }
  for (let attempt = 0; attempt < 2000; attempt++) {
    const y = yMin + Math.random() * (yMax - yMin);
    if (Math.random() * Imax < computeIntensity(y)) return y;
  }
  return DS.centerY;
}

// ══════════════════════════════════════════════
// PHOTON LIFECYCLE (single photon mode)
// ══════════════════════════════════════════════
const PHASE_DURATIONS = { travel: 0.5, wave: 1.2, collapse: 0.08, flash: 0.30 };
const COL_SOURCE = { r: 255, g: 152, b: 0 };

function firePhoton() {
  if (state.mode !== 'photon') return;
  state.photons.push({
    phase: 'travel',
    t: 0,
    targetY: null,
    flashAlpha: 0,
    wavePhaseOffset: Math.random() * Math.PI * 2,
  });
  if (!state.hasFired) { state.hasFired = true; updateInfoText(); }
}

function updatePhoton(p, dt) {
  if (p.phase === 'travel') {
    p.t += dt / PHASE_DURATIONS.travel;
    if (p.t >= 1) {
      p.t = 0;
      p.phase = 'wave';
      p.targetY = sampleDetectionY();
    }
  } else if (p.phase === 'wave') {
    p.t += dt / PHASE_DURATIONS.wave;
    if (p.t >= 1) {
      p.t = 0;
      p.phase = 'collapse';
    }
  } else if (p.phase === 'collapse') {
    p.t += dt / PHASE_DURATIONS.collapse;
    if (p.t >= 1) {
      p.phase = 'flash';
      p.flashAlpha = 1;
      p.t = 0;
    }
  } else if (p.phase === 'flash') {
    p.flashAlpha -= dt / PHASE_DURATIONS.flash;
    if (p.flashAlpha <= 0) {
      p.phase = 'done';
      recordHit(p);
    }
  }
}

function recordHit(p) {
  if (p.targetY == null) return;
  state.hits.push({ y: p.targetY, xOff: (Math.random() - 0.5) * 20, fx: Math.random() });
  state.totalCount++;
  const binIndex = Math.floor((p.targetY - DS.screenTop) / (DS.screenBottom - DS.screenTop) * state.histBins.length);
  state.histBins[Math.max(0, Math.min(state.histBins.length - 1, binIndex))]++;
  document.getElementById('totalCount').textContent = state.totalCount;
  updateInfoText();
}

// ══════════════════════════════════════════════
// DRAWING — WAVE PACKET (ported from MZ)
// ══════════════════════════════════════════════
function drawWavePacket(px, py, dirx, diry, amplitude, wavePhase, col) {
  const c = ctx;
  if (amplitude < 0.01) return;
  const perpx = -diry, perpy = dirx;
  const { r: cr, g: cg, b: cb } = col || COL_SOURCE;

  const N = 60;
  const halfLen = ts(18);
  const waveAmp = ts(7) * amplitude;
  const sigma = halfLen * 0.38;

  const upper = [], lower = [];
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * 2 - 1;
    const d = t * halfLen;
    const env = Math.exp(-(d * d) / (2 * sigma * sigma));
    const osc = Math.sin(wavePhase + t * 14) * waveAmp * env * amplitude;
    const bx = px + dirx * d;
    const by = py + diry * d;
    upper.push({ x: bx + perpx * osc, y: by + perpy * osc });
    lower.push({ x: bx - perpx * osc, y: by - perpy * osc });
  }

  c.save();
  c.beginPath();
  c.moveTo(upper[0].x, upper[0].y);
  for (let i = 1; i <= N; i++) c.lineTo(upper[i].x, upper[i].y);
  for (let i = N; i >= 0; i--) c.lineTo(lower[i].x, lower[i].y);
  c.closePath();
  c.fillStyle = `rgba(${cr},${cg},${cb},${0.18 * amplitude})`;
  c.fill();

  c.beginPath();
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * 2 - 1;
    const d = t * halfLen;
    const env = Math.exp(-(d * d) / (2 * sigma * sigma));
    const osc = Math.sin(wavePhase + t * 14) * waveAmp * env * amplitude;
    const bx = px + dirx * d;
    const by = py + diry * d;
    const wx = bx + perpx * osc;
    const wy = by + perpy * osc;
    if (i === 0) c.moveTo(wx, wy); else c.lineTo(wx, wy);
  }
  c.strokeStyle = `rgba(${cr},${cg},${cb},${0.7 * amplitude})`;
  c.lineWidth = ts(3);
  c.stroke();

  const glowR = ts(9) * amplitude;
  const glow = c.createRadialGradient(px, py, 0, px, py, glowR);
  glow.addColorStop(0, `rgba(${cr},${cg},${cb},${0.45 * amplitude})`);
  glow.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
  c.fillStyle = glow;
  c.beginPath(); c.arc(px, py, glowR, 0, Math.PI * 2); c.fill();
  c.restore();
}

// ══════════════════════════════════════════════
// DRAWING — STATIC SCENE ELEMENTS
// ══════════════════════════════════════════════
function drawSource(bright) {
  const c = ctx, cx = tx(DS.sourceX), cy = ty(DS.centerY);
  const glowAlpha = bright ? 0.8 : 0.5;
  const glowSize = bright ? ts(45) : ts(30);
  const glow = c.createRadialGradient(cx, cy, ts(4), cx, cy, glowSize);
  glow.addColorStop(0, `rgba(255,152,0,${glowAlpha})`);
  glow.addColorStop(0.5, `rgba(255,152,0,${glowAlpha * 0.2})`);
  glow.addColorStop(1, 'rgba(255,152,0,0)');
  c.fillStyle = glow;
  c.beginPath(); c.arc(cx, cy, glowSize, 0, Math.PI * 2); c.fill();

  const bw = ts(14), bh = ts(18);
  c.beginPath();
  c.moveTo(cx - bw, cy + ts(2));
  c.quadraticCurveTo(cx - bw, cy - bh, cx, cy - bh - ts(4));
  c.quadraticCurveTo(cx + bw, cy - bh, cx + bw, cy + ts(2));
  c.closePath();
  c.fillStyle = bright ? 'rgba(255,152,0,0.35)' : 'rgba(255,152,0,0.18)';
  c.fill();
  c.strokeStyle = '#FF9800';
  c.lineWidth = ts(2.5);
  c.stroke();

  const baseW = ts(10), baseH = ts(10), baseY = cy + ts(2);
  c.fillStyle = '#90A4AE';
  c.fillRect(cx - baseW, baseY, baseW * 2, baseH);
  c.strokeStyle = '#78909C';
  c.lineWidth = ts(1.5);
  c.strokeRect(cx - baseW, baseY, baseW * 2, baseH);
  for (let i = 1; i <= 2; i++) {
    const ly = baseY + baseH * i / 3;
    c.beginPath(); c.moveTo(cx - baseW, ly); c.lineTo(cx + baseW, ly); c.stroke();
  }
  c.strokeStyle = '#FF9800';
  c.lineWidth = ts(2);
  c.beginPath();
  c.moveTo(cx - ts(4), baseY);
  c.lineTo(cx - ts(4), cy - ts(6));
  c.lineTo(cx, cy - ts(12));
  c.lineTo(cx + ts(4), cy - ts(6));
  c.lineTo(cx + ts(4), baseY);
  c.stroke();

  c.font = `600 ${ts(20)}px "Share Tech Mono", monospace`;
  c.fillStyle = '#90A4AE';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(T('source'), cx, cy + ts(34));
}

function drawBarrier() {
  const slits = getSlitGeometry();
  const bx = tx(DS.barrierX);
  const bw = ts(12);

  const segments = [];
  segments.push({ top: DS.barrierTop, bottom: slits[0].top });
  if (slits.length === 2) {
    segments.push({ top: slits[0].bottom, bottom: slits[1].top });
  }
  segments.push({ top: slits[slits.length - 1].bottom, bottom: DS.barrierBottom });

  ctx.fillStyle = '#546E7A';
  ctx.strokeStyle = '#37474F';
  ctx.lineWidth = ts(1.5);
  for (const seg of segments) {
    const y0 = ty(seg.top), h = ts(seg.bottom - seg.top);
    ctx.fillRect(bx - bw / 2, y0, bw, h);
    ctx.strokeRect(bx - bw / 2, y0, bw, h);
  }

  ctx.fillStyle = 'rgba(255,152,0,0.08)';
  for (const s of slits) {
    ctx.fillRect(bx - bw / 2, ty(s.top), bw, ts(s.bottom - s.top));
  }

  ctx.font = `600 ${ts(18)}px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#90A4AE';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(T('barrier'), bx, ty(DS.barrierBottom) + ts(12));
}

function drawDetectionScreen() {
  const sx = tx(DS.screenX);
  const top = ty(DS.screenTop), h = ts(DS.screenBottom - DS.screenTop);

  ctx.fillStyle = 'rgba(69,90,100,0.06)';
  ctx.fillRect(sx, top, ts(80), h);

  ctx.strokeStyle = 'rgba(69,90,100,0.3)';
  ctx.lineWidth = ts(2);
  ctx.beginPath();
  ctx.moveTo(sx, top);
  ctx.lineTo(sx, top + h);
  ctx.stroke();

  ctx.font = `600 ${ts(18)}px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#90A4AE';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(T('screen'), sx + ts(30), ty(DS.screenBottom) + ts(12));
}

function drawBeamPath() {
  ctx.setLineDash([ts(6), ts(8)]);
  ctx.strokeStyle = 'rgba(69,90,100,0.12)';
  ctx.lineWidth = ts(2);
  ctx.beginPath();
  ctx.moveTo(tx(DS.sourceX), ty(DS.centerY));
  ctx.lineTo(tx(DS.barrierX), ty(DS.centerY));
  ctx.stroke();
  ctx.setLineDash([]);
}

// ══════════════════════════════════════════════
// DRAWING — CONTINUOUS MODE
// ══════════════════════════════════════════════
function drawContinuousBeam(now) {
  // Expanding circular wavefronts from the source, clipped to left of barrier
  const srcX = tx(DS.sourceX);
  const srcY = ty(DS.centerY);
  const maxDist = DS.barrierX - DS.sourceX;
  const waveLen = ts(DS.lambda);
  const maxRadius = ts(maxDist);
  const numWaves = Math.ceil(maxRadius / waveLen);
  const phase = now * 8;

  ctx.save();

  // Clip to region between source and barrier
  ctx.beginPath();
  ctx.rect(srcX, ty(DS.barrierTop - 50), tx(DS.barrierX) - srcX, ts(DS.barrierBottom - DS.barrierTop + 100));
  ctx.clip();

  ctx.lineWidth = ts(1.5);
  for (let n = 0; n < numWaves; n++) {
    const r = ((n + (phase / (Math.PI * 2)) % 1)) * waveLen;
    if (r < 1 || r > maxRadius) continue;
    const fadeDist = 1 - (r / maxRadius) * 0.6;
    const alpha = 0.35 * fadeDist;
    ctx.strokeStyle = `rgba(255,152,0,${alpha})`;
    ctx.beginPath();
    ctx.arc(srcX, srcY, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawContinuousWavefronts(now) {
  const slits = getSlitGeometry();
  const slitCenters = slits.map(s => (s.top + s.bottom) / 2);
  const maxDist = DS.screenX - DS.barrierX;
  const waveLen = ts(DS.lambda);
  const maxRadius = ts(maxDist);
  const numWaves = Math.ceil(maxRadius / waveLen);
  const phase = now * 8;

  ctx.save();

  // Clip between barrier and screen
  ctx.beginPath();
  ctx.rect(tx(DS.barrierX), ty(DS.barrierTop - 30), tx(DS.screenX) - tx(DS.barrierX), ts(DS.barrierBottom - DS.barrierTop + 60));
  ctx.clip();

  const colors = state.slitCount === 1
    ? ['255,152,0']
    : ['255,152,0', '255,152,0'];

  for (let s = 0; s < slitCenters.length; s++) {
    const cy = ty(slitCenters[s]);
    const cxPos = tx(DS.barrierX);

    ctx.lineWidth = ts(1.5);
    for (let n = 0; n < numWaves; n++) {
      // Animated: arcs scroll outward continuously
      const r = ((n + (phase / (Math.PI * 2)) % 1)) * waveLen;
      if (r < 1 || r > maxRadius) continue;
      const fadeDist = 1 - (r / maxRadius) * 0.8;
      const alpha = 0.35 * fadeDist;
      ctx.strokeStyle = `rgba(${colors[s]},${alpha})`;
      ctx.beginPath();
      ctx.arc(cxPos, cy, r, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawContinuousPattern() {
  const sx = tx(DS.screenX);
  const maxBarW = ts(60);
  const numPts = 200;
  const bandH = ts((DS.screenBottom - DS.screenTop) / numPts);

  // Filled intensity pattern on screen
  for (let i = 0; i < numPts; i++) {
    const y = DS.screenTop + (DS.screenBottom - DS.screenTop) * (i / numPts);
    const I = computeIntensity(y);
    if (I < 0.01) continue;
    ctx.fillStyle = `rgba(255,152,0,${I * 0.7})`;
    ctx.fillRect(sx, ty(y), ts(6), bandH);
    ctx.fillStyle = `rgba(255,152,0,${I * 0.25})`;
    ctx.fillRect(sx + ts(6), ty(y), I * maxBarW, bandH);
  }

  // Intensity curve outline
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(200,100,0,0.4)';
  ctx.lineWidth = ts(1.5);
  for (let i = 0; i <= numPts; i++) {
    const y = DS.screenTop + (DS.screenBottom - DS.screenTop) * (i / numPts);
    const I = computeIntensity(y);
    const px = sx + ts(6) + I * maxBarW;
    const py = ty(y);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

// ══════════════════════════════════════════════
// DRAWING — SINGLE PHOTON MODE ELEMENTS
// ══════════════════════════════════════════════
function drawAccumulatedHits() {
  if (state.hits.length === 0) return;
  const sx = tx(DS.screenX);
  const dotR = ts(2.2);
  ctx.fillStyle = 'rgba(255,152,0,0.75)';
  for (const hit of state.hits) {
    ctx.beginPath();
    ctx.arc(sx + ts(hit.xOff + 10), ty(hit.y), dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHistogram() {
  if (state.totalCount === 0) return;
  let maxCount = 0;
  for (let i = 0; i < state.histBins.length; i++) {
    if (state.histBins[i] > maxCount) maxCount = state.histBins[i];
  }
  if (maxCount === 0) return;
  const maxBarW = ts(55);
  const sx = tx(DS.screenX) + ts(22);
  const binH = ts((DS.screenBottom - DS.screenTop) / state.histBins.length);

  ctx.fillStyle = 'rgba(255,152,0,0.18)';
  for (let i = 0; i < state.histBins.length; i++) {
    if (state.histBins[i] === 0) continue;
    const barW = (state.histBins[i] / maxCount) * maxBarW;
    ctx.fillRect(sx, ty(DS.screenTop) + i * binH, barW, binH * 0.9);
  }
}

function drawTheoreticalCurve() {
  if (state.totalCount < 5) return;
  const sx = tx(DS.screenX) + ts(22);
  const maxBarW = ts(55);

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(69,90,100,0.3)';
  ctx.lineWidth = ts(1.5);
  ctx.setLineDash([ts(4), ts(4)]);

  const numPts = 200;
  for (let i = 0; i <= numPts; i++) {
    const y = DS.screenTop + (DS.screenBottom - DS.screenTop) * (i / numPts);
    const I = computeIntensity(y);
    const px = sx + I * maxBarW;
    const py = ty(y);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

// ══════════════════════════════════════════════
// DRAWING — WAVEFRONTS (single photon)
// ══════════════════════════════════════════════
function drawPhotonWavefronts(p, now) {
  const slits = getSlitGeometry();
  const slitCenters = slits.map(s => (s.top + s.bottom) / 2);
  const maxDist = DS.screenX - DS.barrierX;
  const maxRadius = ts(maxDist * p.t);
  const waveLen = ts(DS.lambda);
  const numWaves = Math.ceil(maxRadius / waveLen);

  const fadeIn = Math.min(p.t * 5, 1);
  const fadeOut = Math.min((1 - p.t) * 4, 1);
  const baseAlpha = fadeIn * fadeOut * 0.5;

  if (baseAlpha < 0.01 || numWaves === 0) return;

  ctx.save();

  ctx.beginPath();
  ctx.rect(tx(DS.barrierX), ty(DS.barrierTop - 30), tx(DS.screenX) - tx(DS.barrierX), ts(DS.barrierBottom - DS.barrierTop + 60));
  ctx.clip();

  const colors = state.slitCount === 1
    ? ['255,152,0']
    : ['255,152,0', '255,152,0'];

  for (let s = 0; s < slitCenters.length; s++) {
    const cy = ty(slitCenters[s]);
    const cxPos = tx(DS.barrierX);

    ctx.lineWidth = ts(1.5);
    for (let n = 1; n <= numWaves; n++) {
      const r = n * waveLen;
      if (r > maxRadius) break;
      const waveFade = 1 - (r / maxRadius) * 0.7;
      const alpha = baseAlpha * waveFade;
      ctx.strokeStyle = `rgba(${colors[s]},${alpha * 0.6})`;
      ctx.beginPath();
      ctx.arc(cxPos, cy, r, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawScreenGlow(p) {
  if (p.t < 0.6) return;
  const glowAlpha = (p.t - 0.6) / 0.4 * 0.35;
  const sx = tx(DS.screenX);
  const numPts = 120;
  const bandH = ts((DS.screenBottom - DS.screenTop) / numPts);

  for (let i = 0; i < numPts; i++) {
    const y = DS.screenTop + (DS.screenBottom - DS.screenTop) * (i / numPts);
    const I = computeIntensity(y);
    ctx.fillStyle = `rgba(255,152,0,${I * glowAlpha})`;
    ctx.fillRect(sx - ts(4), ty(y), ts(8), bandH);
  }
}

// ══════════════════════════════════════════════
// DRAWING — PHOTON DISPATCH
// ══════════════════════════════════════════════
function drawPhoton(p, now) {
  if (p.phase === 'travel') {
    const px = DS.sourceX + (DS.barrierX - DS.sourceX) * p.t;
    drawWavePacket(tx(px), ty(DS.centerY), 1, 0, 1, now * 24 + p.wavePhaseOffset, COL_SOURCE);
  }
  else if (p.phase === 'wave') {
    drawPhotonWavefronts(p, now);
    drawScreenGlow(p);
  }
  else if (p.phase === 'collapse') {
    const dotAlpha = p.t;
    const sx = tx(DS.screenX);
    const sy = ty(p.targetY);
    ctx.fillStyle = `rgba(255,152,0,${dotAlpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, ts(4), 0, Math.PI * 2);
    ctx.fill();
  }
  else if (p.phase === 'flash') {
    const sx = tx(DS.screenX);
    const sy = ty(p.targetY);
    const r = ts(25) * p.flashAlpha;
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    g.addColorStop(0, `rgba(255,152,0,${p.flashAlpha * 0.8})`);
    g.addColorStop(1, 'rgba(255,152,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,152,0,0.9)';
    ctx.beginPath();
    ctx.arc(sx, sy, ts(3), 0, Math.PI * 2);
    ctx.fill();
  }
}

// ══════════════════════════════════════════════
// DRAWING — FRONT VIEW (screen seen head-on)
// ══════════════════════════════════════════════
function mapYToFrontX(logicalY) {
  // Map logical y (screenTop..screenBottom) to front canvas x (vertical stripes)
  return ((logicalY - DS.screenTop) / (DS.screenBottom - DS.screenTop)) * FW;
}

function drawFrontView(now) {
  const c = fctx;
  c.fillStyle = '#12121e';
  c.fillRect(0, 0, FW, FH);

  if (state.mode === 'continuous') {
    drawFrontContinuous(c);
  } else {
    drawFrontPhotonHits(c);
    drawFrontPhotonFlash(c);
  }
}

function drawFrontContinuous(c) {
  // Single smooth horizontal gradient encoding the intensity pattern
  const grad = c.createLinearGradient(0, 0, FW, 0);
  const numStops = 200;
  for (let i = 0; i <= numStops; i++) {
    const t = i / numStops;
    const y = DS.screenTop + (DS.screenBottom - DS.screenTop) * t;
    const I = computeIntensity(y);
    grad.addColorStop(t, `rgba(255,${180 + Math.round(I * 20)},${50 + Math.round(I * 30)},${I * 0.9})`);
  }
  c.fillStyle = grad;
  c.fillRect(0, 0, FW, FH);

  // Vertical fade: dark edges at top and bottom
  const edgeH = FH * 0.3;
  const topGrad = c.createLinearGradient(0, 0, 0, edgeH);
  topGrad.addColorStop(0, '#12121e');
  topGrad.addColorStop(1, 'rgba(18,18,30,0)');
  c.fillStyle = topGrad;
  c.fillRect(0, 0, FW, edgeH);

  const botGrad = c.createLinearGradient(0, FH - edgeH, 0, FH);
  botGrad.addColorStop(0, 'rgba(18,18,30,0)');
  botGrad.addColorStop(1, '#12121e');
  c.fillStyle = botGrad;
  c.fillRect(0, FH - edgeH, FW, edgeH);
}

function drawFrontPhotonHits(c) {
  if (state.hits.length === 0) return;
  const dotR = Math.max(1.5, FH / 250);
  const marginY = FH * 0.1;
  const usableH = FH - marginY * 2;

  c.fillStyle = 'rgba(255,180,50,0.85)';
  for (const hit of state.hits) {
    const px = mapYToFrontX(hit.y);
    const py = marginY + hit.fx * usableH;
    c.beginPath();
    c.arc(px, py, dotR, 0, Math.PI * 2);
    c.fill();
  }
}

function drawFrontPhotonFlash(c) {
  for (const p of state.photons) {
    if (p.phase !== 'flash' || p.targetY == null) continue;
    const px = mapYToFrontX(p.targetY);
    const py = FH / 2;
    const r = 15 * p.flashAlpha;
    const g = c.createRadialGradient(px, py, 0, px, py, r);
    g.addColorStop(0, `rgba(255,200,80,${p.flashAlpha * 0.9})`);
    g.addColorStop(1, 'rgba(255,152,0,0)');
    c.fillStyle = g;
    c.beginPath();
    c.arc(px, py, r, 0, Math.PI * 2);
    c.fill();
  }
}

// ══════════════════════════════════════════════
// DRAWING — SCENE ORCHESTRATOR
// ══════════════════════════════════════════════
function drawScene(now) {
  ctx.fillStyle = '#f5f3ee';
  ctx.fillRect(0, 0, W, H);

  if (state.mode === 'continuous') {
    drawDetectionScreen();
    drawContinuousPattern();
    drawContinuousBeam(now);
    drawBarrier();
    drawContinuousWavefronts(now);
    drawSource(true);
  } else {
    drawBeamPath();
    drawDetectionScreen();
    drawHistogram();
    drawTheoreticalCurve();
    drawAccumulatedHits();
    drawBarrier();
    drawSource(false);
    for (const p of state.photons) {
      drawPhoton(p, now);
    }
  }

  drawFrontView(now);
}

// ══════════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════════
let lastTime = 0;
let autoTimer = 0;
const AUTO_DELAY = 0.15;

function animate(now) {
  now /= 1000;
  const rawDt = lastTime ? Math.min(now - lastTime, 0.05) : 0;
  const dt = rawDt * state.speed;
  lastTime = now;

  if (state.mode === 'photon') {
    // Update photons
    for (let i = state.photons.length - 1; i >= 0; i--) {
      updatePhoton(state.photons[i], dt);
      if (state.photons[i].phase === 'done') state.photons.splice(i, 1);
    }

    // Auto-fire
    if (state.autoFire) {
      autoTimer += rawDt;
      if (autoTimer >= AUTO_DELAY / state.speed && state.photons.length < 1) {
        firePhoton();
        autoTimer = 0;
      }
    }
  }

  drawScene(now);
  requestAnimationFrame(animate);
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
function setMode(mode) {
  state.mode = mode;
  document.getElementById('contBtn').classList.toggle('active', mode === 'continuous');
  document.getElementById('photonBtn').classList.toggle('active', mode === 'photon');

  // Show/hide photon-only controls
  const hidden = mode === 'continuous';
  document.querySelectorAll('.photon-only').forEach(el => el.classList.toggle('hidden', hidden));

  // Stop auto-fire when switching to continuous
  if (mode === 'continuous' && state.autoFire) {
    state.autoFire = false;
    autoTimer = 0;
    document.getElementById('autoBtn').classList.remove('active');
    document.getElementById('fireBtn').classList.remove('auto-active');
  }

  // Clear in-flight photons when switching modes
  state.photons = [];

  updateInfoText();
}

// eslint-disable-next-line no-unused-vars
function setSlits(n) {
  state.slitCount = n;
  document.getElementById('slit1Btn').classList.toggle('active', n === 1);
  document.getElementById('slit2Btn').classList.toggle('active', n === 2);
  document.getElementById('slitSepSlider').disabled = (n === 1);
  resetStats();
  updateInfoText();
}

document.getElementById('slitWidthSlider').addEventListener('input', e => {
  state.slitWidth = +e.target.value;
  document.getElementById('slitWidthVal').textContent = e.target.value;
  if (state.mode === 'photon') resetStats();
});

document.getElementById('slitSepSlider').addEventListener('input', e => {
  state.slitSep = +e.target.value;
  document.getElementById('slitSepVal').textContent = e.target.value;
  if (state.mode === 'photon') resetStats();
});

document.getElementById('speedSlider').addEventListener('input', e => {
  state.speed = +e.target.value / 100;
  document.getElementById('speedVal').textContent = state.speed + 'x';
});

function resetStats() {
  state.totalCount = 0;
  state.photons = [];
  state.hits = [];
  state.histBins = new Array(120).fill(0);
  document.getElementById('totalCount').textContent = '0';
  updateInfoText();
}

// eslint-disable-next-line no-unused-vars
function toggleAuto() {
  state.autoFire = !state.autoFire;
  autoTimer = 0;
  document.getElementById('autoBtn').classList.toggle('active', state.autoFire);
  document.getElementById('fireBtn').classList.toggle('auto-active', state.autoFire);
}

function updateInfoText() {
  const el = document.getElementById('infoText');

  if (state.mode === 'continuous') {
    el.textContent = state.slitCount === 1 ? T('infoCont1') : T('infoCont2');
    return;
  }

  // Single photon mode
  if (!state.hasFired) {
    el.textContent = T('infoStart');
    return;
  }
  const n = state.totalCount;
  if (n < 3) {
    el.textContent = state.slitCount === 1 ? T('infoFiring1') : T('infoFiring2');
  } else if (n < 20) {
    el.textContent = state.slitCount === 1 ? T('infoPattern1') : T('infoPattern2');
  } else if (n < 100) {
    el.textContent = T('infoMany').replace('{0}', n);
  } else {
    el.textContent = T('infoMystery');
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';
applyTranslations();
resize();
document.getElementById('slitSepSlider').disabled = (state.slitCount === 1);
setMode('continuous');
updateInfoText();
requestAnimationFrame(animate);
</script>
</body>
</html>
