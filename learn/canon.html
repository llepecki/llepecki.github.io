            sky: ["#c06030", "#e8a880"],
            ground: ["#c44e24", "#8b3a1f"],
            stars: false,
            clouds: false,
            haze: false,
            details: "dusty",
          },
        ];
        function getWorld(key) {
          return WORLDS.find(function (w) {
            return w.key === key;
          });
        }

        /* ═══════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════ */
        const H_MUZZLE = 2.0;
        const VIEWPORT_W = 500;
        const VIEWPORT_H = 260;
        const V_MIN = 10;
        const MASS_MIN = 0.5,
          MASS_MAX = 20;
        const MIN_ARROW_PX = 60,
          MAX_ARROW_PX = 180;
        const CANNON_MARGIN_X = 80,
          CANNON_MARGIN_Y = 60;
        const ARC_SAMPLES = 150;
        const TARGET_W = 10;
        const TARGET_H = 10;

        /* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
        const state = {
          lang: navigator.language?.startsWith("pl") ? "pl" : "en",
          mode: "explore",
          world1: "earth",
          world2: "none",

          speed: 50,
          angle: 45,
          mass: 5.0,

          // Frozen at launch
          launchSpeed: 50,
          launchAngle: 45,
          launchMass: 5.0,
          launchG1: 9.81,
          launchG2: 0,
          launchWorld2: "none",

          phase: "idle",
          simTime: 0,

          forecast1: null,
          forecast2: null,

          camScale: 1,

          dragMode: null,
          dragAccumX: 0,
          dragAccumY: 0,
          shiftHeld: false,
          precisionMode: false,
          fineDrag: false,

          gameTarget: null,
          gameResult: null,
          missHintKey: "",

          recoilT: 0,
          flashT: 0,
          particles: [],

          bgStars: [],
          animTime: 0,
        };

        /* ═══════════════════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════════════════ */
        function clamp(v, lo, hi) {
          return Math.max(lo, Math.min(hi, v));
        }
        function _lerp(a, b, t) {
          return a + (b - a) * t;
        }
        function fmt(v, d) {
          return v.toFixed(d === undefined ? 1 : d);
        }
        function fmtInt(v) {
          return Math.round(v).toString();
        }

        /* ═══════════════════════════════════════════════════════════
   PHYSICS
   ═══════════════════════════════════════════════════════════ */
        function makeForecast(v0, angleDeg, g, m) {
          const theta = (angleDeg * Math.PI) / 180;
          const vx0 = v0 * Math.cos(theta);
          const vy0 = v0 * Math.sin(theta);
          const disc = Math.max(0, vy0 * vy0 + 2 * g * H_MUZZLE);
          const tHit = (vy0 + Math.sqrt(disc)) / g;
          const tApex = vy0 / g;
          const maxHeight = H_MUZZLE + (vy0 * vy0) / (2 * g);
          const range = vx0 * tHit;
          const arcPoints = [];
          for (let i = 0; i <= ARC_SAMPLES; i++) {
            const t = (i / ARC_SAMPLES) * tHit;
            arcPoints.push({
              x: vx0 * t,
              y: H_MUZZLE + vy0 * t - 0.5 * g * t * t,
            });
          }
          return {
            vx0: vx0,
            vy0: vy0,
            tHit: tHit,
            tApex: tApex,
            maxHeight: maxHeight,
            range: range,
            arcPoints: arcPoints,
            weight: m * g,
            momentum: m * v0,
            kineticEnergy: 0.5 * m * v0 * v0,
          };
        }

        function computeForecasts() {
          const v0 = clamp(state.speed, V_MIN, getActiveVMax());
          const m = clamp(state.mass, MASS_MIN, MASS_MAX);
          const w1 = getWorld(state.world1);
          state.forecast1 = makeForecast(v0, state.angle, w1.g, m);
          if (state.world2 !== "none") {
            const w2 = getWorld(state.world2);
            state.forecast2 = makeForecast(v0, state.angle, w2.g, m);
          } else {
            state.forecast2 = null;
          }
        }

        function computeMaxRangeAtSpeed(v0, g) {
          let maxR = 0;
          for (let a = 0; a <= 90; a += 0.5) {
            const theta = (a * Math.PI) / 180;
            const vx0 = v0 * Math.cos(theta);
            const vy0 = v0 * Math.sin(theta);
            const disc = Math.max(0, vy0 * vy0 + 2 * g * H_MUZZLE);
            const tHit = (vy0 + Math.sqrt(disc)) / g;
            const r = vx0 * tHit;
            if (r > maxR) maxR = r;
          }
          return maxR;
        }

        function computeWorldVMax(g) {
          let lo = V_MIN,
            hi = 200;
          for (let i = 0; i < 50; i++) {
            const mid = (lo + hi) / 2;
            if (computeMaxRangeAtSpeed(mid, g) < VIEWPORT_W) lo = mid;
            else hi = mid;
          }
          return Math.floor((lo + hi) / 2);
        }

        // Active vMax = min of both selected worlds' vMax
        function getActiveVMax() {
          const v1 = getWorld(state.world1).vMax;
          if (state.world2 !== "none") {
            const v2 = getWorld(state.world2).vMax;
            return Math.min(v1, v2);
          }
          return v1;
        }

        function ballPos(t, g) {
          const theta = (state.launchAngle * Math.PI) / 180;
          const v0 = state.launchSpeed;
          const vx0 = v0 * Math.cos(theta);
          const vy0 = v0 * Math.sin(theta);
          return {
            x: vx0 * t,
            y: Math.max(0, H_MUZZLE + vy0 * t - 0.5 * g * t * t),
          };
        }

        function ballPosRaw(t, g) {
          const theta = (state.launchAngle * Math.PI) / 180;
          const v0 = state.launchSpeed;
          const vx0 = v0 * Math.cos(theta);
          const vy0 = v0 * Math.sin(theta);
          return { x: vx0 * t, y: H_MUZZLE + vy0 * t - 0.5 * g * t * t };
        }

        function tHitFor(g) {
          const theta = (state.launchAngle * Math.PI) / 180;
          const vy0 = state.launchSpeed * Math.sin(theta);
          const disc = Math.max(0, vy0 * vy0 + 2 * g * H_MUZZLE);
          return (vy0 + Math.sqrt(disc)) / g;
        }

        function solveRange(v0, angleDeg, g) {
          const theta = (angleDeg * Math.PI) / 180;
          const vx0 = v0 * Math.cos(theta);
          const vy0 = v0 * Math.sin(theta);
          const disc = Math.max(0, vy0 * vy0 + 2 * g * H_MUZZLE);
          const tH = (vy0 + Math.sqrt(disc)) / g;
          return vx0 * tH;
        }

        /* ═══════════════════════════════════════════════════════════
   MODE & GAME
   ═══════════════════════════════════════════════════════════ */
        function setMode(m) {
          state.mode = m;
          state.gameResult = null;
          document
            .getElementById("modeExploreBtn")
            .classList.toggle("active", m === "explore");
          document
            .getElementById("modeTargetBtn")
            .classList.toggle("active", m === "target");
          document.getElementById("grpNewTarget").style.display =
            m === "target" ? "" : "none";
          // In game mode, force world2 off and hide its dropdown
          document.getElementById("grpWorld2").style.display =
            m === "target" ? "none" : "";
          if (m === "target") {
            state.world2 = "none";
            document.getElementById("world2Select").value = "none";
            updateSwatches();
          }
          if (m === "target" && !state.gameTarget) generateTarget();
          syncSpeedSlider();
          resetSim();
          updateInfo();
        }

        function generateTarget() {
          const w1 = getWorld(state.world1);
          const maxR = computeMaxRangeAtSpeed(w1.vMax, w1.g);
          const minX = maxR * 0.15;
          const maxX = maxR * 0.85;
          state.gameTarget = { x: minX + Math.random() * (maxX - minX), y: 0 };
          state.gameResult = null;
          state.missHintKey = "";
        }

        function newTarget() {
          generateTarget();
          resetSim();
        }

        function checkHitSegment(t0, t1) {
          if (!state.gameTarget) return false;
          const tgt = state.gameTarget.x;
          const halfW = TARGET_W / 2;
          const steps = Math.max(4, Math.ceil((t1 - t0) * 120));
          for (let i = 0; i <= steps; i++) {
            const t = t0 + (t1 - t0) * (i / steps);
            const p = ballPosRaw(t, state.launchG1);
            if (Math.abs(p.x - tgt) < halfW && p.y >= 0 && p.y < TARGET_H)
              return true;
          }
          return false;
        }

        function checkHitAtLanding() {
          if (!state.gameTarget) return false;
          const tHit = tHitFor(state.launchG1);
          const landX = ballPosRaw(tHit, state.launchG1).x;
          return Math.abs(landX - state.gameTarget.x) < TARGET_W / 2;
        }

        function evaluateShot() {
          if (state.mode !== "target" || !state.gameTarget) return;
          const tH = tHitFor(state.launchG1);
          const hit =
            checkHitAtLanding() || checkHitSegment(Math.max(0, tH - 0.2), tH);
          if (hit) {
            state.gameResult = "hit";
            showOverlay("hit");
            return;
          }
          state.gameResult = "miss";
          const tgt = state.gameTarget.x;
          const g = state.launchG1;
          const v0 = state.launchSpeed;
          const a0 = state.launchAngle;
          const vMax = getWorld(state.world1).vMax;
          const curR = solveRange(v0, a0, g);
          const cands = [
            { key: "hintAngleUp", r: solveRange(v0, Math.min(90, a0 + 5), g) },
            { key: "hintAngleDown", r: solveRange(v0, Math.max(0, a0 - 5), g) },
            {
              key: "hintMoreSpeed",
              r: solveRange(Math.min(vMax, v0 + 5), a0, g),
            },
            {
              key: "hintLessSpeed",
              r: solveRange(Math.max(V_MIN, v0 - 5), a0, g),
            },
          ];
          let bestKey = "hintMass",
            bestDist = Math.abs(curR - tgt);
          for (let i = 0; i < cands.length; i++) {
            const d = Math.abs(cands[i].r - tgt);
            if (d < bestDist) {
              bestDist = d;
              bestKey = cands[i].key;
            }
          }
          state.missHintKey = bestKey;
          showOverlay("miss");
        }

        function showOverlay(type) {
          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();
          const div = document.createElement("div");
          div.className = "result-overlay";
          div.style.background =
            type === "hit" ? "rgba(42,157,143,0.88)" : "rgba(239,71,111,0.85)";

          const emojiDiv = document.createElement("div");
          emojiDiv.className = "overlay-emoji";
          emojiDiv.textContent =
            type === "hit" ? "\uD83C\uDFAF" : "\uD83D\uDCA8";
          div.appendChild(emojiDiv);

          const msgDiv = document.createElement("div");
          msgDiv.className = "overlay-msg";
          msgDiv.textContent = type === "hit" ? T("hitSuccess") : T("missMsg");
          div.appendChild(msgDiv);

          const hintDiv = document.createElement("div");
          hintDiv.className = "overlay-hint";
          let hintText = "";
          if (type === "miss" && state.missHintKey) {
            hintText = T(state.missHintKey) + "\n";
          }
          hintText += T("clickToDismiss");
          hintDiv.textContent = hintText;
          div.appendChild(hintDiv);

          div.addEventListener("click", function () {
            div.remove();
          });
          document.body.appendChild(div);
        }

        /* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
   ═══════════════════════════════════════════════════════════ */
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let W = 100,
          H = 100;

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          W = rect.width;
          H = rect.height;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener("resize", resize);

        /* ═══════════════════════════════════════════════════════════
   SCENE RENDERING (game mode only)
   ═══════════════════════════════════════════════════════════ */
        function initStars() {
          state.bgStars = [];
          for (let i = 0; i < 100; i++) {
            state.bgStars.push({
              x: Math.random(),
              y: Math.random() * 0.85,
              r: 0.4 + Math.random() * 1.2,
              a: 0.3 + Math.random() * 0.7,
            });
          }
        }

        function drawThemedSky(world, groundY) {
          const grad = ctx.createLinearGradient(0, 0, 0, groundY);
          grad.addColorStop(0, world.sky[0]);
          grad.addColorStop(1, world.sky[1]);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, groundY);
          if (world.stars) {
            state.bgStars.forEach(function (s) {
              ctx.beginPath();
              ctx.arc(s.x * W, s.y * groundY, s.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
              ctx.fill();
            });
          }
          if (world.clouds) {
            const t = state.animTime * 0.003;
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = "#fff";
            for (let i = 0; i < 4; i++) {
              const cx = ((t * (8 + i * 3) + i * 250) % (W + 200)) - 100;
              const cy = groundY * (0.15 + i * 0.12);
              const rw = 60 + i * 20,
                rh = 18 + i * 5;
              ctx.beginPath();
              ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.ellipse(
                cx + rw * 0.5,
                cy - rh * 0.3,
                rw * 0.7,
                rh * 0.8,
                0,
                0,
                Math.PI * 2,
              );
              ctx.fill();
            }
            ctx.restore();
          }
          if (world.haze) {
            ctx.save();
            ctx.globalAlpha = 0.08;
            ctx.fillStyle = "#e8c060";
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
          }
        }

        function drawThemedGround(world, groundY) {
          const grad = ctx.createLinearGradient(0, groundY, 0, H);
          grad.addColorStop(0, world.ground[0]);
          grad.addColorStop(1, world.ground[1]);
          ctx.fillStyle = grad;
          ctx.fillRect(0, groundY, W, H - groundY);
          ctx.beginPath();
          ctx.moveTo(0, groundY);
          ctx.lineTo(W, groundY);
          ctx.strokeStyle = "rgba(0,0,0,0.15)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        /* ═══════════════════════════════════════════════════════════
   GRID RENDERING (explore mode)
   ═══════════════════════════════════════════════════════════ */
        function drawGrid(sc, groundY) {
          // Background
          ctx.fillStyle = "#f8f6f1";
          ctx.fillRect(0, 0, W, H);

          // Pick grid spacing
          const candidates = [5, 10, 20, 50, 100, 200];
          let gridM = 50;
          for (let i = 0; i < candidates.length; i++) {
            if (candidates[i] * sc >= 25 && candidates[i] * sc <= 120) {
              gridM = candidates[i];
              break;
            }
          }
          const gridPx = gridM * sc;

          // Vertical lines
          ctx.strokeStyle = "rgba(0,0,0,0.06)";
          ctx.lineWidth = 1;
          for (let x = CANNON_MARGIN_X; x < W; x += gridPx) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, groundY);
            ctx.stroke();
          }
          // Horizontal lines
          for (let y = groundY; y > 0; y -= gridPx) {
            ctx.beginPath();
            ctx.moveTo(CANNON_MARGIN_X, y);
            ctx.lineTo(W, y);
            ctx.stroke();
          }

          // Labels
          ctx.font = '9px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(0,0,0,0.25)";
          ctx.textAlign = "center";
          let labelIdx = 0;
          for (let x2 = CANNON_MARGIN_X + gridPx; x2 < W - 20; x2 += gridPx) {
            labelIdx++;
            ctx.fillText(labelIdx * gridM + "m", x2, groundY + 12);
          }
          ctx.textAlign = "right";
          labelIdx = 0;
          for (let y2 = groundY - gridPx; y2 > 10; y2 -= gridPx) {
            labelIdx++;
            ctx.fillText(labelIdx * gridM + "m", CANNON_MARGIN_X - 6, y2 + 3);
          }

          // Ground line
          ctx.strokeStyle = "rgba(0,0,0,0.15)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, groundY);
          ctx.lineTo(W, groundY);
          ctx.stroke();

          // Ground fill
          ctx.fillStyle = "#eee8dd";
          ctx.fillRect(0, groundY, W, H - groundY);
        }

        /* ═══════════════════════════════════════════════════════════
   CANNON RENDERING
   ═══════════════════════════════════════════════════════════ */
        const BARREL_LEN = 40,
          BARREL_W = 10,
          CARRIAGE_W = 28,
          CARRIAGE_H = 20;

        function getCannonPivot(groundY) {
          return { x: CANNON_MARGIN_X, y: groundY - CARRIAGE_H };
        }

        function getMuzzleTip(groundY, angleDeg) {
          const p = getCannonPivot(groundY);
          const ang = (angleDeg * Math.PI) / 180;
          const len = BARREL_LEN - state.recoilT * 6;
          return { x: p.x + Math.cos(ang) * len, y: p.y - Math.sin(ang) * len };
        }

        function drawCannon(groundY, angleDeg) {
          const ang = (angleDeg * Math.PI) / 180;
          const recoil = state.recoilT * 6;
          const pivot = getCannonPivot(groundY);
          const topHalf = CARRIAGE_W * 0.35,
            botHalf = CARRIAGE_W * 0.55;
          ctx.fillStyle = "#3a5a6a";
          ctx.beginPath();
          ctx.moveTo(pivot.x - botHalf, groundY);
          ctx.lineTo(pivot.x - topHalf, pivot.y);
          ctx.lineTo(pivot.x + topHalf, pivot.y);
          ctx.lineTo(pivot.x + botHalf, groundY);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.07)";
          ctx.beginPath();
          ctx.moveTo(pivot.x - botHalf + 3, groundY - 2);
          ctx.lineTo(pivot.x - topHalf + 2, pivot.y + 2);
          ctx.lineTo(pivot.x + topHalf - 2, pivot.y + 2);
          ctx.lineTo(pivot.x + botHalf - 3, groundY - 2);
          ctx.closePath();
          ctx.fill();
          const barrelLen = BARREL_LEN - recoil;
          ctx.save();
          ctx.translate(pivot.x, pivot.y);
          ctx.rotate(-ang);
          ctx.fillStyle = "#264653";
          ctx.beginPath();
          ctx.moveTo(-6, -BARREL_W / 2);
          ctx.lineTo(barrelLen, -BARREL_W / 2 - 1);
          ctx.lineTo(barrelLen + 2, 0);
          ctx.lineTo(barrelLen, BARREL_W / 2 + 1);
          ctx.lineTo(-6, BARREL_W / 2);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.1)";
          ctx.fillRect(0, -BARREL_W / 2, barrelLen - 2, BARREL_W * 0.3);
          ctx.strokeStyle = "#1a3640";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(barrelLen - 2, -BARREL_W / 2 - 2);
          ctx.lineTo(barrelLen - 2, BARREL_W / 2 + 2);
          ctx.stroke();
          ctx.restore();
          ctx.beginPath();
          ctx.arc(pivot.x, pivot.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = "#1a3640";
          ctx.fill();
          if (state.flashT > 0) {
            const tip = getMuzzleTip(groundY, angleDeg);
            const flashR = state.flashT * 22;
            const grad = ctx.createRadialGradient(
              tip.x,
              tip.y,
              0,
              tip.x,
              tip.y,
              flashR,
            );
            grad.addColorStop(0, "rgba(255,200,50," + state.flashT * 0.8 + ")");
            grad.addColorStop(
              0.5,
              "rgba(255,120,30," + state.flashT * 0.4 + ")",
            );
            grad.addColorStop(1, "rgba(255,80,20,0)");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(tip.x, tip.y, flashR, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        /* ═══════════════════════════════════════════════════════════
   DRAWING - MAIN
   ═══════════════════════════════════════════════════════════ */
        function drawScene() {
          ctx.clearRect(0, 0, W, H);

          const w1 = getWorld(state.world1);
          if (!w1 || !state.forecast1) return;

          // Camera: fixed viewport
          const availW = W - CANNON_MARGIN_X - 20;
          const availH = H - CANNON_MARGIN_Y - 20;
          if (availW > 0 && availH > 0) {
            state.camScale = Math.min(availW / VIEWPORT_W, availH / VIEWPORT_H);
          }
          const sc = state.camScale;
          function tx(x) {
            return CANNON_MARGIN_X + x * sc;
          }
          function ty(y) {
            return H - CANNON_MARGIN_Y - y * sc;
          }
          const groundY = ty(0);

          // Background
          if (state.mode === "target") {
            drawThemedSky(w1, groundY);
            drawThemedGround(w1, groundY);
          } else {
            drawGrid(sc, groundY);
          }

          const cannonAngle =
            state.phase === "idle" ? state.angle : state.launchAngle;

          // Forecast arcs (explore idle only)
          if (
            (state.phase === "idle" || state.phase === "resolved") &&
            state.mode !== "target"
          ) {
            drawArc(state.forecast1.arcPoints, w1.color, 2.5, false, tx, ty);
            if (state.forecast2) {
              const w2 = getWorld(state.world2);
              drawArc(state.forecast2.arcPoints, w2.color, 2.5, false, tx, ty);
              // World labels at arc ends
              drawArcLabel(state.forecast1, w1, tx, ty);
              drawArcLabel(state.forecast2, w2, tx, ty);
            }
          }
          // Forecast arc in game mode (not shown - too easy)
          // Single world explore without comparison: show dashed arc
          if (
            (state.phase === "idle" || state.phase === "resolved") &&
            state.mode !== "target" &&
            !state.forecast2
          ) {
            // Already drawn above as solid; let's make it dashed for single world
          }

          // Target (game mode)
          if (state.mode === "target" && state.gameTarget) {
            drawTarget(tx, ty, groundY, sc);
          }

          // Cannon
          drawCannon(groundY, cannonAngle);

          // Velocity arrow (idle)
          if (state.phase === "idle") {
            const muzzle = getMuzzleTip(groundY, state.angle);
            drawVelocityArrow(muzzle.x, muzzle.y);
          }

          // Flying balls
          if (state.phase === "flying" || state.phase === "paused") {
            const tH1 = tHitFor(state.launchG1);
            const t1 = Math.min(state.simTime, tH1);
            drawFlyingBall(
              t1,
              state.launchG1,
              w1.color,
              w1.ballFill,
              tx,
              ty,
              groundY,
            );

            if (state.launchWorld2 !== "none") {
              const w2g = getWorld(state.launchWorld2);
              const tH2 = tHitFor(state.launchG2);
              const t2 = Math.min(state.simTime, tH2);
              drawFlyingBall(
                t2,
                state.launchG2,
                w2g.color,
                w2g.ballFill,
                tx,
                ty,
                groundY,
              );
            }
          }

          // Resolved balls at landing
          if (state.phase === "resolved") {
            const tH1r = tHitFor(state.launchG1);
            drawLandedBall(tH1r, state.launchG1, w1.ballFill, tx, ty, groundY);
            if (state.launchWorld2 !== "none") {
              const w2r = getWorld(state.launchWorld2);
              const tH2r = tHitFor(state.launchG2);
              drawLandedBall(
                tH2r,
                state.launchG2,
                w2r.ballFill,
                tx,
                ty,
                groundY,
              );
            }
          }

          // Particles
          state.particles.forEach(function (p) {
            ctx.beginPath();
            ctx.arc(
              tx(p.x),
              ty(p.y),
              p.r * (p.life / p.maxLife),
              0,
              Math.PI * 2,
            );
            ctx.fillStyle =
              "rgba(" + p.color + "," + (0.6 * p.life) / p.maxLife + ")";
            ctx.fill();
          });

          // Scale bar
          drawScaleBar(groundY, sc);
        }

        function drawArc(pts, color, lw, dashed, tx, ty) {
          ctx.save();
          if (dashed) ctx.setLineDash([5, 4]);
          ctx.strokeStyle = color;
          ctx.lineWidth = lw;
          ctx.lineCap = "round";
          ctx.beginPath();
          pts.forEach(function (p, i) {
            if (i === 0) ctx.moveTo(tx(p.x), ty(p.y));
            else ctx.lineTo(tx(p.x), ty(p.y));
          });
          ctx.stroke();
          if (dashed) ctx.setLineDash([]);
          ctx.restore();
        }

        function drawArcLabel(forecast, world, tx, ty) {
          const endPt = forecast.arcPoints[forecast.arcPoints.length - 1];
          const lx = tx(endPt.x) + 4;
          const ly = ty(endPt.y) - 8;
          ctx.font = '700 11px "Share Tech Mono", monospace';
          ctx.fillStyle = world.color;
          ctx.textAlign = "left";
          ctx.textBaseline = "bottom";
          ctx.fillText(T(world.key), lx, ly);
          ctx.font = '9px "Share Tech Mono", monospace';
          ctx.fillText(fmt(forecast.range) + "m", lx, ly + 11);
        }

        function drawFlyingBall(t, g, strokeCol, fillCol, tx, ty, groundY) {
          const pos = ballPos(t, g);
          const bsx = tx(pos.x),
            bsy = ty(pos.y);

          // Trail
          for (let i = 15; i >= 1; i--) {
            const tt = t - i * 0.04;
            if (tt < 0) continue;
            const tp = ballPos(tt, g);
            ctx.beginPath();
            ctx.arc(tx(tp.x), ty(tp.y), 2.5 * (1 - i / 15), 0, Math.PI * 2);
            ctx.fillStyle = strokeCol
              .replace(")", "," + 0.3 * (1 - i / 15) + ")")
              .replace("rgb", "rgba");
            // Fallback for hex colors
            ctx.globalAlpha = 0.3 * (1 - i / 15);
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

          // Shadow
          const maxH =
            H_MUZZLE +
            (state.launchSpeed *
              Math.sin((state.launchAngle * Math.PI) / 180)) **
              2 /
              (2 * g);
          const hRatio = clamp(pos.y / Math.max(1, maxH), 0, 1);
          ctx.save();
          ctx.globalAlpha = 0.2 * (1 - hRatio * 0.6);
          ctx.fillStyle = "rgba(32,40,52,0.7)";
          ctx.beginPath();
          ctx.ellipse(
            tx(pos.x),
            groundY,
            8 + hRatio * 6,
            2.5 + hRatio * 1.5,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.restore();

          // Ball
          const ballR =
            5 + Math.sqrt(clamp(state.launchMass, MASS_MIN, MASS_MAX)) * 1.2;
          ctx.beginPath();
          ctx.arc(bsx, bsy, ballR, 0, Math.PI * 2);
          ctx.fillStyle = fillCol;
          ctx.fill();
          ctx.strokeStyle = strokeCol;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        function drawLandedBall(tHit, g, fillCol, tx, ty, groundY) {
          const pos = ballPos(tHit, g);
          const ballR =
            5 + Math.sqrt(clamp(state.launchMass, MASS_MIN, MASS_MAX)) * 1.2;
          ctx.beginPath();
          ctx.arc(tx(pos.x), groundY - ballR, ballR, 0, Math.PI * 2);
          ctx.fillStyle = fillCol;
          ctx.fill();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = "#555";
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        function drawTarget(tx, ty, groundY, sc) {
          const tgtSX = tx(state.gameTarget.x);
          const halfW = (TARGET_W / 2) * sc;
          const tgtH = TARGET_H * sc;
          const minR = 4,
            minPole = 16;
          const r3 = Math.max(minR * 3, halfW * 0.9);
          const r2 = Math.max(minR * 2, halfW * 0.6);
          const r1 = Math.max(minR, halfW * 0.3);
          const poleH = Math.max(minPole, tgtH * 0.7);
          const flagW = Math.max(8, halfW * 0.7);
          const flagH = Math.max(4, poleH * 0.2);
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = "#ef476f";
          ctx.beginPath();
          ctx.arc(tgtSX, groundY - r3 * 0.3, r3, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(tgtSX, groundY - r3 * 0.3, r2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.fillStyle = "#ef476f";
          ctx.beginPath();
          ctx.arc(tgtSX, groundY - r3 * 0.3, r1, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(tgtSX, groundY);
          ctx.lineTo(tgtSX, groundY - poleH);
          ctx.strokeStyle = "#ef476f";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(tgtSX, groundY - poleH);
          ctx.lineTo(tgtSX + flagW, groundY - poleH + flagH * 0.5);
          ctx.lineTo(tgtSX, groundY - poleH + flagH);
          ctx.closePath();
          ctx.fillStyle = "#ef476f";
          ctx.fill();
        }

        function drawScaleBar(groundY, sc) {
          const candidates = [1, 2, 5, 10, 20, 50, 100, 200, 500];
          let scaleDist = 100;
          for (let i = 0; i < candidates.length; i++) {
            if (candidates[i] * sc >= 30 && candidates[i] * sc <= 150) {
              scaleDist = candidates[i];
              break;
            }
          }
          const barPx = scaleDist * sc;
          const bx = W - 20 - barPx,
            by = groundY + 16;
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + barPx, by);
          ctx.moveTo(bx, by - 3);
          ctx.lineTo(bx, by + 3);
          ctx.moveTo(bx + barPx, by - 3);
          ctx.lineTo(bx + barPx, by + 3);
          ctx.strokeStyle = "rgba(0,0,0,0.3)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.font = '10px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(0,0,0,0.4)";
          ctx.textAlign = "center";
          ctx.fillText(scaleDist + " m", bx + barPx / 2, by + 13);
        }

        /* ═══════════════════════════════════════════════════════════
   VELOCITY ARROW
   ═══════════════════════════════════════════════════════════ */
        function recomputeFineDrag() {
          state.fineDrag = state.precisionMode || state.shiftHeld;
        }
        function updatePrecisionUI() {
          document
            .getElementById("precisionBtn")
            .classList.toggle("active", state.fineDrag);
        }
        function togglePrecision() {
          state.precisionMode = !state.precisionMode;
          recomputeFineDrag();
          updatePrecisionUI();
        }

        function drawVelocityArrow(mx, my) {
          const ang = (state.angle * Math.PI) / 180;
          const vMax = getActiveVMax();
          const arrowLen =
            MIN_ARROW_PX +
            ((state.speed - V_MIN) * (MAX_ARROW_PX - MIN_ARROW_PX)) /
              (vMax - V_MIN);
          const tipX = mx + Math.cos(ang) * arrowLen;
          const tipY = my - Math.sin(ang) * arrowLen;
          const headAngle = Math.atan2(tipY - my, tipX - mx);
          const HEAD_SIZE = 16;
          const shaftColor = state.fineDrag
            ? "#2a9d8f"
            : state.dragMode === "arrow"
              ? "#5a9eff"
              : "#3a86ff";

          if (state.dragMode === "arrow") {
            const pivot = getCannonPivot(H - CANNON_MARGIN_Y);
            ctx.save();
            ctx.setLineDash([3, 5]);
            ctx.strokeStyle = "rgba(58,134,255,0.18)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(
              pivot.x,
              pivot.y,
              BARREL_LEN + arrowLen,
              -Math.PI / 2,
              0,
              false,
            );
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          }

          const shaftEndX = tipX - (HEAD_SIZE - 1) * Math.cos(headAngle);
          const shaftEndY = tipY - (HEAD_SIZE - 1) * Math.sin(headAngle);
          ctx.strokeStyle = shaftColor;
          ctx.lineWidth = 3;
          ctx.lineCap = "butt";
          ctx.beginPath();
          ctx.moveTo(mx, my);
          ctx.lineTo(shaftEndX, shaftEndY);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(mx, my, 4, 0, Math.PI * 2);
          ctx.fillStyle = shaftColor;
          ctx.fill();
          ctx.fillStyle = shaftColor;
          ctx.beginPath();
          ctx.moveTo(tipX, tipY);
          ctx.lineTo(
            tipX - HEAD_SIZE * Math.cos(headAngle - 0.4),
            tipY - HEAD_SIZE * Math.sin(headAngle - 0.4),
          );
          ctx.lineTo(
            tipX - HEAD_SIZE * Math.cos(headAngle + 0.4),
            tipY - HEAD_SIZE * Math.sin(headAngle + 0.4),
          );
          ctx.closePath();
          ctx.fill();

          // Labels
          const nx = -(tipY - my),
            ny = tipX - mx;
          const nLen = Math.sqrt(nx * nx + ny * ny) || 1;
          const offX = (-nx / nLen) * 28,
            offY = (-ny / nLen) * 28;
          const s1 = 0.35,
            s2 = 0.6;
          const spX = mx + (tipX - mx) * s1 + offX,
            spY = my + (tipY - my) * s1 + offY;
          const anX = mx + (tipX - mx) * s2 + offX,
            anY = my + (tipY - my) * s2 + offY;
          ctx.font = '700 13px "Share Tech Mono", monospace';
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const speedTxt = fmtInt(state.speed) + " m/s";
          const angleTxt = fmtInt(state.angle) + "\u00B0";
          const pillColor = "rgba(255,255,255,0.6)";
          const labelColor = "#3a86ff";
          function drawPill(cx, cy, text) {
            const tw = ctx.measureText(text).width,
              hw = tw / 2 + 5,
              hh = 9;
            ctx.fillStyle = pillColor;
            ctx.beginPath();
            ctx.moveTo(cx - hw + 3, cy - hh);
            ctx.arcTo(cx + hw, cy - hh, cx + hw, cy + hh, 3);
            ctx.arcTo(cx + hw, cy + hh, cx - hw, cy + hh, 3);
            ctx.arcTo(cx - hw, cy + hh, cx - hw, cy - hh, 3);
            ctx.arcTo(cx - hw, cy - hh, cx + hw, cy - hh, 3);
            ctx.closePath();
            ctx.fill();
          }
          drawPill(spX, spY, speedTxt);
          drawPill(anX, anY, angleTxt);
          ctx.fillStyle = labelColor;
          ctx.fillText(speedTxt, spX, spY);
          ctx.fillText(angleTxt, anX, anY);
        }

        /* ═══════════════════════════════════════════════════════════
   ANIMATION
   ═══════════════════════════════════════════════════════════ */
        let lastTime = 0;
        let rafId = 0;

        function animate(timestamp) {
          if (!lastTime) lastTime = timestamp;
          const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
          lastTime = timestamp;
          state.animTime = timestamp;

          if (state.phase === "flying") {
            const tH1 = tHitFor(state.launchG1);
            let maxTHit = tH1;
            if (state.launchWorld2 !== "none") {
              const tH2 = tHitFor(state.launchG2);
              maxTHit = Math.max(tH1, tH2);
            }

            const prevT = state.simTime;
            state.simTime = Math.min(state.simTime + dt, maxTHit);

            // Game mode hit check (world1 only)
            if (
              state.mode === "target" &&
              state.gameTarget &&
              !state.gameResult
            ) {
              if (checkHitSegment(prevT, Math.min(state.simTime, tH1))) {
                state.simTime = maxTHit;
                state.phase = "resolved";
                onLanding();
                evaluateShot();
              }
            }

            if (state.simTime >= maxTHit) {
              state.simTime = maxTHit;
              state.phase = "resolved";
              onLanding();
              if (state.mode === "target" && !state.gameResult) evaluateShot();
            }
          }

          if (state.recoilT > 0.005) state.recoilT *= 0.85;
          else state.recoilT = 0;
          if (state.flashT > 0.005) state.flashT -= dt * 8;
          else state.flashT = 0;

          state.particles = state.particles.filter(function (p) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy -= 3 * dt;
            p.life -= dt;
            return p.life > 0;
          });

          drawScene();
          updateButtons();
          rafId = requestAnimationFrame(animate);
        }

        function launch() {
          if (state.phase === "flying" || state.phase === "paused") return;
          state.launchSpeed = state.speed;
          state.launchAngle = state.angle;
          state.launchMass = state.mass;
          state.launchG1 = getWorld(state.world1).g;
          state.launchWorld2 = state.world2;
          state.launchG2 =
            state.world2 !== "none" ? getWorld(state.world2).g : 0;
          state.simTime = 0;
          state.phase = "flying";
          state.gameResult = null;
          state.recoilT = 1;
          state.flashT = 1;
          state.particles = [];
          const tH1 = tHitFor(state.launchG1);
          if (!isFinite(tH1) || tH1 <= 0) {
            state.phase = "idle";
            return;
          }
        }

        function togglePause() {
          if (state.phase === "flying") {
            state.phase = "paused";
          } else if (state.phase === "paused") {
            state.phase = "flying";
            lastTime = 0;
          }
        }

        function resetSim() {
          state.phase = "idle";
          state.simTime = 0;
          state.gameResult = null;
          state.particles = [];
          state.recoilT = 0;
          state.flashT = 0;
          computeForecasts();
          updateReadouts();
        }

        function onLanding() {
          const pos = ballPos(tHitFor(state.launchG1), state.launchG1);
          const w1 = getWorld(state.world1);
          const gc = w1.ground[0];
          const r = parseInt(gc.slice(1, 3), 16),
            g = parseInt(gc.slice(3, 5), 16),
            b = parseInt(gc.slice(5, 7), 16);
          for (let i = 0; i < 8; i++) {
            state.particles.push({
              x: pos.x + (Math.random() - 0.5) * 4,
              y: 0.5 + Math.random() * 2,
              vx: (Math.random() - 0.5) * 12,
              vy: 2 + Math.random() * 6,
              r: 2 + Math.random() * 2.5,
              life: 0.25 + Math.random() * 0.3,
              maxLife: 0.55,
              color: r + "," + g + "," + b,
            });
          }
        }

        function updateButtons() {
          const flying = state.phase === "flying";
          const paused = state.phase === "paused";
          const dc = flying || paused;
          document.getElementById("launchBtn").disabled = dc;
          document.getElementById("launchBtn").textContent = T("launch");
          document.getElementById("pauseBtn").style.display = dc ? "" : "none";
          document.getElementById("pauseBtn").textContent = paused
            ? T("resume")
            : T("pause");
          document.getElementById("speedSlider").disabled = dc;
          document.getElementById("angleSlider").disabled = dc;
          document.getElementById("massSlider").disabled = dc;
          document.getElementById("stepSpeedDown").disabled = dc;
          document.getElementById("stepSpeedUp").disabled = dc;
          document.getElementById("stepAngleDown").disabled = dc;
          document.getElementById("stepAngleUp").disabled = dc;
          document.getElementById("stepMassDown").disabled = dc;
          document.getElementById("stepMassUp").disabled = dc;
          document.getElementById("world1Select").disabled = dc;
          document.getElementById("world2Select").disabled = dc;
        }

        /* ═══════════════════════════════════════════════════════════
   DRAG INTERACTION
   ═══════════════════════════════════════════════════════════ */
        function getCanvasPos(e) {
          const rect = canvas.getBoundingClientRect();
          const src = e.touches ? e.touches[0] : e;
          return { x: src.clientX - rect.left, y: src.clientY - rect.top };
        }

        function getMuzzleScreen() {
          return getMuzzleTip(H - CANNON_MARGIN_Y, state.angle);
        }

        function getArrowTip() {
          const m = getMuzzleScreen();
          const ang = (state.angle * Math.PI) / 180;
          const vMax = getActiveVMax();
          const arrowLen =
            MIN_ARROW_PX +
            ((state.speed - V_MIN) * (MAX_ARROW_PX - MIN_ARROW_PX)) /
              (vMax - V_MIN);
          return {
            x: m.x + Math.cos(ang) * arrowLen,
            y: m.y - Math.sin(ang) * arrowLen,
          };
        }

        function isNearArrowTip(pos) {
          const tip = getArrowTip();
          const dx = pos.x - tip.x,
            dy = pos.y - tip.y;
          return dx * dx + dy * dy < 25 * 25;
        }

        function isNearArrowShaft(pos) {
          const m = getMuzzleScreen(),
            tip = getArrowTip();
          const ax = tip.x - m.x,
            ay = tip.y - m.y;
          const bx = pos.x - m.x,
            by = pos.y - m.y;
          const lenSq = ax * ax + ay * ay;
          if (lenSq === 0) return false;
          const t = clamp((ax * bx + ay * by) / lenSq, 0, 1);
          const px = m.x + ax * t,
            py = m.y + ay * t;
          const dx = pos.x - px,
            dy = pos.y - py;
          return dx * dx + dy * dy < 20 * 20;
        }

        function startDrag(pos) {
          if (state.phase !== "idle") return;
          if (isNearArrowTip(pos) || isNearArrowShaft(pos)) {
            state.dragMode = "arrow";
            const tip = getArrowTip();
            state.dragAccumX = tip.x;
            state.dragAccumY = tip.y;
            canvas.classList.add("dragging");
          }
        }

        function handleDrag(pos, prevPos) {
          if (state.dragMode !== "arrow") return;
          const scale = state.precisionMode || state.shiftHeld ? 0.125 : 1.0;
          state.dragAccumX += (pos.x - prevPos.x) * scale;
          state.dragAccumY += (pos.y - prevPos.y) * scale;
          const pivot = getCannonPivot(H - CANNON_MARGIN_Y);
          const dx = state.dragAccumX - pivot.x;
          const dy = -(state.dragAccumY - pivot.y);
          const totalDist = Math.sqrt(dx * dx + dy * dy);
          if (totalDist < 10) return;
          let rawAngle = (Math.atan2(dy, dx) * 180) / Math.PI;
          rawAngle = clamp(Math.round(rawAngle), 0, 90);
          const vMax = getActiveVMax();
          const arrowDist = totalDist - BARREL_LEN;
          let speed =
            V_MIN +
            (arrowDist * (vMax - V_MIN)) / (MAX_ARROW_PX - MIN_ARROW_PX);
          speed = clamp(Math.round(speed), V_MIN, vMax);
          state.speed = speed;
          state.angle = rawAngle;
          document.getElementById("speedSlider").value = speed;
          document.getElementById("speedVal").textContent = speed;
          document.getElementById("angleSlider").value = rawAngle;
          document.getElementById("angleVal").textContent = rawAngle + "\u00B0";
          computeForecasts();
          updateReadouts();
        }

        function endDrag() {
          state.dragMode = null;
          canvas.classList.remove("dragging");
        }

        let lastPointerPos = null;
        canvas.addEventListener("mousedown", function (e) {
          const p = getCanvasPos(e);
          lastPointerPos = p;
          startDrag(p);
        });
        canvas.addEventListener("mousemove", function (e) {
          const p = getCanvasPos(e);
          if (state.dragMode) {
            handleDrag(p, lastPointerPos || p);
          } else if (state.phase === "idle") {
            if (isNearArrowTip(p) || isNearArrowShaft(p))
              canvas.classList.add("hover-arrow");
            else canvas.classList.remove("hover-arrow");
          }
          lastPointerPos = p;
        });
        canvas.addEventListener("mouseup", function () {
          endDrag();
          lastPointerPos = null;
        });
        canvas.addEventListener("mouseleave", function () {
          endDrag();
          lastPointerPos = null;
          canvas.classList.remove("hover-arrow");
        });
        canvas.addEventListener(
          "touchstart",
          function (e) {
            e.preventDefault();
            const p = getCanvasPos(e);
            lastPointerPos = p;
            startDrag(p);
          },
          { passive: false },
        );
        canvas.addEventListener(
          "touchmove",
          function (e) {
            e.preventDefault();
            const p = getCanvasPos(e);
            if (state.dragMode) handleDrag(p, lastPointerPos || p);
            lastPointerPos = p;
          },
          { passive: false },
        );
        canvas.addEventListener(
          "touchend",
          function (e) {
            e.preventDefault();
            endDrag();
            lastPointerPos = null;
          },
          { passive: false },
        );
        canvas.addEventListener("touchcancel", function () {
          endDrag();
          lastPointerPos = null;
        });
        window.addEventListener("keydown", function (e) {
          if (e.key === "Shift") {
            state.shiftHeld = true;
            recomputeFineDrag();
            updatePrecisionUI();
          }
        });
        window.addEventListener("keyup", function (e) {
          if (e.key === "Shift") {
            state.shiftHeld = false;
            recomputeFineDrag();
            updatePrecisionUI();
          }
        });

        /* ═══════════════════════════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════════════════════════ */
        function stepSlider(sliderId, delta) {
          const slider = document.getElementById(sliderId);
          const min = +slider.min,
            max = +slider.max,
            step = +slider.step;
          let val = +slider.value + delta;
          val = Math.round(val / step) * step;
          val = Math.max(min, Math.min(max, val));
          val = Math.round(val * 1000) / 1000;
          slider.value = val;
          slider.dispatchEvent(new Event("input"));
        }

        document
          .getElementById("speedSlider")
          .addEventListener("input", function (e) {
            state.speed = +e.target.value;
            document.getElementById("speedVal").textContent = fmtInt(
              state.speed,
            );
            computeForecasts();
            updateReadouts();
          });

        document
          .getElementById("angleSlider")
          .addEventListener("input", function (e) {
            state.angle = +e.target.value;
            document.getElementById("angleVal").textContent =
              fmtInt(state.angle) + "\u00B0";
            computeForecasts();
            updateReadouts();
          });

        document
          .getElementById("massSlider")
          .addEventListener("input", function (e) {
            state.mass = +e.target.value;
            document.getElementById("massVal").textContent =
              fmt(state.mass) + " kg";
            computeForecasts();
            updateReadouts();
            document.getElementById("massNote").textContent = T("massNote");
          });

        function syncSpeedSlider() {
          const vMax = getActiveVMax();
          const slider = document.getElementById("speedSlider");
          slider.max = vMax;
          state.speed = Math.min(state.speed, vMax);
          slider.value = state.speed;
          document.getElementById("speedVal").textContent = fmtInt(state.speed);
        }

        function populateWorldSelects() {
          const sel1 = document.getElementById("world1Select");
          const sel2 = document.getElementById("world2Select");
          while (sel1.firstChild) sel1.removeChild(sel1.firstChild);
          while (sel2.firstChild) sel2.removeChild(sel2.firstChild);
          const noneOpt = document.createElement("option");
          noneOpt.value = "none";
          noneOpt.textContent = T("none");
          sel2.appendChild(noneOpt);
          WORLDS.forEach(function (w) {
            const o1 = document.createElement("option");
            o1.value = w.key;
            o1.textContent = T(w.key);
            if (w.key === state.world1) o1.selected = true;
            sel1.appendChild(o1);
            const o2 = document.createElement("option");
            o2.value = w.key;
            o2.textContent = T(w.key);
            if (w.key === state.world2) o2.selected = true;
            sel2.appendChild(o2);
          });
        }

        function updateSwatches() {
          const w1 = getWorld(state.world1);
          document.getElementById("swatch1").style.background = w1
            ? w1.color
            : "#ccc";
          if (state.world2 !== "none") {
            const w2 = getWorld(state.world2);
            document.getElementById("swatch2").style.background = w2
              ? w2.color
              : "#ccc";
          } else {
            document.getElementById("swatch2").style.background = "#ddd";
          }
        }

        document
          .getElementById("world1Select")
          .addEventListener("change", function (e) {
            state.world1 = e.target.value;
            updateSwatches();
            syncSpeedSlider();
            if (state.mode === "target") generateTarget();
            resetSim();
            updateInfo();
          });

        document
          .getElementById("world2Select")
          .addEventListener("change", function (e) {
            state.world2 = e.target.value;
            updateSwatches();
            syncSpeedSlider();
            resetSim();
            updateInfo();
          });

        /* ═══════════════════════════════════════════════════════════
   READOUTS
   ═══════════════════════════════════════════════════════════ */
        function updateReadouts() {
          const f1 = state.forecast1;
          if (!f1) return;
          const w1 = getWorld(state.world1);

          // Gravity: show both if comparing
          let gText = fmt(w1.g, 2) + " m/s\u00B2";
          if (state.forecast2) {
            const w2 = getWorld(state.world2);
            gText += "  /  " + fmt(w2.g, 2);
          }
          document.getElementById("valGravity").textContent = gText;

          document.getElementById("valLaunchSpeed").textContent =
            fmt(state.speed) + " m/s";
          document.getElementById("valLaunchAngle").textContent =
            fmtInt(state.angle) + "\u00B0";

          // Flight: show comparison if world2 active
          const f2 = state.forecast2;
          document.getElementById("valTFlight").textContent =
            fmt(f1.tHit, 2) + " s" + (f2 ? "  /  " + fmt(f2.tHit, 2) : "");
          document.getElementById("valMaxH").textContent =
            fmt(f1.maxHeight) + " m" + (f2 ? "  /  " + fmt(f2.maxHeight) : "");
          document.getElementById("valRange").textContent =
            fmt(f1.range) + " m" + (f2 ? "  /  " + fmt(f2.range) : "");

          document.getElementById("valMass").textContent =
            fmt(state.mass) + " kg";
          document.getElementById("valWeight").textContent =
            fmt(f1.weight) + " N" + (f2 ? "  /  " + fmt(f2.weight) : "");
          document.getElementById("valMomentum").textContent =
            fmt(f1.momentum) + " kg\u00B7m/s";
          const ke = f1.kineticEnergy;
          document.getElementById("valKE").textContent =
            ke >= 1000 ? fmt(ke / 1000) + " kJ" : fmt(ke) + " J";
        }

        /* ═══════════════════════════════════════════════════════════
   INFO TEXT
   ═══════════════════════════════════════════════════════════ */
        function updateInfo() {
          const infoEl = document.getElementById("infoText");
          while (infoEl.firstChild) infoEl.removeChild(infoEl.firstChild);

          const mainText =
            state.mode === "explore" ? T("infoExplore") : T("infoTarget");
          const paragraphs = mainText.split("\n\n");
          paragraphs.forEach(function (para, idx) {
            if (idx > 0) {
              infoEl.appendChild(document.createElement("br"));
              infoEl.appendChild(document.createElement("br"));
            }
            infoEl.appendChild(document.createTextNode(para));
          });

          infoEl.appendChild(document.createElement("br"));
          infoEl.appendChild(document.createElement("br"));
          const em = document.createElement("em");
          em.className = "info-simplified";
          em.textContent = T("simplified");
          infoEl.appendChild(em);
        }

        /* ═══════════════════════════════════════════════════════════
   I18N FUNCTIONS
   ═══════════════════════════════════════════════════════════ */
        function applyTranslations() {
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          document.getElementById("langBtn").textContent =
            state.lang === "en" ? "PL" : "EN";
          document.getElementById("lblMode").textContent = T("mode");
          document.getElementById("modeExploreBtn").textContent = T("explore");
          document.getElementById("modeTargetBtn").textContent = T("hitTarget");
          document.getElementById("lblWorld1").textContent = T("world1");
          document.getElementById("lblWorld2").textContent = T("world2");
          document.getElementById("lblSpeed").textContent = T("speed");
          document.getElementById("lblAngle").textContent = T("angle");
          document.getElementById("lblMass").textContent = T("mass");
          document.getElementById("launchBtn").textContent = T("launch");
          document.getElementById("resetBtn").textContent = T("reset");
          document.getElementById("newTargetBtn").textContent = T("newTarget");
          document.getElementById("precisionBtn").textContent = T("precision");
          document.getElementById("lblSectTrajectory").textContent =
            T("sectTrajectory");
          document.getElementById("lblSectFlight").textContent =
            T("sectFlight");
          document.getElementById("lblSectMass").textContent = T("sectMass");
          document.getElementById("lblGravity").textContent = T("gravity");
          document.getElementById("lblLaunchSpeed").textContent =
            T("launchSpeed");
          document.getElementById("lblLaunchAngle").textContent =
            T("launchAngle");
          document.getElementById("lblTFlight").textContent = T("tFlight");
          document.getElementById("lblMaxH").textContent = T("maxH");
          document.getElementById("lblRange").textContent = T("range");
          document.getElementById("lblMassVal").textContent = T("massVal");
          document.getElementById("lblWeight").textContent = T("weight");
          document.getElementById("lblMomentum").textContent = T("momentum");
          document.getElementById("lblKE").textContent = T("kineticEnergy");
          populateWorldSelects();
          updateSwatches();
          updateReadouts();
          updateInfo();
        }

        function toggleLang() {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        }

        /* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
        WORLDS.forEach(function (w) {
          w.vMax = computeWorldVMax(w.g);
        });
        initStars();
        resize();
        syncSpeedSlider();
        computeForecasts();
        applyTranslations();

        // Event listeners for buttons (no inline onclick)
        document
          .getElementById("langBtn")
          .addEventListener("click", toggleLang);
        document
          .getElementById("modeExploreBtn")
          .addEventListener("click", function () {
            setMode("explore");
          });
        document
          .getElementById("modeTargetBtn")
          .addEventListener("click", function () {
            setMode("target");
          });
        document
          .getElementById("stepSpeedDown")
          .addEventListener("click", function () {
            stepSlider("speedSlider", -5);
          });
        document
          .getElementById("stepSpeedUp")
          .addEventListener("click", function () {
            stepSlider("speedSlider", 5);
          });
        document
          .getElementById("stepAngleDown")
          .addEventListener("click", function () {
            stepSlider("angleSlider", -5);
          });
        document
          .getElementById("stepAngleUp")
          .addEventListener("click", function () {
            stepSlider("angleSlider", 5);
          });
        document
          .getElementById("stepMassDown")
          .addEventListener("click", function () {
            stepSlider("massSlider", -0.5);
          });
        document
          .getElementById("stepMassUp")
          .addEventListener("click", function () {
            stepSlider("massSlider", 0.5);
          });
        document
          .getElementById("precisionBtn")
          .addEventListener("click", togglePrecision);
        document.getElementById("launchBtn").addEventListener("click", launch);
        document
          .getElementById("pauseBtn")
          .addEventListener("click", togglePause);
        document.getElementById("resetBtn").addEventListener("click", resetSim);
        document
          .getElementById("newTargetBtn")
          .addEventListener("click", function () {
            newTarget();
          });

        rafId = requestAnimationFrame(animate);

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            cancelAnimationFrame(rafId);
            lastTime = 0;
          } else {
            lastTime = 0;
            rafId = requestAnimationFrame(animate);
          }
        });
      })();
    </script>
  </body>
</html>
