<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Planet Cannon: compare projectile trajectories across different worlds to see how gravity shapes the path."
    />
    <title>Planet Cannon</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fafaf7;
        --panel: #ffffff;
        --panel-border: #e0ddd6;
        --text: #37474f;
        --text-head: #263238;
        --text-dim: #78909c;
        --text-label: #90a4ae;
        --accent: #e76f51;
        --accent-light: #fff1ec;
        --canvas-bg: #f5f3ee;
        --cannon-color: #264653;
        --target-color: #ef476f;
        --success-color: #2a9d8f;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #fafaf7 0%, #f0ede6 100%);
        font-family: "Outfit", sans-serif;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }
      header {
        padding: 6px 28px 5px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-head);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      header h1 a {
        color: inherit;
        text-decoration: none;
      }
      header h1 a:hover {
        opacity: 0.7;
      }
      header p {
        margin-top: 1px;
        font-size: 12px;
        color: var(--text-dim);
      }
      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .main {
        display: flex;
        height: calc(100vh - 46px);
      }
      .canvas-wrap {
        flex: 1;
        position: relative;
        min-width: 0;
        background: var(--canvas-bg);
        border-right: 1px solid var(--panel-border);
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: default;
      }
      canvas.dragging {
        cursor: grabbing;
      }
      canvas.hover-arrow {
        cursor: grab;
      }
      .header-emoji {
        font-size: 18px;
        line-height: 1;
      }
      .panel {
        width: 300px;
        flex-shrink: 0;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .controls {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        border-bottom: 1px solid var(--panel-border);
      }
      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .section-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-label);
        padding-bottom: 2px;
        border-bottom: 1px solid var(--panel-border);
      }
      .ctrl-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-label);
      }
      .type-toggle {
        display: flex;
        gap: 6px;
      }
      .type-btn {
        flex: 1;
        padding: 8px 4px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
      }
      .type-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }
      .type-btn:hover {
        background: #f0ede6;
      }
      .type-btn:disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .world-select {
        width: 100%;
        padding: 7px 10px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        outline: none;
        transition: border-color 0.15s;
      }
      .world-select:focus {
        border-color: var(--accent);
      }
      .world-select:disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .world-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .world-row .world-select {
        flex: 1;
      }
      .world-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 1.5px solid rgba(0, 0, 0, 0.15);
      }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .slider-row input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        background: #e0ddd6;
        border-radius: 3px;
        outline: none;
        box-shadow: none;
        touch-action: none;
      }
      .slider-row input[type="range"]:focus-visible {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .slider-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }
      .slider-row input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }
      .slider-row input[type="range"]:disabled {
        opacity: 0.4;
      }
      .slider-val {
        min-width: 44px;
        text-align: right;
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }
      .step-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        touch-action: manipulation;
      }
      .step-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .step-btn:active {
        background: var(--accent);
        color: #fff;
      }
      .step-btn:disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .fire-btn {
        padding: 12px 4px;
        font-size: 14px;
        font-weight: 600;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
      }
      .fire-btn:hover {
        filter: brightness(1.1);
      }
      .fire-btn:active {
        transform: scale(0.97);
      }
      .fire-btn:disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .btn-row {
        display: flex;
        gap: 8px;
      }
      .readouts {
        padding: 12px 20px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        border-bottom: 1px solid var(--panel-border);
      }
      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 1px 0;
      }
      .readout-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
      }
      .readout-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }
      .readout-compare {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-dim);
        margin-left: 6px;
      }
      .mass-note {
        font-size: 11px;
        color: var(--success-color);
        font-style: italic;
        font-family: "Share Tech Mono", monospace;
        margin-top: 4px;
      }
      .info {
        padding: 12px 20px;
        flex: 1;
      }
      .info-text {
        font-size: 13px;
        color: #546e7a;
        line-height: 1.6;
      }
      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
      }
      .overlay-emoji {
        font-size: 72px;
        animation: overlayPop 0.4s ease;
      }
      .overlay-msg {
        font-family: "Outfit", sans-serif;
        font-size: 24px;
        font-weight: 700;
        margin-top: 16px;
        color: #fff;
      }
      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.6);
      }
      #precisionBtn {
        width: 100%;
      }
      #launchBtn {
        flex: 2;
      }
      #pauseBtn {
        flex: 1;
        display: none;
      }
      #resetBtn {
        flex: 1;
      }
      #grpNewTarget {
        display: none;
      }
      #newTargetBtn {
        width: 100%;
      }
      .section-label-gap {
        margin-top: 6px;
      }
      .info-simplified {
        font-size: 11px;
        color: var(--text-dim);
      }
      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes overlayPop {
        0% {
          transform: scale(0.3);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .result-overlay {
          animation: none;
        }
        .overlay-emoji {
          animation: none;
        }
      }
      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: calc(100vh - 46px);
        }
        .canvas-wrap {
          min-height: 320px;
          height: 50vh;
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
        }
        .panel {
          width: 100%;
        }
        .controls {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 12px;
          padding: 12px 16px;
        }
        .ctrl-group {
          min-width: 120px;
          flex: 1;
        }
        .btn-row {
          min-width: 100%;
        }
        .readouts {
          padding: 10px 16px;
        }
        .info {
          padding: 10px 16px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/"><span class="header-emoji">&#x1F4A3;</span></a>
          <span id="titleText">Planet Cannon</span>
        </h1>
        <p id="subtitleText">
          Compare trajectories across worlds to see how gravity shapes the path.
        </p>
      </div>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="canvas-wrap">
        <canvas
          id="canvas"
          aria-label="Projectile motion simulation canvas"
        ></canvas>
      </div>

      <div class="panel">
        <div class="controls">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblMode">Mode</span>
            <div class="type-toggle">
              <button type="button" class="type-btn active" id="modeExploreBtn">
                Explore
              </button>
              <button type="button" class="type-btn" id="modeTargetBtn">
                Hit the Target
              </button>
            </div>
          </div>

          <div class="ctrl-group" id="grpWorld1">
            <span class="ctrl-label" id="lblWorld1">World</span>
            <div class="world-row">
              <span class="world-swatch" id="swatch1"></span>
              <select
                class="world-select"
                id="world1Select"
                aria-label="Primary world selection"
              ></select>
            </div>
          </div>

          <div class="ctrl-group" id="grpWorld2">
            <span class="ctrl-label" id="lblWorld2">Compare with</span>
            <div class="world-row">
              <span class="world-swatch" id="swatch2"></span>
              <select
                class="world-select"
                id="world2Select"
                aria-label="Comparison world selection"
              ></select>
            </div>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblSpeed">Speed</span>
            <div class="slider-row">
              <button
                type="button"
                class="step-btn"
                id="stepSpeedDown"
                aria-label="Decrease speed"
              >
                &minus;
              </button>
              <input
                type="range"
                id="speedSlider"
                min="10"
                max="100"
                value="50"
                step="1"
                aria-label="Launch speed"
              />
              <button
                type="button"
                class="step-btn"
                id="stepSpeedUp"
                aria-label="Increase speed"
              >
                +
              </button>
              <span class="slider-val" id="speedVal">50</span>
            </div>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblAngle">Angle</span>
            <div class="slider-row">
              <button
                type="button"
                class="step-btn"
                id="stepAngleDown"
                aria-label="Decrease angle"
              >
                &minus;
              </button>
              <input
                type="range"
                id="angleSlider"
                min="0"
                max="90"
                value="45"
                step="1"
                aria-label="Launch angle"
              />
              <button
                type="button"
                class="step-btn"
                id="stepAngleUp"
                aria-label="Increase angle"
              >
                +
              </button>
              <span class="slider-val" id="angleVal">45&deg;</span>
            </div>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblMass">Mass</span>
            <div class="slider-row">
              <button
                type="button"
                class="step-btn"
                id="stepMassDown"
                aria-label="Decrease mass"
              >
                &minus;
              </button>
              <input
                type="range"
                id="massSlider"
                min="0.5"
                max="20"
                value="5"
                step="0.5"
                aria-label="Projectile mass"
              />
              <button
                type="button"
                class="step-btn"
                id="stepMassUp"
                aria-label="Increase mass"
              >
                +
              </button>
              <span class="slider-val" id="massVal">5.0 kg</span>
            </div>
          </div>

          <button type="button" class="type-btn" id="precisionBtn">
            Precision (Shift)
          </button>

          <div class="btn-row">
            <button type="button" class="fire-btn" id="launchBtn">
              Launch
            </button>
            <button type="button" class="type-btn" id="pauseBtn">Pause</button>
            <button type="button" class="type-btn" id="resetBtn">Reset</button>
          </div>

          <div class="ctrl-group" id="grpNewTarget">
            <button type="button" class="type-btn" id="newTargetBtn">
              New Target
            </button>
          </div>
        </div>

        <div class="readouts" id="readoutsPanel">
          <span class="section-label" id="lblSectTrajectory">TRAJECTORY</span>
          <div class="readout-row">
            <span class="readout-label" id="lblGravity">Gravity</span
            ><span class="readout-val" id="valGravity">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblLaunchSpeed">Speed</span
            ><span class="readout-val" id="valLaunchSpeed">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblLaunchAngle">Angle</span
            ><span class="readout-val" id="valLaunchAngle">&mdash;</span>
          </div>

          <span class="section-label section-label-gap" id="lblSectFlight"
            >FLIGHT</span
          >
          <div class="readout-row">
            <span class="readout-label" id="lblTFlight">Flight time</span
            ><span class="readout-val" id="valTFlight">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblMaxH">Max height</span
            ><span class="readout-val" id="valMaxH">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblRange">Range</span
            ><span class="readout-val" id="valRange">&mdash;</span>
          </div>

          <span class="section-label section-label-gap" id="lblSectMass"
            >MASS EFFECTS</span
          >
          <div class="readout-row">
            <span class="readout-label" id="lblMassVal">Mass</span
            ><span class="readout-val" id="valMass">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblWeight">Weight</span
            ><span class="readout-val" id="valWeight">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblMomentum">Momentum</span
            ><span class="readout-val" id="valMomentum">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblKE">Kinetic energy</span
            ><span class="readout-val" id="valKE">&mdash;</span>
          </div>
          <div class="mass-note" id="massNote"></div>
        </div>

        <div class="info">
          <div class="info-text" id="infoText"></div>
        </div>
      </div>
    </main>

    <script>
      (function () {

            hintAngleDown: "Spr\u00f3buj mniejszego k\u0105ta.",
            hintMoreSpeed: "Spr\u00f3buj wi\u0119kszej pr\u0119dko\u015bci.",
            hintLessSpeed: "Spr\u00f3buj mniejszej pr\u0119dko\u015bci.",
            hintMass: "Zmiana masy nie zmienia toru lotu.",
            clickToDismiss: "Kliknij, aby kontynuowa\u0107",
            infoExplore:
              "Symulator ruchu pocisku.\n\nPrzeci\u0105gnij strza\u0142k\u0119, aby wycelowa\u0107, wybierz jeden lub dwa \u015bwiaty i strzelaj! Obserwuj, jak ten sam strza\u0142 zachowuje si\u0119 przy r\u00f3\u017cnej grawitacji.\n\nZmie\u0144 mas\u0119: tor jest taki sam, ale ci\u0119\u017car i p\u0119d si\u0119 zmieniaj\u0105.",
            infoTarget:
              "Dostosuj pr\u0119dko\u015b\u0107 i k\u0105t, aby trafi\u0107 w cel. Zmiana samej masy nie pomo\u017ce \u2014 tor pozostaje taki sam!",
            simplified:
              "Model uproszczony: brak oporu powietrza, rotacji i krzywizny planety.",
          },
        };
        function T(k) {
          return I18N[state.lang][k] || k;
        }

        /* ═══════════════════════════════════════════════════════════
   WORLD DATA
   ═══════════════════════════════════════════════════════════ */
        const WORLDS = [
          {
            key: "moon",
            g: 1.62,
            color: "#8a8a8a",
            ballFill: "#b0b0b0",
            sky: ["#000000", "#0a0a12"],
            ground: ["#9a9a9a", "#6a6a6a"],
            stars: true,
            clouds: false,
            haze: false,
            details: "craters",
          },
          {
            key: "mercury",
            g: 3.7,
            color: "#a07848",
            ballFill: "#c09858",
            sky: ["#080604", "#1a1210"],
            ground: ["#8b7355", "#5c4a35"],
            stars: true,
            clouds: false,
            haze: false,
            details: "rocks",
          },
          {
            key: "venus",
            g: 8.87,
            color: "#c8963e",
            ballFill: "#d4a855",
            sky: ["#d4a855", "#c8963e"],
            ground: ["#c8a060", "#a07830"],

          },
          {
