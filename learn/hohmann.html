<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f18;
    --panel: #131825;
    --panel-border: #1e2a3a;
    --text: #c9d1d9;
    --text-dim: #6e7a8a;
    --accent: #58a6ff;
    --gain: #3fb950;
    --loss: #f97583;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
  }

  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .header-text { flex: 1; }
  header h1 { font-size: 22px; font-weight: 700; }
  header h1 a { color: inherit; text-decoration: none; }
  header h1 a:hover { opacity: .7; }
  header p { margin-top: 4px; font-size: 13px; color: var(--text-dim); }

  .lang-btn {
    background: none; border: 1px solid var(--panel-border);
    border-radius: 4px; padding: 3px 8px;
    cursor: pointer; flex-shrink: 0;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    transition: border-color 0.15s, color 0.15s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  .main { display: flex; height: calc(100vh - 80px); }

  .canvas-wrap {
    flex: 1; position: relative;
    background: #080c14; min-width: 0;
  }
  .canvas-wrap canvas { width: 100%; height: 100%; display: block; }

  .controls {
    width: 300px; flex-shrink: 0;
    padding: 20px;
    border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column; gap: 18px;
    overflow-y: auto;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim);
  }

  .type-toggle { display: flex; gap: 6px; }
  .type-btn {
    padding: 10px 4px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s; text-align: center;
    flex: 1;
  }
  .type-btn:hover { border-color: var(--accent); }
  .type-btn.active { border-color: var(--accent); color: var(--accent); }
  .type-btn.full-width { flex: none; width: 100%; }

  .planet-select {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; outline: none;
  }
  .planet-select:focus { border-color: var(--accent); }
  .planet-select option { background: var(--panel); color: var(--text); }

  .readouts { gap: 6px; }
  .readout-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .readout-label { color: var(--text-dim); }
  .readout-val { color: var(--text); }

  /* Engine button */
  .engine-btn {
    width: 100%; height: 56px; border-radius: 8px;
    border: 2px solid var(--panel-border);
    background: var(--panel); color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .engine-btn.armed {
    border-color: var(--accent); color: var(--accent);
    animation: pulseEngine 1.5s ease-in-out infinite;
  }
  .engine-btn.firing {
    border-color: var(--gain); color: var(--gain);
    background: rgba(63,185,80,0.12);
    animation: none;
  }
  .engine-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
    animation: none;
  }
  @keyframes pulseEngine {
    0%, 100% { box-shadow: 0 0 0 0 rgba(88,166,255,0); }
    50% { box-shadow: 0 0 12px 4px rgba(88,166,255,0.3); }
  }

  /* Burn meter */
  .burn-meter-wrap { position: relative; width: 100%; height: 14px; }
  .burn-meter {
    width: 100%; height: 8px; margin-top: 3px;
    background: var(--panel-border); border-radius: 4px; overflow: hidden;
    position: relative;
  }
  .burn-fill {
    height: 100%; width: 0%;
    background: var(--accent); border-radius: 4px;
    transition: background 0.15s;
  }
  .burn-fill.over { background: var(--loss); }
  .burn-fill.good { background: var(--gain); }
  .burn-target {
    position: absolute; top: 0; height: 100%;
    border-left: 2px solid var(--gain);
    border-right: 2px solid var(--gain);
    background: rgba(63,185,80,0.12);
    pointer-events: none;
  }

  /* Play/Pause icon toggle */
  #playBtn { display: flex; align-items: center; justify-content: center; }
  #playBtn .pause-icon { display: none; }
  #playBtn.playing .play-icon { display: none; }
  #playBtn.playing .pause-icon { display: block; }

  .info-text {
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
  }

  /* Inset */
  .inset-wrap {
    position: absolute; left: 12px; bottom: 12px;
    width: 150px; height: 150px;
    border: 1px solid var(--panel-border);
    border-radius: 8px; overflow: hidden;
    pointer-events: none;
  }
  .inset-wrap canvas { width: 100%; height: 100%; display: block; }

  /* Result overlay */
  .result-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    animation: overlayFadeIn 0.3s ease;
  }
  .overlay-emoji { font-size: 72px; animation: overlayPop 0.4s ease; }
  .overlay-msg {
    font-family: 'Outfit', sans-serif;
    font-size: 24px; font-weight: 700;
    margin-top: 16px; color: #fff;
  }
  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px; margin-top: 8px; color: rgba(255,255,255,0.85);
  }
  .overlay-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; margin-top: 12px; color: rgba(255,255,255,0.5);
  }

  @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes overlayPop {
    0% { transform: scale(0.3); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .canvas-wrap { min-height: 350px; flex: 1; }
    .controls {
      width: 100%; flex-direction: row; flex-wrap: wrap;
      border-left: none; border-top: 1px solid var(--panel-border);
      padding: 12px 16px; gap: 12px;
    }
    .ctrl-group { min-width: 140px; flex: 1; }
  }

<script>
'use strict';

/* ══════════════════════════════════════════════ */
/* Constants                                      */
/* ══════════════════════════════════════════════ */

var TWO_PI = 2 * Math.PI;
var DEG2RAD = Math.PI / 180;
var MU_SUN = 4 * Math.PI * Math.PI; // AU^3/yr^2
var SIM_RATE = 1 / 15; // years per real-second at x1
var MAX_DT = 0.05; // cap real dt at 50 ms
var AU_TO_KMS = 4.7405; // 1 AU/yr in km/s (approx)

/* ══════════════════════════════════════════════ */
/* Orbital Data                                   */
/* ══════════════════════════════════════════════ */

var BODIES = [
  { key: 'sun',     color: '#FFD700', glow: '255,215,0',   radius: 14, a: 0,       e: 0,      T: 0,       pomega: 0,      L0: 0 },
  { key: 'mercury', color: '#A0A0A0', glow: '160,160,160', radius: 3,  a: 0.3871,  e: 0.2056, T: 0.2408,  pomega: 77.46,  L0: 252.25 },
  { key: 'venus',   color: '#F5DEB3', glow: '245,222,179', radius: 4,  a: 0.7233,  e: 0.0068, T: 0.6152,  pomega: 131.60, L0: 181.98 },
  { key: 'earth',   color: '#4db8ff', glow: '77,184,255',  radius: 5,  a: 1.0000,  e: 0.0167, T: 1.0000,  pomega: 102.93, L0: 100.47 },
  { key: 'mars',    color: '#E05030', glow: '224,80,48',   radius: 4,  a: 1.5237,  e: 0.0934, T: 1.8809,  pomega: 336.08, L0: 355.43 },
  { key: 'jupiter', color: '#D4944A', glow: '212,148,74',  radius: 8,  a: 5.2034,  e: 0.0484, T: 11.862,  pomega: 14.33,  L0: 34.40 },
  { key: 'saturn',  color: '#C8A84C', glow: '200,168,76',  radius: 7,  a: 9.5371,  e: 0.0542, T: 29.457,  pomega: 93.06,  L0: 49.94 },
  { key: 'uranus',  color: '#7CC8D8', glow: '124,200,216', radius: 5,  a: 19.1913, e: 0.0472, T: 84.021,  pomega: 173.00, L0: 313.23 },
  { key: 'neptune', color: '#4060C0', glow: '64,96,192',   radius: 5,  a: 30.0690, e: 0.0086, T: 164.8,   pomega: 48.12,  L0: 304.88 }
];

BODIES.forEach(function(b) {
  if (b.key === 'sun') return;
  b.pomegaRad = b.pomega * DEG2RAD;
  b.L0rad = b.L0 * DEG2RAD;
  b.n = TWO_PI / b.T;
  b.M0 = b.L0rad - b.pomegaRad;
  b.bSemi = b.a * Math.sqrt(1 - b.e * b.e);
  b.cosPom = Math.cos(b.pomegaRad);
  b.sinPom = Math.sin(b.pomegaRad);
});

var bodyByKey = {};
BODIES.forEach(function(b) { bodyByKey[b.key] = b; });

var PLANET_KEYS = ['mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'];

function getNeighbors(homeKey) {
  var idx = PLANET_KEYS.indexOf(homeKey);
  var result = [];
  if (idx > 0) result.push(PLANET_KEYS[idx - 1]);
  if (idx < PLANET_KEYS.length - 1) result.push(PLANET_KEYS[idx + 1]);
  return result;
}

/* ══════════════════════════════════════════════ */
/* I18N                                           */
/* ══════════════════════════════════════════════ */

var I18N = {

function T(key) { return I18N[state.lang][key] || key; }

/* ══════════════════════════════════════════════ */
/* State                                          */
/* ══════════════════════════════════════════════ */

var state = {
  lang: (navigator.language || '').startsWith('pl') ? 'pl' : 'en',
  homeKey: 'earth',
  destKey: 'mars',
  difficulty: 'easy',
  phase: 'prelaunch',
  simTime: 0,
  timeWarp: 1,
  playing: true,
  ref: null,
  tol: { phaseDeg: 10, burnPct: 0.15 },
  burn1: { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false },
  burn2: { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false },
  sc: { x: 0, y: 0, vx: 0, vy: 0, orbit: null, trail: [], launched: false },
  resultType: null,
  resultData: { phaseAtLaunch: 0, dv1Error: 0, dv2Error: 0 },
  launchAngle: 0,
  arrivalTime: 0,
  camera: { cx: 0, cy: 0, scale: 100, targetScale: 100 },

  insetScAngle: 0
};

/* ══════════════════════════════════════════════ */
/* Physics — Kepler Solver                        */
/* ══════════════════════════════════════════════ */

function wrapAngle(a) {
  a = a % TWO_PI;
  if (a > Math.PI) a -= TWO_PI;
  if (a < -Math.PI) a += TWO_PI;
  return a;
}

function solveKepler(M, e) {
  var m = M % TWO_PI;
  if (m > Math.PI) m -= TWO_PI;
  if (m < -Math.PI) m += TWO_PI;
  var E = m;
  for (var i = 0; i < 15; i++) {
    var dE = (E - e * Math.sin(E) - m) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-12) break;
  }
  if (isNaN(E) || !isFinite(E)) E = m;
  return E;
}

function helioPosition(body, t) {
  if (body.key === 'sun') return { x: 0, y: 0 };
  var M = body.M0 + body.n * t;
  var E = solveKepler(M, body.e);
  var xp = body.a * (Math.cos(E) - body.e);
  var yp = body.bSemi * Math.sin(E);
  return {
    x: xp * body.cosPom - yp * body.sinPom,
    y: xp * body.sinPom + yp * body.cosPom
  };
}

function helioVelocity(body, t) {
  if (body.key === 'sun') return { vx: 0, vy: 0 };
  var M = body.M0 + body.n * t;
  var E = solveKepler(M, body.e);
  var sinE = Math.sin(E);
  var cosE = Math.cos(E);
  var denom = 1 - body.e * cosE;
  var factor = body.n * body.a / denom;
  var vxp = -factor * sinE;
  var vyp = factor * (body.bSemi / body.a) * cosE;
  return {
    vx: vxp * body.cosPom - vyp * body.sinPom,
    vy: vxp * body.sinPom + vyp * body.cosPom
  };
}

/* ══════════════════════════════════════════════ */
/* Hohmann Reference Solver                       */
/* ══════════════════════════════════════════════ */

function computeHohmannRef(homeKey, destKey) {
  var home = bodyByKey[homeKey];
  var dest = bodyByKey[destKey];
  var r1 = home.a;
  var r2 = dest.a;
  var aT = (r1 + r2) / 2;
  var tT = 0.5 * Math.pow(aT, 1.5);

  var vCirc1 = Math.sqrt(MU_SUN / r1);
  var vCirc2 = Math.sqrt(MU_SUN / r2);
  var vDep = Math.sqrt(MU_SUN * (2 / r1 - 1 / aT));
  var vArr = Math.sqrt(MU_SUN * (2 / r2 - 1 / aT));
  var dv1 = Math.abs(vDep - vCirc1);
  var dv2 = Math.abs(vCirc2 - vArr);

  var n2 = TWO_PI / dest.T;
  var phi = wrapAngle(Math.PI - n2 * tT);

  var maxDv = Math.max(dv1, dv2);
  var burnRate = maxDv / 2.0;

  return {
    aTransfer: aT,
    tTransfer: tT,
    dv1: dv1,
    dv2: dv2,
    vCircHome: vCirc1,
    vCircDest: vCirc2,
    vDep: vDep,
    vArr: vArr,
    phaseAngle: phi,
    burnRate: burnRate,
    holdTime1: dv1 / burnRate,
    holdTime2: dv2 / burnRate,
    outward: dest.a > home.a
  };
}

/* ══════════════════════════════════════════════ */
/* Phase Angle                                    */
/* ══════════════════════════════════════════════ */

function currentPhaseAngle(t) {
  var hp = helioPosition(bodyByKey[state.homeKey], t);
  var dp = helioPosition(bodyByKey[state.destKey], t);
  var ha = Math.atan2(hp.y, hp.x);
  var da = Math.atan2(dp.y, dp.x);
  return wrapAngle(da - ha);
}

function phaseError(t) {
  var current = currentPhaseAngle(t);
  var ideal = state.ref.phaseAngle;
  return wrapAngle(current - ideal);
}

function isLaunchWindowOpen(t) {
  var err = Math.abs(phaseError(t));
  return err <= state.tol.phaseDeg * DEG2RAD;
}

/* ══════════════════════════════════════════════ */
/* Spacecraft Orbit from State Vector             */
/* ══════════════════════════════════════════════ */

function stateToOrbit(x, y, vx, vy, tEpoch) {
  var r = Math.sqrt(x * x + y * y);
  var v2 = vx * vx + vy * vy;
  var h = x * vy - y * vx;
  var a = 1 / (2 / r - v2 / MU_SUN);

  if (a <= 0 || isNaN(a) || !isFinite(a)) {
    a = Math.abs(a) || 1;
  }

  var rdot = (x * vx + y * vy) / r;
  var ex = (v2 / MU_SUN - 1 / r) * x - rdot / MU_SUN * r * vx;
  var ey = (v2 / MU_SUN - 1 / r) * y - rdot / MU_SUN * r * vy;
  var e = Math.sqrt(ex * ex + ey * ey);
  if (e > 0.999) e = 0.999;

  var pomegaRad = Math.atan2(ey, ex);
  var bSemi = a * Math.sqrt(1 - e * e);

  var cosNu = (ex * x + ey * y) / (e * r + 1e-30);
  var sinNu = (ex * y - ey * x) / (e * r + 1e-30);
  var nu = Math.atan2(sinNu, cosNu);

  var sinNu2 = Math.sin(nu);
  var cosNu2 = Math.cos(nu);
  var E = Math.atan2(Math.sqrt(1 - e * e) * sinNu2, e + cosNu2);
  var M0 = E - e * Math.sin(E);
  var n = Math.sqrt(MU_SUN / (a * a * a));

  return {
    a: a, e: e, pomegaRad: pomegaRad, bSemi: bSemi,
    cosPom: Math.cos(pomegaRad), sinPom: Math.sin(pomegaRad),
    n: n, M0: M0, tEpoch: tEpoch, h: h
  };
}

function orbitPositionAt(orb, t) {
  var dt = t - orb.tEpoch;
  var M = orb.M0 + orb.n * dt;
  var E = solveKepler(M, orb.e);
  var xp = orb.a * (Math.cos(E) - orb.e);
  var yp = orb.bSemi * Math.sin(E);
  return {
    x: xp * orb.cosPom - yp * orb.sinPom,
    y: xp * orb.sinPom + yp * orb.cosPom
  };
}

function orbitVelocityAt(orb, t) {
  var dt = t - orb.tEpoch;
  var M = orb.M0 + orb.n * dt;
  var E = solveKepler(M, orb.e);
  var sinE = Math.sin(E);
  var cosE = Math.cos(E);
  var denom = 1 - orb.e * cosE;
  var factor = orb.n * orb.a / denom;
  var vxp = -factor * sinE;
  var vyp = factor * (orb.bSemi / orb.a) * cosE;
  return {
    vx: vxp * orb.cosPom - vyp * orb.sinPom,
    vy: vxp * orb.sinPom + vyp * orb.cosPom
  };
}

/* ══════════════════════════════════════════════ */
/* Canvas Setup                                   */
/* ══════════════════════════════════════════════ */

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W = 0, H = 0;

var insetCanvas = document.getElementById('insetCanvas');
var ictx = insetCanvas.getContext('2d');
var iW = 150, iH = 150;

function resize() {
  var rect = canvas.parentElement.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var iRect = insetCanvas.parentElement.getBoundingClientRect();
  iW = iRect.width;
  iH = iRect.height;
  insetCanvas.width = iW * dpr;
  insetCanvas.height = iH * dpr;
  insetCanvas.style.width = iW + 'px';
  insetCanvas.style.height = iH + 'px';
  ictx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

/* ══════════════════════════════════════════════ */
/* Starfield                                      */
/* ══════════════════════════════════════════════ */

var bgStars = [];
function initBgStars(n) {
  bgStars = [];
  for (var i = 0; i < n; i++) {
    bgStars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.3,
      b: Math.random() * 0.4 + 0.2
    });
  }
}
initBgStars(200);

/* ══════════════════════════════════════════════ */
/* Camera                                         */
/* ══════════════════════════════════════════════ */

function computeAutoCamera() {
  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];
  var maxR = Math.max(home.a * (1 + home.e), dest.a * (1 + dest.e));
  var margin = maxR * 1.2;
  return { cx: 0, cy: 0, scale: Math.min(W, H) / 2 / margin };
}

function toCanvas(auX, auY) {
  return {
    cx: W / 2 + (auX - state.camera.cx) * state.camera.scale,
    cy: H / 2 - (auY - state.camera.cy) * state.camera.scale
  };
}

/* ══════════════════════════════════════════════ */
/* Drawing                                        */
/* ══════════════════════════════════════════════ */

function drawStarfield() {
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, TWO_PI);
    ctx.fillStyle = 'rgba(200,210,220,' + (s.b * 0.3) + ')';
    ctx.fill();
  }
}

function drawOrbitEllipse(body, alpha) {
  if (body.key === 'sun') return;
  var cxAu = -body.a * body.e * body.cosPom;
  var cyAu = -body.a * body.e * body.sinPom;
  var cc = toCanvas(cxAu, cyAu);
  ctx.beginPath();
  ctx.ellipse(cc.cx, cc.cy, body.a * state.camera.scale, body.bSemi * state.camera.scale, -body.pomegaRad, 0, TWO_PI);
  ctx.strokeStyle = 'rgba(' + body.glow + ',' + alpha + ')';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBody(body, t) {
  var pos = helioPosition(body, t);
  var cc = toCanvas(pos.x, pos.y);
  var r = body.radius;
  if (body.key === 'sun') {
    var grad = ctx.createRadialGradient(cc.cx, cc.cy, 0, cc.cx, cc.cy, r * 2.5);
    grad.addColorStop(0, 'rgba(' + body.glow + ',0.6)');
    grad.addColorStop(1, 'rgba(' + body.glow + ',0)');
    ctx.beginPath();
    ctx.arc(cc.cx, cc.cy, r * 2.5, 0, TWO_PI);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cc.cx, cc.cy, r, 0, TWO_PI);
  ctx.fillStyle = body.color;
  ctx.fill();

  if (body.key !== 'sun') {
    var label = T(body.key);
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(' + body.glow + ',0.7)';
    ctx.textAlign = 'center';
    ctx.fillText(label, cc.cx, cc.cy - r - 5);
  }
}

function drawTransferEllipse() {
  if (state.difficulty === 'hard' && state.phase === 'prelaunch') return;
  if (!state.ref) return;

  var ref = state.ref;
  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];
  var r1 = Math.min(home.a, dest.a);
  var r2 = Math.max(home.a, dest.a);
  var eT = (r2 - r1) / (r2 + r1);
  var aT = ref.aTransfer;
  var bT = aT * Math.sqrt(1 - eT * eT);

  var angle;
  if (state.sc.launched) {
    angle = state.launchAngle;
  } else {
    var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
    angle = Math.atan2(hp.y, hp.x);
  }

  var dir = ref.outward ? 1 : -1;
  var centerDist = aT * eT * dir;
  var ellipseCx = centerDist * Math.cos(angle);
  var ellipseCy = centerDist * Math.sin(angle);
  var cc = toCanvas(ellipseCx, ellipseCy);

  var s = state.camera.scale;
  ctx.save();
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  if (ref.outward) {
    ctx.ellipse(cc.cx, cc.cy, aT * s, bT * s, -angle, -Math.PI, 0);
  } else {
    ctx.ellipse(cc.cx, cc.cy, aT * s, bT * s, -angle, 0, Math.PI);
  }
  ctx.strokeStyle = 'rgba(88,166,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawLaunchWindowArc() {
  if (state.difficulty !== 'easy' || state.phase !== 'prelaunch') return;
  if (!state.ref) return;

  var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
  var homeAngle = Math.atan2(hp.y, hp.x);
  var idealDestAngle = homeAngle + state.ref.phaseAngle;
  var tolRad = state.tol.phaseDeg * DEG2RAD;

  var dest = bodyByKey[state.destKey];
  var rPx = dest.a * state.camera.scale;
  var cc = toCanvas(0, 0);

  ctx.beginPath();
  ctx.arc(cc.cx, cc.cy, rPx, -(idealDestAngle + tolRad), -(idealDestAngle - tolRad));
  ctx.strokeStyle = 'rgba(63,185,80,0.4)';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function drawSpacecraft() {
  if (!state.sc.launched) return;
  var cc = toCanvas(state.sc.x, state.sc.y);
  var r = 4;

  if (state.phase === 'burn1' || state.phase === 'burn2') {
    var flameR = 8 + 3 * Math.sin(Date.now() / 80);
    ctx.beginPath();
    ctx.arc(cc.cx, cc.cy, flameR, 0, TWO_PI);
    ctx.fillStyle = 'rgba(255,180,50,0.3)';
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(cc.cx, cc.cy, r, 0, TWO_PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawTrail() {
  var trail = state.sc.trail;
  if (trail.length < 2) return;
  ctx.beginPath();
  var p0 = toCanvas(trail[0].x, trail[0].y);
  ctx.moveTo(p0.cx, p0.cy);
  var step = Math.max(1, Math.floor(trail.length / 2000));
  for (var i = step; i < trail.length; i += step) {
    var p = toCanvas(trail[i].x, trail[i].y);
    ctx.lineTo(p.cx, p.cy);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawPhaseIndicator() {
  if (state.difficulty === 'hard') return;
  if (state.phase !== 'prelaunch') return;

  var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
  var dp = helioPosition(bodyByKey[state.destKey], state.simTime);
  var homeAngle = Math.atan2(hp.y, hp.x);
  var destAngle = Math.atan2(dp.y, dp.x);
  var cc = toCanvas(0, 0);
  var r = 30;

  ctx.beginPath();
  ctx.arc(cc.cx, cc.cy, r, -destAngle, -homeAngle, destAngle > homeAngle);
  ctx.strokeStyle = 'rgba(88,166,255,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  var midAngle = homeAngle + state.ref.phaseAngle;
  var mx = cc.cx + r * Math.cos(-midAngle);
  var my = cc.cy + r * Math.sin(-midAngle);
  ctx.beginPath();
  ctx.arc(mx, my, 3, 0, TWO_PI);
  ctx.fillStyle = '#3fb950';
  ctx.fill();
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, W, H);

  drawStarfield();

  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];

  drawOrbitEllipse(home, 0.25);
  drawOrbitEllipse(dest, 0.25);

  if (state.difficulty === 'easy') {
    drawTransferEllipse();
  } else if (state.difficulty === 'medium' && state.sc.launched) {
    drawTransferEllipse();
  }

  drawLaunchWindowArc();
  drawPhaseIndicator();
  drawTrail();

  drawBody(bodyByKey['sun'], state.simTime);
  drawBody(home, state.simTime);
  drawBody(dest, state.simTime);

  drawSpacecraft();
}

/* ══════════════════════════════════════════════ */
/* Inset Drawing                                  */
/* ══════════════════════════════════════════════ */

function drawInset() {
  ictx.clearRect(0, 0, iW, iH);
  ictx.fillStyle = 'rgba(8,12,20,0.9)';
  ictx.fillRect(0, 0, iW, iH);

  var cx = iW / 2, cy = iH / 2;
  var bodyKey = (state.phase === 'arrival' || state.phase === 'burn2' || (state.phase === 'result' && state.burn2.committed)) ? state.destKey : state.homeKey;
  var body = bodyByKey[bodyKey];

  ictx.beginPath();
  var grad = ictx.createRadialGradient(cx, cy, 0, cx, cy, 16);
  grad.addColorStop(0, body.color);
  grad.addColorStop(1, 'rgba(' + body.glow + ',0.1)');
  ictx.arc(cx, cy, 14, 0, TWO_PI);
  ictx.fillStyle = grad;
  ictx.fill();

  ictx.beginPath();
  ictx.arc(cx, cy, 14, 0, TWO_PI);
  ictx.fillStyle = body.color;
  ictx.fill();

  var orbitR = 40;

  if (state.phase === 'result' && state.burn2.committed) {
    var err = Math.abs(state.burn2.dvApplied - state.ref.dv2) / state.ref.dv2;
    if (err > state.tol.burnPct * 2) {
      var eccR = orbitR * (1 + err * 0.8);
      ictx.beginPath();
      ictx.ellipse(cx + 8, cy, eccR, orbitR * 0.7, 0, 0, TWO_PI);
      ictx.strokeStyle = 'rgba(249,117,131,0.5)';
      ictx.lineWidth = 1.5;
      ictx.stroke();
    } else {
      ictx.beginPath();
      ictx.arc(cx, cy, orbitR, 0, TWO_PI);
      ictx.strokeStyle = 'rgba(255,255,255,0.2)';
      ictx.lineWidth = 1;
      ictx.stroke();
    }
  } else {
    ictx.beginPath();
    ictx.arc(cx, cy, orbitR, 0, TWO_PI);
    ictx.strokeStyle = 'rgba(255,255,255,0.2)';
    ictx.lineWidth = 1;
    ictx.stroke();
  }

  var scAngle = state.insetScAngle;
  var scX = cx + orbitR * Math.cos(scAngle);
  var scY = cy - orbitR * Math.sin(scAngle);

  if (state.phase === 'burn1' || state.phase === 'burn2') {
    var flR = 5 + 2 * Math.sin(Date.now() / 80);
    ictx.beginPath();
    ictx.arc(scX, scY, flR, 0, TWO_PI);
    ictx.fillStyle = 'rgba(255,180,50,0.4)';
    ictx.fill();
  }

  ictx.beginPath();
  ictx.arc(scX, scY, 3, 0, TWO_PI);
  ictx.fillStyle = '#fff';
  ictx.fill();

  ictx.font = '9px "Share Tech Mono", monospace';
  ictx.fillStyle = 'rgba(255,255,255,0.4)';
  ictx.textAlign = 'center';
  var label = T(bodyKey);
  ictx.fillText(label, cx, iH - 6);
}

/* ══════════════════════════════════════════════ */
/* Burn Interaction                               */
/* ══════════════════════════════════════════════ */

function startBurn() {
  if (state.phase === 'prelaunch') {
    state.resultData.phaseAtLaunch = currentPhaseAngle(state.simTime);
    state.phase = 'burn1';
    state.burn1.holding = true;
    state.burn1.holdStart = performance.now();
    state.burn1.holdDuration = 0;
    state.burn1.dvApplied = 0;

    var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
    state.launchAngle = Math.atan2(hp.y, hp.x);
    state.sc.x = hp.x;
    state.sc.y = hp.y;
    state.sc.launched = true;
    state.sc.trail = [{ x: hp.x, y: hp.y }];

    updateEngineBtn();
    updateBurnMeter();
  } else if (state.phase === 'arrival') {
    state.phase = 'burn2';
    state.burn2.holding = true;
    state.burn2.holdStart = performance.now();
    state.burn2.holdDuration = 0;
    state.burn2.dvApplied = 0;
    updateEngineBtn();
    updateBurnMeter();
  }
}

function endBurn() {
  if (state.phase === 'burn1' && state.burn1.holding) {
    state.burn1.holding = false;
    state.burn1.committed = true;

    var hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
    var speed = Math.sqrt(hv.vx * hv.vx + hv.vy * hv.vy);
    var px = hv.vx / speed;
    var py = hv.vy / speed;
    var dir = state.ref.outward ? 1 : -1;
    var dvActual = state.burn1.dvApplied;

    state.sc.vx = hv.vx + dir * dvActual * px;
    state.sc.vy = hv.vy + dir * dvActual * py;

    state.sc.orbit = stateToOrbit(state.sc.x, state.sc.y, state.sc.vx, state.sc.vy, state.simTime);
    state.phase = 'cruise';

    updateEngineBtn();
    updateBurnLabel();
  } else if (state.phase === 'burn2' && state.burn2.holding) {
    state.burn2.holding = false;
    state.burn2.committed = true;
    state.phase = 'result';
    evaluateResult();
  }
}

var engineBtn = document.getElementById('engineBtn');

engineBtn.addEventListener('mousedown', function(e) {
  e.preventDefault();
  startBurn();
});
engineBtn.addEventListener('mouseup', function(e) {
  e.preventDefault();
  endBurn();
});
engineBtn.addEventListener('mouseleave', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});
engineBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startBurn();
}, { passive: false });
engineBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  endBurn();
}, { passive: false });
engineBtn.addEventListener('touchcancel', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});
window.addEventListener('blur', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});

/* ══════════════════════════════════════════════ */
/* State Transitions                              */
/* ══════════════════════════════════════════════ */

function checkArrival() {
  if (state.phase !== 'cruise') return;
  var dest = bodyByKey[state.destKey];
  var scR = Math.sqrt(state.sc.x * state.sc.x + state.sc.y * state.sc.y);
  var diff = Math.abs(scR - dest.a);
  var threshold = dest.a * 0.06;

  if (diff < threshold) {
    var dp = helioPosition(dest, state.simTime);
    var dx = state.sc.x - dp.x;
    var dy = state.sc.y - dp.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < dest.a * 0.15) {
      state.phase = 'arrival';
      state.arrivalTime = state.simTime;
      state.insetBody = 'dest';
      updateEngineBtn();
      updateBurnLabel();
      return;
    }
  }

  if (state.sc.orbit) {
    var elapsed = state.simTime - state.sc.orbit.tEpoch;
    var halfPeriod = Math.PI / state.sc.orbit.n;
    if (elapsed > halfPeriod * 1.3) {
      state.phase = 'result';
      computeMissErrors();
      state.resultType = 'miss';
      showResultOverlay();
    }
  }
}

function checkArrivalTimeout() {
  if (state.phase !== 'arrival') return;
  var elapsed = state.simTime - state.arrivalTime;
  var timeout = bodyByKey[state.destKey].T * 0.02;
  if (timeout < 0.01) timeout = 0.01;
  if (elapsed > timeout) {
    state.phase = 'result';
    computeMissErrors();
    state.resultType = 'miss';
    showResultOverlay();
  }
}

function computeMissErrors() {
  var ref = state.ref;
  var pErr = Math.abs(wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle));
  state.resultData.phaseErrDeg = pErr / DEG2RAD;
  state.resultData.dv1Error = Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
  state.resultData.dv2Error = state.burn2.committed
    ? Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2 : 1;
}

/* ══════════════════════════════════════════════ */
/* Result Evaluation                              */
/* ══════════════════════════════════════════════ */

function evaluateResult() {
  var ref = state.ref;
  var pErr = Math.abs(wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle));
  var pErrDeg = pErr / DEG2RAD;
  var dv1Err = Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
  var dv2Err = Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2;

  state.resultData.dv1Error = dv1Err;
  state.resultData.dv2Error = dv2Err;
  state.resultData.phaseErrDeg = pErrDeg;

  var pTol = state.tol.phaseDeg;
  var bTol = state.tol.burnPct;

  if (pErrDeg <= pTol && dv1Err <= bTol && dv2Err <= bTol) {
    state.resultType = 'success';
  } else if (pErrDeg <= pTol * 2.5 && dv1Err <= bTol * 2.5 && dv2Err <= bTol * 2.5) {
    state.resultType = 'close';
  } else {
    state.resultType = 'miss';
  }

  showResultOverlay();
}

function getResultHint() {
  var d = state.resultData;
  var ref = state.ref;
  var pTol = state.tol.phaseDeg;
  var bTol = state.tol.burnPct;

  if (d.phaseErrDeg > pTol) {
    var pe = wrapAngle(d.phaseAtLaunch - ref.phaseAngle);
    return T(pe > 0 ? 'hintLate' : 'hintEarly');
  }
  if (d.dv1Error > bTol) {
    return T(state.burn1.dvApplied > ref.dv1 ? 'hintBurn1Long' : 'hintBurn1Short');
  }
  if (!state.burn2.committed) {
    return T('hintNoCapture');
  }
  if (d.dv2Error > bTol) {
    return T(state.burn2.dvApplied > ref.dv2 ? 'hintBurn2Long' : 'hintBurn2Short');
  }
  return '';
}

function showResultOverlay() {
  var existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.className = 'result-overlay';

  var emoji, msg, bg;
  var result = state.resultType;
  if (result === 'success') {
    emoji = '\uD83C\uDF89'; msg = T('resultSuccess'); bg = 'rgba(63,185,80,0.88)';
  } else if (result === 'close') {
    emoji = '\uD83D\uDC4D'; msg = T('resultClose'); bg = 'rgba(88,166,255,0.88)';
  } else {
    emoji = '\uD83D\uDC4E'; msg = T('resultMiss'); bg = 'rgba(240,180,60,0.92)';
  }

  var hint = getResultHint();
  overlay.style.background = bg;
  overlay.innerHTML =
    '<div class="overlay-emoji">' + emoji + '</div>' +
    '<div class="overlay-msg">' + msg + '</div>' +
    (hint ? '<div class="overlay-sub">' + hint + '</div>' : '') +
    '<div class="overlay-hint">' + T('clickDismiss') + '</div>';

  overlay.addEventListener('click', function() {
    overlay.remove();
    resetMission();
  });
  document.body.appendChild(overlay);
}

/* ══════════════════════════════════════════════ */
/* UI Updates                                     */
/* ══════════════════════════════════════════════ */

function updateEngineBtn() {
  var btn = document.getElementById('engineBtn');
  btn.classList.remove('armed', 'firing');
  btn.disabled = false;

  if (state.phase === 'prelaunch') {
    if (isLaunchWindowOpen(state.simTime)) {
      btn.classList.add('armed');
    }
    btn.disabled = false;
  } else if (state.phase === 'burn1') {
    btn.classList.add('firing');
  } else if (state.phase === 'arrival') {
    btn.classList.add('armed');
  } else if (state.phase === 'burn2') {
    btn.classList.add('firing');
  } else {
    btn.disabled = true;
  }
}

function updateBurnLabel() {
  var lbl = document.getElementById('lblBurn');
  if (state.phase === 'arrival' || state.phase === 'burn2') {
    lbl.textContent = T('burn2');
  } else {
    lbl.textContent = T('burn1');
  }
}

function updateBurnMeter() {
  var fillEl = document.getElementById('burnFill');
  var targetEl = document.getElementById('burnTarget');
  var ref = state.ref;
  if (!ref) return;

  var maxDv = Math.max(ref.dv1, ref.dv2) * 2.5;
  var currentBurn = (state.phase === 'burn2' || state.phase === 'arrival') ? state.burn2 : state.burn1;
  var idealDv = (state.phase === 'burn2' || state.phase === 'arrival') ? ref.dv2 : ref.dv1;

  var pct = Math.min(100, (currentBurn.dvApplied / maxDv) * 100);
  fillEl.style.width = pct + '%';

  var err = Math.abs(currentBurn.dvApplied - idealDv) / idealDv;
  fillEl.classList.remove('good', 'over');
  if (currentBurn.dvApplied > 0) {
    if (err <= state.tol.burnPct) fillEl.classList.add('good');
    else if (currentBurn.dvApplied > idealDv * (1 + state.tol.burnPct)) fillEl.classList.add('over');
  }

  if (state.difficulty === 'hard') {
    targetEl.style.display = 'none';
  } else {
    targetEl.style.display = '';
    var tolPct = state.tol.burnPct;
    var left = ((idealDv * (1 - tolPct)) / maxDv) * 100;
    var right = ((idealDv * (1 + tolPct)) / maxDv) * 100;
    targetEl.style.left = left + '%';
    targetEl.style.width = (right - left) + '%';
  }
}

function updateReadouts() {
  var ref = state.ref;
  if (!ref) return;

  document.getElementById('missionVal').textContent = T(state.homeKey) + ' \u2192 ' + T(state.destKey);

  var days = ref.tTransfer * 365.25;
  if (days < 365) {
    document.getElementById('transferTimeVal').textContent = Math.round(days) + ' ' + T('days');
  } else {
    document.getElementById('transferTimeVal').textContent = ref.tTransfer.toFixed(2) + ' ' + T('years');
  }

  document.getElementById('dv1Val').textContent = (ref.dv1 * AU_TO_KMS).toFixed(2) + ' km/s';
  document.getElementById('dv2Val').textContent = (ref.dv2 * AU_TO_KMS).toFixed(2) + ' km/s';

  var pAngle = currentPhaseAngle(state.simTime);
  var pDeg = (pAngle / DEG2RAD).toFixed(1);
  var idealDeg = (ref.phaseAngle / DEG2RAD).toFixed(1);
  if (state.difficulty !== 'hard') {
    document.getElementById('phaseVal').textContent = pDeg + '\u00b0 / ' + idealDeg + '\u00b0';
  } else {
    document.getElementById('phaseVal').textContent = '\u2014';
  }

  var statusText;
  switch (state.phase) {
    case 'prelaunch':
      statusText = isLaunchWindowOpen(state.simTime) ? T('goodWindow') : T('waiting');
      break;
    case 'burn1': statusText = T('burning'); break;
    case 'cruise': statusText = T('cruising'); break;
    case 'arrival': statusText = T('readyCapture'); break;
    case 'burn2': statusText = T('burning'); break;
    case 'result':
      if (state.resultType === 'success') statusText = T('captured');
      else statusText = T('missed');
      break;
    default: statusText = '';
  }
  document.getElementById('statusVal').textContent = statusText;
}

function updatePlayBtn() {
  var btn = document.getElementById('playBtn');
  btn.classList.toggle('playing', state.playing);
  btn.title = state.playing ? T('pause') : T('play');
}

function updateWarpBtns() {
  document.getElementById('warp1Btn').classList.toggle('active', state.timeWarp === 1);
  document.getElementById('warp10Btn').classList.toggle('active', state.timeWarp === 10);
  document.getElementById('warp50Btn').classList.toggle('active', state.timeWarp === 50);
}

/* ══════════════════════════════════════════════ */
/* Controls                                       */
/* ══════════════════════════════════════════════ */

function populateHomeSelect() {
  var sel = document.getElementById('homeSelect');
  sel.innerHTML = '';
  for (var i = 0; i < PLANET_KEYS.length; i++) {
    var opt = document.createElement('option');
    opt.value = PLANET_KEYS[i];
    opt.textContent = T(PLANET_KEYS[i]);
    if (PLANET_KEYS[i] === state.homeKey) opt.selected = true;
    sel.appendChild(opt);
  }
}

function populateDestSelect() {
  var sel = document.getElementById('destSelect');
  sel.innerHTML = '';
  var neighbors = getNeighbors(state.homeKey);
  for (var i = 0; i < neighbors.length; i++) {
    var opt = document.createElement('option');
    opt.value = neighbors[i];
    opt.textContent = T(neighbors[i]);
    if (neighbors[i] === state.destKey) opt.selected = true;
    sel.appendChild(opt);
  }
  if (neighbors.indexOf(state.destKey) === -1) {
    state.destKey = neighbors[0];
    sel.value = state.destKey;
  }
}

document.getElementById('homeSelect').addEventListener('change', function(e) {
  state.homeKey = e.target.value;
  populateDestSelect();
  recalcMission();
  resetMission();
});

document.getElementById('destSelect').addEventListener('change', function(e) {
  state.destKey = e.target.value;
  recalcMission();
  resetMission();
});

function setDifficulty(d) {
  state.difficulty = d;
  document.getElementById('diffEasyBtn').classList.toggle('active', d === 'easy');
  document.getElementById('diffMediumBtn').classList.toggle('active', d === 'medium');
  document.getElementById('diffHardBtn').classList.toggle('active', d === 'hard');

  if (d === 'easy') {
    state.tol = { phaseDeg: 10, burnPct: 0.15 };
  } else if (d === 'medium') {
    state.tol = { phaseDeg: 6, burnPct: 0.09 };
  } else {
    state.tol = { phaseDeg: 3, burnPct: 0.05 };
  }
  updateBurnMeter();
  updateReadouts();
}

function setWarp(w) {
  state.timeWarp = w;
  updateWarpBtns();
}

function togglePlay() {
  state.playing = !state.playing;
  updatePlayBtn();
}

function resetMission() {
  state.phase = 'prelaunch';
  state.burn1 = { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false };
  state.burn2 = { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false };
  state.sc = { x: 0, y: 0, vx: 0, vy: 0, orbit: null, trail: [], launched: false };
  state.resultType = null;
  state.resultData = { phaseAtLaunch: 0, dv1Error: 0, dv2Error: 0, phaseErrDeg: 0 };
  state.launchAngle = 0;
  state.arrivalTime = 0;
  state.insetBody = 'home';
  state.insetScAngle = 0;
  state.playing = true;
  state.timeWarp = 1;

  var existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  updateEngineBtn();
  updateBurnLabel();
  updateBurnMeter();
  updateWarpBtns();
  updatePlayBtn();
  updateReadouts();

  document.getElementById('burnFill').style.width = '0%';
  document.getElementById('burnFill').classList.remove('good', 'over');
}

function recalcMission() {
  state.ref = computeHohmannRef(state.homeKey, state.destKey);
  var auto = computeAutoCamera();
  state.camera.targetScale = auto.scale;
  state.camera.cx = auto.cx;
  state.camera.cy = auto.cy;
  state.camera.scale = auto.scale;
  updateReadouts();
  updateBurnMeter();
}

/* ══════════════════════════════════════════════ */
/* Localization                                   */
/* ══════════════════════════════════════════════ */

function applyTranslations() {
  document.title = T('title');
  document.documentElement.lang = state.lang;
  document.getElementById('titleText').textContent = T('title');
  document.getElementById('subtitleText').textContent = T('subtitle');
  document.getElementById('lblHome').textContent = T('home');
  document.getElementById('lblDest').textContent = T('destination');
  document.getElementById('lblDifficulty').textContent = T('difficulty');
  document.getElementById('diffEasyBtn').textContent = T('easy');
  document.getElementById('diffMediumBtn').textContent = T('medium');
  document.getElementById('diffHardBtn').textContent = T('hard');
  document.getElementById('lblTimeWarp').textContent = T('timeWarp');
  document.getElementById('engineBtn').textContent = T('engine');
  document.getElementById('lblMission').textContent = T('mission');
  document.getElementById('lblTransferTime').textContent = T('transferTime');
  document.getElementById('lblDv1').textContent = T('dv1');
  document.getElementById('lblDv2').textContent = T('dv2');
  document.getElementById('lblPhase').textContent = T('phase');
  document.getElementById('lblStatus').textContent = T('status');
  document.getElementById('resetBtn').textContent = T('reset');
  document.getElementById('infoText').innerHTML = T('info');
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';

  populateHomeSelect();
  populateDestSelect();
  updateBurnLabel();
  updateReadouts();
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'pl' : 'en';
  applyTranslations();
}

/* ══════════════════════════════════════════════ */
/* Animation Loop                                 */
/* ══════════════════════════════════════════════ */

var lastTimestamp = 0;
var trailAccum = 0;

function animate(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  var dtReal = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
  lastTimestamp = timestamp;

  if (state.playing && state.phase !== 'result') {
    var dtSim;

    switch (state.phase) {
      case 'prelaunch':
        dtSim = dtReal * state.timeWarp * SIM_RATE;
        state.simTime += dtSim;
        state.insetScAngle += dtReal * 2.0;
        updateEngineBtn();
        break;

      case 'burn1':
        dtSim = dtReal * SIM_RATE;
        state.simTime += dtSim;
        if (state.burn1.holding) {
          state.burn1.holdDuration = (performance.now() - state.burn1.holdStart) / 1000;
          state.burn1.dvApplied = state.ref.burnRate * state.burn1.holdDuration;
          updateBurnMeter();
        }
        break;

      case 'cruise':
        var cruiseWarp = Math.max(1, state.ref.tTransfer / 8 / SIM_RATE);
        dtSim = dtReal * cruiseWarp * SIM_RATE;
        state.simTime += dtSim;
        if (state.sc.orbit) {
          var pos = orbitPositionAt(state.sc.orbit, state.simTime);
          state.sc.x = pos.x;
          state.sc.y = pos.y;
          trailAccum += dtSim;
          var trailInterval = state.ref.tTransfer / 500;
          if (trailInterval < 0.0001) trailInterval = 0.0001;
          while (trailAccum >= trailInterval) {
            trailAccum -= trailInterval;
            state.sc.trail.push({ x: pos.x, y: pos.y });
            if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
          }
        }
        checkArrival();
        break;

      case 'arrival':
        dtSim = dtReal * SIM_RATE;
        state.simTime += dtSim;
        if (state.sc.orbit) {
          var apos = orbitPositionAt(state.sc.orbit, state.simTime);
          state.sc.x = apos.x;
          state.sc.y = apos.y;
          state.sc.trail.push({ x: apos.x, y: apos.y });
          if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
        }
        state.insetScAngle -= dtReal * 1.5;
        checkArrivalTimeout();
        break;

      case 'burn2':
        dtSim = dtReal * SIM_RATE;
        state.simTime += dtSim;
        if (state.burn2.holding) {
          state.burn2.holdDuration = (performance.now() - state.burn2.holdStart) / 1000;
          state.burn2.dvApplied = state.ref.burnRate * state.burn2.holdDuration;
          updateBurnMeter();
        }
        break;
    }
  }

  var auto = computeAutoCamera();
  if (state.phase === 'cruise' && state.sc.launched) {
    state.camera.cx += (state.sc.x * 0.3 - state.camera.cx) * 0.03;
    state.camera.cy += (state.sc.y * 0.3 - state.camera.cy) * 0.03;
  } else {
    state.camera.cx += (auto.cx - state.camera.cx) * 0.05;
    state.camera.cy += (auto.cy - state.camera.cy) * 0.05;
  }
  state.camera.scale += (auto.scale - state.camera.scale) * 0.05;

  drawScene();
  drawInset();
  updateReadouts();

  requestAnimationFrame(animate);
}

/* ══════════════════════════════════════════════ */
/* Init                                           */
/* ══════════════════════════════════════════════ */

function init() {
  resize();
  recalcMission();
  applyTranslations();
  setDifficulty('easy');
  updatePlayBtn();
  updateWarpBtns();
  updateEngineBtn();
  updateBurnLabel();
  requestAnimationFrame(animate);
}

init();
</script>
