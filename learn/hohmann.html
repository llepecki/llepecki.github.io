  <head>

    <title>Hohmann Transfer Game</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0f18;
        --panel: #131825;
        --panel-border: #1e2a3a;
        --text: #c9d1d9;
        --text-dim: #6e7a8a;
        --accent: #58a6ff;
        --gain: #3fb950;
        --loss: #f97583;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Outfit", sans-serif;
        color: var(--text);
      }

      header {
        padding: 20px 28px 16px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      header h1 a {
        color: inherit;
        text-decoration: none;
      }
      header h1 a:hover {
        opacity: 0.7;
      }
      header p {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .main {
        display: flex;
        height: calc(100vh - 80px);
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        background: #080c14;
        min-width: 0;
      }
      .canvas-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .controls {
        width: 300px;
        flex-shrink: 0;
        padding: 20px;
        border-left: 1px solid var(--panel-border);
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
      }

      .type-toggle {
        display: flex;
        gap: 6px;
      }
      .type-btn {
        padding: 10px 4px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        flex: 1;
      }
      .type-btn:hover:not(:disabled) {
        border-color: var(--accent);
      }
      .type-btn.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .type-btn:disabled {
        opacity: 0.3;
        pointer-events: none;
      }
      .type-btn.full-width {
        flex: none;
        width: 100%;
      }

      .planet-select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        outline: none;
      }
      .planet-select:focus {
        border-color: var(--accent);
      }
      .planet-select option {
        background: var(--panel);
        color: var(--text);
      }

      .readouts {
        gap: 6px;
      }
      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
      }
      .readout-label {
        color: var(--text-dim);
      }
      .readout-val {
        color: var(--text);
      }

      /* Engine button */
      .engine-btn {
        width: 100px;
        height: 100px;
        border-radius: 20px;
        border: none;
        outline: none;
        background:
          radial-gradient(
            circle at 38% 32%,
            rgba(255, 255, 255, 0.25),
            transparent 45%
          ),
          radial-gradient(circle, #e53935 0%, #d32f2f 50%, #b71c1c 100%);
        color: transparent;
        font-size: 0;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.3),
          0 0 0 3px rgba(180, 220, 220, 0.5),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 6px 20px rgba(0, 0, 0, 0.5);
        margin: 28px auto 8px;
        display: block;
      }
      .engine-btn.armed {
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.3),
          0 0 0 3px rgba(88, 166, 255, 0.7),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 0 20px rgba(88, 166, 255, 0.3);
        animation: pulseEngine 1.5s ease-in-out infinite;
      }
      .engine-btn.firing {
        background:
          radial-gradient(
            circle at 38% 32%,
            rgba(255, 255, 255, 0.35),
            transparent 45%
          ),
          radial-gradient(circle, #ff7043 0%, #f4511e 50%, #e64a19 100%);
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.2),
          0 0 0 3px rgba(63, 185, 80, 0.7),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 0 24px rgba(255, 87, 34, 0.5);
        animation: none;
      }
      .engine-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        animation: none;
      }
      .engine-btn:active:not(:disabled) {
        transform: scale(0.96);
      }
      @keyframes pulseEngine {
        0%,
        100% {
          box-shadow:
            inset 0 -4px 6px rgba(0, 0, 0, 0.3),
            0 0 0 3px rgba(88, 166, 255, 0.7),
            0 0 0 14px #9e9e9e,
            0 0 0 16px #757575,
            0 0 0 0 rgba(88, 166, 255, 0);
        }
        50% {
          box-shadow:
            inset 0 -4px 6px rgba(0, 0, 0, 0.3),
            0 0 0 3px rgba(88, 166, 255, 0.9),
            0 0 0 14px #9e9e9e,
            0 0 0 16px #757575,
            0 0 20px 6px rgba(88, 166, 255, 0.35);
        }
      }

      /* Burn meter */
      .burn-meter-wrap {
        position: relative;
        width: 100%;
        height: 40px;
      }
      .burn-meter {
        width: 100%;
        height: 36px;
        margin-top: 0;
        background: var(--panel-border);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .burn-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 4px;
        transition: background 0.15s;
      }
      .burn-fill.over {
        background: var(--loss);
      }
      .burn-fill.good {
        background: var(--gain);
      }
      .burn-target {
        position: absolute;
        top: 0;
        height: 100%;
        border-left: 3px solid #1a7f37;
        border-right: 3px solid #1a7f37;
        background: rgba(63, 185, 80, 0.15);
        pointer-events: none;
      }

      .info-text {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
      }

      /* Canvas prompt overlay */
      .canvas-prompt {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 20px;
        border-radius: 8px;
        background: rgba(11, 15, 24, 0.85);
        border: 1px solid var(--panel-border);
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dim);
        text-align: center;
        pointer-events: none;
        transition:
          color 0.3s,
          border-color 0.3s;
        white-space: nowrap;
        z-index: 10;
      }
      .canvas-prompt.highlight {
        color: var(--gain);
        border-color: var(--gain);
        animation: promptPulse 1s ease-in-out infinite;
      }
      .canvas-prompt.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      .canvas-prompt.cruise {
        color: var(--text-dim);
        border-color: var(--panel-border);
      }
      @keyframes promptPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
        }
        50% {
          box-shadow: 0 0 14px 3px rgba(63, 185, 80, 0.3);
        }
      }

      /* MET clock */
      .met-clock {
        position: absolute;
        top: 16px;
        left: 16px;
        padding: 8px 18px;
        border-radius: 8px;
        background: rgba(11, 15, 24, 0.88);
        border: 1px solid var(--panel-border);
        font-family: "Share Tech Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--accent);
        min-width: 110px;
        text-align: center;
        pointer-events: none;
        z-index: 10;
        text-shadow: 0 0 10px rgba(88, 166, 255, 0.4);
        transition:
          color 0.3s,
          text-shadow 0.3s,
          opacity 0.3s;
      }
      .met-clock.paused {
        opacity: 0.7;
      }

      /* Step indicator */
      .step-indicator {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        pointer-events: none;
        z-index: 10;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
      }
      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1.5px solid var(--text-dim);
        background: transparent;
        transition: all 0.3s;
      }
      .step-dot.done {
        background: var(--gain);
        border-color: var(--gain);
      }
      .step-dot.current {
        border-color: var(--accent);
        box-shadow: 0 0 6px rgba(88, 166, 255, 0.5);
      }
      .step-label {
        color: var(--text-dim);
        margin: 0 2px;
      }
      .step-label.current {
        color: var(--accent);
      }

      /* Inset */
      .inset-wrap {
        position: absolute;
        left: 12px;
        bottom: 12px;
        width: 150px;
        height: 150px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
        pointer-events: none;
      }
      .inset-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Result overlay */
      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
      }
      .overlay-emoji {
        font-size: 72px;
        animation: overlayPop 0.4s ease;
      }
      .overlay-msg {
        font-family: "Outfit", sans-serif;
        font-size: 24px;
        font-weight: 700;
        margin-top: 16px;
        color: #fff;
      }
      .overlay-sub {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.85);
      }
      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.5);
      }

      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes overlayPop {
        0% {
          transform: scale(0.3);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      .header-rocket {
        font-size: 18px;
        line-height: 1;
      }

      @media (prefers-reduced-motion: reduce) {
        html *,
        html *::before,
        html *::after {
          animation-duration: 0.01ms;
          animation-iteration-count: 1;
          transition-duration: 0.01ms;
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
        }
        .canvas-wrap {
          min-height: 350px;
          flex: 1;
        }
        .controls {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
          border-left: none;
          border-top: 1px solid var(--panel-border);
          padding: 12px 16px;
          gap: 12px;
        }
        .ctrl-group {
          min-width: 140px;
          flex: 1;
        }
        .met-clock {
          font-size: 14px;
          padding: 6px 14px;
          min-width: 90px;
          top: 10px;
          left: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="header-text">
          <h1>
            <a href="/learn/"><span class="header-rocket">&#x1F680;</span></a>
            <span id="titleText">Hohmann Transfer Game</span>
          </h1>
          <p id="subtitleText">
            Time your launch and burns to transfer between planets on a
            minimum-energy Hohmann transfer.
          </p>
        </div>
        <button
          type="button"
          class="lang-btn"
          id="langBtn"
          title="Switch language"
          aria-label="Switch language"
        >
          PL
        </button>
      </header>

      <div class="main">
        <div class="canvas-wrap">
          <canvas
            id="canvas"
            aria-label="Hohmann transfer orbit simulation"
          ></canvas>
          <div class="met-clock" id="metClock">T+ 0d 00h</div>
          <div class="canvas-prompt" id="canvasPrompt"></div>
          <div class="step-indicator" id="stepIndicator">
            <span class="step-label current" id="stepLbl1">1 Launch</span>
            <div class="step-dot current" id="stepDot1"></div>
            <span class="step-label" id="stepLbl2">2 Coast</span>
            <div class="step-dot" id="stepDot2"></div>
            <span class="step-label" id="stepLbl3">3 Arrive</span>
            <div class="step-dot" id="stepDot3"></div>
          </div>
          <div class="inset-wrap">
            <canvas
              id="insetCanvas"
              aria-label="Local orbit inset view"
            ></canvas>
          </div>
        </div>

        <div class="controls">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblHome">Home</span>
            <select
              class="planet-select"
              id="homeSelect"
              aria-label="Home planet"
            ></select>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblDest">Destination</span>
            <select
              class="planet-select"
              id="destSelect"
              aria-label="Destination planet"
            ></select>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblDifficulty">Difficulty</span>
            <div class="type-toggle">
              <button
                type="button"
                class="type-btn active"
                id="diffEasyBtn"
                aria-label="Easy difficulty"
              >
                &#x2605;
              </button>
              <button
                type="button"
                class="type-btn"
                id="diffMediumBtn"
                aria-label="Medium difficulty"
              >
                &#x2605;&#x2605;
              </button>
              <button
                type="button"
                class="type-btn"
                id="diffHardBtn"
                aria-label="Hard difficulty"
              >
                &#x2605;&#x2605;&#x2605;
              </button>
            </div>
          </div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblTimeWarp">Time Warp</span>
            <div class="type-toggle">
              <button
                type="button"
                class="type-btn active"
                id="warpNormalBtn"
                aria-label="Normal speed"
              >
                &#x25b6;
              </button>
              <button
                type="button"
                class="type-btn"
                id="warpFastBtn"
                aria-label="Fast speed"
              >
                &#x25b6;&#x25b6;
              </button>
              <button
                type="button"
                class="type-btn"
                id="warpFastestBtn"
                aria-label="Fastest speed"
              >
                &#x25b6;&#x25b6;&#x25b6;
              </button>
              <button
                type="button"
                class="type-btn"
                id="resetBtn"
                aria-label="Reset mission"
              >
                &#x25a0;
              </button>
            </div>
          </div>

          <div class="ctrl-group">
            <button
              type="button"
              class="engine-btn"
              id="engineBtn"
              aria-label="Engine burn control"
            ></button>
          </div>

          <div class="ctrl-group" id="grpBurnMeter">
            <span class="ctrl-label" id="lblBurn">Burn 1</span>
            <div class="burn-meter-wrap">
              <div class="burn-meter">
                <div class="burn-target" id="burnTarget"></div>
                <div class="burn-fill" id="burnFill"></div>
              </div>
            </div>
          </div>

          <div class="ctrl-group readouts" id="grpReadouts">
            <div class="readout-row">
              <span class="readout-label" id="lblMission">Mission</span>
              <span class="readout-val" id="missionVal">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblTransferTime"
                >Transfer time</span
              >
              <span class="readout-val" id="transferTimeVal">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblDv1">Departure &Delta;v</span>
              <span class="readout-val" id="dv1Val">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblDv2">Arrival &Delta;v</span>
              <span class="readout-val" id="dv2Val">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblPhase">Phase angle</span>
              <span class="readout-val" id="phaseVal">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblStatus">Status</span>
              <span class="readout-val" id="statusVal">&mdash;</span>
            </div>
          </div>

          <div class="ctrl-group info-text">
            <span id="infoText"></span>
          </div>
        </div>
      </div>
    </main>

    <script>
      (function () {
        "use strict";

        const MU_SUN = 4 * Math.PI * Math.PI;

          {

        function solveKepler(M, e) {

            if (Math.abs(dE) < 1e-12) break;

          if (isNaN(E) || !isFinite(E)) E = m;
          return E;
        }

        function helioPosition(body, t) {

          else if (body.key === state.destKey) M += state.destM0Offset;
          const E = solveKepler(M, body.e);
          const xp = body.a * (Math.cos(E) - body.e);
          const yp = body.bSemi * Math.sin(E);
          return {
            x: xp * body.cosPom - yp * body.sinPom,
            y: xp * body.sinPom + yp * body.cosPom,

        function computeHohmannRef(homeKey, destKey) {
          const home = bodyByKey[homeKey],
            dest = bodyByKey[destKey];

            r2 = dest.a,

          const tT = 0.5 * Math.pow(aT, 1.5);
          const vCirc1 = Math.sqrt(MU_SUN / r1),
            vCirc2 = Math.sqrt(MU_SUN / r2);
          const vDep = Math.sqrt(MU_SUN * (2 / r1 - 1 / aT));
          const vArr = Math.sqrt(MU_SUN * (2 / r2 - 1 / aT));
          const dv1 = Math.abs(vDep - vCirc1),
            dv2 = Math.abs(vCirc2 - vArr);
          const n2 = TWO_PI / dest.T,
            phi = wrapAngle(Math.PI - n2 * tT);
          const maxDv = Math.max(dv1, dv2),
            burnRate = maxDv / 2.0;
          return {
            aTransfer: aT,
            tTransfer: tT,
            dv1: dv1,
            dv2: dv2,
            vCircHome: vCirc1,
            vCircDest: vCirc2,
            vDep: vDep,
            vArr: vArr,
            phaseAngle: phi,
            burnRate: burnRate,
            holdTime1: dv1 / burnRate,
            holdTime2: dv2 / burnRate,
            outward: dest.a > home.a,

        function computeWarpLevels(homeKey, destKey) {

            dest = bodyByKey[destKey];

          const baseDecel = state.difficulty === "easy" ? 0.5 : 1;
          const windowRealSec = windowDur / (baseDecel * SIM_RATE);

            windowRealSec > MAX_WINDOW_SEC

            fast: Math.max(2, Math.round(synodic * 5)),
            fastest: Math.max(5, Math.round(synodic * 15)),
            decel: decel,
            windowDur: windowDur,

          const rdot = (x * vx + y * vy) / r;
          const ex = (v2 / MU_SUN - 1 / r) * x - (rdot / MU_SUN) * r * vx;
          const ey = (v2 / MU_SUN - 1 / r) * y - (rdot / MU_SUN) * r * vy;
          const e = Math.sqrt(ex * ex + ey * ey);
          if (e >= 1)
            return { conicType: "escape", a: a, e: e, h: h, tEpoch: tEpoch };
          const pomegaRad = Math.atan2(ey, ex),
            bSemi = a * Math.sqrt(1 - e * e);

          const sinNu = (ex * y - ey * x) / (e * r + 1e-30);
          const nu = Math.atan2(sinNu, cosNu);
          const sinNu2 = Math.sin(nu),
            cosNu2 = Math.cos(nu);
          const E = Math.atan2(Math.sqrt(1 - e * e) * sinNu2, e + cosNu2);

            e: e,
            pomegaRad: pomegaRad,
            bSemi: bSemi,
            cosPom: Math.cos(pomegaRad),
            sinPom: Math.sin(pomegaRad),
            n: n,
            M0: M0,
            tEpoch: tEpoch,
            h: h,

        function buildTransferArc(tStart) {
          const home = bodyByKey[state.homeKey],
            dest = bodyByKey[state.destKey];
          const launchPos = helioPosition(home, tStart);
          const tArrival = tStart + state.ref.tTransfer;
          const arrivalPos = helioPosition(dest, tArrival);
          const alpha1 = Math.atan2(launchPos.y, launchPos.x);
          const alpha2 = Math.atan2(arrivalPos.y, arrivalPos.x);
          let dAlpha = alpha2 - alpha1;
          const points = [],
            samples = 360;
          let i, u, alpha, rArc;
          while (dAlpha <= 0) dAlpha += TWO_PI;
          const r1 = Math.sqrt(
            launchPos.x * launchPos.x + launchPos.y * launchPos.y,
          );
          const r2 = Math.sqrt(
            arrivalPos.x * arrivalPos.x + arrivalPos.y * arrivalPos.y,
          );
          const aT = (r1 + r2) / 2,
            eT = Math.abs(r2 - r1) / (r1 + r2);
          const pT = aT * (1 - eT * eT),
            outward = r2 >= r1;
          for (i = 0; i <= samples; i++) {
            u = i / samples;
            alpha = alpha1 + dAlpha * u;
            const nu = outward ? Math.PI * u : Math.PI * (1 - u);
            rArc = pT / (1 + eT * Math.cos(nu));
            points.push({
              x: rArc * Math.cos(alpha),
              y: rArc * Math.sin(alpha),
            });
          }
          points[0] = { x: launchPos.x, y: launchPos.y };
          points[points.length - 1] = { x: arrivalPos.x, y: arrivalPos.y };
          return {
            tStart: tStart,
            tTransfer: state.ref.tTransfer,
            tArrival: tArrival,
            points: points,
            eT: eT,
            outward: outward,
          };
        }

        function getTransferArcState(arc, t) {
          let progress = (t - arc.tStart) / arc.tTransfer;
          if (progress < 0) progress = 0;
          if (progress > 1) progress = 1;
          const M = arc.outward ? Math.PI * progress : Math.PI * (1 - progress);
          const E = solveKepler(M, arc.eT);
          const nu =
            2 *
            Math.atan2(
              Math.sqrt(1 + arc.eT) * Math.sin(E / 2),
              Math.sqrt(1 - arc.eT) * Math.cos(E / 2),
            );
          let u = arc.outward ? nu / Math.PI : 1 - nu / Math.PI;
          u = Math.max(0, Math.min(1, u));
          const scaled = u * (arc.points.length - 1),
            idx = Math.floor(scaled),
            frac = scaled - idx;
          const p0 = arc.points[idx],
            p1 = arc.points[Math.min(idx + 1, arc.points.length - 1)];
          const prev = arc.points[Math.max(idx - 1, 0)],
            next = arc.points[Math.min(idx + 1, arc.points.length - 1)];
          return {
            x: p0.x + (p1.x - p0.x) * frac,
            y: p0.y + (p1.y - p0.y) * frac,
            dx: next.x - prev.x,
            dy: next.y - prev.y,
            progress: progress,
            done: progress >= 1,

          H = 0;
        const insetCanvas = document.getElementById("insetCanvas");
        const ictx = insetCanvas.getContext("2d");
        let iW = 150,
          iH = 150;

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          W = rect.width;
          H = rect.height;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          const iRect = insetCanvas.parentElement.getBoundingClientRect();
          iW = iRect.width;
          iH = iRect.height;
          insetCanvas.width = iW * dpr;
          insetCanvas.height = iH * dpr;
          insetCanvas.style.width = iW + "px";
          insetCanvas.style.height = iH + "px";
          ictx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener("resize", resize);

        let bgStars = [];
        function initBgStars(n) {
          bgStars = [];
          for (let i = 0; i < n; i++) {
            bgStars.push({
              x: Math.random(),
              y: Math.random(),
              r: Math.random() * 1.2 + 0.3,
              b: Math.random() * 0.4 + 0.2,
            });
          }
        }
        initBgStars(200);

        function computeAutoCamera() {
          const home = bodyByKey[state.homeKey],
            dest = bodyByKey[state.destKey];
          const maxR = Math.max(home.a * (1 + home.e), dest.a * (1 + dest.e));
          const margin = maxR * 1.2;
          return { cx: 0, cy: 0, scale: Math.min(W, H) / 2 / margin };
        }

        function toCanvas(auX, auY) {
          return {
            cx: W / 2 + (auX - state.camera.cx) * state.camera.scale,
            cy: H / 2 - (auY - state.camera.cy) * state.camera.scale,
          };
        }

        function fromCanvas(cx, cy) {
          return {
            x: (cx - W / 2) / state.camera.scale + state.camera.cx,
            y: -(cy - H / 2) / state.camera.scale + state.camera.cy,
          };
        }

        function getCanvasPos(e) {
          const rect = canvas.getBoundingClientRect();
          if (e.touches && e.touches.length > 0)
            return {
              x: e.touches[0].clientX - rect.left,
              y: e.touches[0].clientY - rect.top,
            };
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function getNearPlanetKey(canvasPos) {
          const keys = [state.homeKey, state.destKey];
          let bestKey = null,
            bestDist2 = Infinity;
          for (let i = 0; i < keys.length; i++) {
            const body = bodyByKey[keys[i]],
              pos = helioPosition(body, state.simTime);
            const cc = toCanvas(pos.x, pos.y);
            const dx = canvasPos.x - cc.cx,
              dy = canvasPos.y - cc.cy,
              d2 = dx * dx + dy * dy;
            const hitRadius = Math.max(body.radius + 8, 20);
            if (d2 <= hitRadius * hitRadius && d2 < bestDist2) {
              bestDist2 = d2;
              bestKey = keys[i];
            }
          }
          return bestKey;
        }

        function computeM0OffsetFromCanvasPos(canvasPos, planetKey) {
          const body = bodyByKey[planetKey],
            world = fromCanvas(canvasPos.x, canvasPos.y);
          const theta = Math.atan2(world.y, world.x),
            nu = theta - body.pomegaRad;
          const E =
            2 *
            Math.atan2(
              Math.sqrt(1 - body.e) * Math.sin(nu / 2),
              Math.sqrt(1 + body.e) * Math.cos(nu / 2),
            );
          const M_target = E - body.e * Math.sin(E);
          return M_target - body.M0 - body.n * state.simTime;
        }

        function applyDragOffset(planetKey, offset) {
          if (planetKey === state.homeKey) state.homeM0Offset = offset;
          else if (planetKey === state.destKey) state.destM0Offset = offset;
        }

        function drawStarfield() {
          for (let i = 0; i < bgStars.length; i++) {
            const s = bgStars[i];
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, TWO_PI);
            ctx.fillStyle = "rgba(200,210,220," + s.b * 0.3 + ")";
            ctx.fill();
          }
        }

        function drawOrbitEllipse(body, alpha) {
          if (body.key === "sun") return;
          const cxAu = -body.a * body.e * body.cosPom,
            cyAu = -body.a * body.e * body.sinPom;
          const cc = toCanvas(cxAu, cyAu);
          ctx.beginPath();
          ctx.ellipse(
            cc.cx,
            cc.cy,
            body.a * state.camera.scale,
            body.bSemi * state.camera.scale,
            -body.pomegaRad,
            0,
            TWO_PI,
          );
          ctx.strokeStyle = "rgba(" + body.glow + "," + alpha + ")";
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        function drawBody(body, t) {
          const pos = helioPosition(body, t),
            cc = toCanvas(pos.x, pos.y),
            r = body.radius;
          if (body.key === "sun") {
            const grad = ctx.createRadialGradient(
              cc.cx,
              cc.cy,
              0,
              cc.cx,
              cc.cy,
              r * 2.5,
            );
            grad.addColorStop(0, "rgba(" + body.glow + ",0.6)");
            grad.addColorStop(1, "rgba(" + body.glow + ",0)");
            ctx.beginPath();
            ctx.arc(cc.cx, cc.cy, r * 2.5, 0, TWO_PI);
            ctx.fillStyle = grad;
            ctx.fill();
          }
          ctx.beginPath();
          ctx.arc(cc.cx, cc.cy, r, 0, TWO_PI);
          ctx.fillStyle = body.color;
          ctx.fill();
          if (
            state.phase === "prelaunch" &&
            (body.key === state.draggingKey || body.key === state.dragHoverKey)
          ) {
            ctx.beginPath();
            ctx.arc(cc.cx, cc.cy, r + 4, 0, TWO_PI);
            ctx.strokeStyle =
              body.key === state.draggingKey
                ? "rgba(88,166,255,0.9)"
                : "rgba(88,166,255,0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          if (body.key !== "sun") {
            const label = T(body.key);
            ctx.font = '15px "Share Tech Mono", monospace';
            ctx.fillStyle = "rgba(" + body.glow + ",0.7)";
            ctx.textAlign = "center";
            ctx.fillText(label, cc.cx, cc.cy - r - 5);
          }
        }

        function drawLaunchWindowGuide() {
          if (state.phase !== "prelaunch" || !state.ref) return;
          const hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
          const dp = helioPosition(bodyByKey[state.destKey], state.simTime);
          const homeAngle = Math.atan2(hp.y, hp.x),
            idealDestAngle = homeAngle + state.ref.phaseAngle;
          const tolRad = state.tol.phaseDeg * DEG2RAD;
          const dest = bodyByKey[state.destKey],
            windowOpen = isLaunchWindowOpen(state.simTime);
          const hcc = toCanvas(hp.x, hp.y),
            alpha = windowOpen ? 0.35 : 0.1;
          const edgeAngle1 = idealDestAngle + tolRad,
            edgeAngle2 = idealDestAngle - tolRad;
          const r1 = orbitRadiusAtAngle(dest, edgeAngle1);
          const orb1x = r1 * Math.cos(edgeAngle1),
            orb1y = r1 * Math.sin(edgeAngle1);
          const d1x = orb1x - hp.x,
            d1y = orb1y - hp.y;
          const ep1 = toCanvas(orb1x + 0.05 * d1x, orb1y + 0.05 * d1y);
          const e1x = ep1.cx,
            e1y = ep1.cy;
          const r2 = orbitRadiusAtAngle(dest, edgeAngle2);
          const orb2x = r2 * Math.cos(edgeAngle2),
            orb2y = r2 * Math.sin(edgeAngle2);
          const d2x = orb2x - hp.x,
            d2y = orb2y - hp.y;
          const ep2 = toCanvas(orb2x + 0.05 * d2x, orb2y + 0.05 * d2y);
          const e2x = ep2.cx,
            e2y = ep2.cy;
          ctx.beginPath();
          ctx.moveTo(hcc.cx, hcc.cy);
          ctx.lineTo(e1x, e1y);
          ctx.lineTo(e2x, e2y);
          ctx.closePath();
          ctx.fillStyle = "rgba(63,185,80," + alpha + ")";
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(hcc.cx, hcc.cy);
          ctx.lineTo(e1x, e1y);
          ctx.lineTo(e2x, e2y);
          ctx.closePath();
          ctx.strokeStyle = "rgba(63,185,80," + (windowOpen ? 0.5 : 0.2) + ")";
          ctx.lineWidth = 1;
          ctx.stroke();
          if (windowOpen) {
            const dcc = toCanvas(dp.x, dp.y),
              pulse = 12 + 4 * Math.sin(Date.now() / 200);
            ctx.beginPath();
            ctx.arc(dcc.cx, dcc.cy, pulse, 0, TWO_PI);
            ctx.strokeStyle = "rgba(63,185,80,0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }

        function getScAngle() {
          if (state.phase === "captured") {
            const dv = helioVelocity(bodyByKey[state.destKey], state.simTime);
            return Math.atan2(-dv.vy, dv.vx);
          }
          if (
            (state.phase === "cruise" ||
              state.phase === "approach" ||
              state.phase === "burn2") &&
            state.transferArc
          ) {
            const arcT =
              state.phase === "cruise"
                ? state.simTime
                : state.transferArc.tArrival;
            const arcState = getTransferArcState(state.transferArc, arcT);
            return Math.atan2(-arcState.dy, arcState.dx);
          }
          if (state.sc.orbit && state.sc.orbit.conicType === "elliptic") {
            const vel = orbitVelocityAt(state.sc.orbit, state.simTime);
            return Math.atan2(-vel.vy, vel.vx);
          }
          const hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
          return Math.atan2(-hv.vy, hv.vx);
        }

        function drawSpacecraft() {
          if (!state.sc.launched) return;
          if (
            (state.phase === "captured" || state.phase === "result") &&
            state.captureAlpha <= 0
          )
            return;
          const cc = toCanvas(state.sc.x, state.sc.y),
            angle = getScAngle();
          ctx.save();
          ctx.translate(cc.cx, cc.cy);
          ctx.rotate(angle);
          if (state.phase === "captured") ctx.globalAlpha = state.captureAlpha;
          const glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 16);
          glow.addColorStop(0, "rgba(255,224,102,0.36)");
          glow.addColorStop(1, "rgba(255,224,102,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, 16, 0, TWO_PI);
          ctx.fill();
          ctx.fillStyle = "#ffe066";
          ctx.beginPath();
          ctx.moveTo(14.3, 0);
          ctx.lineTo(-7.7, -7.15);
          ctx.lineTo(-7.7, 7.15);
          ctx.closePath();
          ctx.fill();
          if (state.phase === "burn1" || state.phase === "burn2") {
            const fl = 6.6 + 4.4 * Math.sin(Date.now() / 60);
            ctx.fillStyle = "rgba(255,140,30,0.6)";
            ctx.beginPath();
            ctx.moveTo(-7.7, -4.4);
            ctx.lineTo(-7.7 - fl, 0);
            ctx.lineTo(-7.7, 4.4);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        }

        function drawTrail() {
          const trail = state.sc.trail;
          if (trail.length < 2) return;
          ctx.beginPath();
          const p0 = toCanvas(trail[0].x, trail[0].y);
          ctx.moveTo(p0.cx, p0.cy);
          const step = Math.max(1, Math.floor(trail.length / 2000));
          for (let i = step; i < trail.length; i += step) {
            const p = toCanvas(trail[i].x, trail[i].y);
            ctx.lineTo(p.cx, p.cy);
          }
          ctx.strokeStyle = "rgba(255,224,102,0.55)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        function drawScene() {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = "#080c14";
          ctx.fillRect(0, 0, W, H);
          drawStarfield();
          const home = bodyByKey[state.homeKey],
            dest = bodyByKey[state.destKey];
          drawOrbitEllipse(home, 0.25);
          drawOrbitEllipse(dest, 0.25);
          drawLaunchWindowGuide();
          drawTrail();
          drawBody(bodyByKey["sun"], state.simTime);
          drawBody(home, state.simTime);
          drawBody(dest, state.simTime);
          drawSpacecraft();
        }

        function drawInset() {
          ictx.clearRect(0, 0, iW, iH);
          ictx.fillStyle = "rgba(8,12,20,0.9)";
          ictx.fillRect(0, 0, iW, iH);
          const cx = iW / 2,
            cy = iH / 2;
          const bodyKey =
            state.phase === "approach" ||
            state.phase === "burn2" ||
            state.phase === "captured" ||
            (state.phase === "result" && state.burn2.committed)
              ? state.destKey
              : state.homeKey;
          const body = bodyByKey[bodyKey];
          ictx.beginPath();
          const grad = ictx.createRadialGradient(cx, cy, 0, cx, cy, 16);
          grad.addColorStop(0, body.color);
          grad.addColorStop(1, "rgba(" + body.glow + ",0.1)");
          ictx.arc(cx, cy, 14, 0, TWO_PI);
          ictx.fillStyle = grad;
          ictx.fill();
          ictx.beginPath();
          ictx.arc(cx, cy, 14, 0, TWO_PI);
          ictx.fillStyle = body.color;
          ictx.fill();
          const orbitR = 40;
          if (
            state.phase === "result" &&
            state.burn2.committed &&
            state.sc.orbit
          ) {
            if (state.sc.orbit.conicType === "escape") {
              ictx.beginPath();
              ictx.moveTo(cx + orbitR * 1.3, cy - orbitR * 0.5);
              ictx.quadraticCurveTo(
                cx - orbitR * 0.3,
                cy,
                cx + orbitR * 1.3,
                cy + orbitR * 0.5,
              );
              ictx.strokeStyle = "rgba(249,117,131,0.5)";
              ictx.lineWidth = 1.5;
              ictx.stroke();
            } else if (state.sc.orbit.e > 0.3) {
              const eFinal = Math.min(state.sc.orbit.e, 0.9),
                eccA = orbitR * (1 + eFinal * 0.5),
                eccB = orbitR * (1 - eFinal * 0.4);
              ictx.beginPath();
              ictx.ellipse(
                cx + orbitR * eFinal * 0.3,
                cy,
                eccA,
                eccB,
                0,
                0,
                TWO_PI,
              );
              ictx.strokeStyle = "rgba(249,117,131,0.5)";
              ictx.lineWidth = 1.5;
              ictx.stroke();
            } else {
              ictx.beginPath();
              ictx.arc(cx, cy, orbitR, 0, TWO_PI);
              ictx.strokeStyle = "rgba(63,185,80,0.4)";
              ictx.lineWidth = 1;
              ictx.stroke();
            }
          } else {
            ictx.beginPath();
            ictx.arc(cx, cy, orbitR, 0, TWO_PI);
            ictx.strokeStyle = "rgba(255,255,255,0.2)";
            ictx.lineWidth = 1;
            ictx.stroke();
          }
          const scAngle = state.insetScAngle,
            scX = cx + orbitR * Math.cos(scAngle),
            scY = cy - orbitR * Math.sin(scAngle);
          if (state.phase === "burn1" || state.phase === "burn2") {
            const flR = 5 + 2 * Math.sin(Date.now() / 80);
            ictx.beginPath();
            ictx.arc(scX, scY, flR, 0, TWO_PI);
            ictx.fillStyle = "rgba(255,180,50,0.4)";
            ictx.fill();
          }
          ictx.save();
          ictx.translate(scX, scY);
          ictx.rotate(-(scAngle + Math.PI / 2));
          ictx.fillStyle = "#ffe066";
          ictx.beginPath();
          ictx.moveTo(10, 0);
          ictx.lineTo(-5, -5);
          ictx.lineTo(-5, 5);
          ictx.closePath();
          ictx.fill();
          ictx.restore();
          ictx.font = '12px "Share Tech Mono", monospace';
          ictx.fillStyle = "rgba(255,255,255,0.5)";
          ictx.textAlign = "center";
          const label = T(bodyKey);
          ictx.fillText(label, cx, iH - 6);
        }

        function startBurn() {
          if (state.phase === "prelaunch") {
            state.burn1LockedGreenFrac = computeGreenFrac();
            state.resultData.phaseAtLaunch = currentPhaseAngle(state.simTime);
            state.phase = "burn1";
            state.burn1.holding = true;
            state.burn1.holdStart = performance.now();
            state.burn1.holdDuration = 0;
            state.burn1.dvApplied = 0;
            const hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
            state.launchAngle = Math.atan2(hp.y, hp.x);
            state.sc.x = hp.x;
            state.sc.y = hp.y;
            state.sc.launched = true;
            state.sc.trail = [{ x: hp.x, y: hp.y }];
            updateEngineBtn();
            updateBurnMeter();
          } else if (state.phase === "approach") {
            state.burn2LockedGreenFrac = computeGreenFrac();
            state.phase = "burn2";
            state.burn2.holding = true;
            state.burn2.holdStart = performance.now();
            state.burn2.holdDuration = 0;
            state.burn2.dvApplied = 0;
            updateEngineBtn();
            updateBurnMeter();
          }
        }

        function endBurn() {
          if (state.phase === "burn1" && state.burn1.holding) {
            state.burn1.holding = false;
            state.burn1.committed = true;
            let gf1 = Math.max(0, state.burn1LockedGreenFrac);
            if (
              state.difficulty !== "easy" &&
              state.burn1LockedGreenFrac >= 0
            ) {
              const sd1 =
                state.difficulty === "medium"
                  ? BURN_SHRINK_DUR_MED
                  : BURN_SHRINK_DUR_HARD;
              const elapsed =
                (performance.now() - state.burn1.holdStart) / 1000;
              gf1 = state.burn1LockedGreenFrac * Math.max(0, 1 - elapsed / sd1);
            }
            const ghw1 = 0.75 * state.ref.dv1 * gf1;
            state.burn1Good =
              state.burn1.dvApplied >= state.ref.dv1 - ghw1 &&
              state.burn1.dvApplied <= state.ref.dv1 + ghw1;
            state.transferArc = null;
            if (state.burn1Good) {
              state.burn1.dvApplied = state.ref.dv1;
              state.sc.orbit = null;
              state.transferArc = buildTransferArc(state.simTime);
              state.sc.x = state.transferArc.points[0].x;
              state.sc.y = state.transferArc.points[0].y;
            } else {
              const hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
              const speed = Math.sqrt(hv.vx * hv.vx + hv.vy * hv.vy);
              const px = hv.vx / speed,
                py = hv.vy / speed;
              const dir = state.ref.outward ? 1 : -1,
                dvActual = state.burn1.dvApplied;
              state.sc.vx = hv.vx + dir * dvActual * px;
              state.sc.vy = hv.vy + dir * dvActual * py;
              state.sc.orbit = stateToOrbit(
                state.sc.x,
                state.sc.y,
                state.sc.vx,
                state.sc.vy,
                state.simTime,
              );
              if (state.sc.orbit.conicType === "escape") {
                state.phase = "result";
                computeMissErrors();
                state.resultType = "miss";
                showResultOverlay();
                return;
              }
            }
            state.phase = "cruise";
            if (state.warpLocked) {
              state.warpLocked = false;
              state.timeWarp = 1;
              state.warpLevel = "normal";
              updateWarpBtns();
            }
            updateEngineBtn();
            updateBurnLabel();
          } else if (state.phase === "burn2" && state.burn2.holding) {
            state.burn2.holding = false;
            state.burn2.committed = true;
            const dv2Err =
              Math.abs(state.burn2.dvApplied - state.ref.dv2) / state.ref.dv2;
            state.resultData.dv2Error = dv2Err;
            let gf2 = Math.max(0, state.burn2LockedGreenFrac);
            if (
              state.difficulty !== "easy" &&
              state.burn2LockedGreenFrac >= 0
            ) {
              const sd2 =
                state.difficulty === "medium"
                  ? BURN_SHRINK_DUR_MED
                  : BURN_SHRINK_DUR_HARD;
              const elapsed =
                (performance.now() - state.burn2.holdStart) / 1000;
              gf2 = state.burn2LockedGreenFrac * Math.max(0, 1 - elapsed / sd2);
            }
            const ghw2 = 0.75 * state.ref.dv2 * gf2;
            let dvCenter2 = state.ref.dv2;
            if (state.difficulty === "hard" && gf2 > 0) {
              const maxDv2 = state.ref.dv2 * 2,
                bounceT2 = performance.now() / 1000;
              dvCenter2 +=
                BOUNCE_AMP_HARD *
                maxDv2 *
                Math.sin(TWO_PI * BOUNCE_FREQ_HARD * bounceT2);
              dvCenter2 = Math.max(ghw2, Math.min(maxDv2 - ghw2, dvCenter2));
            }
            const dv2Good =
              state.burn2.dvApplied >= dvCenter2 - ghw2 &&
              state.burn2.dvApplied <= dvCenter2 + ghw2;
            if (dv2Good) {
              const destVel = helioVelocity(
                bodyByKey[state.destKey],
                state.simTime,
              );
              state.sc.vx = destVel.vx;
              state.sc.vy = destVel.vy;
              state.sc.orbit = stateToOrbit(
                state.sc.x,
                state.sc.y,
                state.sc.vx,
                state.sc.vy,
                state.simTime,
              );
              state.captureStart = performance.now();
              state.captureOrbitAngle = 0;
              state.captureAlpha = 1;
              state.captureApproachX = state.sc.x;
              state.captureApproachY = state.sc.y;
              state.overlayDismissed = false;
              state.phase = "captured";
              evaluateResult();
            } else {
              const dir2 = state.ref.outward ? 1 : -1;
              if (state.transferArc && !state.sc.orbit) {
                const arcState = getTransferArcState(
                  state.transferArc,
                  state.transferArc.tArrival,
                );
                const len = Math.sqrt(
                  arcState.dx * arcState.dx + arcState.dy * arcState.dy,
                );
                const ux = arcState.dx / len,
                  uy = arcState.dy / len;
                const postSpeed = state.ref.vArr + dir2 * state.burn2.dvApplied;
                state.sc.vx = ux * postSpeed;
                state.sc.vy = uy * postSpeed;
                state.sc.orbit = stateToOrbit(
                  state.sc.x,
                  state.sc.y,
                  state.sc.vx,
                  state.sc.vy,
                  state.simTime,
                );
              } else if (state.sc.orbit) {
                const vel2 = orbitVelocityAt(state.sc.orbit, state.simTime);
                const spd2 = Math.sqrt(vel2.vx * vel2.vx + vel2.vy * vel2.vy);
                state.sc.vx =
                  vel2.vx + dir2 * state.burn2.dvApplied * (vel2.vx / spd2);
                state.sc.vy =
                  vel2.vy + dir2 * state.burn2.dvApplied * (vel2.vy / spd2);
                state.sc.orbit = stateToOrbit(
                  state.sc.x,
                  state.sc.y,
                  state.sc.vx,
                  state.sc.vy,
                  state.simTime,
                );
              }
              state.transferArc = null;
              if (!state.sc.orbit || state.sc.orbit.conicType === "escape") {
                state.phase = "result";
                computeMissErrors();
                state.resultType = "miss";
                showResultOverlay();
              } else {
                state.phase = "cruise";
                updateEngineBtn();
              }
            }
          }
        }

        const engineBtn = document.getElementById("engineBtn");
        engineBtn.addEventListener("mousedown", function (e) {
          e.preventDefault();
          startBurn();
        });
        engineBtn.addEventListener("mouseup", function (e) {

        canvas.addEventListener(
          "touchstart",
          function (e) {

        function getEncounterRadius(destKey) {
          const dest = bodyByKey[destKey];
          return Math.max(
            0.15,
            Math.min(0.5, dest.a * 0.08 + dest.a * dest.e * 2),
          );
        }

        function checkArrival() {
          if (state.phase !== "cruise") return;
          if (state.burn2.committed) {
            if (state.sc.orbit) {
              const elapsed = state.simTime - state.sc.orbit.tEpoch;
              const halfPeriod = Math.PI / state.sc.orbit.n;
              if (elapsed > halfPeriod * 1.3) {
                state.phase = "result";
                computeMissErrors();
                state.resultType = "miss";
                showResultOverlay();
              }
            }
            return;
          }
          if (state.transferArc) {
            const arcState = getTransferArcState(
              state.transferArc,
              state.simTime,
            );
            const arcEnd =
              state.transferArc.points[state.transferArc.points.length - 1];
            const trailLast = state.sc.trail[state.sc.trail.length - 1];
            if (!arcState.done) return;
            state.simTime = state.transferArc.tArrival;
            state.sc.x = arcEnd.x;
            state.sc.y = arcEnd.y;
            if (
              !trailLast ||
              trailLast.x !== arcEnd.x ||
              trailLast.y !== arcEnd.y
            ) {
              state.sc.trail.push({ x: arcEnd.x, y: arcEnd.y });
              if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
            }
            state.phase = "approach";
            state.arrivalTime = state.simTime;
            state.approachStart = performance.now();
            state.insetBody = "dest";
            updateEngineBtn();
            updateBurnLabel();
            updateBurnMeter();
            return;
          }
          const dest = bodyByKey[state.destKey],
            dp = helioPosition(dest, state.simTime);
          const dx = state.sc.x - dp.x,
            dy = state.sc.y - dp.y;
          const dist = Math.sqrt(dx * dx + dy * dy),
            threshold = getEncounterRadius(state.destKey);
          if (dist < threshold) {
            state.phase = "approach";
            state.arrivalTime = state.simTime;
            state.approachStart = performance.now();
            state.insetBody = "dest";
            updateEngineBtn();
            updateBurnLabel();
            updateBurnMeter();
            return;
          }
          if (state.sc.orbit) {
            const elapsed2 = state.simTime - state.sc.orbit.tEpoch;
            const halfPeriod2 = Math.PI / state.sc.orbit.n;
            if (elapsed2 > halfPeriod2 * 1.3) {
              state.phase = "result";
              computeMissErrors();
              state.resultType = "miss";
              showResultOverlay();
            }
          }
        }

        function computeMissErrors() {
          const ref = state.ref;
          const pErr = Math.abs(
            wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle),
          );
          state.resultData.phaseErrDeg = pErr / DEG2RAD;
          state.resultData.dv1Error =
            Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
          state.resultData.dv2Error = state.burn2.committed
            ? Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2
            : 1;
        }

        function evaluateResult() {
          const ref = state.ref;
          if (!state.burn2.committed) {
            computeMissErrors();
            state.resultType = "miss";
            return;
          }
          if (state.sc.orbit && state.sc.orbit.conicType === "escape") {
            computeMissErrors();
            state.resultType = "miss";
            return;
          }
          const pErr = Math.abs(
            wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle),
          );
          const pErrDeg = pErr / DEG2RAD;
          const dv1Err = Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
          const dv2Err = Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2;
          state.resultData.dv1Error = dv1Err;
          state.resultData.dv2Error = dv2Err;
          state.resultData.phaseErrDeg = pErrDeg;
          const pTol = state.tol.phaseDeg;
          const bTol1 =
            state.burn1LockedGreenFrac >= 0
              ? 0.75 * state.burn1LockedGreenFrac
              : state.tol.burnPct;
          const bTol2 =
            state.burn2LockedGreenFrac >= 0
              ? 0.75 * state.burn2LockedGreenFrac
              : state.tol.burnPct;
          if (pErrDeg <= pTol && dv1Err <= bTol1 && dv2Err <= bTol2)
            state.resultType = "success";
          else if (
            pErrDeg <= pTol * 2.5 &&
            dv1Err <= bTol1 * 2.5 &&
            dv2Err <= bTol2 * 2.5
          )
            state.resultType = "close";
          else state.resultType = "miss";
        }

        function getResultHint() {
          if (state.sc.orbit && state.sc.orbit.conicType === "escape")
            return T("hintEscape");
          const d = state.resultData,
            ref = state.ref;
          const pTol = state.tol.phaseDeg;
          const bTol1 =
            state.burn1LockedGreenFrac >= 0
              ? 0.75 * state.burn1LockedGreenFrac
              : state.tol.burnPct;
          const bTol2 =
            state.burn2LockedGreenFrac >= 0
              ? 0.75 * state.burn2LockedGreenFrac
              : state.tol.burnPct;
          if (d.phaseErrDeg > pTol) {
            const pe = wrapAngle(d.phaseAtLaunch - ref.phaseAngle);
            return T(pe > 0 ? "hintLate" : "hintEarly");
          }
          if (d.dv1Error > bTol1)
            return T(
              state.burn1.dvApplied > ref.dv1
                ? "hintBurn1Long"
                : "hintBurn1Short",
            );
          if (!state.burn2.committed) return T("hintNoCapture");
          if (d.dv2Error > bTol2)
            return T(
              state.burn2.dvApplied > ref.dv2
                ? "hintBurn2Long"
                : "hintBurn2Short",
            );
          return "";
        }

        function showResultOverlay() {
          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();
          const overlay = document.createElement("div");
          overlay.className = "result-overlay";
          let emoji, msg, bg;
          const result = state.resultType;
          if (result === "success") {
            emoji = "\uD83C\uDF89";
            msg = T("resultSuccess");
            bg = "rgba(63,185,80,0.88)";
          } else if (result === "close") {
            emoji = "\uD83D\uDC4D\uD83C\uDFFB";
            msg = T("resultClose");
            bg = "rgba(88,166,255,0.88)";
          } else {
            emoji = "\uD83D\uDC4E\uD83C\uDFFB";
            msg = T("resultMiss");
            bg = "rgba(240,180,60,0.92)";
          }
          const hint = getResultHint();
          overlay.style.background = bg;
          const emojiEl = document.createElement("div");
          emojiEl.className = "overlay-emoji";
          emojiEl.textContent = emoji;
          overlay.appendChild(emojiEl);
          const msgEl = document.createElement("div");
          msgEl.className = "overlay-msg";
          msgEl.textContent = msg;
          overlay.appendChild(msgEl);
          if (hint) {
            const subEl = document.createElement("div");
            subEl.className = "overlay-sub";
            subEl.textContent = hint;
            overlay.appendChild(subEl);
          }
          const hintEl = document.createElement("div");
          hintEl.className = "overlay-hint";
          hintEl.textContent = T("clickDismiss");
          overlay.appendChild(hintEl);
          overlay.addEventListener("click", function () {
            overlay.remove();
            state.overlayDismissed = true;
            state.postResultStart = performance.now();
          });
          document.body.appendChild(overlay);
        }

        function updateEngineBtn() {
          const btn = document.getElementById("engineBtn");
          btn.classList.remove("armed", "firing");
          btn.disabled = false;
          if (state.phase === "prelaunch") {
            if (isLaunchWindowOpen(state.simTime)) btn.classList.add("armed");
          } else if (state.phase === "burn1") btn.classList.add("firing");
          else if (state.phase === "approach") btn.classList.add("armed");
          else if (state.phase === "burn2") btn.classList.add("firing");
          else btn.disabled = true;

        function updatePrompt() {
          const el = document.getElementById("canvasPrompt");
          el.classList.remove("highlight", "active", "cruise");
          let text = "";
          switch (state.phase) {
            case "prelaunch":
              if (!state.missionStarted) text = T("promptStart");
              else if (isLaunchWindowOpen(state.simTime)) {
                text = T("promptWindow");
                el.classList.add("highlight");
              } else text = T("promptWait");
              break;
            case "burn1":
              text = T("promptBurn1");
              el.classList.add("active");
              break;
            case "cruise":
              text = T("promptCruise");
              el.classList.add("cruise");
              break;
            case "approach":
              text = T("promptApproach");
              el.classList.add("highlight");
              break;
            case "burn2":

              break;
