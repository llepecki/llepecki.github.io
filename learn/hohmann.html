        function updateStepIndicator() {
          const dots = [
            document.getElementById("stepDot1"),
            document.getElementById("stepDot2"),
            document.getElementById("stepDot3"),
          ];
          const labels = [
            document.getElementById("stepLbl1"),
            document.getElementById("stepLbl2"),
            document.getElementById("stepLbl3"),
          ];
          let step = 0;
          if (state.phase === "prelaunch" || state.phase === "burn1") step = 0;
          else if (state.phase === "cruise") step = 1;
          else if (state.phase === "captured") step = 3;
          else step = 2;
          for (let i = 0; i < 3; i++) {
            dots[i].classList.remove("done", "current");
            labels[i].classList.remove("current");
            if (i < step) dots[i].classList.add("done");
            else if (i === step) {
              dots[i].classList.add("current");
              labels[i].classList.add("current");
            }
          }
          document.getElementById("stepIndicator").style.display =
            state.phase === "result" ? "none" : "flex";
        }

        function updateBurnLabel() {
          const lbl = document.getElementById("lblBurn");
          lbl.textContent =
            state.phase === "approach" || state.phase === "burn2"
              ? T("burn2")
              : T("burn1");
        }

        function updateBurnMeter() {
          const fillEl = document.getElementById("burnFill"),
            targetEl = document.getElementById("burnTarget");
          const ref = state.ref;
          if (!ref) return;
          const isBurn2Side =
            state.phase === "burn2" || state.phase === "approach";
          const currentBurn = isBurn2Side ? state.burn2 : state.burn1;
          const idealDv = isBurn2Side ? ref.dv2 : ref.dv1,
            maxDv = idealDv * 2;
          const pct = Math.min(100, (currentBurn.dvApplied / maxDv) * 100);
          fillEl.style.width = pct + "%";
          let greenFrac;
          const burnShrinkDur =
            state.difficulty === "medium"
              ? BURN_SHRINK_DUR_MED
              : BURN_SHRINK_DUR_HARD;
          let elapsed;
          if (state.phase === "burn1") {
            if (
              state.difficulty !== "easy" &&
              state.burn1LockedGreenFrac >= 0
            ) {
              elapsed = (performance.now() - state.burn1.holdStart) / 1000;
              greenFrac =
                state.burn1LockedGreenFrac *
                Math.max(0, 1 - elapsed / burnShrinkDur);
            } else {
              greenFrac =
                state.burn1LockedGreenFrac >= 0
                  ? state.burn1LockedGreenFrac
                  : 0;
            }
          } else if (state.phase === "burn2") {
            if (
              state.difficulty !== "easy" &&
              state.burn2LockedGreenFrac >= 0
            ) {
              elapsed = (performance.now() - state.burn2.holdStart) / 1000;
              greenFrac =
                state.burn2LockedGreenFrac *
                Math.max(0, 1 - elapsed / burnShrinkDur);
            } else {
              greenFrac =
                state.burn2LockedGreenFrac >= 0
                  ? state.burn2LockedGreenFrac
                  : 0;
            }
          } else {
            greenFrac = computeGreenFrac();
          }
          const greenHalfWidth = 0.375 * maxDv * greenFrac;
          let dvCenter = idealDv;
          if (
            (state.phase === "burn2" || state.phase === "approach") &&
            state.difficulty === "hard" &&
            greenFrac > 0
          ) {
            const bounceT = performance.now() / 1000;
            dvCenter +=
              BOUNCE_AMP_HARD *
              maxDv *
              Math.sin(TWO_PI * BOUNCE_FREQ_HARD * bounceT);
            dvCenter = Math.max(
              greenHalfWidth,
              Math.min(maxDv - greenHalfWidth, dvCenter),
            );
          }
          const dvLow = Math.max(0, dvCenter - greenHalfWidth),
            dvHigh = Math.min(maxDv, dvCenter + greenHalfWidth);
          fillEl.classList.remove("good", "over");
          if (currentBurn.dvApplied > 0 && greenFrac > 0) {
            if (
              currentBurn.dvApplied >= dvLow &&
              currentBurn.dvApplied <= dvHigh
            )
              fillEl.classList.add("good");
            else if (currentBurn.dvApplied > dvHigh)
              fillEl.classList.add("over");
          } else if (currentBurn.dvApplied > 0 && greenFrac <= 0) {
            if (currentBurn.dvApplied > idealDv) fillEl.classList.add("over");
          }
          if (greenFrac <= 0) {
            targetEl.style.display = "none";
          } else {
            targetEl.style.display = "";
            const left = (dvLow / maxDv) * 100,
              width = ((dvHigh - dvLow) / maxDv) * 100;
            targetEl.style.left = left + "%";
            targetEl.style.width = width + "%";
          }
        }

        function updateReadouts() {
          const ref = state.ref;
          if (!ref) return;
          document.getElementById("missionVal").textContent =
            T(state.homeKey) + " \u2192 " + T(state.destKey);
          const days = ref.tTransfer * 365.25;
          if (days < 365)
            document.getElementById("transferTimeVal").textContent =
              Math.round(days) + " " + T("days");
          else
            document.getElementById("transferTimeVal").textContent =
              ref.tTransfer.toFixed(2) + " " + T("years");
          document.getElementById("dv1Val").textContent =
            (ref.dv1 * AU_TO_KMS).toFixed(2) + " km/s";
          document.getElementById("dv2Val").textContent =
            (ref.dv2 * AU_TO_KMS).toFixed(2) + " km/s";
          const pAngle = currentPhaseAngle(state.simTime);
          const pDeg = (pAngle / DEG2RAD).toFixed(1),
            idealDeg = (ref.phaseAngle / DEG2RAD).toFixed(1);
          if (state.difficulty !== "hard")
            document.getElementById("phaseVal").textContent =
              pDeg + "\u00b0 / " + idealDeg + "\u00b0";
          else document.getElementById("phaseVal").textContent = "\u2014";
          let statusText;
          switch (state.phase) {
            case "prelaunch":
              statusText = isLaunchWindowOpen(state.simTime)
                ? T("goodWindow")
                : T("waiting");
              break;
            case "burn1":
              statusText = T("burning");
              break;
            case "cruise":
              statusText = T("cruising");
              break;
            case "approach":
              statusText = T("readyCapture");
              break;
            case "burn2":
              statusText = T("burning");
              break;
            case "captured":
              statusText = T("captured");
              break;
            case "result":
              statusText =
                state.resultType === "success" ? T("captured") : T("missed");
              break;
            default:
              statusText = "";
          }
          document.getElementById("statusVal").textContent = statusText;
        }

        function updateMETClock() {
          const el = document.getElementById("metClock");
          el.textContent = state.missionStarted
            ? formatMET(state.simTime)
            : "T+ 0" + T("days") + " 00" + T("hours");
          el.classList.toggle("paused", !state.playing);
        }

        function updateWarpBtns() {
          const locked = state.warpLocked,
            playing = state.playing;
          const nBtn = document.getElementById("warpNormalBtn"),
            fBtn = document.getElementById("warpFastBtn"),
            ffBtn = document.getElementById("warpFastestBtn");
          nBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "normal",
          );
          fBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "fast",
          );
          ffBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "fastest",
          );
          nBtn.textContent =
            playing && state.warpLevel === "normal"
              ? "\u25ae\u25ae"
              : T("warpNormal");
          fBtn.textContent =
            playing && state.warpLevel === "fast"
              ? "\u25ae\u25ae"
              : T("warpFast");
          ffBtn.textContent =
            playing && state.warpLevel === "fastest"
              ? "\u25ae\u25ae"
              : T("warpFastest");
          nBtn.disabled = locked;
          fBtn.disabled = locked;
          ffBtn.disabled = locked;
        }

        function populateHomeSelect() {
          const sel = document.getElementById("homeSelect");
          sel.textContent = "";
          for (let i = 0; i < PLANET_KEYS.length; i++) {
            const opt = document.createElement("option");
            opt.value = PLANET_KEYS[i];
            opt.textContent = T(PLANET_KEYS[i]);
            if (PLANET_KEYS[i] === state.homeKey) opt.selected = true;
            sel.appendChild(opt);
          }
        }

        function populateDestSelect() {
          const sel = document.getElementById("destSelect");
          sel.textContent = "";
          const neighbors = getNeighbors(state.homeKey);
          for (let i = 0; i < neighbors.length; i++) {
            const opt = document.createElement("option");
            opt.value = neighbors[i];
            opt.textContent = T(neighbors[i]);
            if (neighbors[i] === state.destKey) opt.selected = true;
            sel.appendChild(opt);
          }
          if (neighbors.indexOf(state.destKey) === -1) {
            state.destKey = neighbors[0];
            sel.value = state.destKey;
          }
        }

        document
          .getElementById("homeSelect")
          .addEventListener("change", function (e) {
            state.homeKey = e.target.value;
            state.homeM0Offset = 0;
            state.destM0Offset = 0;
            populateDestSelect();
            recalcMission();
            resetMission();
          });
        document
          .getElementById("destSelect")
          .addEventListener("change", function (e) {
            state.destKey = e.target.value;
            state.destM0Offset = 0;
            recalcMission();
            resetMission();
          });

        function setDifficulty(d) {
          state.difficulty = d;
          document
            .getElementById("diffEasyBtn")
            .classList.toggle("active", d === "easy");
          document
            .getElementById("diffMediumBtn")
            .classList.toggle("active", d === "medium");
          document
            .getElementById("diffHardBtn")
            .classList.toggle("active", d === "hard");
          if (d === "easy") state.tol = { phaseDeg: 10, burnPct: 0.15 };
          else if (d === "medium") state.tol = { phaseDeg: 6, burnPct: 0.09 };
          else state.tol = { phaseDeg: 3, burnPct: 0.05 };
          state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
          state.timeWarp = state.warpLevel
            ? state.warpLevels[state.warpLevel] || 1
            : 1;
          updateBurnMeter();
          updateReadouts();
        }

        function setWarp(level) {
          if (state.warpLocked) return;
          if (state.playing && state.warpLevel === level) {
            state.playing = false;
          } else {
            state.warpLevel = level;
            state.timeWarp = state.warpLevels[level] || 1;
            if (!state.playing) {
              state.playing = true;
              if (!state.missionStarted) state.missionStarted = true;
            }
          }
          updateWarpBtns();
          updateMETClock();
        }

        function resetMission() {
          state.simTime = 0;
          state.homeM0Offset = 0;
          state.destM0Offset = 0;
          state.phase = "prelaunch";
          state.burn1 = {
            holding: false,
            holdStart: 0,
            holdDuration: 0,
            dvApplied: 0,
            committed: false,
          };
          state.burn2 = {
            holding: false,
            holdStart: 0,
            holdDuration: 0,
            dvApplied: 0,
            committed: false,
          };
          state.sc = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            orbit: null,
            trail: [],
            launched: false,
          };
          state.resultType = null;
          state.resultData = {
            phaseAtLaunch: 0,
            dv1Error: 0,
            dv2Error: 0,
            phaseErrDeg: 0,
          };
          state.launchAngle = 0;
          state.arrivalTime = 0;
          state.insetBody = "home";
          state.insetScAngle = 0;
          state.captureAlpha = 1;
          state.captureApproachX = 0;
          state.captureApproachY = 0;
          state.burn1Good = false;
          state.transferArc = null;
          state.approachStart = 0;
          state.overlayDismissed = false;
          state.postResultStart = 0;
          state.windowOpenSimTime = 0;
          state.windowWasOpen = false;
          state.burn1LockedGreenFrac = -1;
          state.burn2LockedGreenFrac = -1;
          state.warpLocked = false;
          state.playing = false;
          state.missionStarted = false;
          state.warpLevel = "";
          state.timeWarp = 1;
          trailAccum = 0;
          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();
          updateEngineBtn();
          updateBurnLabel();
          updateBurnMeter();
          updateWarpBtns();
          updateReadouts();
          updateMETClock();
          document.getElementById("burnFill").style.width = "0%";
          document.getElementById("burnFill").classList.remove("good", "over");
          document.getElementById("burnTarget").style.display = "none";
        }

        function recalcMission() {
          state.ref = computeHohmannRef(state.homeKey, state.destKey);
          state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
          state.timeWarp = 1;
          state.warpLevel = "";
          const auto = computeAutoCamera();
          state.camera.targetScale = auto.scale;
          state.camera.cx = auto.cx;
          state.camera.cy = auto.cy;
          state.camera.scale = auto.scale;
          updateReadouts();
          updateBurnMeter();
          updateWarpBtns();
        }

        function renderInfoText() {
          const el = document.getElementById("infoText");
          el.textContent = "";
          const parts = T("infoParts");
          if (!parts || !Array.isArray(parts)) return;
          const p1 = document.createTextNode(parts[0]);
          el.appendChild(p1);
          el.appendChild(document.createElement("br"));
          el.appendChild(document.createElement("br"));
          if (parts[1]) el.appendChild(document.createTextNode(parts[1]));
          if (parts[2]) {
            const bold = document.createElement("b");
            bold.textContent = parts[2];
            el.appendChild(bold);
          }
          if (parts[3]) el.appendChild(document.createTextNode(parts[3]));
        }

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          document.getElementById("lblHome").textContent = T("home");
          document.getElementById("lblDest").textContent = T("destination");
          document.getElementById("lblDifficulty").textContent =
            T("difficulty");
          document.getElementById("diffEasyBtn").textContent = T("easy");
          document.getElementById("diffMediumBtn").textContent = T("medium");
          document.getElementById("diffHardBtn").textContent = T("hard");
          document.getElementById("lblTimeWarp").textContent = T("timeWarp");
          document.getElementById("warpNormalBtn").textContent =
            T("warpNormal");
          document.getElementById("warpFastBtn").textContent = T("warpFast");
          document.getElementById("warpFastestBtn").textContent =
            T("warpFastest");
          updateEngineBtn();
          document.getElementById("lblMission").textContent = T("mission");
          document.getElementById("lblTransferTime").textContent =
            T("transferTime");
          document.getElementById("lblDv1").textContent = T("dv1");
          document.getElementById("lblDv2").textContent = T("dv2");
          document.getElementById("lblPhase").textContent = T("phase");
          document.getElementById("lblStatus").textContent = T("status");
          document.getElementById("resetBtn").textContent = T("reset");
          renderInfoText();
          document.getElementById("langBtn").textContent =
            state.lang === "en" ? "PL" : "EN";
          populateHomeSelect();
          populateDestSelect();
          updateBurnLabel();
          updateReadouts();
          updateMETClock();
        }

        function toggleLang() {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        }

        let lastTimestamp = 0;
        let trailAccum = 0;
        let animFrameId = 0;

        function animate(timestamp) {
          if (!lastTimestamp) lastTimestamp = timestamp;
          const dtReal = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
          lastTimestamp = timestamp;
          if (state.playing && state.phase !== "result") {
            let dtSim;
            switch (state.phase) {
              case "prelaunch":
                {
                  const decelTarget = state.warpLevels.decel;
                  if (state.timeWarp > 1 && state.timeWarp > decelTarget) {
                    let shouldDecel = isLaunchWindowOpen(state.simTime);
                    if (!shouldDecel) {
                      const currentErr = Math.abs(phaseError(state.simTime));
                      const threshold = state.tol.phaseDeg * DEG2RAD;
                      if (currentErr > threshold) {
                        const synodicRate = Math.abs(
                          bodyByKey[state.homeKey].n -
                            bodyByKey[state.destKey].n,
                        );
                        const timeToWindow =
                          (currentErr - threshold) / synodicRate;
                        const warpFrame = state.timeWarp * SIM_RATE * MAX_DT;
                        const realTimeAtDecel =
                          timeToWindow / (decelTarget * SIM_RATE);
                        if (timeToWindow <= warpFrame * 2) shouldDecel = true;
                        else if (
                          state.timeWarp > state.warpLevels.normal &&
                          timeToWindow <=
                            state.warpLevels.normal * SIM_RATE * MAX_DT * 3
                        ) {
                          state.timeWarp = state.warpLevels.normal;
                          state.warpLevel = "normal";
                          updateWarpBtns();
                        } else if (realTimeAtDecel <= 2.5) shouldDecel = true;
                      } else shouldDecel = true;
                    }
                    if (shouldDecel) {
                      state.timeWarp = decelTarget;
                      state.warpLevel = "normal";
                      updateWarpBtns();
                    }
                  }
                  if (!state.draggingKey) {
                    dtSim = dtReal * state.timeWarp * SIM_RATE;
                    state.simTime += dtSim;
                  }
                  state.insetScAngle += dtReal * 2.0;
                  updateEngineBtn();
                  const windowNowOpen = isLaunchWindowOpen(state.simTime);
                  if (windowNowOpen && !state.windowWasOpen)
                    state.windowOpenSimTime = state.simTime;
                  state.windowWasOpen = windowNowOpen;
                  updateBurnMeter();
                }
                break;
              case "burn1":
                if (state.burn1.holding) {
                  state.burn1.holdDuration =
                    (performance.now() - state.burn1.holdStart) / 1000;
                  state.burn1.dvApplied =
                    state.ref.burnRate * state.burn1.holdDuration;
                  updateBurnMeter();
                }
                break;
              case "cruise":
                {
                  const cruiseWarp = Math.max(
                    1,
                    state.ref.tTransfer / 8 / SIM_RATE,
                  );
                  dtSim = dtReal * cruiseWarp * SIM_RATE;
                  state.simTime += dtSim;
                  if (state.transferArc) {
                    const arc = getTransferArcState(
                      state.transferArc,
                      state.simTime,
                    );
                    state.sc.x = arc.x;
                    state.sc.y = arc.y;
                    trailAccum += dtSim;
                    let guidedTrailInterval = state.ref.tTransfer / 500;
                    if (guidedTrailInterval < 0.0001)
                      guidedTrailInterval = 0.0001;
                    while (trailAccum >= guidedTrailInterval) {
                      trailAccum -= guidedTrailInterval;
                      state.sc.trail.push({ x: arc.x, y: arc.y });
                      if (state.sc.trail.length > 5000)
                        state.sc.trail.splice(0, 1);
                    }
                  } else if (state.sc.orbit) {
                    const pos = orbitPositionAt(state.sc.orbit, state.simTime);
                    state.sc.x = pos.x;
                    state.sc.y = pos.y;
                    trailAccum += dtSim;
                    let trailInterval = state.ref.tTransfer / 500;
                    if (trailInterval < 0.0001) trailInterval = 0.0001;
                    while (trailAccum >= trailInterval) {
                      trailAccum -= trailInterval;
                      state.sc.trail.push({ x: pos.x, y: pos.y });
                      if (state.sc.trail.length > 5000)
                        state.sc.trail.splice(0, 1);
                    }
                  }
                  checkArrival();
                }
                break;
              case "approach":
                state.insetScAngle -= dtReal * 1.5;
                updateBurnMeter();
                {
                  const approachElapsed =
                    (performance.now() - state.approachStart) / 1000;
                  if (approachElapsed >= APPROACH_DUR) {
                    state.resultData.dv2Error = 1;
                    state.transferArc = null;
                    state.phase = "result";
                    computeMissErrors();
                    state.resultType = "miss";
                    showResultOverlay();
                  }
                }
                break;
              case "burn2":
                if (state.burn2.holding) {
                  state.burn2.holdDuration =
                    (performance.now() - state.burn2.holdStart) / 1000;
                  state.burn2.dvApplied =
                    state.ref.burnRate * state.burn2.holdDuration;
                  updateBurnMeter();
                }
                break;
              case "captured":
                {
                  const captureElapsed =
                    (performance.now() - state.captureStart) / 1000;
                  const DISSOLVE_DUR = 0.5,
                    POST_CAPTURE_DUR = 2.0;
                  if (captureElapsed < DISSOLVE_DUR) {
                    const t = captureElapsed / DISSOLVE_DUR;
                    if (t > 0.4) state.captureAlpha = 1 - (t - 0.4) / 0.6;
                  } else {
                    state.captureAlpha = 0;
                    state.simTime += dtReal * SIM_RATE;
                  }
                  state.captureOrbitAngle += dtReal * 2.0;
                  state.insetScAngle = state.captureOrbitAngle;
                  if (captureElapsed >= DISSOLVE_DUR + POST_CAPTURE_DUR) {
                    state.phase = "result";
                    showResultOverlay();
                  }
                }
                break;
            }
          }
          if (state.phase === "result") {
            state.simTime += dtReal * SIM_RATE;
            if (state.burn2.committed) state.insetScAngle += dtReal * 2.0;
          }
          if (state.phase === "result" && state.overlayDismissed) {
            if ((performance.now() - state.postResultStart) / 1000 > 3.0)
              resetMission();
          }
          const auto = computeAutoCamera();
          state.camera.cx = 0;
          state.camera.cy = 0;
          state.camera.scale = auto.scale;
          drawScene();
          drawInset();
          updateReadouts();
          updatePrompt();
          updateStepIndicator();
          updateMETClock();
          animFrameId = requestAnimationFrame(animate);
        }

        document
          .getElementById("canvas")
          .addEventListener("click", function () {
            if (state.phase === "result" && state.overlayDismissed)
              resetMission();
          });

        function init() {
          resize();
          recalcMission();
          applyTranslations();
          setDifficulty("easy");
          updateWarpBtns();
          updateEngineBtn();
          updateBurnLabel();
          updatePrompt();
          updateStepIndicator();
          updateMETClock();
          document
            .getElementById("langBtn")
            .addEventListener("click", toggleLang);
          document
            .getElementById("diffEasyBtn")
            .addEventListener("click", function () {
              setDifficulty("easy");
            });
          document
            .getElementById("diffMediumBtn")
            .addEventListener("click", function () {
              setDifficulty("medium");
            });
          document
            .getElementById("diffHardBtn")
            .addEventListener("click", function () {
              setDifficulty("hard");
            });
          document
            .getElementById("warpNormalBtn")
            .addEventListener("click", function () {
              setWarp("normal");
            });
          document
            .getElementById("warpFastBtn")
            .addEventListener("click", function () {
              setWarp("fast");
            });
          document
            .getElementById("warpFastestBtn")
            .addEventListener("click", function () {
              setWarp("fastest");
            });
          document
            .getElementById("resetBtn")
            .addEventListener("click", resetMission);
          animFrameId = requestAnimationFrame(animate);
        }

        init();

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            cancelAnimationFrame(animFrameId);
            animFrameId = 0;
          } else {
            lastTimestamp = 0;
            animFrameId = requestAnimationFrame(animate);
          }
        });
      })();
    </script>
  </body>
</html>
