<title>Hohmann Transfer Game</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f18;
    --panel: #131825;
    --panel-border: #1e2a3a;
    --text: #c9d1d9;
    --text-dim: #6e7a8a;
    --accent: #58a6ff;
    --gain: #3fb950;
    --loss: #f97583;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
  }

  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .header-text { flex: 1; }
  header h1 { font-size: 22px; font-weight: 700; }
  header h1 a { color: inherit; text-decoration: none; }
  header h1 a:hover { opacity: .7; }
  header p { margin-top: 4px; font-size: 13px; color: var(--text-dim); }

  .lang-btn {
    background: none; border: 1px solid var(--panel-border);
    border-radius: 4px; padding: 3px 8px;
    cursor: pointer; flex-shrink: 0;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    transition: border-color 0.15s, color 0.15s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  .main { display: flex; height: calc(100vh - 80px); }

  .canvas-wrap {
    flex: 1; position: relative;
    background: #080c14; min-width: 0;
  }
  .canvas-wrap canvas { width: 100%; height: 100%; display: block; }

  .controls {
    width: 300px; flex-shrink: 0;
    padding: 20px;
    border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column; gap: 18px;
    overflow-y: auto;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim);
  }

  .type-toggle { display: flex; gap: 6px; }
  .type-btn {
    padding: 10px 4px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s; text-align: center;
    flex: 1;
  }
  .type-btn:hover:not(:disabled) { border-color: var(--accent); }
  .type-btn.active { border-color: var(--accent); color: var(--accent); }
  .type-btn:disabled { opacity: 0.3; pointer-events: none; }
  .type-btn.full-width { flex: none; width: 100%; }

  .planet-select {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; outline: none;
  }
  .planet-select:focus { border-color: var(--accent); }
  .planet-select option { background: var(--panel); color: var(--text); }

  .readouts { gap: 6px; }
  .readout-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .readout-label { color: var(--text-dim); }
  .readout-val { color: var(--text); }

  /* Engine button */
  .engine-btn {
    width: 100px; height: 100px; border-radius: 20px;
    border: none; outline: none;
    background:
      radial-gradient(circle at 38% 32%, rgba(255,255,255,0.25), transparent 45%),
      radial-gradient(circle, #e53935 0%, #d32f2f 50%, #b71c1c 100%);
    color: transparent; font-size: 0;
    cursor: pointer; transition: all 0.2s;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    box-shadow:
      inset 0 -4px 6px rgba(0,0,0,0.3),
      0 0 0 3px rgba(180,220,220,0.5),
      0 0 0 14px #9e9e9e,
      0 0 0 16px #757575,
      0 6px 20px rgba(0,0,0,0.5);
    margin: 28px auto 8px;
    display: block;
  }
  .engine-btn.armed {
    box-shadow:
      inset 0 -4px 6px rgba(0,0,0,0.3),
      0 0 0 3px rgba(88,166,255,0.7),
      0 0 0 14px #9e9e9e,
      0 0 0 16px #757575,
      0 0 20px rgba(88,166,255,0.3);
    animation: pulseEngine 1.5s ease-in-out infinite;
  }
  .engine-btn.firing {
    background:
      radial-gradient(circle at 38% 32%, rgba(255,255,255,0.35), transparent 45%),
      radial-gradient(circle, #ff7043 0%, #f4511e 50%, #e64a19 100%);
    box-shadow:
      inset 0 -4px 6px rgba(0,0,0,0.2),
      0 0 0 3px rgba(63,185,80,0.7),
      0 0 0 14px #9e9e9e,
      0 0 0 16px #757575,
      0 0 24px rgba(255,87,34,0.5);
    animation: none;
  }
  .engine-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
    animation: none;
  }
  .engine-btn:active:not(:disabled) {
    transform: scale(0.96);
  }
  @keyframes pulseEngine {
    0%, 100% {
      box-shadow:
        inset 0 -4px 6px rgba(0,0,0,0.3),
        0 0 0 3px rgba(88,166,255,0.7),
        0 0 0 14px #9e9e9e,
        0 0 0 16px #757575,
        0 0 0 0 rgba(88,166,255,0);
    }
    50% {
      box-shadow:
        inset 0 -4px 6px rgba(0,0,0,0.3),
        0 0 0 3px rgba(88,166,255,0.9),
        0 0 0 14px #9e9e9e,
        0 0 0 16px #757575,
        0 0 20px 6px rgba(88,166,255,0.35);
    }
  }

  /* Burn meter */
  .burn-meter-wrap { position: relative; width: 100%; height: 40px; }
  .burn-meter {
    width: 100%; height: 36px; margin-top: 0;
    background: var(--panel-border); border-radius: 4px; overflow: hidden;
    position: relative;
  }
  .burn-fill {
    height: 100%; width: 0%;
    background: var(--accent); border-radius: 4px;
    transition: background 0.15s;
  }
  .burn-fill.over { background: var(--loss); }
  .burn-fill.good { background: var(--gain); }
  .burn-target {
    position: absolute; top: 0; height: 100%;
    border-left: 3px solid #1a7f37;
    border-right: 3px solid #1a7f37;
    background: rgba(63,185,80,0.15);
    pointer-events: none;
  }

  /* Play/Pause icon toggle */
  #playBtn { display: flex; align-items: center; justify-content: center; }
  #playBtn .pause-icon { display: none; }
  #playBtn.playing .play-icon { display: none; }
  #playBtn.playing .pause-icon { display: block; }

  .info-text {
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
  }

  /* Canvas prompt overlay */
  .canvas-prompt {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; border-radius: 8px;
    background: rgba(11,15,24,0.85);
    border: 1px solid var(--panel-border);
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    pointer-events: none;
    transition: color 0.3s, border-color 0.3s;
    white-space: nowrap;
    z-index: 10;
  }
  .canvas-prompt.highlight {
    color: var(--gain);
    border-color: var(--gain);
    animation: promptPulse 1s ease-in-out infinite;
  }
  .canvas-prompt.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .canvas-prompt.cruise {
    color: var(--text-dim);
    border-color: var(--panel-border);
  }
  @keyframes promptPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
    50% { box-shadow: 0 0 14px 3px rgba(63,185,80,0.3); }
  }

  /* MET clock */
  .met-clock {
    position: absolute;
    top: 16px; left: 16px;
    padding: 6px 14px; border-radius: 6px;
    background: rgba(11,15,24,0.85);
    border: 1px solid var(--panel-border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px; letter-spacing: 1px;
    color: var(--accent);
    pointer-events: none; z-index: 10;
    text-shadow: 0 0 8px rgba(88,166,255,0.3);
    transition: opacity 0.3s;
  }
  .met-clock.paused { opacity: 0.7; }

  /* Step indicator */
  .step-indicator {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center;
    pointer-events: none; z-index: 10;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
  }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--text-dim);
    background: transparent;
    transition: all 0.3s;
  }
  .step-dot.done { background: var(--gain); border-color: var(--gain); }
  .step-dot.current { border-color: var(--accent); box-shadow: 0 0 6px rgba(88,166,255,0.5); }
  .step-label { color: var(--text-dim); margin: 0 2px; }
  .step-label.current { color: var(--accent); }

  /* Inset */
  .inset-wrap {
    position: absolute; left: 12px; bottom: 12px;
    width: 150px; height: 150px;
    border: 1px solid var(--panel-border);
    border-radius: 8px; overflow: hidden;
    pointer-events: none;
  }
  .inset-wrap canvas { width: 100%; height: 100%; display: block; }

  /* Result overlay */
  .result-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    animation: overlayFadeIn 0.3s ease;
  }
  .overlay-emoji { font-size: 72px; animation: overlayPop 0.4s ease; }
  .overlay-msg {
    font-family: 'Outfit', sans-serif;
    font-size: 24px; font-weight: 700;
    margin-top: 16px; color: #fff;
  }
  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px; margin-top: 8px; color: rgba(255,255,255,0.85);
  }
  .overlay-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; margin-top: 12px; color: rgba(255,255,255,0.5);
  }

  @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes overlayPop {
    0% { transform: scale(0.3); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .canvas-wrap { min-height: 350px; flex: 1; }
    .controls {
      width: 100%; flex-direction: row; flex-wrap: wrap;
      border-left: none; border-top: 1px solid var(--panel-border);
      padding: 12px 16px; gap: 12px;
    }
    .ctrl-group { min-width: 140px; flex: 1; }
    .met-clock { font-size: 12px; padding: 4px 10px; top: 10px; left: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1><a href="/learn/"><span style="font-size:18px;line-height:1">&#x1F680;</span></a> <span id="titleText">Hohmann Transfer Game</span></h1>
    <p id="subtitleText">Time your launch and burns to transfer between planets on a minimum-energy Hohmann transfer.</p>
  </div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">PL</button>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="met-clock" id="metClock">T+ 0d 00h</div>
    <div class="canvas-prompt" id="canvasPrompt"></div>
    <div class="step-indicator" id="stepIndicator">
      <span class="step-label current" id="stepLbl1">1 Launch</span>
      <div class="step-dot current" id="stepDot1"></div>
      <span class="step-label" id="stepLbl2">2 Coast</span>
      <div class="step-dot" id="stepDot2"></div>
      <span class="step-label" id="stepLbl3">3 Arrive</span>
      <div class="step-dot" id="stepDot3"></div>
    </div>
    <div class="inset-wrap">
      <canvas id="insetCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label" id="lblHome">Home</span>
      <select class="planet-select" id="homeSelect"></select>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label" id="lblDest">Destination</span>
      <select class="planet-select" id="destSelect"></select>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label" id="lblDifficulty">Difficulty</span>
      <div class="type-toggle">
        <button class="type-btn active" id="diffEasyBtn" onclick="setDifficulty('easy')">★</button>
        <button class="type-btn" id="diffMediumBtn" onclick="setDifficulty('medium')">★★</button>
        <button class="type-btn" id="diffHardBtn" onclick="setDifficulty('hard')">★★★</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label" id="lblTimeWarp">Time Warp</span>
      <div class="type-toggle">
        <button class="type-btn active" id="warpNormalBtn" onclick="setWarp('normal')">▶</button>
        <button class="type-btn" id="warpFastBtn" onclick="setWarp('fast')">▶▶</button>
        <button class="type-btn" id="warpFastestBtn" onclick="setWarp('fastest')">▶▶▶</button>
      </div>
    </div>

    <div class="ctrl-group">
      <button class="engine-btn" id="engineBtn"></button>
    </div>

    <div class="ctrl-group" id="grpBurnMeter">
      <span class="ctrl-label" id="lblBurn">Burn 1</span>
      <div class="burn-meter-wrap">
        <div class="burn-meter">
          <div class="burn-target" id="burnTarget"></div>
          <div class="burn-fill" id="burnFill"></div>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="type-toggle">
        <button class="type-btn" id="playBtn" onclick="togglePlay()" title="Play">
          <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="7,5 19,12 7,19"/></svg>
          <svg class="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
        </button>
        <button class="type-btn" id="resetBtn" onclick="resetMission()">Reset</button>
      </div>
    </div>

    <div class="ctrl-group readouts" id="grpReadouts">
      <div class="readout-row">
        <span class="readout-label" id="lblMission">Mission</span>
        <span class="readout-val" id="missionVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblTransferTime">Transfer time</span>
        <span class="readout-val" id="transferTimeVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblDv1">Departure &Delta;v</span>
        <span class="readout-val" id="dv1Val">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblDv2">Arrival &Delta;v</span>
        <span class="readout-val" id="dv2Val">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblPhase">Phase angle</span>
        <span class="readout-val" id="phaseVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblStatus">Status</span>
        <span class="readout-val" id="statusVal">&mdash;</span>
      </div>
    </div>

    <div class="ctrl-group info-text">
      <span id="infoText"></span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════ */
/* Constants                                      */
/* ══════════════════════════════════════════════ */

var TWO_PI = 2 * Math.PI;
var DEG2RAD = Math.PI / 180;
var MU_SUN = 4 * Math.PI * Math.PI; // AU^3/yr^2
var SIM_RATE = 1 / 15; // years per real-second at x1
var APPROACH_DUR = 3.0; // seconds — arrival timing window
var BURN_SHRINK_DUR_MED = 5.0; // seconds — green zone vanishes after burn start (medium)
var BURN_SHRINK_DUR_HARD = 3.0; // seconds — green zone vanishes after burn start (hard)
var BOUNCE_AMP_HARD = 0.15;    // green zone center oscillation amplitude (hard, burn2 only)
var BOUNCE_FREQ_HARD = 0.8;    // green zone bounce frequency in Hz (hard, burn2 only)
var MAX_DT = 0.05; // cap real dt at 50 ms
var AU_TO_KMS = 4.7405; // 1 AU/yr in km/s (approx)

/* ══════════════════════════════════════════════ */
/* Orbital Data                                   */
/* ══════════════════════════════════════════════ */

var BODIES = [
  { key: 'sun',     color: '#FFD700', glow: '255,215,0',   radius: 14, a: 0,       e: 0,      T: 0,       pomega: 0,      L0: 0 },
  { key: 'mercury', color: '#A0A0A0', glow: '160,160,160', radius: 3,  a: 0.3871,  e: 0.2056, T: 0.2408,  pomega: 77.46,  L0: 252.25 },
  { key: 'venus',   color: '#F5DEB3', glow: '245,222,179', radius: 4,  a: 0.7233,  e: 0.0068, T: 0.6152,  pomega: 131.60, L0: 181.98 },
  { key: 'earth',   color: '#4db8ff', glow: '77,184,255',  radius: 5,  a: 1.0000,  e: 0.0167, T: 1.0000,  pomega: 102.93, L0: 100.47 },
  { key: 'mars',    color: '#E05030', glow: '224,80,48',   radius: 4,  a: 1.5237,  e: 0.0934, T: 1.8809,  pomega: 336.08, L0: 355.43 },
  { key: 'jupiter', color: '#D4944A', glow: '212,148,74',  radius: 8,  a: 5.2034,  e: 0.0484, T: 11.862,  pomega: 14.33,  L0: 34.40 },
  { key: 'saturn',  color: '#C8A84C', glow: '200,168,76',  radius: 7,  a: 9.5371,  e: 0.0542, T: 29.457,  pomega: 93.06,  L0: 49.94 },
  { key: 'uranus',  color: '#7CC8D8', glow: '124,200,216', radius: 5,  a: 19.1913, e: 0.0472, T: 84.021,  pomega: 173.00, L0: 313.23 },
  { key: 'neptune', color: '#4060C0', glow: '64,96,192',   radius: 5,  a: 30.0690, e: 0.0086, T: 164.8,   pomega: 48.12,  L0: 304.88 }
];

BODIES.forEach(function(b) {
  if (b.key === 'sun') return;
  b.pomegaRad = b.pomega * DEG2RAD;
  b.L0rad = b.L0 * DEG2RAD;
  b.n = TWO_PI / b.T;
  b.M0 = b.L0rad - b.pomegaRad;
  b.bSemi = b.a * Math.sqrt(1 - b.e * b.e);
  b.cosPom = Math.cos(b.pomegaRad);
  b.sinPom = Math.sin(b.pomegaRad);
});

var bodyByKey = {};
BODIES.forEach(function(b) { bodyByKey[b.key] = b; });

var PLANET_KEYS = ['mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'];

function getNeighbors(homeKey) {
  var idx = PLANET_KEYS.indexOf(homeKey);
  var result = [];
  if (idx > 0) result.push(PLANET_KEYS[idx - 1]);
  if (idx < PLANET_KEYS.length - 1) result.push(PLANET_KEYS[idx + 1]);
  return result;
}

/* ══════════════════════════════════════════════ */
/* I18N                                           */
/* ══════════════════════════════════════════════ */

var I18N = {
  en: {
    title: 'Hohmann Transfer Game',
    subtitle: 'Time your launch and burns to transfer between planets on a minimum-energy Hohmann transfer.',
    home: 'Home',
    destination: 'Destination',
    difficulty: 'Difficulty',
    easy: '\u2605', medium: '\u2605\u2605', hard: '\u2605\u2605\u2605',
    timeWarp: 'Time Warp',
    warpNormal: '\u25b6', warpFast: '\u25b6\u25b6', warpFastest: '\u25b6\u25b6\u25b6',
    engine: 'ENGINE',
    burn: 'Burn',
    burn1: 'Burn 1', burn2: 'Burn 2',
    mission: 'Mission',
    transferTime: 'Transfer time',
    dv1: 'Departure \u0394v',
    dv2: 'Arrival \u0394v',
    phase: 'Phase angle',
    status: 'Status',
    play: 'Play', pause: 'Pause', reset: 'Reset',
    mercury: 'Mercury', venus: 'Venus', earth: 'Earth', mars: 'Mars',
    jupiter: 'Jupiter', saturn: 'Saturn', uranus: 'Uranus', neptune: 'Neptune',
    waiting: 'Waiting for window',
    goodWindow: 'Window open \u2014 fire!',
    burning: 'Burning...',
    cruising: 'Cruising',
    readyCapture: 'Approaching target!',
    captured: 'Orbit matched!',
    missed: 'Missed',
    tooEarly: 'Too early',
    tooLate: 'Too late',
    promptWait: 'Use time warp and wait for the launch window',
    promptWindow: 'LAUNCH WINDOW! Hold ENGINE now!',
    promptBurn1: 'Hold ENGINE \u2014 release in the green zone',
    promptCruise: 'Coasting to destination...',
    promptApproach: 'Hold ENGINE for arrival burn!',
    promptBurn2: 'Hold ENGINE \u2014 release in the green zone',
    engineWait: 'WAIT...',
    engineLaunch: 'HOLD TO LAUNCH',

function formatMET(simYears) {
  var totalDays = simYears * 365.25;
  var years = Math.floor(simYears);
  var daysInYear = totalDays - years * 365.25;
  var days = Math.floor(daysInYear);
  var hours = Math.floor((daysInYear - days) * 24);
  var hStr = (hours < 10 ? '0' : '') + hours;
  if (years >= 1) {
    return 'T+ ' + years + T('years') + ' ' + days + T('days') + ' ' + hStr + T('hours');
  }
  return 'T+ ' + days + T('days') + ' ' + hStr + T('hours');
}

/* ══════════════════════════════════════════════ */
/* Physics — Kepler Solver                        */
/* ══════════════════════════════════════════════ */

function wrapAngle(a) {
  a = a % TWO_PI;
  if (a > Math.PI) a -= TWO_PI;
  if (a < -Math.PI) a += TWO_PI;
  return a;
}

function solveKepler(M, e) {
  var m = M % TWO_PI;
  if (m > Math.PI) m -= TWO_PI;
  if (m < -Math.PI) m += TWO_PI;
  var E = m;
  for (var i = 0; i < 15; i++) {
    var dE = (E - e * Math.sin(E) - m) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-12) break;
  }
  if (isNaN(E) || !isFinite(E)) E = m;
  return E;
}

function helioPosition(body, t) {
  if (body.key === 'sun') return { x: 0, y: 0 };
  var M = body.M0 + body.n * t;
  var E = solveKepler(M, body.e);
  var xp = body.a * (Math.cos(E) - body.e);
  var yp = body.bSemi * Math.sin(E);
  return {
    x: xp * body.cosPom - yp * body.sinPom,
    y: xp * body.sinPom + yp * body.cosPom
  };
}

function orbitRadiusAtAngle(body, alpha) {
  var p = body.a * (1 - body.e * body.e);
  return p / (1 + body.e * Math.cos(alpha - body.pomegaRad));
}

function helioVelocity(body, t) {
  if (body.key === 'sun') return { vx: 0, vy: 0 };
  var M = body.M0 + body.n * t;
  var E = solveKepler(M, body.e);
  var sinE = Math.sin(E);
  var cosE = Math.cos(E);
  var denom = 1 - body.e * cosE;
  var factor = body.n * body.a / denom;
  var vxp = -factor * sinE;
  var vyp = factor * (body.bSemi / body.a) * cosE;
  return {
    vx: vxp * body.cosPom - vyp * body.sinPom,
    vy: vxp * body.sinPom + vyp * body.cosPom
  };
}

/* ══════════════════════════════════════════════ */
/* Hohmann Reference Solver                       */
/* ══════════════════════════════════════════════ */

function computeHohmannRef(homeKey, destKey) {
  var home = bodyByKey[homeKey];
  var dest = bodyByKey[destKey];
  var r1 = home.a;
  var r2 = dest.a;
  var aT = (r1 + r2) / 2;
  var tT = 0.5 * Math.pow(aT, 1.5);

  var vCirc1 = Math.sqrt(MU_SUN / r1);
  var vCirc2 = Math.sqrt(MU_SUN / r2);
  var vDep = Math.sqrt(MU_SUN * (2 / r1 - 1 / aT));
  var vArr = Math.sqrt(MU_SUN * (2 / r2 - 1 / aT));
  var dv1 = Math.abs(vDep - vCirc1);
  var dv2 = Math.abs(vCirc2 - vArr);

  var n2 = TWO_PI / dest.T;
  var phi = wrapAngle(Math.PI - n2 * tT);

  var maxDv = Math.max(dv1, dv2);
  var burnRate = maxDv / 2.0;

  return {
    aTransfer: aT,
    tTransfer: tT,
    dv1: dv1,
    dv2: dv2,
    vCircHome: vCirc1,
    vCircDest: vCirc2,
    vDep: vDep,
    vArr: vArr,
    phaseAngle: phi,
    burnRate: burnRate,
    holdTime1: dv1 / burnRate,
    holdTime2: dv2 / burnRate,
    outward: dest.a > home.a
  };
}

function computeWarpLevels(homeKey, destKey) {
  var home = bodyByKey[homeKey];
  var dest = bodyByKey[destKey];
  var synodicRate = Math.abs(home.n - dest.n);
  var synodic = TWO_PI / synodicRate;
  var windowDur = 2 * state.tol.phaseDeg * DEG2RAD / synodicRate;

  var MAX_WINDOW_SEC = 8;
  var baseDecel = (state.difficulty === 'easy') ? 0.5 : 1;
  var windowRealSec = windowDur / (baseDecel * SIM_RATE);
  var decel = (windowRealSec > MAX_WINDOW_SEC)
    ? Math.ceil(windowDur / (MAX_WINDOW_SEC * SIM_RATE))
    : baseDecel;

  return {
    normal: Math.max(1, Math.round(synodic * 1.5)),
    fast: Math.max(2, Math.round(synodic * 5)),
    fastest: Math.max(5, Math.round(synodic * 15)),
    decel: decel,
    windowDur: windowDur
  };
}

function computeGreenFrac() {
  if (state.phase === 'prelaunch') {
    if (!isLaunchWindowOpen(state.simTime)) return 0;
    var elapsed = state.simTime - state.windowOpenSimTime;
    var dur = state.warpLevels ? state.warpLevels.windowDur : 0;
    if (dur <= 0) return 0;
    return Math.max(0, Math.min(1, 1 - elapsed / dur));
  }
  if (state.phase === 'approach') {
    var approachElapsed = (performance.now() - state.approachStart) / 1000;
    return Math.max(0, Math.min(1, 1 - approachElapsed / APPROACH_DUR));
  }
  return 0;
}

/* ══════════════════════════════════════════════ */
/* Phase Angle                                    */
/* ══════════════════════════════════════════════ */

function currentPhaseAngle(t) {
  var hp = helioPosition(bodyByKey[state.homeKey], t);
  var dp = helioPosition(bodyByKey[state.destKey], t);
  var ha = Math.atan2(hp.y, hp.x);
  var da = Math.atan2(dp.y, dp.x);
  return wrapAngle(da - ha);
}

function phaseError(t) {
  var current = currentPhaseAngle(t);
  var ideal = state.ref.phaseAngle;
  return wrapAngle(current - ideal);
}

function isLaunchWindowOpen(t) {
  var err = Math.abs(phaseError(t));
  return err <= state.tol.phaseDeg * DEG2RAD;
}

/* ══════════════════════════════════════════════ */
/* Spacecraft Orbit from State Vector             */
/* ══════════════════════════════════════════════ */

function stateToOrbit(x, y, vx, vy, tEpoch) {
  var r = Math.sqrt(x * x + y * y);
  var v2 = vx * vx + vy * vy;
  var h = x * vy - y * vx;
  var a = 1 / (2 / r - v2 / MU_SUN);

  // Detect unbound (hyperbolic/parabolic) trajectories
  if (a <= 0 || isNaN(a) || !isFinite(a)) {
    return { conicType: 'escape', a: a, e: 2, h: h, tEpoch: tEpoch };
  }

  var rdot = (x * vx + y * vy) / r;
  var ex = (v2 / MU_SUN - 1 / r) * x - rdot / MU_SUN * r * vx;
  var ey = (v2 / MU_SUN - 1 / r) * y - rdot / MU_SUN * r * vy;
  var e = Math.sqrt(ex * ex + ey * ey);

  if (e >= 1) {
    return { conicType: 'escape', a: a, e: e, h: h, tEpoch: tEpoch };
  }

  var pomegaRad = Math.atan2(ey, ex);
  var bSemi = a * Math.sqrt(1 - e * e);

  var cosNu = (ex * x + ey * y) / (e * r + 1e-30);
  var sinNu = (ex * y - ey * x) / (e * r + 1e-30);
  var nu = Math.atan2(sinNu, cosNu);

  var sinNu2 = Math.sin(nu);
  var cosNu2 = Math.cos(nu);
  var E = Math.atan2(Math.sqrt(1 - e * e) * sinNu2, e + cosNu2);
  var M0 = E - e * Math.sin(E);
  var n = Math.sqrt(MU_SUN / (a * a * a));

  return {
    conicType: 'elliptic',
    a: a, e: e, pomegaRad: pomegaRad, bSemi: bSemi,
    cosPom: Math.cos(pomegaRad), sinPom: Math.sin(pomegaRad),
    n: n, M0: M0, tEpoch: tEpoch, h: h
  };
}

function orbitPositionAt(orb, t) {
  var dt = t - orb.tEpoch;
  var M = orb.M0 + orb.n * dt;
  var E = solveKepler(M, orb.e);
  var xp = orb.a * (Math.cos(E) - orb.e);
  var yp = orb.bSemi * Math.sin(E);
  return {
    x: xp * orb.cosPom - yp * orb.sinPom,
    y: xp * orb.sinPom + yp * orb.cosPom
  };
}

function orbitVelocityAt(orb, t) {
  var dt = t - orb.tEpoch;
  var M = orb.M0 + orb.n * dt;
  var E = solveKepler(M, orb.e);
  var sinE = Math.sin(E);
  var cosE = Math.cos(E);
  var denom = 1 - orb.e * cosE;
  var factor = orb.n * orb.a / denom;
  var vxp = -factor * sinE;
  var vyp = factor * (orb.bSemi / orb.a) * cosE;
  return {
    vx: vxp * orb.cosPom - vyp * orb.sinPom,
    vy: vxp * orb.sinPom + vyp * orb.cosPom
  };
}

function smoothStep01(t) {
  return t * t * (3 - 2 * t);
}

function buildTransferArc(tStart) {
  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];
  var launchPos = helioPosition(home, tStart);
  var tArrival = tStart + state.ref.tTransfer;
  var arrivalPos = helioPosition(dest, tArrival);
  var alpha1 = Math.atan2(launchPos.y, launchPos.x);
  var alpha2 = Math.atan2(arrivalPos.y, arrivalPos.x);
  var dAlpha = alpha2 - alpha1;
  var points = [];
  var samples = 360;
  var i, u, alpha, rArc;

  while (dAlpha <= 0) dAlpha += TWO_PI;

  // Hohmann transfer ellipse from actual launch/arrival radii
  var r1 = Math.sqrt(launchPos.x * launchPos.x + launchPos.y * launchPos.y);
  var r2 = Math.sqrt(arrivalPos.x * arrivalPos.x + arrivalPos.y * arrivalPos.y);
  var aT = (r1 + r2) / 2;
  var eT = Math.abs(r2 - r1) / (r1 + r2);
  var pT = aT * (1 - eT * eT);
  var outward = r2 >= r1;

  for (i = 0; i <= samples; i++) {
    u = i / samples;
    alpha = alpha1 + dAlpha * u;
    // True anomaly on the transfer ellipse: 0 (periapsis) to π (apoapsis)
    var nu = outward ? Math.PI * u : Math.PI * (1 - u);
    rArc = pT / (1 + eT * Math.cos(nu));
    points.push({
      x: rArc * Math.cos(alpha),
      y: rArc * Math.sin(alpha)
    });
  }

  points[0] = { x: launchPos.x, y: launchPos.y };
  points[points.length - 1] = { x: arrivalPos.x, y: arrivalPos.y };

  return {
    tStart: tStart,
    tTransfer: state.ref.tTransfer,
    tArrival: tArrival,
    points: points,
    eT: eT,
    outward: outward
  };
}

function getTransferArcState(arc, t) {
  var progress = (t - arc.tStart) / arc.tTransfer;

  if (progress < 0) progress = 0;
  if (progress > 1) progress = 1;

  // Kepler timing: time → mean anomaly → eccentric anomaly → true anomaly
  // Outward: periapsis at launch (M: 0→π). Inward: apoapsis at launch (M: π→0).
  var M = arc.outward ? Math.PI * progress : Math.PI * (1 - progress);
  var E = solveKepler(M, arc.eT);
  var nu = 2 * Math.atan2(
    Math.sqrt(1 + arc.eT) * Math.sin(E / 2),
    Math.sqrt(1 - arc.eT) * Math.cos(E / 2)
  );
  // Map true anomaly to arc parameter u (arc points indexed by ν/π)
  var u = arc.outward ? nu / Math.PI : 1 - nu / Math.PI;
  u = Math.max(0, Math.min(1, u));

  var scaled = u * (arc.points.length - 1);
  var idx = Math.floor(scaled);
  var frac = scaled - idx;
  var p0 = arc.points[idx];
  var p1 = arc.points[Math.min(idx + 1, arc.points.length - 1)];
  var prev = arc.points[Math.max(idx - 1, 0)];
  var next = arc.points[Math.min(idx + 1, arc.points.length - 1)];

  return {
    x: p0.x + (p1.x - p0.x) * frac,
    y: p0.y + (p1.y - p0.y) * frac,
    dx: next.x - prev.x,
    dy: next.y - prev.y,
    progress: progress,
    done: progress >= 1
  };
}

function resize() {
  var rect = canvas.parentElement.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var iRect = insetCanvas.parentElement.getBoundingClientRect();
  iW = iRect.width;
  iH = iRect.height;
  insetCanvas.width = iW * dpr;
  insetCanvas.height = iH * dpr;
  insetCanvas.style.width = iW + 'px';
  insetCanvas.style.height = iH + 'px';
  ictx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* Starfield                                      */

var bgStars = [];
function initBgStars(n) {
  bgStars = [];
  for (var i = 0; i < n; i++) {
    bgStars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.3,
      b: Math.random() * 0.4 + 0.2
    });
  }
}
initBgStars(200);

/* ══════════════════════════════════════════════ */
/* Camera                                         */
/* ══════════════════════════════════════════════ */

function computeAutoCamera() {
  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];
  var maxR = Math.max(home.a * (1 + home.e), dest.a * (1 + dest.e));
  var margin = maxR * 1.2;
  return { cx: 0, cy: 0, scale: Math.min(W, H) / 2 / margin };
}

function toCanvas(auX, auY) {
  return {
    cx: W / 2 + (auX - state.camera.cx) * state.camera.scale,
    cy: H / 2 - (auY - state.camera.cy) * state.camera.scale
  };
}

/* ══════════════════════════════════════════════ */
/* Drawing                                        */
/* ══════════════════════════════════════════════ */

function drawStarfield() {
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, TWO_PI);
    ctx.fillStyle = 'rgba(200,210,220,' + (s.b * 0.3) + ')';
    ctx.fill();
  }
}

function drawOrbitEllipse(body, alpha) {
  if (body.key === 'sun') return;
  var cxAu = -body.a * body.e * body.cosPom;
  var cyAu = -body.a * body.e * body.sinPom;
  var cc = toCanvas(cxAu, cyAu);
  ctx.beginPath();
  ctx.ellipse(cc.cx, cc.cy, body.a * state.camera.scale, body.bSemi * state.camera.scale, -body.pomegaRad, 0, TWO_PI);
  ctx.strokeStyle = 'rgba(' + body.glow + ',' + alpha + ')';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBody(body, t) {
  var pos = helioPosition(body, t);
  var cc = toCanvas(pos.x, pos.y);
  var r = body.radius;
  if (body.key === 'sun') {
    var grad = ctx.createRadialGradient(cc.cx, cc.cy, 0, cc.cx, cc.cy, r * 2.5);
    grad.addColorStop(0, 'rgba(' + body.glow + ',0.6)');
    grad.addColorStop(1, 'rgba(' + body.glow + ',0)');
    ctx.beginPath();
    ctx.arc(cc.cx, cc.cy, r * 2.5, 0, TWO_PI);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cc.cx, cc.cy, r, 0, TWO_PI);
  ctx.fillStyle = body.color;
  ctx.fill();

  if (body.key !== 'sun') {
    var label = T(body.key);
    ctx.font = '15px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(' + body.glow + ',0.7)';
    ctx.textAlign = 'center';
    ctx.fillText(label, cc.cx, cc.cy - r - 5);
  }
}

function drawLaunchWindowGuide() {
  if (state.phase !== 'prelaunch') return;
  if (!state.ref) return;

  var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
  var dp = helioPosition(bodyByKey[state.destKey], state.simTime);
  var homeAngle = Math.atan2(hp.y, hp.x);
  var idealDestAngle = homeAngle + state.ref.phaseAngle;
  var tolRad = state.tol.phaseDeg * DEG2RAD;
  var dest = bodyByKey[state.destKey];
  var windowOpen = isLaunchWindowOpen(state.simTime);

  var hcc = toCanvas(hp.x, hp.y);
  var alpha = windowOpen ? 0.35 : 0.10;

  // Cone edges: find exact orbit radius at each edge angle, extend 5% past
  var edgeAngle1 = idealDestAngle + tolRad;
  var edgeAngle2 = idealDestAngle - tolRad;

  var r1 = orbitRadiusAtAngle(dest, edgeAngle1);
  var orb1x = r1 * Math.cos(edgeAngle1);
  var orb1y = r1 * Math.sin(edgeAngle1);
  var d1x = orb1x - hp.x, d1y = orb1y - hp.y;
  var ep1 = toCanvas(orb1x + 0.05 * d1x, orb1y + 0.05 * d1y);
  var e1x = ep1.cx, e1y = ep1.cy;

  var r2 = orbitRadiusAtAngle(dest, edgeAngle2);
  var orb2x = r2 * Math.cos(edgeAngle2);
  var orb2y = r2 * Math.sin(edgeAngle2);
  var d2x = orb2x - hp.x, d2y = orb2y - hp.y;
  var ep2 = toCanvas(orb2x + 0.05 * d2x, orb2y + 0.05 * d2y);
  var e2x = ep2.cx, e2y = ep2.cy;

  // Filled triangle
  ctx.beginPath();
  ctx.moveTo(hcc.cx, hcc.cy);
  ctx.lineTo(e1x, e1y);
  ctx.lineTo(e2x, e2y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(63,185,80,' + alpha + ')';
  ctx.fill();

  // Triangle border — uniform thickness
  ctx.beginPath();
  ctx.moveTo(hcc.cx, hcc.cy);
  ctx.lineTo(e1x, e1y);
  ctx.lineTo(e2x, e2y);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(63,185,80,' + (windowOpen ? 0.5 : 0.2) + ')';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pulsing highlight on destination when window is open
  if (windowOpen) {
    var dcc = toCanvas(dp.x, dp.y);
    var pulse = 12 + 4 * Math.sin(Date.now() / 200);
    ctx.beginPath();
    ctx.arc(dcc.cx, dcc.cy, pulse, 0, TWO_PI);
    ctx.strokeStyle = 'rgba(63,185,80,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}


function getScAngle() {
  // Compute spacecraft heading from velocity or orbit
  if (state.phase === 'captured') {
    var dv = helioVelocity(bodyByKey[state.destKey], state.simTime);
    return Math.atan2(-dv.vy, dv.vx);
  }
  if ((state.phase === 'cruise' || state.phase === 'approach' || state.phase === 'burn2') && state.transferArc) {
    var arcT = state.phase === 'cruise' ? state.simTime : state.transferArc.tArrival;
    var arcState = getTransferArcState(state.transferArc, arcT);
    return Math.atan2(-arcState.dy, arcState.dx);
  }
  if (state.sc.orbit && state.sc.orbit.conicType === 'elliptic') {
    var vel = orbitVelocityAt(state.sc.orbit, state.simTime);
    return Math.atan2(-vel.vy, vel.vx); // canvas Y is inverted
  }
  // Fallback: use home planet velocity direction
  var hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
  return Math.atan2(-hv.vy, hv.vx);
}

function drawSpacecraft() {
  if (!state.sc.launched) return;
  if ((state.phase === 'captured' || state.phase === 'result') && state.captureAlpha <= 0) return;
  var cc = toCanvas(state.sc.x, state.sc.y);
  var angle = getScAngle();

  ctx.save();
  ctx.translate(cc.cx, cc.cy);
  ctx.rotate(angle);
  if (state.phase === 'captured') {
    ctx.globalAlpha = state.captureAlpha;
  }

  // Glow
  var glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 20);
  glow.addColorStop(0, 'rgba(255,224,102,0.45)');
  glow.addColorStop(1, 'rgba(255,224,102,0.0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, TWO_PI);
  ctx.fill();

  // Triangle wedge
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.moveTo(13, 0);
  ctx.lineTo(-7, -6.5);
  ctx.lineTo(-7, 6.5);
  ctx.closePath();
  ctx.fill();

  // Engine flame during burns
  if (state.phase === 'burn1' || state.phase === 'burn2') {
    var fl = 6 + 4 * Math.sin(Date.now() / 60);
    ctx.fillStyle = 'rgba(255,140,30,0.6)';
    ctx.beginPath();
    ctx.moveTo(-7, -4);
    ctx.lineTo(-7 - fl, 0);
    ctx.lineTo(-7, 4);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawTrail() {
  var trail = state.sc.trail;
  if (trail.length < 2) return;
  ctx.beginPath();
  var p0 = toCanvas(trail[0].x, trail[0].y);
  ctx.moveTo(p0.cx, p0.cy);
  var step = Math.max(1, Math.floor(trail.length / 2000));
  for (var i = step; i < trail.length; i += step) {
    var p = toCanvas(trail[i].x, trail[i].y);
    ctx.lineTo(p.cx, p.cy);
  }
  ctx.strokeStyle = 'rgba(255,224,102,0.55)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, W, H);

  drawStarfield();

  var home = bodyByKey[state.homeKey];
  var dest = bodyByKey[state.destKey];

  drawOrbitEllipse(home, 0.25);
  drawOrbitEllipse(dest, 0.25);

  drawLaunchWindowGuide();
  drawTrail();

  drawBody(bodyByKey['sun'], state.simTime);
  drawBody(home, state.simTime);
  drawBody(dest, state.simTime);

  drawSpacecraft();
}

/* ══════════════════════════════════════════════ */
/* Inset Drawing                                  */
/* ══════════════════════════════════════════════ */

function drawInset() {
  ictx.clearRect(0, 0, iW, iH);
  ictx.fillStyle = 'rgba(8,12,20,0.9)';
  ictx.fillRect(0, 0, iW, iH);

  var cx = iW / 2, cy = iH / 2;
  var bodyKey = (state.phase === 'approach' || state.phase === 'burn2' || state.phase === 'captured' || (state.phase === 'result' && state.burn2.committed)) ? state.destKey : state.homeKey;
  var body = bodyByKey[bodyKey];

  ictx.beginPath();
  var grad = ictx.createRadialGradient(cx, cy, 0, cx, cy, 16);
  grad.addColorStop(0, body.color);
  grad.addColorStop(1, 'rgba(' + body.glow + ',0.1)');
  ictx.arc(cx, cy, 14, 0, TWO_PI);
  ictx.fillStyle = grad;
  ictx.fill();

  ictx.beginPath();
  ictx.arc(cx, cy, 14, 0, TWO_PI);
  ictx.fillStyle = body.color;
  ictx.fill();

  var orbitR = 40;

  if (state.phase === 'result' && state.burn2.committed && state.sc.orbit) {
    if (state.sc.orbit.conicType === 'escape') {
      // Hyperbolic arc — not captured
      ictx.beginPath();
      ictx.moveTo(cx + orbitR * 1.3, cy - orbitR * 0.5);
      ictx.quadraticCurveTo(cx - orbitR * 0.3, cy, cx + orbitR * 1.3, cy + orbitR * 0.5);
      ictx.strokeStyle = 'rgba(249,117,131,0.5)';
      ictx.lineWidth = 1.5;
      ictx.stroke();
    } else if (state.sc.orbit.e > 0.3) {
      // Eccentric capture orbit — use actual eccentricity
      var eFinal = Math.min(state.sc.orbit.e, 0.9);
      var eccA = orbitR * (1 + eFinal * 0.5);
      var eccB = orbitR * (1 - eFinal * 0.4);
      ictx.beginPath();
      ictx.ellipse(cx + orbitR * eFinal * 0.3, cy, eccA, eccB, 0, 0, TWO_PI);
      ictx.strokeStyle = 'rgba(249,117,131,0.5)';
      ictx.lineWidth = 1.5;
      ictx.stroke();
    } else {
      // Near-circular capture — success
      ictx.beginPath();
      ictx.arc(cx, cy, orbitR, 0, TWO_PI);
      ictx.strokeStyle = 'rgba(63,185,80,0.4)';
      ictx.lineWidth = 1;
      ictx.stroke();
    }
  } else {
    ictx.beginPath();
    ictx.arc(cx, cy, orbitR, 0, TWO_PI);
    ictx.strokeStyle = 'rgba(255,255,255,0.2)';
    ictx.lineWidth = 1;
    ictx.stroke();
  }

  var scAngle = state.insetScAngle;
  var scX = cx + orbitR * Math.cos(scAngle);
  var scY = cy - orbitR * Math.sin(scAngle);

  if (state.phase === 'burn1' || state.phase === 'burn2') {
    var flR = 5 + 2 * Math.sin(Date.now() / 80);
    ictx.beginPath();
    ictx.arc(scX, scY, flR, 0, TWO_PI);
    ictx.fillStyle = 'rgba(255,180,50,0.4)';
    ictx.fill();
  }

  ictx.save();
  ictx.translate(scX, scY);
  ictx.rotate(-(scAngle + Math.PI / 2));
  ictx.fillStyle = '#ffe066';
  ictx.beginPath();
  ictx.moveTo(10, 0);
  ictx.lineTo(-5, -5);
  ictx.lineTo(-5, 5);
  ictx.closePath();
  ictx.fill();
  ictx.restore();

  ictx.font = '12px "Share Tech Mono", monospace';
  ictx.fillStyle = 'rgba(255,255,255,0.5)';
  ictx.textAlign = 'center';
  var label = T(bodyKey);
  ictx.fillText(label, cx, iH - 6);
}

/* ══════════════════════════════════════════════ */
/* Burn Interaction                               */
/* ══════════════════════════════════════════════ */

function startBurn() {
  if (state.phase === 'prelaunch') {
    state.burn1LockedGreenFrac = computeGreenFrac();
    state.resultData.phaseAtLaunch = currentPhaseAngle(state.simTime);
    state.phase = 'burn1';
    state.burn1.holding = true;
    state.burn1.holdStart = performance.now();
    state.burn1.holdDuration = 0;
    state.burn1.dvApplied = 0;

    var hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
    state.launchAngle = Math.atan2(hp.y, hp.x);
    state.sc.x = hp.x;
    state.sc.y = hp.y;
    state.sc.launched = true;
    state.sc.trail = [{ x: hp.x, y: hp.y }];

    updateEngineBtn();
    updateBurnMeter();
  } else if (state.phase === 'approach') {
    // Start burn2 — same hold-and-release as burn1
    state.burn2LockedGreenFrac = computeGreenFrac();
    state.phase = 'burn2';
    state.burn2.holding = true;
    state.burn2.holdStart = performance.now();
    state.burn2.holdDuration = 0;
    state.burn2.dvApplied = 0;
    updateEngineBtn();
    updateBurnMeter();
  }
}

function endBurn() {
  if (state.phase === 'burn1' && state.burn1.holding) {
    state.burn1.holding = false;
    state.burn1.committed = true;
    var gf1 = Math.max(0, state.burn1LockedGreenFrac);
    if (state.difficulty !== 'easy' && state.burn1LockedGreenFrac >= 0) {
      var sd1 = (state.difficulty === 'medium') ? BURN_SHRINK_DUR_MED : BURN_SHRINK_DUR_HARD;
      var elapsed = (performance.now() - state.burn1.holdStart) / 1000;
      gf1 = state.burn1LockedGreenFrac * Math.max(0, 1 - elapsed / sd1);
    }
    var ghw1 = 0.75 * state.ref.dv1 * gf1;
    state.burn1Good = state.burn1.dvApplied >= (state.ref.dv1 - ghw1) && state.burn1.dvApplied <= (state.ref.dv1 + ghw1);
    state.transferArc = null;

    if (state.burn1Good) {
      state.burn1.dvApplied = state.ref.dv1;
      state.sc.orbit = null;
      state.transferArc = buildTransferArc(state.simTime);
      state.sc.x = state.transferArc.points[0].x;
      state.sc.y = state.transferArc.points[0].y;
    } else {
      var hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
      var speed = Math.sqrt(hv.vx * hv.vx + hv.vy * hv.vy);
      var px = hv.vx / speed;
      var py = hv.vy / speed;
      var dir = state.ref.outward ? 1 : -1;
      var dvActual = state.burn1.dvApplied;

      state.sc.vx = hv.vx + dir * dvActual * px;
      state.sc.vy = hv.vy + dir * dvActual * py;
      state.sc.orbit = stateToOrbit(state.sc.x, state.sc.y, state.sc.vx, state.sc.vy, state.simTime);

      if (state.sc.orbit.conicType === 'escape') {
        state.phase = 'result';
        computeMissErrors();
        state.resultType = 'miss';
        showResultOverlay();
        return;
      }
    }

    state.phase = 'cruise';
    // Easy mode: unlock warp and restore 1x after transfer burn
    if (state.warpLocked) {
      state.warpLocked = false;
      state.timeWarp = 1;
      state.warpLevel = 'normal';
      updateWarpBtns();
    }
    updateEngineBtn();
    updateBurnLabel();
  } else if (state.phase === 'burn2' && state.burn2.holding) {
    state.burn2.holding = false;
    state.burn2.committed = true;
    var dv2Err = Math.abs(state.burn2.dvApplied - state.ref.dv2) / state.ref.dv2;
    state.resultData.dv2Error = dv2Err;
    var gf2 = Math.max(0, state.burn2LockedGreenFrac);
    if (state.difficulty !== 'easy' && state.burn2LockedGreenFrac >= 0) {
      var sd2 = (state.difficulty === 'medium') ? BURN_SHRINK_DUR_MED : BURN_SHRINK_DUR_HARD;
      var elapsed = (performance.now() - state.burn2.holdStart) / 1000;
      gf2 = state.burn2LockedGreenFrac * Math.max(0, 1 - elapsed / sd2);
    }
    var ghw2 = 0.75 * state.ref.dv2 * gf2;
    var dvCenter2 = state.ref.dv2;
    // Match the bounced green zone center (hard mode burn2)
    if (state.difficulty === 'hard' && gf2 > 0) {
      var maxDv2 = state.ref.dv2 * 2;
      var bounceT2 = performance.now() / 1000;
      dvCenter2 += BOUNCE_AMP_HARD * maxDv2 * Math.sin(TWO_PI * BOUNCE_FREQ_HARD * bounceT2);
      dvCenter2 = Math.max(ghw2, Math.min(maxDv2 - ghw2, dvCenter2));
    }
    var dv2Good = state.burn2.dvApplied >= (dvCenter2 - ghw2) && state.burn2.dvApplied <= (dvCenter2 + ghw2);

    if (dv2Good) {
      // Good burn — capture
      var destVel = helioVelocity(bodyByKey[state.destKey], state.simTime);
      state.sc.vx = destVel.vx;
      state.sc.vy = destVel.vy;
      state.sc.orbit = stateToOrbit(state.sc.x, state.sc.y, state.sc.vx, state.sc.vy, state.simTime);
      state.captureStart = performance.now();
      state.captureOrbitAngle = 0;
      state.captureAlpha = 1;
      state.captureApproachX = state.sc.x;
      state.captureApproachY = state.sc.y;
      state.overlayDismissed = false;
      state.phase = 'captured';
      evaluateResult();
    } else {
      // Bad burn — flyby with actual dv2 applied
      var dir2 = state.ref.outward ? 1 : -1;
      if (state.transferArc && !state.sc.orbit) {
        // Good burn1 path: compute velocity from arc tangent + apply actual dv2
        var arcState = getTransferArcState(state.transferArc, state.transferArc.tArrival);
        var len = Math.sqrt(arcState.dx * arcState.dx + arcState.dy * arcState.dy);
        var ux = arcState.dx / len, uy = arcState.dy / len;
        var postSpeed = state.ref.vArr + dir2 * state.burn2.dvApplied;
        state.sc.vx = ux * postSpeed;
        state.sc.vy = uy * postSpeed;
        state.sc.orbit = stateToOrbit(state.sc.x, state.sc.y, state.sc.vx, state.sc.vy, state.simTime);
      } else if (state.sc.orbit) {
        // Bad burn1 path: apply dv2 to existing orbit velocity
        var vel2 = orbitVelocityAt(state.sc.orbit, state.simTime);
        var spd2 = Math.sqrt(vel2.vx * vel2.vx + vel2.vy * vel2.vy);
        state.sc.vx = vel2.vx + dir2 * state.burn2.dvApplied * (vel2.vx / spd2);
        state.sc.vy = vel2.vy + dir2 * state.burn2.dvApplied * (vel2.vy / spd2);
        state.sc.orbit = stateToOrbit(state.sc.x, state.sc.y, state.sc.vx, state.sc.vy, state.simTime);
      }
      state.transferArc = null;
      if (!state.sc.orbit || state.sc.orbit.conicType === 'escape') {
        state.phase = 'result';
        computeMissErrors();
        state.resultType = 'miss';
        showResultOverlay();
      } else {
        state.phase = 'cruise';
        updateEngineBtn();
      }
    }
  }
}

var engineBtn = document.getElementById('engineBtn');

engineBtn.addEventListener('mousedown', function(e) {
  e.preventDefault();
  startBurn();
});
engineBtn.addEventListener('mouseup', function(e) {
  e.preventDefault();
  endBurn();
});
engineBtn.addEventListener('mouseleave', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});
engineBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startBurn();
}, { passive: false });
engineBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  endBurn();
}, { passive: false });
engineBtn.addEventListener('touchcancel', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});
window.addEventListener('blur', function() {
  if (state.burn1.holding || state.burn2.holding) endBurn();
});
window.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startBurn(); }
});
window.addEventListener('keyup', function(e) {
  if (e.code === 'Space') { e.preventDefault(); endBurn(); }
});

/* ══════════════════════════════════════════════ */
/* State Transitions                              */
/* ══════════════════════════════════════════════ */

function getEncounterRadius(destKey) {
  // Encounter radius must compensate for the hybrid model mismatch:
  // planets orbit on eccentric ellipses but the Hohmann reference uses circular orbits.
  // The eccentricity term (dest.a * dest.e * 2) covers the maximum positional error
  // from the equation of center over the transfer time.
  var dest = bodyByKey[destKey];
  return Math.max(0.15, Math.min(0.5, dest.a * 0.08 + dest.a * dest.e * 2));
}

function checkArrival() {
  if (state.phase !== 'cruise') return;
  // After a capture attempt, only check miss timeout
  if (state.burn2.committed) {
    if (state.sc.orbit) {
      var elapsed = state.simTime - state.sc.orbit.tEpoch;
      var halfPeriod = Math.PI / state.sc.orbit.n;
      if (elapsed > halfPeriod * 1.3) {
        state.phase = 'result';
        computeMissErrors();
        state.resultType = 'miss';
        showResultOverlay();
      }
    }
    return;
  }
  if (state.transferArc) {
    var arcState = getTransferArcState(state.transferArc, state.simTime);
    var arcEnd = state.transferArc.points[state.transferArc.points.length - 1];
    var trailLast = state.sc.trail[state.sc.trail.length - 1];
    if (!arcState.done) return;
    state.simTime = state.transferArc.tArrival;
    state.sc.x = arcEnd.x;
    state.sc.y = arcEnd.y;
    if (!trailLast || trailLast.x !== arcEnd.x || trailLast.y !== arcEnd.y) {
      state.sc.trail.push({ x: arcEnd.x, y: arcEnd.y });
      if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
    }
    state.phase = 'approach';
    state.arrivalTime = state.simTime;
    state.approachStart = performance.now();
    state.insetBody = 'dest';
    updateEngineBtn();
    updateBurnLabel();
    updateBurnMeter();
    return;
  }

  var dest = bodyByKey[state.destKey];
  var dp = helioPosition(dest, state.simTime);
  var dx = state.sc.x - dp.x;
  var dy = state.sc.y - dp.y;
  var dist = Math.sqrt(dx * dx + dy * dy);
  var threshold = getEncounterRadius(state.destKey);

  if (dist < threshold) {
    state.phase = 'approach';
    state.arrivalTime = state.simTime;
    state.approachStart = performance.now();
    state.insetBody = 'dest';
    updateEngineBtn();
    updateBurnLabel();
    updateBurnMeter();
    return;
  }

  if (state.sc.orbit) {
    var elapsed = state.simTime - state.sc.orbit.tEpoch;
    var halfPeriod = Math.PI / state.sc.orbit.n;
    if (elapsed > halfPeriod * 1.3) {
      state.phase = 'result';
      computeMissErrors();
      state.resultType = 'miss';
      showResultOverlay();
    }
  }
}

function checkArrivalTimeout() {
  if (state.phase !== 'arrival') return;
  var elapsed = state.simTime - state.arrivalTime;
  var encR = getEncounterRadius(state.destKey);
  var timeout = Math.max(0.05, encR * 0.8);
  if (elapsed > timeout) {
    state.phase = 'result';
    computeMissErrors();
    state.resultType = 'miss';
    showResultOverlay();
  }
}

function computeMissErrors() {
  var ref = state.ref;
  var pErr = Math.abs(wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle));
  state.resultData.phaseErrDeg = pErr / DEG2RAD;
  state.resultData.dv1Error = Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
  state.resultData.dv2Error = state.burn2.committed
    ? Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2 : 1;
}

/* ══════════════════════════════════════════════ */
/* Result Evaluation                              */
/* ══════════════════════════════════════════════ */

function evaluateResult() {
  var ref = state.ref;

  // Physical guard: no burn2 → always miss
  if (!state.burn2.committed) {
    computeMissErrors();
    state.resultType = 'miss';
    return;
  }

  // Physical guard: post-burn orbit is escape → always miss
  if (state.sc.orbit && state.sc.orbit.conicType === 'escape') {
    computeMissErrors();
    state.resultType = 'miss';
    return;
  }

  var pErr = Math.abs(wrapAngle(state.resultData.phaseAtLaunch - ref.phaseAngle));
  var pErrDeg = pErr / DEG2RAD;
  var dv1Err = Math.abs(state.burn1.dvApplied - ref.dv1) / ref.dv1;
  var dv2Err = Math.abs(state.burn2.dvApplied - ref.dv2) / ref.dv2;

  state.resultData.dv1Error = dv1Err;
  state.resultData.dv2Error = dv2Err;
  state.resultData.phaseErrDeg = pErrDeg;

  var pTol = state.tol.phaseDeg;
  var bTol1 = state.burn1LockedGreenFrac >= 0 ? 0.75 * state.burn1LockedGreenFrac : state.tol.burnPct;
  var bTol2 = state.burn2LockedGreenFrac >= 0 ? 0.75 * state.burn2LockedGreenFrac : state.tol.burnPct;

  if (pErrDeg <= pTol && dv1Err <= bTol1 && dv2Err <= bTol2) {
    state.resultType = 'success';
  } else if (pErrDeg <= pTol * 2.5 && dv1Err <= bTol1 * 2.5 && dv2Err <= bTol2 * 2.5) {
    state.resultType = 'close';
  } else {
    state.resultType = 'miss';
  }
}

function getResultHint() {
  if (state.sc.orbit && state.sc.orbit.conicType === 'escape') {
    return T('hintEscape');
  }

  var d = state.resultData;
  var ref = state.ref;
  var pTol = state.tol.phaseDeg;
  var bTol1 = state.burn1LockedGreenFrac >= 0 ? 0.75 * state.burn1LockedGreenFrac : state.tol.burnPct;
  var bTol2 = state.burn2LockedGreenFrac >= 0 ? 0.75 * state.burn2LockedGreenFrac : state.tol.burnPct;

  if (d.phaseErrDeg > pTol) {
    var pe = wrapAngle(d.phaseAtLaunch - ref.phaseAngle);
    return T(pe > 0 ? 'hintLate' : 'hintEarly');
  }
  if (d.dv1Error > bTol1) {
    return T(state.burn1.dvApplied > ref.dv1 ? 'hintBurn1Long' : 'hintBurn1Short');
  }
  if (!state.burn2.committed) {
    return T('hintNoCapture');
  }
  if (d.dv2Error > bTol2) {
    return T(state.burn2.dvApplied > ref.dv2 ? 'hintBurn2Long' : 'hintBurn2Short');
  }
  return '';
}

function showResultOverlay() {
  var existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.className = 'result-overlay';

  var emoji, msg, bg;
  var result = state.resultType;
  if (result === 'success') {
    emoji = '\uD83C\uDF89'; msg = T('resultSuccess'); bg = 'rgba(63,185,80,0.88)';
  } else if (result === 'close') {
    emoji = '\uD83D\uDC4D\uD83C\uDFFB'; msg = T('resultClose'); bg = 'rgba(88,166,255,0.88)';
  } else {
    emoji = '\uD83D\uDC4E\uD83C\uDFFB'; msg = T('resultMiss'); bg = 'rgba(240,180,60,0.92)';
  }

  var hint = getResultHint();
  overlay.style.background = bg;
  overlay.innerHTML =
    '<div class="overlay-emoji">' + emoji + '</div>' +
    '<div class="overlay-msg">' + msg + '</div>' +
    (hint ? '<div class="overlay-sub">' + hint + '</div>' : '') +
    '<div class="overlay-hint">' + T('clickDismiss') + '</div>';

  overlay.addEventListener('click', function() {
    overlay.remove();
    state.overlayDismissed = true;
    state.postResultStart = performance.now();
  });
  document.body.appendChild(overlay);
}

function updateStepIndicator() {
  var dots = [
    document.getElementById('stepDot1'),
    document.getElementById('stepDot2'),
    document.getElementById('stepDot3')
  ];
  var labels = [
    document.getElementById('stepLbl1'),
    document.getElementById('stepLbl2'),
    document.getElementById('stepLbl3')
  ];

  var step = 0;
  if (state.phase === 'prelaunch' || state.phase === 'burn1') step = 0;
  else if (state.phase === 'cruise') step = 1;
  else if (state.phase === 'captured') step = 3; // all done
  else step = 2;

  for (var i = 0; i < 3; i++) {
    dots[i].classList.remove('done', 'current');
    labels[i].classList.remove('current');
    if (i < step) dots[i].classList.add('done');
    else if (i === step) {
      dots[i].classList.add('current');
      labels[i].classList.add('current');
    }
  }

  document.getElementById('stepIndicator').style.display =
    state.phase === 'result' ? 'none' : 'flex';
}

function updateBurnLabel() {

    lbl.textContent = T('burn2');

    lbl.textContent = T('burn1');
  }
}

function updateBurnMeter() {
  var fillEl = document.getElementById('burnFill');
  var targetEl = document.getElementById('burnTarget');
  var ref = state.ref;
  if (!ref) return;

  var isBurn2Side = (state.phase === 'burn2' || state.phase === 'approach');
  var currentBurn = isBurn2Side ? state.burn2 : state.burn1;
  var idealDv = isBurn2Side ? ref.dv2 : ref.dv1;
  var maxDv = idealDv * 2;

  var pct = Math.min(100, (currentBurn.dvApplied / maxDv) * 100);
  fillEl.style.width = pct + '%';

  // Determine greenFrac: frozen on easy, shrinks on medium/hard during burns
  var greenFrac;
  var burnShrinkDur = (state.difficulty === 'medium') ? BURN_SHRINK_DUR_MED : BURN_SHRINK_DUR_HARD;
  if (state.phase === 'burn1') {
    if (state.difficulty !== 'easy' && state.burn1LockedGreenFrac >= 0) {
      var elapsed = (performance.now() - state.burn1.holdStart) / 1000;
      greenFrac = state.burn1LockedGreenFrac * Math.max(0, 1 - elapsed / burnShrinkDur);
    } else {
      greenFrac = state.burn1LockedGreenFrac >= 0 ? state.burn1LockedGreenFrac : 0;
    }
  } else if (state.phase === 'burn2') {
    if (state.difficulty !== 'easy' && state.burn2LockedGreenFrac >= 0) {
      var elapsed = (performance.now() - state.burn2.holdStart) / 1000;
      greenFrac = state.burn2LockedGreenFrac * Math.max(0, 1 - elapsed / burnShrinkDur);
    } else {
      greenFrac = state.burn2LockedGreenFrac >= 0 ? state.burn2LockedGreenFrac : 0;
    }
  } else {
    greenFrac = computeGreenFrac();
  }

  // Dynamic green zone half-width in dv units (75% of bar at frac=1)
  var greenHalfWidth = 0.375 * maxDv * greenFrac;
  var dvCenter = idealDv;

  // Bounce on burn2/approach hard mode
  if ((state.phase === 'burn2' || state.phase === 'approach') && state.difficulty === 'hard' && greenFrac > 0) {
    var bounceT = performance.now() / 1000;
    dvCenter += BOUNCE_AMP_HARD * maxDv * Math.sin(TWO_PI * BOUNCE_FREQ_HARD * bounceT);
    dvCenter = Math.max(greenHalfWidth, Math.min(maxDv - greenHalfWidth, dvCenter));
  }

  var dvLow = Math.max(0, dvCenter - greenHalfWidth);
  var dvHigh = Math.min(maxDv, dvCenter + greenHalfWidth);

  // Fill coloring
  fillEl.classList.remove('good', 'over');
  if (currentBurn.dvApplied > 0 && greenFrac > 0) {
    if (currentBurn.dvApplied >= dvLow && currentBurn.dvApplied <= dvHigh) fillEl.classList.add('good');
    else if (currentBurn.dvApplied > dvHigh) fillEl.classList.add('over');
  } else if (currentBurn.dvApplied > 0 && greenFrac <= 0) {
    if (currentBurn.dvApplied > idealDv) fillEl.classList.add('over');
  }

  // Green zone display
  if (greenFrac <= 0) {
    targetEl.style.display = 'none';
  } else {
    targetEl.style.display = '';
    var left = (dvLow / maxDv) * 100;
    var width = ((dvHigh - dvLow) / maxDv) * 100;
    targetEl.style.left = left + '%';
    targetEl.style.width = width + '%';
  }
}

function updateReadouts() {
  var ref = state.ref;
  if (!ref) return;

  document.getElementById('missionVal').textContent = T(state.homeKey) + ' \u2192 ' + T(state.destKey);

  var days = ref.tTransfer * 365.25;
  if (days < 365) {
    document.getElementById('transferTimeVal').textContent = Math.round(days) + ' ' + T('days');
  } else {
    document.getElementById('transferTimeVal').textContent = ref.tTransfer.toFixed(2) + ' ' + T('years');
  }

  document.getElementById('dv1Val').textContent = (ref.dv1 * AU_TO_KMS).toFixed(2) + ' km/s';
  document.getElementById('dv2Val').textContent = (ref.dv2 * AU_TO_KMS).toFixed(2) + ' km/s';

  var pAngle = currentPhaseAngle(state.simTime);
  var pDeg = (pAngle / DEG2RAD).toFixed(1);
  var idealDeg = (ref.phaseAngle / DEG2RAD).toFixed(1);
  if (state.difficulty !== 'hard') {
    document.getElementById('phaseVal').textContent = pDeg + '\u00b0 / ' + idealDeg + '\u00b0';
  } else {
    document.getElementById('phaseVal').textContent = '\u2014';
  }

  var statusText;
  switch (state.phase) {
    case 'prelaunch':
      statusText = isLaunchWindowOpen(state.simTime) ? T('goodWindow') : T('waiting');
      break;
    case 'burn1': statusText = T('burning'); break;
    case 'cruise': statusText = T('cruising'); break;
    case 'approach': statusText = T('readyCapture'); break;
    case 'burn2': statusText = T('burning'); break;
    case 'captured': statusText = T('captured'); break;
    case 'result':
      if (state.resultType === 'success') statusText = T('captured');
      else statusText = T('missed');
      break;
    default: statusText = '';
  }
  document.getElementById('statusVal').textContent = statusText;
}

  var btn = document.getElementById('playBtn');
  btn.classList.toggle('playing', state.playing);
  btn.title = state.playing ? T('pause') : T('play');
}

  var el = document.getElementById('metClock');
  el.textContent = state.missionStarted ? formatMET(state.simTime) : 'T+ 0' + T('days') + ' 00' + T('hours');
  el.classList.toggle('paused', !state.playing);

  document.getElementById('warpFastBtn').classList.toggle('active', !locked && state.warpLevel === 'fast');
  document.getElementById('warpFastestBtn').classList.toggle('active', !locked && state.warpLevel === 'fastest');
  document.getElementById('warpNormalBtn').disabled = locked;

function populateHomeSelect() {
  var sel = document.getElementById('homeSelect');
  sel.innerHTML = '';
  for (var i = 0; i < PLANET_KEYS.length; i++) {
    var opt = document.createElement('option');
    opt.value = PLANET_KEYS[i];
    opt.textContent = T(PLANET_KEYS[i]);
    if (PLANET_KEYS[i] === state.homeKey) opt.selected = true;
    sel.appendChild(opt);
  }
}

function populateDestSelect() {
  var sel = document.getElementById('destSelect');
  sel.innerHTML = '';
  var neighbors = getNeighbors(state.homeKey);
  for (var i = 0; i < neighbors.length; i++) {
    var opt = document.createElement('option');
    opt.value = neighbors[i];
    opt.textContent = T(neighbors[i]);
    if (neighbors[i] === state.destKey) opt.selected = true;
    sel.appendChild(opt);
  }
  if (neighbors.indexOf(state.destKey) === -1) {
    state.destKey = neighbors[0];
    sel.value = state.destKey;
  }
}

  state.homeKey = e.target.value;
  populateDestSelect();
  recalcMission();
  resetMission();
});

document.getElementById('destSelect').addEventListener('change', function(e) {
  state.destKey = e.target.value;
  recalcMission();
  resetMission();
});

function setDifficulty(d) {
  state.difficulty = d;
  document.getElementById('diffEasyBtn').classList.toggle('active', d === 'easy');
  document.getElementById('diffMediumBtn').classList.toggle('active', d === 'medium');
  document.getElementById('diffHardBtn').classList.toggle('active', d === 'hard');

  if (d === 'easy') {
    state.tol = { phaseDeg: 10, burnPct: 0.15 };
  } else if (d === 'medium') {
    state.tol = { phaseDeg: 6, burnPct: 0.09 };
  } else {
    state.tol = { phaseDeg: 3, burnPct: 0.05 };
  }
  state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
  state.timeWarp = state.warpLevels[state.warpLevel] || state.warpLevels.normal;
  updateBurnMeter();

function setWarp(level) {
  if (state.warpLocked) return;
  state.warpLevel = level;
  state.timeWarp = state.warpLevels[level] || state.warpLevels.normal;
  updateWarpBtns();
}


function togglePlay() {
  state.playing = !state.playing;
  if (state.playing && !state.missionStarted) {
    state.missionStarted = true;
  }
  updatePlayBtn();
  updateMETClock();
}

function resetMission() {
  state.simTime = 0;
  state.phase = 'prelaunch';
  state.burn1 = { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false };
  state.burn2 = { holding: false, holdStart: 0, holdDuration: 0, dvApplied: 0, committed: false };
  state.sc = { x: 0, y: 0, vx: 0, vy: 0, orbit: null, trail: [], launched: false };
  state.resultType = null;
  state.resultData = { phaseAtLaunch: 0, dv1Error: 0, dv2Error: 0, phaseErrDeg: 0 };
  state.launchAngle = 0;
  state.arrivalTime = 0;
  state.insetBody = 'home';
  state.insetScAngle = 0;
  state.captureAlpha = 1;
  state.captureApproachX = 0;
  state.captureApproachY = 0;
  state.burn1Good = false;
  state.transferArc = null;
  state.approachStart = 0;
  state.overlayDismissed = false;
  state.postResultStart = 0;
  state.windowOpenSimTime = 0;
  state.windowWasOpen = false;
  state.burn1LockedGreenFrac = -1;
  state.burn2LockedGreenFrac = -1;
  state.warpLocked = false;
  state.playing = false;
  state.missionStarted = false;
  state.warpLevel = 'normal';
  state.timeWarp = state.warpLevels.normal;
  trailAccum = 0;

  var existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  updateEngineBtn();
  updateBurnLabel();
  updateBurnMeter();
  updateWarpBtns();
  updatePlayBtn();
  updateReadouts();
  updateMETClock();

  document.getElementById('burnFill').style.width = '0%';
  document.getElementById('burnFill').classList.remove('good', 'over');
  document.getElementById('burnTarget').style.display = 'none';
}

function recalcMission() {
  state.ref = computeHohmannRef(state.homeKey, state.destKey);
  state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
  state.timeWarp = state.warpLevels.normal;
  state.warpLevel = 'normal';
  var auto = computeAutoCamera();
  state.camera.targetScale = auto.scale;
  state.camera.cx = auto.cx;
  state.camera.cy = auto.cy;
  state.camera.scale = auto.scale;
  updateReadouts();
  updateBurnMeter();
  updateWarpBtns();
}

/* ══════════════════════════════════════════════ */
/* Animation Loop                                 */
/* ══════════════════════════════════════════════ */

var lastTimestamp = 0;
var trailAccum = 0;

function animate(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  var dtReal = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
  lastTimestamp = timestamp;

  if (state.playing && state.phase !== 'result') {
    var dtSim;

    switch (state.phase) {
      case 'prelaunch':
        // Auto-decel to 1x (medium/hard) or 0.5x (easy) ~2 sec before window
        var decelTarget = state.warpLevels.decel;
        if (state.timeWarp > 1 && state.timeWarp > decelTarget) {
          var shouldDecel = isLaunchWindowOpen(state.simTime);
          if (!shouldDecel) {
            var currentErr = Math.abs(phaseError(state.simTime));
            var threshold = state.tol.phaseDeg * DEG2RAD;
            if (currentErr > threshold) {
              var synodicRate = Math.abs(bodyByKey[state.homeKey].n - bodyByKey[state.destKey].n);
              var timeToWindow = (currentErr - threshold) / synodicRate;
              var warpFrame = state.timeWarp * SIM_RATE * MAX_DT;
              var realTimeAtDecel = timeToWindow / (decelTarget * SIM_RATE);
              if (timeToWindow <= warpFrame * 2) {
                shouldDecel = true;
              } else if (state.timeWarp > state.warpLevels.normal && timeToWindow <= state.warpLevels.normal * SIM_RATE * MAX_DT * 3) {
                state.timeWarp = state.warpLevels.normal;
                state.warpLevel = 'normal';
                updateWarpBtns();
              } else if (realTimeAtDecel <= 2.5) {
                shouldDecel = true;
              }
            } else {
              shouldDecel = true;
            }
          }
          if (shouldDecel) {
            state.timeWarp = decelTarget;
            state.warpLevel = 'normal';
            updateWarpBtns();
            if (state.difficulty === 'easy') {
              state.warpLocked = true;
              updateWarpBtns();
            }
          }
        }
        // Easy mode: auto-re-warp if window passed without launch
        if (state.difficulty === 'easy' && state.warpLocked && !isLaunchWindowOpen(state.simTime) && state.windowWasOpen) {
          state.warpLocked = false;
          state.timeWarp = state.warpLevels.fastest;
          state.warpLevel = 'fastest';
          updateWarpBtns();
        }
        dtSim = dtReal * state.timeWarp * SIM_RATE;
        state.simTime += dtSim;
        state.insetScAngle += dtReal * 2.0;
        updateEngineBtn();
        // Track window open/close transitions for shrinking green zone
        var windowNowOpen = isLaunchWindowOpen(state.simTime);
        if (windowNowOpen && !state.windowWasOpen) {
          state.windowOpenSimTime = state.simTime;
        }
        state.windowWasOpen = windowNowOpen;
        updateBurnMeter();
        break;

      case 'burn1':
        // simTime frozen during impulsive burn — hold time is wall-clock only
        if (state.burn1.holding) {
          state.burn1.holdDuration = (performance.now() - state.burn1.holdStart) / 1000;
          state.burn1.dvApplied = state.ref.burnRate * state.burn1.holdDuration;
          updateBurnMeter();
        }
        break;

      case 'cruise':
        var cruiseWarp = Math.max(1, state.ref.tTransfer / 8 / SIM_RATE);
        dtSim = dtReal * cruiseWarp * SIM_RATE;
        state.simTime += dtSim;
        if (state.transferArc) {
          var arc = getTransferArcState(state.transferArc, state.simTime);
          state.sc.x = arc.x;
          state.sc.y = arc.y;
          trailAccum += dtSim;
          var guidedTrailInterval = state.ref.tTransfer / 500;
          if (guidedTrailInterval < 0.0001) guidedTrailInterval = 0.0001;
          while (trailAccum >= guidedTrailInterval) {
            trailAccum -= guidedTrailInterval;
            state.sc.trail.push({ x: arc.x, y: arc.y });
            if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
          }
        } else if (state.sc.orbit) {
          var pos = orbitPositionAt(state.sc.orbit, state.simTime);
          state.sc.x = pos.x;
          state.sc.y = pos.y;
          trailAccum += dtSim;
          var trailInterval = state.ref.tTransfer / 500;
          if (trailInterval < 0.0001) trailInterval = 0.0001;
          while (trailAccum >= trailInterval) {
            trailAccum -= trailInterval;
            state.sc.trail.push({ x: pos.x, y: pos.y });
            if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
          }
        }
        checkArrival();
        break;

      case 'approach':
        // simTime frozen — approach is a timing challenge, not physics
        state.insetScAngle -= dtReal * 1.5;
        // Update timing cursor
        updateBurnMeter();
        // Check timeout
        var approachElapsed = (performance.now() - state.approachStart) / 1000;
        if (approachElapsed >= APPROACH_DUR) {
          // No engine fired — mission failed
          state.resultData.dv2Error = 1;
          state.transferArc = null;
          state.phase = 'result';
          computeMissErrors();
          state.resultType = 'miss';
          showResultOverlay();
        }
        break;

      case 'burn2':
        // simTime frozen during impulsive burn — hold time is wall-clock only
        if (state.burn2.holding) {
          state.burn2.holdDuration = (performance.now() - state.burn2.holdStart) / 1000;
          state.burn2.dvApplied = state.ref.burnRate * state.burn2.holdDuration;
          updateBurnMeter();
        }
        break;

      case 'captured':
        var captureElapsed = (performance.now() - state.captureStart) / 1000;
        var DISSOLVE_DUR = 0.5;
        var POST_CAPTURE_DUR = 2.0;

        // Phase 1: dissolve spacecraft into planet (0–1.5s)
        if (captureElapsed < DISSOLVE_DUR) {
          var t = captureElapsed / DISSOLVE_DUR;
          if (t > 0.4) {
            state.captureAlpha = 1 - (t - 0.4) / 0.6;
          }
        } else {
          // Phase 2: spacecraft gone, let system animate (1.5–3.5s)
          state.captureAlpha = 0;
          state.simTime += dtReal * SIM_RATE;
        }

        // Keep inset orbit going
        state.captureOrbitAngle += dtReal * 2.0;
        state.insetScAngle = state.captureOrbitAngle;

        if (captureElapsed >= DISSOLVE_DUR + POST_CAPTURE_DUR) {
          state.phase = 'result';
          showResultOverlay();
        }
        break;
    }
  }

  // Keep simulation running during result phase
  if (state.phase === 'result') {
    state.simTime += dtReal * SIM_RATE;
    if (state.burn2.committed) {
      state.insetScAngle += dtReal * 2.0;
    }
  }

  // Auto-reset after overlay dismissal
  if (state.phase === 'result' && state.overlayDismissed) {
    if ((performance.now() - state.postResultStart) / 1000 > 3.0) {
      resetMission();
    }
  }

  var auto = computeAutoCamera();
  state.camera.cx = 0;
  state.camera.cy = 0;
  state.camera.scale = auto.scale;

  drawScene();
  drawInset();
  updateReadouts();
  updatePrompt();
  updateStepIndicator();
  updateMETClock();

  requestAnimationFrame(animate);
}

/* ══════════════════════════════════════════════ */
/* Init                                           */
/* ══════════════════════════════════════════════ */

document.getElementById('canvas').addEventListener('click', function() {
  if (state.phase === 'result' && state.overlayDismissed) {
    resetMission();
  }
});

function init() {
  resize();
  recalcMission();
  applyTranslations();
  setDifficulty('easy');
  updatePlayBtn();
  updateWarpBtns();
  updateEngineBtn();
  updateBurnLabel();
  updatePrompt();
  updateStepIndicator();
  updateMETClock();
  requestAnimationFrame(animate);
}

init();
</script>
