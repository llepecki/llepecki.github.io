        /* ═══════════════════════════════════════════
           SEQUENCE / MISSION LOGIC
           ═══════════════════════════════════════════ */

        function loadSequence() {
          const data = MISSIONS[state.mode];
          const steps = data && data[state.stage] ? data[state.stage] : [];
          state.sequence.steps = steps;
          state.sequence.currentStep = 0;
          state.sequence.inFreePlay = false;
        }

        function getCurrentStep() {
          const seq = state.sequence;
          if (seq.inFreePlay || seq.currentStep >= seq.steps.length)
            return null;
          return seq.steps[seq.currentStep];
        }

        function loadStep() {
          const step = getCurrentStep();
          state.ui.hintLevel = 0;
          state.ui.stepComplete = false;
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.flow.childChoice = null;
          state.flow.revealed = !step || step.task.type !== "predict";
          state.pick.selectedChoice = null;
          state.send.childChoice = null;
          state.boost.childChoice = null;
          state.build.childChoice = null;
          state.build.selectedChain = null;
          if (step && step.setup.voltage !== undefined) {
            state.send.voltage = step.setup.voltage;
          }
          $("whySection").classList.add("hidden");
          $("nextBtn").disabled = true;
          $("hintBtn").disabled = false;
          updateMissionDisplay();
          updateControlsDisplay();
          updateMetersDisplay();
          updateHintDisplay();
          updateProgressDisplay();
          renderBoard();
        }

        function checkAnswer() {
          const step = getCurrentStep();
          if (!step || state.ui.stepComplete) return;
          if (state.mode === "boost") {
            if (state.boost.childChoice === null) return;
            if (
              parseInt(state.boost.childChoice, 10) === step.task.correctIndex
            ) {
              onSuccess();
            } else {
              onFailure();
            }
            return;
          }
          if (state.mode === "send") {
            const task = step.task;
            if (task.type === "choose") {
              if (state.send.childChoice === null) return;
              if (parseInt(state.send.childChoice, 10) === task.correctIndex) {
                onSuccess();
              } else {
                onFailure();
              }
            } else if (task.type === "adjust") {
              const setup = step.setup;
              const tr = computeTransfer(
                state.send.voltage,
                setup.powerDemand,
                setup.distance,
                setup.wireQuality || 1,
              );
              if (
                task.target.minEfficiency &&
                tr.efficiency >= task.target.minEfficiency
              ) {
                onSuccess();
              } else {
                onFailure();
              }
            }
            return;
          }
          if (state.mode === "build") {
            const bc = state.build.childChoice;
            if (bc === null || bc === undefined) return;
            if (parseInt(bc, 10) === step.task.correctIndex) {
              onSuccess();
            } else {
              onFailure();
            }
            return;
          }
          let userAnswer = null;
          if (state.mode === "flow") {
            userAnswer = state.flow.childChoice;
          } else if (state.mode === "pick") {
            userAnswer = state.pick.selectedChoice;
          }
          if (!userAnswer) return;
          if (!state.flow.revealed && state.mode === "flow") {
            state.flow.revealed = true;
            renderBoard();
          }
          if (userAnswer === step.task.correctAnswer) {
            onSuccess();
          } else {
            onFailure();
          }
        }

        function onSuccess() {
          const step = getCurrentStep();
          state.ui.stepComplete = true;
          state.ui.feedbackText = stepText(step, "feedbackSuccess");
          state.ui.feedbackType = "success";
          const prog = state.progress[state.family][state.mode];
          prog[state.stage] = Math.max(
            prog[state.stage],
            state.sequence.currentStep + 1,
          );
          $("nextBtn").disabled = false;
          $("hintBtn").disabled = true;
          $("whySection").classList.remove("hidden");
          $("whyText").textContent = stepText(step, "explanation");
          updateHintDisplay();
          updateProgressDisplay();
          updateControlsDisplay();
          announce(T("correct"));
        }

        function onFailure() {
          const step = getCurrentStep();
          state.ui.feedbackText = stepText(step, "feedbackFail");
          state.ui.feedbackType = "error";
          updateHintDisplay();
          announce(T("tryAgain"));
        }

        function nextRound() {
          if (state.ui.stepComplete) {
            state.sequence.currentStep++;
            if (state.sequence.currentStep >= state.sequence.steps.length) {
              state.sequence.inFreePlay = true;
            }
            loadStep();
          }
        }

        function showHint() {
          const step = getCurrentStep();
          if (!step || state.ui.stepComplete) return;
          if (state.ui.hintLevel === 0) {
            state.ui.hintLevel = 1;
            state.ui.feedbackText = stepText(step, "hint1");
            state.ui.feedbackType = "";
          } else if (state.ui.hintLevel === 1) {
            state.ui.hintLevel = 2;
            state.ui.feedbackText = stepText(step, "hint2");
            state.ui.feedbackType = "";
          } else {
            state.ui.feedbackText = T("noMoreHints");
            state.ui.feedbackType = "";
          }
          updateHintDisplay();
        }

        function toggleExplore() {
          if (state.scene === "explore") {
            state.scene = "activity";
            $("exploreBtn").classList.remove("active");
            loadSequence();
            loadStep();
          } else {
            state.scene = "explore";
            $("exploreBtn").classList.add("active");
            state.ui.feedbackText = T("exploreMode");
            state.ui.feedbackType = "";
            updateHintDisplay();
            updateControlsDisplay();
            updateMetersDisplay();
            updateMissionDisplay();
            renderBoard();
          }
        }

        /* ═══════════════════════════════════════════
           PANEL UPDATES
           ═══════════════════════════════════════════ */

        function updateMissionDisplay() {
          const step = getCurrentStep();
          if (step) {
            $("missionText").textContent = stepText(step, "mission");
          } else if (state.scene === "explore") {
            $("missionText").textContent = T("exploreMode");
          } else {
            $("missionText").textContent = T("comingSoon");
          }
        }

        function updateControlsDisplay() {
          const area = $("controlsArea");
          while (area.firstChild) area.removeChild(area.firstChild);
          if (state.scene === "explore") {
            if (state.mode === "flow") {
              const el = document.createElement("div");
              el.className = "ctrl-label";
              el.textContent = T("source") + ":";
              area.appendChild(el);
              const st = document.createElement("div");
              st.className = "type-toggle";
              const srcs = ["battery", "outlet", "solar", "generator"];
              for (let si = 0; si < srcs.length; si++) {
                const sb = document.createElement("button");
                sb.type = "button";
                sb.className = "type-btn";
                if (srcs[si] === state.flow.exploreSource)
                  sb.classList.add("active");
                sb.dataset.exploreSource = srcs[si];
                sb.textContent = T(srcs[si]);
                st.appendChild(sb);
              }
              area.appendChild(st);
            } else if (state.mode === "send") {
              const mkSlider = function (label, id, min, max, val, unit) {
                const cl = document.createElement("div");
                cl.className = "ctrl-label";
                cl.style.marginTop = "8px";
                cl.textContent = T(label);
                area.appendChild(cl);
                const sr = document.createElement("div");
                sr.className = "slider-row";
                const inp = document.createElement("input");
                inp.type = "range";
                inp.min = String(min);
                inp.max = String(max);
                inp.value = String(val);
                inp.id = id;
                inp.setAttribute("aria-label", T(label));
                sr.appendChild(inp);
                const sv = document.createElement("span");
                sv.className = "slider-val";
                sv.id = id + "Val";
                sv.textContent = val + " " + unit;
                sr.appendChild(sv);
                area.appendChild(sr);
              };
              mkSlider(
                "voltage",
                "voltageSlider",
                50,
                50000,
                state.send.voltage,
                "V",
              );
              mkSlider(
                "powerDemand",
                "expPowerSlider",
                100,
                100000,
                state.send.explorePower,
                "W",
              );
              mkSlider(
                "distance",
                "expDistSlider",
                1,
                1000,
                state.send.exploreDistance,
                "km",
              );
            } else {
              const el2 = document.createElement("div");
              el2.className = "ctrl-label";
              el2.textContent = T("exploreMode");
              area.appendChild(el2);
            }
            return;
          }
          const step = getCurrentStep();
          if (state.mode === "flow" && step && !state.ui.stepComplete) {
            const lbl = document.createElement("div");
            lbl.className = "ctrl-label";
            lbl.textContent =
              step.task.type === "predict"
                ? T("predictFirst")
                : T("chooseType");
            area.appendChild(lbl);
            const tog = document.createElement("div");
            tog.className = "type-toggle";
            const dcBtn = document.createElement("button");
            dcBtn.type = "button";
            dcBtn.className = "type-btn";
            dcBtn.dataset.choice = "dc";
            dcBtn.textContent = T("dc");
            tog.appendChild(dcBtn);
            const acBtn = document.createElement("button");
            acBtn.type = "button";
            acBtn.className = "type-btn";
            acBtn.dataset.choice = "ac";
            acBtn.textContent = T("ac");
            tog.appendChild(acBtn);
            area.appendChild(tog);
            const chk = document.createElement("button");
            chk.type = "button";
            chk.className = "fire-btn";
            chk.id = "checkBtn";
            chk.textContent =
              step.task.type === "predict" ? T("predict") : T("check");
            area.appendChild(chk);
          } else if (state.mode === "boost" && step && !state.ui.stepComplete) {
            const bc = document.createElement("button");
            bc.type = "button";
            bc.className = "fire-btn";
            bc.id = "checkBtn";
            bc.textContent = T("check");
            area.appendChild(bc);
          } else if (state.mode === "send" && step && !state.ui.stepComplete) {
            const task = step.task;
            if (task.type === "choose" && task.options) {
              const lbl = document.createElement("div");
              lbl.className = "ctrl-label";
              lbl.textContent = T("chooseBetter");
              area.appendChild(lbl);
              const tog = document.createElement("div");
              tog.className = "type-toggle";
              for (let oi = 0; oi < task.options.length; oi++) {
                const opt = task.options[oi];
                const ob = document.createElement("button");
                ob.type = "button";
                ob.className = "type-btn";
                ob.dataset.choice = String(oi);
                ob.textContent = optLabel(opt);
                tog.appendChild(ob);
              }
              area.appendChild(tog);
              const chk2 = document.createElement("button");
              chk2.type = "button";
              chk2.className = "fire-btn";
              chk2.id = "checkBtn";
              chk2.textContent = T("check");
              area.appendChild(chk2);
            } else if (task.type === "adjust") {
              const lbl = document.createElement("div");
              lbl.className = "ctrl-label";
              lbl.textContent = T("adjustSlider");
              area.appendChild(lbl);
              if (!task.controls || task.controls.indexOf("voltage") !== -1) {
                const vl = document.createElement("div");
                vl.className = "ctrl-label";
                vl.style.marginTop = "8px";
                vl.textContent = T("voltage");
                area.appendChild(vl);
                const sr = document.createElement("div");
                sr.className = "slider-row";
                const inp = document.createElement("input");
                inp.type = "range";
                inp.min = "50";
                inp.max = "50000";
                inp.value = String(state.send.voltage);
                inp.id = "voltageSlider";
                inp.setAttribute("aria-label", T("voltage"));
                sr.appendChild(inp);
                const sv = document.createElement("span");
                sv.className = "slider-val";
                sv.id = "voltageVal";
                sv.textContent = Math.round(state.send.voltage) + " V";
                sr.appendChild(sv);
                area.appendChild(sr);
              }
              if (task.target && task.target.minEfficiency) {
                const tl = document.createElement("div");
                tl.className = "ctrl-label";
                tl.style.marginTop = "8px";
                tl.textContent =
                  T("targetAbove") + " " + task.target.minEfficiency + "%";
                area.appendChild(tl);
              }
              const chk3 = document.createElement("button");
              chk3.type = "button";
              chk3.className = "fire-btn";
              chk3.id = "checkBtn";
              chk3.textContent = T("check");
              area.appendChild(chk3);
            }
          } else if (state.mode === "pick" && step && !state.ui.stepComplete) {
            const pc = document.createElement("button");
            pc.type = "button";
            pc.className = "fire-btn";
            pc.id = "checkBtn";
            pc.textContent = T("check");
            area.appendChild(pc);
          } else if (state.mode === "build" && step && !state.ui.stepComplete) {
            const bkc = document.createElement("button");
            bkc.type = "button";
            bkc.className = "fire-btn";
            bkc.id = "checkBtn";
            bkc.textContent = T("check");
            area.appendChild(bkc);
          }
        }

        function updateMetersDisplay() {
          if (state.scene === "explore") {
            if (state.mode === "flow") {
              $("rdType").textContent =
                state.flow.exploreCt === "dc"
                  ? T("dcOneWay")
                  : T("acAlternating");
              $("rdSource").textContent = T(state.flow.exploreSource);
              $("rdLoad").textContent = T("lamp");
              $("rdVoltage").textContent = "\u2014";
              $("rdCurrent").textContent = "\u2014";
              $("rdPower").textContent = "\u2014";
              $("rdLoss").textContent = "\u2014";
              $("rdEfficiency").textContent = "\u2014";
              return;
            }
            if (state.mode === "send") {
              const tr = computeTransfer(
                state.send.voltage,
                state.send.explorePower,
                state.send.exploreDistance,
                1,
              );
              $("rdType").textContent = "AC";
              $("rdSource").textContent = T("generator");
              $("rdLoad").textContent = T("lamp");
              $("rdVoltage").textContent =
                Math.round(state.send.voltage) + " V";
              $("rdVoltage").className = "readout-val";
              $("rdCurrent").textContent = tr.current.toFixed(1) + " A";
              $("rdCurrent").className = "readout-val";
              $("rdPower").textContent = Math.round(tr.useful) + " W";
              $("rdPower").className = "readout-val";
              $("rdLoss").textContent = Math.round(tr.loss) + " W";
              $("rdLoss").className = "readout-val";
              $("rdEfficiency").textContent = Math.round(tr.efficiency) + " %";
              $("rdEfficiency").className = "readout-val";
              return;
            }
          }
          const step = getCurrentStep();
          if (!step) {
            $("rdType").textContent = "\u2014";
            $("rdSource").textContent = "\u2014";
            $("rdLoad").textContent = "\u2014";
            $("rdVoltage").textContent = "\u2014";
            $("rdCurrent").textContent = "\u2014";
            $("rdPower").textContent = "\u2014";
            $("rdLoss").textContent = "\u2014";
            $("rdEfficiency").textContent = "\u2014";
            return;
          }
          const setup = step.setup;
          if (state.mode === "send") {
            const v = state.send.voltage || setup.voltage || 1000;
            const tr = computeTransfer(
              v,
              setup.powerDemand,
              setup.distance,
              setup.wireQuality || 1,
            );
            $("rdType").textContent = "AC";
            $("rdSource").textContent = T("generator");
            $("rdLoad").textContent = T(setup.loadType || "lamp");
            $("rdVoltage").textContent = Math.round(v) + " V";
            $("rdVoltage").className = "readout-val";
            $("rdCurrent").textContent = tr.current.toFixed(1) + " A";
            $("rdCurrent").className =
              tr.wireHeat > 0.4 ? "readout-val" : "readout-val";
            $("rdPower").textContent = Math.round(tr.useful) + " W";
            $("rdPower").className = "readout-val";
            $("rdLoss").textContent = Math.round(tr.loss) + " W";
            $("rdLoss").className = "readout-val";
            $("rdEfficiency").textContent = Math.round(tr.efficiency) + " %";
            $("rdEfficiency").className = "readout-val";
            return;
          }
          $("rdType").textContent =
            setup.currentType === "dc" ? T("dcOneWay") : T("acAlternating");
          $("rdSource").textContent = T(setup.sourceType);
          $("rdLoad").textContent = T(setup.loadType);
          $("rdVoltage").textContent = "\u2014";
          $("rdVoltage").className = "readout-val dim";
          $("rdCurrent").textContent = "\u2014";
          $("rdCurrent").className = "readout-val dim";
          $("rdPower").textContent = "\u2014";
          $("rdPower").className = "readout-val dim";
          $("rdLoss").textContent = "\u2014";
          $("rdLoss").className = "readout-val dim";
          $("rdEfficiency").textContent = "\u2014";
          $("rdEfficiency").className = "readout-val dim";
        }

        function updateHintDisplay() {
          const el = $("hintText");
          el.textContent = state.ui.feedbackText;
          el.className = "hint-text";
          if (state.ui.feedbackType === "success") el.classList.add("success");
          else if (state.ui.feedbackType === "error") el.classList.add("error");
        }

        function updateProgressDisplay() {
          const prog = state.progress[state.family][state.mode];
          const total = state.sequence.steps.length;
          const done = prog[state.stage] || 0;
          const pct = total > 0 ? (done / total) * 100 : 0;
          $("progressFill").style.width = pct + "%";
          $("progressLabel").textContent = done + " " + T("of") + " " + total;
        }

        function announce(msg) {
          $("announcer").textContent = msg;
        }

        /* ═══════════════════════════════════════════
           NAVIGATION
           ═══════════════════════════════════════════ */

        function setFamily(f) {
          state.family = f;
          document.querySelectorAll(".family-btn").forEach(function (btn) {
            btn.classList.toggle("active", btn.dataset.family === f);
          });
          state.mode = state.lastMode[f] || FAMILY_MODES[f][0];
          renderModeButtons();
          setMode(state.mode);
        }

        function setMode(m) {
          state.mode = m;
          state.lastMode[state.family] = m;
          document.querySelectorAll(".mode-btn").forEach(function (btn) {
            btn.classList.toggle("active", btn.dataset.mode === m);
          });
          document.documentElement.style.setProperty(
            "--mode-active",
            MODE_COLORS[m],
          );
          state.stage = MODE_STAGES[m][0];
          state.scene = "activity";
          $("exploreBtn").classList.remove("active");
          renderStageButtons();
          loadSequence();
          loadStep();
        }

        function setStage(key) {
          state.stage = key;
          document.querySelectorAll(".stage-btn").forEach(function (btn) {
            btn.classList.toggle("active", btn.dataset.stage === key);
          });
          state.scene = "activity";
          $("exploreBtn").classList.remove("active");
          loadSequence();
          loadStep();
        }

        function renderModeButtons() {
          const row = $("modeRow");
          while (row.firstChild) row.removeChild(row.firstChild);
          const modes = FAMILY_MODES[state.family];
          for (let i = 0; i < modes.length; i++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "mode-btn";
            btn.dataset.mode = modes[i];
            btn.textContent = T(modes[i]);
            if (modes[i] === state.mode) btn.classList.add("active");
            row.appendChild(btn);
          }
        }

        function renderStageButtons() {
          const row = $("stageRow");
          while (row.firstChild) row.removeChild(row.firstChild);
          const stages = MODE_STAGES[state.mode];
          if (!stages) return;
          for (let i = 0; i < stages.length; i++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "stage-btn";
            btn.dataset.stage = stages[i];
            btn.textContent = T("stg_" + state.mode + "_" + stages[i]);
            if (stages[i] === state.stage) btn.classList.add("active");
            row.appendChild(btn);
          }
        }

        /* ═══════════════════════════════════════════
           TRANSLATIONS
           ═══════════════════════════════════════════ */

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          $("titleText").textContent = T("title");
          $("subtitleText").textContent = T("subtitle");
          $("langBtn").textContent = state.lang === "en" ? "PL" : "EN";
          document.querySelectorAll(".family-btn").forEach(function (btn) {
            btn.textContent = T(btn.dataset.family);
          });
          renderModeButtons();
          renderStageButtons();
          $("introBtn").textContent = T("introBtn");
          $("lblInvestigation").textContent = T("investigation");
          $("exploreBtn").textContent = T("explore");
          $("hintBtn").textContent = T("hint");
          $("nextBtn").textContent = T("next");
          $("lblMission").textContent = T("mission");
          $("lblControls").textContent = T("controls");
          $("lblMeters").textContent = T("meters");
          $("lblWhy").textContent = T("whyItWorks");
          $("lblProgress").textContent = T("progress");
          $("lblRdType").textContent = T("currentType");
          $("lblRdSource").textContent = T("source");
          $("lblRdLoad").textContent = T("load");
          $("lblRdVoltage").textContent = T("pushVoltage");
          $("lblRdCurrent").textContent = T("flowCurrent");
          $("lblRdPower").textContent = T("usefulPower");
          $("lblRdLoss").textContent = T("wireHeatLoss");
          $("lblRdEfficiency").textContent = T("efficiency");
          document
            .querySelector("a[aria-label]")
            .setAttribute("aria-label", T("ariaBackToLearn"));
          $("langBtn").title = T("ariaSwitchLang");
          $("nextBtn").setAttribute("aria-label", T("ariaNextRound"));
          boardSvg.setAttribute("aria-label", T("ariaBoard"));
          document
            .querySelector('meta[name="description"]')
            .setAttribute("content", T("subtitle"));
          updateMissionDisplay();
          updateControlsDisplay();
          updateMetersDisplay();
          updateProgressDisplay();
          if (state.introActive) {
            $("lblIntroTitle").textContent = T("introTitle");
            $("lblIntroBack").textContent = T("introBack");
            $("introBtn").textContent = T("introBtn");
            setIntroStep(state.introStep);
          }
          renderBoard();
        }

        /* ═══════════════════════════════════════════
           ANIMATION LOOP
           ═══════════════════════════════════════════ */

        let lastAnimTime = 0;

        function animate(now) {
          const dt =
            lastAnimTime > 0 ? Math.min(now - lastAnimTime, 100) / 1000 : 0;
          lastAnimTime = now;
          if (!reducedMotion) {
            state.ui.animPhase += dt;
            updateMarkerPositions();
          }
          requestAnimationFrame(animate);
        }

        /* ═══════════════════════════════════════════
           EVENT LISTENERS
           ═══════════════════════════════════════════ */

        boardSvg.addEventListener("click", function (e) {
          if (state.introActive) {
            const isrc = e.target.closest("[data-intro-source]");
            if (isrc) {
              const src = isrc.getAttribute("data-intro-source");
              if (state.intro) state.intro.source = src;
              renderIntroBoard();
              return;
            }
            const imode = e.target.closest("[data-intro-mode]");
            if (imode) {
              exitIntroToMode(imode.getAttribute("data-intro-mode"));
              return;
            }
            return;
          }
          const zone = e.target.closest("[data-answer]");
          if (zone && state.mode === "pick" && !state.ui.stepComplete) {
            state.pick.selectedChoice = zone.getAttribute("data-answer");
            renderBoard();
            return;
          }
          const slot = e.target.closest("[data-boost-opt]");
          if (slot && state.mode === "boost" && !state.ui.stepComplete) {
            state.boost.childChoice = slot.getAttribute("data-boost-opt");
            const all = boardSvg.querySelectorAll("[data-boost-opt]");
            for (let i = 0; i < all.length; i++) {
              const isActive =
                all[i].getAttribute("data-boost-opt") ===
                state.boost.childChoice;
              const r = all[i].querySelector("rect");
              if (r) {
                r.setAttribute("stroke", isActive ? "#455a64" : "#e0ddd6");
                r.setAttribute("stroke-width", isActive ? "2.5" : "1.5");
                r.setAttribute("fill", isActive ? "#eceff1" : "#fff");
              }
            }
            return;
          }
          const bSlot = e.target.closest("[data-build-opt]");
          if (bSlot && state.mode === "build" && !state.ui.stepComplete) {
            state.build.childChoice = bSlot.getAttribute("data-build-opt");
            const step = getCurrentStep();
            if (step && step.task.options) {
              const idx = parseInt(state.build.childChoice, 10);
              const opt = step.task.options[idx];
              if (opt && opt.chain) {
                state.build.selectedChain = opt.chain;
                renderBoard();
              }
            }
            return;
          }
        });

        $("familyRow").addEventListener("click", function (e) {
          const btn = e.target.closest(".family-btn");
          if (btn && btn.dataset.family) setFamily(btn.dataset.family);
        });

        $("modeRow").addEventListener("click", function (e) {
          const btn = e.target.closest(".mode-btn");
          if (btn && btn.dataset.mode) setMode(btn.dataset.mode);
        });

        $("stageRow").addEventListener("click", function (e) {
          const btn = e.target.closest(".stage-btn");
          if (btn && btn.dataset.stage) setStage(btn.dataset.stage);
        });

        $("introBtn").addEventListener("click", function () {
          enterIntro();
        });
        $("btnIntroExit").addEventListener("click", function () {
          exitIntro();
        });
        $("btnIntroPrev").addEventListener("click", function () {
          if (state.introStep > 1) setIntroStep(state.introStep - 1);
        });
        $("btnIntroNext").addEventListener("click", function () {
          if (state.introStep < INTRO_TOTAL) setIntroStep(state.introStep + 1);
        });
        $("introControls").addEventListener("input", function (e) {
          if (e.target.id === "introVoltageSlider") {
            const nv = parseInt(e.target.value, 10);
            if (state.intro) state.intro.voltage = nv;
            const vv = $("introVoltageSliderVal");
            if (vv) vv.textContent = nv + " V";
            renderIntroBoard();
          }
        });
        $("introControls").addEventListener("click", function (e) {
          const btn = e.target.closest("[data-intro-tf]");
          if (btn && state.intro) {
            state.intro.tfMode = btn.dataset.introTf;
            renderIntroControls();
            renderIntroBoard();
            return;
          }
          const dcb = e.target.closest("[data-intro-dc]");
          if (dcb && state.intro) {
            state.intro.dcMode = dcb.dataset.introDc;
            renderIntroControls();
            renderIntroBoard();
            return;
          }
          const hyb = e.target.closest("[data-intro-hybrid]");
          if (hyb && state.intro) {
            state.intro.hybridScene = parseInt(hyb.dataset.introHybrid, 10);
            renderIntroControls();
            renderIntroBoard();
          }
        });

        $("exploreBtn").addEventListener("click", function () {
          toggleExplore();
        });
        $("hintBtn").addEventListener("click", function () {
          showHint();
        });
        $("nextBtn").addEventListener("click", function () {
          nextRound();
        });

        $("controlsArea").addEventListener("click", function (e) {
          const expSrc = e.target.closest("[data-explore-source]");
          if (expSrc) {
            const src = expSrc.dataset.exploreSource;
            state.flow.exploreSource = src;
            state.flow.exploreCt =
              src === "outlet" || src === "generator" ? "ac" : "dc";
            const all = $("controlsArea").querySelectorAll(
              "[data-explore-source]",
            );
            for (let i = 0; i < all.length; i++) {
              all[i].classList.toggle(
                "active",
                all[i].dataset.exploreSource === src,
              );
            }
            renderBoard();
            updateMetersDisplay();
            return;
          }
          const choiceBtn = e.target.closest("[data-choice]");
          if (choiceBtn) {
            const choice = choiceBtn.dataset.choice;
            if (state.mode === "flow") state.flow.childChoice = choice;
            else if (state.mode === "pick") state.pick.selectedChoice = choice;
            else if (state.mode === "boost") state.boost.childChoice = choice;
            else if (state.mode === "build") {
              state.build.childChoice = choice;
              const bStep = getCurrentStep();
              if (bStep && bStep.task.options) {
                const bIdx = parseInt(choice, 10);
                const bOpt = bStep.task.options[bIdx];
                if (bOpt && bOpt.chain) {
                  state.build.selectedChain = bOpt.chain;
                  renderBoard();
                }
              }
            } else if (state.mode === "send") {
              state.send.childChoice = choice;
              const step = getCurrentStep();
              if (step && step.task.options) {
                const idx = parseInt(choice, 10);
                const opt = step.task.options[idx];
                if (opt && opt.voltage) {
                  state.send.voltage = opt.voltage;
                  renderBoard();
                  updateMetersDisplay();
                }
              }
            }
            const all = $("controlsArea").querySelectorAll("[data-choice]");
            for (let i = 0; i < all.length; i++) {
              all[i].classList.toggle(
                "active",
                all[i].dataset.choice === choice,
              );
            }
            return;
          }
          if (e.target.id === "checkBtn" || e.target.closest("#checkBtn")) {
            checkAnswer();
          }
        });

        $("controlsArea").addEventListener("input", function (e) {
          if (e.target.id === "voltageSlider") {
            state.send.voltage = parseInt(e.target.value, 10);
            const vv = $("voltageVal");
            if (vv) vv.textContent = state.send.voltage + " V";
            renderBoard();
            updateMetersDisplay();
          } else if (e.target.id === "expPowerSlider") {
            state.send.explorePower = parseInt(e.target.value, 10);
            const pv = $("expPowerSliderVal");
            if (pv) pv.textContent = state.send.explorePower + " W";
            renderBoard();
            updateMetersDisplay();
          } else if (e.target.id === "expDistSlider") {
            state.send.exploreDistance = parseInt(e.target.value, 10);
            const dv = $("expDistSliderVal");
            if (dv) dv.textContent = state.send.exploreDistance + " km";
            renderBoard();
            updateMetersDisplay();
          }
        });

        $("langBtn").addEventListener("click", function () {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            const ae = document.activeElement;
            if (
              ae &&
              ae.closest &&
              (ae.closest("[data-intro-source]") ||
                ae.closest("[data-intro-mode]") ||
                ae.closest("[data-answer]") ||
                ae.closest("[data-boost-opt]") ||
                ae.closest("[data-build-opt]"))
            ) {
              e.preventDefault();
              ae.dispatchEvent(new MouseEvent("click", { bubbles: true }));
              return;
            }
            if (
              ae === $("nextBtn") ||
              ae === $("hintBtn") ||
              ae === $("checkBtn")
            )
              return;
            if (state.ui.stepComplete && !$("nextBtn").disabled) {
              e.preventDefault();
              nextRound();
            }
          }
          const num = parseInt(e.key, 10);
          if (num >= 1 && num <= 5 && !e.ctrlKey && !e.metaKey && !e.altKey) {
            const tag = (document.activeElement || {}).tagName;
            if (tag !== "INPUT" && tag !== "TEXTAREA") {
              const stages = MODE_STAGES[state.mode];
              if (stages && stages[num - 1]) {
                setStage(stages[num - 1]);
              }
            }
          }
        });

        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) lastAnimTime = 0;
        });

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */

        function init() {
          try {
            if (localStorage.getItem("currentlab_introSeen") === "1") {
              state.introSeen = true;
            }
          } catch {
            /* storage unavailable */
          }
          applyTranslations();
          setFamily("learn");
          requestAnimationFrame(animate);
          if (!state.introSeen) {
            enterIntro();
          }
        }

        init();
      })();
    </script>
  </body>
</html>
