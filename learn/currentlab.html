<!doctype html>
<!--
Implementing agent workflow:
After making changes, and again before considering the job finished, run `npm run code-review -- currentlab.html`.
Use it as the final review gate. It enforces the single-file HTML app policy plus HTML, CSS, JavaScript, formatting, and architecture checks.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current Paths Lab</title>
    <meta
      name="description"
      content="Current Paths Lab — explore AC and DC electricity, see how power travels, and learn why the grid uses what it uses."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fafaf7;
        --panel: #ffffff;
        --panel-border: #e0ddd6;
        --text: #37474f;
        --text-head: #263238;
        --text-dim: #78909c;
        --text-label: #90a4ae;
        --accent: #455a64;
        --accent-light: #eceff1;
        --canvas-bg: #f5f3ee;
        --ac: #157a8c;
        --ac-soft: #d9eff2;
        --dc: #d98b1f;
        --dc-soft: #fff0d8;
        --power: #43a047;
        --loss: #e76f51;
        --heat: #f26b3a;
        --route-dim: #b0bec5;
        --converter: #78909c;
        --mode-flow: #0097a7;
        --mode-send: #2e7d32;
        --mode-boost: #5c6bc0;
        --mode-pick: #e65100;
        --mode-build: #455a64;
        --mode-active: var(--mode-flow);
        --success: #66bb6a;
        --error: #ef5350;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #fafaf7 0%, #f0ede6 100%);
        font-family: "Outfit", sans-serif;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }

      header {
        padding: 6px 28px 5px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-text {
        flex: 1;
        min-width: 0;
      }

      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-head);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      header h1 a {
        color: inherit;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      header h1 a:hover {
        opacity: 0.7;
      }

      .header-emoji {
        font-size: 18px;
        line-height: 1;
      }

      header p {
        margin-top: 1px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .lang-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .main {
        display: flex;
        height: calc(100vh - 46px);
      }

      .play-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--canvas-bg);
        border-right: 1px solid var(--panel-border);
      }

      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--panel-border);
        background: var(--panel);
      }

      .tb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .family-toggle {
        display: flex;
        border: 1.5px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .family-btn {
        padding: 8px 20px;
        border: none;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .family-btn:hover {
        background: #f0ede6;
      }

      .family-btn.active {
        background: var(--accent);
        color: #fff;
      }

      .family-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }

      .mode-btn {
        padding: 10px 18px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .mode-btn:hover {
        background: #f0ede6;
      }

      .mode-btn.active {
        color: #fff;
        border-color: transparent;
      }

      .mode-btn[data-mode="flow"].active {
        background: var(--mode-flow);
      }

      .mode-btn[data-mode="send"].active {
        background: var(--mode-send);
      }

      .mode-btn[data-mode="boost"].active {
        background: var(--mode-boost);
      }

      .mode-btn[data-mode="pick"].active {
        background: var(--mode-pick);
      }

      .mode-btn[data-mode="build"].active {
        background: var(--mode-build);
      }

      .mode-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .mode-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .stage-btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .stage-btn:hover {
        background: #f0ede6;
      }

      .stage-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }

      .stage-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .tb-sep {
        width: 1px;
        height: 24px;
        background: var(--panel-border);
        align-self: center;
        margin: 0 6px;
      }

      .action-btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .action-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }

      .action-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .action-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .board-stage {
        flex: 1;
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .board-stage svg {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .panel {
        width: 300px;
        flex-shrink: 0;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .panel-section {
        padding: 16px 20px;
        border-bottom: 1px solid var(--panel-border);
      }

      .panel-section:last-child {
        border-bottom: none;
      }

      .panel-section.flex-fill {
        flex: 1;
      }

      .hidden {
        display: none;
      }

      .intro-panel {
        display: none;
        padding: 20px;
        flex-direction: column;
        gap: 14px;
        flex: 1;
      }

      .intro-panel.active {
        display: flex;
      }

      .intro-step-title {
        font-size: 17px;
        font-weight: 700;
        color: var(--text-head);
        margin: 0;
      }

      .intro-commentary {
        font-size: 13px;
        color: var(--text);
        line-height: 1.6;
        margin: 0;
      }

      .intro-nav {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 4px;
      }

      .intro-nav .type-btn {
        min-width: 40px;
        padding: 8px 12px;
      }

      .intro-counter {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
        flex: 1;
        text-align: center;
      }

      .intro-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .intro-back {
        align-self: flex-start;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--panel-border);
        background: none;
        color: var(--text-dim);
        cursor: pointer;
        touch-action: manipulation;
      }

      .intro-back:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .intro-back:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .intro-mode-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1.5px solid var(--panel-border);
        background: #fff;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
      }

      .intro-mode-card:hover {
        border-color: var(--accent);
        background: var(--accent-light);
      }

      .intro-mode-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .intro-mode-card-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-head);
      }

      .intro-mode-card-desc {
        font-size: 11px;
        color: var(--text-dim);
      }

      .section-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-label);
        margin-bottom: 6px;
      }

      .mission-text {
        font-size: 13px;
        color: var(--text);
        line-height: 1.55;
      }

      .type-toggle {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }

      .type-btn {
        flex: 1;
        padding: 8px 4px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
      }

      .type-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }

      .type-btn:hover {
        background: #f0ede6;
      }

      .type-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .fire-btn {
        padding: 12px 4px;
        font-size: 14px;
        font-weight: 600;
        background: var(--text-head);
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        margin-top: 10px;
        touch-action: manipulation;
      }

      .fire-btn:hover {
        background: #37474f;
      }

      .fire-btn:active {
        transform: scale(0.97);
      }

      .fire-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .fire-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 2px 0;
      }

      .readout-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
      }

      .readout-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }

      .readout-val.dim {
        color: var(--text-dim);
        font-weight: 400;
      }

      .info-text {
        font-size: 13px;
        color: #546e7a;
        line-height: 1.6;
      }

      .progress-bar {
        height: 5px;
        background: var(--accent-light);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 8px;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--mode-active);
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .progress-label {
        margin-top: 4px;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: var(--text-label);
      }

      .hint-text {
        font-size: 12px;
        color: #546e7a;
        line-height: 1.5;
        min-height: 18px;
        margin-top: 6px;
      }

      .hint-text.success {
        color: var(--success);
        font-weight: 600;
      }

      .hint-text.error {
        color: var(--error);
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }

      .slider-row input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        background: #e0ddd6;
        border-radius: 3px;
        touch-action: none;
      }

      .slider-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }

      .slider-row input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }

      .slider-row input[type="range"]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .slider-val {
        min-width: 52px;
        text-align: right;
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }

      .investigation-progress {
        margin-top: 6px;
      }

      .panel-action-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .panel-action-row .action-btn {
        flex: 1;
      }

      .panel-next-btn {
        flex: 2;
        padding: 10px 4px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: calc(100vh - 46px);
        }

        .play-area {
          min-height: 360px;
          height: 58vh;
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
        }

        .panel {
          width: 100%;
        }

        .toolbar {
          padding: 6px 8px;
          gap: 4px;
        }

        .mode-btn {
          padding: 7px 10px;
          font-size: 12px;
        }

        .family-btn {
          padding: 6px 12px;
          font-size: 12px;
        }

        .stage-btn {
          padding: 5px 8px;
          font-size: 11px;
        }
      }

      @media (max-width: 500px) {
        .toolbar {
          padding: 4px 4px;
          gap: 3px;
        }

        .tb-row {
          gap: 3px;
        }

        .mode-btn {
          padding: 6px 7px;
          font-size: 11px;
        }

        .family-btn {
          padding: 5px 10px;
          font-size: 11px;
        }

        .stage-btn {
          padding: 4px 6px;
          font-size: 11px;
        }

        .action-btn {
          padding: 5px 8px;
          font-size: 11px;
        }

        .tb-sep {
          margin: 0 3px;
        }

        .board-stage {
          min-height: 300px;
        }

        .panel {
          font-size: 13px;
        }
      }

      @media (max-width: 375px) {
        header {
          padding: 4px 12px;
          gap: 8px;
        }

        header h1 {
          font-size: 15px;
        }

        header p {
          font-size: 11px;
        }

        .toolbar {
          gap: 4px;
        }

        .family-btn {
          padding: 5px 10px;
          font-size: 12px;
        }

        .mode-btn {
          padding: 5px 8px;
          font-size: 12px;
        }

        .stage-btn {
          padding: 5px 8px;
          font-size: 11px;
        }

        .action-btn {
          padding: 6px 10px;
          font-size: 12px;
        }

        .panel-section {
          padding: 12px 14px;
        }
      }

      @media (pointer: coarse) {
        .mode-btn {
          min-height: 42px;
        }

        .stage-btn {
          min-height: 36px;
        }

        .type-btn {
          min-height: 44px;
          font-size: 14px;
        }

        .fire-btn {
          min-height: 48px;
          font-size: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .progress-fill {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/" aria-label="Back to Learn"
            ><span class="header-emoji">&#x26A1;</span></a
          >
          <span id="titleText">Current Paths Lab</span>
        </h1>
        <p id="subtitleText">
          Explore AC and DC electricity — see how power travels.
        </p>
      </div>
      <button
        type="button"
        class="action-btn"
        id="introBtn"
        aria-label="Introduction"
      >
        &#x1F4A1; Intro
      </button>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="play-area">
        <div class="toolbar">
          <div class="tb-row" id="familyRow">
            <div class="family-toggle">
              <button
                type="button"
                class="family-btn active"
                data-family="learn"
              >
                Learn
              </button>
              <button type="button" class="family-btn" data-family="decide">
                Decide
              </button>
            </div>
          </div>
          <div class="tb-row" id="modeRow"></div>
        </div>

        <div class="board-stage">
          <svg
            id="boardSvg"
            viewBox="0 0 900 550"
            preserveAspectRatio="xMidYMid meet"
            aria-label="Electricity lab simulation board"
          ></svg>
        </div>
      </div>

      <div class="panel">
        <div class="intro-panel" id="introPanel">
          <span class="section-label" id="lblIntroTitle">Introduction</span>
          <button type="button" class="intro-back" id="btnIntroExit">
            &larr; <span id="lblIntroBack">Exit</span>
          </button>
          <h2 class="intro-step-title" id="introStepTitle"></h2>
          <p class="intro-commentary" id="introCommentary"></p>
          <div class="intro-nav">
            <button
              type="button"
              class="type-btn"
              id="btnIntroPrev"
              aria-label="Previous step"
            >
              &larr;
            </button>
            <span class="intro-counter" id="introCounter">1 / 9</span>
            <button
              type="button"
              class="type-btn"
              id="btnIntroNext"
              aria-label="Next step"
            >
              &rarr;
            </button>
          </div>
          <div class="intro-controls" id="introControls"></div>
        </div>
        <div class="panel-section" id="panelInvestigation">
          <div class="section-label" id="lblInvestigation">Investigation</div>
          <div class="tb-row" id="stageRow"></div>
          <div class="progress-bar investigation-progress">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0 / 6</div>
        </div>
        <div class="panel-section" id="panelMission">
          <div class="section-label" id="lblMission">Mission</div>
          <div class="mission-text" id="missionText"></div>
        </div>

        <div class="panel-section" id="panelControls">
          <div class="section-label" id="lblControls">Controls</div>
          <div id="controlsArea"></div>
        </div>

        <div class="panel-section" id="panelMeters">
          <div class="section-label" id="lblMeters">Meters</div>
          <div id="metersArea">
            <div class="readout-row">
              <span class="readout-label" id="lblRdType">Current Type</span>
              <span class="readout-val" id="rdType">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblRdSource">Source</span>
              <span class="readout-val" id="rdSource">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblRdLoad">Load</span>
              <span class="readout-val" id="rdLoad">&mdash;</span>
            </div>
            <div class="readout-row">
              <span class="readout-label" id="lblRdVoltage"
                >Push (Voltage)</span
              >
              <span class="readout-val dim" id="rdVoltage">&mdash;</span>
            </div>

        function pathLength(pts) {
          let len = 0;
          for (let i = 0; i < pts.length; i++) {
            const a = pts[i];
            const b = pts[(i + 1) % pts.length];
            len += Math.hypot(b.x - a.x, b.y - a.y);
          }
          return len;
        }

        function pointOnPath(pts, t) {
          t = ((t % 1) + 1) % 1;
          const total = pathLength(pts);
          let target = t * total;
          for (let i = 0; i < pts.length; i++) {
            const a = pts[i];
            const b = pts[(i + 1) % pts.length];
            const segLen = Math.hypot(b.x - a.x, b.y - a.y);
            if (target <= segLen + 0.001) {
              const frac = segLen > 0 ? target / segLen : 0;
              return {
                x: a.x + (b.x - a.x) * frac,
                y: a.y + (b.y - a.y) * frac,
              };
            }
            target -= segLen;
          }
          return pts[0];
        }

            m.el.setAttribute("cx", pt.x);

        /* ═══════════════════════════════════════════
           PHYSICS
           ═══════════════════════════════════════════ */

        const WIRE_R_PER_KM = 0.05;

        function computeTransfer(
          voltage,
          powerDemand,
          distanceKm,
          wireQuality,
        ) {
          if (voltage <= 0)
            return {
              current: 0,
              loss: 0,
              useful: 0,
              efficiency: 0,
              wireHeat: 0,
            };
          const current = powerDemand / voltage;
          const R = (WIRE_R_PER_KM / (wireQuality || 1)) * distanceKm;
          const loss = current * current * R;
          const useful = Math.max(0, powerDemand - loss);
          const efficiency = powerDemand > 0 ? (useful / powerDemand) * 100 : 0;
          const wireHeat = Math.min(1, loss / Math.max(1, powerDemand));
          return {
            current: current,
            loss: loss,
            useful: useful,
            efficiency: efficiency,
            wireHeat: wireHeat,
          };
        }

            const ct = src === "outlet" || src === "generator" ? "ac" : "dc";
            drawCircuit(g, 450, 250, 200, 60, ct, src, "lamp", true);
            drawWaveformStrip(g, 320, 400, 260, 55, ct);

                "data-intro-source": srcs[si],

          } else if (s === 4) {
            const v = (state.intro && state.intro.voltage) || 1000;
            drawCircuit(g, 450, 200, 200, 60, "dc", "battery", "lamp", true);
            drawMeterBadge(g, 250, 130, T("voltage"), v + " V", "#455a64");
            drawMeterBadge(
              g,
              450,
              130,
              T("flowCurrent"),
              (1000 / v).toFixed(1) + " A",
              "#455a64",
            );
            drawMeterBadge(g, 650, 130, T("usefulPower"), "1000 W", "#43a047");
          } else if (s === 5) {
            const v = (state.intro && state.intro.voltage) || 1000;
            const tr = computeTransfer(v, 5000, 200, 1);
            const wColor = heatColor(tr.wireHeat);
            g.appendChild(
              svgEl("line", {
                x1: 150,
                y1: 200,
                x2: 750,
                y2: 200,
                stroke: wColor,
                "stroke-width": 4,
                opacity: 0.7,
              }),
            );
            if (tr.wireHeat > 0.15) {
              g.appendChild(
                svgEl("line", {
                  x1: 160,
                  y1: 200,
                  x2: 740,
                  y2: 200,
                  stroke: wColor,
                  "stroke-width": 10,
                  opacity: 0.15 + tr.wireHeat * 0.25,
                }),
              );
            }
            drawRouteTower(g, 300, 205);
            drawRouteTower(g, 450, 205);
            drawRouteTower(g, 600, 205);
            drawSource(g, "generator", 100, 210);
            drawLoad(g, "lamp", 800, 210);
            drawMeterBadge(
              g,
              300,
              150,
              T("voltage"),
              Math.round(v) + " V",
              "#455a64",
            );
            drawMeterBadge(
              g,
              600,
              150,
              T("efficiency"),
              Math.round(tr.efficiency) + " %",
              tr.efficiency < 50 ? "#e76f51" : "#43a047",
            );
            drawEnergyBar(g, 150, 330, 600, 22, 5000, tr.useful, tr.loss);
          } else if (s === 6) {
            const tfMode = (state.intro && state.intro.tfMode) || "with";
            if (tfMode === "with") {
              const chain = [
                {
                  type: "source",
                  sourceType: "generator",
                  voltage: 230,
                  outputType: "ac",
                },
                {
                  type: "stepUp",
                  voltage: 110000,
                  active: true,
                  outputType: "ac",
                },
                { type: "line", distance: 200, outputType: "ac" },
                {
                  type: "stepDown",
                  voltage: 230,
                  active: true,
                  outputType: "ac",
                },
                { type: "load", loadType: "lamp", voltage: 230 },
              ];
              const n = chain.length;
              const sX = 80;
              const eX = 820;
              const y = 220;
              const sp = (eX - sX) / (n - 1);
              for (let i = 0; i < n - 1; i++) {
                const x1 = sX + i * sp + 35;
                const x2 = sX + (i + 1) * sp - 35;
                if (x2 > x1)
                  drawWireSegment(g, x1, y, x2, y, chain[i].outputType || "ac");
              }
              for (let i = 0; i < n; i++) {
                const x = sX + i * sp;
                const b = chain[i];
                if (b.type === "source") drawSource(g, b.sourceType, x, y);
                else if (b.type === "load") drawLoad(g, b.loadType, x, y);
                else if (b.type === "stepUp" || b.type === "stepDown")
                  drawTransformerBlock(g, x, y, b);
                else if (b.type === "line") drawRouteTower(g, x, y + 5);
                if (b.voltage !== undefined) {
                  const vl = svgEl("text", {

            } else {

              drawWireSegment(g, 150, 220, 750, 220, "ac");
              drawRouteTower(g, 300, 225);
              drawRouteTower(g, 450, 225);
              drawRouteTower(g, 600, 225);
              drawLoad(g, "lamp", 800, 220);
              const vl = svgEl("text", {

                "font-size": 12,
                "font-weight": "bold",
                "font-family": "Share Tech Mono, monospace",

              const tr = computeTransfer(230, 5000, 200, 1);
              drawMeterBadge(
                g,
                450,
                380,

              drawWireSegment(g, 390, 220, 530, 220, "dc");
              drawLoad(g, "lamp", 570, 220);
              const vl = svgEl("text", {
                x: 450,
                y: 340,
                "text-anchor": "middle",
                fill: "#78909c",
                "font-size": 13,
                "font-family": "Outfit, sans-serif",
                "font-style": "italic",
              });
              vl.textContent = T("introDcDc");
              g.appendChild(vl);
            } else {
              drawSource(g, "solar", 120, 220);
              drawTransformerBlock(g, 350, 220, {
                type: "stepUp",
                active: false,
              });
              drawWireSegment(g, 170, 220, 310, 220, "dc");
              drawLoad(g, "lamp", 570, 220);
              const wn = svgEl("text", {
                x: 450,
                y: 340,
                "text-anchor": "middle",
                fill: "#e76f51",
                "font-size": 13,
                "font-family": "Outfit, sans-serif",
                "font-style": "italic",
              });
              wn.textContent = T("acOnly");
              g.appendChild(wn);
            }
          } else if (s === 8) {
            const hs = (state.intro && state.intro.hybridScene) || 0;
            if (hs === 0) {
              drawSource(g, "outlet", 120, 220);
              drawConverter(g, 350, 220, {
                from: "ac",
                to: "dc",
                label: "charger",
              });
              drawLoad(g, "phone", 580, 220);
              drawWireSegment(g, 165, 220, 310, 220, "ac");
              drawWireSegment(g, 390, 220, 540, 220, "dc");
            } else if (hs === 1) {
              drawSource(g, "solar", 120, 220);
              drawConverter(g, 350, 220, {
                from: "dc",
                to: "ac",
                label: "inverter",
              });
              drawLoad(g, "lamp", 580, 220);
              drawWireSegment(g, 170, 220, 310, 220, "dc");
              drawWireSegment(g, 390, 220, 540, 220, "ac");
            } else {
              drawSource(g, "generator", 80, 220);
              drawConverter(g, 260, 220, {
                from: "ac",
                to: "dc",
                label: "converter",
              });
              drawWireSegment(g, 130, 220, 220, 220, "ac");
              drawWireSegment(g, 300, 220, 430, 220, "dc");
              drawRouteTower(g, 470, 225);
              drawWireSegment(g, 510, 220, 600, 220, "dc");
              drawConverter(g, 640, 220, {
                from: "dc",
                to: "ac",
                label: "converter",
              });
              drawWireSegment(g, 680, 220, 760, 220, "ac");
              drawLoad(g, "lamp", 810, 220);
              const ul = svgEl("text", {
                x: 450,
                y: 340,
                "text-anchor": "middle",
                fill: "#455a64",
                "font-size": 12,
                "font-family": "Outfit, sans-serif",

              ul.textContent = "HVDC";

            const hl = svgEl("text", {
              x: 450,

              "text-anchor": "middle",
              fill: "#455a64",
              "font-size": 14,
              "font-weight": "600",
              "font-family": "Outfit, sans-serif",
            });
            hl.textContent = T("hybrid");
            g.appendChild(hl);
          } else if (s === 9) {
            const modes = ["flow", "send", "boost", "pick", "build"];
            const blurbs = [
              "introFlowBlurb",
              "introSendBlurb",
              "introBoostBlurb",
              "introPickBlurb",
              "introBuildBlurb",
            ];
            const cols = [0, 1, 2, 0.5, 1.5];
            const rows = [0, 0, 0, 1, 1];
            const cw = 160;
            const ch = 110;
            const gapX = 20;
            const gapY = 20;
            const baseX = 450 - (3 * cw + 2 * gapX) / 2;
            const baseY = 100;
            for (let mi = 0; mi < modes.length; mi++) {
              const cx = baseX + cols[mi] * (cw + gapX) + cw / 2;
              const cy = baseY + rows[mi] * (ch + gapY) + ch / 2;
              const cg = svgEl("g", {
                "data-intro-mode": modes[mi],

                role: "button",
                tabindex: "0",

              cg.appendChild(
                svgEl("rect", {
                  x: cx - cw / 2,
                  y: cy - ch / 2,
                  width: cw,
                  height: ch,
                  rx: 10,

                  stroke: MODE_COLORS[modes[mi]],
                  "stroke-width": 2,
                }),
              );
              const nt = svgEl("text", {
                x: cx,
                y: cy - 10,
                "text-anchor": "middle",
                fill: MODE_COLORS[modes[mi]],
                "font-size": 16,
                "font-weight": "700",
                "font-family": "Outfit, sans-serif",
              });
              nt.textContent = T(modes[mi]);
              cg.appendChild(nt);
              const dt = svgEl("text", {
                x: cx,
                y: cy + 14,
                "text-anchor": "middle",
                fill: "#78909c",
                "font-size": 10,
                "font-family": "Outfit, sans-serif",
              });
              dt.textContent = T(blurbs[mi]);
              cg.appendChild(dt);
              g.appendChild(cg);
            }
          }
          boardSvg.appendChild(g);
        }

        function introMkSlider(area, label, id, min, max, val, unit) {
          const cl = document.createElement("div");
          cl.className = "ctrl-label";
          cl.textContent = T(label);
          area.appendChild(cl);
          const sr = document.createElement("div");
          sr.className = "slider-row";
          const inp = document.createElement("input");
          inp.type = "range";
          inp.min = String(min);
          inp.max = String(max);
          inp.value = String(val);
          inp.id = id;
          inp.setAttribute("aria-label", T(label));
          sr.appendChild(inp);
          const sv = document.createElement("span");
          sv.className = "slider-val";
          sv.id = id + "Val";
          sv.textContent = val + " " + unit;
          sr.appendChild(sv);
          area.appendChild(sr);
        }

        function introMkToggle(area, opts, activeKey, dataAttr) {
          const tog = document.createElement("div");
          tog.className = "type-toggle";
          for (let i = 0; i < opts.length; i++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "type-btn";
            if (opts[i].key === activeKey) btn.classList.add("active");
            btn.dataset[dataAttr] = opts[i].key;
            btn.textContent = T(opts[i].label);
            tog.appendChild(btn);
          }
          area.appendChild(tog);
        }

        function renderIntroControls() {
          const area = $("introControls");
          while (area.firstChild) area.removeChild(area.firstChild);
          const s = state.introStep;
          const intro = state.intro || {};
          if (s === 4 || s === 5) {
            introMkSlider(
              area,
              "voltage",
              "introVoltageSlider",
              200,
              50000,
              intro.voltage || 1000,
              "V",
            );
          }
          if (s === 6) {
            introMkToggle(
              area,
              [
                { key: "without", label: "introNoTf" },
                { key: "with", label: "introWithTf" },
              ],
              intro.tfMode || "with",
              "introTf",
            );
          }
          if (s === 7) {
            introMkToggle(
              area,
              [
                { key: "plain", label: "introPlainTf" },
                { key: "dcdc", label: "introDcDc" },
              ],
              intro.dcMode || "dcdc",
              "introDc",
            );
          }
          if (s === 8) {
            introMkToggle(
              area,
              [
                { key: "0", label: "charger" },
                { key: "1", label: "inverter" },
                { key: "2", label: "dc" },
              ],
              String(intro.hybridScene || 0),
              "introHybrid",
            );
          }
        }

        function setIntroStep(n) {
          if (n < 1) n = 1;
          if (n > INTRO_TOTAL) n = INTRO_TOTAL;
          state.introStep = n;
          $("introStepTitle").textContent = T("introS" + n + "t");
          $("introCommentary").textContent = T("introS" + n);
          $("introCounter").textContent = n + " / " + INTRO_TOTAL;
          $("btnIntroPrev").disabled = n <= 1;
          $("btnIntroNext").disabled = n >= INTRO_TOTAL;
          renderIntroControls();
          renderIntroBoard();
        }

        function setToolbarLocked(locked) {
          const btns = document.querySelectorAll(
            ".family-btn, .mode-btn, .stage-btn",
          );
          for (let i = 0; i < btns.length; i++) {
            btns[i].disabled = locked;
          }
          $("exploreBtn").disabled = locked;
          $("hintBtn").disabled = locked;
          $("nextBtn").disabled = locked;
        }

        const NORMAL_PANELS = [
          "panelInvestigation",
          "panelMission",
          "panelControls",
          "panelMeters",
          "whySection",
          "panelProgress",
          "panelActions",
          "panelSpacer",
        ];

        function showNormalPanels() {
          for (let i = 0; i < NORMAL_PANELS.length; i++) {
            const el = $(NORMAL_PANELS[i]);
            if (el && NORMAL_PANELS[i] !== "whySection") {
              el.classList.remove("hidden");
            }
          }
        }

        function hideNormalPanels() {
          for (let i = 0; i < NORMAL_PANELS.length; i++) {
            const el = $(NORMAL_PANELS[i]);
            if (el) el.classList.add("hidden");
          }
        }

        function enterIntro() {
          state.introReturnState = {
            family: state.family,
            mode: state.mode,
            stage: state.stage,
            scene: state.scene,
          };
          state.introActive = true;
          setToolbarLocked(true);
          $("introBtn").disabled = false;
          document.querySelector(".toolbar").classList.add("hidden");
          $("introPanel").classList.add("active");
          hideNormalPanels();
          $("lblIntroTitle").textContent = T("introTitle");
          $("lblIntroBack").textContent = T("introBack");
          state.intro = {
            source: "battery",
            voltage: 1000,
            tfMode: "with",
            dcMode: "dcdc",
            hybridScene: 0,
          };
          setIntroStep(1);
        }

        function finishIntroExit() {
          state.introActive = false;
          state.introSeen = true;
          try {
            localStorage.setItem("currentlab_introSeen", "1");
          } catch {
            /* storage unavailable */
          }
          $("introPanel").classList.remove("active");
          document.querySelector(".toolbar").classList.remove("hidden");
          showNormalPanels();
          setToolbarLocked(false);
        }

        function exitIntro() {
          finishIntroExit();
          if (state.introReturnState) {
            const rs = state.introReturnState;
            state.family = rs.family;
            state.mode = rs.mode;
            state.stage = rs.stage;
            state.scene = rs.scene;
          }
          renderStageButtons();
          renderBoard();
          updateMissionDisplay();
          updateControlsDisplay();
          updateMetersDisplay();
          updateProgressDisplay();
          updateHintDisplay();
        }

        function exitIntroToMode(mode) {
          finishIntroExit();
          const fam = mode === "pick" || mode === "build" ? "decide" : "learn";
          setFamily(fam);
          setMode(mode);
        }

        /* ═══════════════════════════════════════════
           BOARD RENDERERS
           ═══════════════════════════════════════════ */

        function drawCircuit(
          g,
          cx,
          cy,
          hw,
          hh,
          ct,
          sourceType,
          loadType,
          showMarkers,
        ) {
          const path = [
            { x: cx - hw, y: cy - hh },
            { x: cx + hw, y: cy - hh },
            { x: cx + hw, y: cy + hh },
            { x: cx - hw, y: cy + hh },
          ];
          drawWireSegment(g, path[0].x, path[0].y, path[1].x, path[1].y, ct);
          drawWireSegment(g, path[1].x, path[1].y, path[2].x, path[2].y, ct);
          drawWireSegment(g, path[2].x, path[2].y, path[3].x, path[3].y, ct);
          drawWireSegment(g, path[3].x, path[3].y, path[0].x, path[0].y, ct);
          drawSource(g, sourceType, cx - hw - 40, cy);
          drawLoad(g, loadType, cx + hw + 40, cy);
          if (showMarkers !== false) {
            createChargeMarkers(g, path, ct);
          }
        }

        function drawConverterCircuit(g, cx, cy, hw, hh, setup, showMarkers) {
          const conv = setup.converter;
          const srcCt = setup.currentType;
          const outCt = conv.to;
          const convX = cx;
          const topY = cy - hh;
          const botY = cy + hh;
          drawWireSegment(g, cx - hw, topY, convX - 35, topY, srcCt);
          drawWireSegment(g, convX + 35, topY, cx + hw, topY, outCt);
          drawWireSegment(g, cx + hw, topY, cx + hw, botY, outCt);
          drawWireSegment(g, cx + hw, botY, cx - hw, botY, srcCt);
          drawWireSegment(g, cx - hw, botY, cx - hw, topY, srcCt);
          drawConverter(g, convX, topY, conv);
          if (setup.converter2) {
            const conv2X = cx + hw * 0.55;
            drawConverter(g, conv2X, topY, setup.converter2);
            drawWireSegment(g, convX + 35, topY, conv2X - 35, topY, conv.to);
            drawWireSegment(
              g,
              conv2X + 35,
              topY,
              cx + hw,
              topY,
              setup.converter2.to,
            );
          }
          drawSource(g, setup.sourceType, cx - hw - 40, cy);
          drawLoad(g, setup.loadType, cx + hw + 40, cy);
          if (showMarkers !== false) {
            const srcPath = [
              { x: cx - hw, y: topY },
              { x: convX - 35, y: topY },
            ];
            createChargeMarkers(g, srcPath, srcCt);
            const outPath = [
              { x: convX + 35, y: topY },
              { x: cx + hw, y: topY },
              { x: cx + hw, y: botY },
            ];
            createChargeMarkers(g, outPath, outCt);
          }
        }

        function renderFlowBoard() {
          clearBoard();
          if (state.scene === "explore") {
            const g = svgEl("g");
            const eCt = state.flow.exploreCt;
            const eSrc = state.flow.exploreSource;
            drawCircuit(g, 450, 220, 230, 70, eCt, eSrc, "lamp", true);
            drawWaveformStrip(g, 300, 380, 300, 80, eCt);
            boardSvg.appendChild(g);
            return;
          }
          const step = getCurrentStep();
          if (!step) {
            drawPlaceholder(T("flow"));
            return;
          }
          const g = svgEl("g");
          const setup = step.setup;
          const showMarkers = state.flow.revealed;
          if (step.splitView) {
            const topS = step.splitView.top;
            const botS = step.splitView.bottom;
            drawCircuit(
              g,
              450,
              150,
              200,
              55,
              topS.currentType,
              topS.sourceType,
              topS.loadType,
              showMarkers,
            );
            if (showMarkers) {
              drawWaveformStrip(g, 330, 220, 240, 60, topS.currentType);
            }
            drawCircuit(
              g,
              450,
              380,
              200,
              55,
              botS.currentType,
              botS.sourceType,
              botS.loadType,
              showMarkers,
            );
            if (showMarkers) {
              drawWaveformStrip(g, 330, 450, 240, 60, botS.currentType);
            }
          } else if (setup.converter) {
            drawConverterCircuit(g, 450, 220, 230, 70, setup, showMarkers);
            if (showMarkers) {
              drawWaveformStrip(g, 150, 380, 200, 70, setup.currentType);
              drawWaveformStrip(
                g,
                550,
                380,
                200,
                70,
                setup.converter2 ? setup.converter2.to : setup.converter.to,
              );
            }
          } else {
            drawCircuit(
              g,
              450,
              220,
              230,
              70,
              setup.currentType,
              setup.sourceType,
              setup.loadType,
              showMarkers,
            );
            if (showMarkers) {
              drawWaveformStrip(g, 300, 380, 300, 80, setup.currentType);
            }
          }
          if (!showMarkers) {
            const hint = svgEl("text", {
              x: 450,
              y: 500,
              "text-anchor": "middle",
              fill: "#b0bec5",
              "font-size": 13,
              "font-family": "Outfit, sans-serif",
              "font-style": "italic",
            });
            hint.textContent = T("predictFirst");
            g.appendChild(hint);
          }
          boardSvg.appendChild(g);
        }

        function drawPlaceholder(label) {
          clearBoard();
          const g = svgEl("g");
          const t = svgEl("text", {
            x: 450,
            y: 260,
            "text-anchor": "middle",
            fill: "#b0bec5",
            "font-size": 28,
            "font-weight": "700",
