        /*
         * renderSvgFraction — measurement-based SVG fraction display.
         *
         * Renders numerator / denominator as stacked text with a
         * horizontal vinculum (fraction bar), sized from actual
         * getBBox() measurements so the line always fits the digits.
         *
         * Handles: 0, whole numbers (3), proper fractions (3/4),
         * improper fractions (7/4), and mixed numbers (1 3/4).
         *
         * Strategy:
         *  1. Append a staging group to the SVG so getBBox() works.
         *  2. Render numerator and denominator text at origin.
         *  3. Measure their actual pixel widths.
         *  4. Size the vinculum to the wider of the two + padding.
         *  5. For mixed numbers, measure the whole-part text too.
         *  6. Reposition all elements centred on (cx, cy).
         */
        function renderSvgFraction(parent, cx, cy, n, d, size, color) {
          const fs = size || 24;
          const clr = color || "#263238";
          const pad = fs * 0.25;
          const lineGap = fs * 0.12;
          const lineThick = Math.max(2, Math.round(fs * 0.09));
          const font = "'Share Tech Mono', monospace";
          const m = fracToMixed(n, d);

          const g = svgEl("g", {});
          const needsTempAttach =
            !parent.ownerSVGElement && parent !== boardSvg;
          if (needsTempAttach) boardSvg.appendChild(parent);
          parent.appendChild(g);

          /* ── Case: value is exactly zero ── */
          if (n === 0) {
            const z = svgEl("text", {
              x: cx,
              y: cy,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs,
              "font-weight": "bold",
              fill: clr,
            });
            z.textContent = "0";
            g.appendChild(z);
            return g;
          }

          /* ── Case: whole number with no remainder ── */
          if (m.whole > 0 && m.n === 0) {
            const wt = svgEl("text", {
              x: cx,
              y: cy,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs * 1.15,
              "font-weight": "bold",
              fill: clr,
            });
            wt.textContent = m.whole;
            g.appendChild(wt);
            return g;
          }

          /* ── Fraction part (proper, improper, or remainder of mixed) ── */
          const showN = m.whole > 0 ? m.n : n;
          const showD = d;

          /* Create text elements at (0,0) for measuring */
          const numEl = svgEl("text", {
            x: 0,
            y: 0,
            "text-anchor": "middle",
            "font-family": font,
            "font-size": fs,
            "font-weight": "bold",
            fill: clr,
          });
          numEl.textContent = showN;
          g.appendChild(numEl);

          const denEl = svgEl("text", {
            x: 0,
            y: 0,
            "text-anchor": "middle",
            "font-family": font,
            "font-size": fs,
            "font-weight": "bold",
            fill: clr,
          });
          denEl.textContent = showD;
          g.appendChild(denEl);

          /* Measure actual rendered widths */
          const numW = numEl.getBBox().width;
          const denW = denEl.getBBox().width;
          const fracW = Math.max(numW, denW);
          const lineW = fracW + pad;

          /* Whole-part measurement (if mixed) */
          let wholeW = 0;
          let wholeEl = null;
          if (m.whole > 0) {
            wholeEl = svgEl("text", {
              x: 0,
              y: 0,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs * 1.15,
              "font-weight": "bold",
              fill: clr,
            });
            wholeEl.textContent = m.whole;
            g.appendChild(wholeEl);
            wholeW = wholeEl.getBBox().width;
          }

          /* ── Layout: compute final positions ── */
          const gap = m.whole > 0 ? fs * 0.25 : 0;
          const totalW = (m.whole > 0 ? wholeW + gap : 0) + lineW;
          const leftEdge = cx - totalW / 2;

          /* Position whole number */
          if (wholeEl) {
            wholeEl.setAttribute("x", leftEdge + wholeW / 2);
            wholeEl.setAttribute("y", cy);
          }

          /* Fraction centre x */
          const fracCx = m.whole > 0 ? leftEdge + wholeW + gap + lineW / 2 : cx;

          /* Position numerator above vinculum */
          numEl.setAttribute("x", fracCx);
          numEl.setAttribute("y", cy - lineGap - lineThick / 2 - fs * 0.15);

          /* Vinculum */
          g.appendChild(
            svgEl("line", {
              x1: fracCx - lineW / 2,
              y1: cy,
              x2: fracCx + lineW / 2,
              y2: cy,
              stroke: clr,
              "stroke-width": lineThick,
              "stroke-linecap": "round",
            }),
          );

          /* Position denominator below vinculum */
          denEl.setAttribute("x", fracCx);
          denEl.setAttribute("y", cy + lineGap + lineThick / 2 + fs * 0.72);

          if (needsTempAttach) boardSvg.removeChild(parent);

          return g;
        }

        function renderFractionCard(opts) {
          const { x, y, width, height, value, color, label } = opts;
          const g = svgEl("g", { style: "cursor:pointer", class: "frac-card" });

          g.appendChild(
            svgEl("rect", {
              x: x + 2,
              y: y + 2,
              width,
              height,
              fill: "rgba(0,0,0,0.05)",
              rx: "10",
            }),
          );

          g.appendChild(
            svgEl("rect", {
              x,
              y,
              width,
              height,
              fill: "#fff",
              stroke: color || "#CFD8DC",
              "stroke-width": "2.5",
              rx: "10",
            }),
          );

          if (label) {
            const lbl = svgEl("text", {
              x: x + width / 2,
              y: y + height / 2 + 2,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": label.length > 5 ? "22" : "28",
              "font-weight": "bold",
              fill: color || "#263238",
            });
            lbl.textContent = label;
            g.appendChild(lbl);
          } else {
            const mx = fracToMixed(value.n, value.d);
            const isMixed = mx.whole > 0 && mx.n > 0;
            const fracSz = isMixed
              ? Math.min(20, height * 0.2)
              : Math.min(28, height * 0.25);
            renderSvgFraction(
              g,
              x + width / 2,
              y + height / 2,
              value.n,
              value.d,
              fracSz,
              color || "#263238",
            );
          }

          return g;
        }

        function renderBoardNextBtn(y) {
          const showForReveal =
            state.activity === "compare" && state.compare.phase === "reveal";
          if (!state.ui.stepComplete && !showForReveal) return;
          const btnY = y || 460;
          const nextG = svgEl("g", {
            style: "cursor:pointer",
            class: "board-next-btn",
          });
          nextG.appendChild(
            svgEl("rect", {
              x: 320,
              y: btnY,
              width: 160,
              height: 40,
              fill: MODE_COLORS[state.activity] || "#455A64",
              rx: "10",
            }),
          );
          const nextLbl = svgEl("text", {
            x: 400,
            y: btnY + 22,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#fff",
            "pointer-events": "none",
          });
          nextLbl.textContent =
            state.lang === "pl" ? "Dalej \u2192" : "Next \u2192";
          nextG.appendChild(nextLbl);
          boardSvg.appendChild(nextG);
        }

        function renderStepGoal(mainY) {
          const step = getCurrentStep();
          const goalStr = stepText(step, "goal");
          if (goalStr) {
            const goalEl = svgEl("text", {
              x: 400,
              y: (mainY || 40) + 35,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "13",
              fill: "#90A4AE",
            });
            goalEl.textContent = goalStr;
            boardSvg.appendChild(goalEl);
          }
        }

        function nlBenchmarks(nlMax) {
          const b = [0];
          if (nlMax >= 1) b.push(1);
          if (nlMax >= 2) b.push(0.5, 2);
          if (nlMax >= 3) b.push(1.5, 2.5, 3);
          return b.sort((a, c) => a - c);
        }

        /* ═══════════════════════════════════════════
           BUILD: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderBuildBoard() {
          clearEl(boardSvg);
          const b = state.build;
          const step = getCurrentStep();
          const denom = b.target ? b.target.d : b.denominator;
          if (denom !== b.denominator) {
            b.denominator = denom;
            const total = denom * DIFF_CFG[state.difficulty].maxWholes;
            b.filledSegments = new Array(total).fill(false);
            b.currentValue = { n: 0, d: denom };
          }
          const wholes = Math.max(1, Math.ceil(b.target.n / denom));
          const hasSource = step && step.sourceValue;

          const useCircle =
            step &&
            step.primaryModel === "circle" &&
            wholes === 1 &&
            !hasSource;

          const stripW = wholeWidth(wholes);
          const stripH = hasSource ? 50 : 60;
          const gap = 8;
          const totalW = stripW * wholes + gap * (wholes - 1);
          const startX = (800 - totalW) / 2;
          const startY = hasSource ? 200 : 140;

          if (hasSource) {
            const src = step.sourceValue;
            const srcW = wholeWidth(1);
            const srcX = (800 - srcW) / 2;
            const srcStrip = renderStrip({
              x: srcX,
              y: 110,
              width: srcW,
              height: stripH,
              denom: src.d,
              filled: src.n,
              color: "#78909C",
              ghost: 0,
            });
            boardSvg.appendChild(srcStrip);
            renderSvgFraction(
              boardSvg,
              srcX + srcW + 30,
              110 + stripH / 2,
              src.n,
              src.d,
              18,
              "#78909C",
            );
            const eqSign = svgEl("text", {
              x: 400,
              y: 180,
              "text-anchor": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "20",
              "font-weight": "bold",
              fill: "#90A4AE",
            });
            eqSign.textContent = "=";
            boardSvg.appendChild(eqSign);
          }

          if (useCircle) {
            const circle = renderCircleModel({
              cx: 400,
              cy: startY + 60,
              r: 90,
              denom,
              filledSegs: b.filledSegments,
              color: MODE_COLORS.build,
            });
            circle.setAttribute("data-whole", 0);
            boardSvg.appendChild(circle);
          }

          for (let w = 0; w < (useCircle ? 0 : wholes); w++) {
            const wx = startX + w * (stripW + gap);
            let filledInThisWhole = 0;

            for (let s = 0; s < denom; s++) {
              const idx = w * denom + s;
              if (idx < b.filledSegments.length && b.filledSegments[idx]) {
                filledInThisWhole++;
              }
            }

            const strip = renderStrip({
              x: wx,
              y: startY,
              width: stripW,
              height: stripH,
              denom,
              filled: filledInThisWhole,
              color: MODE_COLORS.build,
              ghost: 0,
              ghostColor: MODE_COLORS.build,
            });
            strip.setAttribute("data-whole", w);
            boardSvg.appendChild(strip);

            if (wholes > 1) {
              const lbl = svgEl("text", {
                x: wx + stripW / 2,
                y: startY + stripH + 18,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#90A4AE",
              });
              lbl.textContent = (w + 1).toString();
              boardSvg.appendChild(lbl);
            }
          }

          const nlY = 320;
          const nlW = totalW;
          const nlX = startX;
          const nlMax = DIFF_CFG[state.difficulty].nlMax;
          const currentVal = {
            n: b.currentValue.n,
            d: b.currentValue.d,
          };
          const ghostMarker = {
            value: { n: b.target.n, d: b.target.d },
            ghost: true,
          };
          const currentMarker = {
            value: currentVal,
            color: MODE_COLORS.build,
          };

          const nl = renderNumberLine({
            x: nlX,
            y: nlY,
            width: nlW,
            nlMax,
            denom,
            markers:
              b.currentValue.n > 0
                ? [ghostMarker, currentMarker]
                : [ghostMarker],
            benchmarks: nlBenchmarks(nlMax),
          });
          boardSvg.appendChild(nl);

          const promptY = hasSource ? 60 : 60;
          const promptText = svgEl("text", {
            x: hasSource ? 300 : 360,
            y: promptY,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "20",
            "font-weight": "600",
            fill: "#455A64",
          });
          promptText.textContent = state.lang === "pl" ? "Pokaż" : "Show";
          boardSvg.appendChild(promptText);
          renderSvgFraction(
            boardSvg,
            hasSource ? 380 : 440,
            promptY - 2,
            b.target.n,
            b.target.d,
            18,
            "#455A64",
          );
          renderStepGoal(promptY);
          renderBoardNextBtn(460);
        }

        function handleBuildClick(e) {
          const seg = e.target.closest(".strip-seg");
          if (!seg) return;

          const idx = parseInt(seg.getAttribute("data-seg"), 10);
          const wholeGroup = seg.closest("g[data-whole]");
          if (!wholeGroup) return;
          const wholeIdx = parseInt(wholeGroup.getAttribute("data-whole"), 10);
          const globalIdx = wholeIdx * state.build.denominator + idx;

          const b = state.build;
          const total = b.filledSegments.length;
          const step = getCurrentStep();
          const isCircle = step && step.primaryModel === "circle";

          if (isCircle) {
            b.filledSegments[globalIdx] = !b.filledSegments[globalIdx];
          } else {
            const currentFilled = b.filledSegments.filter(Boolean).length;
            const targetIdx = globalIdx + 1;

            if (currentFilled === targetIdx) {
              for (let i = globalIdx; i < total; i++)
                b.filledSegments[i] = false;
            } else {
              for (let i = 0; i < total; i++) {
                b.filledSegments[i] = i < targetIdx;
              }
            }
          }

          b.currentValue = {
            n: b.filledSegments.filter(Boolean).length,
            d: b.denominator,
          };

          renderBuildBoard();
          updatePanel();
          checkBuildComplete();
        }

        function animateRepartition(callback) {
          const step = getCurrentStep();
          if (!step || !step.sourceValue) {
            if (callback) callback();
            return;
          }
          const src = step.sourceValue;
          const tgt = state.build.target;
          const srcW = wholeWidth(1);
          const srcX = (800 - srcW) / 2;
          const stripY = 110;
          const stripH = 50;
          const fillWidth = (src.n / src.d) * srcW;

          state.ui.animating = true;
          const duration = 600;
          const start = performance.now();

          function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            const currentDenom = Math.round(src.d + (tgt.d - src.d) * eased);
            const segW = srcW / currentDenom;

            const existing = boardSvg.querySelector("#repartGroup");
            if (existing) existing.remove();

            const g = svgEl("g", { id: "repartGroup" });
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: srcW,
                height: stripH,
                fill: "#F5F0E8",
                rx: "5",
              }),
            );
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: fillWidth,
                height: stripH,
                fill: MODE_COLORS.build,
                opacity: "0.5",
                rx: "3",
              }),
            );
            for (let i = 1; i < currentDenom; i++) {
              g.appendChild(
                svgEl("line", {
                  x1: srcX + i * segW,
                  y1: stripY,
                  x2: srcX + i * segW,
                  y2: stripY + stripH,
                  stroke: "#B0A89A",
                  "stroke-width": "1",
                }),
              );
            }
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: srcW,
                height: stripH,
                fill: "none",
                stroke: "#78909C",
                "stroke-width": "2",
                rx: "5",
              }),
            );
            boardSvg.appendChild(g);

            if (t < 1) {
              requestAnimationFrame(frame);
            } else {
              state.ui.animating = false;
              if (callback) callback();
            }
          }
          requestAnimationFrame(frame);
        }

        function checkBuildComplete() {
          const b = state.build;
          const filled = b.filledSegments.filter(Boolean).length;
          if (filled === b.target.n) {
            const step = getCurrentStep();
            if (step && step.sourceValue) {
              animateRepartition(() => onSuccess());
            } else {
              onSuccess();
            }
          }
        }

        /* ═══════════════════════════════════════════
           COMPARE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderCompareBoard() {
          clearEl(boardSvg);
          const c = state.compare;
          const step = getCurrentStep();
          const cardW = 200;
          const cardH = 120;
          const gap = 80;
          const leftX = 400 - cardW - gap / 2;
          const rightX = 400 + gap / 2;
          const cardY = 80;
          const colLeft = "#26A69A";
          const colRight = "#FFA726";

          const dispA = (step && step.displayA) || c.displayA;
          const dispB = (step && step.displayB) || c.displayB;
          const labelA =
            dispA === "decimal"
              ? formatDecimal(c.cardA.n, c.cardA.d)
              : undefined;
          const labelB =
            dispB === "decimal"
              ? formatDecimal(c.cardB.n, c.cardB.d)
              : undefined;

          const leftCard = renderFractionCard({
            x: leftX,
            y: cardY,
            width: cardW,
            height: cardH,
            value: c.cardA,
            label: labelA,
            color: c.phase === "choose" ? colLeft : colLeft,
          });
          leftCard.setAttribute("data-side", "left");
          boardSvg.appendChild(leftCard);

          const rightCard = renderFractionCard({
            x: rightX,
            y: cardY,
            width: cardW,
            height: cardH,
            value: c.cardB,
            label: labelB,
            color: c.phase === "choose" ? colRight : colRight,
          });
          rightCard.setAttribute("data-side", "right");
          boardSvg.appendChild(rightCard);

          if (c.phase === "choose") {
            const prompt = svgEl("text", {
              x: 400,
              y: 50,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "18",
              "font-weight": "600",
              fill: "#455A64",
            });
            prompt.textContent = T("tapBigger");
            boardSvg.appendChild(prompt);

            if (c.isEqual) {
              document.getElementById("eqBtn").classList.add("visible");
            }
          }

          if (c.phase === "reveal") {
            renderCompareReveal(leftX, rightX, cardY + cardH + 30);
          }
        }

        function renderCompareReveal(leftX, rightX, revealY) {
          const c = state.compare;
          const wholeW = wholeWidth(1);
          const barH = 36;
          const barGap = 12;
          const barX = (800 - wholeW) / 2;
          const dA = c.cardA.d;
          const dB = c.cardB.d;

          const stripA = renderStrip({
            x: barX,
            y: revealY,
            width: wholeW,
            height: barH,
            denom: dA,
            filled: c.cardA.n,
            color: "#26A69A",
            ghost: 0,
          });
          boardSvg.appendChild(stripA);

          const stripB = renderStrip({
            x: barX,
            y: revealY + barH + barGap,
            width: wholeW,
            height: barH,
            denom: dB,
            filled: c.cardB.n,
            color: "#FFA726",
            ghost: 0,
          });
          boardSvg.appendChild(stripB);

          const fillEndA = barX + fracToFloat(c.cardA) * wholeW;
          const fillEndB = barX + fracToFloat(c.cardB) * wholeW;
          const biggerEnd = Math.max(fillEndA, fillEndB);
          boardSvg.appendChild(
            svgEl("line", {
              x1: biggerEnd,
              y1: revealY - 4,
              x2: biggerEnd,
              y2: revealY + barH * 2 + barGap + 4,
              stroke: "#455A64",
              "stroke-width": "1.5",
              "stroke-dasharray": "4,3",
              opacity: "0.5",
            }),
          );

          const nlY = revealY + barH * 2 + barGap + 40;
          const nl = renderNumberLine({
            x: barX,
            y: nlY,
            width: wholeW,
            nlMax: 1,
            denom: Math.max(dA, dB),
            markers: [
              { value: c.cardA, color: "#26A69A" },
              { value: c.cardB, color: "#FFA726" },
            ],
            benchmarks: [0, 0.5, 1],
          });
          boardSvg.appendChild(nl);

          const step = getCurrentStep();
          if (step) {
            const isCorrect =
              c.childChoice === c.correctAnswer ||
              (c.childChoice === "equal" && c.isEqual);
            const fbKey = isCorrect ? "feedbackSuccess" : "feedbackError";
            const fbText = stepText(step, fbKey);
            if (fbText) {
              const fb = svgEl("text", {
                x: 400,
                y: nlY + 40,
                "text-anchor": "middle",
                "font-family": "'Outfit', sans-serif",
                "font-size": "14",
                fill: isCorrect ? "#2E7D32" : "#C62828",
              });
              fb.textContent = fbText;
              boardSvg.appendChild(fb);
            }
          }

          renderBoardNextBtn(460);
        }

        function handleCompareClick(e) {
          if (state.compare.phase !== "choose") return;
          const card = e.target.closest("[data-side]");
          if (!card) return;

          const side = card.getAttribute("data-side");
          const c = state.compare;
          c.childChoice = side;

          const cmp = fracCompare(c.cardA, c.cardB);
          const correct =
            (side === "left" && cmp > 0) || (side === "right" && cmp < 0);

          if (correct || (c.isEqual && side === "equal")) {
            c.phase = "reveal";
            c.correctAnswer = side;
            state.ui.animating = true;
            animateValue(
              400,
              () => {},
              () => {
                state.ui.animating = false;
                onSuccess();
              },
            );
          } else if (c.isEqual && !correct) {
            state.ui.feedbackText = T("theyAreEqual");
            state.ui.feedbackType = "error";
            updateHintDisplay();
          } else {
            c.phase = "reveal";
            c.correctAnswer = cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            document.getElementById("nextBtn").disabled = false;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderCompareBoard();
        }

        function handleEqualClick() {
          if (state.compare.phase !== "choose") return;
          const c = state.compare;
          c.childChoice = "equal";

          if (c.isEqual) {
            c.phase = "reveal";
            c.correctAnswer = "equal";
            onSuccess();
          } else {
            c.phase = "reveal";
            const cmp = fracCompare(c.cardA, c.cardB);
            c.correctAnswer = cmp > 0 ? "left" : "right";
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            document.getElementById("nextBtn").disabled = false;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderCompareBoard();
        }

        /* ═══════════════════════════════════════════
           PLACE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderPlaceBoard() {
          clearEl(boardSvg);
          const p = state.place;
          const nlMax = p.nlMax || DIFF_CFG[state.difficulty].nlMax;
          const nlW = 650;
          const nlX = 75;
          const nlY = 140;

          if (p.dragToken !== null) {
            const rawVal = ((p.dragX - nlX) / nlW) * nlMax;
            const snapVal = Math.max(
              0,
              Math.min(nlMax, Math.round(rawVal * p.nlDenom) / p.nlDenom),
            );
            const snapX = nlX + (snapVal / nlMax) * nlW;
            boardSvg.appendChild(
              svgEl("circle", {
                cx: snapX,
                cy: nlY,
                r: "14",
                fill: "rgba(255,167,38,0.3)",
                stroke: MODE_COLORS.place,
                "stroke-width": "2",
                "stroke-dasharray": "4,3",
              }),
            );
          }

          const nl = renderNumberLine({
            x: nlX,
            y: nlY,
            width: nlW,
            nlMax,
            denom: p.nlDenom,
            markers: p.tokens
              .filter((tk) => tk.placed)
              .map((tk) => ({
                value: { n: tk.n, d: tk.d },
                color: MODE_COLORS.place,
              })),
            benchmarks: nlBenchmarks(nlMax),
          });
          boardSvg.appendChild(nl);

          const trayY = 300;
          const trayGap = 20;
          const cardW = 160;
          const cardH = 90;
          const totalTrayW =
            p.tokens.length * cardW + (p.tokens.length - 1) * trayGap;
          const trayStartX = (800 - totalTrayW) / 2;

          for (let i = 0; i < p.tokens.length; i++) {
            const tk = p.tokens[i];
            if (tk.placed) continue;

            const tx =
              p.dragToken === i
                ? p.dragX - cardW / 2
                : trayStartX + i * (cardW + trayGap);
            const ty = p.dragToken === i ? p.dragY - cardH / 2 : trayY;

            const card = renderFractionCard({
              x: tx,
              y: ty,
              width: cardW,
              height: cardH,
              value: { n: tk.n, d: tk.d },
              label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
              color: MODE_COLORS.place,
            });
            card.setAttribute("data-token", i);
            card.setAttribute("class", "place-token");
            boardSvg.appendChild(card);
          }

          const prompt = svgEl("text", {
            x: 400,
            y: 40,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#455A64",
          });
          prompt.textContent = T("placeSummary");
          boardSvg.appendChild(prompt);
          renderStepGoal(40);
          renderBoardNextBtn(460);
        }

        function handlePlaceDown(e) {
          const card = e.target.closest(".place-token");
          if (!card) return;
          const idx = parseInt(card.getAttribute("data-token"), 10);
          if (state.place.tokens[idx].placed) return;

          state.place.dragToken = idx;
          const pt = getSvgPoint(e);
          state.place.dragX = pt.x;
          state.place.dragY = pt.y;
          e.preventDefault();
        }

        function handlePlaceMove(e) {
          if (state.place.dragToken === null) return;
          const pt = getSvgPoint(e);
          state.place.dragX = pt.x;
          state.place.dragY = pt.y;
          renderPlaceBoard();
          e.preventDefault();
        }

        function handlePlaceUp() {
          if (state.place.dragToken === null) return;
          const p = state.place;
          const idx = p.dragToken;
          const tk = p.tokens[idx];
          p.dragToken = null;

          const nlX = 75;
          const nlW = 650;
          const nlY = 140;
          const nlMax = p.nlMax || DIFF_CFG[state.difficulty].nlMax;

          if (
            Math.abs(p.dragY - nlY) < 50 &&
            p.dragX >= nlX &&
            p.dragX <= nlX + nlW
          ) {
            const rawVal = ((p.dragX - nlX) / nlW) * nlMax;
            const correctVal = fracToFloat({ n: tk.n, d: tk.d });
            const tolerance = (1 / p.nlDenom) * 0.45;

            if (Math.abs(rawVal - correctVal) < tolerance) {
              tk.placed = true;
              checkPlaceComplete();
            } else {
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
            }
          }

          renderPlaceBoard();
        }

        function checkPlaceComplete() {
          const allPlaced = state.place.tokens.every((tk) => tk.placed);
          if (allPlaced) {
            onSuccess();
          }
        }

        /* ═══════════════════════════════════════════
           MATCH: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderMatchBoard() {
          clearEl(boardSvg);
          const m = state.match;
          const PAIR_COLORS = ["#26A69A", "#FFA726", "#5C6BC0", "#EF5350"];
          const cards = m.cards;
          const cardW = 150;
          const cardH = 80;
          const cols = 2;
          const rows = Math.ceil(cards.length / cols);
          const gapX = 40;
          const gapY = 20;
          const totalW = cols * cardW + (cols - 1) * gapX;
          const totalH = rows * cardH + (rows - 1) * gapY;
          const startX = (800 - totalW) / 2;
          const startY = (440 - totalH) / 2 + 30;

          for (let i = 0; i < cards.length; i++) {
            const c = cards[i];
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cx = startX + col * (cardW + gapX);
            const cy = startY + row * (cardH + gapY);

            const isSelected = m.selectedCard === c.id;
            let pairIdx = -1;
            if (c.matched) {
              for (let pi = 0; pi < m.matchedPairs.length; pi++) {
                if (
                  m.matchedPairs[pi][0] === c.id ||
                  m.matchedPairs[pi][1] === c.id
                ) {
                  pairIdx = pi;
                  break;
                }
              }
            }
            const color = c.matched
              ? PAIR_COLORS[pairIdx % PAIR_COLORS.length]
              : isSelected
                ? MODE_COLORS.match
                : "#455A64";

            let label;
            if (c.repr === "decimal") {
              label = formatDecimal(c.value.n, c.value.d) || "?";
            } else if (c.repr === "bar") {
              label = null;
            } else {
              label = null;
            }

            if (c.repr === "bar") {
              const strip = renderStrip({
                x: cx,
                y: cy + 10,
                width: cardW,
                height: cardH - 20,
                denom: c.value.d,
                filled: c.value.n,
                color: isSelected ? MODE_COLORS.match : "#78909C",
                ghost: 0,
                borderColor: c.matched ? color : undefined,
              });
              strip.setAttribute("data-match-id", c.id);
              strip.setAttribute("class", "match-card");
              strip.style.cursor = "pointer";
              if (isSelected) {
                const highlight = svgEl("rect", {
                  x: cx - 3,
                  y: cy + 7,
                  width: cardW + 6,
                  height: cardH - 14,
                  fill: "none",
                  stroke: MODE_COLORS.match,
                  "stroke-width": "3",
                  rx: "7",
                });
                strip.insertBefore(highlight, strip.firstChild);
              }
              boardSvg.appendChild(strip);
            } else {
              const card = renderFractionCard({
                x: cx,
                y: cy,
                width: cardW,
                height: cardH,
                value: c.displayValue || c.value,
                label,
                color,
              });
              card.setAttribute("data-match-id", c.id);
              card.setAttribute("class", "match-card");
              boardSvg.appendChild(card);
            }
          }

          const prompt = svgEl("text", {
            x: 400,
            y: 30,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#455A64",
          });
          prompt.textContent = T("matchSummary");
          boardSvg.appendChild(prompt);
          renderStepGoal(30);
          renderBoardNextBtn(460);
        }

        function handleMatchClick(e) {
          const card = e.target.closest("[data-match-id]");
          if (!card) return;
          const id = parseInt(card.getAttribute("data-match-id"), 10);
          const m = state.match;
          const clickedCard = m.cards.find((c) => c.id === id);
          if (!clickedCard || clickedCard.matched) return;

          if (m.selectedCard === null) {
            m.selectedCard = id;
            renderMatchBoard();
          } else if (m.selectedCard === id) {
            m.selectedCard = null;
            renderMatchBoard();
          } else {
            const firstCard = m.cards.find((c) => c.id === m.selectedCard);
            if (
              firstCard &&
              fracEqual(firstCard.value, clickedCard.value) &&
              firstCard.id !== clickedCard.id
            ) {
              firstCard.matched = true;
              clickedCard.matched = true;
              m.matchedPairs.push([firstCard.id, clickedCard.id]);
              m.selectedCard = null;
              checkMatchComplete();
            } else {
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
              m.selectedCard = null;
            }
            renderMatchBoard();
          }
        }

        function checkMatchComplete() {
          const allMatched = state.match.cards.every((c) => c.matched);
          if (allMatched) {
            onSuccess();
          }
        }

        /* ═══════════════════════════════════════════
           REPAIR: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderRepairBoard() {
          clearEl(boardSvg);
          const r = state.repair;
          const correct = r.correctValue;
          const quadW = 320;
          const quadH = 140;
          const gapX = 40;
          const gapY = 30;
          const startX = (800 - quadW * 2 - gapX) / 2;
          const startY = 80;

          const reprs = [
            { type: "bar", x: startX, y: startY },
            {
              type: "fraction",
              x: startX + quadW + gapX,
              y: startY,
            },
            { type: "numberLine", x: startX, y: startY + quadH + gapY },
            {
              type: "decimal",
              x: startX + quadW + gapX,
              y: startY + quadH + gapY,
            },
          ];

          for (let i = 0; i < reprs.length; i++) {
            const repr = reprs[i];
            const isWrong = repr.type === r.wrongRepr;
            const displayValue =
              isWrong && r.phase !== "done" ? r.wrongValue : correct;
            const isSelected = r.selectedRepr === repr.type;

            let borderColor = "#CFD8DC";
            if (r.phase === "identify" && isSelected) {
              borderColor = MODE_COLORS.repair;
            }
            if (r.phase === "fix" && isWrong) {
              borderColor = MODE_COLORS.repair;
            }
            if (r.phase === "done") {
              borderColor = "#66BB6A";
            }

            boardSvg.appendChild(
              svgEl("rect", {
                x: repr.x - 5,
                y: repr.y - 5,
                width: quadW + 10,
                height: quadH + 10,
                fill: "#FAFAF7",
                stroke: borderColor,
                "stroke-width":
                  isSelected || (r.phase === "fix" && isWrong) ? "3" : "1.5",
                rx: "8",
                "data-repr": repr.type,
                class: "repair-quad",
                style: "cursor:pointer",
              }),
            );

            if (repr.type === "bar") {
              const strip = renderStrip({
                x: repr.x + 20,
                y: repr.y + 40,
                width: quadW - 40,
                height: 50,
                denom: displayValue.d,
                filled: displayValue.n,
                color: "#78909C",
                ghost: 0,
              });
              boardSvg.appendChild(strip);
              const lbl = svgEl("text", {
                x: repr.x + quadW / 2,
                y: repr.y + 20,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "11",
                fill: "#90A4AE",
              });
              lbl.textContent = T("reprBar");
              boardSvg.appendChild(lbl);
            } else if (repr.type === "fraction") {
              renderSvgFraction(
                boardSvg,
                repr.x + quadW / 2,
                repr.y + quadH / 2 + 5,
                displayValue.n,
                displayValue.d,
                30,
                "#263238",
              );
            } else if (repr.type === "numberLine") {
              const nl = renderNumberLine({
                x: repr.x + 20,
                y: repr.y + quadH / 2 + 10,
                width: quadW - 40,
                nlMax: 1,
                denom: correct.d,
                markers: [{ value: displayValue, color: "#455A64" }],
                benchmarks: [0, 0.5, 1],
              });
              boardSvg.appendChild(nl);
              const lbl = svgEl("text", {
                x: repr.x + quadW / 2,
                y: repr.y + 20,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "11",
                fill: "#90A4AE",
              });
              lbl.textContent = T("reprNumberLine");
              boardSvg.appendChild(lbl);
            } else if (repr.type === "decimal") {
              const dec = formatDecimal(displayValue.n, displayValue.d) || "?";
              const lbl = svgEl("text", {
                x: repr.x + quadW / 2,
                y: repr.y + quadH / 2 + 8,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "32",
                "font-weight": "bold",
                fill: "#263238",
              });
              lbl.textContent = dec;
              boardSvg.appendChild(lbl);
            }
          }

          const prompt = svgEl("text", {
            x: 400,
            y: 30,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#455A64",
          });
          prompt.textContent =
            r.phase === "identify"
              ? T("repairSummary")
              : r.phase === "fix"
                ? T("fixPrompt")
                : T("correct");
          boardSvg.appendChild(prompt);
          renderStepGoal(30);

          if (r.phase === "fix" && r.fixOptions) {
            const optY = 440;
            const optW = 100;
            const optH = 40;
            const optGap = 20;
            const totalOptW =
              r.fixOptions.length * optW + (r.fixOptions.length - 1) * optGap;
            const optStartX = (800 - totalOptW) / 2;
            for (let fi = 0; fi < r.fixOptions.length; fi++) {
              const fo = r.fixOptions[fi];
              const fx = optStartX + fi * (optW + optGap);
              const isDecimal =
                r.wrongRepr === "decimal" && fracIsFriendlyDecimal(fo.d);

              const g = svgEl("g", {
                "data-fix-idx": fi,
                style: "cursor:pointer",
              });
              g.appendChild(
                svgEl("rect", {
                  x: fx,
                  y: optY,
                  width: optW,
                  height: optH,
                  fill: "#fff",
                  stroke: MODE_COLORS.repair,
                  "stroke-width": "2",
                  rx: "8",
                  "data-fix-idx": fi,
                }),
              );
              boardSvg.appendChild(g);
              if (isDecimal) {
                const decTxt = svgEl("text", {
                  x: fx + optW / 2,
                  y: optY + optH / 2 + 2,
                  "text-anchor": "middle",
                  "dominant-baseline": "middle",
                  "font-family": "'Share Tech Mono', monospace",
                  "font-size": "16",
                  "font-weight": "bold",
                  fill: "#263238",
                  "pointer-events": "none",
                });
                decTxt.textContent =
                  formatDecimal(fo.n, fo.d) || fo.n + "/" + fo.d;
                g.appendChild(decTxt);
              } else {
                const fracG = renderSvgFraction(
                  g,
                  fx + optW / 2,
                  optY + optH / 2,
                  fo.n,
                  fo.d,
                  14,
                  "#263238",
                );
                fracG.setAttribute("pointer-events", "none");
              }
            }
          }

          renderBoardNextBtn(460);
        }

        function generateRepairFixOptions(correct, wrong) {
          const opts = [correct];
          const d = correct.d;

          const candidates = [];
          for (let cn = 0; cn <= d; cn++) {
            if (cn === correct.n) continue;
            if (cn === wrong.n && d === wrong.d) continue;
            candidates.push(cn);
          }

          for (let i = candidates.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = candidates[i];
            candidates[i] = candidates[j];
            candidates[j] = tmp;
          }

          for (let i = 0; i < candidates.length && opts.length < 3; i++) {
            opts.push({ n: candidates[i], d });
          }

          if (opts.length < 3 && wrong.d === d) {
            opts.push(wrong);
          }

          while (opts.length < 3) {
            const altD = d * 2;
            const altN = correct.n * 2 + (opts.length === 1 ? 1 : -1);
            opts.push({ n: Math.max(0, Math.min(altD, altN)), d: altD });
          }

          for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = opts[i];
            opts[i] = opts[j];
            opts[j] = tmp;
          }
          return opts;
        }

        function handleRepairClick(e) {
          if (state.ui.animating) return;
          const r = state.repair;
          if (r.phase === "done") return;

          if (r.phase === "fix") {
            const fixBtn = e.target.closest("[data-fix-idx]");
            if (!fixBtn) return;
            state.ui.animating = true;
            const idx = parseInt(fixBtn.getAttribute("data-fix-idx"), 10);
            const chosen = r.fixOptions[idx];
            if (fracEqual(chosen, r.correctValue)) {
              r.phase = "done";
              setTimeout(() => {
                state.ui.animating = false;
                onSuccess();
              }, 50);
            } else {
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
              setTimeout(() => {
                state.ui.animating = false;
                renderRepairBoard();
              }, 50);
            }
            return;
          }

          const quad = e.target.closest(".repair-quad");
          if (!quad) return;
          const repr = quad.getAttribute("data-repr");

          if (r.phase === "identify") {
            r.selectedRepr = repr;
            state.ui.animating = true;
            if (repr === r.wrongRepr) {
              r.phase = "fix";
              r.fixOptions = generateRepairFixOptions(
                r.correctValue,
                r.wrongValue,
              );
            } else {
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
            }
            setTimeout(() => {
              state.ui.animating = false;
              renderRepairBoard();
            }, 50);
          }
        }

        /* ═══════════════════════════════════════════
           EXPLORE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderExploreBoard() {
          clearEl(boardSvg);
          const b = state.build;
          const cfg = DIFF_CFG[state.difficulty];
          const denom = b.denominator;
          const needed = Math.max(1, Math.ceil(b.currentValue.n / denom));
          const wholes = Math.max(needed, 1);
          const stripW = wholeWidth(wholes);
          const stripH = 60;
          const gap = 8;
          const totalW = stripW * wholes + gap * (wholes - 1);
          const startX = (800 - totalW) / 2;
          const startY = 160;

          for (let w = 0; w < wholes; w++) {
            const wx = startX + w * (stripW + gap);
            let filledInThisWhole = 0;
            for (let s = 0; s < denom; s++) {
              const idx = w * denom + s;
              if (idx < b.filledSegments.length && b.filledSegments[idx]) {
                filledInThisWhole++;
              }
            }
            const strip = renderStrip({
              x: wx,
              y: startY,
              width: stripW,
              height: stripH,
              denom,
              filled: filledInThisWhole,
              color: MODE_COLORS.build,
              ghost: 0,
            });
            strip.setAttribute("data-whole", w);
            boardSvg.appendChild(strip);
          }

          const nlY = 320;
          const nl = renderNumberLine({
            x: startX,
            y: nlY,
            width: totalW,
            nlMax: cfg.nlMax,
            denom,
            markers:
              b.currentValue.n > 0
                ? [{ value: b.currentValue, color: MODE_COLORS.build }]
                : [],
            benchmarks: nlBenchmarks(cfg.nlMax),
          });
          boardSvg.appendChild(nl);
        }

        /* ═══════════════════════════════════════════
           BOARD DISPATCH
           ═══════════════════════════════════════════ */

        const BoardRenderers = {
          build: renderBuildBoard,
          compare: renderCompareBoard,
          match: renderMatchBoard,
          place: renderPlaceBoard,
          repair: renderRepairBoard,
        };

        function renderBoard() {
          if (state.scene === "explore") {
            renderExploreBoard();
          } else {
            const renderer = BoardRenderers[state.activity];
            if (renderer) renderer();
          }
        }

        /* ═══════════════════════════════════════════
           EVENT DISPATCH
           ═══════════════════════════════════════════ */

        function getSvgPoint(e) {
          const rect = boardSvg.getBoundingClientRect();
          const vb = boardSvg.viewBox.baseVal;
          return {
            x: ((e.clientX - rect.left) / rect.width) * vb.width,
            y: ((e.clientY - rect.top) / rect.height) * vb.height,
          };
        }

        boardSvg.addEventListener("pointerdown", (e) => {
          if (state.ui.animating) return;
          if (e.target.closest(".board-next-btn")) {
            nextRound();
            return;
          }
          if (state.scene === "explore") {
            handleBuildClick(e);
            return;
          }
          const handler = {
            build: handleBuildClick,
            compare: handleCompareClick,
            match: handleMatchClick,
            place: handlePlaceDown,
            repair: handleRepairClick,
          }[state.activity];
          if (handler) handler(e);
        });

        document.addEventListener("pointermove", (e) => {
          if (state.activity === "place" && state.scene === "activity") {
            handlePlaceMove(e);
          }
        });

        document.addEventListener("pointerup", () => {
          if (state.activity === "place" && state.scene === "activity") {
            handlePlaceUp();
          }
        });

        document
          .getElementById("eqBtn")
          .addEventListener("click", handleEqualClick);

        /* ═══════════════════════════════════════════
           PANEL & READOUTS
           ═══════════════════════════════════════════ */

        function updatePanel() {
          let n = -1;
          let d = 1;

          if (state.activity === "build" || state.scene === "explore") {
            n = state.build.currentValue.n;
            d = state.build.currentValue.d;
          } else if (state.activity === "compare") {
            if (state.compare.phase === "reveal") {
              const bigger =
                fracCompare(state.compare.cardA, state.compare.cardB) >= 0
                  ? state.compare.cardA
                  : state.compare.cardB;
              n = bigger.n;
              d = bigger.d;
            }
          } else if (state.activity === "repair") {
            n = state.repair.correctValue.n;
            d = state.repair.correctValue.d;
          } else if (state.activity === "match") {
            if (state.match.selectedCard !== null) {
              const sel = state.match.cards.find(
                (c) => c.id === state.match.selectedCard,
              );
              if (sel) {
                n = sel.value.n;
                d = sel.value.d;
              }
            }
          } else if (state.activity === "place") {
            const active =
              state.place.dragToken !== null
                ? state.place.tokens[state.place.dragToken]
                : state.place.tokens.find((t) => !t.placed);
            if (active) {
              n = active.n;
              d = active.d;
            }
          }

          const fracWholeEl = document.getElementById("fracWhole");
          const fracNumerEl = document.getElementById("fracNumer");
          const fracDenomEl = document.getElementById("fracDenom");
          const fracDecEl = document.getElementById("fracDecimal");

          if (n < 0) {
            fracWholeEl.textContent = "";
            fracNumerEl.textContent = "\u2014";
            fracDenomEl.textContent = "";
            fracDecEl.textContent = "";
            document.getElementById("rdSimplified").textContent = "\u2014";
            updateProgressDisplay();
            return;
          }

          const m = fracToMixed(n, d);
          if (m.whole > 0 && m.n > 0) {
            fracWholeEl.textContent = m.whole;
            fracNumerEl.textContent = m.n;
            fracDenomEl.textContent = m.d;
          } else if (m.whole > 0 && m.n === 0) {
            fracWholeEl.textContent = m.whole;
            fracNumerEl.textContent = "";
            fracDenomEl.textContent = "";
          } else {
            fracWholeEl.textContent = "";
            fracNumerEl.textContent = n;
            fracDenomEl.textContent = d;
          }

          const dec = formatDecimal(n, d);
          fracDecEl.textContent = dec && d > 1 ? "= " + dec : "";

          const s = fracSimplify(n, d);
          document.getElementById("rdSimplified").textContent =
            s.d === 1 ? s.n.toString() : fracFormat(s.n, s.d);

          updateProgressDisplay();
        }

        function updateProgressDisplay() {
          const p = state.progress[state.activity][state.difficulty];
          const total = getSequenceLength();
          const pct = total > 0 ? Math.min(100, (p / total) * 100) : 0;
          document.getElementById("progressFill").style.width = pct + "%";
          document.getElementById("progressLabel").textContent =
            p + " / " + total;
        }

        function updateHintDisplay() {
          const el = document.getElementById("hintText");
          el.textContent = state.ui.feedbackText;
          el.className = "hint-text";
          if (state.ui.feedbackType) {
            el.classList.add(state.ui.feedbackType);
          }
        }

        function updateModeSummary() {
          const key = state.activity + "Summary";
          document.getElementById("modeSummary").textContent = T(key);
          const step = getCurrentStep();
          const statusEl = document.getElementById("statusText");
          const goalStr2 = stepText(step, "goal");
          statusEl.textContent = goalStr2 || "";
        }

        /* ═══════════════════════════════════════════
           SEQUENCE & PROGRESSION
           ═══════════════════════════════════════════ */

        function getSequenceLength() {
          const seq = SEQ[state.activity];
          if (!seq) return 6;
          const steps = seq[state.difficulty];
          if (!steps) return 6;
          return steps.length;
        }

        function getCurrentStep() {
          const seq = SEQ[state.activity];
          if (!seq) return null;
          const steps = seq[state.difficulty];
          if (!steps) return null;
          const idx = state.sequence.currentStep;
          if (idx >= steps.length) return null;
          return steps[idx];
        }

        function loadStep() {
          const step = getCurrentStep();
          if (!step) {
            state.sequence.inFreePlay = true;
            loadRandomStep();
            return;
          }

          state.ui.hintLevel = 0;
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.stepComplete = false;
          document.getElementById("nextBtn").disabled = true;

          if (state.activity === "build") {
            const cfg = DIFF_CFG[state.difficulty];
            const target = step.target;
            state.build.target = target;
            state.build.denominator = target.d;
            state.build.maxWholes = cfg.maxWholes;
            state.build.showGhost = true;
            const total = target.d * cfg.maxWholes;
            state.build.filledSegments = new Array(total).fill(false);
            state.build.currentValue = { n: 0, d: target.d };
          } else if (state.activity === "compare") {
            state.compare.cardA = step.cardA;
            state.compare.cardB = step.cardB;
            state.compare.isEqual = !!step.isEqual;
            state.compare.phase = "choose";
            state.compare.childChoice = null;
            state.compare.displayA = undefined;
            state.compare.displayB = undefined;
            const cmp = fracCompare(step.cardA, step.cardB);
            state.compare.correctAnswer =
              cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
          } else if (state.activity === "place") {
            const cfg = DIFF_CFG[state.difficulty];
            state.place.tokens = step.tokens.map((t, i) => ({
              ...t,
              id: i,
              placed: false,
            }));
            state.place.nlDenom = step.nlDenom || cfg.denoms[0];
            state.place.nlMax = step.nlMax || cfg.nlMax;
            state.place.dragToken = null;
          } else if (state.activity === "match") {
            setupMatchCards(step);
          } else if (state.activity === "repair") {
            state.repair.correctValue = step.correct;
            state.repair.wrongRepr = step.wrongRepr;
            state.repair.wrongValue = step.wrongValue;
            state.repair.phase = "identify";
            state.repair.selectedRepr = null;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          updateHintDisplay();
          renderBoard();
          updatePanel();
        }

        function setupMatchCards(step) {
          const m = state.match;
          m.cards = [];
          m.selectedCard = null;
          m.matchedPairs = [];
          let idCounter = 0;

          const pairs = step.pairs;
          const reprTypes = step.reprTypes;

          for (let i = 0; i < pairs.length; i++) {
            for (let r = 0; r < reprTypes.length; r++) {
              const repr = reprTypes[r];
              const card = {
                id: idCounter++,
                value: pairs[i],
                repr,
                matched: false,
              };
              if (repr === "equivalent" && step.equivMap) {
                const key = fracFormat(pairs[i].n, pairs[i].d);
                card.displayValue = step.equivMap[key] || pairs[i];
              }
              m.cards.push(card);
            }
          }

          for (let i = m.cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = m.cards[i];
            m.cards[i] = m.cards[j];
            m.cards[j] = tmp;
          }

          m.totalPairs = pairs.length;
        }

        function loadRandomStep() {
          if (state.activity === "build") {
            const cfg = DIFF_CFG[state.difficulty];
            const denoms = cfg.denoms.filter((d) => d <= 12);
            const d = denoms[Math.floor(Math.random() * denoms.length)];
            const maxN = d * cfg.maxWholes;
            const n = 1 + Math.floor(Math.random() * (maxN - 1));
            state.build.target = { n, d };
            state.build.denominator = d;
            state.build.maxWholes = cfg.maxWholes;
            state.build.showGhost = true;
            state.build.filledSegments = new Array(d * cfg.maxWholes).fill(
              false,
            );
            state.build.currentValue = { n: 0, d };
          } else if (state.activity === "compare") {
            const cfg = DIFF_CFG[state.difficulty];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const dA = denoms[Math.floor(Math.random() * denoms.length)];
            const dB = denoms[Math.floor(Math.random() * denoms.length)];
            const nA = 1 + Math.floor(Math.random() * (dA - 1));
            const nB = 1 + Math.floor(Math.random() * (dB - 1));
            state.compare.cardA = { n: nA, d: dA };
            state.compare.cardB = { n: nB, d: dB };
            state.compare.isEqual = false;
            state.compare.phase = "choose";
            state.compare.childChoice = null;
            state.compare.displayA = undefined;
            state.compare.displayB = undefined;
            if (state.difficulty !== "intro" && Math.random() < 0.3) {
              if (fracIsFriendlyDecimal(dA) && Math.random() < 0.5) {
                state.compare.displayA = "decimal";
              } else if (fracIsFriendlyDecimal(dB)) {
                state.compare.displayB = "decimal";
              }
            }
            const cmp = fracCompare({ n: nA, d: dA }, { n: nB, d: dB });
            state.compare.correctAnswer =
              cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
            if (cmp === 0) state.compare.isEqual = true;
          } else if (state.activity === "place") {
            const cfg = DIFF_CFG[state.difficulty];
            const isAdv = state.difficulty === "advanced";
            const placeNlMax = isAdv ? 1 : cfg.nlMax;
            const placeDenoms = isAdv
              ? cfg.denoms.filter((dd) => dd >= 8 && dd <= 20)
              : cfg.denoms.filter((dd) => dd <= 10);
            const tokenCount = state.difficulty === "intro" ? 1 : 2;
            const tokens = [];
            const usedD =
              placeDenoms[Math.floor(Math.random() * placeDenoms.length)];
            while (tokens.length < tokenCount) {
              const tn =
                1 + Math.floor(Math.random() * (usedD * placeNlMax - 1));
              let dup = false;
              for (let ti = 0; ti < tokens.length; ti++) {
                if (tokens[ti].n === tn && tokens[ti].d === usedD) dup = true;
              }
              if (!dup) {
                const tdec = formatDecimal(tn, usedD);
                tokens.push({
                  n: tn,
                  d: usedD,
                  label: tdec || undefined,
                  asDecimal: !!tdec,
                  id: tokens.length,
                  placed: false,
                });
              }
            }
            state.place.tokens = tokens;
            state.place.nlDenom = usedD;
            state.place.nlMax = placeNlMax;
            state.place.dragToken = null;
          } else if (state.activity === "match") {
            const cfg = DIFF_CFG[state.difficulty];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const pairs = [];
            while (pairs.length < 3) {
              const d = denoms[Math.floor(Math.random() * denoms.length)];
              const n = 1 + Math.floor(Math.random() * (d - 1));
              let dup = false;
              for (let p = 0; p < pairs.length; p++) {
                if (fracEqual(pairs[p], { n, d })) dup = true;
              }
              if (!dup) pairs.push({ n, d });
            }
            const roll = Math.random();
            let matchRepr;
            let equivMap;
            if (state.difficulty === "intro") {
              matchRepr = ["fraction", "bar"];
            } else if (roll < 0.33) {
              matchRepr = ["fraction", "decimal"];
            } else if (roll < 0.66) {
              matchRepr = ["fraction", "equivalent"];
              equivMap = {};
              for (let ei = 0; ei < pairs.length; ei++) {
                const ep = pairs[ei];
                const mult = 2 + Math.floor(Math.random() * 3);
                equivMap[fracFormat(ep.n, ep.d)] = {
                  n: ep.n * mult,
                  d: ep.d * mult,
                };
              }
            } else {
              matchRepr = ["fraction", "bar"];
            }
            const matchStep = {
              pairs,
              reprTypes: matchRepr,
              hint1: "",
              hint2: "",
              feedbackSuccess: T("correct"),
            };
            if (equivMap) matchStep.equivMap = equivMap;
            setupMatchCards(matchStep);
          } else if (state.activity === "repair") {
            const cfg = DIFF_CFG[state.difficulty];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const d = denoms[Math.floor(Math.random() * denoms.length)];
            const n = 1 + Math.floor(Math.random() * (d - 1));
            const reprTypes = ["fraction", "decimal", "numberLine", "bar"];
            const wrongRepr =
              reprTypes[Math.floor(Math.random() * reprTypes.length)];
            let wn = n + (Math.random() < 0.5 ? 1 : -1);
            wn = Math.max(0, Math.min(d, wn));
            if (wn === n) wn = n > 0 ? n - 1 : n + 1;
            state.repair.correctValue = { n, d };
            state.repair.wrongRepr = wrongRepr;
            state.repair.wrongValue = { n: wn, d };
            state.repair.phase = "identify";
            state.repair.selectedRepr = null;
            state.repair.fixOptions = null;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderBoard();
          updatePanel();
          updateHintDisplay();
        }

        function showSuccessCelebration() {
          const emoji = svgEl("text", {
            x: 400,
            y: 260,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-size": "64",
            opacity: "1",
            class: "celebrate-emoji",
          });
          emoji.textContent = "\uD83C\uDF89";
          boardSvg.appendChild(emoji);

          let frame = 0;
          const totalFrames = 40;
          function fadeOut() {
            frame++;
            const t = frame / totalFrames;
            const scale = 1 + t * 0.3;
            const opacity = Math.max(0, 1 - t);
            emoji.setAttribute("opacity", opacity);
            emoji.setAttribute(
              "transform",
              "translate(400," +
                260 +
                ") scale(" +
                scale +
                ") translate(-400,-260)",
            );
            if (frame < totalFrames) {
              requestAnimationFrame(fadeOut);
            } else if (emoji.parentNode) {
              emoji.parentNode.removeChild(emoji);
            }
          }
          setTimeout(() => requestAnimationFrame(fadeOut), 600);
        }

        function onSuccess() {
          state.progress[state.activity][state.difficulty]++;
          state.ui.stepComplete = true;
          document.getElementById("nextBtn").disabled = false;
          const step = getCurrentStep();
          const fbText = stepText(step, "feedbackSuccess") || T("correct");
          state.ui.feedbackText = fbText;
          state.ui.feedbackType = "success";
          updateHintDisplay();
          updateProgressDisplay();
          renderBoard();
          showSuccessCelebration();
        }

        function nextRound() {
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.hintLevel = 0;
          updateHintDisplay();

          if (!state.sequence.inFreePlay) {
            state.sequence.currentStep++;
          }
          loadStep();
        }

        /* ═══════════════════════════════════════════
           NAVIGATION & MODE SWITCHING
           ═══════════════════════════════════════════ */

        function setActivity(activity) {
          state.activity = activity;
          state.scene = "activity";
          document.querySelectorAll(".mode-btn").forEach((btn) => {
            btn.classList.toggle(
              "active",
              btn.getAttribute("data-mode") === activity,
            );
          });
          document.getElementById("exploreBtn").classList.remove("active");
          document.getElementById("exploreCtrls").classList.remove("visible");
          document.documentElement.style.setProperty(
            "--mode-active",
            "var(--mode-" + activity + ")",
          );
          updateModeSummary();
          startSequence();
        }

        function setDifficulty(diff) {
          state.difficulty = diff;
          document.querySelectorAll(".diff-btn").forEach((btn) => {
            btn.classList.toggle(
              "active",
              btn.getAttribute("data-diff") === diff,
            );
          });
          if (state.scene === "explore") {
            state.scene = "activity";
            document.getElementById("exploreBtn").classList.remove("active");
            document.getElementById("exploreCtrls").classList.remove("visible");
          }
          startSequence();
        }

        function startSequence() {
          state.sequence.currentStep = 0;
          state.sequence.inFreePlay = false;
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.hintLevel = 0;
          loadStep();
        }

        function toggleExplore() {
          if (state.scene === "explore") {
            state.scene = "activity";
            document.getElementById("exploreBtn").classList.remove("active");
            document.getElementById("exploreCtrls").classList.remove("visible");
            startSequence();
          } else {
            state.scene = "explore";
            document.getElementById("exploreBtn").classList.add("active");
            document.getElementById("exploreCtrls").classList.add("visible");
            const cfg = DIFF_CFG[state.difficulty];
            state.build.denominator = 2;
            state.build.maxWholes = cfg.maxWholes;
            state.build.filledSegments = new Array(2 * cfg.maxWholes).fill(
              false,
            );
            state.build.currentValue = { n: 0, d: 2 };
            updateExploreControls();
            renderBoard();
            updatePanel();
            updateModeSummary();
          }
        }

        function updateExploreControls() {
          document.getElementById("denomVal").textContent =
            state.build.denominator;
          document.getElementById("numerVal").textContent =
            state.build.currentValue.n;
        }

        function stepDenominator(delta) {
          const denoms = DIFF_CFG[state.difficulty].denoms;
          let idx = denoms.indexOf(state.build.denominator);
          if (idx < 0) idx = 0;
          idx = Math.max(0, Math.min(denoms.length - 1, idx + delta));
          const cfg = DIFF_CFG[state.difficulty];
          const oldVal = fracToFloat(state.build.currentValue);
          state.build.denominator = denoms[idx];
          const newN = Math.round(oldVal * denoms[idx]);
          const maxN = denoms[idx] * cfg.maxWholes;
          state.build.currentValue = {
            n: Math.max(0, Math.min(maxN, newN)),
            d: denoms[idx],
          };
          state.build.filledSegments = new Array(
            denoms[idx] * cfg.maxWholes,
          ).fill(false);
          for (let i = 0; i < state.build.currentValue.n; i++) {
            state.build.filledSegments[i] = true;
          }
          updateExploreControls();
          renderBoard();
          updatePanel();
        }

        function stepNumerator(delta) {
          const cfg = DIFF_CFG[state.difficulty];
          const maxN = state.build.denominator * cfg.maxWholes;
          const newN = Math.max(
            0,
            Math.min(maxN, state.build.currentValue.n + delta),
          );
          state.build.currentValue = { n: newN, d: state.build.denominator };
          state.build.filledSegments = new Array(
            state.build.denominator * cfg.maxWholes,
          ).fill(false);
          for (let i = 0; i < newN; i++) {
            state.build.filledSegments[i] = true;
          }
          updateExploreControls();
          renderBoard();
          updatePanel();
        }

        function showHint() {
          const step = getCurrentStep();
          if (!step) return;
          state.ui.hintLevel = Math.min(state.ui.hintLevel + 1, 2);
          const key = state.ui.hintLevel === 1 ? "hint1" : "hint2";
          state.ui.feedbackText = stepText(step, key);
          state.ui.feedbackType = "";
          updateHintDisplay();
        }

        /* ═══════════════════════════════════════════
           BUTTON WIRING
           ═══════════════════════════════════════════ */

        document.querySelectorAll(".mode-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            setActivity(btn.getAttribute("data-mode"));
          });
        });

        document.querySelectorAll(".diff-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            setDifficulty(btn.getAttribute("data-diff"));
          });
        });

        document
          .getElementById("exploreBtn")
          .addEventListener("click", toggleExplore);
        document.getElementById("hintBtn").addEventListener("click", showHint);
        document.getElementById("nextBtn").addEventListener("click", nextRound);
        document.getElementById("langBtn").addEventListener("click", () => {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        });
        document
          .getElementById("denomMinus")
          .addEventListener("click", () => stepDenominator(-1));
        document
          .getElementById("denomPlus")
          .addEventListener("click", () => stepDenominator(1));
        document
          .getElementById("numerMinus")
          .addEventListener("click", () => stepNumerator(-1));
        document
          .getElementById("numerPlus")
          .addEventListener("click", () => stepNumerator(1));

        /* ═══════════════════════════════════════════
           KEYBOARD
           ═══════���═══════════════════════════════════ */

        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight" && state.scene === "explore") {
            stepNumerator(1);
            e.preventDefault();
          } else if (e.key === "ArrowLeft" && state.scene === "explore") {
            stepNumerator(-1);
            e.preventDefault();
          } else if (e.key === "Enter" || e.key === " ") {
            if (
              state.ui.feedbackType === "success" ||
              (state.activity === "compare" && state.compare.phase === "reveal")
            ) {
              nextRound();
              e.preventDefault();
            }
          }
        });

        /* ═══════════════════════════════════════════
           TRANSLATIONS
           ═══════════════════════════════════════════ */

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          document.getElementById("langBtn").textContent =
            state.lang === "en" ? "PL" : "EN";
          document.getElementById("modeBuildBtn").textContent = T("build");
          document.getElementById("modeCompareBtn").textContent = T("compare");
          document.getElementById("modeMatchBtn").textContent = T("match");
          document.getElementById("modePlaceBtn").textContent = T("place");
          document.getElementById("modeRepairBtn").textContent = T("repair");
          document.querySelectorAll(".diff-btn").forEach((btn) => {
            btn.textContent = T(btn.getAttribute("data-diff"));
          });
          document.getElementById("exploreBtn").textContent = T("explore");
          document.getElementById("hintBtn").textContent = T("hint");
          document.getElementById("nextBtn").textContent = T("next");
          document.getElementById("lblActivity").textContent = T("activity");
          document.getElementById("lblValue").textContent = T("value");
          document.getElementById("lblSimplified").textContent =
            T("simplified");
          document.getElementById("lblProgress").textContent = T("progress");
          document.getElementById("lblDenom").textContent = T("denominator");
          document.getElementById("lblNumer").textContent = T("numerator");

          const eqBtnEl = document.getElementById("eqBtn");
          eqBtnEl.textContent = "= " + T("equalBtn");
          eqBtnEl.setAttribute("aria-label", T("ariaEqual"));

          document
            .querySelector("a[aria-label]")
            .setAttribute("aria-label", T("ariaBackToLearn"));
          document.getElementById("langBtn").title = T("ariaSwitchLang");
          document
            .getElementById("nextBtn")
            .setAttribute("aria-label", T("ariaNextRound"));
          document
            .getElementById("boardSvg")
            .setAttribute("aria-label", T("ariaBoard"));
          document
            .getElementById("denomMinus")
            .setAttribute("aria-label", T("ariaDecDenom"));
          document
            .getElementById("denomPlus")
            .setAttribute("aria-label", T("ariaIncDenom"));
          document
            .getElementById("numerMinus")
            .setAttribute("aria-label", T("ariaDecNumer"));
          document
            .getElementById("numerPlus")
            .setAttribute("aria-label", T("ariaIncNumer"));

          document
            .querySelector('meta[name="description"]')
            .setAttribute("content", T("subtitle"));

          updateModeSummary();
          renderBoard();
          updatePanel();
        }

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */

        /* ═══════════════════════════════════════════
           VISIBILITY
           ═══════════════════════════════════════════ */

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {
            renderBoard();
          }
        });

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */

        function init() {
          applyTranslations();
          setActivity("build");
        }

        init();
      })();
    </script>
  </body>
</html>
