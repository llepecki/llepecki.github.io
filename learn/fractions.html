<!doctype html>
<!--
Implementing agent workflow:
After making changes, and again before considering the job finished, run `npm run code-review -- fractions.html`.
Use it as the final review gate. It enforces the single-file HTML app policy plus HTML, CSS, JavaScript, formatting, and architecture checks.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Playground</title>
    <meta
      name="description"
      content="Fraction Playground — build, compare, match, place, and repair fractions and decimals. An interactive manipulative for children aged 7-11."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fafaf7;
        --panel: #ffffff;
        --panel-border: #e0ddd6;
        --text: #37474f;
        --text-head: #263238;
        --text-dim: #78909c;
        --text-label: #90a4ae;
        --accent: #455a64;
        --accent-light: #eceff1;
        --canvas-bg: #f5f3ee;
        --mode-build: #26a69a;
        --mode-compare: #42a5f5;
        --mode-match: #5c6bc0;
        --mode-place: #ffa726;
        --mode-repair: #ef5350;
        --mode-active: var(--mode-build);
        --success: #66bb6a;
        --error: #ef5350;
        --bar-bg: #f5f0e8;
        --bar-border: #b0a89a;
        --strip-shadow: rgba(0, 0, 0, 0.06);
      }

      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #fafaf7 0%, #f0ede6 100%);
        font-family: "Outfit", sans-serif;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }

      header {
        padding: 6px 28px 5px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-text {
        flex: 1;
        min-width: 0;
      }

      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-head);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      header h1 a {
        color: inherit;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      header h1 a:hover {
        opacity: 0.7;
      }

      .header-emoji {
        font-size: 18px;
        line-height: 1;
      }

      header p {
        margin-top: 1px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .lang-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .main {
        display: flex;
        height: calc(100vh - 46px);
      }

      .play-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--canvas-bg);
        border-right: 1px solid var(--panel-border);
      }

      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--panel-border);
        background: var(--panel);
      }

      .tb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .tb-sep {
        width: 1px;
        height: 26px;
        background: var(--panel-border);
        margin: 0 4px;
        align-self: center;
      }

      .mode-btn {
        padding: 10px 18px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .mode-btn:hover {
        background: #f0ede6;
      }

      .mode-btn.active {
        color: #fff;
        border-color: transparent;
      }

      .mode-btn[data-mode="build"].active {
        background: var(--mode-build);
      }

      .mode-btn[data-mode="compare"].active {
        background: var(--mode-compare);
      }

      .mode-btn[data-mode="match"].active {
        background: var(--mode-match);
      }

      .mode-btn[data-mode="place"].active {
        background: var(--mode-place);
        color: var(--text-head);
      }

      .mode-btn[data-mode="repair"].active {
        background: var(--mode-repair);
      }

      .mode-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .mode-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .diff-btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .diff-btn:hover {
        background: #f0ede6;
      }

      .diff-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }

      .diff-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .action-btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .action-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .board-stage {
        flex: 1;
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .board-stage svg {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .panel {
        width: 300px;
        flex-shrink: 0;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .panel-section {
        padding: 16px 20px;
        border-bottom: 1px solid var(--panel-border);
      }

      .panel-section:last-child {
        border-bottom: none;
      }

      .panel-section.flex-fill {
        flex: 1;
      }

      .section-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-label);
        margin-bottom: 6px;
      }

      .frac-display {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 0;
      }

      .frac-stack {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
      }

      .frac-numer,
      .frac-denom {
        font-family: "Share Tech Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-head);
        line-height: 1.2;
        min-width: 36px;
        text-align: center;
      }

      .frac-line {
        width: 100%;
        min-width: 36px;
        height: 3px;
        background: var(--text-head);
        border-radius: 2px;
      }

      .frac-whole {
        font-family: "Share Tech Mono", monospace;
        font-size: 30px;
        font-weight: 700;
        color: var(--text-head);
        margin-right: 6px;
        align-self: center;
      }

      .frac-decimal {
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-dim);
        margin-left: 14px;
        align-self: center;
      }

      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 2px 0;
      }

      .readout-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
      }

      .readout-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }

      .readout-val.dim {
        color: var(--text-dim);
        font-weight: 400;
      }

      .progress-bar {
        height: 5px;
        background: var(--accent-light);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 8px;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--mode-active);
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .progress-label {
        margin-top: 4px;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: var(--text-label);
      }

      .hint-text {
        font-size: 12px;
        color: #546e7a;
        line-height: 1.5;
        min-height: 18px;
        margin-top: 6px;
      }

      .hint-text.success {
        color: var(--success);
        font-weight: 600;
      }

      .hint-text.error {
        color: var(--error);
      }

      .mode-summary {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .explore-ctrls {
        display: none;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }

      .explore-ctrls.visible {
        display: flex;
      }

      .stepper-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .stepper-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
        min-width: 90px;
      }

      .step-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        touch-action: manipulation;
      }

      .step-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .step-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .stepper-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-head);
        min-width: 28px;
        text-align: center;
      }

      .eq-btn {
        display: none;
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 24px;
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-head);
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        z-index: 2;
      }

      .eq-btn.visible {
        display: block;
      }

      .eq-btn:hover {
        border-color: var(--mode-compare);
        background: #e3f2fd;
      }

      .eq-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .bottom-bar {
        text-align: center;
        padding: 4px 20px;
        border-top: 1px solid var(--panel-border);
      }

      .status-text {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        color: var(--text-dim);
      }

      @keyframes success-pulse {
        0% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.1) drop-shadow(0 0 8px rgba(102, 187, 106, 0.6));
        }
        100% {
          filter: brightness(1);
        }
      }

      .success-pulse {
        animation: success-pulse 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
      }

      .overlay-emoji {
        font-size: 72px;
        animation: overlayPop 0.4s ease;
      }

      .overlay-msg {
        font-family: "Outfit", sans-serif;
        font-size: 22px;
        font-weight: 700;
        margin-top: 16px;
        color: #fff;
        text-align: center;
        max-width: 400px;
        padding: 0 20px;
      }

      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.5);
      }

      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes overlayPop {
        0% {
          transform: scale(0.3);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: calc(100vh - 46px);
        }

        .play-area {
          min-height: 360px;
          height: 58vh;
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
        }

        .panel {
          width: 100%;
        }

        .toolbar {
          padding: 6px 8px;
          gap: 4px;
        }

        .mode-btn {
          padding: 7px 10px;
          font-size: 12px;
        }

        .diff-btn {
          padding: 5px 8px;
          font-size: 11px;
        }
      }

      @media (pointer: coarse) {
        .mode-btn {
          min-height: 42px;
        }

        .step-btn {
          width: 36px;
          height: 36px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .success-pulse {
          animation: none;
        }

        .progress-fill {
          transition: none;
        }

        .result-overlay {
          animation: none;
        }

        .overlay-emoji {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/" aria-label="Back to Learn"
            ><span class="header-emoji">&#x1F9E9;</span></a
          >
          <span id="titleText">Fraction Playground</span>
        </h1>
        <p id="subtitleText">
          Build, compare, match, place, and repair fractions and decimals.
        </p>
      </div>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="play-area">
        <div class="toolbar">
          <div class="tb-row" id="modeRow">
            <button
              type="button"
              class="mode-btn active"
              data-mode="build"
              id="modeBuildBtn"
            >
              Build
            </button>
            <button
              type="button"
              class="mode-btn"
              data-mode="compare"
              id="modeCompareBtn"
            >
              Compare
            </button>
            <button
              type="button"
              class="mode-btn"
              data-mode="match"
              id="modeMatchBtn"
            >
              Match
            </button>
            <button
              type="button"
              class="mode-btn"
              data-mode="place"
              id="modePlaceBtn"
            >
              Place
            </button>
            <button
              type="button"
              class="mode-btn"
              data-mode="repair"
              id="modeRepairBtn"
            >
              Repair
            </button>
          </div>
          <div class="tb-row">
            <button type="button" class="diff-btn active" data-diff="intro">
              Introduction
            </button>
            <button type="button" class="diff-btn" data-diff="intermediate">
              Intermediate
            </button>
            <button type="button" class="diff-btn" data-diff="advanced">
              Advanced
            </button>
            <button type="button" class="action-btn" id="exploreBtn">
              Explore
            </button>
            <button type="button" class="action-btn" id="hintBtn">Hint</button>
            <button
              type="button"
              class="action-btn"
              id="nextBtn"
              aria-label="Next round"
            >
              Next
            </button>
          </div>
        </div>

        <div class="board-stage">
          <svg
            id="boardSvg"
            viewBox="0 0 800 500"
            preserveAspectRatio="xMidYMid meet"
            aria-label="Fraction activity board"
          ></svg>
          <button
            type="button"
            class="eq-btn"
            id="eqBtn"
            aria-label="Values are equal"
          >
            = Equal
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-section">
          <div class="section-label" id="lblActivity">Activity</div>
          <div class="mode-summary" id="modeSummary"></div>
        </div>

        <div class="panel-section">
          <div class="section-label" id="lblValue">Value</div>
          <div class="frac-display" id="fracDisplay">
            <span class="frac-whole" id="fracWhole"></span>
            <span class="frac-stack">
              <span class="frac-numer" id="fracNumer">0</span>
              <span class="frac-line"></span>
              <span class="frac-denom" id="fracDenom">2</span>
            </span>
            <span class="frac-decimal" id="fracDecimal"></span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblSimplified">Simplified</span>
            <span class="readout-val" id="rdSimplified">0</span>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-label" id="lblProgress">Progress</div>
          <div class="hint-text" id="hintText"></div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0 / 6</div>
          <div class="explore-ctrls" id="exploreCtrls">
            <div class="stepper-row">
              <span class="stepper-label" id="lblDenom">Denominator</span>
              <button
                type="button"
                class="step-btn"
                id="denomMinus"
                aria-label="Decrease denominator"
              >
                &minus;
              </button>
              <span class="stepper-val" id="denomVal">2</span>
              <button
                type="button"
                class="step-btn"
                id="denomPlus"
                aria-label="Increase denominator"
              >
                +
              </button>
            </div>
            <div class="stepper-row">
              <span class="stepper-label" id="lblNumer">Numerator</span>
              <button
                type="button"
                class="step-btn"
                id="numerMinus"
                aria-label="Decrease numerator"
              >
                &minus;
              </button>
              <span class="stepper-val" id="numerVal">0</span>
              <button
                type="button"
                class="step-btn"
                id="numerPlus"
                aria-label="Increase numerator"
              >
                +
              </button>
            </div>
          </div>
        </div>

        <div class="panel-section flex-fill"></div>
      </div>
    </main>

    <div class="bottom-bar">
      <span class="status-text" id="statusText"></span>
    </div>

    <script>
      (function () {
        "use strict";

        /* ═══════════════════════════════════════════

            build: "Buduj",

        /* ═══════════════════════════════════════════
           RATIONAL MATH
           ════════════���══════════════════════════════ */

        function gcd(a, b) {
          a = Math.abs(a);
          b = Math.abs(b);
          while (b) {
            const t = b;
            b = a % b;
            a = t;
          }
          return a;
        }

        function fracSimplify(n, d) {
          if (d === 0) return { n: 0, d: 1 };
          if (n === 0) return { n: 0, d: 1 };
          const g = gcd(Math.abs(n), Math.abs(d));
          return { n: n / g, d: d / g };
        }

        function fracEqual(a, b) {
          return a.n * b.d === b.n * a.d;
        }

        function fracCompare(a, b) {
          const lhs = a.n * b.d;
          const rhs = b.n * a.d;
          if (lhs < rhs) return -1;
          if (lhs > rhs) return 1;
          return 0;
        }

        function fracToFloat(f) {
          if (f.d === 0) return 0;
          return f.n / f.d;
        }

        function fracIsFriendlyDecimal(d) {
          let r = d;
          while (r % 2 === 0) r /= 2;
          while (r % 5 === 0) r /= 5;
          return r === 1;
        }

        function fracToDecimalStr(n, d) {
          if (d === 0) return "0";
          const s = fracSimplify(n, d);
          if (!fracIsFriendlyDecimal(s.d)) return null;
          const val = n / d;
          if (Number.isInteger(val)) return val.toString();
          let str = val.toFixed(4);
          str = str.replace(/0+$/, "");
          if (str.endsWith(".")) str = str.slice(0, -1);
          return str;
        }

        function formatDecimal(n, d) {
          const str = fracToDecimalStr(n, d);
          if (!str) return null;
          if (state.lang === "pl") return str.replace(".", ",");
          return str;
        }

        function fracToMixed(n, d) {
          if (d === 0) return { whole: 0, n: 0, d: 1 };
          const whole = Math.floor(n / d);
          const rem = n - whole * d;
          return { whole, n: rem, d };
        }

        function fracFormat(n, d) {
          return n + "/" + d;
        }

        function _fracFormatMixed(n, d) {
          const m = fracToMixed(n, d);
          if (m.whole === 0) return fracFormat(n, d);
          if (m.n === 0) return m.whole.toString();
          return m.whole + " " + m.n + "/" + m.d;
        }

        function svgEl(tag, attrs) {
          const el = document.createElementNS(SVG_NS, tag);
          if (attrs) {
            for (const k in attrs) {
              el.setAttribute(k, attrs[k]);
            }
          }
          return el;
        }

        function clearEl(el) {
          while (el.firstChild) el.removeChild(el.firstChild);
        }

           ANIMATION ENGINE

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function animateValue(duration, onFrame, onComplete) {
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            onFrame(1);
            if (onComplete) onComplete();
            return;
          }
          const start = performance.now();
          function frame(now) {
            const elapsed = now - start;
            const t = Math.min(1, elapsed / duration);
            onFrame(easeOutCubic(t));
            if (t < 1) {
              requestAnimationFrame(frame);
            } else {
              if (onComplete) onComplete();
            }
          }
          requestAnimationFrame(frame);
        }

            const x1 = cx + r * Math.cos(a1);
            const y1 = cy + r * Math.sin(a1);

              " " +
              y1 +
              " A " +
              r +
