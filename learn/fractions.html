          for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = options[i];
            options[i] = options[j];
            options[j] = tmp;
          }

          const optW = 110;
          const optH = 50;
          const optGap = 20;
          const totalW = options.length * optW + (options.length - 1) * optGap;
          const startX = (800 - totalW) / 2;

          for (let i = 0; i < options.length; i++) {
            const opt = options[i];
            const ox = startX + i * (optW + optGap);
            const g = svgEl("g", {
              "data-add-answer": opt.n + "/" + opt.d,
              style: "cursor:pointer",
              class: "calc-option",
            });
            g.appendChild(
              svgEl("rect", {
                x: ox,
                y: y,
                width: optW,
                height: optH,
                fill: "#fff",
                stroke: MODE_COLORS.add,
                "stroke-width": "2",
                rx: "8",
                "data-add-answer": opt.n + "/" + opt.d,
              }),
            );
            const fg = renderSvgFraction(
              g,
              ox + optW / 2,
              y + optH / 2,
              opt.n,
              opt.d,
              13,
              "#263238",
            );
            fg.setAttribute("pointer-events", "none");
            boardSvg.appendChild(g);
          }
        }

        function handleAddClick(e) {
          if (state.ui.animating) return;
          const a = state.add;
          if (a.phase === "reveal") return;

          /* handle prediction phase */
          if (a.phase === "predict") {
            const predBtn = e.target.closest("[data-predict]");
            if (!predBtn) return;
            a.prediction = predBtn.getAttribute("data-predict");
            a.phase = "solve";
            renderAddBoard();
            return;
          }

          const optEl = e.target.closest("[data-add-answer]");
          if (!optEl) return;

          const parts = optEl.getAttribute("data-add-answer").split("/");
          const chosen = {
            n: parseInt(parts[0], 10),
            d: parseInt(parts[1], 10),
          };
          const correct = addCorrectAnswer(a);

          state.ui.animating = true;
          if (fracEqual(chosen, correct)) {
            a.phase = "reveal";
            a.childAnswer = chosen;
            setTimeout(function () {
              state.ui.animating = false;
              renderAddBoard();
              onSuccess();
            }, 50);
          } else {
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            setTimeout(function () {
              state.ui.animating = false;
            }, 50);
          }
        }

        /* ═══════════════════════════════════════════
           SUBTRACT: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function subtractCorrectAnswer(s) {
          return fracSimplify(s.result.n, s.result.d);
        }

        function renderSubtractBoard() {
          clearEl(boardSvg);
          const s = state.subtract;
          const cd = fracLCM(s.minuend.d, s.subtrahend.d);

          renderStepGoal(30);

          /* prediction phase */
          if (s.phase === "predict") {
            const step = getCurrentStep();
            const benchmark =
              (step && step.benchmark) ||
              (fracToFloat(s.result) > 0.5 ? "1/2" : "1/4");
            renderSvgEquation(
              boardSvg,
              400,
              170,
              [
                { type: "frac", n: s.minuend.n, d: s.minuend.d },
                { type: "op", str: "\u2212" },
                { type: "frac", n: s.subtrahend.n, d: s.subtrahend.d },
              ],
              14,
              "#455A64",
            );
            const qText = T("moreOrLess") + " " + benchmark + "?";
            boardSvg.appendChild(
              renderPredictionPrompt({
                x: 80,
                y: 200,
                width: 640,
                question: qText,
                optionA: "< " + benchmark,
                optionB: "> " + benchmark,
              }),
            );
            renderBoardNextBtn(420);
            return;
          }

          if (s.boardType === "takeAwayStrip") {
            /* single-bar removal: minuend with subtrahend segments marked */
            const showResult = s.phase === "reveal";
            const stripW = 600;
            const stripH = 50;
            const startX = (800 - stripW) / 2;
            const stripY = 90;
            const minN = s.minuend.n * (cd / s.minuend.d);
            const subN = s.subtrahend.n * (cd / s.subtrahend.d);
            const remN = minN - subN;

            /* conversion label for unlike denoms */
            if (s.minuend.d !== s.subtrahend.d) {
              const convLbl = svgEl("text", {
                x: 400,
                y: 78,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#78909C",
              });
              convLbl.textContent =
                s.minuend.n +
                "/" +
                s.minuend.d +
                " = " +
                minN +
                "/" +
                cd +
                "    " +
                s.subtrahend.n +
                "/" +
                s.subtrahend.d +
                " = " +
                subN +
                "/" +
                cd;
              boardSvg.appendChild(convLbl);
            }

            /* draw minuend bar — all segments (handles improper fractions) */
            const totalSegs = Math.max(cd, minN);
            const segW = stripW / totalSegs;
            for (let i = 0; i < totalSegs; i++) {
              const isFilled = i < minN;
              const isRemoved = isFilled && i >= remN;
              let fill;
              if (showResult && isRemoved) {
                fill = "#F5E6E6";
              } else if (!showResult && isRemoved) {
                fill = MODE_COLORS.subtract + "44";
              } else if (isFilled) {
                fill = showResult ? "#66BB6A" : MODE_COLORS.subtract;
              } else {
                fill = "#f5f3ee";
              }
              boardSvg.appendChild(
                svgEl("rect", {
                  x: startX + i * segW,
                  y: stripY,
                  width: segW,
                  height: stripH,
                  fill: fill,
                  stroke: "#B0A89A",
                  "stroke-width": "1",
                }),
              );
              /* cross-hatch on removed segments */
              if (isRemoved && !showResult) {
                boardSvg.appendChild(
                  svgEl("line", {
                    x1: startX + i * segW,
                    y1: stripY,
                    x2: startX + (i + 1) * segW,
                    y2: stripY + stripH,
                    stroke: MODE_COLORS.subtract,
                    "stroke-width": "1.5",
                    opacity: "0.4",
                  }),
                );
              }
            }
            /* whole-boundary markers */
            if (totalSegs > cd) {
              for (let w = cd; w < totalSegs; w += cd) {
                boardSvg.appendChild(
                  svgEl("line", {
                    x1: startX + w * segW,
                    y1: stripY,
                    x2: startX + w * segW,
                    y2: stripY + stripH,
                    stroke: "#455A64",
                    "stroke-width": "2.5",
                  }),
                );
              }
            }
            /* border */
            boardSvg.appendChild(
              svgEl("rect", {
                x: startX,
                y: stripY,
                width: stripW,
                height: stripH,
                fill: "none",
                stroke: "#B0A89A",
                "stroke-width": "1.5",
                rx: "4",
              }),
            );

            /* labels */
            if (showResult) {
              const rs = fracSimplify(remN, cd);
              renderSvgFraction(
                boardSvg,
                startX + (remN * segW) / 2,
                stripY + stripH + 18,
                rs.n,
                rs.d,
                10,
                "#66BB6A",
              );
            } else {
              const remainLbl = svgEl("text", {
                x: startX + (remN * segW) / 2,
                y: stripY + stripH + 18,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "13",
                "font-weight": "600",
                fill: "#455A64",
              });
              remainLbl.textContent = "?";
              boardSvg.appendChild(remainLbl);
            }

            if (minN > remN) {
              const rmX = startX + ((remN + minN) / 2) * segW;
              const rmPre = svgEl("text", {
                x: rmX - 14,
                y: stripY - 8,
                "text-anchor": "middle",
                "dominant-baseline": "central",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: MODE_COLORS.subtract,
              });
              rmPre.textContent = "\u2212";
              boardSvg.appendChild(rmPre);
              renderSvgFraction(
                boardSvg,
                rmX + 4,
                stripY - 8,
                subN,
                cd,
                9,
                MODE_COLORS.subtract,
              );
            }

            /* number line */
            const nlMax = fracToFloat(s.minuend) > 1 ? 2 : 1;
            boardSvg.appendChild(
              renderNumberLine({
                x: 80,
                y: 220,
                width: 640,
                nlMax: nlMax,
                denom: cd,
                markers: showResult
                  ? [
                      { value: s.minuend, color: "#B0A89A" },
                      { value: s.result, color: "#66BB6A" },
                    ]
                  : [{ value: s.minuend, color: MODE_COLORS.subtract }],
                benchmarks: nlBenchmarks(nlMax),
              }),
            );

            if (s.phase === "solve") {
              renderSubtractOptions(s, cd, 300);
            }
          } else if (s.boardType === "gapFinder") {
            /* gap finder — shows two points and asks for the distance */
            const nlMax = fracToFloat(s.minuend) > 1 ? 2 : 1;
            boardSvg.appendChild(
              renderGapLine({
                x: 80,
                y: 180,
                width: 640,
                nlMax: nlMax,
                denom: cd,
                valueA: s.subtrahend,
                valueB: s.minuend,
                gapColor: MODE_COLORS.subtract,
              }),
            );

            /* prompt */
            const promptTxt = svgEl("text", {
              x: 400,
              y: 100,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "18",
              "font-weight": "600",
              fill: "#455A64",
            });
            promptTxt.textContent =
              s.subtrahend.n +
              "/" +
              s.subtrahend.d +
              " \u2192 " +
              s.minuend.n +
              "/" +
              s.minuend.d +
              " = ?";
            boardSvg.appendChild(promptTxt);

            if (s.phase === "solve") {
              renderSubtractOptions(s, cd, 280);
            }
          } else if (s.boardType === "repairDifference") {
            /* show a wrong subtraction and ask child to find the correct answer */
            const wrongResult = fracSimplify(
              Math.max(1, s.result.n + (Math.random() < 0.5 ? 1 : -1)),
              s.result.d,
            );
            const prompt1 = svgEl("text", {
              x: 400,
              y: 100,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "16",
              fill: "#455A64",
            });
            prompt1.textContent = T("someoneSays");
            boardSvg.appendChild(prompt1);

            renderSvgEquation(
              boardSvg,
              400,
              140,
              [
                { type: "frac", n: s.minuend.n, d: s.minuend.d },
                { type: "op", str: "\u2212" },
                { type: "frac", n: s.subtrahend.n, d: s.subtrahend.d },
                { type: "op", str: "=" },
                { type: "frac", n: wrongResult.n, d: wrongResult.d },
              ],
              16,
              MODE_COLORS.subtract,
            );

            const prompt2 = svgEl("text", {
              x: 400,
              y: 180,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "16",
              "font-weight": "600",
              fill: "#455A64",
            });
            prompt2.textContent = T("whatIsCorrect");
            boardSvg.appendChild(prompt2);

            /* number line for reference */
            const nlMax = fracToFloat(s.minuend) > 1 ? 2 : 1;
            boardSvg.appendChild(
              renderNumberLine({
                x: 80,
                y: 240,
                width: 640,
                nlMax: nlMax,
                denom: cd,
                markers: [
                  { value: s.minuend, color: "#B0A89A" },
                  { value: s.subtrahend, color: MODE_COLORS.subtract },
                ],
                benchmarks: nlBenchmarks(nlMax),
              }),
            );

            if (s.phase === "solve") {
              renderSubtractOptions(s, cd, 320);
            }
          }

          if (s.phase === "reveal") {
            const r = fracSimplify(s.result.n, s.result.d);
            const eqY = s.boardType === "gapFinder" ? 300 : 360;
            renderSvgEquation(
              boardSvg,
              400,
              eqY,
              [
                { type: "frac", n: s.minuend.n, d: s.minuend.d },
                { type: "op", str: "\u2212" },
                { type: "frac", n: s.subtrahend.n, d: s.subtrahend.d },
                { type: "op", str: "=" },
                { type: "frac", n: r.n, d: r.d },
              ],
              16,
              "#455A64",
            );
            const resFloat = fracToFloat(s.result);
            const subStep = getCurrentStep();
            const bm =
              (subStep && subStep.benchmark) ||
              (resFloat > 0.5 ? "1/2" : "1/4");
            renderPredictionFeedback(s.prediction, resFloat, bm, 390);
          }

          renderBoardNextBtn(420);
        }

        function renderSubtractOptions(s, cd, y) {
          const correct = subtractCorrectAnswer(s);
          const options = [correct];
          const base = s.result;
          const wrongA = fracSimplify(base.n + 1, base.d);
          const wrongB = fracSimplify(Math.max(0, base.n - 1), base.d);
          if (!fracEqual(wrongA, correct)) options.push(wrongA);
          if (!fracEqual(wrongB, correct) && options.length < 3)
            options.push(wrongB);
          if (options.length < 3)
            options.push(fracSimplify(base.n + 2, base.d));

          for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = options[i];
            options[i] = options[j];
            options[j] = tmp;
          }

          const optW = 110;
          const optH = 50;
          const optGap = 20;
          const totalW = options.length * optW + (options.length - 1) * optGap;
          const startX = (800 - totalW) / 2;

          for (let i = 0; i < options.length; i++) {
            const opt = options[i];
            const ox = startX + i * (optW + optGap);
            const g = svgEl("g", {
              "data-sub-answer": opt.n + "/" + opt.d,
              style: "cursor:pointer",
              class: "calc-option",
            });
            g.appendChild(
              svgEl("rect", {
                x: ox,
                y: y,
                width: optW,
                height: optH,
                fill: "#fff",
                stroke: MODE_COLORS.subtract,
                "stroke-width": "2",
                rx: "8",
                "data-sub-answer": opt.n + "/" + opt.d,
              }),
            );
            const fg = renderSvgFraction(
              g,
              ox + optW / 2,
              y + optH / 2,
              opt.n,
              opt.d,
              13,
              "#263238",
            );
            fg.setAttribute("pointer-events", "none");
            boardSvg.appendChild(g);
          }
        }

        function handleSubtractClick(e) {
          if (state.ui.animating) return;
          const s = state.subtract;
          if (s.phase === "reveal") return;

          if (s.phase === "predict") {
            const predBtn = e.target.closest("[data-predict]");
            if (!predBtn) return;
            s.prediction = predBtn.getAttribute("data-predict");
            s.phase = "solve";
            renderSubtractBoard();
            return;
          }

          const optEl = e.target.closest("[data-sub-answer]");
          if (!optEl) return;

          const parts = optEl.getAttribute("data-sub-answer").split("/");
          const chosen = {
            n: parseInt(parts[0], 10),
            d: parseInt(parts[1], 10),
          };
          const correct = subtractCorrectAnswer(s);

          state.ui.animating = true;
          if (fracEqual(chosen, correct)) {
            s.phase = "reveal";
            s.childAnswer = chosen;
            setTimeout(function () {
              state.ui.animating = false;
              renderSubtractBoard();
              onSuccess();
            }, 50);
          } else {
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            setTimeout(function () {
              state.ui.animating = false;
            }, 50);
          }
        }

        /* ═══════════════════════════════════════════
           MULTIPLY: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function multiplyCorrectAnswer(m) {
          return fracSimplify(m.product.n, m.product.d);
        }

        function renderMultiplyBoard() {
          clearEl(boardSvg);
          const m = state.multiply;

          renderStepGoal(30);

          /* prediction phase */
          if (m.phase === "predict") {
            const step = getCurrentStep();
            const benchmark =
              (step && step.benchmark) ||
              (fracToFloat(m.product) > 0.5 ? "1/2" : "1/4");
            renderSvgEquation(
              boardSvg,
              400,
              170,
              [
                { type: "frac", n: m.factorA.n, d: m.factorA.d },
                { type: "op", str: "\u00D7" },
                { type: "frac", n: m.factorB.n, d: m.factorB.d },
              ],
              14,
              "#455A64",
            );
            const qText = T("moreOrLess") + " " + benchmark + "?";
            boardSvg.appendChild(
              renderPredictionPrompt({
                x: 80,
                y: 200,
                width: 640,
                question: qText,
                optionA: "< " + benchmark,
                optionB: "> " + benchmark,
              }),
            );
            renderBoardNextBtn(420);
            return;
          }

          if (m.boardType === "fractionOf") {
            /* show factorB as a bar, then factorA portion of it */
            const stripW = 500;
            const stripH = 50;
            const startX = (800 - stripW) / 2;
            const stripY = 100;

            /* base bar: factorB of 1 whole */
            boardSvg.appendChild(
              renderStrip({
                x: startX,
                y: stripY,
                width: stripW,
                height: stripH,
                denom: m.factorB.d,
                filled: m.factorB.n,
                color: "#B0A89A",
                ghost: 0,
              }),
            );

            /* label above */
            renderSvgFraction(
              boardSvg,
              400,
              stripY - 10,
              m.factorB.n,
              m.factorB.d,
              11,
              "#78909C",
            );

            if (m.phase === "reveal") {
              /* highlight the product portion */
              const prodFrac = fracToFloat(m.product);
              const prodW = prodFrac * stripW;
              boardSvg.appendChild(
                svgEl("rect", {
                  x: startX,
                  y: stripY + 2,
                  width: prodW,
                  height: stripH - 4,
                  fill: MODE_COLORS.multiply + "55",
                  stroke: MODE_COLORS.multiply,
                  "stroke-width": "2.5",
                  rx: "3",
                }),
              );
            }

            /* equation prompt — below strip */
            renderSvgEquation(
              boardSvg,
              400,
              stripY + stripH + 30,
              [
                { type: "frac", n: m.factorA.n, d: m.factorA.d },
                { type: "op", str: T("of") },
                { type: "frac", n: m.factorB.n, d: m.factorB.d },
                { type: "op", str: "= ?" },
              ],
              14,
              "#455A64",
            );

            if (m.phase === "solve") {
              renderMultiplyOptions(m, 260);
            }
          } else if (m.boardType === "repeatPiece") {
            /* show factorA copies of a factorB strip */
            const copies = m.factorA.n;
            const pieceW = Math.min(150, (700 - (copies - 1) * 10) / copies);
            const pieceH = 45;
            const totalW = copies * pieceW + (copies - 1) * 10;
            const startX = (800 - totalW) / 2;
            const pieceY = 100;

            for (let i = 0; i < copies; i++) {
              const px = startX + i * (pieceW + 10);
              const filled = m.phase === "reveal" || i === 0;
              boardSvg.appendChild(
                renderStrip({
                  x: px,
                  y: pieceY,
                  width: pieceW,
                  height: pieceH,
                  denom: m.factorB.d,
                  filled: filled ? m.factorB.n : 0,
                  color: filled ? MODE_COLORS.multiply : "#CFD8DC",
                  ghost: 0,
                }),
              );
              if (i < copies - 1) {
                const plus = svgEl("text", {
                  x: px + pieceW + 5,
                  y: pieceY + pieceH / 2 + 2,
                  "text-anchor": "middle",
                  "dominant-baseline": "middle",
                  "font-family": "'Share Tech Mono', monospace",
                  "font-size": "16",
                  fill: "#90A4AE",
                });
                plus.textContent = "+";
                boardSvg.appendChild(plus);
              }
            }

            /* equation prompt */
            renderSvgEquation(
              boardSvg,
              400,
              200,
              [
                { type: "op", str: copies + " \u00D7" },
                { type: "frac", n: m.factorB.n, d: m.factorB.d },
                { type: "op", str: "= ?" },
              ],
              14,
              "#455A64",
            );

            if (m.phase === "solve") {
              renderMultiplyOptions(m, 260);
            }
          } else if (m.boardType === "areaQuilt") {
            /* area grid model */
            const rows = m.factorA.d;
            const cols = m.factorB.d;
            const shadedRows = m.factorA.n;
            const shadedCols = m.factorB.n;
            const gridSize = Math.min(260, 50 * Math.max(rows, cols));
            const gridX = (800 - gridSize) / 2;
            const gridY = 85;

            boardSvg.appendChild(
              renderAreaGrid({
                x: gridX,
                y: gridY,
                width: gridSize,
                height: gridSize,
                rows: rows,
                cols: cols,
                shadedRows: shadedRows,
                shadedCols: shadedCols,
              }),
            );

            if (m.phase === "reveal") {
              boardSvg.appendChild(
                renderAreaOverlap({
                  x: gridX,
                  y: gridY,
                  cellW: gridSize / cols,
                  cellH: gridSize / rows,
                  shadedRows: shadedRows,
                  shadedCols: shadedCols,
                  color: "rgba(57,73,171,0.7)",
                }),
              );
            }

            if (m.phase === "solve") {
              renderMultiplyOptions(m, gridY + gridSize + 40);
            }
          } else if (m.boardType === "scaleMachine") {
            /* scale machine: show original strip and scaled result */
            const origW = 500;
            const origH = 40;
            const origX = (800 - origW) / 2;
            const origY = 90;
            const scaledW = origW * fracToFloat(m.product);
            const scaledX = (800 - scaledW) / 2;
            const scaledY = 210;

            /* original strip — factorB */
            boardSvg.appendChild(
              renderStrip({
                x: origX,
                y: origY,
                width: origW,
                height: origH,
                denom: m.factorB.d,
                filled: m.factorB.n,
                color: "#B0A89A",
                ghost: 0,
              }),
            );
            renderSvgFraction(
              boardSvg,
              400,
              origY - 10,
              m.factorB.n,
              m.factorB.d,
              11,
              "#455A64",
            );

            /* scale arrow */
            const arrowY = origY + origH + 20;
            boardSvg.appendChild(
              svgEl("line", {
                x1: 400,
                y1: arrowY,
                x2: 400,
                y2: scaledY - 10,
                stroke: MODE_COLORS.multiply,
                "stroke-width": "2",

            const scMidY = (arrowY + scaledY) / 2;

              x: 425,
              y: scMidY,
              "text-anchor": "middle",

            renderSvgFraction(
              boardSvg,

              scMidY,
              m.factorA.n,
              m.factorA.d,
              11,
              MODE_COLORS.multiply,
            );

            /* scaled result strip — fully filled, width IS the product */
            if (m.phase === "reveal") {
              boardSvg.appendChild(
                svgEl("rect", {
                  x: scaledX,
                  y: scaledY,
                  width: Math.max(20, scaledW),
                  height: origH,

                "font-weight": "600",
                fill: "#B0A89A",

              qMark.textContent = "?";
              boardSvg.appendChild(qMark);

            if (m.phase === "solve") {
              renderMultiplyOptions(m, 310);
            }
          }

          if (m.phase === "reveal") {
            const r = fracSimplify(m.product.n, m.product.d);
            const mulEqY =
              m.boardType === "areaQuilt"
                ? 420
                : m.boardType === "scaleMachine"
                  ? 390
                  : 340;
            renderSvgEquation(
              boardSvg,
              400,
              mulEqY,
              [
                { type: "frac", n: m.factorA.n, d: m.factorA.d },
                { type: "op", str: "\u00D7" },
                { type: "frac", n: m.factorB.n, d: m.factorB.d },
                { type: "op", str: "=" },
                { type: "frac", n: r.n, d: r.d },
              ],
              16,
              "#455A64",
            );
            const pFloat = fracToFloat(m.product);
            const mulStep = getCurrentStep();
            const bm =
              (mulStep && mulStep.benchmark) || (pFloat > 0.5 ? "1/2" : "1/4");
            renderPredictionFeedback(
              m.prediction,
              pFloat,
              bm,
              m.boardType === "areaQuilt" ? 450 : 370,
            );
          }

          renderBoardNextBtn(440);
        }

        function renderMultiplyOptions(m, y) {
          const correct = multiplyCorrectAnswer(m);
          const options = [correct];
          const base = m.product;
          const wrongA = fracSimplify(base.n + 1, base.d);
          const wrongB = fracSimplify(Math.max(1, base.n - 1), base.d);
          if (!fracEqual(wrongA, correct)) options.push(wrongA);
          if (!fracEqual(wrongB, correct) && options.length < 3)
            options.push(wrongB);
          if (options.length < 3)
            options.push(fracSimplify(base.n + 2, base.d));

          for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = options[i];
            options[i] = options[j];
            options[j] = tmp;
          }

          const optW = 110;
          const optH = 50;
          const optGap = 20;
          const totalW = options.length * optW + (options.length - 1) * optGap;
          const startX = (800 - totalW) / 2;

          for (let i = 0; i < options.length; i++) {
            const opt = options[i];
            const ox = startX + i * (optW + optGap);
            const g = svgEl("g", {
              "data-mul-answer": opt.n + "/" + opt.d,
              style: "cursor:pointer",
              class: "calc-option",
            });
            g.appendChild(
              svgEl("rect", {
                x: ox,
                y: y,
                width: optW,
                height: optH,
                fill: "#fff",
                stroke: MODE_COLORS.multiply,
                "stroke-width": "2",
                rx: "8",
                "data-mul-answer": opt.n + "/" + opt.d,
              }),
            );
            const fg = renderSvgFraction(
              g,
              ox + optW / 2,
              y + optH / 2,
              opt.n,
              opt.d,
              13,
              "#263238",
            );
            fg.setAttribute("pointer-events", "none");
            boardSvg.appendChild(g);
          }
        }

        function handleMultiplyClick(e) {
          if (state.ui.animating) return;
          const m = state.multiply;
          if (m.phase === "reveal") return;

          if (m.phase === "predict") {
            const predBtn = e.target.closest("[data-predict]");
            if (!predBtn) return;
            m.prediction = predBtn.getAttribute("data-predict");
            m.phase = "solve";
            renderMultiplyBoard();
            return;
          }

          const optEl = e.target.closest("[data-mul-answer]");
          if (!optEl) return;

          const parts = optEl.getAttribute("data-mul-answer").split("/");
          const chosen = {
            n: parseInt(parts[0], 10),
            d: parseInt(parts[1], 10),
          };
          const correct = multiplyCorrectAnswer(m);

          state.ui.animating = true;
          if (fracEqual(chosen, correct)) {
            m.phase = "reveal";
            m.childAnswer = chosen;
            setTimeout(function () {
              state.ui.animating = false;
              renderMultiplyBoard();
              onSuccess();
            }, 50);
          } else {
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            setTimeout(function () {
              state.ui.animating = false;
            }, 50);
          }
        }

        function renderDivideOptions(dv, y) {
          const correct = divideCorrectAnswer(dv);

          const base = dv.quotient;
          const wrongA =
            base.d === 1
              ? { n: base.n + 1, d: 1 }

          const wrongB =
            base.d === 1
              ? { n: Math.max(1, base.n - 1), d: 1 }
              : fracSimplify(Math.max(1, base.n - 1), base.d);
          if (!fracEqual(wrongA, correct)) options.push(wrongA);

        function handleDivideClick(e) {
