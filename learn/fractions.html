<!doctype html>
<!--
Implementing agent workflow:
After making changes, and again before considering the job finished, run `npm run code-review -- fractions.html`.
Use it as the final review gate. It enforces the single-file HTML app policy plus HTML, CSS, JavaScript, formatting, and architecture checks.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Playground</title>
    <meta
      name="description"
      content="Fraction Playground — build, compare, match, place, and repair fractions and decimals. An interactive manipulative for children aged 7-11."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fafaf7;
        --panel: #ffffff;
        --panel-border: #e0ddd6;
        --text: #37474f;
        --text-head: #263238;
        --text-dim: #78909c;
        --text-label: #90a4ae;
        --accent: #455a64;
        --accent-light: #eceff1;
        --canvas-bg: #f5f3ee;
        --mode-build: #26a69a;
        --mode-compare: #42a5f5;
        --mode-match: #5c6bc0;
        --mode-place: #ffa726;
        --mode-repair: #ef5350;
        --mode-add: #2e7d69;
        --mode-subtract: #c62828;
        --mode-multiply: #3949ab;
        --mode-divide: #e65100;
        --mode-active: var(--mode-build);
        --success: #66bb6a;
        --error: #ef5350;
        --bar-bg: #f5f0e8;
        --bar-border: #b0a89a;
        --strip-shadow: rgba(0, 0, 0, 0.06);
      }

      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #fafaf7 0%, #f0ede6 100%);
        font-family: "Outfit", sans-serif;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }

      header {
        padding: 6px 28px 5px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-text {
        flex: 1;
        min-width: 0;
      }

      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-head);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      header h1 a {
        color: inherit;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      header h1 a:hover {
        opacity: 0.7;
      }

      .header-emoji {
        font-size: 18px;
        line-height: 1;
      }

      header p {
        margin-top: 1px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .lang-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .main {
        display: flex;
        height: calc(100vh - 46px);
      }

      .play-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--canvas-bg);
        border-right: 1px solid var(--panel-border);
      }

      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--panel-border);
        background: var(--panel);
      }

      .tb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .mode-btn {
        padding: 10px 18px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .mode-btn:hover {
        background: #f0ede6;
      }

      .mode-btn.active {
        color: #fff;
        border-color: transparent;
      }

      .mode-btn[data-mode="build"].active {
        background: var(--mode-build);
      }

      .mode-btn[data-mode="compare"].active {
        background: var(--mode-compare);
      }

      .mode-btn[data-mode="match"].active {
        background: var(--mode-match);
      }

      .mode-btn[data-mode="place"].active {
        background: var(--mode-place);
        color: var(--text-head);
      }

      .mode-btn[data-mode="repair"].active {
        background: var(--mode-repair);
      }

      .mode-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .mode-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .family-toggle {
        display: flex;
        border: 1.5px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .family-btn {
        padding: 8px 20px;
        border: none;
        background: #fafaf7;
        color: #546e7a;
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .family-btn:hover {
        background: #f0ede6;
      }

      .family-btn.active {
        background: var(--accent);
        color: #fff;
      }

      .family-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }

      .mode-btn[data-mode="add"].active {
        background: var(--mode-add);
      }

      .mode-btn[data-mode="subtract"].active {
        background: var(--mode-subtract);
      }

      .mode-btn[data-mode="multiply"].active {
        background: var(--mode-multiply);
      }

      .mode-btn[data-mode="divide"].active {
        background: var(--mode-divide);
        color: var(--text-head);
      }

      .level-btn {
        width: 36px;
        height: 36px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: #fafaf7;
        color: #546e7a;
        font-family: "Share Tech Mono", monospace;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        touch-action: manipulation;
        padding: 0;
      }

      .level-btn:hover {
        background: #f0ede6;
      }

      .level-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent);
      }

      .level-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .tb-sep {
        width: 1px;
        height: 24px;
        background: var(--panel-border);
        align-self: center;
        margin: 0 6px;
      }

      .action-btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        white-space: nowrap;
      }

      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .action-btn:disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .action-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .board-stage {
        flex: 1;
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .board-stage svg {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .panel {
        width: 300px;
        flex-shrink: 0;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .panel-section {
        padding: 16px 20px;
        border-bottom: 1px solid var(--panel-border);
      }

      .panel-section:last-child {
        border-bottom: none;
      }

      .panel-section.flex-fill {
        flex: 1;
      }

      .section-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-label);
        margin-bottom: 6px;
      }

      .frac-display {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 0;
      }

      .frac-stack {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
      }

      .frac-numer,
      .frac-denom {
        font-family: "Share Tech Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-head);
        line-height: 1.2;
        min-width: 36px;
        text-align: center;
      }

      .frac-line {
        width: 100%;
        min-width: 36px;
        height: 3px;
        background: var(--text-head);
        border-radius: 2px;
      }

      .frac-whole {
        font-family: "Share Tech Mono", monospace;
        font-size: 30px;
        font-weight: 700;
        color: var(--text-head);
        margin-right: 6px;
        align-self: center;
      }

      .frac-decimal {
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-dim);
        margin-left: 14px;
        align-self: center;
      }

      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 2px 0;
      }

      .readout-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
      }

      .readout-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-head);
      }

      .readout-val.dim {
        color: var(--text-dim);
        font-weight: 400;
      }

      .progress-bar {
        height: 5px;
        background: var(--accent-light);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 8px;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--mode-active);
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .progress-label {
        margin-top: 4px;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: var(--text-label);
      }

      .hint-text {
        font-size: 12px;
        color: #546e7a;
        line-height: 1.5;
        min-height: 18px;
        margin-top: 6px;
      }

      .hint-text.success {
        color: var(--success);
        font-weight: 600;
      }

      .hint-text.error {
        color: var(--error);
      }

      .mode-summary {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .explore-ctrls {
        display: none;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }

      .explore-ctrls.visible {
        display: flex;
      }

      .stepper-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .stepper-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-label);
        min-width: 90px;
      }

      .step-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        touch-action: manipulation;
      }

      .step-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .step-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .stepper-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-head);
        min-width: 28px;
        text-align: center;
      }

      .eq-btn {
        display: none;
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 24px;
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-head);
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        z-index: 2;
      }

      .eq-btn.visible {
        display: block;
      }

      .eq-btn:hover {
        border-color: var(--mode-compare);
        background: #e3f2fd;
      }

      .eq-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .bottom-bar {
        text-align: center;
        padding: 4px 20px;
        border-top: 1px solid var(--panel-border);
      }

      .status-text {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        color: var(--text-dim);
      }

      @keyframes success-pulse {
        0% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.1) drop-shadow(0 0 8px rgba(102, 187, 106, 0.6));
        }
        100% {
          filter: brightness(1);
        }
      }

      .success-pulse {
        animation: success-pulse 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
      }

      .overlay-emoji {
        font-size: 72px;
        animation: overlayPop 0.4s ease;
      }

      .overlay-msg {
        font-family: "Outfit", sans-serif;
        font-size: 22px;
        font-weight: 700;
        margin-top: 16px;
        color: #fff;
        text-align: center;
        max-width: 400px;
        padding: 0 20px;
      }

      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.5);
      }

      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes overlayPop {
        0% {
          transform: scale(0.3);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: calc(100vh - 46px);
        }

        .play-area {
          min-height: 360px;
          height: 58vh;
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
        }

        .panel {
          width: 100%;
        }

        .toolbar {
          padding: 6px 8px;
          gap: 4px;
        }

        .mode-btn {
          padding: 7px 10px;
          font-size: 12px;
        }

        .family-btn {
          padding: 6px 12px;
          font-size: 12px;
        }

        .level-btn {
          width: 30px;
          height: 30px;
          font-size: 13px;
        }
      }

      @media (max-width: 500px) {
        .toolbar {
          padding: 4px 4px;
          gap: 3px;
        }

        .tb-row {
          gap: 3px;
        }

        .mode-btn {
          padding: 6px 7px;
          font-size: 11px;
        }

        .family-btn {
          padding: 5px 10px;
          font-size: 11px;
        }

        .level-btn {
          width: 28px;
          height: 28px;
          font-size: 12px;
        }

        .action-btn {
          padding: 5px 8px;
          font-size: 11px;
        }

        .tb-sep {
          margin: 0 3px;
        }

        .board-stage {
          min-height: 300px;
        }

        .panel {
          font-size: 13px;
        }
      }

      /* SVG board hover states */
      .calc-option:hover rect {
        filter: brightness(0.97);
        stroke-width: 3;
      }

      .calc-option:hover {
        transform: translateY(-2px);
      }

      @media (pointer: coarse) {
        .mode-btn {
          min-height: 42px;
        }

        .level-btn {
          min-width: 40px;
          min-height: 40px;
        }

        .step-btn {
          width: 36px;
          height: 36px;
        }

        /* Larger touch targets for SVG board elements */
        .calc-option rect {
          stroke-width: 2.5;
        }

        .eq-btn {
          min-height: 48px;
          padding: 12px 28px;
          font-size: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .success-pulse {
          animation: none;
        }

        .progress-fill {
          transition: none;
        }

        .result-overlay {
          animation: none;
        }

        .overlay-emoji {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/" aria-label="Back to Learn"
            ><span class="header-emoji">&#x1F9E9;</span></a
          >
          <span id="titleText">Fraction Playground</span>
        </h1>
        <p id="subtitleText">
          Represent and calculate with fractions and decimals.
        </p>
      </div>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="play-area">
        <div class="toolbar">
          <div class="tb-row" id="familyRow">
            <div class="family-toggle">
              <button
                type="button"
                class="family-btn active"
                data-family="represent"
              >
                Represent
              </button>
              <button type="button" class="family-btn" data-family="calculate">
                Calculate
              </button>
            </div>
          </div>
          <div class="tb-row" id="modeRow">
            <!-- populated dynamically by renderModeButtons() -->
          </div>
          <div class="tb-row" id="levelRow">
            <button type="button" class="level-btn active" data-level="1">
              1
            </button>
            <button type="button" class="level-btn" data-level="2">2</button>
            <button type="button" class="level-btn" data-level="3">3</button>
            <button type="button" class="level-btn" data-level="4">4</button>
            <button type="button" class="level-btn" data-level="5">5</button>
            <div class="tb-sep"></div>
            <button type="button" class="action-btn" id="exploreBtn">
              Explore
            </button>
            <button type="button" class="action-btn" id="hintBtn">Hint</button>
            <button
              type="button"
              class="action-btn"
              id="nextBtn"
              aria-label="Next round"
            >
              Next
            </button>
          </div>
        </div>

        <div class="board-stage">
          <svg
            id="boardSvg"
            viewBox="0 0 800 500"
            preserveAspectRatio="xMidYMid meet"
            aria-label="Fraction activity board"
          ></svg>
          <button
            type="button"
            class="eq-btn"
            id="eqBtn"
            aria-label="Values are equal"
          >
            = Equal
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-section">
          <div class="section-label" id="lblActivity">Activity</div>
          <div class="mode-summary" id="modeSummary"></div>
        </div>

        <div class="panel-section">
          <div class="section-label" id="lblValue">Value</div>
          <div class="frac-display" id="fracDisplay">
            <span class="frac-whole" id="fracWhole"></span>
            <span class="frac-stack">
              <span class="frac-numer" id="fracNumer">0</span>
              <span class="frac-line"></span>
              <span class="frac-denom" id="fracDenom">2</span>
            </span>
            <span class="frac-decimal" id="fracDecimal"></span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblSimplified">Simplified</span>
            <span class="readout-val" id="rdSimplified">0</span>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-label" id="lblProgress">Progress</div>
          <div class="hint-text" id="hintText"></div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0 / 6</div>
          <div class="explore-ctrls" id="exploreCtrls">
            <div class="stepper-row">
              <span class="stepper-label" id="lblDenom">Denominator</span>
              <button
                type="button"
                class="step-btn"
                id="denomMinus"
                aria-label="Decrease denominator"
              >
                &minus;
              </button>
              <span class="stepper-val" id="denomVal">2</span>
              <button
                type="button"
                class="step-btn"
                id="denomPlus"
                aria-label="Increase denominator"
              >
                +
              </button>
            </div>
            <div class="stepper-row">
              <span class="stepper-label" id="lblNumer">Numerator</span>
              <button
                type="button"
                class="step-btn"
                id="numerMinus"
                aria-label="Decrease numerator"
              >
                &minus;
              </button>
              <span class="stepper-val" id="numerVal">0</span>
              <button
                type="button"
                class="step-btn"
                id="numerPlus"
                aria-label="Increase numerator"

        function gcd(a, b) {
          a = Math.abs(a);
          b = Math.abs(b);
          while (b) {
            const t = b;
            b = a % b;
            a = t;
          }
          return a;
        }

        function fracSimplify(n, d) {
          if (d === 0) return { n: 0, d: 1 };
          if (n === 0) return { n: 0, d: 1 };
          const g = gcd(Math.abs(n), Math.abs(d));
          return { n: n / g, d: d / g };
        }

        function fracEqual(a, b) {
          return a.n * b.d === b.n * a.d;
        }

        function fracCompare(a, b) {
          const lhs = a.n * b.d;
          const rhs = b.n * a.d;
          if (lhs < rhs) return -1;
          if (lhs > rhs) return 1;
          return 0;
        }

        function fracToFloat(f) {
          if (f.d === 0) return 0;
          return f.n / f.d;
        }

        function fracIsFriendlyDecimal(d) {
          let r = d;
          while (r % 2 === 0) r /= 2;
          while (r % 5 === 0) r /= 5;
          return r === 1;
        }

        function fracToDecimalStr(n, d) {
          if (d === 0) return "0";
          const s = fracSimplify(n, d);
          if (!fracIsFriendlyDecimal(s.d)) return null;
          const val = n / d;
          if (Number.isInteger(val)) return val.toString();
          let str = val.toFixed(4);
          str = str.replace(/0+$/, "");
          if (str.endsWith(".")) str = str.slice(0, -1);
          return str;
        }

        function formatDecimal(n, d) {
          const str = fracToDecimalStr(n, d);
          if (!str) return null;
          if (state.lang === "pl") return str.replace(".", ",");
          return str;
        }

        function fracToMixed(n, d) {
          if (d === 0) return { whole: 0, n: 0, d: 1 };
          const whole = Math.floor(n / d);
          const rem = n - whole * d;
          return { whole, n: rem, d };
        }

        function fracFormat(n, d) {
          return n + "/" + d;
        }

        function _fracFormatMixed(n, d) {
          const m = fracToMixed(n, d);
          if (m.whole === 0) return fracFormat(n, d);
          if (m.n === 0) return m.whole.toString();
          return m.whole + " " + m.n + "/" + m.d;
        }

        function fracLCM(dA, dB) {
          return (dA * dB) / gcd(dA, dB);

          const lcd = fracLCM(a.d, b.d);
          return {

            b: { n: b.n * (lcd / b.d), d: lcd },
          };
        }

          const c = fracToCommonDenom(a, b);
          return fracSimplify(c.a.n + c.b.n, c.a.d);

          const c = fracToCommonDenom(a, b);
          return fracSimplify(c.a.n - c.b.n, c.a.d);
        }

        function _fracMultiply(a, b) {
          return fracSimplify(a.n * b.n, a.d * b.d);
        }

          return fracSimplify(a.n * b.d, a.d * b.n);

          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            onFrame(1);
            if (onComplete) onComplete();
            return;
          }
          const start = performance.now();
          function frame(now) {
            const elapsed = now - start;
            const t = Math.min(1, elapsed / duration);
            onFrame(easeOutCubic(t));
            if (t < 1) {
              requestAnimationFrame(frame);
            } else {
              if (onComplete) onComplete();
            }
          }
          requestAnimationFrame(frame);
        }

            svgEl("rect", {
              x,
              y,
              width,
              height,
              fill: "#F5F0E8",
              rx: "5",
              ry: "5",
              filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.06))",
            }),
          );

          if (ghost > 0) {
            for (let i = 0; i < ghost; i++) {
              g.appendChild(
                svgEl("rect", {
                  x: x + i * segW + 1,
                  y: y + 1,
                  width: segW - 2,
                  height: height - 2,
                  fill: ghostColor || "#CFD8DC",
                  opacity: "0.25",
                  rx: "3",
                }),
              );
            }
          }

          for (let i = 0; i < denom; i++) {
            if (i < filled) {
              g.appendChild(
                svgEl("rect", {
                  x: x + i * segW + 1,
                  y: y + 1,
                  width: segW - 2,
                  height: height - 2,
                  fill: color || MODE_COLORS[state.activity],
                  opacity: "0.65",
                  rx: "3",
                  "data-seg": i,
                  class: "strip-seg",
                  style: "cursor:pointer",
                }),
              );
            } else {
              g.appendChild(
                svgEl("rect", {
                  x: x + i * segW + 1,
                  y: y + 1,
                  width: segW - 2,
                  height: height - 2,
                  fill: "transparent",
                  "data-seg": i,
                  class: "strip-seg",
                  style: "cursor:pointer",
                }),
              );
            }
          }

          for (let i = 1; i < denom; i++) {
            const isWholeBoundary =
              opts.wholeSize && opts.wholeSize > 0 && i % opts.wholeSize === 0;
            g.appendChild(
              svgEl("line", {
                x1: x + i * segW,
                y1: y,
                x2: x + i * segW,
                y2: y + height,
                stroke: isWholeBoundary ? "#455A64" : "#B0A89A",
                "stroke-width": isWholeBoundary ? "2.5" : "1",
                "stroke-opacity": isWholeBoundary ? "1" : "0.6",
              }),
            );
          }

          g.appendChild(
            svgEl("rect", {
              x,
              y,
              width,
              height,
              fill: "none",
              stroke: opts.borderColor || "#78909C",
              "stroke-width": opts.borderColor ? "3" : "2",
              rx: "5",
              ry: "5",
            }),
          );

          return g;
        }

        function renderCircleModel(opts) {
          const { cx, cy, r, denom, filledSegs, color } = opts;
          const g = svgEl("g", {});

          g.appendChild(
            svgEl("circle", {
              cx,
              cy,
              r,
              fill: "#F5F0E8",
              stroke: "#78909C",
              "stroke-width": "2",
            }),
          );

          for (let s = 0; s < denom; s++) {
            const a1 = (s / denom) * Math.PI * 2 - Math.PI / 2;
            const a2 = ((s + 1) / denom) * Math.PI * 2 - Math.PI / 2;
            const x1 = cx + r * Math.cos(a1);
            const y1 = cy + r * Math.sin(a1);
            const x2 = cx + r * Math.cos(a2);
            const y2 = cy + r * Math.sin(a2);
            const large = a2 - a1 > Math.PI ? 1 : 0;
            const isFilled = filledSegs && filledSegs[s];
            const pathD =
              "M " +
              cx +
              " " +
              cy +
              " L " +
              x1 +
              " " +
              y1 +
              " A " +
              r +
              " " +
              r +
              " 0 " +
              large +
              " 1 " +
              x2 +
              " " +
              y2 +
              " Z";
            g.appendChild(
              svgEl("path", {
                d: pathD,
                fill: isFilled ? color || "#26A69A" : "#EDE8DF",
                opacity: isFilled ? "0.6" : "1",
                "data-seg": s,
                class: "strip-seg",
                style: "cursor:pointer",
                "pointer-events": "all",
              }),
            );
          }

          for (let i = 0; i < denom; i++) {
            const angle = (i / denom) * Math.PI * 2 - Math.PI / 2;
            g.appendChild(
              svgEl("line", {
                x1: cx,
                y1: cy,
                x2: cx + r * Math.cos(angle),
                y2: cy + r * Math.sin(angle),
                stroke: "#B0A89A",
                "stroke-width": "1",
                "stroke-opacity": "0.6",
              }),
            );
          }

          g.appendChild(
            svgEl("circle", {
              cx,
              cy,
              r,
              fill: "none",
              stroke: opts.borderColor || "#78909C",
              "stroke-width": "2",
            }),
          );

          return g;
        }

        function renderNumberLine(opts) {
          const { x, y, width, nlMax, denom, markers, benchmarks } = opts;
          const g = svgEl("g", {});

          g.appendChild(
            svgEl("line", {
              x1: x,
              y1: y,
              x2: x + width,
              y2: y,
              stroke: "#B0BEC5",
              "stroke-width": "2",
              "stroke-linecap": "round",
            }),
          );

          const bmarks = benchmarks || [];
          for (let i = 0; i < bmarks.length; i++) {
            const bx = x + (bmarks[i] / nlMax) * width;
            g.appendChild(
              svgEl("line", {
                x1: bx,
                y1: y - 8,
                x2: bx,
                y2: y + 8,
                stroke: "#546E7A",
                "stroke-width": "2",
              }),
            );
            const lbl = svgEl("text", {
              x: bx,
              y: y + 24,
              "text-anchor": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "14",
              fill: "#78909C",
            });
            lbl.textContent =
              bmarks[i] === 0.5
                ? "\u00BD"
                : bmarks[i] === 1.5
                  ? "1\u00BD"
                  : bmarks[i] === 2.5
                    ? "2\u00BD"
                    : bmarks[i].toString();
            g.appendChild(lbl);
          }

          const totalTicks = denom * nlMax;
          for (let i = 0; i <= totalTicks; i++) {
            const val = i / denom;
            let isBench = false;
            for (let b = 0; b < bmarks.length; b++) {
              if (Math.abs(val - bmarks[b]) < 0.001) {
                isBench = true;
                break;
              }
            }
            if (isBench) continue;
            const tx = x + (val / nlMax) * width;
            g.appendChild(
              svgEl("line", {
                x1: tx,
                y1: y - 5,
                x2: tx,
                y2: y + 5,
                stroke: "#90A4AE",
                "stroke-width": "1.5",
              }),
            );
          }

          if (markers) {
            for (let m = 0; m < markers.length; m++) {
              const mk = markers[m];
              const mx = x + (fracToFloat(mk.value) / nlMax) * width;
              g.appendChild(
                svgEl("circle", {
                  cx: mx,
                  cy: y,
                  r: mk.ghost ? "7" : "9",
                  fill: mk.ghost
                    ? "#CFD8DC"
                    : mk.color || MODE_COLORS[state.activity],
                  stroke: "#fff",
                  "stroke-width": "2",
                  opacity: mk.ghost ? "0.5" : "1",
                }),
              );
            }
          }

          return g;
        }

        /*
         * renderSvgFraction — measurement-based SVG fraction display.
         *
         * Renders numerator / denominator as stacked text with a
         * horizontal vinculum (fraction bar), sized from actual
         * getBBox() measurements so the line always fits the digits.
         *
         * Handles: 0, whole numbers (3), proper fractions (3/4),
         * improper fractions (7/4), and mixed numbers (1 3/4).
         *
         * Strategy:
         *  1. Append a staging group to the SVG so getBBox() works.
         *  2. Render numerator and denominator text at origin.
         *  3. Measure their actual pixel widths.
         *  4. Size the vinculum to the wider of the two + padding.
         *  5. For mixed numbers, measure the whole-part text too.
         *  6. Reposition all elements centred on (cx, cy).
         */
        function renderSvgFraction(parent, cx, cy, n, d, size, color) {
          const fs = size || 24;
          const clr = color || "#263238";
          const pad = fs * 0.25;
          const lineGap = fs * 0.12;
          const lineThick = Math.max(2, Math.round(fs * 0.09));
          const font = "'Share Tech Mono', monospace";
          const m = fracToMixed(n, d);

          const g = svgEl("g", {});
          const needsTempAttach =
            !parent.ownerSVGElement && parent !== boardSvg;
          if (needsTempAttach) boardSvg.appendChild(parent);
          parent.appendChild(g);

          /* ── Case: value is exactly zero ── */
          if (n === 0) {
            const z = svgEl("text", {
              x: cx,
              y: cy,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs,
              "font-weight": "bold",
              fill: clr,
            });
            z.textContent = "0";
            g.appendChild(z);
            return g;
          }

          /* ── Case: whole number with no remainder ── */
          if (m.whole > 0 && m.n === 0) {
            const wt = svgEl("text", {
              x: cx,
              y: cy,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs * 1.15,
              "font-weight": "bold",
              fill: clr,
            });
            wt.textContent = m.whole;
            g.appendChild(wt);
            return g;
          }

          /* ── Fraction part (proper, improper, or remainder of mixed) ── */
          const showN = m.whole > 0 ? m.n : n;
          const showD = d;

          /* Create text elements at (0,0) for measuring */
          const numEl = svgEl("text", {
            x: 0,
            y: 0,
            "text-anchor": "middle",
            "font-family": font,
            "font-size": fs,
            "font-weight": "bold",
            fill: clr,
          });
          numEl.textContent = showN;
          g.appendChild(numEl);

          const denEl = svgEl("text", {
            x: 0,
            y: 0,
            "text-anchor": "middle",
            "font-family": font,
            "font-size": fs,
            "font-weight": "bold",
            fill: clr,
          });
          denEl.textContent = showD;
          g.appendChild(denEl);

          /* Measure actual rendered widths */
          const numW = numEl.getBBox().width;
          const denW = denEl.getBBox().width;
          const fracW = Math.max(numW, denW);
          const lineW = fracW + pad;

          /* Whole-part measurement (if mixed) */
          let wholeW = 0;
          let wholeEl = null;
          if (m.whole > 0) {
            wholeEl = svgEl("text", {
              x: 0,
              y: 0,
              "text-anchor": "middle",
              "dominant-baseline": "central",
              "font-family": font,
              "font-size": fs * 1.15,
              "font-weight": "bold",
              fill: clr,
            });
            wholeEl.textContent = m.whole;
            g.appendChild(wholeEl);
            wholeW = wholeEl.getBBox().width;
          }

          /* ── Layout: compute final positions ── */
          const gap = m.whole > 0 ? fs * 0.25 : 0;
          const totalW = (m.whole > 0 ? wholeW + gap : 0) + lineW;
          const leftEdge = cx - totalW / 2;

          /* Position whole number */
          if (wholeEl) {
            wholeEl.setAttribute("x", leftEdge + wholeW / 2);
            wholeEl.setAttribute("y", cy);
          }

          /* Fraction centre x */
          const fracCx = m.whole > 0 ? leftEdge + wholeW + gap + lineW / 2 : cx;

          /* Position numerator above vinculum */
          numEl.setAttribute("x", fracCx);
          numEl.setAttribute("y", cy - lineGap - lineThick / 2 - fs * 0.15);

          /* Vinculum */
          g.appendChild(
            svgEl("line", {
              x1: fracCx - lineW / 2,
              y1: cy,
              x2: fracCx + lineW / 2,
              y2: cy,
              stroke: clr,
              "stroke-width": lineThick,
              "stroke-linecap": "round",
            }),
          );

          /* Position denominator below vinculum */
          denEl.setAttribute("x", fracCx);
          denEl.setAttribute("y", cy + lineGap + lineThick / 2 + fs * 0.72);

          if (needsTempAttach) boardSvg.removeChild(parent);

          return g;
        }

        function renderSvgEquation(parent, cx, cy, parts, size, color) {
          const fs = size || 16;
          const clr = color || "#263238";
          const gap = fs * 0.6;

          /*
           * Two-pass layout: render into a temp group at x=0,
           * measure actual widths with getBBox, then translate
           * the group to center at cx.
           */
          const g = svgEl("g", { "pointer-events": "none" });
          parent.appendChild(g);

          /* Pass 1: render left-to-right from x=0 */
          let curX = 0;
          const slots = [];
          for (let i = 0; i < parts.length; i++) {
            const p = parts[i];
            if (i > 0) curX += gap;
            const slotStart = curX;
            if (p.type === "frac") {
              /* render fraction into a sub-group so we can measure it */
              const sub = svgEl("g", {});
              g.appendChild(sub);
              renderSvgFraction(sub, 0, 0, p.n, p.d, fs, clr);
              /* measure actual width */
              const bb = sub.getBBox();
              /* reposition so the sub-group's left edge is at curX */
              sub.setAttribute(
                "transform",
                "translate(" +
                  (curX - bb.x) +
                  "," +
                  (cy - (bb.y + bb.height / 2)) +
                  ")",
              );
              curX += bb.width;
              slots.push({ x: slotStart, w: bb.width });
            } else {
              const t = svgEl("text", {
                x: curX,
                y: cy,
                "text-anchor": "start",
                "dominant-baseline": "central",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": fs,
                "font-weight": "bold",
                fill: clr,
              });
              t.textContent = p.str;
              g.appendChild(t);
              const tb = t.getBBox();
              curX += tb.width;
              slots.push({ x: slotStart, w: tb.width });
            }
          }

          /* Pass 2: center the whole group at cx */
          const totalW = curX;
          g.setAttribute("transform", "translate(" + (cx - totalW / 2) + ",0)");
        }

        function renderFractionCard(opts) {
          const { x, y, width, height, value, color, label } = opts;
          const g = svgEl("g", { style: "cursor:pointer", class: "frac-card" });

          g.appendChild(
            svgEl("rect", {
              x: x + 2,
              y: y + 2,
              width,
              height,
              fill: "rgba(0,0,0,0.05)",
              rx: "10",
            }),
          );

          g.appendChild(
            svgEl("rect", {
              x,
              y,
              width,
              height,
              fill: "#fff",
              stroke: color || "#CFD8DC",
              "stroke-width": "2.5",
              rx: "10",
            }),
          );

          if (label) {
            const lbl = svgEl("text", {
              x: x + width / 2,
              y: y + height / 2 + 2,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": label.length > 5 ? "22" : "28",
              "font-weight": "bold",
              fill: color || "#263238",
            });
            lbl.textContent = label;
            g.appendChild(lbl);
          } else {
            const mx = fracToMixed(value.n, value.d);
            const isMixed = mx.whole > 0 && mx.n > 0;
            const fracSz = isMixed
              ? Math.min(20, height * 0.2)
              : Math.min(28, height * 0.25);
            renderSvgFraction(
              g,
              x + width / 2,
              y + height / 2,
              value.n,
              value.d,
              fracSz,
              color || "#263238",
            );
          }

          return g;
        }

        function renderBoardNextBtn(y) {
          const showForReveal =
            state.activity === "compare" && state.compare.phase === "reveal";
          if (!state.ui.stepComplete && !showForReveal) return;
          /* Ensure breathing room: button (height 40) stays ≥12px
             from the bottom of the viewBox (500 or 600) */
          const vbH = boardSvg.viewBox.baseVal.height || 500;
          const maxY = vbH - 40 - 12;
          const btnY = Math.min(y || maxY, maxY);
          const nextG = svgEl("g", {
            style: "cursor:pointer",
            class: "board-next-btn",
          });
          nextG.appendChild(
            svgEl("rect", {
              x: 320,
              y: btnY,
              width: 160,
              height: 40,
              fill: MODE_COLORS[state.activity] || "#455A64",
              rx: "10",
            }),
          );
          const nextLbl = svgEl("text", {
            x: 400,
            y: btnY + 22,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#fff",
            "pointer-events": "none",
          });
          nextLbl.textContent =
            state.lang === "pl" ? "Dalej \u2192" : "Next \u2192";
          nextG.appendChild(nextLbl);
          boardSvg.appendChild(nextG);
        }

        function renderStepGoal(mainY) {
          const step = getCurrentStep();
          const goalStr = stepText(step, "goal");
          if (!goalStr) return;
          const gy = (mainY || 40) + 35;
          /* Parse fractions like "1/4" or "3/8" and render canonically */
          const fracRe = /(\d+)\/(\d+)/g;
          const parts = [];
          let last = 0;
          let m;
          while ((m = fracRe.exec(goalStr)) !== null) {
            if (m.index > last) {
              parts.push({ type: "text", str: goalStr.slice(last, m.index) });
            }
            parts.push({
              type: "frac",
              n: parseInt(m[1], 10),
              d: parseInt(m[2], 10),
            });
            last = m.index + m[0].length;
          }
          if (last < goalStr.length) {
            parts.push({ type: "text", str: goalStr.slice(last) });
          }
          /* If no fractions found, render as plain text */
          if (parts.length <= 1 && parts[0] && parts[0].type === "text") {
            const goalEl = svgEl("text", {
              x: 400,
              y: gy,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "13",
              fill: "#90A4AE",
            });
            goalEl.textContent = goalStr;
            boardSvg.appendChild(goalEl);
            return;
          }
          /* Mixed layout: render into a group, measure, center */
          renderSvgEquation(boardSvg, 400, gy, parts, 10, "#90A4AE");
        }

        function nlBenchmarks(nlMax) {
          const b = [0];
          if (nlMax >= 1) b.push(1);
          if (nlMax >= 2) b.push(0.5, 2);
          if (nlMax >= 3) b.push(1.5, 2.5, 3);
          return b.sort((a, c) => a - c);
        }

        /* ═══════════════════════════════════════════
           CALCULATION PRIMITIVES
           ═══════════════════════════════════════════ */

        /**
         * renderStripEquation — A op B = C as strips
         * opts: { x, y, width, height, opA:{n,d}, opB:{n,d}, result:{n,d},
         *         operator:"+"|"-", showResult:bool, commonDenom:number|null,
         *         color:string, resultColor:string }
         */
        function renderStripEquation(opts) {
          const g = svgEl("g", {});
          const stripH = opts.height || 40;
          const gap = 12;
          const opSymW = 30;
          const eqSymW = 30;
          const cd = opts.commonDenom || fracLCM(opts.opA.d, opts.opB.d);
          const aN = opts.opA.n * (cd / opts.opA.d);
          const bN = opts.opB.n * (cd / opts.opB.d);
          /* compute max segments needed (handles improper fractions) */
          const rN = opts.result
            ? opts.result.n * (cd / opts.result.d)
            : aN + bN;
          const maxSegs = Math.max(cd, aN, bN, rN);
          const totalParts = 3;
          const stripW = (opts.width - opSymW - eqSymW - gap * 2) / totalParts;
          const color = opts.color || MODE_COLORS[state.activity] || "#26A69A";
          const resColor = opts.resultColor || "#66BB6A";
          let cx = opts.x;

          /* operand A strip */
          const ws = maxSegs > cd ? cd : 0;
          g.appendChild(
            renderStrip({
              x: cx,
              y: opts.y,
              width: stripW,
              height: stripH,
              denom: maxSegs,
              filled: aN,
              color: color,
              ghost: 0,
              wholeSize: ws,
            }),
          );
          cx += stripW + gap;

          /* operator symbol */
          const opTxt = svgEl("text", {
            x: cx + opSymW / 2,
            y: opts.y + stripH / 2 + 2,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Share Tech Mono', monospace",
            "font-size": "22",
            "font-weight": "bold",
            fill: "#455A64",
          });
          opTxt.textContent = opts.operator || "+";
          g.appendChild(opTxt);
          cx += opSymW;

          /* operand B strip */
          g.appendChild(
            renderStrip({
              x: cx,
              y: opts.y,
              width: stripW,
              height: stripH,
              denom: maxSegs,
              filled: bN,
              color: color,
              wholeSize: ws,
              ghost: 0,
            }),
          );
          cx += stripW + gap;

          /* equals symbol */
          const eqTxt = svgEl("text", {
            x: cx + eqSymW / 2,
            y: opts.y + stripH / 2 + 2,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Share Tech Mono', monospace",
            "font-size": "22",
            "font-weight": "bold",
            fill: "#455A64",
          });
          eqTxt.textContent = "=";
          g.appendChild(eqTxt);
          cx += eqSymW;

          /* result strip */
          if (opts.showResult && opts.result) {
            const rN = opts.result.n * (cd / opts.result.d);
            g.appendChild(
              renderStrip({
                x: cx,
                y: opts.y,
                width: stripW,
                height: stripH,
                denom: maxSegs,
                wholeSize: ws,
                filled: rN,
                color: resColor,
                ghost: 0,
              }),
            );
          } else {
            /* empty result placeholder */
            g.appendChild(
              svgEl("rect", {
                x: cx,
                y: opts.y,
                width: stripW,
                height: stripH,
                fill: "#f5f3ee",
                stroke: "#CFD8DC",
                "stroke-width": "1.5",
                rx: "4",
                "stroke-dasharray": "6,3",
              }),
            );
            const qMark = svgEl("text", {
              x: cx + stripW / 2,
              y: opts.y + stripH / 2 + 2,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "18",
              "font-weight": "600",
              fill: "#B0A89A",
            });
            qMark.textContent = "?";
            g.appendChild(qMark);
          }
          return g;
        }

        /**
         * renderJumpLine — number line with arc jumps
         * opts: { x, y, width, nlMax, denom, startValue:{n,d},
         *         jumps:[{size:{n,d}, color}], currentPos:{n,d}|null }
         */
        function renderJumpLine(opts) {
          const g = svgEl("g", {});
          const nl = renderNumberLine({
            x: opts.x,
            y: opts.y,
            width: opts.width,
            nlMax: opts.nlMax || 1,
            denom: opts.denom,
            markers: [],
            benchmarks: nlBenchmarks(opts.nlMax || 1),
          });
          g.appendChild(nl);

          const lineY = opts.y;
          const x0 = opts.x;
          const w = opts.width;
          const nlMax = opts.nlMax || 1;
          const toX = function (frac) {
            return x0 + (fracToFloat(frac) / nlMax) * w;
          };

          /* draw arcs for each jump */
          let pos = opts.startValue || { n: 0, d: 1 };
          const jumps = opts.jumps || [];
          for (let i = 0; i < jumps.length; i++) {
            const jump = jumps[i];
            const fromX = toX(pos);
            const nextPos = fracAdd(pos, jump.size);
            const destX = toX(nextPos);
            const arcH = 25 + i * 5;
            const path = svgEl("path", {
              d:
                "M" +
                fromX +
                "," +
                (lineY - 4) +
                " Q" +
                (fromX + destX) / 2 +
                "," +
                (lineY - arcH - 4) +
                " " +
                destX +
                "," +
                (lineY - 4),
              fill: "none",
              stroke: jump.color || MODE_COLORS.add,
              "stroke-width": "2.5",
              "stroke-linecap": "round",
            });
            g.appendChild(path);
            /* arrowhead */
            const arrow = svgEl("polygon", {
              points:
                destX -
                4 +
                "," +
                (lineY - 10) +
                " " +
                (destX + 4) +
                "," +
                (lineY - 10) +
                " " +
                destX +
                "," +
                (lineY - 4),
              fill: jump.color || MODE_COLORS.add,
            });
            g.appendChild(arrow);
            /* jump label */
            const lblX = (fromX + destX) / 2;
            const lblY = lineY - arcH - 8;
            const lblClr = jump.color || MODE_COLORS.add;
            if (jump.size.d === 1) {
              const lbl = svgEl("text", {
                x: lblX,
                y: lblY,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "11",
                "font-weight": "600",
                fill: lblClr,
              });
              lbl.textContent = "+" + jump.size.n;
              g.appendChild(lbl);
            } else {
              const plusLbl = svgEl("text", {
                x: lblX - 14,
                y: lblY,
                "text-anchor": "middle",
                "dominant-baseline": "central",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "11",
                "font-weight": "600",
                fill: lblClr,
              });
              plusLbl.textContent = "+";
              g.appendChild(plusLbl);
              renderSvgFraction(
                g,
                lblX + 4,
                lblY,
                jump.size.n,
                jump.size.d,
                8,
                lblClr,
              );
            }
            pos = nextPos;
          }

          /* start marker */
          if (opts.startValue) {
            const sx = toX(opts.startValue);
            g.appendChild(
              svgEl("circle", {
                cx: sx,
                cy: lineY,
                r: 5,
                fill: "#455A64",
              }),
            );
          }

          /* current position marker */
          if (opts.currentPos) {
            const cx = toX(opts.currentPos);
            g.appendChild(
              svgEl("circle", {
                cx: cx,
                cy: lineY,
                r: 6,
                fill: MODE_COLORS.add,
                stroke: "#fff",
                "stroke-width": "2",
              }),
            );
          }
          return g;
        }

        /**
         * renderAreaGrid — rows x cols grid for area model multiplication
         * opts: { x, y, width, height, rows, cols,
         *         shadedRows:number, shadedCols:number,
         *         rowColor, colColor, overlapColor, showLabels:bool }
         */
        function renderAreaGrid(opts) {
          const g = svgEl("g", {});
          const cellW = opts.width / opts.cols;
          const cellH = opts.height / opts.rows;
          const rowColor = opts.rowColor || "rgba(57,73,171,0.15)";
          const colColor = opts.colColor || "rgba(239,83,80,0.15)";
          const overlapColor = opts.overlapColor || "rgba(57,73,171,0.35)";

          /* outer border */
          g.appendChild(
            svgEl("rect", {
              x: opts.x,
              y: opts.y,
              width: opts.width,
              height: opts.height,
              fill: "#fff",
              stroke: "#B0A89A",
              "stroke-width": "1.5",
              rx: "2",
            }),
          );

          /* grid lines */
          for (let c = 1; c < opts.cols; c++) {
            g.appendChild(
              svgEl("line", {
                x1: opts.x + c * cellW,
                y1: opts.y,
                x2: opts.x + c * cellW,
                y2: opts.y + opts.height,
                stroke: "#CFD8DC",
                "stroke-width": "1",
              }),
            );
          }
          for (let r = 1; r < opts.rows; r++) {
            g.appendChild(
              svgEl("line", {
                x1: opts.x,
                y1: opts.y + r * cellH,
                x2: opts.x + opts.width,
                y2: opts.y + r * cellH,
                stroke: "#CFD8DC",
                "stroke-width": "1",
              }),
            );
          }

          /* shading */
          for (let r = 0; r < opts.rows; r++) {
            for (let c = 0; c < opts.cols; c++) {
              const inRow = r < (opts.shadedRows || 0);
              const inCol = c < (opts.shadedCols || 0);
              let fill = "none";
              if (inRow && inCol) fill = overlapColor;
              else if (inRow) fill = rowColor;
              else if (inCol) fill = colColor;
              if (fill !== "none") {
                g.appendChild(
                  svgEl("rect", {
                    x: opts.x + c * cellW,
                    y: opts.y + r * cellH,
                    width: cellW,
                    height: cellH,
                    fill: fill,
                  }),
                );
              }
            }
          }

          /* labels */
          if (opts.showLabels !== false) {
            renderSvgFraction(
              g,
              opts.x - 16,
              opts.y + ((opts.shadedRows || 0) * cellH) / 2,
              opts.shadedRows || 0,
              opts.rows,
              10,
              "#3949AB",
            );

            renderSvgFraction(
              g,
              opts.x + ((opts.shadedCols || 0) * cellW) / 2,
              opts.y - 10,
              opts.shadedCols || 0,
              opts.cols,
              10,
              "#C62828",
            );
          }
          return g;
        }

        /**
         * renderShareTray — equal sharing visualization for division
         * opts: { x, y, width, height, dividend:{n,d}, numShares:number,
         *         filledShares:number, color }
         */
        function renderShareTray(opts) {
          const g = svgEl("g", {});
          const color = opts.color || MODE_COLORS.divide;
          const shareW = Math.min(80, (opts.width - 20) / opts.numShares - 10);
          const shareH = opts.height * 0.4;
          const totalShareW = opts.numShares * (shareW + 10) - 10;
          const startX = opts.x + (opts.width - totalShareW) / 2;
          const sourceY = opts.y;
          const shareY = opts.y + opts.height * 0.55;

          /* source strip */
          const srcStripW = Math.min(opts.width * 0.7, 300);
          g.appendChild(
            renderStrip({
              x: opts.x + (opts.width - srcStripW) / 2,
              y: sourceY,
              width: srcStripW,
              height: 30,
              denom: opts.dividend.d,
              filled: opts.dividend.n,
              color: color,
              ghost: 0,
            }),
          );

          /* share containers */
          for (let i = 0; i < opts.numShares; i++) {
            const sx = startX + i * (shareW + 10);
            const isFilled = i < (opts.filledShares || 0);
            g.appendChild(
              svgEl("rect", {
                x: sx,
                y: shareY,
                width: shareW,
                height: shareH,
                fill: isFilled ? color + "22" : "#f5f3ee",
                stroke: isFilled ? color : "#CFD8DC",
                "stroke-width": isFilled ? "2" : "1.5",
                rx: "6",
              }),
            );
            /* share label */
            const lbl = svgEl("text", {
              x: sx + shareW / 2,
              y: shareY + shareH + 16,
              "text-anchor": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "11",
              fill: "#78909C",
            });
            lbl.textContent = (i + 1).toString();
            g.appendChild(lbl);
            /* quotient fraction inside filled share */
            if (isFilled && opts.quotient) {
              const q = fracSimplify(opts.quotient.n, opts.quotient.d);
              renderSvgFraction(
                g,
                sx + shareW / 2,
                shareY + shareH / 2,
                q.n,
                q.d,
                10,
                color,
              );
            }
          }

          /* arrow from source to shares */
          const arrowY = sourceY + 35;
          g.appendChild(
            svgEl("line", {
              x1: opts.x + opts.width / 2,
              y1: arrowY,
              x2: opts.x + opts.width / 2,
              y2: shareY - 6,
              stroke: "#B0A89A",
              "stroke-width": "1.5",
              "stroke-dasharray": "4,3",
            }),
          );
          return g;
        }

        /**
         * renderPackTrack — "how many fit?" measurement strip for division
         * opts: { x, y, width, height, total:{n,d}, unit:{n,d},
         *         placed:number, maxFit:number, color }
         */
        function renderPackTrack(opts) {
          const g = svgEl("g", {});
          const color = opts.color || MODE_COLORS.divide;
          const trackH = opts.height * 0.35;
          const trackY = opts.y;
          const unitY = opts.y + opts.height * 0.55;
          const unitH = trackH * 0.8;

          /* total track strip */
          g.appendChild(
            renderStrip({
              x: opts.x,
              y: trackY,
              width: opts.width,
              height: trackH,
              denom: opts.total.d,
              filled: opts.total.n,
              color: "#B0A89A",
              ghost: 0,
            }),
          );

          /* placed unit copies */
          const unitFrac = fracToFloat(opts.unit);
          const totalFrac = fracToFloat(opts.total);
          const unitPixW = (unitFrac / totalFrac) * opts.width;
          const placed = opts.placed || 0;
          for (let i = 0; i < placed; i++) {
            const ux = opts.x + i * unitPixW;
            g.appendChild(
              svgEl("rect", {
                x: ux + 1,
                y: trackY + 2,
                width: Math.max(0, unitPixW - 2),
                height: trackH - 4,
                fill: color + "44",
                stroke: color,
                "stroke-width": "1.5",
                rx: "3",
              }),
            );
          }

          /* unit piece template below */
          const templateW = Math.min(unitPixW, 100);
          const templateX = opts.x + (opts.width - templateW) / 2;
          g.appendChild(
            svgEl("rect", {
              x: templateX,
              y: unitY,
              width: templateW,
              height: unitH,
              fill: color + "22",
              stroke: color,
              "stroke-width": "2",
              rx: "4",
              "stroke-dasharray": "6,3",
            }),
          );
          renderSvgFraction(
            g,
            templateX + templateW / 2,
            unitY + unitH / 2,
            opts.unit.n,
            opts.unit.d,
            10,
            color,
          );

          /* count label */
          const countLbl = svgEl("text", {
            x: opts.x + opts.width + 15,
            y: trackY + trackH / 2 + 2,
            "text-anchor": "start",
            "dominant-baseline": "middle",
            "font-family": "'Share Tech Mono', monospace",
            "font-size": "16",
            "font-weight": "bold",
            fill: "#455A64",
          });
          countLbl.textContent = placed + "/" + (opts.maxFit || "?");
          g.appendChild(countLbl);
          return g;
        }

        /**
         * renderPredictionPrompt — "Will the result be > or < benchmark?" UI
         * opts: { x, y, width, question:string, optionA:string, optionB:string }
         */
        function renderPredictionPrompt(opts) {
          const g = svgEl("g", {});
          const qText = svgEl("text", {
            x: opts.x + opts.width / 2,
            y: opts.y,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "15",
            "font-weight": "600",
            fill: "#455A64",
          });
          qText.textContent = opts.question || "";
          g.appendChild(qText);

          const btnW = 120;
          const btnH = 40;
          const btnGap = 30;
          const btnY = opts.y + 20;
          const bx1 = opts.x + opts.width / 2 - btnW - btnGap / 2;
          const bx2 = opts.x + opts.width / 2 + btnGap / 2;

          for (let bi = 0; bi < 2; bi++) {
            const bx = bi === 0 ? bx1 : bx2;
            const label = bi === 0 ? opts.optionA || "A" : opts.optionB || "B";
            g.appendChild(
              svgEl("rect", {
                x: bx,

                tabindex: "0",

              x: bx + btnW / 2,

        /**
         * renderPredictionFeedback — show whether the estimate was correct
         * prediction: "a" (less) or "b" (more), resultFloat, benchmark, y
         */
        function renderPredictionFeedback(
          prediction,
          resultFloat,
          benchmark,
          y,
        ) {
          if (!prediction) return;
          const benchFloat =
            benchmark === "1/2"
              ? 0.5
              : benchmark === "1/4"
                ? 0.25
                : parseFloat(benchmark) || 1;
          const actualIsMore = resultFloat > benchFloat;
          const childSaidMore = prediction === "b";
          const correct = actualIsMore === childSaidMore;
          const fb = svgEl("text", {
            x: 400,
            y: y,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "13",
            fill: correct ? "#66BB6A" : "#EF5350",
          });
          fb.textContent = correct
            ? T("estimateRight")
            : T("estimateWrong") +
              " " +
              (actualIsMore ? T("moreThan") : T("lessThan")) +
              " " +
              benchmark +
              ".";
          boardSvg.appendChild(fb);
        }

        /* ═══════════════════════════════════════════
           CALCULATION ANIMATIONS
           ═══════════════════════════════════════════ */

        function _animateJoin(elA, elB, targetX, duration, onComplete) {
          const startBx = parseFloat(
            elB.getAttribute("x") ||
              elB.getAttribute("transform")?.match(/translate\(([^,]+)/)?.[1] ||
              0,
          );
          animateValue(
            duration || 500,
            function (t) {
              const cx = startBx + (targetX - startBx) * t;
              elB.setAttribute(
                "transform",
                "translate(" + (cx - startBx) + ",0)",
              );
            },
            onComplete,
          );
        }

        function _animateSplit(el, dx, duration, onComplete) {
          animateValue(
            duration || 400,
            function (t) {
              el.setAttribute("transform", "translate(" + dx * t + ",0)");
            },
            onComplete,
          );
        }

        function _animateScale(
          el,
          fromScale,
          toScale,
          cx,
          cy,
          duration,
          onComplete,
        ) {
          animateValue(
            duration || 500,
            function (t) {
              const s = fromScale + (toScale - fromScale) * t;
              el.setAttribute(
                "transform",
                "translate(" +
                  cx +
                  "," +
                  cy +
                  ") scale(" +
                  s +
                  ") translate(" +
                  -cx +
                  "," +
                  -cy +
                  ")",
              );
            },
            onComplete,
          );
        }

        function _animateOverlap(el, duration, onComplete) {
          el.setAttribute("opacity", "0");
          animateValue(
            duration || 400,
            function (t) {
              el.setAttribute("opacity", String(t));
            },
            onComplete,
          );
        }

        /**
         * renderGapLine — number line highlighting the gap between two values
         * opts: { x, y, width, nlMax, denom, valueA:{n,d}, valueB:{n,d},
         *         gapColor, markerColorA, markerColorB }
         */
        function renderGapLine(opts) {
          const g = svgEl("g", {});
          const nl = renderNumberLine({
            x: opts.x,
            y: opts.y,
            width: opts.width,
            nlMax: opts.nlMax || 1,
            denom: opts.denom,
            markers: [],
            benchmarks: nlBenchmarks(opts.nlMax || 1),
          });
          g.appendChild(nl);

          const nlMax = opts.nlMax || 1;
          const toX = function (frac) {
            return opts.x + (fracToFloat(frac) / nlMax) * opts.width;
          };
          const aX = toX(opts.valueA);
          const bX = toX(opts.valueB);
          const leftX = Math.min(aX, bX);
          const rightX = Math.max(aX, bX);
          const gapColor = opts.gapColor || MODE_COLORS.subtract;

          /* gap highlight */
          g.appendChild(
            svgEl("rect", {
              x: leftX,
              y: opts.y - 18,
              width: rightX - leftX,
              height: 12,
              fill: gapColor + "33",
              stroke: gapColor,
              "stroke-width": "1.5",
              rx: "3",
            }),
          );

          /* gap label */
          const gap = fracSubtract(
            fracCompare(opts.valueA, opts.valueB) >= 0
              ? opts.valueA
              : opts.valueB,
            fracCompare(opts.valueA, opts.valueB) >= 0
              ? opts.valueB
              : opts.valueA,
          );
          renderSvgFraction(
            g,
            (leftX + rightX) / 2,
            opts.y - 26,
            gap.n,
            gap.d,
            9,
            gapColor,
          );

          /* markers */
          const colA = opts.markerColorA || "#455A64";
          const colB = opts.markerColorB || gapColor;
          g.appendChild(
            svgEl("circle", {
              cx: aX,
              cy: opts.y,
              r: 5,
              fill: colA,
            }),
          );
          g.appendChild(
            svgEl("circle", {
              cx: bX,
              cy: opts.y,
              r: 5,
              fill: colB,
            }),
          );
          return g;
        }

        /**
         * renderAreaOverlap — highlight overlay for area grid overlap region
         * opts: { x, y, cellW, cellH, shadedRows, shadedCols, color }
         */
        function renderAreaOverlap(opts) {
          const g = svgEl("g", {});
          const color = opts.color || "rgba(57,73,171,0.5)";
          for (let r = 0; r < opts.shadedRows; r++) {
            for (let c = 0; c < opts.shadedCols; c++) {
              g.appendChild(
                svgEl("rect", {
                  x: opts.x + c * opts.cellW + 1,
                  y: opts.y + r * opts.cellH + 1,
                  width: opts.cellW - 2,
                  height: opts.cellH - 2,
                  fill: "none",
                  stroke: color,
                  "stroke-width": "2.5",
                  rx: "2",
                }),
              );
            }
          }
          /* product label */
          const lbl = svgEl("text", {
            x: opts.x + (opts.shadedCols * opts.cellW) / 2,
            y: opts.y + (opts.shadedRows * opts.cellH) / 2 + 2,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Share Tech Mono', monospace",
            "font-size": "14",
            "font-weight": "bold",
            fill: color,
          });
          lbl.textContent =
            opts.shadedRows +
            "\u00D7" +
            opts.shadedCols +
            "=" +
            opts.shadedRows * opts.shadedCols;
          g.appendChild(lbl);
          return g;
        }

        function _animatePack(
          templateEl,
          startX,
          positions,
          duration,
          onComplete,
        ) {
          const idx = 0;
          function placeNext() {
            if (idx >= positions.length) {
              if (onComplete) onComplete();
              return;
            }
            const clone = templateEl.cloneNode(true);
            clone.setAttribute(
              "transform",
              "translate(" + (startX - positions[idx]) + ",0)",
            );
            templateEl.parentNode.appendChild(clone);
            animateValue(
              duration || 300,
              function (t) {
                const cx = startX + (positions[idx] - startX) * t;
                clone.setAttribute(
                  "transform",
                  "translate(" + (cx - positions[idx]) + ",0)",
                );
              },
              function () {
                idx++;
                placeNext();
              },
            );
          }
          placeNext();
        }

        /* ═══════════════════════════════════════════
           BUILD: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderBuildBoard() {
          clearEl(boardSvg);
          const b = state.build;
          const step = getCurrentStep();
          const denom = b.target ? b.target.d : b.denominator;
          if (denom !== b.denominator) {
            b.denominator = denom;
            const neededWholes = Math.ceil(b.target.n / denom);
            const total =
              denom * Math.max(LEVEL_CFG[state.level].maxWholes, neededWholes);
            b.filledSegments = new Array(total).fill(false);
            b.currentValue = { n: 0, d: denom };
          }
          const wholes = Math.max(1, Math.ceil(b.target.n / denom));
          const hasSource = step && step.sourceValue;

          const useCircle =
            step &&
            step.primaryModel === "circle" &&
            wholes === 1 &&
            !hasSource;

          const stripW = wholeWidth(wholes);
          const stripH = hasSource ? 50 : 60;
          const gap = 8;
          const totalW = stripW * wholes + gap * (wholes - 1);
          const startX = (800 - totalW) / 2;
          const startY = hasSource ? 200 : 140;

          if (hasSource) {
            const src = step.sourceValue;
            const srcW = wholeWidth(1);
            const srcX = (800 - srcW) / 2;
            const srcStrip = renderStrip({
              x: srcX,
              y: 110,
              width: srcW,
              height: stripH,
              denom: src.d,
              filled: src.n,
              color: "#78909C",
              ghost: 0,
            });
            boardSvg.appendChild(srcStrip);
            renderSvgFraction(
              boardSvg,
              srcX + srcW + 30,
              110 + stripH / 2,
              src.n,
              src.d,
              18,
              "#78909C",
            );
            const eqSign = svgEl("text", {
              x: 400,
              y: 180,
              "text-anchor": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "20",
              "font-weight": "bold",
              fill: "#90A4AE",
            });
            eqSign.textContent = "=";
            boardSvg.appendChild(eqSign);
          }

          if (useCircle) {
            const circle = renderCircleModel({
              cx: 400,
              cy: startY + 60,
              r: 90,
              denom,
              filledSegs: b.filledSegments,
              color: MODE_COLORS.build,
            });
            circle.setAttribute("data-whole", 0);
            boardSvg.appendChild(circle);

            /* Circle hover / touch preview — faint primary wedge */
            const cHov =
              b.touchPreview >= 0 ? b.touchPreview : state.ui.hoverSegIdx;
            if (cHov >= 0 && cHov < denom) {
              const cCx = 400;
              const cCy = startY + 60;
              const cR = 90;
              const a1 = (cHov / denom) * Math.PI * 2 - Math.PI / 2;
              const a2 = ((cHov + 1) / denom) * Math.PI * 2 - Math.PI / 2;
              const x1 = cCx + cR * Math.cos(a1);
              const y1 = cCy + cR * Math.sin(a1);
              const x2 = cCx + cR * Math.cos(a2);
              const y2 = cCy + cR * Math.sin(a2);
              const large = a2 - a1 > Math.PI ? 1 : 0;
              boardSvg.appendChild(
                svgEl("path", {
                  d:
                    "M " +
                    cCx +
                    " " +
                    cCy +
                    " L " +
                    x1 +
                    " " +
                    y1 +
                    " A " +
                    cR +
                    " " +
                    cR +
                    " 0 " +
                    large +
                    " 1 " +
                    x2 +
                    " " +
                    y2 +
                    " Z",
                  fill: MODE_COLORS.build,
                  opacity: "0.3",
                  "pointer-events": "none",
                }),
              );
            }
          }

          for (let w = 0; w < (useCircle ? 0 : wholes); w++) {
            const wx = startX + w * (stripW + gap);
            let filledInThisWhole = 0;

            for (let s = 0; s < denom; s++) {
              const idx = w * denom + s;
              if (idx < b.filledSegments.length && b.filledSegments[idx]) {
                filledInThisWhole++;
              }
            }

            const strip = renderStrip({
              x: wx,
              y: startY,
              width: stripW,
              height: stripH,
              denom,
