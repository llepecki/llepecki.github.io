              filled: filledInThisWhole,
              color: MODE_COLORS.build,
              ghost: 0,
            });
            strip.setAttribute("data-whole", w);

            /* Hover / touch preview: tint segments that would be filled */
            const hovIdx =
              b.touchPreview >= 0 ? b.touchPreview : state.ui.hoverSegIdx;
            if (hovIdx >= 0) {
              const wStart = w * denom;
              const segW = stripW / denom;
              for (let s = 0; s < denom; s++) {
                const gIdx = wStart + s;
                /* Show preview for unfilled segments up to hovered */
                if (
                  gIdx <= hovIdx &&
                  gIdx < b.filledSegments.length &&
                  !b.filledSegments[gIdx]
                ) {
                  strip.appendChild(
                    svgEl("rect", {
                      x: wx + s * segW + 1,
                      y: startY + 1,
                      width: segW - 2,
                      height: stripH - 2,
                      fill: MODE_COLORS.build,
                      opacity: "0.3",
                      rx: "3",
                      "pointer-events": "none",
                    }),
                  );
                }
              }
            }

            boardSvg.appendChild(strip);

            if (wholes > 1) {
              const lbl = svgEl("text", {
                x: wx + stripW / 2,
                y: startY + stripH + 18,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#90A4AE",
              });
              lbl.textContent = (w + 1).toString();
              boardSvg.appendChild(lbl);
            }
          }

          const nlY = 320;
          const nlW = totalW;
          const nlX = startX;
          const nlMax = Math.max(
            LEVEL_CFG[state.level].nlMax,
            Math.ceil(b.target.n / denom),
          );
          const currentVal = {
            n: b.currentValue.n,
            d: b.currentValue.d,
          };
          const ghostMarker = {
            value: { n: b.target.n, d: b.target.d },
            ghost: true,
          };
          const currentMarker = {
            value: currentVal,
            color: MODE_COLORS.build,
          };

          const nl = renderNumberLine({
            x: nlX,
            y: nlY,
            width: nlW,
            nlMax,
            denom,
            markers:
              b.currentValue.n > 0
                ? [ghostMarker, currentMarker]
                : [ghostMarker],
            benchmarks: nlBenchmarks(nlMax),
          });
          boardSvg.appendChild(nl);

          const promptY = hasSource ? 60 : 60;
          const promptText = svgEl("text", {
            x: hasSource ? 300 : 360,
            y: promptY,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "20",
            "font-weight": "600",
            fill: "#455A64",
          });
          promptText.textContent = state.lang === "pl" ? "Pokaż" : "Show";
          boardSvg.appendChild(promptText);
          renderSvgFraction(
            boardSvg,
            hasSource ? 380 : 440,
            promptY - 2,
            b.target.n,
            b.target.d,
            18,
            "#455A64",
          );
          renderStepGoal(promptY);
          renderBoardNextBtn(460);
        }

        function handleBuildClick(e) {
          const seg = e.target.closest(".strip-seg");
          if (!seg) return;

          const idx = parseInt(seg.getAttribute("data-seg"), 10);
          const wholeGroup = seg.closest("g[data-whole]");
          if (!wholeGroup) return;
          const wholeIdx = parseInt(wholeGroup.getAttribute("data-whole"), 10);
          const globalIdx = wholeIdx * state.build.denominator + idx;

          const b = state.build;
          const total = b.filledSegments.length;
          const step = getCurrentStep();
          const isCircle = step && step.primaryModel === "circle";

          /* Touch pre-commit: first tap previews, second commits */
          if (e.pointerType === "touch" && !isCircle) {
            if (b.touchPreview !== globalIdx) {
              b.touchPreview = globalIdx;
              renderBuildBoard();
              return;
            }
            b.touchPreview = -1;
          }

          if (isCircle) {
            b.filledSegments[globalIdx] = !b.filledSegments[globalIdx];
          } else {
            const currentFilled = b.filledSegments.filter(Boolean).length;
            const targetIdx = globalIdx + 1;

            if (currentFilled === targetIdx) {
              for (let i = globalIdx; i < total; i++)
                b.filledSegments[i] = false;
            } else {
              for (let i = 0; i < total; i++) {
                b.filledSegments[i] = i < targetIdx;
              }
            }
          }

          b.currentValue = {
            n: b.filledSegments.filter(Boolean).length,
            d: b.denominator,
          };

          renderBuildBoard();
          updatePanel();
          if (!checkBuildComplete()) {
            recordWrongAttempt();
          }
        }

        function animateRepartition(callback) {
          const step = getCurrentStep();
          if (!step || !step.sourceValue) {
            if (callback) callback();
            return;
          }
          const src = step.sourceValue;
          const tgt = state.build.target;
          const srcW = wholeWidth(1);
          const srcX = (800 - srcW) / 2;
          const stripY = 110;
          const stripH = 50;
          const fillWidth = (src.n / src.d) * srcW;

          state.ui.animating = true;
          const duration = 600;
          const start = performance.now();

          function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            const currentDenom = Math.round(src.d + (tgt.d - src.d) * eased);
            const segW = srcW / currentDenom;

            const existing = boardSvg.querySelector("#repartGroup");
            if (existing) existing.remove();

            const g = svgEl("g", { id: "repartGroup" });
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: srcW,
                height: stripH,
                fill: "#F5F0E8",
                rx: "5",
              }),
            );
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: fillWidth,
                height: stripH,
                fill: MODE_COLORS.build,
                opacity: "0.5",
                rx: "3",
              }),
            );
            for (let i = 1; i < currentDenom; i++) {
              g.appendChild(
                svgEl("line", {
                  x1: srcX + i * segW,
                  y1: stripY,
                  x2: srcX + i * segW,
                  y2: stripY + stripH,
                  stroke: "#B0A89A",
                  "stroke-width": "1",
                }),
              );
            }
            g.appendChild(
              svgEl("rect", {
                x: srcX,
                y: stripY,
                width: srcW,
                height: stripH,
                fill: "none",
                stroke: "#78909C",
                "stroke-width": "2",
                rx: "5",
              }),
            );
            boardSvg.appendChild(g);

            if (t < 1) {
              requestAnimationFrame(frame);
            } else {
              state.ui.animating = false;
              if (callback) callback();
            }
          }
          requestAnimationFrame(frame);
        }

        function checkBuildComplete() {
          const b = state.build;
          const filled = b.filledSegments.filter(Boolean).length;
          if (filled === b.target.n) {
            const step = getCurrentStep();
            if (step && step.sourceValue) {
              animateRepartition(() => onSuccess());
            } else {
              onSuccess();
            }
            return true;
          }
          return false;
        }

        /* ═══════════════════════════════════════════
           COMPARE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderCompareBoard() {
          clearEl(boardSvg);
          const c = state.compare;
          const step = getCurrentStep();
          const compact = isCompact();
          const cardW = compact ? 150 : 190;
          const cardH = compact ? 95 : 115;
          const gap = compact ? 80 : 120;
          const leftX = 400 - cardW - gap / 2;
          const rightX = 400 + gap / 2;
          const cardY = 110;
          const colLeft = "#26A69A";
          const colRight = "#FFA726";
          const hov = state.ui.hoverTarget;

          const dispA = (step && step.displayA) || c.displayA;
          const dispB = (step && step.displayB) || c.displayB;
          const labelA =
            dispA === "decimal"
              ? formatDecimal(c.cardA.n, c.cardA.d)
              : undefined;
          const labelB =
            dispB === "decimal"
              ? formatDecimal(c.cardB.n, c.cardB.d)
              : undefined;

          if (c.phase === "choose") {
            /* Hover: dim the opposite card */
            const leftOp = hov === "right" ? "0.55" : "1";
            const rightOp = hov === "left" ? "0.55" : "1";
            /* Hover: lift the hovered card */
            const leftLift = hov === "left" ? -4 : 0;
            const rightLift = hov === "right" ? -4 : 0;

            const lgLeft = svgEl("g", {
              opacity: leftOp,
              transform: "translate(0," + leftLift + ")",
            });
            lgLeft.appendChild(
              renderFractionCard({
                x: leftX,
                y: cardY,
                width: cardW,
                height: cardH,
                value: c.cardA,
                label: labelA,
                color: hov === "left" ? "#1B8A7F" : colLeft,
              }),
            );
            lgLeft.setAttribute("data-side", "left");
            lgLeft.setAttribute("style", "cursor:pointer");
            boardSvg.appendChild(lgLeft);

            const lgRight = svgEl("g", {
              opacity: rightOp,
              transform: "translate(0," + rightLift + ")",
            });
            lgRight.appendChild(
              renderFractionCard({
                x: rightX,
                y: cardY,
                width: cardW,
                height: cardH,
                value: c.cardB,
                label: labelB,
                color: hov === "right" ? "#E09020" : colRight,
              }),
            );
            lgRight.setAttribute("data-side", "right");
            lgRight.setAttribute("style", "cursor:pointer");
            boardSvg.appendChild(lgRight);

            /* Center "=?" pill — reads as a question, not assertion */
            const eqPillW = compact ? 55 : 70;
            const eqPillH = 44;
            const eqX = 400 - eqPillW / 2;
            const eqY = cardY + cardH / 2 - eqPillH / 2;
            const eqHov = hov === "equal";
            const eqG = svgEl("g", {
              "data-side": "equal",
              style: "cursor:pointer",
              transform: eqHov ? "translate(0,-3)" : "translate(0,0)",
            });
            eqG.appendChild(
              svgEl("rect", {
                x: eqX,
                y: eqY,
                width: eqPillW,
                height: eqPillH,
                fill: eqHov ? "#E3F2FD" : "#fff",
                stroke: eqHov ? MODE_COLORS.compare : "#B0BEC5",
                "stroke-width": eqHov ? "2.5" : "2",
                rx: "10",
              }),
            );
            const eqTxt = svgEl("text", {
              x: 400,
              y: eqY + eqPillH / 2 - 2,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "18",
              "font-weight": "bold",
              fill: eqHov ? MODE_COLORS.compare : "#546E7A",
            });
            eqTxt.textContent = "=?";
            eqG.appendChild(eqTxt);
            /* Label below pill */
            const eqLbl = svgEl("text", {
              x: 400,
              y: eqY + eqPillH + 14,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "11",
              fill: eqHov ? MODE_COLORS.compare : "#90A4AE",
              "pointer-events": "none",
            });
            eqLbl.textContent = T("equalQuestion");
            eqG.appendChild(eqLbl);
            boardSvg.appendChild(eqG);

            /* Prompt */
            const prompt = svgEl("text", {
              x: 400,
              y: 50,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "17",
              "font-weight": "600",
              fill: "#455A64",
            });
            prompt.textContent = T("tapBigger");
            boardSvg.appendChild(prompt);

            /* Hide the old floating eq button */
            document.getElementById("eqBtn").classList.remove("visible");
          } else {
            /* Reveal phase — static cards */
            const leftCard = renderFractionCard({
              x: leftX,
              y: cardY,
              width: cardW,
              height: cardH,
              value: c.cardA,
              label: labelA,
              color: colLeft,
            });
            leftCard.setAttribute("data-side", "left");
            boardSvg.appendChild(leftCard);

            const rightCard = renderFractionCard({
              x: rightX,
              y: cardY,
              width: cardW,
              height: cardH,
              value: c.cardB,
              label: labelB,
              color: colRight,
            });
            rightCard.setAttribute("data-side", "right");
            boardSvg.appendChild(rightCard);
          }

          if (c.phase === "reveal") {
            renderCompareReveal(leftX, rightX, cardY + cardH + 30);
          }

          renderStepGoal(50);
        }

        function renderCompareReveal(leftX, rightX, revealY) {
          const c = state.compare;
          const wholeW = wholeWidth(1);
          const barH = 36;
          const barGap = 12;
          const barX = (800 - wholeW) / 2;
          const dA = c.cardA.d;
          const dB = c.cardB.d;

          const stripA = renderStrip({
            x: barX,
            y: revealY,
            width: wholeW,
            height: barH,
            denom: dA,
            filled: c.cardA.n,
            color: "#26A69A",
            ghost: 0,
          });
          boardSvg.appendChild(stripA);

          const stripB = renderStrip({
            x: barX,
            y: revealY + barH + barGap,
            width: wholeW,
            height: barH,
            denom: dB,
            filled: c.cardB.n,
            color: "#FFA726",
            ghost: 0,
          });
          boardSvg.appendChild(stripB);

          const fillEndA = barX + fracToFloat(c.cardA) * wholeW;
          const fillEndB = barX + fracToFloat(c.cardB) * wholeW;
          const biggerEnd = Math.max(fillEndA, fillEndB);
          boardSvg.appendChild(
            svgEl("line", {
              x1: biggerEnd,
              y1: revealY - 4,
              x2: biggerEnd,
              y2: revealY + barH * 2 + barGap + 4,
              stroke: "#455A64",
              "stroke-width": "1.5",
              "stroke-dasharray": "4,3",
              opacity: "0.5",
            }),
          );

          const nlY = revealY + barH * 2 + barGap + 40;
          const nl = renderNumberLine({
            x: barX,
            y: nlY,
            width: wholeW,
            nlMax: 1,
            denom: Math.max(dA, dB),
            markers: [
              { value: c.cardA, color: "#26A69A" },
              { value: c.cardB, color: "#FFA726" },
            ],
            benchmarks: [0, 0.5, 1],
          });
          boardSvg.appendChild(nl);

          const step = getCurrentStep();
          if (step) {
            const isCorrect =
              c.childChoice === c.correctAnswer ||
              (c.childChoice === "equal" && c.isEqual);
            const fbKey = isCorrect ? "feedbackSuccess" : "feedbackError";
            const fbText = stepText(step, fbKey);
            if (fbText) {
              const fb = svgEl("text", {
                x: 400,
                y: nlY + 40,
                "text-anchor": "middle",
                "font-family": "'Outfit', sans-serif",
                "font-size": "14",
                fill: isCorrect ? "#2E7D32" : "#C62828",
              });
              fb.textContent = fbText;
              boardSvg.appendChild(fb);
            }
          }

          renderBoardNextBtn(460);
        }

        function handleCompareClick(e) {
          if (state.compare.phase !== "choose") return;
          const card = e.target.closest("[data-side]");
          if (!card) return;

          const side = card.getAttribute("data-side");
          const c = state.compare;
          c.childChoice = side;
          state.ui.hoverTarget = null;

          /* Handle equal the same way as left/right */
          if (side === "equal") {
            if (c.isEqual) {
              c.phase = "reveal";
              c.correctAnswer = "equal";
              onSuccess();
            } else {
              c.phase = "reveal";
              const cmp = fracCompare(c.cardA, c.cardB);
              c.correctAnswer = cmp > 0 ? "left" : "right";
              recordWrongAttempt();
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
              document.getElementById("nextBtn").disabled = false;
            }
            document.getElementById("eqBtn").classList.remove("visible");
            renderCompareBoard();
            return;
          }

          const cmp = fracCompare(c.cardA, c.cardB);
          const correct =
            (side === "left" && cmp > 0) || (side === "right" && cmp < 0);

          if (correct) {
            c.phase = "reveal";
            c.correctAnswer = side;
            state.ui.animating = true;
            animateValue(
              400,
              function () {},
              function () {
                state.ui.animating = false;
                onSuccess();
              },
            );
          } else if (c.isEqual) {
            recordWrongAttempt();
            state.ui.feedbackText = T("theyAreEqual");
            state.ui.feedbackType = "error";
            updateHintDisplay();
          } else {
            c.phase = "reveal";
            c.correctAnswer = cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            document.getElementById("nextBtn").disabled = false;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderCompareBoard();
        }

        function handleEqualClick() {
          /* Legacy handler — redirect to unified compare click */
          if (state.compare.phase !== "choose") return;
          state.compare.childChoice = "equal";
          state.ui.hoverTarget = null;

          if (state.compare.isEqual) {
            state.compare.phase = "reveal";
            state.compare.correctAnswer = "equal";
            onSuccess();
          } else {
            state.compare.phase = "reveal";
            const cmp = fracCompare(state.compare.cardA, state.compare.cardB);
            state.compare.correctAnswer = cmp > 0 ? "left" : "right";
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            document.getElementById("nextBtn").disabled = false;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderCompareBoard();
        }

        /* ═══════════════════════════════════════════
           PLACE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function placeLayout() {
          const p = state.place;
          const nlMax = p.nlMax || LEVEL_CFG[state.level].nlMax;
          const compact = isCompact();
          return {
            nlX: 75,
            nlW: compact ? 580 : 650,
            nlY: 100,
            nlMax,
            nlDenom: p.nlDenom,
            trayY: 380,
            cardW: compact ? 110 : 140,
            cardH: compact ? 65 : 80,
            trayGap: 20,
            pillW: 60,
            pillH: 24,
          };
        }

        function renderPlacedMarker(tk, nlY, stagger) {
          const g = svgEl("g", {});
          const pillW = 60;
          const pillH = 24;
          const px = tk.placedX;
          /* Pill below the axis */
          const pillY = stagger ? nlY + 42 : nlY + 18;
          g.appendChild(
            svgEl("rect", {
              x: px - pillW / 2,
              y: pillY,
              width: pillW,
              height: pillH,
              fill: "#fff",
              stroke: MODE_COLORS.place,
              "stroke-width": "1.5",
              rx: "6",
            }),
          );
          if (tk.asDecimal) {
            const lbl = svgEl("text", {
              x: px,
              y: pillY + pillH / 2 + 1,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Share Tech Mono', monospace",
              "font-size": "11",
              "font-weight": "bold",
              fill: "#263238",
            });
            lbl.textContent = formatDecimal(tk.n, tk.d);
            g.appendChild(lbl);
          } else {
            renderSvgFraction(
              g,
              px,
              pillY + pillH / 2,
              tk.n,
              tk.d,
              8,
              "#263238",
            );
          }
          /* Stem from axis down to pill */
          g.appendChild(
            svgEl("line", {
              x1: px,
              y1: nlY,
              x2: px,
              y2: pillY,
              stroke: MODE_COLORS.place,
              "stroke-width": "1.5",
              opacity: "0.6",
            }),
          );
          g.appendChild(
            svgEl("circle", {
              cx: px,
              cy: nlY,
              r: "6",
              fill: MODE_COLORS.place,
              stroke: "#fff",
              "stroke-width": "2",
            }),
          );
          return g;
        }

        function computeSnapValue(pointerX, lay) {
          const rawVal = ((pointerX - lay.nlX) / lay.nlW) * lay.nlMax;
          return Math.max(
            0,
            Math.min(lay.nlMax, Math.round(rawVal * lay.nlDenom) / lay.nlDenom),
          );
        }

        function renderPlaceBoard() {
          clearEl(boardSvg);
          const p = state.place;
          const lay = placeLayout();
          const { nlX, nlW, nlY, nlMax, cardW, cardH, trayY, trayGap } = lay;

          /* 1. Prompt */
          const prompt = svgEl("text", {
            x: 400,
            y: 22,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "15",
            "font-weight": "600",
            fill: "#455A64",
          });
          prompt.textContent = T("placeDrag");
          boardSvg.appendChild(prompt);

          const subPrompt = svgEl("text", {
            x: 400,
            y: 38,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "11",
            fill: "#90A4AE",
          });
          subPrompt.textContent = T("placeWatch");
          boardSvg.appendChild(subPrompt);

          renderStepGoal(38);

          /* 2. Number line (no generic markers) */
          const nl = renderNumberLine({
            x: nlX,
            y: nlY,
            width: nlW,
            nlMax,
            denom: p.nlDenom,
            markers: [],
            benchmarks: nlBenchmarks(nlMax),
          });
          boardSvg.appendChild(nl);

          /* 3. Placed token markers (pill + stem + dot) */
          const placedTokens = p.tokens.filter((tk) => tk.placed);
          const sortedPlaced = placedTokens
            .slice()
            .sort((a, b) => a.placedX - b.placedX);
          for (let i = 0; i < sortedPlaced.length; i++) {
            const tk = sortedPlaced[i];
            let stagger = false;
            if (i > 0) {
              const prev = sortedPlaced[i - 1];
              if (Math.abs(tk.placedX - prev.placedX) < 65) {
                stagger = true;
              }
            }
            boardSvg.appendChild(renderPlacedMarker(tk, nlY, stagger));
          }

          /* 4. Snap halo + connector + dragged card */
          if (p.dragToken !== null) {
            const tk = p.tokens[p.dragToken];

            if (p.hoverActive) {
              const sx = p.hoverSnapX;

              /* Snap halo */
              boardSvg.appendChild(
                svgEl("circle", {
                  cx: sx,
                  cy: nlY,
                  r: "18",
                  fill: "rgba(255,167,38,0.2)",
                  stroke: "none",
                }),
              );
              boardSvg.appendChild(
                svgEl("line", {
                  x1: sx,
                  y1: nlY - 8,
                  x2: sx,
                  y2: nlY + 8,
                  stroke: MODE_COLORS.place,
                  "stroke-width": "2",
                }),
              );
              boardSvg.appendChild(
                svgEl("circle", {
                  cx: sx,
                  cy: nlY,
                  r: "6",
                  fill: MODE_COLORS.place,
                  stroke: "#fff",
                  "stroke-width": "2",
                }),
              );

              /* Connector stem — from axis down to card */
              const cardTopY = nlY + 18;
              boardSvg.appendChild(
                svgEl("line", {
                  x1: sx,
                  y1: nlY,
                  x2: sx,
                  y2: cardTopY,
                  stroke: MODE_COLORS.place,
                  "stroke-width": "2",
                  opacity: "0.7",
                  "stroke-dasharray": "4,3",
                }),
              );

              /* Dragged card (below axis, anchored to snap pin) */
              const card = renderFractionCard({
                x: sx - cardW / 2,
                y: cardTopY,
                width: cardW,
                height: cardH,
                value: { n: tk.n, d: tk.d },
                label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
                color: MODE_COLORS.place,
              });
              card.setAttribute("data-token", p.dragToken);
              card.setAttribute("class", "place-token");
              boardSvg.appendChild(card);
            } else {
              /* Dragging outside active band — show card at pointer */
              const card = renderFractionCard({
                x: p.dragPointerX - cardW / 2,
                y: p.dragPointerY - cardH / 2,
                width: cardW,
                height: cardH,
                value: { n: tk.n, d: tk.d },
                label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
                color: MODE_COLORS.place,
              });
              card.setAttribute("data-token", p.dragToken);
              card.setAttribute("class", "place-token");
              card.setAttribute("style", "cursor:grabbing;opacity:0.75");
              boardSvg.appendChild(card);
            }
          }

          /* 5. Token tray (non-dragged, non-placed) */
          const unplaced = [];
          for (let i = 0; i < p.tokens.length; i++) {
            if (!p.tokens[i].placed && i !== p.dragToken) {
              unplaced.push(i);
            }
          }
          const totalTrayW =
            unplaced.length * cardW +
            Math.max(0, unplaced.length - 1) * trayGap;
          const trayStartX = (800 - totalTrayW) / 2;
          for (let ui = 0; ui < unplaced.length; ui++) {
            const idx = unplaced[ui];
            const tk = p.tokens[idx];
            const tx = trayStartX + ui * (cardW + trayGap);
            const card = renderFractionCard({
              x: tx,
              y: trayY,
              width: cardW,
              height: cardH,
              value: { n: tk.n, d: tk.d },
              label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
              color: MODE_COLORS.place,
            });
            card.setAttribute("data-token", idx);
            card.setAttribute("class", "place-token");
            boardSvg.appendChild(card);
          }

          /* 6. Bounce-back animation card */
          if (p._bounceAnim) {
            const ba = p._bounceAnim;
            const tk = p.tokens[ba.tokenIdx];
            const card = renderFractionCard({
              x: ba.cx - cardW / 2,
              y: ba.cy - cardH / 2,
              width: cardW,
              height: cardH,
              value: { n: tk.n, d: tk.d },
              label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
              color: MODE_COLORS.place,
            });
            card.setAttribute("style", "opacity:0.7;pointer-events:none");
            boardSvg.appendChild(card);
          }

          /* 7. Settle animation — shrink drag card into placed pill */
          if (p._settleAnim) {
            const sa = p._settleAnim;
            const tk = p.tokens[sa.tokenIdx];
            const t = sa.t;
            const sx = sa.snapX;
            const pW = 60;
            const pH = 24;
            const curW = cardW + (pW - cardW) * t;
            const curH = cardH + (pH - cardH) * t;
            const dragY = nlY + 18;
            const pillY = nlY + 18;
            const curY = dragY + (pillY - dragY) * t;
            /* Dot on axis */
            boardSvg.appendChild(
              svgEl("circle", {
                cx: sx,
                cy: nlY,
                r: "6",
                fill: MODE_COLORS.place,
                stroke: "#fff",
                "stroke-width": "2",
              }),
            );
            /* Stem */
            boardSvg.appendChild(
              svgEl("line", {
                x1: sx,
                y1: nlY,
                x2: sx,
                y2: curY,
                stroke: MODE_COLORS.place,
                "stroke-width": "1.5",
                opacity: "0.6",
              }),
            );
            /* Shrinking card */
            const settleCard = renderFractionCard({
              x: sx - curW / 2,
              y: curY,
              width: curW,
              height: curH,
              value: { n: tk.n, d: tk.d },
              label: tk.asDecimal ? formatDecimal(tk.n, tk.d) : tk.label,
              color: MODE_COLORS.place,
            });
            settleCard.setAttribute("style", "pointer-events:none");
            boardSvg.appendChild(settleCard);
          }

          renderBoardNextBtn(460);
        }

        function handlePlaceDown(e) {
          const card = e.target.closest(".place-token");
          if (!card) return;
          const idx = parseInt(card.getAttribute("data-token"), 10);
          if (state.place.tokens[idx].placed) return;

          const p = state.place;
          const lay = placeLayout();
          p.dragToken = idx;
          const pt = getSvgPoint(e);
          p.dragPointerX = pt.x;
          p.dragPointerY = pt.y;
          p.hoverSnapValue = computeSnapValue(pt.x, lay);
          p.hoverSnapX = lay.nlX + (p.hoverSnapValue / lay.nlMax) * lay.nlW;
          p.hoverActive = Math.abs(pt.y - lay.nlY) < 150;
          renderPlaceBoard();
          e.preventDefault();
        }

        function handlePlaceMove(e) {
          if (state.place.dragToken === null) return;
          const p = state.place;
          const lay = placeLayout();
          const pt = getSvgPoint(e);
          p.dragPointerX = pt.x;
          p.dragPointerY = pt.y;
          p.hoverSnapValue = computeSnapValue(pt.x, lay);
          p.hoverSnapX = lay.nlX + (p.hoverSnapValue / lay.nlMax) * lay.nlW;
          p.hoverActive = Math.abs(pt.y - lay.nlY) < 150;
          renderPlaceBoard();
          e.preventDefault();
        }

        function handlePlaceUp() {
          if (state.place.dragToken === null) return;
          const p = state.place;
          const lay = placeLayout();
          const idx = p.dragToken;
          const tk = p.tokens[idx];

          if (!p.hoverActive || p.hoverSnapValue === null) {
            /* Cancel — return card to tray */
            _placeBounceback(idx, lay);
            return;
          }

          const correctVal = fracToFloat({ n: tk.n, d: tk.d });
          if (Math.abs(p.hoverSnapValue - correctVal) < 0.0001) {
            /* Correct placement — settle animation */
            _placeSettle(idx, lay);
          } else {
            /* Wrong snap tick */
            recordWrongAttempt();
            state.ui.feedbackText = T("tryAgain");
            state.ui.feedbackType = "error";
            updateHintDisplay();
            _placeBounceback(idx, lay);
          }
        }

        function _placeSettle(tokenIdx, lay) {
          const p = state.place;
          const tk = p.tokens[tokenIdx];
          const sx = p.hoverSnapX;
          p._settleAnim = { tokenIdx, t: 0, snapX: sx };
          p.dragToken = null;
          p.hoverSnapValue = null;
          p.hoverSnapX = null;
          p.hoverActive = false;
          animateValue(
            220,
            function (t) {
              p._settleAnim.t = t;
              renderPlaceBoard();
            },
            function () {
              tk.placed = true;
              tk.placedValue = { n: tk.n, d: tk.d };
              tk.placedX = sx;
              p._settleAnim = null;
              renderPlaceBoard();
              checkPlaceComplete();
            },
          );
        }

        function _placeBounceback(tokenIdx, lay) {
          const p = state.place;
          /* Start from where the card was actually rendered */
          const wasAnchored = p.hoverActive && p.hoverSnapX != null;
          const startX = wasAnchored ? p.hoverSnapX : p.dragPointerX;
          const startY = wasAnchored
            ? lay.nlY + 18 + lay.cardH / 2
            : p.dragPointerY;
          /* Compute tray target for this token */
          const unplaced = [];
          for (let i = 0; i < p.tokens.length; i++) {
            if (!p.tokens[i].placed) unplaced.push(i);
          }
          const slot = unplaced.indexOf(tokenIdx);
          const totalTrayW =
            unplaced.length * lay.cardW +
            Math.max(0, unplaced.length - 1) * lay.trayGap;
          const trayStartX = (800 - totalTrayW) / 2;
          const targetX =
            trayStartX + slot * (lay.cardW + lay.trayGap) + lay.cardW / 2;
          const targetY = lay.trayY + lay.cardH / 2;

          p.dragToken = null;
          p.hoverSnapValue = null;
          p.hoverSnapX = null;
          p.hoverActive = false;
          p._bounceAnim = { tokenIdx, cx: startX, cy: startY };

          animateValue(
            250,
            function (t) {
              p._bounceAnim.cx = startX + (targetX - startX) * t;
              p._bounceAnim.cy = startY + (targetY - startY) * t;
              renderPlaceBoard();
            },
            function () {
              p._bounceAnim = null;
              renderPlaceBoard();
            },
          );
        }

        function checkPlaceComplete() {
          const allPlaced = state.place.tokens.every((tk) => tk.placed);
          if (allPlaced) {
            onSuccess();
          }
        }

        /* ═══════════════════════════════════════════
           MATCH: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderMatchBoard() {
          clearEl(boardSvg);
          const m = state.match;
          const PAIR_COLORS = ["#26A69A", "#FFA726", "#5C6BC0", "#EF5350"];
          const cards = m.cards;
          const compact = isCompact();
          const cardW = compact ? 130 : 150;
          const cardH = compact ? 70 : 80;
          const cols = 2;
          const rows = Math.ceil(cards.length / cols);
          const gapX = compact ? 20 : 40;
          const gapY = compact ? 14 : 20;
          const totalW = cols * cardW + (cols - 1) * gapX;
          const totalH = rows * cardH + (rows - 1) * gapY;
          const startX = (800 - totalW) / 2;
          const startY = (440 - totalH) / 2 + 30;
          const hov = state.ui.hoverTarget;

          /* Compute card positions for connection lines */
          const cardPos = {};
          for (let i = 0; i < cards.length; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            cardPos[cards[i].id] = {
              x: startX + col * (cardW + gapX) + cardW / 2,
              y: startY + row * (cardH + gapY) + cardH / 2,
            };
          }

          /* 1. Draw matched-pair background bands */
          for (let pi = 0; pi < m.matchedPairs.length; pi++) {
            const pair = m.matchedPairs[pi];
            const p0 = cardPos[pair[0]];
            const p1 = cardPos[pair[1]];
            if (!p0 || !p1) continue;
            const pColor = PAIR_COLORS[pi % PAIR_COLORS.length];
            /* Background band between paired cards */
            boardSvg.appendChild(
              svgEl("line", {
                x1: p0.x,
                y1: p0.y,
                x2: p1.x,
                y2: p1.y,
                stroke: pColor,
                "stroke-width": "6",
                opacity: "0.18",
                "stroke-linecap": "round",
              }),
            );
            /* Connecting line */
            boardSvg.appendChild(
              svgEl("line", {
                x1: p0.x,
                y1: p0.y,
                x2: p1.x,
                y2: p1.y,
                stroke: pColor,
                "stroke-width": "2",
                opacity: "0.55",
                "stroke-linecap": "round",
              }),
            );
          }

          /* 2. Preview connection from selected to hovered */
          if (
            m.selectedCard !== null &&
            hov !== null &&
            hov !== m.selectedCard
          ) {
            const selPos = cardPos[m.selectedCard];
            const hovPos = cardPos[hov];
            if (selPos && hovPos) {
              boardSvg.appendChild(
                svgEl("line", {
                  x1: selPos.x,
                  y1: selPos.y,
                  x2: hovPos.x,
                  y2: hovPos.y,
                  stroke: MODE_COLORS.match,
                  "stroke-width": "2",
                  opacity: "0.35",
                  "stroke-dasharray": "6,4",
                  "stroke-linecap": "round",
                }),
              );
            }
          }

          /* 3. Wrong-pair rejection flash */
          if (m._rejectPair) {
            const rp = m._rejectPair;
            const rp0 = cardPos[rp[0]];
            const rp1 = cardPos[rp[1]];
            if (rp0 && rp1) {
              boardSvg.appendChild(
                svgEl("line", {
                  x1: rp0.x,
                  y1: rp0.y,
                  x2: rp1.x,
                  y2: rp1.y,
                  stroke: "#C62828",
                  "stroke-width": "3",
                  opacity: "0.6",
                  "stroke-linecap": "round",
                }),
              );
            }
          }

          /* 4. Render cards */
          for (let i = 0; i < cards.length; i++) {
            const c = cards[i];
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cx = startX + col * (cardW + gapX);
            const cy = startY + row * (cardH + gapY);

            const isSelected = m.selectedCard === c.id;
            const isHovered = hov === c.id && !c.matched;
            let pairIdx = -1;
            if (c.matched) {
              for (let pi = 0; pi < m.matchedPairs.length; pi++) {
                if (
                  m.matchedPairs[pi][0] === c.id ||
                  m.matchedPairs[pi][1] === c.id
                ) {
                  pairIdx = pi;
                  break;
                }
              }
            }
            const color = c.matched
              ? PAIR_COLORS[pairIdx % PAIR_COLORS.length]
              : isSelected
                ? MODE_COLORS.match
                : isHovered
                  ? "#7986CB"
                  : "#455A64";

            /* Hover lift + selected emphasis */
            const liftY = isHovered && !isSelected ? -3 : 0;
            const isReject =
              m._rejectPair &&
              (m._rejectPair[0] === c.id || m._rejectPair[1] === c.id);
            const shakeOff = isReject ? m._rejectShake || 0 : 0;

            const cardG = svgEl("g", {
              transform: "translate(" + shakeOff + "," + liftY + ")",
            });

            let label;
            if (c.repr === "decimal") {
              label = formatDecimal(c.value.n, c.value.d) || "?";
            } else {
              label = null;
            }

            if (c.repr === "bar") {
              const strip = renderStrip({
                x: cx,
                y: cy + 10,
                width: cardW,
                height: cardH - 20,
                denom: c.value.d,
                filled: c.value.n,
                color: isSelected ? MODE_COLORS.match : "#78909C",
                ghost: 0,
                borderColor: c.matched ? color : undefined,
              });
              strip.setAttribute("data-match-id", c.id);
              strip.setAttribute("class", "match-card");
              strip.style.cursor = "pointer";
              if (isSelected) {
                const highlight = svgEl("rect", {
                  x: cx - 3,
                  y: cy + 7,
                  width: cardW + 6,
                  height: cardH - 14,
                  fill: "none",
                  stroke: MODE_COLORS.match,
                  "stroke-width": "3",
                  rx: "7",
                });
                strip.insertBefore(highlight, strip.firstChild);
              }
              cardG.appendChild(strip);
            } else {
              const card = renderFractionCard({
                x: cx,
                y: cy,
                width: cardW,
                height: cardH,
                value: c.displayValue || c.value,
                label,
                color,
              });
              card.setAttribute("data-match-id", c.id);
              card.setAttribute("class", "match-card");
              cardG.appendChild(card);
            }
            boardSvg.appendChild(cardG);
          }

          const prompt = svgEl("text", {
            x: 400,
            y: 30,
            "text-anchor": "middle",
            "font-family": "'Outfit', sans-serif",
            "font-size": "16",
            "font-weight": "600",
            fill: "#455A64",
          });
          prompt.textContent = T("matchSummary");
          boardSvg.appendChild(prompt);
          renderStepGoal(30);
          renderBoardNextBtn(460);
        }

        function handleMatchClick(e) {
          const card = e.target.closest("[data-match-id]");
          if (!card) return;
          const id = parseInt(card.getAttribute("data-match-id"), 10);
          const m = state.match;
          const clickedCard = m.cards.find(function (c) {
            return c.id === id;
          });
          if (!clickedCard || clickedCard.matched) return;

          if (m.selectedCard === null) {
            m.selectedCard = id;
            state.ui.hoverTarget = null;
            renderMatchBoard();
          } else if (m.selectedCard === id) {
            m.selectedCard = null;
            renderMatchBoard();
          } else {
            const firstCard = m.cards.find(function (c) {
              return c.id === m.selectedCard;
            });
            if (
              firstCard &&
              fracEqual(firstCard.value, clickedCard.value) &&
              firstCard.id !== clickedCard.id
            ) {
              firstCard.matched = true;
              clickedCard.matched = true;
              m.matchedPairs.push([firstCard.id, clickedCard.id]);
              m.selectedCard = null;
              state.ui.hoverTarget = null;
              renderMatchBoard();
              checkMatchComplete();
            } else {
              /* Wrong pair — shake + red flash */
              recordWrongAttempt();
              m._rejectPair = [m.selectedCard, id];
              m._rejectShake = 0;
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
              const offsets = [6, -6, 4, -4, 2, -2, 0];
              let frame = 0;
              function shakeStep() {
                if (frame < offsets.length) {
                  m._rejectShake = offsets[frame];
                  renderMatchBoard();
                  frame++;
                  requestAnimationFrame(shakeStep);
                } else {
                  m._rejectPair = null;
                  m._rejectShake = 0;
                  m.selectedCard = null;
                  renderMatchBoard();
                }
              }
              renderMatchBoard();
              requestAnimationFrame(shakeStep);
            }
          }
        }

        function checkMatchComplete() {
          const allMatched = state.match.cards.every((c) => c.matched);
          if (allMatched) {
            onSuccess();
          }
        }

        /* ═══════════════════════════════════════════
           REPAIR: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderRepairPhaseStrip(phase) {
          const g = svgEl("g", {});
          const pillW = 90;
          const pillH = 22;
          const gap = 12;
          const totalW = pillW * 2 + gap;
          const sx = (800 - totalW) / 2;
          const sy = 8;
          const steps = [
            { key: "repairStep1", id: "identify", num: "1" },
            { key: "repairStep2", id: "fix", num: "2" },
          ];
          for (let i = 0; i < steps.length; i++) {
            const s = steps[i];
            const px = sx + i * (pillW + gap);
            const isActive = phase === s.id && phase !== "done";
            const isDone =
              phase === "done" || (phase === "fix" && s.id === "identify");
            let fill = "#fff";
            let stroke = "#CFD8DC";
            let textFill = "#90A4AE";
            if (isActive) {
              fill = MODE_COLORS.repair;
              stroke = MODE_COLORS.repair;
              textFill = "#fff";
            } else if (isDone) {
              fill = "#E8F5E9";
              stroke = "#66BB6A";
              textFill = "#388E3C";
            }
            g.appendChild(
              svgEl("rect", {
                x: px,
                y: sy,
                width: pillW,
                height: pillH,
                fill: fill,
                stroke: stroke,
                "stroke-width": "1.5",
                rx: "11",
              }),
            );
            const lbl = svgEl("text", {
              x: px + pillW / 2,
              y: sy + pillH / 2 + 1,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "12",
              "font-weight": "600",
              fill: textFill,
            });
            lbl.textContent = s.num + ". " + T(s.key);
            g.appendChild(lbl);
          }
          return g;
        }

        function _repairShake(reprType, callback) {
          const offsets = [8, -8, 6, -6, 3, -3, 0];
          let frame = 0;
          state.repair.shakeRepr = reprType;
          state.repair._shakeOffset = 0;
          function step() {
            if (frame < offsets.length) {
              state.repair._shakeOffset = offsets[frame];
              renderRepairBoard();
              frame++;
              requestAnimationFrame(step);
            } else {
              state.repair.shakeRepr = null;
              state.repair._shakeOffset = 0;
              renderRepairBoard();
              if (callback) callback();
            }
          }
          requestAnimationFrame(step);
        }

        function renderRepairBoard() {
          clearEl(boardSvg);
          const r = state.repair;
          const correct = r.correctValue;
          const compact = isCompact();
          const quadW = compact ? 270 : 310;
          const quadH = compact ? 115 : 130;
          const gapX = compact ? 30 : 40;
          const gapY = compact ? 18 : 25;
          const startX = (800 - quadW * 2 - gapX) / 2;
          const startY = 55;

          /* 1. Phase strip */
          boardSvg.appendChild(renderRepairPhaseStrip(r.phase));

          /* 2. Rule card — only in fix and done phases */
          if (r.phase !== "identify") {
            const ruleY = 38;
            const ruleW = 520;
            boardSvg.appendChild(
              svgEl("rect", {
                x: (800 - ruleW) / 2,
                y: ruleY - 10,
                width: ruleW,
                height: 22,
                fill: r.phase === "done" ? "#E8F5E9" : "#FFF8E1",
                stroke: r.phase === "done" ? "#66BB6A" : "#FFE082",
                "stroke-width": "1",
                rx: "11",
              }),
            );
            const ruleText = svgEl("text", {
              x: 400,
              y: ruleY + 1,
              "text-anchor": "middle",
              "dominant-baseline": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "12",
              "font-weight": "600",
              fill: r.phase === "done" ? "#2E7D32" : "#5D4037",
            });
            ruleText.textContent =
              r.phase === "fix" ? T("repairFixPrompt") : T("repairSuccess");
            boardSvg.appendChild(ruleText);
          }

          /* 3. Central "=" badge + connector lines */
          const reprs = [
            { type: "bar", x: startX, y: startY },
            {
              type: "fraction",
              x: startX + quadW + gapX,
              y: startY,
            },
            {
              type: "numberLine",
              x: startX,
              y: startY + quadH + gapY,
            },
            {
              type: "decimal",
              x: startX + quadW + gapX,
              y: startY + quadH + gapY,
            },
          ];
          const centerX = startX + quadW + gapX / 2;
          const centerY = startY + quadH + gapY / 2;

          /* Connector lines from center to each quad */
          for (let i = 0; i < reprs.length; i++) {
            const qcx = reprs[i].x + quadW / 2;
            const qcy = reprs[i].y + quadH / 2;
            boardSvg.appendChild(
              svgEl("line", {
                x1: centerX,
                y1: centerY,
                x2: qcx,
                y2: qcy,
                stroke: r.phase === "done" ? "#A5D6A7" : "#E0E0E0",
                "stroke-width": "1",
              }),
            );
          }

          /* Badge circle */
          boardSvg.appendChild(
            svgEl("circle", {
              cx: centerX,
              cy: centerY,
              r: "16",
              fill: r.phase === "done" ? "#E8F5E9" : "#FAFAF7",
              stroke: r.phase === "done" ? "#66BB6A" : "#CFD8DC",
              "stroke-width": "1.5",
            }),
          );
          const badgeTxt = svgEl("text", {
            x: centerX,
            y: centerY + 1,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            "font-family": "'Share Tech Mono', monospace",
            "font-size": "14",
            "font-weight": "bold",
            fill: r.phase === "done" ? "#388E3C" : "#78909C",
          });
          badgeTxt.textContent = "=";
          boardSvg.appendChild(badgeTxt);

          /* 4. Quad cards */
          const reprLabels = {
            bar: T("reprBar"),
            fraction: T("reprFraction"),
            numberLine: T("reprNumberLine"),
            decimal: T("reprDecimal"),
          };

          for (let i = 0; i < reprs.length; i++) {
            const repr = reprs[i];
            const isWrong = repr.type === r.wrongRepr;
            const displayValue =
              isWrong && r.phase !== "done" ? r.wrongValue : correct;

            /* Border + opacity logic */
            let borderColor = "#CFD8DC";
            let strokeW = "1.5";
            let groupOpacity = "1";

            /* Hover: selectable suspect preview */
            if (r.phase === "identify" && state.ui.hoverTarget === repr.type) {
              borderColor = "#EF9A9A";
              strokeW = "2.5";
            }

            if (r.phase === "fix") {
              if (isWrong) {
                borderColor = MODE_COLORS.repair;
                strokeW = "3";
              } else {
                groupOpacity = "0.45";
              }
            }
            if (r.phase === "done") {
              borderColor = "#66BB6A";
              strokeW = "2.5";
            }

            /* Shake transform */
            const isShaking = r.shakeRepr === repr.type;
            const shakeOff = isShaking ? r._shakeOffset || 0 : 0;

            const quadG = svgEl("g", {
              opacity: groupOpacity,
              transform: "translate(" + shakeOff + ",0)",
              "data-repr": repr.type,
              class: "repair-quad",
              style: "cursor:pointer",
            });

            /* Background rect */
            quadG.appendChild(
              svgEl("rect", {
                x: repr.x - 5,
                y: repr.y - 5,
                width: quadW + 10,
                height: quadH + 10,
                fill: "#FAFAF7",
                stroke: borderColor,
                "stroke-width": strokeW,
                rx: "8",
              }),
            );

            /* Label header */
            const lbl = svgEl("text", {
              x: repr.x + quadW / 2,
              y: repr.y + 16,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "12",
              "font-weight": "600",
              fill: "#78909C",
            });
            lbl.textContent = reprLabels[repr.type] || repr.type;
            quadG.appendChild(lbl);

            /* Quad content */
            if (repr.type === "bar") {
              const strip = renderStrip({
                x: repr.x + 20,
                y: repr.y + 35,
                width: quadW - 40,
                height: 50,
                denom: displayValue.d,
                filled: displayValue.n,
                color: "#78909C",
                ghost: 0,
              });
              quadG.appendChild(strip);
            } else if (repr.type === "fraction") {
              renderSvgFraction(
                quadG,
                repr.x + quadW / 2,
                repr.y + quadH / 2 + 8,
                displayValue.n,
                displayValue.d,
                28,
                "#263238",
              );
            } else if (repr.type === "numberLine") {
              const nl = renderNumberLine({
                x: repr.x + 20,
                y: repr.y + quadH / 2 + 10,
                width: quadW - 40,
                nlMax: 1,
                denom: correct.d,
                markers: [{ value: displayValue, color: "#455A64" }],
                benchmarks: [0, 0.5, 1],
              });
              quadG.appendChild(nl);
            } else if (repr.type === "decimal") {
              const dec = formatDecimal(displayValue.n, displayValue.d) || "?";
              const decLbl = svgEl("text", {
                x: repr.x + quadW / 2,
                y: repr.y + quadH / 2 + 10,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "30",
                "font-weight": "bold",
                fill: "#263238",
              });
              decLbl.textContent = dec;
              quadG.appendChild(decLbl);
            }
            boardSvg.appendChild(quadG);
          }

          /* 5. Phase-specific instruction */
          if (r.phase === "identify") {
            const inst = svgEl("text", {
              x: 400,
              y: startY + quadH * 2 + gapY + 35,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "14",
              "font-weight": "600",
              fill: "#455A64",
            });
            inst.textContent = T("repairIdentifyPrompt");
            boardSvg.appendChild(inst);
          }

          /* 6. Fix options anchored near wrong card */
          if (r.phase === "fix" && r.fixOptions) {
            const wrongQuad = reprs.find(function (rp) {
              return rp.type === r.wrongRepr;
            });
            const optW = 80;
            const optH = 36;
            const optGap = 10;
            const totalOptW =
              r.fixOptions.length * optW + (r.fixOptions.length - 1) * optGap;
            const optStartX = wrongQuad.x + quadW / 2 - totalOptW / 2;
            /* If wrong card is in the top row, place options below the
               entire quad grid to avoid overlapping the lower row */
            const isTopRow = wrongQuad.y < startY + quadH;
            const optY = isTopRow
              ? startY + quadH * 2 + gapY + 8
              : wrongQuad.y + quadH + 12;

            /* Callout line from wrong card to options */
            boardSvg.appendChild(
              svgEl("line", {
                x1: wrongQuad.x + quadW / 2,
                y1: wrongQuad.y + quadH + 5,
                x2: wrongQuad.x + quadW / 2,
                y2: optY,
                stroke: MODE_COLORS.repair,
                "stroke-width": "1.5",
                opacity: "0.5",
              }),
            );

            for (let fi = 0; fi < r.fixOptions.length; fi++) {
              const fo = r.fixOptions[fi];
              const fx = optStartX + fi * (optW + optGap);
              const isDecimal =
                r.wrongRepr === "decimal" && fracIsFriendlyDecimal(fo.d);

              const g = svgEl("g", {
                "data-fix-idx": fi,
                style: "cursor:pointer",
              });
              g.appendChild(
                svgEl("rect", {
                  x: fx,
                  y: optY,
                  width: optW,
                  height: optH,
                  fill: "#fff",
                  stroke: MODE_COLORS.repair,
                  "stroke-width": "2",
                  rx: "8",
                  "data-fix-idx": fi,
                }),
              );
              if (isDecimal) {
                const decStr = formatDecimal(fo.n, fo.d);
                if (decStr) {
                  const decTxt = svgEl("text", {
                    x: fx + optW / 2,
                    y: optY + optH / 2 + 2,
                    "text-anchor": "middle",
                    "dominant-baseline": "middle",
                    "font-family": "'Share Tech Mono', monospace",
                    "font-size": "15",
                    "font-weight": "bold",
                    fill: "#263238",
                    "pointer-events": "none",
                  });
                  decTxt.textContent = decStr;
                  g.appendChild(decTxt);
                } else {
                  const fg = renderSvgFraction(
                    g,
                    fx + optW / 2,
                    optY + optH / 2,
                    fo.n,
                    fo.d,
                    11,
                    "#263238",
                  );
                  fg.setAttribute("pointer-events", "none");
                }
              } else {
                const fracG = renderSvgFraction(
                  g,
                  fx + optW / 2,
                  optY + optH / 2,
                  fo.n,
                  fo.d,
                  13,
                  "#263238",
                );
                fracG.setAttribute("pointer-events", "none");
              }
              boardSvg.appendChild(g);
            }
          }

          renderStepGoal(startY + quadH * 2 + gapY + 35);
          renderBoardNextBtn(460);

          /* 7. Onboarding overlay */
          if (!state.ui.repairOnboardingSeen) {
            const overlay = svgEl("rect", {
              x: 0,
              y: 0,
              width: 800,
              height: 500,
              fill: "rgba(38,50,56,0.55)",
              class: "repair-onboarding",
              style: "cursor:pointer",
            });
            boardSvg.appendChild(overlay);
            const boxW = 440;
            const boxH = 60;
            boardSvg.appendChild(
              svgEl("rect", {
                x: (800 - boxW) / 2,
                y: 200,
                width: boxW,
                height: boxH,
                fill: "#fff",
                rx: "12",
                class: "repair-onboarding",
                style: "cursor:pointer",
              }),
            );
            const oTxt = svgEl("text", {
              x: 400,
              y: 233,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "14",
              "font-weight": "600",
              fill: "#37474F",
              "pointer-events": "none",
            });
            oTxt.textContent = T("repairOnboarding");
            boardSvg.appendChild(oTxt);
          }
        }

        function generateRepairFixOptions(correct, wrong) {
          const opts = [correct];
          const d = correct.d;

          const candidates = [];
          for (let cn = 0; cn <= d; cn++) {
            if (cn === correct.n) continue;
            if (cn === wrong.n && d === wrong.d) continue;
            candidates.push(cn);
          }

          for (let i = candidates.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = candidates[i];
            candidates[i] = candidates[j];
            candidates[j] = tmp;
          }

          for (let i = 0; i < candidates.length && opts.length < 3; i++) {
            opts.push({ n: candidates[i], d });
          }

          if (opts.length < 3 && wrong.d === d) {
            opts.push(wrong);
          }

          while (opts.length < 3) {
            const altD = d * 2;
            const altN = correct.n * 2 + (opts.length === 1 ? 1 : -1);
            opts.push({ n: Math.max(0, Math.min(altD, altN)), d: altD });
          }

          for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = opts[i];
            opts[i] = opts[j];
            opts[j] = tmp;
          }
          return opts;
        }

        function handleRepairClick(e) {
          if (state.ui.animating) return;
          const r = state.repair;

          /* Dismiss onboarding overlay */
          if (!state.ui.repairOnboardingSeen) {
            const ob = e.target.closest(".repair-onboarding");
            if (ob) {
              state.ui.repairOnboardingSeen = true;
              renderRepairBoard();
              return;
            }
          }

          if (r.phase === "done") return;

          /* Fix phase: choose correct value */
          if (r.phase === "fix") {
            const fixBtn = e.target.closest("[data-fix-idx]");
            if (!fixBtn) return;
            state.ui.animating = true;
            const idx = parseInt(fixBtn.getAttribute("data-fix-idx"), 10);
            const chosen = r.fixOptions[idx];
            if (fracEqual(chosen, r.correctValue)) {
              r.phase = "done";
              renderRepairBoard();
              setTimeout(function () {
                state.ui.animating = false;
                onSuccess();
              }, 400);
            } else {
              recordWrongAttempt();
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
              setTimeout(function () {
                state.ui.animating = false;
                renderRepairBoard();
              }, 50);
            }
            return;
          }

          /* Identify phase: find the wrong card */
          const quad = e.target.closest(".repair-quad");
          if (!quad) return;
          const repr = quad.getAttribute("data-repr");

          if (r.phase === "identify") {
            state.ui.animating = true;
            if (repr === r.wrongRepr) {
              /* Correct identification */
              r.selectedRepr = repr;
              r.focusRepr = repr;
              r.phase = "fix";
              r.fixOptions = generateRepairFixOptions(
                r.correctValue,
                r.wrongValue,
              );
              setTimeout(function () {
                state.ui.animating = false;
                renderRepairBoard();
              }, 50);
            } else {
              /* Wrong guess — shake the tapped card */
              recordWrongAttempt();
              _repairShake(repr, function () {
                state.ui.animating = false;
              });
              state.ui.feedbackText = T("tryAgain");
              state.ui.feedbackType = "error";
              updateHintDisplay();
            }
          }
        }

        /* ═══════════════════════════════════════════
           EXPLORE: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderExploreBoard() {
          clearEl(boardSvg);
          const b = state.build;
          const cfg = LEVEL_CFG[state.level];
          const denom = b.denominator;
          const needed = Math.max(1, Math.ceil(b.currentValue.n / denom));
          const wholes = Math.max(needed, 1);
          const stripW = wholeWidth(wholes);
          const stripH = 60;
          const gap = 8;
          const totalW = stripW * wholes + gap * (wholes - 1);
          const startX = (800 - totalW) / 2;
          const startY = 160;

          for (let w = 0; w < wholes; w++) {
            const wx = startX + w * (stripW + gap);
            let filledInThisWhole = 0;
            for (let s = 0; s < denom; s++) {
              const idx = w * denom + s;
              if (idx < b.filledSegments.length && b.filledSegments[idx]) {
                filledInThisWhole++;
              }
            }
            const strip = renderStrip({
              x: wx,
              y: startY,
              width: stripW,
              height: stripH,
              denom,
              filled: filledInThisWhole,
              color: MODE_COLORS.build,
              ghost: 0,
            });
            strip.setAttribute("data-whole", w);
            boardSvg.appendChild(strip);
          }

          const nlY = 320;
          const nl = renderNumberLine({
            x: startX,
            y: nlY,
            width: totalW,
            nlMax: cfg.nlMax,
            denom,
            markers:
              b.currentValue.n > 0
                ? [{ value: b.currentValue, color: MODE_COLORS.build }]
                : [],
            benchmarks: nlBenchmarks(cfg.nlMax),
          });
          boardSvg.appendChild(nl);
        }

        /* ═══════════════════════════════════════════
           ADD: RENDERER + CONTROLLER
           ═══════════════════════════════════════════ */

        function renderAddBoard() {
          clearEl(boardSvg);
          const a = state.add;
          const cd = fracLCM(a.opA.d, a.opB.d);

          renderStepGoal(30);

          /* prediction phase — estimate before solving */
          if (a.phase === "predict") {
            const resFloat = fracToFloat(a.result);
            const benchmark = resFloat > 1.5 ? 2 : 1;
            renderSvgEquation(
              boardSvg,
              400,
              170,
              [
                { type: "frac", n: a.opA.n, d: a.opA.d },
                { type: "op", str: "+" },
                { type: "frac", n: a.opB.n, d: a.opB.d },
              ],
              14,
              "#455A64",
            );
            const qEN = T("moreOrLess") + " " + benchmark + "?";
            const lessLabel = benchmark === 1 ? "< 1" : "< 2";
            const moreLabel = benchmark === 1 ? "> 1" : "> 2";
            boardSvg.appendChild(
              renderPredictionPrompt({
                x: 80,
                y: 200,
                width: 640,
                question: qEN,
                optionA: lessLabel,
                optionB: moreLabel,
              }),
            );
            renderBoardNextBtn(420);
            return;
          }

          if (a.boardType === "joinStrips") {
            /* strip equation */
            const showResult = a.phase === "reveal";
            const stripY = a.opA.d !== a.opB.d ? 100 : 80;
            const eq = renderStripEquation({
              x: 40,
              y: stripY,
              width: 720,
              height: 40,
              opA: a.opA,
              opB:
                a.missingAddend && a.phase !== "reveal"
                  ? { n: 0, d: a.opB.d }
                  : a.opB,
              result: a.result,
              operator: "+",
              showResult: showResult,
              commonDenom: cd,
              color: MODE_COLORS.add,
              resultColor: "#66BB6A",
            });
            boardSvg.appendChild(eq);

            /* visible conversion labels for unlike denominators */
            if (a.opA.d !== a.opB.d) {
              const stripW = (720 - 30 - 30 - 12 * 2) / 3;
              const lA = svgEl("text", {
                x: 40 + stripW / 2,
                y: 90,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#78909C",
              });
              lA.textContent =
                a.opA.n +
                "/" +
                a.opA.d +
                " = " +
                a.opA.n * (cd / a.opA.d) +
                "/" +
                cd;
              boardSvg.appendChild(lA);

              const lB = svgEl("text", {
                x: 40 + stripW + 12 + 30 + stripW / 2,
                y: 90,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#78909C",
              });
              lB.textContent =
                a.missingAddend && a.phase !== "reveal"
                  ? "?"
                  : a.opB.n +
                    "/" +
                    a.opB.d +
                    " = " +
                    a.opB.n * (cd / a.opB.d) +
                    "/" +
                    cd;
              boardSvg.appendChild(lB);
            }

            /* number line below */
            const nlMax = fracToFloat(a.result) > 1 ? 2 : 1;
            const nl = renderNumberLine({
              x: 80,
              y: 200,
              width: 640,
              nlMax: nlMax,
              denom: cd,
              markers: showResult
                ? [{ value: a.result, color: "#66BB6A" }]
                : [{ value: a.opA, color: MODE_COLORS.add }],
              benchmarks: nlBenchmarks(nlMax),
            });
            boardSvg.appendChild(nl);

            if (a.missingAddend && a.phase === "solve") {
              /* show answer options */
              renderAddOptions(a, cd, 280);
            } else if (a.phase === "solve") {
              /* show answer options for direct sum */
              renderAddOptions(a, cd, 280);
            }
          } else if (a.boardType === "jumpLine") {
            /* jump line board */
            const nlMax = fracToFloat(a.result) > 1 ? 2 : 1;
            const jumps =
              a.phase === "reveal"
                ? [
                    { size: a.opA, color: MODE_COLORS.add },
                    { size: a.opB, color: "#66BB6A" },
                  ]
                : [{ size: a.opA, color: MODE_COLORS.add }];
            const jl = renderJumpLine({
              x: 80,
              y: 180,
              width: 640,
              nlMax: nlMax,
              denom: cd,
              startValue: { n: 0, d: 1 },
              jumps: jumps,
              currentPos: a.phase === "reveal" ? a.result : a.opA,
            });
            boardSvg.appendChild(jl);

            if (a.phase === "solve") {
              renderAddOptions(a, cd, 300);
            }
          } else if (a.boardType === "makeOne") {
            /* Make One / Make Two — show target whole with known part filled */
            const targetWholes = Math.ceil(fracToFloat(a.result));
            const denom = a.opA.d;
            const stripW = wholeWidth(targetWholes);
            const stripH = 50;
            const gap = 8;
            const totalW = stripW * targetWholes + gap * (targetWholes - 1);
            const startX = (800 - totalW) / 2;
            const stripY = 120;

            /* target outline — full whole(s) */
            for (let w = 0; w < targetWholes; w++) {
              const wx = startX + w * (stripW + gap);
              boardSvg.appendChild(
                svgEl("rect", {
                  x: wx,
                  y: stripY,
                  width: stripW,
                  height: stripH,
                  fill: "none",
                  stroke: "#66BB6A",
                  "stroke-width": "2.5",
                  rx: "4",
                  "stroke-dasharray": "8,4",
                }),
              );
              /* whole label */
              const wLbl = svgEl("text", {
                x: wx + stripW / 2,
                y: stripY + stripH + 18,
                "text-anchor": "middle",
                "font-family": "'Share Tech Mono', monospace",
                "font-size": "12",
                fill: "#90A4AE",
              });
              wLbl.textContent = (w + 1).toString();
              boardSvg.appendChild(wLbl);
            }

            /* known part filled — per-whole strips to align with outlines */
            let segsRemaining = a.opA.n;
            for (let w = 0; w < targetWholes; w++) {
              const wx = startX + w * (stripW + gap);
              const fillInThisWhole = Math.min(segsRemaining, denom);
              boardSvg.appendChild(
                renderStrip({
                  x: wx,
                  y: stripY,
                  width: stripW,
                  height: stripH,
                  denom: denom,
                  filled: Math.max(0, fillInThisWhole),
                  color: MODE_COLORS.add,
                  ghost: 0,
                }),
              );
              segsRemaining -= denom;
            }

            /* label: known + ? = target */
            const promptTxt = svgEl("text", {
              x: 400,
              y: stripY + stripH + 45,
              "text-anchor": "middle",
              "font-family": "'Outfit', sans-serif",
              "font-size": "18",
              "font-weight": "600",
              fill: "#455A64",
            });
            promptTxt.textContent =
              a.opA.n +
              "/" +
              a.opA.d +
              " + ? = " +
              (targetWholes === 1 ? "1" : targetWholes.toString());
            boardSvg.appendChild(promptTxt);

            /* number line */
            const nl = renderNumberLine({
              x: 80,
              y: 260,
              width: 640,
              nlMax: targetWholes,
              denom: denom,
              markers: [{ value: a.opA, color: MODE_COLORS.add }],
              benchmarks: nlBenchmarks(targetWholes),
            });
            boardSvg.appendChild(nl);

            if (a.phase === "solve") {
              renderAddOptions(a, cd, 340);
            }
            if (a.phase === "reveal") {
              /* fill the complement — per-whole to align with outlines */
              let compSegsRemaining = a.opB.n;
              let compStart = a.opA.n;
              for (let w = 0; w < targetWholes && compSegsRemaining > 0; w++) {
                const wx = startX + w * (stripW + gap);
                const segStartInWhole = Math.max(0, compStart - w * denom);
                if (segStartInWhole >= denom) {
                  compStart -= 0;
                  continue;
                }
                const segsInWhole = Math.min(
                  compSegsRemaining,
                  denom - segStartInWhole,
                );
                if (segsInWhole > 0) {
                  const cSegW = stripW / denom;
                  boardSvg.appendChild(
                    svgEl("rect", {
                      x: wx + segStartInWhole * cSegW + 1,
                      y: stripY + 2,
                      width: segsInWhole * cSegW - 2,
                      height: stripH - 4,
                      fill: "#66BB6A44",
                      stroke: "#66BB6A",
                      "stroke-width": "2",
                      rx: "3",
                    }),
                  );
                  compSegsRemaining -= segsInWhole;
                }
              }
            }
          }

          if (a.phase === "reveal") {
            /* show symbolic equation using stacked fractions */
            const s = fracSimplify(a.result.n, a.result.d);
            const eqParts = [
              { type: "frac", n: a.opA.n, d: a.opA.d },
              { type: "op", str: "+" },
              { type: "frac", n: a.opB.n, d: a.opB.d },
              { type: "op", str: "=" },
              { type: "frac", n: s.n, d: s.d },
            ];
            renderSvgEquation(boardSvg, 400, 340, eqParts, 16, "#455A64");
            const resFloat = fracToFloat(a.result);
            const bm = resFloat > 1.5 ? 2 : 1;
            renderPredictionFeedback(a.prediction, resFloat, String(bm), 380);
          }

          renderBoardNextBtn(420);
        }

        function addCorrectAnswer(a) {
          return a.missingAddend
            ? fracSimplify(a.opB.n, a.opB.d)
            : fracSimplify(a.result.n, a.result.d);
        }

        function renderAddOptions(a, cd, y) {
          const correct = addCorrectAnswer(a);
          const options = [correct];

          /* generate 2 distractors based on the target answer */
          const base = a.missingAddend ? a.opB : a.result;
          const wrongA = fracSimplify(base.n + 1, base.d);
          const wrongB = fracSimplify(Math.max(1, base.n - 1), base.d);
          if (!fracEqual(wrongA, correct)) options.push(wrongA);
          if (!fracEqual(wrongB, correct) && options.length < 3)
            options.push(wrongB);
          /* fallback distractor */
          if (options.length < 3) {
            options.push(fracSimplify(base.n + 2, base.d));
          }

          /* shuffle */
