        /* ═══════════════════════════════════════════
           BOARD DISPATCH
           ═══════════════════════════════════════════ */

        const BoardRenderers = {
          build: renderBuildBoard,
          compare: renderCompareBoard,
          match: renderMatchBoard,
          place: renderPlaceBoard,
          repair: renderRepairBoard,
          add: renderAddBoard,
          subtract: renderSubtractBoard,
          multiply: renderMultiplyBoard,
          divide: renderDivideBoard,
        };

        function isCompact() {
          const el = boardSvg.parentElement;
          return el ? el.clientWidth < 500 : false;
        }

        function adaptViewBox() {
          if (isCompact()) {
            boardSvg.setAttribute("viewBox", "0 0 800 600");
          } else {
            boardSvg.setAttribute("viewBox", "0 0 800 500");
          }
        }

        function renderBoard() {
          adaptViewBox();
          if (state.scene === "explore") {
            renderExploreBoard();
          } else {
            const renderer = BoardRenderers[state.activity];
            if (renderer) renderer();
          }
        }

        /* ═══════════════════════════════════════════
           EVENT DISPATCH
           ═══════════════════════════════════════════ */

        function getSvgPoint(e) {
          const rect = boardSvg.getBoundingClientRect();
          const vb = boardSvg.viewBox.baseVal;
          return {
            x: ((e.clientX - rect.left) / rect.width) * vb.width,
            y: ((e.clientY - rect.top) / rect.height) * vb.height,
          };
        }

        boardSvg.addEventListener("pointerdown", (e) => {
          if (state.ui.animating) return;
          if (e.target.closest(".board-next-btn")) {
            nextRound();
            return;
          }
          if (state.scene === "explore") {
            handleBuildClick(e);
            return;
          }
          const act = state.activity;
          const isTouch = e.pointerType === "touch";

          /* Touch pre-commit: first tap previews, second commits */
          if (isTouch) {
            if (act === "compare" && state.compare.phase === "choose") {
              const side = e.target.closest("[data-side]");
              const tapped = side ? side.getAttribute("data-side") : null;
              if (tapped && state.ui.hoverTarget !== tapped) {
                state.ui.hoverTarget = tapped;
                renderCompareBoard();
                e.preventDefault();
                return;
              }
            }
            if (act === "repair" && state.repair.phase === "identify") {
              const rq = e.target.closest(".repair-quad");
              const tapped = rq ? rq.getAttribute("data-repr") : null;
              if (tapped && state.ui.hoverTarget !== tapped) {
                state.ui.hoverTarget = tapped;
                renderRepairBoard();
                e.preventDefault();
                return;
              }
            }
          }

          const handler = {
            build: handleBuildClick,
            compare: handleCompareClick,
            match: handleMatchClick,
            place: handlePlaceDown,
            repair: handleRepairClick,
            add: handleAddClick,
            subtract: handleSubtractClick,
            multiply: handleMultiplyClick,
            divide: handleDivideClick,
          }[act];
          if (handler) handler(e);
        });

        document.addEventListener("pointermove", (e) => {
          if (state.activity === "place" && state.scene === "activity") {
            handlePlaceMove(e);
          }
        });

        /* Board hover tracking for pre-commit states */
        boardSvg.addEventListener("pointermove", function (e) {
          if (state.ui.animating) return;
          const act = state.activity;

          if (act === "compare" && state.compare.phase === "choose") {
            const side = e.target.closest("[data-side]");
            const newHov = side ? side.getAttribute("data-side") : null;
            if (newHov !== state.ui.hoverTarget) {
              state.ui.hoverTarget = newHov;
              renderCompareBoard();
            }
          } else if (act === "build" || state.scene === "explore") {
            const seg = e.target.closest(".strip-seg");
            const idx = seg ? parseInt(seg.getAttribute("data-seg"), 10) : -1;
            const wg = seg ? seg.closest("g[data-whole]") : null;
            const wIdx = wg ? parseInt(wg.getAttribute("data-whole"), 10) : 0;
            const globalIdx =
              idx >= 0 ? wIdx * state.build.denominator + idx : -1;
            if (globalIdx !== state.ui.hoverSegIdx) {
              state.ui.hoverSegIdx = globalIdx;
              renderBuildBoard();
            }
          } else if (act === "match") {
            const mc = e.target.closest("[data-match-id]");
            const newHov = mc
              ? parseInt(mc.getAttribute("data-match-id"), 10)
              : null;
            if (newHov !== state.ui.hoverTarget) {
              state.ui.hoverTarget = newHov;
              renderMatchBoard();
            }
          } else if (act === "repair" && state.repair.phase === "identify") {
            const rq = e.target.closest(".repair-quad");
            const newHov = rq ? rq.getAttribute("data-repr") : null;
            if (newHov !== state.ui.hoverTarget) {
              state.ui.hoverTarget = newHov;
              renderRepairBoard();
            }
          }
        });
        boardSvg.addEventListener("pointerleave", function () {
          if (state.ui.hoverTarget !== null || state.ui.hoverSegIdx >= 0) {
            state.ui.hoverTarget = null;
            state.ui.hoverSegIdx = -1;
            const act = state.activity;
            if (act === "compare") renderCompareBoard();
            else if (act === "build" || state.scene === "explore")
              renderBuildBoard();
            else if (act === "match") renderMatchBoard();
            else if (act === "repair") renderRepairBoard();
          }
        });

        document.addEventListener("pointerup", () => {
          if (state.activity === "place" && state.scene === "activity") {
            handlePlaceUp();
          }
        });

        document
          .getElementById("eqBtn")
          .addEventListener("click", handleEqualClick);

        /* ═══════════════════════════════════════════
           PANEL & READOUTS
           ═══════════════════════════════════════════ */

        function updatePanel() {
          let n = -1;
          let d = 1;

          if (state.activity === "build" || state.scene === "explore") {
            n = state.build.currentValue.n;
            d = state.build.currentValue.d;
          } else if (state.activity === "compare") {
            if (state.compare.phase === "reveal") {
              const bigger =
                fracCompare(state.compare.cardA, state.compare.cardB) >= 0
                  ? state.compare.cardA
                  : state.compare.cardB;
              n = bigger.n;
              d = bigger.d;
            }
          } else if (state.activity === "repair") {
            n = state.repair.correctValue.n;
            d = state.repair.correctValue.d;
          } else if (state.activity === "add") {
            if (state.add.phase === "reveal") {
              n = state.add.result.n;
              d = state.add.result.d;
            }
          } else if (state.activity === "subtract") {
            if (state.subtract.phase === "reveal") {
              n = state.subtract.result.n;
              d = state.subtract.result.d;
            }
          } else if (state.activity === "multiply") {
            if (state.multiply.phase === "reveal") {
              n = state.multiply.product.n;
              d = state.multiply.product.d;
            }
          } else if (state.activity === "divide") {
            if (state.divide.phase === "reveal") {
              n = state.divide.quotient.n;
              d = state.divide.quotient.d;
            }
          } else if (state.activity === "match") {
            if (state.match.selectedCard !== null) {
              const sel = state.match.cards.find(
                (c) => c.id === state.match.selectedCard,
              );
              if (sel) {
                n = sel.value.n;
                d = sel.value.d;
              }
            }
          } else if (state.activity === "place") {
            const active =
              state.place.dragToken !== null
                ? state.place.tokens[state.place.dragToken]
                : state.place.tokens.find((t) => !t.placed);
            if (active) {
              n = active.n;
              d = active.d;
            }
          }

          const fracWholeEl = document.getElementById("fracWhole");
          const fracNumerEl = document.getElementById("fracNumer");
          const fracDenomEl = document.getElementById("fracDenom");
          const fracDecEl = document.getElementById("fracDecimal");

          if (n < 0) {
            fracWholeEl.textContent = "";
            fracNumerEl.textContent = "\u2014";
            fracDenomEl.textContent = "";
            fracDecEl.textContent = "";
            document.getElementById("rdSimplified").textContent = "\u2014";
            updateProgressDisplay();
            return;
          }

          const m = fracToMixed(n, d);
          if (m.whole > 0 && m.n > 0) {
            fracWholeEl.textContent = m.whole;
            fracNumerEl.textContent = m.n;
            fracDenomEl.textContent = m.d;
          } else if (m.whole > 0 && m.n === 0) {
            fracWholeEl.textContent = m.whole;
            fracNumerEl.textContent = "";
            fracDenomEl.textContent = "";
          } else {
            fracWholeEl.textContent = "";
            fracNumerEl.textContent = n;
            fracDenomEl.textContent = d;
          }

          const dec = formatDecimal(n, d);
          fracDecEl.textContent = dec && d > 1 ? "= " + dec : "";

          const s = fracSimplify(n, d);
          document.getElementById("rdSimplified").textContent =
            s.d === 1 ? s.n.toString() : fracFormat(s.n, s.d);

          updateProgressDisplay();
        }

        function updateProgressDisplay() {
          const p = state.progress[state.family][state.activity][state.level];
          const total = getSequenceLength();
          const pct = total > 0 ? Math.min(100, (p / total) * 100) : 0;
          document.getElementById("progressFill").style.width = pct + "%";
          document.getElementById("progressLabel").textContent =
            p + " / " + total;
        }

        function updateHintDisplay() {
          const el = document.getElementById("hintText");
          el.textContent = state.ui.feedbackText;
          el.className = "hint-text";
          if (state.ui.feedbackType) {
            el.classList.add(state.ui.feedbackType);
          }
        }

        function updateModeSummary() {
          const key = state.activity + "Summary";
          document.getElementById("modeSummary").textContent = T(key);
          const step = getCurrentStep();
          const statusEl = document.getElementById("statusText");
          const goalStr2 = stepText(step, "goal");
          statusEl.textContent = goalStr2 || "";
        }

        /* ═══════════════════════════════════════════
           SEQUENCE & PROGRESSION
           ═══════════════════════════════════════════ */

        function getSequenceLength() {
          const seq = SEQ[state.family][state.activity];
          if (!seq) return 6;
          const steps = seq[state.level];
          if (!steps) return 6;
          return steps.length;
        }

        function getCurrentStep() {
          const seq = SEQ[state.family][state.activity];
          if (!seq) return null;
          const steps = seq[state.level];
          if (!steps) return null;
          const idx = state.sequence.currentStep;
          if (idx >= steps.length) return null;
          return steps[idx];
        }

        function loadStep() {
          const step = getCurrentStep();
          if (!step) {
            state.sequence.inFreePlay = true;
            loadRandomStep();
            return;
          }

          state.ui.hintLevel = 0;
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.stepComplete = false;
          state.ui.roundWrongAttempts = 0;
          state.ui.rewardVisible = false;
          document.getElementById("nextBtn").disabled = true;

          if (state.activity === "build") {
            const cfg = LEVEL_CFG[state.level];
            const target = step.target;
            state.build.target = target;
            state.build.denominator = target.d;
            const neededWholes = Math.ceil(target.n / target.d);
            state.build.maxWholes = Math.max(cfg.maxWholes, neededWholes);
            state.build.showGhost = true;
            const total = target.d * state.build.maxWholes;
            state.build.filledSegments = new Array(total).fill(false);
            state.build.currentValue = { n: 0, d: target.d };
          } else if (state.activity === "compare") {
            state.compare.cardA = step.cardA;
            state.compare.cardB = step.cardB;
            state.compare.isEqual = !!step.isEqual;
            state.compare.phase = "choose";
            state.compare.childChoice = null;
            state.compare.displayA = undefined;
            state.compare.displayB = undefined;
            const cmp = fracCompare(step.cardA, step.cardB);
            state.compare.correctAnswer =
              cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
          } else if (state.activity === "place") {
            const cfg = LEVEL_CFG[state.level];
            state.place.tokens = step.tokens.map((t, i) => ({
              ...t,
              id: i,
              placed: false,
              placedValue: null,
              placedX: null,
            }));
            state.place.nlDenom = step.nlDenom || cfg.denoms[0];
            state.place.nlMax = step.nlMax || cfg.nlMax;
            state.place.dragToken = null;
            state.place.hoverSnapValue = null;
            state.place.hoverSnapX = null;
            state.place.hoverActive = false;
            state.place._bounceAnim = null;
          } else if (state.activity === "match") {
            setupMatchCards(step);
          } else if (state.activity === "repair") {
            state.repair.correctValue = step.correct;
            state.repair.wrongRepr = step.wrongRepr;
            state.repair.wrongValue = step.wrongValue;
            state.repair.phase = "identify";
            state.repair.selectedRepr = null;
            state.repair.fixOptions = null;
            state.repair.focusRepr = null;
            state.repair.shakeRepr = null;
          } else if (state.activity === "add") {
            const v = step.values;
            state.add.opA = v.opA;
            state.add.opB = v.opB;
            state.add.result = v.result;
            state.add.boardType = step.boardType || "joinStrips";
            state.add.phase =
              step.concept && step.concept.indexOf("estimate") === 0
                ? "predict"
                : "solve";
            state.add.childAnswer = null;
            state.add.prediction = null;
            state.add.missingAddend = !!step.missingAddend;
          } else if (state.activity === "subtract") {
            const v = step.values;
            state.subtract.minuend = v.minuend;
            state.subtract.subtrahend = v.subtrahend;
            state.subtract.result = v.result;
            state.subtract.boardType = step.boardType || "takeAwayStrip";
            state.subtract.phase =
              step.concept && step.concept.indexOf("estimate") === 0
                ? "predict"
                : "solve";
            state.subtract.childAnswer = null;
            state.subtract.prediction = null;
          } else if (state.activity === "multiply") {
            const v = step.values;
            state.multiply.factorA = v.factorA;
            state.multiply.factorB = v.factorB;
            state.multiply.product = v.product;
            state.multiply.boardType = step.boardType || "fractionOf";
            state.multiply.phase =
              step.concept && step.concept.indexOf("estimate") === 0
                ? "predict"
                : "solve";
            state.multiply.childAnswer = null;
            state.multiply.prediction = null;
          } else if (state.activity === "divide") {
            const v = step.values;
            state.divide.dividend = v.dividend;
            state.divide.divisor = v.divisor;
            state.divide.quotient = v.quotient;
            state.divide.boardType = step.boardType || "shareFairly";
            state.divide.phase =
              step.concept && step.concept.indexOf("estimate") === 0
                ? "predict"
                : "solve";
            state.divide.childAnswer = null;
            state.divide.prediction = null;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          updateHintDisplay();
          renderBoard();
          updatePanel();
        }

        function setupMatchCards(step) {
          const m = state.match;
          m.cards = [];
          m.selectedCard = null;
          m.matchedPairs = [];
          let idCounter = 0;

          const pairs = step.pairs;
          const reprTypes = step.reprTypes;

          for (let i = 0; i < pairs.length; i++) {
            for (let r = 0; r < reprTypes.length; r++) {
              const repr = reprTypes[r];
              const card = {
                id: idCounter++,
                value: pairs[i],
                repr,
                matched: false,
              };
              if (repr === "equivalent" && step.equivMap) {
                const key = fracFormat(pairs[i].n, pairs[i].d);
                card.displayValue = step.equivMap[key] || pairs[i];
              }
              m.cards.push(card);
            }
          }

          for (let i = m.cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = m.cards[i];
            m.cards[i] = m.cards[j];
            m.cards[j] = tmp;
          }

          m.totalPairs = pairs.length;
        }

        function loadRandomStep() {
          state.ui.roundWrongAttempts = 0;
          state.ui.rewardVisible = false;
          if (state.activity === "build") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter((d) => d <= 12);
            const d = denoms[Math.floor(Math.random() * denoms.length)];
            const maxN = d * cfg.maxWholes;
            const n = 1 + Math.floor(Math.random() * (maxN - 1));
            state.build.target = { n, d };
            state.build.denominator = d;
            state.build.maxWholes = cfg.maxWholes;
            state.build.showGhost = true;
            state.build.filledSegments = new Array(d * cfg.maxWholes).fill(
              false,
            );
            state.build.currentValue = { n: 0, d };
          } else if (state.activity === "compare") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const dA = denoms[Math.floor(Math.random() * denoms.length)];
            const dB = denoms[Math.floor(Math.random() * denoms.length)];
            const nA = 1 + Math.floor(Math.random() * (dA - 1));
            const nB = 1 + Math.floor(Math.random() * (dB - 1));
            state.compare.cardA = { n: nA, d: dA };
            state.compare.cardB = { n: nB, d: dB };
            state.compare.isEqual = false;
            state.compare.phase = "choose";
            state.compare.childChoice = null;
            state.compare.displayA = undefined;
            state.compare.displayB = undefined;
            if (state.level >= 2 && Math.random() < 0.3) {
              if (fracIsFriendlyDecimal(dA) && Math.random() < 0.5) {
                state.compare.displayA = "decimal";
              } else if (fracIsFriendlyDecimal(dB)) {
                state.compare.displayB = "decimal";
              }
            }
            const cmp = fracCompare({ n: nA, d: dA }, { n: nB, d: dB });
            state.compare.correctAnswer =
              cmp > 0 ? "left" : cmp < 0 ? "right" : "equal";
            if (cmp === 0) state.compare.isEqual = true;
          } else if (state.activity === "place") {
            const cfg = LEVEL_CFG[state.level];
            const isAdv = state.level >= 3;
            const placeNlMax = isAdv ? 1 : cfg.nlMax;
            const placeDenoms = isAdv
              ? cfg.denoms.filter((dd) => dd >= 8 && dd <= 20)
              : cfg.denoms.filter((dd) => dd <= 10);
            const tokenCount = state.level <= 1 ? 1 : 2;
            const tokens = [];
            const usedD =
              placeDenoms[Math.floor(Math.random() * placeDenoms.length)];
            while (tokens.length < tokenCount) {
              const tn =
                1 + Math.floor(Math.random() * (usedD * placeNlMax - 1));
              let dup = false;
              for (let ti = 0; ti < tokens.length; ti++) {
                if (tokens[ti].n === tn && tokens[ti].d === usedD) dup = true;
              }
              if (!dup) {
                const tdec = formatDecimal(tn, usedD);
                tokens.push({
                  n: tn,
                  d: usedD,
                  label: tdec || undefined,
                  asDecimal: !!tdec,
                  id: tokens.length,
                  placed: false,
                  placedValue: null,
                  placedX: null,
                });
              }
            }
            state.place.tokens = tokens;
            state.place.nlDenom = usedD;
            state.place.nlMax = placeNlMax;
            state.place.dragToken = null;
            state.place.hoverSnapValue = null;
            state.place.hoverSnapX = null;
            state.place.hoverActive = false;
            state.place._bounceAnim = null;
          } else if (state.activity === "match") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const pairs = [];
            while (pairs.length < 3) {
              const d = denoms[Math.floor(Math.random() * denoms.length)];
              const n = 1 + Math.floor(Math.random() * (d - 1));
              let dup = false;
              for (let p = 0; p < pairs.length; p++) {
                if (fracEqual(pairs[p], { n, d })) dup = true;
              }
              if (!dup) pairs.push({ n, d });
            }
            const roll = Math.random();
            let matchRepr;
            let equivMap;
            if (state.level <= 1) {
              matchRepr = ["fraction", "bar"];
            } else if (roll < 0.33) {
              matchRepr = ["fraction", "decimal"];
            } else if (roll < 0.66) {
              matchRepr = ["fraction", "equivalent"];
              equivMap = {};
              for (let ei = 0; ei < pairs.length; ei++) {
                const ep = pairs[ei];
                const mult = 2 + Math.floor(Math.random() * 3);
                equivMap[fracFormat(ep.n, ep.d)] = {
                  n: ep.n * mult,
                  d: ep.d * mult,
                };
              }
            } else {
              matchRepr = ["fraction", "bar"];
            }
            const matchStep = {
              pairs,
              reprTypes: matchRepr,
              hint1: "",
              hint2: "",
              feedbackSuccess: T("correct"),
            };
            if (equivMap) matchStep.equivMap = equivMap;
            setupMatchCards(matchStep);
          } else if (state.activity === "repair") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter((d) => d <= 10);
            const d = denoms[Math.floor(Math.random() * denoms.length)];
            const n = 1 + Math.floor(Math.random() * (d - 1));
            const reprTypes = ["fraction", "decimal", "numberLine", "bar"];
            const wrongRepr =
              reprTypes[Math.floor(Math.random() * reprTypes.length)];
            let wn = n + (Math.random() < 0.5 ? 1 : -1);
            wn = Math.max(0, Math.min(d, wn));
            if (wn === n) wn = n > 0 ? n - 1 : n + 1;
            state.repair.correctValue = { n, d };
            state.repair.wrongRepr = wrongRepr;
            state.repair.wrongValue = { n: wn, d };
            state.repair.phase = "identify";
            state.repair.selectedRepr = null;
            state.repair.fixOptions = null;
            state.repair.focusRepr = null;
            state.repair.shakeRepr = null;
          } else if (state.activity === "add") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter(function (dd) {
              return dd <= 12;
            });
            const dA = denoms[Math.floor(Math.random() * denoms.length)];
            const dB =
              state.level >= 3
                ? denoms[Math.floor(Math.random() * denoms.length)]
                : dA;
            const maxA = dA * cfg.maxWholes;
            const nA = 1 + Math.floor(Math.random() * (maxA - 1));
            const maxB = dB * cfg.maxWholes;
            const nB = 1 + Math.floor(Math.random() * Math.min(maxB - 1, maxA));
            const result = fracAdd({ n: nA, d: dA }, { n: nB, d: dB });
            state.add.opA = { n: nA, d: dA };
            state.add.opB = { n: nB, d: dB };
            state.add.result = { n: result.n, d: result.d };
            const addRoll = Math.random();
            if (addRoll < 0.2) {
              state.add.boardType = "makeOne";
              state.add.missingAddend = true;
              /* recalculate for make-one: target is 1 whole */
              const mDenom = dA;
              const mNa = 1 + Math.floor(Math.random() * (mDenom - 2));
              state.add.opA = { n: mNa, d: mDenom };
              state.add.opB = { n: mDenom - mNa, d: mDenom };
              state.add.result = { n: mDenom, d: mDenom };
            } else {
              state.add.boardType = addRoll < 0.6 ? "joinStrips" : "jumpLine";
              state.add.missingAddend = false;
            }
            state.add.phase =
              state.level >= 5 && Math.random() < 0.2 ? "predict" : "solve";
            state.add.childAnswer = null;
            state.add.prediction = null;
          } else if (state.activity === "subtract") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter(function (dd) {
              return dd <= 12;
            });
            let dA = denoms[Math.floor(Math.random() * denoms.length)];
            let dB =
              state.level >= 3
                ? denoms[Math.floor(Math.random() * denoms.length)]
                : dA;
            let nA = 2 + Math.floor(Math.random() * (dA - 2));
            let nB = 1 + Math.floor(Math.random() * Math.min(nA - 1, dB - 1));
            /* ensure minuend > subtrahend */
            if (nA * dB <= nB * dA) {
              const tmpN = nA;
              const tmpD = dA;
              nA = nB;
              dA = dB;
              nB = tmpN;
              dB = tmpD;
              if (nA * dB <= nB * dA) {
                nB = 1;
              }
            }
            const result = fracSubtract({ n: nA, d: dA }, { n: nB, d: dB });
            state.subtract.minuend = { n: nA, d: dA };
            state.subtract.subtrahend = { n: nB, d: dB };
            state.subtract.result = { n: result.n, d: result.d };
            const subRoll = Math.random();
            state.subtract.boardType =
              subRoll < 0.5
                ? "takeAwayStrip"
                : subRoll < 0.85
                  ? "gapFinder"
                  : "repairDifference";
            state.subtract.phase =
              state.level >= 5 && Math.random() < 0.2 ? "predict" : "solve";
            state.subtract.childAnswer = null;
            state.subtract.prediction = null;
          } else if (state.activity === "multiply") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter(function (dd) {
              return dd <= 8;
            });
            const dA = denoms[Math.floor(Math.random() * denoms.length)];
            const dB = denoms[Math.floor(Math.random() * denoms.length)];
            const nA = 1 + Math.floor(Math.random() * (dA - 1));
            const nB = 1 + Math.floor(Math.random() * (dB - 1));
            const product = _fracMultiply({ n: nA, d: dA }, { n: nB, d: dB });
            state.multiply.factorA = { n: nA, d: dA };
            state.multiply.factorB = { n: nB, d: dB };
            state.multiply.product = { n: product.n, d: product.d };
            const mulRoll = Math.random();
            if (state.level >= 4) {
              state.multiply.boardType =
                mulRoll < 0.6 ? "areaQuilt" : "scaleMachine";
            } else if (state.level >= 2 && mulRoll < 0.3) {
              /* repeatPiece: make factorA a whole number */
              const wholeA = 2 + Math.floor(Math.random() * 3);
              state.multiply.factorA = { n: wholeA, d: 1 };
              state.multiply.product = _fracMultiply(
                { n: wholeA, d: 1 },
                { n: nB, d: dB },
              );
              state.multiply.boardType = "repeatPiece";
            } else {
              state.multiply.boardType =
                mulRoll < 0.7 ? "fractionOf" : "scaleMachine";
            }
            state.multiply.phase =
              state.level >= 5 && Math.random() < 0.2 ? "predict" : "solve";
            state.multiply.childAnswer = null;
            state.multiply.prediction = null;
          } else if (state.activity === "divide") {
            const cfg = LEVEL_CFG[state.level];
            const denoms = cfg.denoms.filter(function (dd) {
              return dd <= 8;
            });
            if (state.level <= 2) {
              const divisor = 2 + Math.floor(Math.random() * 3);
              state.divide.dividend = { n: 1, d: 1 };
              state.divide.divisor = { n: divisor, d: 1 };
              state.divide.quotient = fracSimplify(1, divisor);
              state.divide.boardType = "shareFairly";
            } else if (Math.random() < 0.5) {
              /* sharing: fraction ÷ whole */
              const d = denoms[Math.floor(Math.random() * denoms.length)];
              const n = 1 + Math.floor(Math.random() * (d - 1));
              const divisor = 2 + Math.floor(Math.random() * 3);
              const quotient = fracSimplify(n, d * divisor);
              state.divide.dividend = { n: n, d: d };
              state.divide.divisor = { n: divisor, d: 1 };
              state.divide.quotient = quotient;
              state.divide.boardType = "shareFairly";
            } else {
              /* measurement: whole ÷ unit fraction */
              const wholes = 1 + Math.floor(Math.random() * cfg.maxWholes);
              const d = denoms[Math.floor(Math.random() * denoms.length)];
              state.divide.dividend = { n: wholes, d: 1 };
              state.divide.divisor = { n: 1, d: d };
              state.divide.quotient = { n: wholes * d, d: 1 };
              state.divide.boardType = "howManyFit";
            }
            state.divide.phase =
              state.level >= 5 && Math.random() < 0.2 ? "predict" : "solve";
            state.divide.childAnswer = null;
            state.divide.prediction = null;
          }

          document.getElementById("eqBtn").classList.remove("visible");
          renderBoard();
          updatePanel();
          updateHintDisplay();
        }

        function recordWrongAttempt() {
          state.ui.roundWrongAttempts++;
        }

        function getRewardStars() {
          const w = state.ui.roundWrongAttempts;
          if (w === 0) return 3;
          if (w === 1) return 2;
          return 1;
        }

        function showSuccessStars(stars) {
          const g = svgEl("g", {
            "pointer-events": "none",
            class: "reward-stars",
          });
          const starPath =
            "M0,-12 L3.5,-4 12,-4 5.5,2 7.5,11 0,6 -7.5,11 -5.5,2 -12,-4 -3.5,-4Z";
          const cx = 400;
          const cy = 260;
          const gap = 44;
          const reducedMotion = window.matchMedia(
            "(prefers-reduced-motion: reduce)",
          ).matches;

          for (let i = 0; i < 3; i++) {
            const earned = i < stars;
            const sx = cx + (i - 1) * gap;
            const star = svgEl("path", {
              d: starPath,
              fill: earned ? "#FFB300" : "#CFD8DC",
              opacity: earned ? "1" : "0.35",
              transform:
                "translate(" +
                sx +
                "," +
                cy +
                ") scale(" +
                (reducedMotion ? (earned ? 1.6 : 1.2) : 0) +
                ")",
            });
            g.appendChild(star);
          }
          boardSvg.appendChild(g);

          /* Aria announcement */
          const key =
            stars === 3 ? "reward3" : stars === 2 ? "reward2" : "reward1";
          let announcer = document.getElementById("rewardAnnounce");
          if (!announcer) {
            announcer = document.createElement("div");
            announcer.id = "rewardAnnounce";
            announcer.setAttribute("aria-live", "polite");
            announcer.setAttribute("role", "status");
            announcer.style.cssText =
              "position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)";
            document.body.appendChild(announcer);
          }
          announcer.textContent = T(key);

          /* Animate: staggered pop then fade */
          const starEls = g.querySelectorAll("path");
          if (reducedMotion) {
            /* Static display, then remove after delay */
            setTimeout(function () {
              let frame = 0;
              const totalFrames = 20;
              function fade() {
                frame++;
                g.setAttribute("opacity", Math.max(0, 1 - frame / totalFrames));
                if (frame < totalFrames) {
                  requestAnimationFrame(fade);
                } else if (g.parentNode) {
                  g.parentNode.removeChild(g);
                }
              }
              requestAnimationFrame(fade);
            }, 1000);
          } else {
            /* Staggered pop-in */
            let popDone = 0;
            starEls.forEach(function (el, i) {
              const earned = i < stars;
              const sx = cx + (i - 1) * gap;
              const targetScale = earned ? 1.6 : 1.2;
              const delay = i * 80;
              setTimeout(function () {
                let frame = 0;
                const popFrames = 12;
                function pop() {
                  frame++;
                  const t = frame / popFrames;
                  const ease = 1 - Math.pow(1 - t, 3);
                  const s = ease * targetScale;
                  el.setAttribute(
                    "transform",
                    "translate(" + sx + "," + cy + ") scale(" + s + ")",
                  );
                  if (frame < popFrames) {
                    requestAnimationFrame(pop);
                  } else {
                    popDone++;
                    if (popDone === 3) {
                      /* All popped — hold then fade */
                      setTimeout(function () {
                        let ff = 0;
                        const fadeFrames = 30;
                        function fadeAll() {
                          ff++;
                          const fo = Math.max(0, 1 - ff / fadeFrames);
                          g.setAttribute("opacity", fo);
                          if (ff < fadeFrames) {
                            requestAnimationFrame(fadeAll);
                          } else if (g.parentNode) {
                            g.parentNode.removeChild(g);
                          }
                        }
                        requestAnimationFrame(fadeAll);
                      }, 700);
                    }
                  }
                }
                requestAnimationFrame(pop);
              }, delay);
            });
          }

          state.ui.rewardVisible = true;
          state.ui.lastRewardStars = stars;
        }

        function onSuccess() {
          state.progress[state.family][state.activity][state.level]++;
          state.ui.stepComplete = true;
          document.getElementById("nextBtn").disabled = false;
          const step = getCurrentStep();
          const fbText = stepText(step, "feedbackSuccess") || T("correct");
          state.ui.feedbackText = fbText;
          state.ui.feedbackType = "success";
          updateHintDisplay();
          updateProgressDisplay();
          renderBoard();
          showSuccessStars(getRewardStars());
        }

        function nextRound() {
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.hintLevel = 0;
          updateHintDisplay();

          if (!state.sequence.inFreePlay) {
            state.sequence.currentStep++;
          }
          loadStep();
        }

        /* ═══════════════════════════════════════════
           NAVIGATION & MODE SWITCHING
           ═══════════════════════════════════════════ */

        function renderModeButtons() {
          const row = document.getElementById("modeRow");
          while (row.firstChild) row.removeChild(row.firstChild);
          const modes = FAMILY_MODES[state.family];
          for (let i = 0; i < modes.length; i++) {
            const mode = modes[i];
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className =
              "mode-btn" + (mode === state.activity ? " active" : "");
            btn.setAttribute("data-mode", mode);
            btn.textContent = T(mode);
            btn.addEventListener("click", function () {
              setMode(mode);
            });
            row.appendChild(btn);
          }
        }

        function setFamily(family) {
          state.family = family;
          state.activity = state.lastMode[family];
          state.scene = "activity";
          document.querySelectorAll(".family-btn").forEach(function (btn) {
            btn.classList.toggle(
              "active",
              btn.getAttribute("data-family") === family,
            );
          });
          document.getElementById("exploreBtn").classList.remove("active");
          document.getElementById("exploreCtrls").classList.remove("visible");
          document.getElementById("exploreBtn").disabled =
            family === "calculate";
          renderModeButtons();
          document.documentElement.style.setProperty(
            "--mode-active",
            "var(--mode-" + state.activity + ")",
          );
          updateModeSummary();
          startSequence();
        }

        function setMode(mode) {
          state.activity = mode;
          state.family = FAMILY_MODES.represent.includes(mode)
            ? "represent"
            : "calculate";
          state.lastMode[state.family] = mode;
          state.scene = "activity";
          state.ui.hoverTarget = null;
          state.ui.hoverSegIdx = -1;
          state.build.touchPreview = -1;
          document.querySelectorAll(".mode-btn").forEach(function (btn) {
            btn.classList.toggle(
              "active",
              btn.getAttribute("data-mode") === mode,
            );
          });
          document.getElementById("exploreBtn").classList.remove("active");
          document.getElementById("exploreCtrls").classList.remove("visible");
          document.documentElement.style.setProperty(
            "--mode-active",
            "var(--mode-" + mode + ")",
          );
          updateModeSummary();
          startSequence();
        }

        function setLevel(n) {
          state.level = n;
          document.querySelectorAll(".level-btn").forEach(function (btn) {
            btn.classList.toggle(
              "active",
              btn.getAttribute("data-level") === String(n),
            );
          });
          if (state.scene === "explore") {
            state.scene = "activity";
            document.getElementById("exploreBtn").classList.remove("active");
            document.getElementById("exploreCtrls").classList.remove("visible");
          }
          startSequence();
        }

        function startSequence() {
          state.sequence.currentStep = 0;
          state.sequence.inFreePlay = false;
          state.ui.feedbackText = "";
          state.ui.feedbackType = "";
          state.ui.hintLevel = 0;
          loadStep();
        }

        function toggleExplore() {
          if (state.family === "calculate") return;
          if (state.scene === "explore") {
            state.scene = "activity";
            document.getElementById("exploreBtn").classList.remove("active");
            document.getElementById("exploreCtrls").classList.remove("visible");
            startSequence();
          } else {
            state.scene = "explore";
            document.getElementById("exploreBtn").classList.add("active");
            document.getElementById("exploreCtrls").classList.add("visible");
            const cfg = LEVEL_CFG[state.level];
            state.build.denominator = 2;
            state.build.maxWholes = cfg.maxWholes;
            state.build.filledSegments = new Array(2 * cfg.maxWholes).fill(
              false,
            );
            state.build.currentValue = { n: 0, d: 2 };
            updateExploreControls();
            renderBoard();
            updatePanel();
            updateModeSummary();
          }
        }

        function updateExploreControls() {
          document.getElementById("denomVal").textContent =
            state.build.denominator;
          document.getElementById("numerVal").textContent =
            state.build.currentValue.n;
        }

        function stepDenominator(delta) {
          const denoms = LEVEL_CFG[state.level].denoms;
          let idx = denoms.indexOf(state.build.denominator);
          if (idx < 0) idx = 0;
          idx = Math.max(0, Math.min(denoms.length - 1, idx + delta));
          const cfg = LEVEL_CFG[state.level];
          const oldVal = fracToFloat(state.build.currentValue);
          state.build.denominator = denoms[idx];
          const newN = Math.round(oldVal * denoms[idx]);
          const maxN = denoms[idx] * cfg.maxWholes;
          state.build.currentValue = {
            n: Math.max(0, Math.min(maxN, newN)),
            d: denoms[idx],
          };
          state.build.filledSegments = new Array(
            denoms[idx] * cfg.maxWholes,
          ).fill(false);
          for (let i = 0; i < state.build.currentValue.n; i++) {
            state.build.filledSegments[i] = true;
          }
          updateExploreControls();
          renderBoard();
          updatePanel();
        }

        function stepNumerator(delta) {
          const cfg = LEVEL_CFG[state.level];
          const maxN = state.build.denominator * cfg.maxWholes;
          const newN = Math.max(
            0,
            Math.min(maxN, state.build.currentValue.n + delta),
          );
          state.build.currentValue = { n: newN, d: state.build.denominator };
          state.build.filledSegments = new Array(
            state.build.denominator * cfg.maxWholes,
          ).fill(false);
          for (let i = 0; i < newN; i++) {
            state.build.filledSegments[i] = true;
          }
          updateExploreControls();
          renderBoard();
          updatePanel();
        }

        function showHint() {
          const step = getCurrentStep();
          if (!step) return;
          state.ui.hintLevel = Math.min(state.ui.hintLevel + 1, 2);
          const key = state.ui.hintLevel === 1 ? "hint1" : "hint2";
          state.ui.feedbackText = stepText(step, key);
          state.ui.feedbackType = "";
          updateHintDisplay();
        }

        /* ═══════════════════════════════════════════
           BUTTON WIRING
           ═══════════════════════════════════════════ */

        document.querySelectorAll(".family-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            setFamily(btn.getAttribute("data-family"));
          });
        });

        document.querySelectorAll(".level-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            setLevel(parseInt(btn.getAttribute("data-level"), 10));
          });
        });

        document
          .getElementById("exploreBtn")
          .addEventListener("click", toggleExplore);
        document.getElementById("hintBtn").addEventListener("click", showHint);
        document.getElementById("nextBtn").addEventListener("click", nextRound);
        document.getElementById("langBtn").addEventListener("click", () => {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        });
        document
          .getElementById("denomMinus")
          .addEventListener("click", () => stepDenominator(-1));
        document
          .getElementById("denomPlus")
          .addEventListener("click", () => stepDenominator(1));
        document
          .getElementById("numerMinus")
          .addEventListener("click", () => stepNumerator(-1));
        document
          .getElementById("numerPlus")
          .addEventListener("click", () => stepNumerator(1));

        /* ═══════════════════════════════════════════
           KEYBOARD
           ═══════���═══════════════════════════════════ */

        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight" && state.scene === "explore") {
            stepNumerator(1);
            e.preventDefault();
          } else if (e.key === "ArrowLeft" && state.scene === "explore") {
            stepNumerator(-1);
            e.preventDefault();
          } else if (e.key === "Enter" || e.key === " ") {
            if (
              state.ui.feedbackType === "success" ||
              (state.activity === "compare" && state.compare.phase === "reveal")
            ) {
              nextRound();
              e.preventDefault();
            }
          }
        });

        /* ═══════════════════════════════════════════
           TRANSLATIONS
           ═══════════════════════════════════════════ */

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          document.getElementById("langBtn").textContent =
            state.lang === "en" ? "PL" : "EN";
          document.querySelectorAll(".family-btn").forEach(function (btn) {
            btn.textContent = T(btn.getAttribute("data-family"));
          });
          renderModeButtons();
          document.getElementById("exploreBtn").textContent = T("explore");
          document.getElementById("hintBtn").textContent = T("hint");
          document.getElementById("nextBtn").textContent = T("next");
          document.getElementById("lblActivity").textContent = T("activity");
          document.getElementById("lblValue").textContent = T("value");
          document.getElementById("lblSimplified").textContent =
            T("simplified");
          document.getElementById("lblProgress").textContent = T("progress");
          document.getElementById("lblDenom").textContent = T("denominator");
          document.getElementById("lblNumer").textContent = T("numerator");

          const eqBtnEl = document.getElementById("eqBtn");
          eqBtnEl.textContent = "= " + T("equalBtn");
          eqBtnEl.setAttribute("aria-label", T("ariaEqual"));

          document
            .querySelector("a[aria-label]")
            .setAttribute("aria-label", T("ariaBackToLearn"));
          document.getElementById("langBtn").title = T("ariaSwitchLang");
          document
            .getElementById("nextBtn")
            .setAttribute("aria-label", T("ariaNextRound"));
          document
            .getElementById("boardSvg")
            .setAttribute("aria-label", T("ariaBoard"));
          document
            .getElementById("denomMinus")
            .setAttribute("aria-label", T("ariaDecDenom"));
          document
            .getElementById("denomPlus")
            .setAttribute("aria-label", T("ariaIncDenom"));
          document
            .getElementById("numerMinus")
            .setAttribute("aria-label", T("ariaDecNumer"));
          document
            .getElementById("numerPlus")
            .setAttribute("aria-label", T("ariaIncNumer"));

          document
            .querySelector('meta[name="description"]')
            .setAttribute("content", T("subtitle"));

          updateModeSummary();
          renderBoard();
          updatePanel();
        }

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */

        /* ═══════════════════════════════════════════
           VISIBILITY
           ═══════════════════════════════════════════ */

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {
            renderBoard();
          }
        });

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */

        function init() {
          applyTranslations();
          setFamily("represent");
        }

        init();
      })();
    </script>
  </body>
</html>
