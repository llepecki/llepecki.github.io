<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conservation of Momentum</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAFAF7;
  --panel: #ffffff;
  --panel-border: #E0DDD6;
  --text: #37474F;
  --text-head: #263238;
  --text-dim: #78909C;
  --text-label: #90A4AE;
  --accent: #455A64;
  --accent-light: #ECEFF1;
  --canvas-bg: #f5f3ee;
  --obj-a: #D32F2F;
  --obj-b: #1565C0;
  --total: #00C853;
  --ke: #7B1FA2;
}
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #FAFAF7 0%, #F0EDE6 100%);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
header {
  padding: 6px 28px 5px;
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: center; gap: 12px;
}
.header-text { flex: 1; }
header h1 {
  font-size: 18px; font-weight: 700; color: var(--text-head);
  display: flex; align-items: center; gap: 8px;
}
header h1 a { color: inherit; text-decoration: none; }
header h1 a:hover { opacity: .7; }
header p { margin-top: 1px; font-size: 12px; color: var(--text-dim); }
.lang-btn {
  background: none; border: 1px solid var(--panel-border);
  border-radius: 4px; padding: 3px 8px;
  cursor: pointer; flex-shrink: 0;
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  transition: border-color 0.15s, color 0.15s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.main { display: flex; height: calc(100vh - 46px); }
.canvas-wrap {
  flex: 1; position: relative; min-width: 0;
  background: var(--canvas-bg);
  border-right: 1px solid var(--panel-border);
}
canvas { display: block; width: 100%; height: 100%; }
.panel {
  width: 300px; flex-shrink: 0;
  background: var(--panel);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.controls {
  padding: 20px;
  display: flex; flex-direction: column; gap: 18px;
  border-bottom: 1px solid var(--panel-border);
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
#grpExplore, #grpGame { display: flex; flex-direction: column; gap: 18px; }
.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-label);
  padding-bottom: 2px; border-bottom: 1px solid var(--panel-border);
}
.ctrl-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-label);
}
.type-toggle { display: flex; gap: 6px; }
.type-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px;
  border: 2px solid transparent;
  background: #FAFAF7; color: #546E7A;
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: center;
  touch-action: manipulation;
}
.type-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.type-btn:hover { background: #F0EDE6; }
.type-btn:disabled { opacity: 0.4; pointer-events: none; }
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 6px; background: #E0DDD6; border-radius: 3px; outline: none;
  touch-action: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.slider-row input[type=range]:disabled { opacity: 0.4; }
.slider-val {
  min-width: 52px; text-align: right;
  font-family: 'Share Tech Mono', monospace; font-size: 13px;
  font-weight: 700; color: var(--text-head);
}
#playBtn, #stopBtn {
  display: flex; align-items: center; justify-content: center;
  padding: 10px;
}
#playBtn .pause-icon { display: none; }
#playBtn.playing .play-icon { display: none; }
#playBtn.playing .pause-icon { display: block; }
.btn-row { display: flex; gap: 8px; }
.readout-section { display: flex; flex-direction: column; gap: 3px; }
.readout-row { display: flex; justify-content: space-between; align-items: baseline; padding: 1px 0; }
.readout-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-label);
}
.readout-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; font-weight: 700; color: var(--text-head);
}
.readout-val.pa { color: var(--obj-a); }
.readout-val.pb { color: var(--obj-b); }
.readout-val.pt { color: var(--total); }
.readout-val.ke { color: var(--ke); }
.info { padding: 16px 20px; flex: 1; }
.info-text { font-size: 13px; color: #546E7A; line-height: 1.6; }
.info-text a { color: var(--accent); }
.challenge-info {
  margin-top: 4px; padding: 8px 10px;
  border-radius: 6px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  font-weight: 700; text-align: center;
}
.challenge-info.target-b { background: #E3F2FD; color: #1565C0; }
.challenge-info.target-a { background: #FFCDD2; color: #D32F2F; }
.result-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  animation: overlayFadeIn 0.3s ease;
}
.overlay-emoji { font-size: 72px; animation: overlayPop 0.4s ease; }
.overlay-msg {
  font-family: 'Outfit', sans-serif;
  font-size: 24px; font-weight: 700;
  margin-top: 16px; color: #fff;
}
.overlay-hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.6);
}
@keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes overlayPop {
  0% { transform: scale(0.3); }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@media (max-width: 700px) {
  .main { flex-direction: column; height: auto; min-height: calc(100vh - 46px); }
  .canvas-wrap { min-height: 320px; height: 50vh; border-right: none; border-bottom: 1px solid var(--panel-border); }
  .panel { width: 100%; }
  .controls { flex-direction: row; flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
  .ctrl-group { min-width: 120px; flex: 1; }
  .btn-row { min-width: 100%; }
  .info { padding: 12px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1><a href="/learn/"><span style="font-size:18px;line-height:1">&#x1F4A5;</span></a> <span id="titleText">Conservation of Momentum</span></h1>
    <p id="subtitleText">Discover why total momentum never changes in a collision.</p>
  </div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">PL</button>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="panel">
    <div class="controls">

      <div class="ctrl-group">
        <span class="ctrl-label" id="lblMode">Mode</span>
        <div class="type-toggle">
          <button class="type-btn active" id="modeExploreBtn" onclick="setMode('explore')">Explore</button>
          <button class="type-btn" id="modeGameBtn" onclick="setMode('game')">Game</button>
        </div>
      </div>

      <div id="grpExplore">
        <span class="section-label" id="lblObjA">Object A</span>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblMassA">Mass</span>
          <div class="slider-row">
            <input type="range" id="massASlider" min="0" max="20" value="5" step="1">
            <span class="slider-val" id="massAVal">5 kg</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblVelA">Velocity</span>
          <div class="slider-row">
            <input type="range" id="velASlider" min="-10" max="10" value="5" step="1">
            <span class="slider-val" id="velAVal">5 m/s</span>
          </div>
        </div>

        <span class="section-label" id="lblObjB">Object B</span>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblMassB">Mass</span>
          <div class="slider-row">
            <input type="range" id="massBSlider" min="0" max="20" value="5" step="1">
            <span class="slider-val" id="massBVal">5 kg</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblVelB">Velocity</span>
          <div class="slider-row">
            <input type="range" id="velBSlider" min="-10" max="10" value="0" step="1">
            <span class="slider-val" id="velBVal">0 m/s</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblCollType">Collision type</span>
          <div class="type-toggle">
            <button class="type-btn active" id="elasticBtn" onclick="setCollisionType('elastic')">Elastic</button>
            <button class="type-btn" id="inelasticBtn" onclick="setCollisionType('inelastic')">Inelastic</button>
            <button class="type-btn" id="stickyBtn" onclick="setCollisionType('sticky')">Sticky</button>
          </div>
        </div>

        <div class="ctrl-group" id="elasticityGroup" style="display:none">
          <span class="ctrl-label" id="lblElasticity">Elasticity</span>
          <div class="slider-row">
            <input type="range" id="elasticitySlider" min="0.1" max="0.9" value="0.5" step="0.1">
            <span class="slider-val" id="elasticityVal">0.5</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblPresets">Presets</span>
          <div class="type-toggle">
            <button class="type-btn" id="presetBowling" onclick="setPreset('bowling')">Bowling</button>
            <button class="type-btn" id="presetEqual" onclick="setPreset('equal')">Equal</button>
          </div>
          <div class="type-toggle" style="margin-top:4px">
            <button class="type-btn" id="presetRecoil" onclick="setPreset('recoil')">Recoil</button>
            <button class="type-btn" id="presetHeadOn" onclick="setPreset('headon')">Head-on</button>
          </div>
        </div>
      </div>

      <div id="grpGame" style="display:none">
        <span class="section-label" id="lblGameObjA">Object A</span>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblGameMassA">Mass</span>
          <div class="slider-row">
            <input type="range" id="gameMassASlider" min="0.1" max="20" value="5" step="0.1">
            <span class="slider-val" id="gameMassAVal">5 kg</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblGameVelA">Velocity</span>
          <div class="slider-row">
            <input type="range" id="gameVelASlider" min="0.1" max="10" value="1" step="0.1">
            <span class="slider-val" id="gameVelAVal">1 m/s</span>
          </div>
        </div>
        <div class="ctrl-group">
          <div class="challenge-info" id="challengeInfo">
            <span id="challengeTargetText"></span>
          </div>
          <div class="type-toggle" style="margin-top:6px">
            <button class="type-btn" id="newTargetBtn" onclick="generateTarget()">New target</button>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="type-btn" id="playBtn" onclick="togglePlay()" style="flex:1">
          <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="7,5 19,12 7,19"/></svg>
          <svg class="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
        </button>
        <button class="type-btn" id="stopBtn" onclick="resetSim()" style="flex:1">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        </button>
      </div>

      <div id="grpReadouts">
        <div class="readout-section">
          <div class="readout-row">
            <span class="readout-label" id="lblReadPA">p(A)</span>
            <span class="readout-val pa" id="readoutPA">25.0</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblReadPB">p(B)</span>
            <span class="readout-val pb" id="readoutPB">0.0</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblReadTotal">Total</span>
            <span class="readout-val pt" id="readoutTotal">25.0</span>
          </div>
        </div>
      </div>

    </div>

    <div class="info">
      <div class="info-text" id="infoText"></div>
    </div>
  </div>
</div>

<script>
/* ───────── I18N ───────── */
const I18N = {
  en: {
    title: 'Conservation of Momentum',
    subtitle: 'Discover why total momentum never changes in a collision.',
    mode: 'Mode', explore: 'Explore', game: 'Game',
    objectA: 'Object A', objectB: 'Object B',
    mass: 'Mass', velocity: 'Velocity',
    collisionType: 'Collision type',
    elastic: 'Elastic', inelastic: 'Inelastic', sticky: 'Sticky',
    elasticity: 'Elasticity',
    presets: 'Presets',
    bowling: 'Bowling', equal: 'Equal', recoil: 'Recoil', headOn: 'Head-on',
    newTarget: 'New target',
    gameObjA: 'Object A',
    play: 'Play', pause: 'Pause',
    pA: 'p(A)', pB: 'p(B)', total: 'Total',
    keBefore: 'KE before → after',
    challengeTargetA: 'Target: A = {0} m/s',
    challengeTargetB: 'Target: B = {0} m/s',
    challengeSuccess: 'Perfect shot!',
    challengeClose: 'So close! Try again',
    challengeMiss: 'Not quite! Try again',
    clickToDismiss: 'Click to continue',
    momentum: 'MOMENTUM',
    pEqMv: 'p = mv',
    kineticEnergy: 'KINETIC ENERGY',
    keEq: 'KE = ½mv²',
    centerOfMass: 'CoM',
    infoExplore: '<strong>Momentum = mass × velocity</strong> (p = m × v).<br><br>Set the mass and velocity for each ball. Set mass to <strong>0</strong> to hide a ball.<br><br>Hit <strong>Launch</strong> and watch the bars — the green <strong>Total</strong> bar never moves during a collision!<br><br>Try different collision types: <strong>Elastic</strong> (perfect bounce), <strong>Inelastic</strong> (energy lost), and <strong>Sticky</strong> (objects merge).',
    infoGame: 'Adjust Object A\'s velocity so that Object B reaches the target speed after the collision. Then hit Launch!',
  },
  pl: {
    title: 'Zasada zachowania pędu',
    subtitle: 'Odkryj, dlaczego całkowity pęd nigdy się nie zmienia podczas zderzenia.',
    mode: 'Tryb', explore: 'Eksploruj', game: 'Gra',
    objectA: 'Obiekt A', objectB: 'Obiekt B',
    mass: 'Masa', velocity: 'Prędkość',
    collisionType: 'Rodzaj zderzenia',
    elastic: 'Sprężyste', inelastic: 'Niesprężyste', sticky: 'Zlepienie',
    elasticity: 'Sprężystość',
    presets: 'Scenariusze',
    bowling: 'Kręgle', equal: 'Równe', recoil: 'Odrzut', headOn: 'Czołowe',
    newTarget: 'Nowy cel',
    gameObjA: 'Obiekt A',
    play: 'Start', pause: 'Pauza',
    pA: 'p(A)', pB: 'p(B)', total: 'Suma',
    keBefore: 'EK przed → po',
    challengeTargetA: 'Cel: A = {0} m/s',
    challengeTargetB: 'Cel: B = {0} m/s',
    challengeSuccess: 'Doskonały strzał!',
    challengeClose: 'Prawie! Spróbuj ponownie',
    challengeMiss: 'Daleko! Spróbuj ponownie',
    clickToDismiss: 'Kliknij, aby kontynuować',
    momentum: 'PĘD',
    pEqMv: 'p = mv',
    kineticEnergy: 'ENERGIA KINETYCZNA',
    keEq: 'EK = ½mv²',
    centerOfMass: 'ŚM',
    infoExplore: '<strong>Pęd = masa × prędkość</strong> (p = m × v).<br><br>Ustaw masę i prędkość każdej kuli. Ustaw masę na <strong>0</strong>, aby ukryć kulę.<br><br>Naciśnij <strong>Start</strong> i obserwuj paski — zielony pasek <strong>Suma</strong> nie porusza się podczas zderzenia!<br><br>Wypróbuj różne rodzaje zderzeń: <strong>Sprężyste</strong> (idealne odbicie), <strong>Niesprężyste</strong> (utrata energii), <strong>Zlepienie</strong> (obiekty się łączą).',
    infoGame: 'Ustaw prędkość Obiektu A tak, aby Obiekt B osiągnął docelową prędkość po zderzeniu. Potem naciśnij Start!',
  },
};
function T(key) { return I18N[state.lang][key]; }

/* ───────── CONSTANTS ───────── */
const TRACK_Y = 180;
const INIT_POS_A = 200;
const INIT_POS_B = 500;
const VEL_SCALE = 30;
const ARROW_SCALE = 16;
const BAR_CENTER = 500;
const BAR_MAX_W = 320;
const BAR_H = 24;
const BAR_GAP = 14;
const COL_A = '#D32F2F';
const COL_B = '#1565C0';
const COL_TOTAL = '#00C853';
const COL_KE = '#7B1FA2';

function objR(mass) { return 14 + Math.sqrt(mass) * 6; }
function hasA() { return state.massA > 0; }
function hasB() { return state.massB > 0; }
function hasBoth() { return hasA() && hasB(); }

/* ───────── STATE ───────── */
const state = {
  lang: navigator.language?.startsWith('pl') ? 'pl' : 'en',
  mode: 'explore',
  massA: 5, velA: 5,
  massB: 5, velB: 0,
  collisionType: 'elastic',
  restitution: 0.5,
  playing: false,
  time: 0,
  posA: INIT_POS_A, posB: INIT_POS_B,
  currentVelA: 5, currentVelB: 0,
  collided: false,
  stuck: false,
  initialTotalP: 0,
  initialKE: 0,
  postVelA: 0, postVelB: 0,
  particles: [],
  simDone: false,
  challengeTarget: 0,
  challengeTargetObj: 'b',
};

/* ───────── CANVAS SETUP ───────── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, scaleF, ox, oy;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = rect.width; H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scaleF = Math.min(W / 1000, H / 680) * 0.92;
  ox = (W - 1000 * scaleF) / 2;
  oy = (H - 680 * scaleF) / 2;
}
window.addEventListener('resize', resize);

function tx(x) { return ox + x * scaleF; }
function ty(y) { return oy + y * scaleF; }
function ts(s) { return s * scaleF; }

/* ───────── PHYSICS ───────── */
function getRestitution() {
  if (state.collisionType === 'elastic') return 1;
  if (state.collisionType === 'sticky') return 0;
  return state.restitution;
}

function computeCollision(m1, v1, m2, v2, e) {
  const M = m1 + m2;
  return {
    v1: (m1 * v1 + m2 * v2 + m2 * e * (v2 - v1)) / M,
    v2: (m1 * v1 + m2 * v2 + m1 * e * (v1 - v2)) / M,
  };
}

function fmtNum(v) { return parseFloat(v.toPrecision(3)).toString(); }

/* ───────── DRAWING HELPERS ───────── */
function roundRect(x, y, w, h, r) {
  if (w < 0) { x += w; w = -w; }
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ───────── DRAW: TRACK ───────── */
function drawTrack() {
  ctx.strokeStyle = '#CFD8DC';
  ctx.lineWidth = ts(2);
  ctx.beginPath();
  ctx.moveTo(tx(50), ty(TRACK_Y));
  ctx.lineTo(tx(950), ty(TRACK_Y));
  ctx.stroke();
  ctx.strokeStyle = '#E0DDD6';
  ctx.lineWidth = ts(1);
  for (let x = 100; x <= 900; x += 100) {
    ctx.beginPath();
    ctx.moveTo(tx(x), ty(TRACK_Y - 5));
    ctx.lineTo(tx(x), ty(TRACK_Y + 5));
    ctx.stroke();
  }
}

/* ───────── DRAW: OBJECT (BALL) ───────── */
function drawObject(x, mass, color, label) {
  const r = objR(mass);
  const cx = tx(x), cy = ty(TRACK_Y);
  const sr = ts(r);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath();
  ctx.arc(cx + ts(2), cy + ts(3), sr, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  ctx.fill();

  // Highlight (3D shine)
  const grad = ctx.createRadialGradient(cx - sr * 0.3, cy - sr * 0.3, sr * 0.1, cx, cy, sr);
  grad.addColorStop(0, 'rgba(255,255,255,0.35)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  ctx.fill();

  // Letter
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + ts(Math.min(20, r * 0.85)) + 'px Outfit';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy);

  // Mass label
  ctx.fillStyle = '#90A4AE';
  ctx.font = ts(13) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(mass + ' kg', cx, cy + sr + ts(5));
}

function drawStickyObject(x, massA, massB) {
  const totalMass = massA + massB;
  const r = objR(totalMass);
  const cx = tx(x), cy = ty(TRACK_Y);
  const sr = ts(r);

  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath();
  ctx.arc(cx + ts(2), cy + ts(3), sr, 0, Math.PI * 2);
  ctx.fill();

  const grad = ctx.createLinearGradient(cx - sr, 0, cx + sr, 0);
  grad.addColorStop(0, COL_A);
  grad.addColorStop(1, COL_B);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  ctx.fill();

  const hl = ctx.createRadialGradient(cx - sr * 0.3, cy - sr * 0.3, sr * 0.1, cx, cy, sr);
  hl.addColorStop(0, 'rgba(255,255,255,0.3)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + ts(Math.min(18, r * 0.65)) + 'px Outfit';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A+B', cx, cy);

  ctx.fillStyle = '#90A4AE';
  ctx.font = ts(13) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(totalMass + ' kg', cx, cy + sr + ts(5));
}

/* ───────── DRAW: VELOCITY ARROW ───────── */
function drawVelArrow(x, vel, r, color) {
  if (vel === 0) {
    ctx.fillStyle = '#B0BEC5';
    ctx.font = ts(13) + 'px "Share Tech Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('v=0', tx(x), ty(TRACK_Y - r - 4));
    return;
  }
  const dir = Math.sign(vel);
  const startX = x + dir * (r + 4);
  const len = Math.abs(vel) * ARROW_SCALE;
  const endX = startX + dir * len;
  const arrowY = TRACK_Y;

  const headSize = ts(12);
  const angle = dir > 0 ? 0 : Math.PI;
  const sx = tx(startX), sy = ty(arrowY);
  const ex = tx(endX), ey = ty(arrowY);

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = ts(2.5);
  ctx.lineCap = 'butt';
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex - (headSize - 1) * Math.cos(angle), ey - (headSize - 1) * Math.sin(angle));
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - headSize * Math.cos(angle - 0.4), ey - headSize * Math.sin(angle - 0.4));
  ctx.lineTo(ex - headSize * Math.cos(angle + 0.4), ey - headSize * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = color;
  ctx.font = 'bold ' + ts(14) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(fmtNum(Math.abs(vel)) + ' m/s', tx((startX + endX) / 2), ty(arrowY - r - 4));
}

/* ───────── DRAW: MOMENTUM BARS ───────── */
function drawMomentumBars() {
  const pA = hasA() ? state.massA * state.currentVelA : 0;
  const pB = hasB() ? state.massB * state.currentVelB : 0;
  const pTotal = pA + pB;

  const sectionY = 300;

  ctx.fillStyle = '#90A4AE';
  ctx.font = 'bold ' + ts(13) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(T('momentum'), tx(140), ty(sectionY - 18));
  ctx.textAlign = 'right';
  ctx.fillStyle = '#B0BEC5';
  ctx.fillText(T('pEqMv'), tx(860), ty(sectionY - 18));

  let maxP;
  if (state.playing || state.collided) {
    maxP = Math.max(
      Math.abs(state.massA * state.velA),
      Math.abs(state.massB * state.velB),
      Math.abs(state.massA * state.postVelA),
      Math.abs(state.massB * state.postVelB),
      Math.abs(state.initialTotalP), 0.1
    );
  } else {
    maxP = Math.max(Math.abs(pA), Math.abs(pB), Math.abs(pTotal), 0.1);
  }
  const scale = BAR_MAX_W / maxP;

  // Zero axis
  ctx.strokeStyle = '#E8E5DE';
  ctx.lineWidth = ts(1);
  const rows = hasBoth() ? 3 : 1;
  const axisBot = sectionY + rows * (BAR_H + BAR_GAP) + (hasBoth() ? 10 : 0);
  ctx.beginPath();
  ctx.moveTo(tx(BAR_CENTER), ty(sectionY - 2));
  ctx.lineTo(tx(BAR_CENTER), ty(axisBot));
  ctx.stroke();

  ctx.fillStyle = '#CFD8DC';
  ctx.font = ts(11) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('0', tx(BAR_CENTER), ty(axisBot + 2));

  // Single ball: only show that ball's bar
  if (!hasBoth()) {
    const p = hasA() ? pA : pB;
    const col = hasA() ? COL_A : COL_B;
    const lbl = hasA() ? T('pA') : T('pB');
    drawBar(sectionY, p, scale, col, lbl);
    return;
  }

  drawBar(sectionY, pA, scale, COL_A, T('pA'));
  drawBar(sectionY + BAR_H + BAR_GAP, pB, scale, COL_B, T('pB'));

  const sepY = sectionY + 2 * (BAR_H + BAR_GAP) - BAR_GAP / 2;
  ctx.strokeStyle = '#E8E5DE';
  ctx.lineWidth = ts(1);
  ctx.beginPath();
  ctx.moveTo(tx(140), ty(sepY));
  ctx.lineTo(tx(860), ty(sepY));
  ctx.stroke();

  const totalY = sectionY + 2 * (BAR_H + BAR_GAP) + 4;
  drawBar(totalY, pTotal, scale, COL_TOTAL, T('total'));

  // Reference line for initial total
  if (state.playing || state.collided) {
    const refX = BAR_CENTER + state.initialTotalP * scale;
    ctx.strokeStyle = COL_TOTAL;
    ctx.lineWidth = ts(2);
    ctx.setLineDash([ts(3), ts(3)]);
    ctx.beginPath();
    ctx.moveTo(tx(refX), ty(totalY - 3));
    ctx.lineTo(tx(refX), ty(totalY + BAR_H + 3));
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawBar(y, value, scale, color, label) {
  const barW = value * scale;
  const absW = Math.abs(barW);

  ctx.fillStyle = '#90A4AE';
  ctx.font = 'bold ' + ts(14) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, tx(135), ty(y + BAR_H / 2));

  if (absW > 0.5) {
    const x = barW >= 0 ? BAR_CENTER : BAR_CENTER + barW;
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = color;
    roundRect(tx(x), ty(y), ts(absW), ts(BAR_H), ts(4));
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = color;
    ctx.lineWidth = ts(2);
    roundRect(tx(x), ty(y), ts(absW), ts(BAR_H), ts(4));
    ctx.stroke();
  }

  ctx.fillStyle = color;
  ctx.font = 'bold ' + ts(15) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const valX = barW >= 0 ? BAR_CENTER + absW + 8 : BAR_CENTER + 8;
  ctx.fillText(value.toFixed(1), tx(valX), ty(y + BAR_H / 2));
}

/* ───────── DRAW: KE BARS ───────── */
function drawKEBars() {
  if (!hasBoth()) return;

  const keA = 0.5 * state.massA * state.currentVelA * state.currentVelA;
  const keB = 0.5 * state.massB * state.currentVelB * state.currentVelB;
  const keCurrent = keA + keB;
  const keBefore = state.playing || state.collided ? state.initialKE : keCurrent;

  const sectionY = 490;

  ctx.fillStyle = '#90A4AE';
  ctx.font = 'bold ' + ts(13) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(T('kineticEnergy'), tx(140), ty(sectionY - 18));

  const maxKE = Math.max(keBefore, keCurrent, 0.1);
  const barMaxW = 600;
  const scale = barMaxW / maxKE;
  const barX = 150;

  // Before bar (dashed outline)
  const beforeW = keBefore * scale;
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = COL_KE;
  roundRect(tx(barX), ty(sectionY), ts(beforeW), ts(BAR_H), ts(4));
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = COL_KE;
  ctx.lineWidth = ts(1.5);
  ctx.setLineDash([ts(4), ts(4)]);
  roundRect(tx(barX), ty(sectionY), ts(beforeW), ts(BAR_H), ts(4));
  ctx.stroke();
  ctx.setLineDash([]);

  // After bar (solid)
  const afterW = keCurrent * scale;
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = COL_KE;
  roundRect(tx(barX), ty(sectionY + BAR_H + 4), ts(afterW), ts(BAR_H), ts(4));
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = COL_KE;
  ctx.lineWidth = ts(2);
  roundRect(tx(barX), ty(sectionY + BAR_H + 4), ts(afterW), ts(BAR_H), ts(4));
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#90A4AE';
  ctx.font = ts(13) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('BEFORE', tx(135), ty(sectionY + BAR_H / 2));
  ctx.fillText('AFTER', tx(135), ty(sectionY + BAR_H + 4 + BAR_H / 2));

  ctx.fillStyle = COL_KE;
  ctx.font = 'bold ' + ts(14) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(keBefore.toFixed(1) + ' J', tx(barX + beforeW + 8), ty(sectionY + BAR_H / 2));
  ctx.fillText(keCurrent.toFixed(1) + ' J', tx(barX + afterW + 8), ty(sectionY + BAR_H + 4 + BAR_H / 2));

  if (state.collided && keBefore > 0) {
    const loss = ((keBefore - keCurrent) / keBefore * 100);
    if (loss > 0.5) {
      ctx.fillStyle = '#E91E63';
      ctx.font = 'bold ' + ts(14) + 'px "Share Tech Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('\u2212' + loss.toFixed(0) + '%', tx(barX + afterW + 60), ty(sectionY + BAR_H + 4 + BAR_H / 2));
    }
  }
}

/* ───────── DRAW: CENTER OF MASS ───────── */
function drawCoM() {
  if (!hasBoth()) return;
  const totalMass = state.massA + state.massB;
  const xCoM = (state.massA * state.posA + state.massB * state.posB) / totalMass;
  if (xCoM < 30 || xCoM > 970) return;

  const s = 7;
  ctx.fillStyle = COL_TOTAL;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(tx(xCoM), ty(TRACK_Y - s));
  ctx.lineTo(tx(xCoM + s), ty(TRACK_Y));
  ctx.lineTo(tx(xCoM), ty(TRACK_Y + s));
  ctx.lineTo(tx(xCoM - s), ty(TRACK_Y));
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = COL_TOTAL;
  ctx.font = ts(12) + 'px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.globalAlpha = 0.5;
  ctx.fillText(T('centerOfMass'), tx(xCoM), ty(TRACK_Y - s - 2));
  ctx.globalAlpha = 1;
}

/* ───────── DRAW: PARTICLES ───────── */
function spawnParticles(x) {
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 180;
    state.particles.push({
      x: x, y: TRACK_Y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: Math.random() > 0.5 ? COL_A : COL_B,
    });
  }
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 2.5;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

function drawParticles() {
  state.particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(tx(p.x), ty(p.y), ts(3 * p.life), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

/* ───────── DRAW: SCENE ───────── */
function drawScene() {
  ctx.fillStyle = '#f5f3ee';
  ctx.fillRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));

  drawTrack();

  const isStuck = state.stuck;

  if (isStuck) {
    drawStickyObject(state.posA, state.massA, state.massB);
    drawVelArrow(state.posA, state.currentVelA, objR(state.massA + state.massB), COL_TOTAL);
  } else {
    if (hasA() && state.posA > -60 && state.posA < 1060) {
      drawObject(state.posA, state.massA, COL_A, 'A');
      drawVelArrow(state.posA, state.currentVelA, objR(state.massA), COL_A);
    }
    if (hasB() && state.posB > -60 && state.posB < 1060) {
      drawObject(state.posB, state.massB, COL_B, 'B');
      drawVelArrow(state.posB, state.currentVelB, objR(state.massB), COL_B);
    }
  }

  drawParticles();
  drawCoM();
  drawMomentumBars();
  drawKEBars();
}

/* ───────── ANIMATION ───────── */
let lastTime = 0;

function animate(now) {
  now /= 1000;
  const dt = lastTime ? Math.min(now - lastTime, 0.05) : 0;
  lastTime = now;

  if (state.playing) {
    state.time += dt;
    updateParticles(dt);

    if (hasA()) state.posA += state.currentVelA * VEL_SCALE * dt;
    if (hasB()) state.posB += state.currentVelB * VEL_SCALE * dt;

    // Keep stuck objects together
    if (state.stuck) {
      const avg = (state.posA + state.posB) / 2;
      state.posA = avg;
      state.posB = avg;
    }

    // Collision detection (only when both balls exist)
    if (hasBoth() && !state.collided) {
      const gap = Math.abs(state.posA - state.posB) - objR(state.massA) - objR(state.massB);
      if (gap <= 0) {
        const e = getRestitution();
        const result = computeCollision(state.massA, state.currentVelA, state.massB, state.currentVelB, e);
        state.postVelA = result.v1;
        state.postVelB = result.v2;
        state.currentVelA = result.v1;
        state.currentVelB = result.v2;
        state.collided = true;

        const totalMass = state.massA + state.massB;
        const com = (state.massA * state.posA + state.massB * state.posB) / totalMass;

        if (e === 0) {
          state.stuck = true;
          state.posA = com;
          state.posB = com;
        }

        if (!state.stuck) {
          const minDist = objR(state.massA) + objR(state.massB) + 1;
          if (state.posA < state.posB) {
            state.posA = com - minDist * state.massB / totalMass;
            state.posB = com + minDist * state.massA / totalMass;
          } else {
            state.posA = com + minDist * state.massB / totalMass;
            state.posB = com - minDist * state.massA / totalMass;
          }
        }

        spawnParticles((state.posA + state.posB) / 2);

        if (state.mode === 'game') {
          setTimeout(() => evaluateChallenge(), 600);
        }
      }
    }

    // Auto-stop when all visible balls are off screen
    const aOff = !hasA() || state.posA < -150 || state.posA > 1150;
    const bOff = !hasB() || state.posB < -150 || state.posB > 1150;
    if ((aOff && bOff) || state.time > 15) {
      state.playing = false;
      state.simDone = true;
      updatePlayButton();
    }
  }

  if (state.playing || state.collided) updateReadouts();
  drawScene();
  requestAnimationFrame(animate);
}

/* ───────── UI: SLIDERS ───────── */
function wireSlider(id, stateKey, suffix) {
  document.getElementById(id).addEventListener('input', function(e) {
    const v = +e.target.value;
    state[stateKey] = v;
    document.getElementById(id.replace('Slider', 'Val')).textContent = v + suffix;
    if (!state.playing) {
      state.currentVelA = state.velA;
      state.currentVelB = state.velB;
      updateReadouts();
    }
  });
}

wireSlider('massASlider', 'massA', ' kg');
wireSlider('velASlider', 'velA', ' m/s');
wireSlider('massBSlider', 'massB', ' kg');
wireSlider('velBSlider', 'velB', ' m/s');

document.getElementById('elasticitySlider').addEventListener('input', function(e) {
  state.restitution = +e.target.value;
  document.getElementById('elasticityVal').textContent = (+e.target.value).toFixed(1);
});

document.getElementById('gameMassASlider').addEventListener('input', function(e) {
  const v = +e.target.value;
  if (state.challengeTargetObj === 'b') { state.massA = v; }
  else { state.massB = v; }
  document.getElementById('gameMassAVal').textContent = fmtNum(v) + ' kg';
});

document.getElementById('gameVelASlider').addEventListener('input', function(e) {
  const v = +e.target.value;
  if (state.challengeTargetObj === 'b') {
    state.velA = v; state.currentVelA = v;
  } else {
    state.velB = -v; state.currentVelB = -v;
  }
  document.getElementById('gameVelAVal').textContent = fmtNum(v) + ' m/s';
});

/* ───────── UI: PLAY / PAUSE / STOP ───────── */
function freshLaunch() {
  if (!hasA() && !hasB()) return;

  state.currentVelA = state.velA;
  state.currentVelB = state.velB;
  state.posA = INIT_POS_A;
  state.posB = INIT_POS_B;
  state.collided = false;
  state.stuck = false;
  state.particles = [];
  state.time = 0;
  state.simDone = false;

  const pA = hasA() ? state.massA * state.velA : 0;
  const pB = hasB() ? state.massB * state.velB : 0;
  state.initialTotalP = pA + pB;
  state.initialKE = (hasA() ? 0.5 * state.massA * state.velA * state.velA : 0) +
    (hasB() ? 0.5 * state.massB * state.velB * state.velB : 0);

  if (hasBoth()) {
    const result = computeCollision(state.massA, state.velA, state.massB, state.velB, getRestitution());
    state.postVelA = result.v1;
    state.postVelB = result.v2;
  } else {
    state.postVelA = state.velA;
    state.postVelB = state.velB;
  }

  state.playing = true;
  setControlsEnabled(false);
}

function togglePlay() {
  if (state.playing) {
    // Pause
    state.playing = false;
  } else if (state.simDone || state.time === 0) {
    // Fresh start or restart after sim ended
    freshLaunch();
  } else {
    // Resume from pause
    state.playing = true;
  }
  updatePlayButton();
}

function updatePlayButton() {
  const btn = document.getElementById('playBtn');
  btn.classList.toggle('playing', state.playing);
}

function resetSim() {
  state.playing = false;
  state.simDone = false;
  state.posA = INIT_POS_A;
  state.posB = INIT_POS_B;
  state.currentVelA = state.velA;
  state.currentVelB = state.velB;
  state.collided = false;
  state.stuck = false;
  state.particles = [];
  state.time = 0;

  setControlsEnabled(true);
  updatePlayButton();
  updateReadouts();
}

function setControlsEnabled(enabled) {
  const ids = ['massASlider', 'velASlider', 'massBSlider', 'velBSlider', 'elasticitySlider', 'gameMassASlider', 'gameVelASlider'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = !enabled;
  });
}

/* ───────── UI: MODE ───────── */
function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeExploreBtn').classList.toggle('active', mode === 'explore');
  document.getElementById('modeGameBtn').classList.toggle('active', mode === 'game');

  document.getElementById('grpExplore').style.display = mode === 'explore' ? '' : 'none';
  document.getElementById('grpReadouts').style.display = mode === 'explore' ? '' : 'none';
  document.getElementById('grpGame').style.display = mode === 'game' ? '' : 'none';

  if (mode === 'game') {
    generateTarget();
  } else {
    resetSim();
  }
  updateInfoText();
}

/* ───────── UI: COLLISION TYPE ───────── */
function setCollisionType(type) {
  state.collisionType = type;
  document.getElementById('elasticBtn').classList.toggle('active', type === 'elastic');
  document.getElementById('inelasticBtn').classList.toggle('active', type === 'inelastic');
  document.getElementById('stickyBtn').classList.toggle('active', type === 'sticky');

  document.getElementById('elasticityGroup').style.display = type === 'inelastic' ? '' : 'none';

  if (state.playing) resetSim();
}

/* ───────── UI: PRESETS ───────── */
function setPreset(name) {
  resetSim();
  const presets = {
    bowling:  { mA: 10, vA: 6, mB: 2, vB: 0 },
    equal:   { mA: 5, vA: 5, mB: 5, vB: 0 },
    recoil:  { mA: 2, vA: 10, mB: 10, vB: 0 },
    headon:  { mA: 5, vA: 5, mB: 5, vB: -5 },
  };
  const p = presets[name];
  if (!p) return;

  state.massA = p.mA; state.velA = p.vA;
  state.massB = p.mB; state.velB = p.vB;
  state.currentVelA = p.vA; state.currentVelB = p.vB;

  document.getElementById('massASlider').value = p.mA;
  document.getElementById('massAVal').textContent = p.mA + ' kg';
  document.getElementById('velASlider').value = p.vA;
  document.getElementById('velAVal').textContent = p.vA + ' m/s';
  document.getElementById('massBSlider').value = p.mB;
  document.getElementById('massBVal').textContent = p.mB + ' kg';
  document.getElementById('velBSlider').value = p.vB;
  document.getElementById('velBVal').textContent = p.vB + ' m/s';

  setCollisionType('elastic');
  updateReadouts();
}

/* ───────── GAME MODE ───────── */
function generateTarget() {
  resetSim();

  const targetObj = Math.random() < 0.5 ? 'a' : 'b';
  state.challengeTargetObj = targetObj;

  const fixedMass = 3 + Math.floor(Math.random() * 10);
  const solLauncherMass = 3 + Math.floor(Math.random() * 10);
  const solLauncherVel = 2 + Math.floor(Math.random() * 8);
  const targetSpeed = 2 * solLauncherMass * solLauncherVel / (solLauncherMass + fixedMass);
  // When targeting A, B approaches from the right so A's result is negative
  const signedTarget = targetObj === 'a' ? -Math.round(targetSpeed * 2) / 2 : Math.round(targetSpeed * 2) / 2;

  state.collisionType = 'elastic';
  state.challengeTarget = signedTarget;

  if (targetObj === 'b') {
    // Player controls A, B is at rest
    state.massA = 5; state.velA = 1; state.currentVelA = 1;
    state.massB = fixedMass; state.velB = 0; state.currentVelB = 0;
  } else {
    // Player controls B, A is at rest
    state.massA = fixedMass; state.velA = 0; state.currentVelA = 0;
    state.massB = 5; state.velB = -1; state.currentVelB = -1;
  }

  document.getElementById('gameMassASlider').value = 5;
  document.getElementById('gameMassAVal').textContent = '5 kg';
  document.getElementById('gameVelASlider').value = 1;
  document.getElementById('gameVelAVal').textContent = '1 m/s';

  const tKey = targetObj === 'b' ? 'challengeTargetB' : 'challengeTargetA';
  document.getElementById('challengeTargetText').textContent = T(tKey).replace('{0}', signedTarget.toFixed(1));
  document.getElementById('challengeInfo').className = 'challenge-info target-' + targetObj;

  // Update section label to show which object the player controls
  const playerLabel = targetObj === 'b' ? T('objectA') : T('objectB');
  document.getElementById('lblGameObjA').textContent = playerLabel;
}

function evaluateChallenge() {
  if (state.mode !== 'game' || !state.collided) return;
  const actual = state.challengeTargetObj === 'b' ? state.currentVelB : state.currentVelA;
  const target = state.challengeTarget;
  const diff = Math.abs(actual - target);

  if (diff < 0.6) {
    showOverlay('success');
  } else if (diff < 2.0) {
    showOverlay('close');
  } else {
    showOverlay('miss');
  }
}

function showOverlay(result) {
  const existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';

  let emoji, msg, bg;
  if (result === 'success') {
    emoji = '\uD83C\uDF89'; msg = T('challengeSuccess'); bg = 'rgba(63,185,80,0.88)';
  } else if (result === 'close') {
    emoji = '\uD83D\uDC4D\uD83C\uDFFB'; msg = T('challengeClose'); bg = 'rgba(88,166,255,0.88)';
  } else {
    emoji = '\uD83D\uDC4E\uD83C\uDFFB'; msg = T('challengeMiss'); bg = 'rgba(240,180,60,0.92)';
  }

  overlay.style.background = bg;
  overlay.innerHTML =
    '<div class="overlay-emoji">' + emoji + '</div>' +
    '<div class="overlay-msg">' + msg + '</div>' +
    '<div class="overlay-hint">' + T('clickToDismiss') + '</div>';

  overlay.addEventListener('click', function() { overlay.remove(); });
  document.body.appendChild(overlay);
}

/* ───────── READOUTS ───────── */
function updateReadouts() {
  const pA = hasA() ? state.massA * state.currentVelA : 0;
  const pB = hasB() ? state.massB * state.currentVelB : 0;
  const pTotal = pA + pB;

  document.getElementById('readoutPA').textContent = pA.toFixed(1) + ' kg\u00B7m/s';
  document.getElementById('readoutPB').textContent = pB.toFixed(1) + ' kg\u00B7m/s';
  document.getElementById('readoutTotal').textContent = pTotal.toFixed(1) + ' kg\u00B7m/s';

}

/* ───────── INFO TEXT ───────── */
function updateInfoText() {
  const el = document.getElementById('infoText');
  el.innerHTML = state.mode === 'game' ? T('infoGame') : T('infoExplore');
}

/* ───────── TRANSLATIONS ───────── */
function applyTranslations() {
  document.title = T('title');
  document.documentElement.lang = state.lang;
  document.getElementById('titleText').textContent = T('title');
  document.getElementById('subtitleText').textContent = T('subtitle');
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'PL' : 'EN';
  document.getElementById('lblMode').textContent = T('mode');
  document.getElementById('modeExploreBtn').textContent = T('explore');
  document.getElementById('modeGameBtn').textContent = T('game');
  document.getElementById('lblObjA').textContent = T('objectA');
  document.getElementById('lblObjB').textContent = T('objectB');
  document.getElementById('lblMassA').textContent = T('mass');
  document.getElementById('lblMassB').textContent = T('mass');
  document.getElementById('lblVelA').textContent = T('velocity');
  document.getElementById('lblVelB').textContent = T('velocity');
  document.getElementById('lblCollType').textContent = T('collisionType');
  document.getElementById('elasticBtn').textContent = T('elastic');
  document.getElementById('inelasticBtn').textContent = T('inelastic');
  document.getElementById('stickyBtn').textContent = T('sticky');
  document.getElementById('lblElasticity').textContent = T('elasticity');
  document.getElementById('lblPresets').textContent = T('presets');
  document.getElementById('presetBowling').textContent = T('bowling');
  document.getElementById('presetEqual').textContent = T('equal');
  document.getElementById('presetRecoil').textContent = T('recoil');
  document.getElementById('presetHeadOn').textContent = T('headOn');
  document.getElementById('newTargetBtn').textContent = T('newTarget');
  document.getElementById('lblGameObjA').textContent = T('gameObjA');
  document.getElementById('lblGameMassA').textContent = T('mass');
  document.getElementById('lblGameVelA').textContent = T('velocity');
  updatePlayButton();
  document.getElementById('lblReadPA').textContent = T('pA');
  document.getElementById('lblReadPB').textContent = T('pB');
  document.getElementById('lblReadTotal').textContent = T('total');

  if (state.mode === 'game') {
    const tKey = state.challengeTargetObj === 'b' ? 'challengeTargetB' : 'challengeTargetA';
    document.getElementById('challengeTargetText').textContent = T(tKey).replace('{0}', state.challengeTarget.toFixed(1));
  }

  updateInfoText();
  updateReadouts();
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'pl' : 'en';
  applyTranslations();
}

/* ───────── INIT ───────── */
function init() {
  resize();
  setCollisionType('elastic');
  applyTranslations();
  updateReadouts();
  requestAnimationFrame(animate);
}

init();
</script>
</body>
