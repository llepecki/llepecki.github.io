        // ====================== ANIMATION ======================

        let lastTime = 0;

        function animate(timestamp) {
          if (!lastTime) lastTime = timestamp;
          const dt = Math.min((timestamp - lastTime) / 1000, DT_CAP);
          lastTime = timestamp;

          if (state.mode === "game") {
            animateGame(dt);
            if (state.mode === "game") drawGameScene();
            requestAnimationFrame(animate);
            return;
          }

          if (
            !state.paused &&
            (state.phase === "outbound" || state.phase === "return")
          ) {
            const progressPerSecond =
              (1 / (2 * WALL_SECONDS_BASE)) * state.animSpeed;
            state.progress += dt * progressPerSecond;
            state.progress = clamp(state.progress, 0, 1);
            updateElapsedFromProgress();

            if (state.phase === "outbound" && state.progress >= 0.5) {
              state.progress = 0.5;
              updateElapsedFromProgress();
              state.phase = "turnaround";
              state.turnaroundTimer = 0;
              state.currentBeta = 0;
              updateInfo();
            }

            if (state.phase === "return" && state.progress >= 1.0) {
              state.progress = 1.0;
              updateElapsedFromProgress();
              state.phase = "landed";
              updateWarpButtons();
              updateInfo();
              setTimeout(showSummaryOverlay, 400);
            }
          }

          if (!state.paused && state.phase === "turnaround") {
            state.turnaroundTimer += dt * state.animSpeed;

            // Tick both clocks at cruise-speed gamma while the ship flies the arc.
            // Earth-rate during a leg = legEarthTotal / WALL_SECONDS_BASE. Rocket-rate
            // = that / gammaActual at peak cruise. The accumulator carries forward
            // into the return leg via updateElapsedFromProgress().
            const earthPerWallSec = state.legEarthTotal / WALL_SECONDS_BASE;
            const dEarth = earthPerWallSec * dt * state.animSpeed;
            const gAct = Math.max(1, state.gammaActual || 1);
            state.arcEarthAccum += dEarth;
            state.arcRocketAccum += dEarth / gAct;
            updateElapsedFromProgress();
            state.currentBeta = state.betaActual;

            const turnDuration = getTurnaroundDuration();
            if (state.turnaroundTimer >= turnDuration) {
              state.phase = "return";
              updateInfo();
            }
          }

          if (state.phase !== "idle") {
            updateReadouts();
          }

          drawScene();
          requestAnimationFrame(animate);
        }

        // ====================== GAME MODE ======================

        function makeGameShip(starIndex, beta) {
          const star = STARS[starIndex];
          const phys = computeShipPhysics(star.dist, beta);
          return {
            starIndex: starIndex,
            beta: beta,
            phys: phys,
            progress: 0,
            phase: "idle",
            turnaroundTimer: 0,
            earthElapsed: 0,
            rocketElapsed: 0,
            currentBeta: 0,
            waitingTime: 0,
            arcEarthAccum: 0,
            arcRocketAccum: 0,
          };
        }

        // Stepped speed puzzle: base templates describe the *shape* of each difficulty
        // (step count, spacings). Offsets are signed age-diff targets (finalB - finalA
        // in years). The actual step list for a challenge is built by shifting the
        // template so the zero-offset lands at a randomly chosen hit index.
        const STEP_BASE = {
          easy: [+3, 0, -3],
          medium: [+3, +1.5, 0, -1.5, -3],
          hard: [+2, +1, +0.5, 0, -0.5, -1, -2],
        };

        function buildStepOffsets(difficulty, hitIdx) {
          const base = STEP_BASE[difficulty] || STEP_BASE.easy;
          const baseHit = Math.floor(base.length / 2);
          const shift = hitIdx - baseHit;
          const lastIdx = base.length - 1;
          const startDelta = base[0] - base[1];
          const endDelta = base[lastIdx - 1] - base[lastIdx];
          const out = [];
          for (let i = 0; i < base.length; i++) {
            const bi = i - shift;
            if (bi >= 0 && bi <= lastIdx) out.push(base[bi]);
            else if (bi < 0) out.push(base[0] + startDelta * -bi);
            else out.push(base[lastIdx] - endDelta * (bi - lastIdx));
          }
          return out;
        }

        // Purely geometric arc-to-tangent length ratio for a star at its current
        // canvas position. arcEarth_years = arcRatio * gameMaxEarthTime / 2.
        function arcRatioForStar(star) {
          const E = { x: getEarthX(), y: 0 };
          const C = { x: getStarScreenXForDist(star.dist), y: 0 };
          const R = starFlybyRingR(star);
          const traj = computeTangentArc(E, C, R);
          return (traj.arcSweep * traj.R) / traj.legLen;
        }

        // Solve beta_B so that (finalB - finalA) equals signedDiffBA years.
        // Accounts for arc contribution: during turnaround each ship accumulates
        // extra Earth-years (arcRatio_X * gameMaxEarthTime / 2) and rocket-years
        // (that / gamma_X). Identity still holds:
        //   finalB - finalA = (ageB - ageA) + S_A - S_B
        // where S_X = (earthTotal_X - rocketTotal_X) + arcEarth_X * (1 - 1/gamma_X).
        // diff is monotone decreasing in beta_B (S_B grows faster than S_A shrinks),
        // so binary search works.
        function solveBetaBForDiff(signedDiffBA, ctx, arcRatios) {
          const distA = STARS[ctx.starIndexA].dist;
          const distB = STARS[ctx.starIndexB].dist;
          const physA = computeShipPhysics(distA, ctx.betaA);
          const arA = arcRatios.A,
            arB = arcRatios.B;
          const gammaA = physA.gammaActual;
          const savNomA = physA.earthTotalYears - physA.rocketTotalYears;

          function diffAt(betaB) {
            const physB = computeShipPhysics(distB, betaB);
            const gammaB = physB.gammaActual;
            const savNomB = physB.earthTotalYears - physB.rocketTotalYears;
            const gameMax = Math.max(
              physA.earthTotalYears,
              physB.earthTotalYears,
            );
            const arcEarthA = (arA * gameMax) / 2;
            const arcEarthB = (arB * gameMax) / 2;
            const SA = savNomA + arcEarthA * (1 - 1 / gammaA);
            const SB = savNomB + arcEarthB * (1 - 1 / gammaB);
            return ctx.ageB - ctx.ageA + SA - SB;
          }

          let lo = BETA_MIN,
            hi = BETA_MAX;
          for (let i = 0; i < 60; i++) {
            const mid = (lo + hi) / 2;
            const d = diffAt(mid);
            if (Math.abs(d - signedDiffBA) < 0.005) return mid;
            // diff decreases as beta_B increases, so if above target we need bigger beta.
            if (d > signedDiffBA) lo = mid;
            else hi = mid;
          }
          const beta = (lo + hi) / 2;
          if (beta < BETA_MIN + 0.005 || beta > BETA_MAX - 0.0001) return null;
          if (Math.abs(diffAt(beta) - signedDiffBA) > 0.3) return null;
          return beta;
        }

        function generateChallenge() {
          try {
            _generateChallengeInner();
          } catch (e) {
            console.error("generateChallenge failed:", e);
          }
        }

        function _generateChallengeInner() {
          if (state.phase !== "idle") handleReset();

          const ageDiffs = [2, 3, 4, 5, 6, 8, 10];
          // Restrict game mode to the five closest named stars (Proxima..Algol, ≤~93 ly).
          // More distant stars produce round-trip Earth times that exceed the 100-year
          // age cap for most step combinations, driving the solver into the fallback.
          const gameStarCount = Math.min(5, STARS.length - 1);
          const stepCount = (STEP_BASE[state.difficulty] || STEP_BASE.easy)
            .length;

          for (let attempt = 0; attempt < 50; attempt++) {
            // Per-attempt random hit position so the perfect match isn't always in
            // the middle of the bar. Each retry also re-rolls, so the fallback path
            // doesn't get stuck on a problematic hitIdx.
            const hitIdx = Math.floor(Math.random() * stepCount);
            const steps = buildStepOffsets(state.difficulty, hitIdx);

            const idxA = Math.floor(Math.random() * gameStarCount);
            let idxB;
            do {
              idxB = Math.floor(Math.random() * gameStarCount);
            } while (idxB === idxA);

            const ageA = 15 + Math.floor(Math.random() * 21); // 15-35
            const ageDiff =
              ageDiffs[Math.floor(Math.random() * ageDiffs.length)];
            const ageB = ageA + ageDiff;

            // Captain A's cruise speed is chosen by the game (mid-high range).
            let betaA = 0.5 + Math.random() * 0.4;
            betaA = Math.round(betaA * 1000) / 1000;

            // Canvas-dependent arc ratios: used by the solver and by the safety check so
            // they stay consistent with the runtime arc accumulation.
            const arcRatios = {
              A: arcRatioForStar(STARS[idxA]),
              B: arcRatioForStar(STARS[idxB]),
            };
            const ctx = {
              starIndexA: idxA,
              starIndexB: idxB,
              ageA: ageA,
              ageB: ageB,
              betaA: betaA,
            };

            // Resolve every step's beta_B.
            const stepBetas = [];
            let ok = true;
            for (let s = 0; s < steps.length; s++) {
              const bS = solveBetaBForDiff(steps[s], ctx, arcRatios);
              if (bS === null) {
                ok = false;
                break;
              }
              stepBetas.push(bS);
            }
            if (!ok) continue;

            // Safety: every step must keep both captains under 100 years old, including arc.
            const physA = computeShipPhysics(STARS[idxA].dist, betaA);
            let safe = true;
            for (let k = 0; k < stepBetas.length; k++) {
              const physB = computeShipPhysics(STARS[idxB].dist, stepBetas[k]);
              const gameMax = Math.max(
                physA.earthTotalYears,
                physB.earthTotalYears,
              );
              const arcEA = (arcRatios.A * gameMax) / 2;
              const arcEB = (arcRatios.B * gameMax) / 2;
              const tA = physA.earthTotalYears + arcEA;
              const tB = physB.earthTotalYears + arcEB;
              const tauA = physA.rocketTotalYears + arcEA / physA.gammaActual;
              const tauB = physB.rocketTotalYears + arcEB / physB.gammaActual;
              const fA = ageA + tauA + Math.max(0, tB - tA);
              const fB = ageB + tauB + Math.max(0, tA - tB);
              if (fA > 99 || fB > 99) {
                safe = false;
                break;
              }
            }
            if (!safe) continue;

            // Names
            let nameA = document.getElementById("gameNameA").value.trim();
            let nameB = document.getElementById("gameNameB").value.trim();
            if (!nameA || !nameB) {
              let defA, defB;
              if (state.lang === "pl") {
                const pl = pickTwoNames(DEFAULT_NAMES_PL);
                defA = pl[0].name;
                defB = pl[1].name;
              } else {
                const en = pickTwoNames(DEFAULT_NAMES_EN);
                defA = en[0];
                defB = en[1];
              }
              if (!nameA) nameA = defA;
              if (!nameB) nameB = defB;
            }

            state.challenge = {
              starIndexA: idxA,
              starIndexB: idxB,
              ageA: ageA,
              ageB: ageB,
              nameA: nameA,
              nameB: nameB,
              betaA: betaA,
              stepBetas: stepBetas,
              hitStepIndex: hitIdx,
              arcRatios: arcRatios,
            };
            state.selectedStep = null;
            state.shipA = makeGameShip(idxA, betaA);
            state.shipB = makeGameShip(idxB, stepBetas[hitIdx]);

            updateChallengeText();
            renderStepBar();
            updateGameReadouts();
            updateInfo();
            return;
          }

          // Fallback — Proxima + Sirius at a known-safe betaA.
          console.warn(
            "Challenge generation exhausted attempts, using safe fallback",
          );
          let fbNameA = document.getElementById("gameNameA").value.trim();
          let fbNameB = document.getElementById("gameNameB").value.trim();
          if (!fbNameA)
            fbNameA =
              state.lang === "pl"
                ? pickTwoNames(DEFAULT_NAMES_PL)[0].name
                : pickTwoNames(DEFAULT_NAMES_EN)[0];
          if (!fbNameB)
            fbNameB =
              state.lang === "pl"
                ? pickTwoNames(DEFAULT_NAMES_PL)[1].name
                : pickTwoNames(DEFAULT_NAMES_EN)[1];
          const fbHitIdx = Math.floor(Math.random() * stepCount);
          const fbSteps = buildStepOffsets(state.difficulty, fbHitIdx);
          const fbCtx = {
            starIndexA: 0,
            starIndexB: 1,
            ageA: 20,
            ageB: 25,
            betaA: 0.7,
          };
          const fbArcRatios = {
            A: arcRatioForStar(STARS[0]),
            B: arcRatioForStar(STARS[1]),
          };
          const fbStepBetas = [];
          for (let s2 = 0; s2 < fbSteps.length; s2++) {
            const b2 = solveBetaBForDiff(fbSteps[s2], fbCtx, fbArcRatios);
            fbStepBetas.push(b2 !== null ? b2 : 0.5);
          }
          state.challenge = {
            starIndexA: 0,
            starIndexB: 1,
            ageA: 20,
            ageB: 25,
            nameA: fbNameA,
            nameB: fbNameB,
            betaA: 0.7,
            stepBetas: fbStepBetas,
            hitStepIndex: fbHitIdx,
            arcRatios: fbArcRatios,
          };
          state.selectedStep = null;
          state.shipA = makeGameShip(0, 0.7);
          state.shipB = makeGameShip(1, fbStepBetas[fbHitIdx]);
          updateChallengeText();
          renderStepBar();
          updateGameReadouts();
          updateInfo();
        }

        function setDifficulty(d) {
          if (!(d in STEP_BASE)) return;
          if (state.phase !== "idle" && state.phase !== "landed") return;
          state.difficulty = d;
          document
            .getElementById("diffEasyBtn")
            .classList.toggle("active", d === "easy");
          document
            .getElementById("diffMediumBtn")
            .classList.toggle("active", d === "medium");
          document
            .getElementById("diffHardBtn")
            .classList.toggle("active", d === "hard");
          generateChallenge();
        }

        function selectGameStep(index) {
          if (state.phase !== "idle" && state.phase !== "landed") return;
          if (!state.challenge) return;
          if (index < 0 || index >= state.challenge.stepBetas.length) return;
          if (state.phase === "landed") handleReset();
          state.selectedStep = index;
          const beta = state.challenge.stepBetas[index];
          state.shipB = makeGameShip(state.challenge.starIndexB, beta);
          renderStepBar();
          updateInfo();
          // Selection immediately launches the flight at the middle (▶▶) playback speed.
          setWarp("fast");
        }

        function renderStepBar() {
          const bar = document.getElementById("stepBar");
          if (!bar) return;
          bar.textContent = "";
          if (!state.challenge) return;
          const betas = state.challenge.stepBetas;
          bar.setAttribute("data-steps", betas.length);
          const locked = state.phase !== "idle" && state.phase !== "landed";
          for (let i = 0; i < betas.length; i++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className =
              "step-btn" + (i === state.selectedStep ? " active" : "");
            btn.disabled = locked;
            btn.textContent = fmtBeta(betas[i]);
            (function (idx) {
              btn.addEventListener("click", function () {
                selectGameStep(idx);
              });
            })(i);
            bar.appendChild(btn);
          }
        }

        function updateChallengeText() {
          const c = state.challenge;
          if (!c) return;

          // Goal line
          const diff = c.ageB - c.ageA;
          const goalEl = document.getElementById("gameGoalText");
          goalEl.textContent = "";
          goalEl.appendChild(document.createTextNode(T("gameGoalPre")));
          const goalBold = document.createElement("b");
          goalBold.textContent = T("gameGoalBold").replace("{diff}", diff);
          goalEl.appendChild(goalBold);
          goalEl.appendChild(document.createTextNode(T("gameGoalPost")));

          // Captain A's fixed cruise readout
          const cap = document.getElementById("captainAcruise");
          if (cap) {
            cap.textContent = "";
            const bName = document.createElement("b");
            bName.textContent = T("gameCaptainACruiseName").replace(
              "{name}",
              c.nameA,
            );
            cap.appendChild(bName);
            cap.appendChild(
              document.createTextNode(T("gameCaptainACruiseMid")),
            );
            const betaSpan = document.createElement("span");
            betaSpan.className = "beta-val";
            betaSpan.textContent = T("gameCaptainACruiseBeta").replace(
              "{beta}",
              c.betaA.toFixed(2),
            );
            cap.appendChild(betaSpan);
          }

          // Name panel — set placeholder (shown when empty), preserve user-typed names
          const elA = document.getElementById("gameNameA");
          const elB = document.getElementById("gameNameB");
          elA.placeholder = c.nameA;
          elB.placeholder = c.nameB;
          if (!elA.value.trim()) elA.value = "";
          if (!elB.value.trim()) elB.value = "";
          document.getElementById("gameAgeA").value = c.ageA;
          document.getElementById("gameAgeB").value = c.ageB;
        }

        function updateGameReadouts() {
          // No separate readouts — info is in ship cards
        }

        function syncGameName(ship) {
          if (!state.challenge) return;
          const v = document.getElementById("gameName" + ship).value.trim();
          const placeholder = document.getElementById(
            "gameName" + ship,
          ).placeholder;
          state.challenge["name" + ship] = v || placeholder;
          if (ship === "A") updateChallengeText();
        }

        function setMode(mode) {
          if (state.mode === mode) return;
          if (state.phase !== "idle") handleReset();
          state.mode = mode;

          document
            .getElementById("modeExploreBtn")
            .classList.toggle("active", mode === "explore");
          document
            .getElementById("modeGameBtn")
            .classList.toggle("active", mode === "game");
          document
            .getElementById("grpExplore")
            .classList.toggle("hidden", mode !== "explore");
          document
            .getElementById("grpGame")
            .classList.toggle("hidden", mode !== "game");
          document
            .getElementById("grpReadouts")
            .classList.toggle("hidden", mode !== "explore");

          // Name panels: show the appropriate one per mode
          document
            .getElementById("namePanelExplore")
            .classList.toggle("hidden", mode !== "explore");
          document
            .getElementById("namePanelGame")
            .classList.toggle("hidden", mode !== "game");

          if (mode === "game") {
            generateChallenge();
          } else {
            state.challenge = null;
            state.shipA = null;
            state.shipB = null;
            state.gameResult = null;
            state.gameLaunched = false;
            recalcPhysics();
            updateReadouts();
          }
          updateInfo();
        }

        // Game-mode tangent+arc trajectory and position helpers
        function getGameTrajectory(star, yCenter) {
          return computeTangentArc(
            { x: getEarthX(), y: yCenter },
            { x: getStarScreenXForDist(star.dist), y: yCenter },
            starFlybyRingR(star),
          );
        }

        function getGameTurnDuration(traj) {
          const legSpeed = traj.legLen / WALL_SECONDS_BASE;
          if (legSpeed < 1e-3) return 1.0;
          return (traj.arcSweep * traj.R) / legSpeed;
        }

        function getGameRocketPos(ship, traj) {
          if (ship.phase === "turnaround") {
            const f = clamp(
              ship.turnaroundTimer / getGameTurnDuration(traj),
              0,
              1,
            );
            const pt = arcPosAt(traj, f);
            return {
              x: pt.x,
              y: pt.y,
              angle: arcHeadAt(traj, f),
              traj: traj,
              onArc: true,
              arcF: f,
            };
          }

          const park = getShipParkingPos(traj);
          let legP;
          if (ship.phase === "outbound" || ship.phase === "idle") {
            legP = clamp(ship.progress, 0, 1) / 0.5;
            return {
              x: park.x + (traj.T1.x - park.x) * legP,
              y: park.y + (traj.T1.y - park.y) * legP,
              angle: headingFromTo(park, traj.T1),
              traj: traj,
              onArc: false,
              legP: legP,
              leg: "out",
            };
          }

          // return / waiting / landed — land at landing spot, not inside Earth
          legP = clamp((ship.progress - 0.5) / 0.5, 0, 1);
          const land = getShipLandingPos(traj);
          return {
            x: traj.T2.x + (land.x - traj.T2.x) * legP,
            y: traj.T2.y + (land.y - traj.T2.y) * legP,
            angle: headingFromTo(traj.T2, land),
            traj: traj,
            onArc: false,
            legP: legP,
            leg: "ret",
          };
        }

        function computeGameFinalAges() {
          if (!state.challenge || !state.shipA || !state.shipB) return null;
          const c = state.challenge;
          const pA = state.shipA.phys;
          const pB = state.shipB.phys;
          // Include arc accumulation so final ages agree with in-flight clocks.
          const tA = pA.earthTotalYears + state.shipA.arcEarthAccum;
          const tB = pB.earthTotalYears + state.shipB.arcEarthAccum;
          const tauA = pA.rocketTotalYears + state.shipA.arcRocketAccum;
          const tauB = pB.rocketTotalYears + state.shipB.arcRocketAccum;
          const finalA = c.ageA + tauA + Math.max(0, tB - tA);
          const finalB = c.ageB + tauB + Math.max(0, tA - tB);
          return {
            finalA: finalA,
            finalB: finalB,
            diff: Math.abs(finalA - finalB),
          };
        }

        function evaluateGame() {
          const ages = computeGameFinalAges();
          if (!ages) return;
          const c = state.challenge;

          // Check too-old first
          if (ages.finalA > 100) {
            state.gameResult = "tooOld";
            showGameOverlay("tooOld", c.nameA, ages);
            return;
          }
          if (ages.finalB > 100) {
            state.gameResult = "tooOld";
            showGameOverlay("tooOld", c.nameB, ages);
            return;
          }

          if (ages.diff < 0.5) {
            state.gameResult = "perfect";
          } else if (ages.diff < 2.0) {
            state.gameResult = "close";
          } else {
            state.gameResult = "miss";
          }
          showGameOverlay(state.gameResult, null, ages);
        }

        function showGameOverlay(result, tooOldName, ages) {
          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();

          const overlay = document.createElement("div");
          overlay.className = "result-overlay";

          let emoji, msg;
          if (result === "perfect") {
            emoji = "\uD83C\uDF89";
            msg = T("gamePerfect");
          } else if (result === "close") {
            emoji = "\uD83D\uDC4D\uD83C\uDFFB";
            msg = T("gameClose").replace("{diff}", formatYears(ages.diff));
          } else if (result === "miss") {
            emoji = "\uD83D\uDC4E\uD83C\uDFFB";
            msg = T("gameMiss").replace("{diff}", formatYears(ages.diff));
          } else {
            emoji = "\uD83D\uDC80";
            msg = T("gameTooOld").replace("{name}", tooOldName);
          }

          const c = state.challenge;
          const starA = STARS[c.starIndexA];
          const starB = STARS[c.starIndexB];
          const nameStarA = state.lang === "en" ? starA.nameEn : starA.namePl;
          const nameStarB = state.lang === "en" ? starB.nameEn : starB.namePl;

          overlay.appendChild(el("div", "game-overlay-result", [emoji]));
          const msgColor =
            result === "perfect"
              ? "#7ce88f"
              : result === "close"
                ? "#58a6ff"
                : result === "tooOld"
                  ? "#f97583"
                  : "#f0b43c";
          const msgEl = el("div", "game-overlay-msg", [msg]);
          msgEl.style.color = msgColor;
          overlay.appendChild(msgEl);
          const ageLabel = state.lang === "pl" ? "wiek" : "age";
          const gDetail = el("div", "game-overlay-detail");
          gDetail.appendChild(
            elStyled("span", "color:var(--ship-a-color)", [c.nameA]),
          );
          gDetail.appendChild(
            document.createTextNode(
              ": " +
                ageLabel +
                " " +
                c.ageA +
                " \u2192 " +
                ages.finalA.toFixed(1) +
                " (" +
                nameStarA +
                " @ " +
                fmtBeta(state.shipA.beta) +
                ")",
            ),
          );
          gDetail.appendChild(document.createElement("br"));
          gDetail.appendChild(
            elStyled("span", "color:var(--ship-b-color)", [c.nameB]),
          );
          gDetail.appendChild(
            document.createTextNode(
              ": " +
                ageLabel +
                " " +
                c.ageB +
                " \u2192 " +
                ages.finalB.toFixed(1) +
                " (" +
                nameStarB +
                " @ " +
                fmtBeta(state.shipB.beta) +
                ")",
            ),
          );
          overlay.appendChild(gDetail);
          overlay.appendChild(
            el("div", "game-overlay-diff", [
              (state.lang === "pl" ? "R\u00F3\u017Cnica" : "Difference") +
                ": " +
                formatYears(ages.diff),
            ]),
          );
          overlay.appendChild(el("div", "overlay-hint", [T("clickToDismiss")]));

          overlay.addEventListener("click", function () {
            overlay.remove();
          });
          document.body.appendChild(overlay);
        }

        // Game mode drawing
        function drawGameScene() {
          ctx.fillStyle = "#080c14";
          ctx.fillRect(0, 0, W, H);
          drawStarfield();

          const c = state.challenge;
          if (!c) return;

          // Divider line between the two halves
          ctx.beginPath();
          ctx.moveTo(0, H * 0.5);
          ctx.lineTo(W, H * 0.5);
          ctx.strokeStyle = "rgba(30,42,58,0.5)";
          ctx.lineWidth = 1;
          ctx.stroke();

          const gameMaxT =
            state.gameMaxEarthTime ||
            Math.max(
              state.shipA.phys.earthTotalYears,
              state.shipB.phys.earthTotalYears,
            );

          // Draw top half — Ship A
          drawGameHalf(
            state.shipA,
            c.starIndexA,
            c.nameA,
            c.ageA,
            H * 0.36,
            "#ff6b8a",
            "rgba(255,107,138,",
            gameMaxT,
            "A",
          );
          // Draw bottom half — Ship B
          drawGameHalf(
            state.shipB,
            c.starIndexB,
            c.nameB,
            c.ageB,
            H * 0.8,
            "#7ce88f",
            "rgba(124,232,143,",
            gameMaxT,
            "B",
          );
        }

        function drawGameHalf(
          ship,
          starIndex,
          name,
          startAge,
          yCenter,
          color,
          rgbaBase,
          gameMaxT,
          shipId,
        ) {
          const earthX = getEarthX();
          const star = STARS[starIndex];
          const starX = getStarScreenXForDist(star.dist);
          const r = EARTH_RADIUS;

          // Earth
          ctx.beginPath();
          ctx.arc(earthX, yCenter, r * 1.15, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(77,184,255,0.12)";
          ctx.lineWidth = r * 0.15;
          ctx.stroke();
          const glow = ctx.createRadialGradient(
            earthX,
            yCenter,
            r * 0.3,
            earthX,
            yCenter,
            r * 3,
          );
          glow.addColorStop(0, "rgba(77,184,255,0.18)");
          glow.addColorStop(0.5, "rgba(77,184,255,0.04)");
          glow.addColorStop(1, "rgba(77,184,255,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(earthX, yCenter, r * 3, 0, Math.PI * 2);
          ctx.fill();
          const bodyGrad = ctx.createRadialGradient(
            earthX - r * 0.3,
            yCenter - r * 0.3,
            r * 0.1,
            earthX,
            yCenter,
            r,
          );
          bodyGrad.addColorStop(0, "#7ed6f7");
          bodyGrad.addColorStop(0.7, "#3aa8d8");
          bodyGrad.addColorStop(1, "#1a6e8e");
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.arc(earthX, yCenter, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(77,184,255,0.3)";
          ctx.lineWidth = 1;
          ctx.stroke();

          // Destination star — with shadows during drag
          const isDraggingThis = drag.active && drag.ship === shipId;
          if (isDraggingThis) {
            drawStarShadows(yCenter, starIndex, drag.nearestSlot);
            ctx.globalAlpha = 0.2;
            drawGameStar(star, starX, yCenter, true);
            ctx.globalAlpha = 1;
          } else {
            drawGameStar(star, starX, yCenter);
          }

          // Trajectory
          const traj = getGameTrajectory(star, yCenter);
          drawGameTrajectory(ship, traj, rgbaBase);

          // Spacecraft
          const pos = getGameRocketPos(ship, traj);
          drawGameSpacecraft(pos.x, pos.y, pos.angle, color);

          // Clock — positioned like explore mode relative to this half's Earth
          const clockOffset = Math.min(H * 0.18, 100);
          const clockY = yCenter - clockOffset;
          const clockX = getShipParkingPos(traj).x;
          const yr = T("yr");
          const age = startAge + ship.rocketElapsed + ship.waitingTime;
          drawStickFigure(clockX - 16, clockY + 8, color, false);
          drawAnalogClock(
            clockX + 28,
            clockY,
            CLOCK_RADIUS,
            ship.rocketElapsed + ship.waitingTime,
            color,
            name,
            age.toFixed(1) + " " + yr,
            gameMaxT,
          );
        }

        function drawGameStar(star, cx, cy, hideLabel) {
          const r = star.radius;
          const rgb = star.glowRgb;
          const glow = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r * 4);
          glow.addColorStop(0, "rgba(" + rgb + ",0.4)");
          glow.addColorStop(0.4, "rgba(" + rgb + ",0.1)");
          glow.addColorStop(1, "rgba(" + rgb + ",0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = star.color;
          ctx.fill();
          if (hideLabel) return;
          // Label — clear the flyby ring so it doesn't overlap the arc
          const name = state.lang === "en" ? star.nameEn : star.namePl;
          const labelX = cx + starFlybyRingR(star) + 10;
          ctx.font = '15px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,248,225,0.7)";
          ctx.textAlign = "left";
          ctx.fillText(name, labelX, cy - r - 26);
          ctx.font = '13px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,248,225,0.4)";
          ctx.fillText(
            (star.approx ? "~" : "") + star.dist + " ly",
            labelX,
            cy - r - 12,
          );
        }

        function drawGameTrajectory(ship, traj, rgbaBase) {
          if (ship.phase === "idle") return;
          // Fading comet-tail trail (rgbaBase is "rgba(R,G,B," — slice out "R,G,B")
          const rgb = rgbaBase.slice(5, -1);
          drawShipTrail(
            traj,
            ship.phase,
            ship.progress,
            ship.turnaroundTimer,
            getGameTurnDuration(traj),
            rgb,
          );
        }

        function drawGameSpacecraft(x, y, angle, color) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          const glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 16);
          glow.addColorStop(0, "rgba(255,224,102,0.36)");
          glow.addColorStop(1, "rgba(255,224,102,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(14.3, 0);
          ctx.lineTo(-7.7, -7.15);
          ctx.lineTo(-7.7, 7.15);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        // Game animation — each ship has independent progress, exactly like explore mode.
        // Progress only advances during outbound/return, freezes during turnaround.
        function animateGame(dt) {
          if (
            state.paused ||
            state.phase === "idle" ||
            state.phase === "landed"
          )
            return;

          const shipA = state.shipA;
          const shipB = state.shipB;

          // Base progress rate: longest trip completes in 2*WALL_SECONDS_BASE wall seconds
          const baseRate = state.animSpeed / (2 * WALL_SECONDS_BASE);

          advanceGameShip(shipA, dt, baseRate);
          advanceGameShip(shipB, dt, baseRate);

          // Accumulate waiting time for returned ships
          const earthRate = baseRate * state.gameMaxEarthTime; // earth-years per wall-second
          if (shipA.phase === "waiting") shipA.waitingTime += dt * earthRate;
          if (shipB.phase === "waiting") shipB.waitingTime += dt * earthRate;

          // Check if both have returned
          if (
            state.phase !== "landed" &&
            shipA.phase === "waiting" &&
            shipB.phase === "waiting"
          ) {
            state.phase = "landed";
            // Set final waiting times from the effective (arc-inclusive) totals so
            // the waiting gap matches the in-flight displayed clocks.
            const T_A = shipA.phys.earthTotalYears + shipA.arcEarthAccum;
            const T_B = shipB.phys.earthTotalYears + shipB.arcEarthAccum;
            shipA.waitingTime = Math.max(0, T_B - T_A);
            shipB.waitingTime = Math.max(0, T_A - T_B);
            updateWarpButtons();
            updateInfo();
            setTimeout(evaluateGame, 400);
          }
        }

        function advanceGameShip(ship, dt, baseRate) {
          if (ship.phase === "waiting") return;

          const T_total = ship.phys.earthTotalYears;
          // Ship progress rate: scales so this ship's journey fills the right proportion of wall time
          const shipRate = (baseRate * state.gameMaxEarthTime) / T_total;

          const star =
            ship === state.shipA
              ? STARS[state.challenge.starIndexA]
              : STARS[state.challenge.starIndexB];
          const yCenter = ship === state.shipA ? H * 0.36 : H * 0.8;
          const traj = getGameTrajectory(star, yCenter);
          const turnDuration = getGameTurnDuration(traj);

          // Turnaround: animate the arc and tick clocks at cruise-speed gamma.
          // In game mode, both ships' legs finish in the same wall-time, so the
          // common Earth rate per wall-sec is gameMaxEarthTime / (2*WALL_SECONDS_BASE).
          if (ship.phase === "turnaround") {
            ship.turnaroundTimer += dt * state.animSpeed;

            const earthPerWallSec =
              state.gameMaxEarthTime / (2 * WALL_SECONDS_BASE);
            const dEarth = earthPerWallSec * dt * state.animSpeed;
            const gAct = Math.max(1, ship.phys.gammaActual || 1);
            ship.arcEarthAccum += dEarth;
            ship.arcRocketAccum += dEarth / gAct;

            const mid = computeElapsedForProgress(0.5, ship.phys);
            ship.earthElapsed = mid.earthElapsed + ship.arcEarthAccum;
            ship.rocketElapsed = mid.rocketElapsed + ship.arcRocketAccum;
            ship.currentBeta = ship.phys.betaActual;

            if (ship.turnaroundTimer >= turnDuration) {
              ship.phase = "return";
            }
            return;
          }

          // Advance progress (outbound or return)
          ship.progress += dt * shipRate;
          ship.progress = clamp(ship.progress, 0, 1);

          // Outbound → turnaround at midpoint
          let elapsed;
          if (ship.phase === "outbound" && ship.progress >= 0.5) {
            ship.progress = 0.5;
            ship.phase = "turnaround";
            ship.turnaroundTimer = 0;
            ship.currentBeta = 0;
            elapsed = computeElapsedForProgress(0.5, ship.phys);
            ship.earthElapsed = elapsed.earthElapsed + ship.arcEarthAccum;
            ship.rocketElapsed = elapsed.rocketElapsed + ship.arcRocketAccum;
            return;
          }

          // Return complete
          if (ship.progress >= 1.0) {
            ship.progress = 1.0;
            ship.phase = "waiting";
            ship.waitingTime = 0;
            elapsed = computeElapsedForProgress(1, ship.phys);
            ship.earthElapsed = elapsed.earthElapsed + ship.arcEarthAccum;
            ship.rocketElapsed = elapsed.rocketElapsed + ship.arcRocketAccum;
            ship.currentBeta = 0;
            return;
          }

          // Normal flight — update elapsed times (arc contribution carries through)
          elapsed = computeElapsedForProgress(ship.progress, ship.phys);
          ship.earthElapsed = elapsed.earthElapsed + ship.arcEarthAccum;
          ship.rocketElapsed = elapsed.rocketElapsed + ship.arcRocketAccum;
          ship.currentBeta = elapsed.currentBeta;
        }

        // ====================== INIT ======================

        // Event bindings (moved from inline HTML handlers)
        document
          .getElementById("langBtn")
          .addEventListener("click", toggleLang);
        document
          .getElementById("modeExploreBtn")
          .addEventListener("click", function () {
            setMode("explore");
          });
        document
          .getElementById("modeGameBtn")
          .addEventListener("click", function () {
            setMode("game");
          });
        document
          .getElementById("diffEasyBtn")
          .addEventListener("click", function () {
            setDifficulty("easy");
          });
        document
          .getElementById("diffMediumBtn")
          .addEventListener("click", function () {
            setDifficulty("medium");
          });
        document
          .getElementById("diffHardBtn")
          .addEventListener("click", function () {
            setDifficulty("hard");
          });
        document
          .getElementById("newChallengeBtn")
          .addEventListener("click", generateChallenge);
        document
          .getElementById("warpNormalBtn")
          .addEventListener("click", function () {
            setWarp("normal");
          });
        document
          .getElementById("warpFastBtn")
          .addEventListener("click", function () {
            setWarp("fast");
          });
        document
          .getElementById("warpFastestBtn")
          .addEventListener("click", function () {
            setWarp("fastest");
          });
        document
          .getElementById("resetBtn")
          .addEventListener("click", handleReset);
        document
          .getElementById("gameNameA")
          .addEventListener("input", function () {
            syncGameName("A");
          });
        document
          .getElementById("gameNameB")
          .addEventListener("input", function () {
            syncGameName("B");
          });

        document.getElementById("langBtn").textContent =
          state.lang === "en" ? "PL" : "EN";

        // Personalization inputs
        document.getElementById("earthTwinName").placeholder =
          getDefaultName(0);
        document.getElementById("rocketTwinName").placeholder =
          getDefaultName(1);
        document.getElementById("earthShipName").placeholder = T("phEarthShip");
        document.getElementById("rocketShipName").placeholder =
          T("phRocketShip");
        document.getElementById("earthTwinAge").value = state.defaultAge;
        document.getElementById("rocketTwinAge").value = state.defaultAge;

        // Initialize speed bar widgets
        const speedBars = document.querySelectorAll(".speed-bar");
        for (let sb = 0; sb < speedBars.length; sb++) {
          initSpeedBar(speedBars[sb]);
        }
        updateSpeedBar("speedBar", 376, sliderToBeta(376));

        resize();
        initBgStars(NUM_BG_STARS);
        recalcPhysics();
        updateElapsedFromProgress();
        populateStarSelect();
        applyTranslations();
        requestAnimationFrame(animate);

        // Show drag hint after a short delay to let the canvas render
        setTimeout(showDragHint, 600);
        setTimeout(hideDragHint, 8000);

        window.addEventListener("resize", function () {
          resize();
          if (dragHintVisible) showDragHint();
          // Arc ratios depend on canvas width; regenerate the challenge when idle so the
          // solver's "hit" step still lands inside the perfect-match tolerance.
          if (state.mode === "game" && state.phase === "idle")
            generateChallenge();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            const overlay = document.querySelector(".result-overlay");
            if (overlay) overlay.remove();
          }
        });

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {
            lastTime = 0;
          }
        });
      })();
    </script>
  </body>
</html>
