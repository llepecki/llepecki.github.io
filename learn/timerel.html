<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive time dilation simulator. Watch relativistic aging unfold as a rocket travels to real stars near the speed of light."
    />
    <meta name="author" content="Łukasz Łepecki" />
    <link rel="canonical" href="https://lepecki.com/learn/timerel.html" />
    <meta property="og:title" content="Time Dilation Simulator" />
    <meta
      property="og:description"
      content="Interactive time dilation simulator. Watch relativistic aging unfold as a rocket travels to real stars near the speed of light."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lepecki.com/learn/timerel.html" />
    <meta property="og:site_name" content="Łukasz Łepecki" />
    <meta
      property="og:image"
      content="https://lepecki.com/assets/img/avatar.webp"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Time Dilation Simulator" />
    <meta
      name="twitter:description"
      content="Interactive time dilation simulator. Watch relativistic aging unfold as a rocket travels to real stars near the speed of light."
    />
    <title>Time Dilation Simulator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0f18;
        --panel: #131825;
        --panel-border: #1e2a3a;
        --text: #c9d1d9;
        --text-dim: #6e7a8a;
        --accent: #58a6ff;
        --earth-color: #4db8ff;
        --rocket-color: #ffb347;
        --star-glow: #fff8e1;
        --ship-a-color: #ff6b8a;
        --ship-b-color: #7ce88f;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Outfit", sans-serif;
        color: var(--text);
      }

      header {
        padding: 20px 28px 16px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      header h1 a {
        color: inherit;
        text-decoration: none;
      }
      header h1 a:hover {
        opacity: 0.7;
      }
      header p {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .main {
        display: flex;
        height: calc(100vh - 80px);
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        background: #080c14;
        min-width: 0;
      }
      .canvas-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
        cursor: default;
      }
      .canvas-wrap canvas.cursor-grab {
        cursor: grab;
      }
      .canvas-wrap canvas.cursor-grabbing {
        cursor: grabbing;
      }

      .controls {
        width: 300px;
        flex-shrink: 0;
        padding: 20px;
        border-left: 1px solid var(--panel-border);
        display: flex;
        flex-direction: column;
        gap: 22px;
        overflow-y: auto;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
      }

      /* ---- Speed Bar Widget ---- */
      .speed-bar {
        display: flex;
        align-items: stretch;
        height: 37px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        overflow: hidden;
        background: var(--panel);
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      .speed-bar-btn {
        width: 34px;
        flex-shrink: 0;
        border: none;
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s;
        touch-action: manipulation;
      }
      .speed-bar-btn:hover {
        background: rgba(88, 166, 255, 0.12);
        color: var(--accent);
      }
      .speed-bar-btn:active {
        background: var(--accent);
        color: var(--bg);
      }
      .speed-bar-minus {
        border-right: 1px solid var(--panel-border);
      }
      .speed-bar-plus {
        border-left: 1px solid var(--panel-border);
      }
      .speed-bar-track {
        flex: 1;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        min-width: 0;
      }
      .speed-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0%;
        transition: width 0.05s ease-out;
        background: var(--accent);
        pointer-events: none;
      }
      .speed-bar-val {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        color: #fff;
        pointer-events: none;
        letter-spacing: 0.5px;
        z-index: 1;
      }
      .speed-bar.disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      @keyframes speedGlow {
        0%,
        100% {
          box-shadow: inset 0 0 8px rgba(255, 23, 68, 0.3);
        }
        50% {
          box-shadow: inset 0 0 16px rgba(255, 23, 68, 0.6);
        }
      }
      .speed-bar-track.extreme .speed-bar-fill {
        animation: speedGlow 1.2s ease-in-out infinite;
      }

      .star-select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        outline: none;
      }
      .star-select:focus {
        border-color: var(--accent);
      }
      .star-select:disabled {
        opacity: 0.5;
      }
      .star-select option {
        background: var(--panel);
        color: var(--text);
      }

      .type-toggle {
        display: flex;
        gap: 6px;
      }
      .type-btn {
        flex: 1;
        padding: 10px 4px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .type-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .type-btn.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .type-btn:disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      .readouts {
        gap: 6px;
      }
      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        padding: 2px 0;
      }
      .readout-label {
        color: var(--text-dim);
      }
      .readout-val {
        color: var(--text);
        font-size: 13px;
      }

      .info-text {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
        border-top: 1px solid var(--panel-border);
        padding-top: 12px;
      }

      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(11, 15, 24, 0.94);
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
        overflow-y: auto;
        padding: 20px;
      }
      .overlay-title {
        font-size: 36px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 20px;
      }
      .overlay-detail {
        font-family: "Share Tech Mono", monospace;
        font-size: 18px;
        color: var(--text);
        line-height: 2.2;
        text-align: left;
      }
      .overlay-conclusion {
        font-size: 22px;
        font-weight: 600;
        color: #fff;
        margin-top: 24px;
        text-align: center;
        max-width: 500px;
        line-height: 1.5;
      }
      .overlay-meeting {
        font-size: 18px;
        margin-top: 20px;
        text-align: center;
        max-width: 90vw;
        line-height: 1.6;
        color: var(--text);
        word-break: break-all;
      }
      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        margin-top: 16px;
        color: rgba(255, 255, 255, 0.4);
      }
      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .star-facts {
        position: absolute;
        z-index: 5;
        background: rgba(19, 24, 37, 0.95);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 14px 16px;
        max-width: 340px;
        pointer-events: none;
        font-family: "Share Tech Mono", monospace;
        font-size: 15px;
        color: var(--text);
        line-height: 1.5;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .star-facts.visible {
        opacity: 1;
      }
      .sf-header {
        font-family: "Outfit", sans-serif;
        font-size: 19px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .sf-meta {
        color: var(--text-dim);
        font-size: 15px;
        margin-bottom: 8px;
      }
      .sf-stats {
        margin-bottom: 10px;
      }
      .sf-stat {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
      }
      .sf-stat-label {
        color: var(--text-dim);
      }
      .sf-wow {
        border-top: 1px solid var(--panel-border);
        padding-top: 8px;
        margin-bottom: 8px;
        color: var(--star-glow);
        font-size: 15px;
        line-height: 1.5;
      }
      .sf-find {
        color: var(--text-dim);
        font-size: 15px;
        line-height: 1.5;
      }

      .name-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(19, 24, 37, 0.92);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .name-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ship-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .name-input {
        width: 110px;
        padding: 7px 10px;
        border-radius: 6px;
        border: 1px solid var(--panel-border);
        background: rgba(11, 15, 24, 0.7);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        outline: none;
      }
      .name-input:focus {
        border-color: var(--accent);
      }
      .name-input::placeholder {
        color: var(--text-dim);
      }
      .age-input {
        width: 45px;
        padding: 7px 6px;
        border-radius: 6px;
        text-align: center;
        border: 1px solid var(--panel-border);
        background: rgba(11, 15, 24, 0.7);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        outline: none;
        -moz-appearance: textfield;
      }
      .age-input::-webkit-inner-spin-button,
      .age-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .age-input:focus {
        border-color: var(--accent);
      }
      .age-input[readonly] {
        opacity: 0.55;
        cursor: default;
      }

      #grpGame {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .game-goal {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        text-align: center;
        color: var(--text);
        padding: 2px 0;
      }
      .game-goal b {
        color: #fff;
      }

      .captain-a-readout {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        text-align: center;
        color: var(--text-dim);
        padding: 8px 6px;
        border: 1px dashed var(--panel-border);
        border-radius: 6px;
        line-height: 1.5;
      }
      .captain-a-readout b {
        color: var(--ship-a-color);
        font-weight: 700;
      }
      .captain-a-readout .beta-val {
        color: var(--text);
        font-weight: 700;
      }

      .step-bar {
        display: grid;
        gap: 4px;
        width: 100%;
        padding: 4px;
        border-radius: 8px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
      }
      .step-bar[data-steps="3"] {
        grid-template-columns: repeat(3, 1fr);
      }
      .step-bar[data-steps="5"] {
        grid-template-columns: repeat(3, 1fr);
      }
      .step-bar[data-steps="7"] {
        grid-template-columns: repeat(4, 1fr);
      }
      .step-btn {
        min-height: 44px;
        padding: 6px 2px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: rgba(11, 15, 24, 0.5);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .step-btn:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .step-btn.active {
        border-color: var(--ship-b-color);
        color: var(--ship-b-color);
        background: rgba(124, 232, 143, 0.14);
        font-weight: 700;
      }
      .step-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      @keyframes stepBarPulse {
        0%,
        100% {
          border-color: var(--panel-border);
          box-shadow: none;
        }
        50% {
          border-color: var(--accent);
          box-shadow: 0 0 10px rgba(88, 166, 255, 0.35);
        }
      }
      .step-bar.pulse {
        animation: stepBarPulse 0.7s ease-in-out;
      }

      .game-overlay-detail {
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        color: var(--text);
        line-height: 2;
        text-align: left;
        max-width: 90vw;
      }
      .game-overlay-result {
        font-size: 48px;
        margin-bottom: 8px;
      }
      .game-overlay-msg {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .game-overlay-diff {
        font-size: 20px;
        font-weight: 600;
        margin-top: 16px;
        text-align: center;
      }

      .header-icon {
        font-size: 18px;
        line-height: 1;
      }
      .ship-dot-earth {
        background: var(--earth-color);
      }
      .ship-dot-rocket {
        background: var(--rocket-color);
      }
      .ship-dot-a {
        background: var(--ship-a-color);
      }
      .ship-dot-b {
        background: var(--ship-b-color);
      }
      .hidden {
        display: none;
      }
      #grpGame.hidden {
        display: none;
      }
      .full-width {
        width: 100%;
      }
      .readout-earth {
        color: var(--earth-color);
      }
      .readout-rocket {
        color: var(--rocket-color);
      }

      @media (prefers-reduced-motion: reduce) {
        .lang-btn,
        .speed-bar-btn,
        .speed-bar-fill,
        .type-btn,
        .star-facts,
        .step-btn {
          transition: none;
        }
        .speed-bar-track.extreme .speed-bar-fill,
        .result-overlay,
        .step-bar.pulse {
          animation: none;
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: 100vh;
        }
        .canvas-wrap {
          min-height: 350px;
          flex: none;
          height: 50vh;
        }
        .controls {
          width: 100%;
          border-left: none;
          border-top: 1px solid var(--panel-border);
          padding: 14px 16px;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/"><span class="header-icon">&#x1F680;</span></a>
          <span id="titleText">Time Dilation Simulator</span>
        </h1>
        <p id="subtitleText">
          A person on Earth, a person in a rocket — who ages less on a round
          trip near the speed of light?
        </p>
      </div>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="canvas-wrap">
        <canvas
          id="canvas"
          role="img"
          aria-label="Time dilation simulation canvas"
        ></canvas>
        <div id="starFactsOverlay" class="star-facts"></div>
        <div id="dragHint" class="star-facts"></div>
        <div class="name-panel" id="namePanelExplore">
          <div class="name-row">
            <span class="ship-dot ship-dot-earth"></span>
            <input
              id="earthTwinName"
              class="name-input"
              maxlength="14"
              aria-label="Earth twin name"
            />
            <input
              id="earthShipName"
              class="name-input"
              maxlength="14"
              aria-label="Earth ship name"
            />
            <input
              id="earthTwinAge"
              class="age-input"
              type="number"
              min="1"
              max="99"
              aria-label="Earth twin age"
            />
          </div>
          <div class="name-row">
            <span class="ship-dot ship-dot-rocket"></span>
            <input
              id="rocketTwinName"
              class="name-input"
              maxlength="14"
              aria-label="Rocket twin name"
            />
            <input
              id="rocketShipName"
              class="name-input"
              maxlength="14"
              aria-label="Rocket ship name"
            />
            <input
              id="rocketTwinAge"
              class="age-input"
              type="number"
              min="1"
              max="99"
              aria-label="Rocket twin age"
            />
          </div>
        </div>
        <div class="name-panel hidden" id="namePanelGame">
          <div class="name-row">
            <span class="ship-dot ship-dot-a"></span>
            <input
              id="gameNameA"
              class="name-input"
              maxlength="14"
              aria-label="Captain A name"
            />
            <input
              id="gameShipA"
              class="name-input"
              maxlength="14"
              aria-label="Captain A ship name"
            />
            <input
              id="gameAgeA"
              class="age-input"
              type="number"
              min="1"
              max="99"
              readonly
              aria-label="Captain A age"
            />
          </div>
          <div class="name-row">
            <span class="ship-dot ship-dot-b"></span>
            <input
              id="gameNameB"
              class="name-input"
              maxlength="14"
              aria-label="Captain B name"
            />
            <input
              id="gameShipB"
              class="name-input"
              maxlength="14"
              aria-label="Captain B ship name"
            />
            <input
              id="gameAgeB"
              class="age-input"
              type="number"
              min="1"
              max="99"
              readonly
              aria-label="Captain B age"
            />
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-group" id="grpMode">
          <div class="type-toggle">
            <button type="button" class="type-btn active" id="modeExploreBtn">
              Explore
            </button>
            <button type="button" class="type-btn" id="modeGameBtn">
              Game
            </button>
          </div>
        </div>

        <div id="grpExplore">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblSpeed">Travel Speed</span>
            <div class="speed-bar" id="speedBar">
              <button
                class="speed-bar-btn speed-bar-minus"
                id="speedMinus"
                type="button"
                aria-label="Decrease speed"
              >
                &minus;
              </button>
              <div class="speed-bar-track">
                <div class="speed-bar-fill" id="speedFill"></div>
                <span class="speed-bar-val" id="speedVal">0.50c</span>
              </div>
              <button
                class="speed-bar-btn speed-bar-plus"
                id="speedPlus"
                type="button"
                aria-label="Increase speed"
              >
                +
              </button>
              <input type="hidden" id="speedSlider" value="376" />
            </div>
          </div>
        </div>

        <div id="grpGame" class="hidden">
          <div class="game-goal" id="gameGoalText"></div>

          <div class="ctrl-group">
            <span class="ctrl-label" id="lblDifficulty">Difficulty</span>
            <div class="type-toggle">
              <button
                type="button"
                class="type-btn active"
                id="diffEasyBtn"
                aria-label="Easy"
              >
                &#x2605;
              </button>
              <button
                type="button"
                class="type-btn"
                id="diffMediumBtn"
                aria-label="Medium"
              >

        // ====================== UTILITIES ======================

        function clamp(v, lo, hi) {
          return v < lo ? lo : v > hi ? hi : v;
        }

        function el(tag, classOrText, children) {
          const e = document.createElement(tag);
          if (typeof classOrText === "string" && !children) {
            e.textContent = classOrText;
            return e;
          }
          if (classOrText) e.className = classOrText;
          if (children) {
            for (let i = 0; i < children.length; i++) {
              const c = children[i];
              e.appendChild(
                typeof c === "string" ? document.createTextNode(c) : c,
              );
            }
          }
          return e;
        }

        function elStyled(tag, style, children) {
          const e = document.createElement(tag);
          e.style.cssText = style;
          if (children) {
            for (let i = 0; i < children.length; i++) {
              const c = children[i];
              e.appendChild(
                typeof c === "string" ? document.createTextNode(c) : c,
              );
            }
          }
          return e;
        }

        function T(key) {
          return I18N[state.lang][key] || key;
        }
        function arctanh(x) {
          return 0.5 * Math.log((1 + x) / (1 - x));
        }

        function fmtBeta(b) {
          if (b >= 0.999) return b.toFixed(4) + "c";
          if (b >= 0.99) return b.toFixed(3) + "c";
          return b.toFixed(2) + "c";
        }

        // Non-linear speed slider: slider 0-1000 → beta 0.10-0.9999
        // Linear 0.10-0.90 for slider 0-667, then exponential 0.90-0.9999 for slider 667-1000
        // 0.90c at 2/3 of bar — gives 1/3 of bar to the relativistic zone
        function sliderToBeta(s) {
          s = clamp(s, 0, 1000);
          if (s <= 667) {
            return BETA_MIN + (0.9 - BETA_MIN) * (s / 667);
          }
          // Exponential zone: map 667-1000 → 0.90-0.9999
          // beta = 1 - 0.10 * exp(-k * t), k = ln(0.10/0.0001) = ln(1000)
          const t = (s - 667) / 333;
          return 1 - 0.1 * Math.exp(-t * Math.log(0.1 / 0.0001));
          // at t=0: 1 - 0.10 = 0.90, at t=1: 1 - 0.0001 = 0.9999
        }

        // ====================== SPEED BAR ======================

        // Sci-fi dashboard: cyan → amber → danger red
        const SPEED_COLOR_STOPS = [
          [0.1, 200, 100, 50], // bright cyan #00b0ff
          [0.7, 34, 100, 50], // vivid amber #ff9100
          [0.999, 349, 100, 55], // danger red #ff1744
        ];

        function speedBarColor(beta) {
          const stops = SPEED_COLOR_STOPS;
          if (beta <= stops[0][0])
            return (
              "hsl(" +
              stops[0][1] +
              "," +
              stops[0][2] +
              "%," +
              stops[0][3] +
              "%)"
            );
          if (beta >= stops[stops.length - 1][0])
            return (
              "hsl(" +
              stops[stops.length - 1][1] +
              "," +
              stops[stops.length - 1][2] +
              "%," +
              stops[stops.length - 1][3] +
              "%)"
            );
          for (let i = 0; i < stops.length - 1; i++) {
            if (beta >= stops[i][0] && beta <= stops[i + 1][0]) {
              const t = (beta - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
              const h0 = stops[i][1],
                h1 = stops[i + 1][1];
              let dh = h1 - h0;
              if (dh > 180) dh -= 360;
              if (dh < -180) dh += 360;
              const h = (((h0 + dh * t) % 360) + 360) % 360;
              const s = stops[i][2] + (stops[i + 1][2] - stops[i][2]) * t;
              const l = stops[i][3] + (stops[i + 1][3] - stops[i][3]) * t;
              return (
                "hsl(" +
                Math.round(h) +
                "," +
                Math.round(s) +
                "%," +
                Math.round(l) +
                "%)"
              );
            }
          }
          return "hsl(212,100%,67%)";
        }

        function speedBarLightness(beta) {
          const stops = SPEED_COLOR_STOPS;
          if (beta <= stops[0][0]) return stops[0][3];
          if (beta >= stops[stops.length - 1][0])
            return stops[stops.length - 1][3];
          for (let i = 0; i < stops.length - 1; i++) {
            if (beta >= stops[i][0] && beta <= stops[i + 1][0]) {
              const t = (beta - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
              return stops[i][3] + (stops[i + 1][3] - stops[i][3]) * t;
            }
          }
          return 50;
        }

        function updateSpeedBar(barId, sliderValue, beta) {
          const bar = document.getElementById(barId);
          if (!bar) return;
          const fill = bar.querySelector(".speed-bar-fill");
          const valEl = bar.querySelector(".speed-bar-val");
          const track = bar.querySelector(".speed-bar-track");
          const pct = (sliderValue / 1000) * 100;
          fill.style.width = pct + "%";
          fill.style.backgroundColor = speedBarColor(beta);
          // Contrast: dark text on light fills, white text on dark fills
          const fillL = speedBarLightness(beta);
          valEl.style.color = fillL > 60 ? "#1a1a2e" : "#fff";
          valEl.style.textShadow =
            fillL > 60
              ? "0 1px 3px rgba(255,255,255,0.3)"
              : "0 1px 3px rgba(0,0,0,0.7), 0 0 6px rgba(0,0,0,0.4)";
          const ship = bar.getAttribute("data-ship");
          if (ship) {
            valEl.textContent = beta.toFixed(4) + "c";
          } else {
            valEl.textContent =
              beta >= 0.999
                ? beta.toFixed(4) + "c"
                : beta >= 0.99
                  ? beta.toFixed(3) + "c"
                  : beta.toFixed(2) + "c";
          }
          if (beta >= 0.95) {
            track.classList.add("extreme");
          } else {
            track.classList.remove("extreme");
          }
        }

        function initSpeedBar(barEl) {
          const track = barEl.querySelector(".speed-bar-track");
          const minusBtn = barEl.querySelector(".speed-bar-minus");
          const plusBtn = barEl.querySelector(".speed-bar-plus");
          const ship = barEl.getAttribute("data-ship");
          let dragging = false;

          function getSliderId() {
            return ship ? "speedSlider" + ship : "speedSlider";
          }

          function getSliderFromX(clientX) {
            const rect = track.getBoundingClientRect();
            const pct = (clientX - rect.left) / rect.width;
            return Math.round(clamp(pct, 0, 1) * 1000);
          }

          function applyValue(sliderVal) {
            sliderVal = clamp(sliderVal, 0, 1000);
            document.getElementById(getSliderId()).value = sliderVal;
            handleSpeedChange();
          }

          function onPointerDown(e) {
            if (barEl.classList.contains("disabled")) return;
            e.preventDefault();
            dragging = true;
            const t = e.touches ? e.touches[0] : e;
            applyValue(getSliderFromX(t.clientX));
          }
          function onPointerMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            applyValue(getSliderFromX(t.clientX));
          }
          function onPointerEnd() {
            dragging = false;
          }

          track.addEventListener("mousedown", onPointerDown);
          document.addEventListener("mousemove", onPointerMove);
          document.addEventListener("mouseup", onPointerEnd);
          track.addEventListener("touchstart", onPointerDown, {
            passive: false,
          });
          document.addEventListener(
            "touchmove",
            function (e) {
              if (dragging) onPointerMove(e);
            },
            { passive: false },
          );
          document.addEventListener("touchend", onPointerEnd);

          // Hold for continuous stepping
          const STEP_SIZE = 5;
          let holdTimer = null,
            holdInterval = null;
          function startHold(delta) {
            if (barEl.classList.contains("disabled")) return;
            applyValue(
              parseInt(document.getElementById(getSliderId()).value) +
                delta * STEP_SIZE,
            );
            holdTimer = setTimeout(function () {
              holdInterval = setInterval(function () {
                applyValue(
                  parseInt(document.getElementById(getSliderId()).value) +
                    delta * STEP_SIZE,
                );
              }, 30);
            }, 300);
          }
          function stopHold() {
            clearTimeout(holdTimer);
            clearInterval(holdInterval);
          }

          minusBtn.addEventListener("mousedown", function () {
            startHold(-1);
          });
          minusBtn.addEventListener("mouseup", stopHold);
          minusBtn.addEventListener("mouseleave", stopHold);
          plusBtn.addEventListener("mousedown", function () {
            startHold(1);
          });
          plusBtn.addEventListener("mouseup", stopHold);
          plusBtn.addEventListener("mouseleave", stopHold);
          minusBtn.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              startHold(-1);
            },
            { passive: false },
          );
          minusBtn.addEventListener("touchend", function (e) {
            e.preventDefault();
            stopHold();
          });
          plusBtn.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              startHold(1);
            },
            { passive: false },
          );
          plusBtn.addEventListener("touchend", function (e) {
            e.preventDefault();
            stopHold();
          });
        }

        function formatYears(years) {
          const y = Math.floor(years);
          const m = Math.floor((years - y) * 12);
          const parts = [];
          if (state.lang === "pl") {
            if (y > 0)
              parts.push(
                y + (y === 1 ? " rok" : y >= 2 && y <= 4 ? " lata" : " lat"),
              );
            if (m > 0)
              parts.push(
                m +
                  (m === 1
                    ? " miesi\u0105c"
                    : m >= 2 && m <= 4
                      ? " miesi\u0105ce"
                      : " miesi\u0119cy"),
              );
            return parts.length
              ? parts.join(" ")
              : "poni\u017Cej miesi\u0105ca";
          }
          if (y > 0) parts.push(y + (y === 1 ? " year" : " years"));
          if (m > 0) parts.push(m + (m === 1 ? " month" : " months"));
          return parts.length ? parts.join(" ") : "less than a month";
        }

        // ====================== GENERATIONS ======================

        function getGeneration(elapsedYears) {
          // Gen 0: starts age 25, dies at T=75
          // Gen 1: starts age 5, dies at T=95
          // Gen n (n>=2): born at T=20n-25, dies at T=20n+75
          if (elapsedYears <= 75) return 0;
          if (elapsedYears <= 95) return 1;

        // ====================== PHYSICS ======================

        // Pure function: compute round-trip physics for a given distance and target beta.
        // Flyby model: ship accelerates once at Earth (outbound), cruises to the star,
        // flies through the arc at peak beta (no braking), cruises back, then
        // decelerates once at Earth (return arrival). Legs are asymmetric:
        //   outbound = accel + cruise, return = cruise + decel.
        // Both legs cover the same distance (dist ly) and take the same Earth time.
        function computeShipPhysics(dist, beta) {
          const gamma = 1 / Math.sqrt(Math.max(EPS_BETA, 1 - beta * beta));
          const d_accel = (gamma - 1) / ALPHA;
          const r = { beta: beta, gamma: gamma };

          if (dist >= d_accel) {
            r.hasCruise = true;
            r.betaActual = beta;
            r.gammaActual = gamma;
            r.t_accel = (beta * gamma) / ALPHA;
            r.tau_accel = arctanh(beta) / ALPHA;
            // Per-leg cruise distance: dist minus the single accel (or decel) segment.
            const d_cruise_leg = dist - d_accel;
            r.t_cruise = d_cruise_leg / beta;
            r.tau_cruise = r.t_cruise / gamma;
          } else {
            // Ship cannot reach target beta within one leg's distance. It accelerates
            // the whole outbound leg, reaching peak gamma at the star, then decels
            // the whole return leg.
            r.hasCruise = false;
            r.gammaActual = ALPHA * dist + 1;
            r.betaActual = Math.sqrt(
              Math.max(0, 1 - 1 / (r.gammaActual * r.gammaActual)),
            );
            r.t_accel = (r.betaActual * r.gammaActual) / ALPHA;
            r.tau_accel = arctanh(r.betaActual) / ALPHA;
            r.t_cruise = 0;
            r.tau_cruise = 0;
          }

          // One leg = t_accel + t_cruise (outbound = accel + cruise, return = cruise + decel)
          r.legEarthTotal = r.t_accel + r.t_cruise;
          r.legRocketTotal = r.tau_accel + r.tau_cruise;
          r.earthTotalYears = 2 * r.legEarthTotal;
          r.rocketTotalYears = 2 * r.legRocketTotal;
          return r;
        }

        // Pure function: compute elapsed times from progress (0-1) and physics object.
        // Outbound leg: accel(0..t_accel) → cruise(t_accel..legEarthTotal) at peak beta.
        // Return leg:   cruise(0..t_cruise) at peak beta → decel(t_cruise..legEarthTotal).
        // At both ends of the arc, the ship is in cruise at peak gamma — the arc
        // clock model (cruise-speed gamma) matches the adjacent leg segments
        // continuously, no rate discontinuity.
        function computeElapsedForProgress(p, phys) {
          p = clamp(p, 0, 1);
          let legIndex, legProgress;
          if (p <= 0.5) {
            legIndex = 0;
            legProgress = p / 0.5;
          } else {
            legIndex = 1;
            legProgress = (p - 0.5) / 0.5;
          }

          const legEarth = legProgress * phys.legEarthTotal;
          let legRocket, currentBeta;
          const ta = phys.t_accel,
            tauA = phys.tau_accel;
          const tc = phys.t_cruise,
            tauC = phys.tau_cruise;

          if (ta < EPS_BETA) {
            legRocket =
              (legEarth * phys.legRocketTotal) /
              Math.max(EPS_BETA, phys.legEarthTotal);
            currentBeta = phys.betaActual;
          } else if (legIndex === 0) {
            // Outbound: accel then cruise
            if (legEarth <= ta) {
              legRocket = Math.asinh(ALPHA * legEarth) / ALPHA;
              currentBeta =
                (ALPHA * legEarth) /
                Math.sqrt(1 + ALPHA * ALPHA * legEarth * legEarth);
            } else {
              legRocket = tauA + (legEarth - ta) / phys.gammaActual;
              currentBeta = phys.betaActual;
            }
          } else {
            // Return: cruise then decel
            if (legEarth <= tc) {
              legRocket = legEarth / phys.gammaActual;
              currentBeta = phys.betaActual;
            } else {
              const tRemaining = phys.legEarthTotal - legEarth; // Earth time until fully stopped
              legRocket =
                tauC + (tauA - Math.asinh(ALPHA * tRemaining) / ALPHA);
              currentBeta =
                (ALPHA * tRemaining) /
                Math.sqrt(1 + ALPHA * ALPHA * tRemaining * tRemaining);
            }
          }

          return {
            earthElapsed: legIndex * phys.legEarthTotal + legEarth,
            rocketElapsed: legIndex * phys.legRocketTotal + legRocket,
            currentBeta: currentBeta,
          };
        }

        // Wrapper: compute physics for explore mode (reads from DOM, writes to state)
        function recalcPhysics() {
          state.beta = sliderToBeta(
            parseInt(document.getElementById("speedSlider").value),
          );
          const phys = computeShipPhysics(
            STARS[state.starIndex].dist,
            state.beta,
          );
          state.gamma = phys.gamma;
          state.hasCruise = phys.hasCruise;
          state.t_accel = phys.t_accel;
          state.tau_accel = phys.tau_accel;
          state.t_cruise = phys.t_cruise;
          state.tau_cruise = phys.tau_cruise;
          state.legEarthTotal = phys.legEarthTotal;
          state.legRocketTotal = phys.legRocketTotal;
          state.earthTotalYears = phys.earthTotalYears;
          state.rocketTotalYears = phys.rocketTotalYears;
          state.betaActual = phys.betaActual;
          state.gammaActual = phys.gammaActual;
        }

        // Wrapper: update elapsed from progress for explore mode. Injects arc accumulators
        // on top so the display stays continuous across phase transitions and on landing.
        function updateElapsedFromProgress() {
          const result = computeElapsedForProgress(state.progress, state);
          state.earthElapsed = result.earthElapsed + state.arcEarthAccum;
          state.rocketElapsed = result.rocketElapsed + state.arcRocketAccum;
          state.currentBeta = result.currentBeta;
        }

        // ====================== SCENE POSITIONS ======================

        function getEarthX() {
          return W * EARTH_X_FRAC;
        }
        function getEarthY() {
          return state.mode === "game" ? H * 0.5 : H * 0.55;
        }

        function getStarScreenXForDist(d) {
          const dMin = 1,
            dMax = 2000;
          const frac = Math.log(d / dMin) / Math.log(dMax / dMin);
          const earthX = getEarthX();
          return earthX + (W * STAR_X_MAX_FRAC - earthX) * clamp(frac, 0.05, 1);
        }

        function getStarScreenX() {
          return getStarScreenXForDist(STARS[state.starIndex].dist);
        }

        function getStarY() {
          return state.mode === "game" ? H * 0.5 : H * 0.55;
        }

        // Tangent + arc trajectory: two straight legs from Earth to tangent points on
        // a small ring around the star, plus a CCW arc "the long way" behind the star.
        // Outbound leg: park -> T1. Arc: T1 -> T2 (angEntry + arcSweep, CCW behind).
        // Return leg: T2 -> Earth.
        // Ship tail sits at Earth's surface: ship triangle base extends 7 px behind
        // the ship center, so parking the center EARTH_RADIUS + 7 out puts the tail
        // exactly on the surface.
        const SHIP_PARK_OFFSET = EARTH_RADIUS + 7;

        function starFlybyRingR(star) {
          return Math.max(star.radius + 20, 32);
        }

        function computeTangentArc(E, C, R) {
          const dx = C.x - E.x,
            dy = C.y - E.y;
          const D = Math.sqrt(dx * dx + dy * dy) || 1;
          if (R >= D - 2) R = Math.max(1, D - 2);
          const a = Math.acos(clamp(R / D, -1, 1));
          const thetaCE = Math.atan2(-dy, -dx);
          const angEntry = thetaCE + a;
          const angExit = thetaCE - a;
          return {
            E: { x: E.x, y: E.y },
            C: { x: C.x, y: C.y },
            R: R,
            D: D,
            T1: {
              x: C.x + R * Math.cos(angEntry),
              y: C.y + R * Math.sin(angEntry),
            },
            T2: {
              x: C.x + R * Math.cos(angExit),
              y: C.y + R * Math.sin(angExit),
            },
            angEntry: angEntry,
            angExit: angExit,
            arcSweep: 2 * Math.PI - 2 * a,
            legLen: Math.sqrt(Math.max(0, D * D - R * R)),
          };
        }

        function arcPosAt(traj, f) {
          const ang = traj.angEntry + traj.arcSweep * f;
          return {
            x: traj.C.x + traj.R * Math.cos(ang),
            y: traj.C.y + traj.R * Math.sin(ang),
          };
        }

        function arcHeadAt(traj, f) {
          const ang = traj.angEntry + traj.arcSweep * f;
          // CCW: velocity = R*(-sin ang, cos ang); heading = atan2(vy, vx).
          return Math.atan2(Math.cos(ang), -Math.sin(ang));
        }

        function headingFromTo(from, to) {
          return Math.atan2(to.y - from.y, to.x - from.x);
        }

        function computeTrajectory() {
          return computeTangentArc(
            { x: getEarthX(), y: getEarthY() },
            { x: getStarScreenX(), y: getStarY() },
            starFlybyRingR(STARS[state.starIndex]),
          );
        }

        function getShipParkingPos(traj) {
          const dx = traj.T1.x - traj.E.x,
            dy = traj.T1.y - traj.E.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          return {
            x: traj.E.x + (dx / d) * SHIP_PARK_OFFSET,
            y: traj.E.y + (dy / d) * SHIP_PARK_OFFSET,
          };
        }

        // On return, the ship's nose (tip at +13 in local coords) should just touch
        // Earth's surface, which means the center sits EARTH_RADIUS + 13 from Earth
        // along the approach direction from T2.
        function getShipLandingPos(traj) {
          const dx = traj.T2.x - traj.E.x,
            dy = traj.T2.y - traj.E.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          const off = EARTH_RADIUS + 13;
          return { x: traj.E.x + (dx / d) * off, y: traj.E.y + (dy / d) * off };
        }

        function getTurnaroundDuration() {
          // Visual speed on the arc = visual speed on the straight legs.
          const t = computeTrajectory();
          const legSpeed = t.legLen / WALL_SECONDS_BASE;
          if (legSpeed < 1e-3) return 1.0;
          return (t.arcSweep * t.R) / legSpeed;
        }

        function getRocketPos() {
          const traj = computeTrajectory();

          if (state.phase === "turnaround") {
            const f = clamp(
              state.turnaroundTimer / getTurnaroundDuration(),
              0,
              1,
            );
            const pt = arcPosAt(traj, f);
            return {
              x: pt.x,
              y: pt.y,
              angle: arcHeadAt(traj, f),
              traj: traj,
              onArc: true,
              arcF: f,
            };
          }

          const park = getShipParkingPos(traj);
          let legP;
          if (state.phase === "outbound" || state.phase === "idle") {
            legP = clamp(state.progress, 0, 1) / 0.5;
            return {
              x: park.x + (traj.T1.x - park.x) * legP,
              y: park.y + (traj.T1.y - park.y) * legP,
              angle: headingFromTo(park, traj.T1),
              traj: traj,
              onArc: false,
              legP: legP,
              leg: "out",
            };
          }

          // return / landed — land at the landing spot (tip touching Earth), not inside Earth
          legP = clamp((state.progress - 0.5) / 0.5, 0, 1);
          const land = getShipLandingPos(traj);
          return {
            x: traj.T2.x + (land.x - traj.T2.x) * legP,
            y: traj.T2.y + (land.y - traj.T2.y) * legP,
            angle: headingFromTo(traj.T2, land),
            traj: traj,
            onArc: false,
            legP: legP,
            leg: "ret",
          };
        }

        // ====================== TRAIL ======================

        // Comet-tail parameters — each stroked segment fades quadratically with
        // distance behind the ship, so the trail looks like a receding exhaust
        // plume rather than a solid line.
        const TRAIL_TAIL_LEN = 240; // pixels — length of the visible fade window
        const TRAIL_SAMPLE = 4; // pixels — spacing between sampled points

        // Map (phase, progress, turnaroundTimer, turnDuration) → { out, arc, ret },
        // where each value is a 0..1 completion fraction for that phase.
        function phaseProgress(phase, progress, turnaroundTimer, turnDuration) {
          if (phase === "idle") return { out: 0, arc: 0, ret: 0 };
          if (phase === "outbound")
            return { out: clamp(progress / 0.5, 0, 1), arc: 0, ret: 0 };
          if (phase === "turnaround")
            return {
              out: 1,
              arc: clamp(turnaroundTimer / turnDuration, 0, 1),
              ret: 0,
            };
          // return / waiting / landed
          return { out: 1, arc: 1, ret: clamp((progress - 0.5) / 0.5, 0, 1) };
        }

        // Walk the traveled path, sample at TRAIL_SAMPLE-px intervals, and stroke
        // each segment with alpha that decays with distance behind the ship.
        function drawShipTrail(
          traj,
          phase,
          progress,
          turnaroundTimer,
          turnDuration,
          rgb,
        ) {
          if (!traj || phase === "idle") return;
          const p = phaseProgress(
            phase,
            progress,
            turnaroundTimer,
            turnDuration,
          );
          if (p.out <= 0) return;

          const park = getShipParkingPos(traj);
          const land = getShipLandingPos(traj);
          const pts = [];
          function pushPt(x, y) {
            const prev = pts.length > 0 ? pts[pts.length - 1] : null;
            const d = prev ? Math.hypot(x - prev.x, y - prev.y) : 0;
            pts.push({ x: x, y: y, cum: prev ? prev.cum + d : 0 });
          }

          // Outbound leg
          const outEnd = {
            x: park.x + (traj.T1.x - park.x) * p.out,
            y: park.y + (traj.T1.y - park.y) * p.out,
          };
          const outLen = Math.hypot(outEnd.x - park.x, outEnd.y - park.y);
          const outN = Math.max(1, Math.ceil(outLen / TRAIL_SAMPLE));
          for (let i = 0; i <= outN; i++) {
            const f = (i / outN) * p.out;
            pushPt(
              park.x + (traj.T1.x - park.x) * f,
              park.y + (traj.T1.y - park.y) * f,
            );
          }
          // Arc
          if (p.arc > 0) {
            const arcLen = traj.arcSweep * traj.R * p.arc;
            const arcN = Math.max(1, Math.ceil(arcLen / TRAIL_SAMPLE));
            for (let j = 1; j <= arcN; j++) {
              const fA = (j / arcN) * p.arc;
              const ang = traj.angEntry + traj.arcSweep * fA;
              pushPt(
                traj.C.x + traj.R * Math.cos(ang),
                traj.C.y + traj.R * Math.sin(ang),
              );
            }
          }
          // Return leg — towards landing spot, not Earth centre, so the tail head
          // stays attached to the ship hull.
          if (p.ret > 0) {
            const retEnd = {
              x: traj.T2.x + (land.x - traj.T2.x) * p.ret,
              y: traj.T2.y + (land.y - traj.T2.y) * p.ret,
            };
            const retLen = Math.hypot(
              retEnd.x - traj.T2.x,
              retEnd.y - traj.T2.y,
            );
            const retN = Math.max(1, Math.ceil(retLen / TRAIL_SAMPLE));
            for (let k = 1; k <= retN; k++) {
              const fR = (k / retN) * p.ret;
              pushPt(
                traj.T2.x + (land.x - traj.T2.x) * fR,
                traj.T2.y + (land.y - traj.T2.y) * fR,
              );
            }
          }

          const headCum = pts[pts.length - 1].cum;
          ctx.save();
          ctx.lineWidth = 1.5;
          ctx.lineCap = "round";
          for (let m = pts.length - 2; m >= 0; m--) {
            const segMidCum = (pts[m].cum + pts[m + 1].cum) * 0.5;
            const distBehind = headCum - segMidCum;
            if (distBehind > TRAIL_TAIL_LEN) break;
            const t01 = 1 - distBehind / TRAIL_TAIL_LEN;
            const alpha = 0.55 * t01 * t01;
            if (alpha < 0.01) continue;
            ctx.strokeStyle = "rgba(" + rgb + "," + alpha.toFixed(3) + ")";
            ctx.beginPath();
            ctx.moveTo(pts[m].x, pts[m].y);
            ctx.lineTo(pts[m + 1].x, pts[m + 1].y);
            ctx.stroke();
          }
          ctx.restore();
        }

        // ====================== DRAWING ======================

        function drawStarfield() {
          for (let i = 0; i < bgStars.length; i++) {
            const s = bgStars[i];
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(200,210,220," + s.b * 0.3 + ")";
            ctx.fill();
          }
        }

        function drawEarth() {
          const cx = getEarthX();
          const cy = getEarthY();
          const r = EARTH_RADIUS;

          // Atmosphere glow
          ctx.beginPath();
          ctx.arc(cx, cy, r * 1.15, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(77,184,255,0.12)";
          ctx.lineWidth = r * 0.15;
          ctx.stroke();

          // Outer glow
          const glow = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 3);
          glow.addColorStop(0, "rgba(77,184,255,0.25)");
          glow.addColorStop(0.5, "rgba(77,184,255,0.06)");
          glow.addColorStop(1, "rgba(77,184,255,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 3, 0, Math.PI * 2);
          ctx.fill();

          // Body
          const bodyGrad = ctx.createRadialGradient(
            cx - r * 0.3,
            cy - r * 0.3,
            r * 0.1,
            cx,
            cy,
            r,
          );
          bodyGrad.addColorStop(0, "#7ed6f7");
          bodyGrad.addColorStop(0.7, "#3aa8d8");
          bodyGrad.addColorStop(1, "#1a6e8e");
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(77,184,255,0.3)";
          ctx.lineWidth = 1;
          ctx.stroke();

          // Label — left side of Earth
          ctx.font = '15px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(77,184,255,0.7)";
          ctx.textAlign = "right";
          ctx.fillText(T("earthLabel"), cx - r - 8, cy + r + 6);
        }

        function drawDestStar(hideLabel) {
          const star = STARS[state.starIndex];
          const cx = getStarScreenX();
          const cy = getStarY();
          const r = star.radius;
          const rgb = star.glowRgb;

          // Outer glow
          const glow = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r * 4);
          glow.addColorStop(0, "rgba(" + rgb + ",0.4)");
          glow.addColorStop(0.4, "rgba(" + rgb + ",0.1)");
          glow.addColorStop(1, "rgba(" + rgb + ",0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
          ctx.fill();

          // Body
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = star.color;
          ctx.fill();

          // Label — hidden during drag (shadows have their own labels)
          if (!hideLabel) {
            const name = state.lang === "en" ? star.nameEn : star.namePl;
            const labelX = cx + starFlybyRingR(star) + 10;
            ctx.font = '15px "Share Tech Mono", monospace';
            ctx.fillStyle = "rgba(255,248,225,0.7)";
            ctx.textAlign = "left";
            ctx.fillText(name, labelX, cy - r - 26);
            ctx.font = '13px "Share Tech Mono", monospace';
            ctx.fillStyle = "rgba(255,248,225,0.4)";
            ctx.fillText(
              (star.approx ? "~" : "") + star.dist + " " + T("ly"),
              labelX,
              cy - r - 12,
            );
          }
        }

        function drawSpacecraft(x, y, angle) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);

          const glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 16);
          glow.addColorStop(0, "rgba(255,224,102,0.36)");
          glow.addColorStop(1, "rgba(255,224,102,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, 16, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#ffe066";
          ctx.beginPath();
          ctx.moveTo(14.3, 0);
          ctx.lineTo(-7.7, -7.15);
          ctx.lineTo(-7.7, 7.15);
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        }

        function drawStickFigure(cx, cy, color, seated) {
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.lineCap = "round";

          const headR = 4;
          const bodyLen = 12;
          const limbLen = 8;

          // Head
          ctx.beginPath();
          ctx.arc(cx, cy - bodyLen - headR, headR, 0, Math.PI * 2);
          ctx.stroke();

          // Body
          ctx.beginPath();
          ctx.moveTo(cx, cy - bodyLen);
          ctx.lineTo(cx, cy);
          ctx.stroke();

          if (seated) {
            // Arms forward
            ctx.beginPath();
            ctx.moveTo(cx, cy - bodyLen + 4);
            ctx.lineTo(cx + limbLen, cy - bodyLen + 4);
            ctx.stroke();
            // Legs bent (seated)
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + limbLen * 0.7, cy);
            ctx.lineTo(cx + limbLen * 0.7, cy + limbLen * 0.6);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + limbLen * 0.4, cy);
            ctx.lineTo(cx + limbLen * 0.4, cy + limbLen * 0.6);
            ctx.stroke();
          } else {
            // Arms down/out
            ctx.beginPath();
            ctx.moveTo(cx, cy - bodyLen + 4);
            ctx.lineTo(cx - limbLen * 0.6, cy - bodyLen + 4 + limbLen * 0.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, cy - bodyLen + 4);
            ctx.lineTo(cx + limbLen * 0.6, cy - bodyLen + 4 + limbLen * 0.5);
            ctx.stroke();
            // Legs standing
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx - limbLen * 0.4, cy + limbLen);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + limbLen * 0.4, cy + limbLen);
            ctx.stroke();
          }
        }

        function computeYearsPerRev(overrideTotal) {
          const total = overrideTotal || state.earthTotalYears;
          if (total <= 20) return 1;
          if (total <= 100) return 5;
          if (total <= 1000) return 50;
          return 500;
        }

        function drawAnalogClock(
          cx,
          cy,
          radius,
          elapsed,
          color,
          label,
          digitalText,
          totalForRev,
        ) {
          const yearsPerRev = computeYearsPerRev(totalForRev);
          const angle =
            ((elapsed / yearsPerRev) % 1) * Math.PI * 2 - Math.PI / 2;

          // Background
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();

          // Tick marks
          for (let i = 0; i < 12; i++) {
            const tickAngle = (i / 12) * Math.PI * 2 - Math.PI / 2;
            const inner = radius * (i % 3 === 0 ? 0.75 : 0.82);
            const outer = radius * 0.95;
            ctx.beginPath();
            ctx.moveTo(
              cx + Math.cos(tickAngle) * inner,
              cy + Math.sin(tickAngle) * inner,
            );
            ctx.lineTo(
              cx + Math.cos(tickAngle) * outer,
              cy + Math.sin(tickAngle) * outer,
            );
            ctx.strokeStyle = color;
            ctx.lineWidth = i % 3 === 0 ? 2 : 1;
            ctx.stroke();
          }

          // Hand
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(
            cx + Math.cos(angle) * radius * 0.7,
            cy + Math.sin(angle) * radius * 0.7,
          );
          ctx.strokeStyle = color;
          ctx.lineWidth = 2.5;
          ctx.lineCap = "round";
          ctx.stroke();

          // Center dot
          ctx.beginPath();
          ctx.arc(cx, cy, 3, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();

          // Label above
          ctx.font = '13px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(201,209,217,0.6)";
          ctx.textAlign = "center";
          ctx.fillText(label, cx, cy - radius - 10);

          // Digital readout below
          ctx.font = '15px "Share Tech Mono", monospace';
          ctx.fillStyle = color;
          ctx.textAlign = "center";
          ctx.fillText(digitalText, cx, cy + radius + 18);
        }

        function drawScene() {
          ctx.fillStyle = "#080c14";
          ctx.fillRect(0, 0, W, H);

          drawStarfield();
          drawEarth();

          const rPos = getRocketPos();

          // Fading comet-tail trail up to the ship's current position.
          if (state.phase !== "idle") {
            drawShipTrail(
              rPos.traj,
              state.phase,
              state.progress,
              state.turnaroundTimer,
              getTurnaroundDuration(),
              "255,224,102",
            );
          }

          drawSpacecraft(rPos.x, rPos.y, rPos.angle);

          // Star shadows during drag, or normal star
          if (drag.active && !drag.ship) {
            drawStarShadows(getStarY(), state.starIndex, drag.nearestSlot);
            ctx.globalAlpha = 0.2;
            drawDestStar(true);
            ctx.globalAlpha = 1;
          } else {
            drawDestStar();
          }

          // Ship's parking position (for clock alignment)
          const yr = T("yr");
          const earthY = getEarthY();
          const earthClockX = getShipParkingPos(rPos.traj).x;

          // Equal distance from Earth center for both clocks
          const clockOffset = Math.min(earthY * 0.65, (H - earthY) * 0.65, 150);
          const topY = earthY - clockOffset;
          const bottomY = earthY + clockOffset;

          // ── Top zone: Earth Clock (fixed at ship's initial X) ──
          drawStickFigure(earthClockX - 16, topY + 8, "#4db8ff", false);
          drawAnalogClock(
            earthClockX + 28,
            topY,
            CLOCK_RADIUS,
            state.earthElapsed,
            "#4db8ff",
            getEarthTwinName(),
            (getEarthStartAge() + state.earthElapsed).toFixed(2) + " " + yr,
          );

          // ── Bottom zone: Spacecraft Clock (X follows spacecraft) ──
          const shipClockX = rPos.x;
          drawStickFigure(shipClockX - 16, bottomY + 8, "#ffb347", false);
          drawAnalogClock(
            shipClockX + 28,
            bottomY,
            CLOCK_RADIUS,
            state.rocketElapsed,
            "#ffb347",
            getRocketTwinName(),
            (getRocketStartAge() + state.rocketElapsed).toFixed(2) + " " + yr,
          );
        }

        // ====================== READOUTS ======================

        function updateReadouts() {
          const star = STARS[state.starIndex];
          const yr = T("yr");
          const ly = T("ly");

          document.getElementById("lblEarthTime").textContent =
            getEarthTwinName();
          document.getElementById("lblRocketTime").textContent =
            getRocketTwinName();
          document.getElementById("readDistance").textContent =
            (star.approx ? "~" : "") + star.dist + " " + ly;
          if (state.phase !== "idle" && state.phase !== "landed") {
            // Live speed and γ during animation
            const liveBeta = state.currentBeta;
            const liveGamma =
              1 / Math.sqrt(Math.max(EPS_BETA, 1 - liveBeta * liveBeta));
            document.getElementById("readBeta").textContent = fmtBeta(liveBeta);
            document.getElementById("readGamma").textContent =
              liveGamma.toFixed(3);
          } else if (!state.hasCruise && state.phase === "idle") {
            document.getElementById("readBeta").textContent =
              fmtBeta(state.betaActual) + " (max)";
            document.getElementById("readGamma").textContent =
              state.gammaActual.toFixed(3);
          } else {
            document.getElementById("readBeta").textContent = fmtBeta(
              state.beta,
            );
            document.getElementById("readGamma").textContent =
              state.gamma.toFixed(3);
          }

          if (state.phase === "idle") {
            document.getElementById("readEarthTime").textContent =
              (getEarthStartAge() + state.earthTotalYears).toFixed(2) +
              " " +
              yr;
            document.getElementById("readRocketTime").textContent =
              (getRocketStartAge() + state.rocketTotalYears).toFixed(2) +
              " " +
              yr;
            document.getElementById("readTimeDiff").textContent =
              (state.earthTotalYears - state.rocketTotalYears).toFixed(2) +
              " " +
              yr;
            document.getElementById("readPhase").textContent = T("phaseIdle");
          } else {
            document.getElementById("readEarthTime").textContent =
              (getEarthStartAge() + state.earthElapsed).toFixed(2) + " " + yr;
            document.getElementById("readRocketTime").textContent =
              (getRocketStartAge() + state.rocketElapsed).toFixed(2) + " " + yr;
            document.getElementById("readTimeDiff").textContent =
              (state.earthElapsed - state.rocketElapsed).toFixed(2) + " " + yr;
            let phaseLabel;
            if (state.phase === "turnaround") {
              phaseLabel = T("phaseTurnaround");
            } else if (state.phase === "landed") {
              phaseLabel = T("phaseLanded");
            } else {
              // Outbound: accel then cruise. Return: cruise then decel.
              const legP =
                state.phase === "outbound"
                  ? clamp(state.progress, 0, 1) / 0.5
                  : clamp((state.progress - 0.5) / 0.5, 0, 1);
              const legEarth = legP * state.legEarthTotal;
              if (state.phase === "outbound") {
                phaseLabel =
                  legEarth <= state.t_accel
                    ? T("phaseAccel")
                    : T("phaseCruise");
              } else {
                phaseLabel =
                  legEarth <= state.t_cruise
                    ? T("phaseCruise")
                    : T("phaseDecel");
              }
            }
            document.getElementById("readPhase").textContent = phaseLabel;
          }
        }

        function updateInfo() {
          const el = document.getElementById("infoText");
          let text;

          if (state.mode === "game") {
            if (state.phase === "idle") {
              text = T("gameInfoIdle");
              if (state.challenge) {
                text = text.replace("{nameA}", state.challenge.nameA);
              }
            } else if (state.phase === "landed") {
              text = T("gameInfoLanded");
            } else if (state.paused) {
              text = T("infoPaused");
            } else {
              text = T("gameInfoFlight");
              // Check if either ship has returned
              if (state.shipA && state.shipA.phase === "waiting") {
                text +=
                  "\n\n" +
                  T("gameInfoReturn").replace("{name}", state.challenge.nameA);
              }
              if (state.shipB && state.shipB.phase === "waiting") {
                text +=
                  "\n\n" +
                  T("gameInfoReturn").replace("{name}", state.challenge.nameB);
              }
            }
          } else {
            if (state.phase === "idle") {
              text = T("infoIdle");
              if (!state.hasCruise) {
                text += T("infoIdleShortTrip")
                  .replace("{betaActual}", fmtBeta(state.betaActual))
                  .replace("{gammaActual}", state.gammaActual.toFixed(2));
              }
            } else if (state.phase === "landed") {
              text = T("infoLanded")
                .replace("{rocketTime}", state.rocketElapsed.toFixed(2))
                .replace("{earthTime}", state.earthElapsed.toFixed(2))
                .replace(
                  "{diff}",
                  (state.earthElapsed - state.rocketElapsed).toFixed(2),
                );
            } else if (state.paused) {
              text = T("infoPaused");
            } else if (state.phase === "turnaround") {
              text = T("infoTurnaround");
            } else if (!state.hasCruise) {
              text = T("infoCruiseShortTrip")
                .replace("{betaActual}", fmtBeta(state.betaActual))
                .replace("{gammaActual}", state.gammaActual.toFixed(2));
            } else {
              text = T("infoCruise").replace(
                "{gamma}",
                state.gammaActual.toFixed(2),
              );
            }
          }

          el.textContent = "";
          const paragraphs = text.split("\n\n");
          for (let i = 0; i < paragraphs.length; i++) {
            if (i > 0) {
              el.appendChild(document.createElement("br"));
              el.appendChild(document.createElement("br"));
            }
            el.appendChild(document.createTextNode(paragraphs[i]));
          }
        }

        // ====================== CONTROLS ======================

        function populateStarSelect() {
          /* dropdown removed — star selection via canvas drag */
        }

        function selectStar(index) {
          state.starIndex = index;
          if (state.phase !== "idle") handleReset();
          recalcPhysics();
          updateReadouts();
          updateInfo();
        }

        function selectGameStar(ship, index) {
          if (state.phase !== "idle") handleReset();
          if (ship === "A") {
            state.challenge.starIndexA = index;
            state.shipA = makeGameShip(index, state.shipA.beta);
          } else {
            state.challenge.starIndexB = index;
            state.shipB = makeGameShip(index, state.shipB.beta);
          }
          updateChallengeText();
          updateGameReadouts();
        }

        // ====================== STAR DRAG ======================

        const drag = {
          active: false,
          ship: null,
          origIndex: -1,
          cursorX: 0,
          starY: 0,
          nearestSlot: -1,
        };
        const REAL_STAR_COUNT = STARS.length - 1; // exclude custom star

        function getCanvasCoords(e) {
          const rect = canvas.getBoundingClientRect();
          const t = e.touches ? e.touches[0] : e;
          return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        }

        function updateStarCursor(pos) {
          if (state.phase !== "idle" && state.phase !== "landed") {
            canvas.classList.remove("cursor-grab");
            return;
          }
          let hit = false;
          if (state.mode === "game" && state.challenge) {
            const c = state.challenge;
            const targets = [
              {
                x: getStarScreenXForDist(STARS[c.starIndexA].dist),
                y: H * 0.36,
              },
              {
                x: getStarScreenXForDist(STARS[c.starIndexB].dist),
                y: H * 0.8,
              },
            ];
            for (let i = 0; i < targets.length; i++) {
              const t = targets[i];
              if (
                Math.sqrt(
                  (pos.x - t.x) * (pos.x - t.x) + (pos.y - t.y) * (pos.y - t.y),
                ) < 35
              ) {
                hit = true;
                break;
              }
            }
          } else if (state.mode === "explore") {
            const sx = getStarScreenX(),
              sy = getStarY();
            if (
              Math.sqrt(
                (pos.x - sx) * (pos.x - sx) + (pos.y - sy) * (pos.y - sy),
              ) < 35
            )
              hit = true;
          }
          canvas.classList.toggle("cursor-grab", hit && !drag.active);
        }

        function handleStarDragStart(e) {
          if (state.phase !== "idle" && state.phase !== "landed") return;
          // Game mode chooses both stars automatically; players tune only captain B's
          // speed. Dragging a star would invalidate the precomputed step betas.
          if (state.mode === "game") return;
          const pos = getCanvasCoords(e);

          if (state.mode === "explore") {
            const sx = getStarScreenX();
            const sy = getStarY();
            if (
              Math.sqrt(
                (pos.x - sx) * (pos.x - sx) + (pos.y - sy) * (pos.y - sy),
              ) < 35
            ) {
              drag.active = true;
              drag.ship = null;
              drag.origIndex = state.starIndex;
              drag.cursorX = pos.x;
              drag.starY = sy;
              drag.nearestSlot = -1;
              canvas.classList.remove("cursor-grab");
              canvas.classList.add("cursor-grabbing");
              hideStarFacts();
              hideDragHint();
              if (e.cancelable) e.preventDefault();
              return;
            }
          }
        }

        function handleStarDragMove(e) {
          const pos = getCanvasCoords(e);

          if (!drag.active) {
            updateStarCursor(pos);
            // Existing star-facts hover logic
            if (state.phase !== "idle" && state.phase !== "landed") {
              hideStarFacts();
              return;
            }
            if (state.mode === "game" && state.challenge) {
              const c = state.challenge;
              const stars = [
                {
                  star: STARS[c.starIndexA],
                  x: getStarScreenXForDist(STARS[c.starIndexA].dist),
                  y: H * 0.36,
                },
                {
                  star: STARS[c.starIndexB],
                  x: getStarScreenXForDist(STARS[c.starIndexB].dist),
                  y: H * 0.8,
                },
              ];
              for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                if (s.star.custom || !s.star.facts) continue;
                const d = Math.sqrt(
                  (pos.x - s.x) * (pos.x - s.x) + (pos.y - s.y) * (pos.y - s.y),
                );
                if (d < 40) {
                  if (!sfVisible) showStarFacts(s.star, s.x, s.y);
                  return;
                }
              }
              hideStarFacts();
            } else {
              const star = STARS[state.starIndex];
              if (star.custom) {
                hideStarFacts();
                return;
              }
              const sx = getStarScreenX();
              const sy = getStarY();
              const dist = Math.sqrt(
                (pos.x - sx) * (pos.x - sx) + (pos.y - sy) * (pos.y - sy),
              );
              if (dist < 40) {
                if (!sfVisible) showStarFacts(star, sx, sy);
              } else {
                hideStarFacts();
              }
            }
            return;
          }

          // Dragging — update cursor and find nearest slot
          if (e.cancelable) e.preventDefault();
          drag.cursorX = clamp(pos.x, getEarthX() + 30, W - 10);
          drag.nearestSlot = -1;
          let bestDist = 30; // snap distance
          let j, snapX, snapD;
          for (j = 0; j < REAL_STAR_COUNT; j++) {
            snapX = getStarScreenXForDist(STARS[j].dist);
            snapD = Math.abs(drag.cursorX - snapX);
            if (snapD < bestDist) {
              bestDist = snapD;
              drag.nearestSlot = j;
            }
          }
        }

        function handleStarDragEnd(e) {
          if (!drag.active) return;
          if (drag.nearestSlot >= 0 && drag.nearestSlot !== drag.origIndex) {
            if (state.mode === "game" && drag.ship) {
              selectGameStar(drag.ship, drag.nearestSlot);
            } else {
              selectStar(drag.nearestSlot);
            }
          }
          drag.active = false;

        function drawStarShadows(starY, currentIndex, nearestSlot) {
          for (let i = 0; i < REAL_STAR_COUNT; i++) {
            const star = STARS[i];
            const sx = getStarScreenXForDist(star.dist);
            const isNearest = i === nearestSlot;
            const isCurrent = i === currentIndex;
            const alpha = isCurrent ? 0.5 : isNearest ? 0.8 : 0.3;
            const r = isNearest ? star.radius * 1.4 : star.radius * 0.7;

            // Shadow dot
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(sx, starY, r, 0, Math.PI * 2);
            ctx.fillStyle = star.color;
            ctx.fill();
            if (isNearest) {
              const glow = ctx.createRadialGradient(
                sx,
                starY,
                r * 0.3,
                sx,
                starY,
                r * 2.5,
              );
              glow.addColorStop(0, "rgba(" + star.glowRgb + ",0.3)");
              glow.addColorStop(1, "rgba(" + star.glowRgb + ",0)");
              ctx.fillStyle = glow;
              ctx.beginPath();
              ctx.arc(sx, starY, r * 2.5, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Label — alternating above/below to avoid overlap
            const name = state.lang === "en" ? star.nameEn : star.namePl;
            ctx.font = '15px "Share Tech Mono", monospace';
            ctx.fillStyle =
              "rgba(255,248,225," +
              (isNearest ? 0.9 : isCurrent ? 0.5 : 0.35) +
              ")";
            ctx.textAlign = "center";
            const labelY = i % 2 === 0 ? starY - r - 12 : starY + r + 18;
            ctx.fillText(name, sx, labelY);
          }

          // Drag indicator line
          ctx.beginPath();
          ctx.moveTo(getEarthX() + EARTH_RADIUS + 5, starY);
          ctx.lineTo(W * STAR_X_MAX_FRAC + 20, starY);
          ctx.strokeStyle = "rgba(255,248,225,0.08)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
