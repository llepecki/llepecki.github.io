<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gravity Assist Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f18;
    --panel: #131825;
    --panel-border: #1e2a3a;
    --text: #c9d1d9;
    --text-dim: #6e7a8a;
    --accent: #58a6ff;
    --gain: #3fb950;
    --loss: #f97583;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
  }

  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .header-text { flex: 1; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { margin-top: 4px; font-size: 13px; color: var(--text-dim); }

  .lang-btn {
    background: none; border: 1px solid var(--panel-border);
    border-radius: 4px; padding: 3px 4px;
    cursor: pointer; flex-shrink: 0;
    transition: border-color 0.15s;
  }
  .lang-btn:hover { border-color: var(--accent); }

  .main { display: flex; height: calc(100vh - 80px); }

  .canvas-wrap {
    flex: 1; position: relative;
    background: #080c14; min-width: 0;
  }
  .canvas-wrap canvas { width: 100%; height: 100%; display: block; }

  .controls {
    width: 260px; flex-shrink: 0;
    padding: 20px;
    border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column; gap: 18px;
    overflow-y: auto;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim);
  }

  .type-toggle { display: flex; gap: 6px; }
  .type-btn {
    padding: 10px 4px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s; text-align: center;
    flex: 1;
  }
  .type-btn:hover { border-color: var(--accent); }
  .type-btn.active { border-color: var(--accent); color: var(--accent); }
  .type-btn.full-width { flex: none; width: 100%; }

  .slider-row { display: flex; align-items: center; gap: 6px; }
  .slider-row input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--panel-border); border-radius: 2px; outline: none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }
  .slider-row input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }
  .slider-val {
    min-width: 28px; text-align: right;
    font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text);
  }

  .step-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--panel-border);
    background: var(--panel); color: var(--text-dim);
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: border-color 0.15s;
    font-family: 'Outfit', sans-serif;
    touch-action: manipulation;
  }
  .step-btn:hover { border-color: var(--accent); }
  .step-btn:active { background: var(--panel-border); }

  .planet-select {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    background: var(--panel); color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; outline: none;
  }
  .planet-select:focus { border-color: var(--accent); }
  .planet-select option { background: var(--panel); color: var(--text); }

  .readouts { gap: 6px; }
  .readout-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .readout-label { color: var(--text-dim); }
  .readout-val { color: var(--text); }

  .boost-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--panel-border);
    border-bottom: 1px solid var(--panel-border);
  }
  .boost-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim);
  }
  .boost-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px; font-weight: 700;
  }

  .info-text {
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
  }

  .result-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    animation: overlayFadeIn 0.3s ease;
  }
  .overlay-emoji {
    font-size: 72px;
    animation: overlayPop 0.4s ease;
  }
  .overlay-msg {
    font-family: 'Outfit', sans-serif;
    font-size: 24px; font-weight: 700;
    margin-top: 16px; color: #fff;
  }
  .overlay-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.6);
  }

  @keyframes overlayFadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes overlayPop {
    0% { transform: scale(0.3); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .canvas-wrap { min-height: 350px; flex: 1; }
    .controls {
      width: 100%; flex-direction: row; flex-wrap: wrap;
      border-left: none; border-top: 1px solid var(--panel-border);
      padding: 12px 16px; gap: 12px;
    }
    .ctrl-group { min-width: 140px; flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>&#x1F680; <span id="titleText">Gravity Assist Simulator</span></h1>
    <p id="subtitleText">A moving planet can speed up a spacecraft for free. Increase the planet's speed to see how.</p>
  </div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">
    <svg width="28" height="20" viewBox="0 0 28 20" id="langFlag"><rect width="28" height="10" fill="#fff"/><rect y="10" width="28" height="10" fill="#DC143C"/></svg>
  </button>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <div class="type-toggle">
        <button class="type-btn active" id="modeExploreBtn" onclick="setMode('explore')">Explore</button>
        <button class="type-btn" id="modeGameBtn" onclick="setMode('game')">Game</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label" id="lblPlanet">Planet</span>
      <select class="planet-select" id="planetSelect"></select>
    </div>

    <div class="ctrl-group" id="grpPlanetVel">
      <span class="ctrl-label" id="lblPlanetSpeed">Planet Speed</span>
      <div class="slider-row">
        <button class="step-btn" onclick="stepSlider('planetVelSlider',-0.5)">&minus;</button>
        <input type="range" id="planetVelSlider" min="0" max="6" value="0" step="0.5">
        <button class="step-btn" onclick="stepSlider('planetVelSlider',0.5)">+</button>
        <span class="slider-val" id="planetVelVal">0</span>
      </div>
    </div>

    <div class="ctrl-group" id="grpAnim">
      <span class="ctrl-label" id="lblAnimSpeed">Animation Speed</span>
      <div class="slider-row">
        <button class="step-btn" onclick="stepSlider('animSlider',-0.1)">&minus;</button>
        <input type="range" id="animSlider" min="0.2" max="3" value="1" step="0.1">
        <button class="step-btn" onclick="stepSlider('animSlider',0.1)">+</button>
        <span class="slider-val" id="animVal">1x</span>
      </div>
    </div>

    <div class="ctrl-group">
      <button class="type-btn full-width" id="replayBtn" onclick="replay()">Launch</button>
    </div>

    <div class="ctrl-group" id="grpNewTarget" style="display:none">
      <button class="type-btn full-width" id="newTargetBtn" onclick="newTarget()">New Target</button>
    </div>

    <div class="ctrl-group readouts" id="grpReadouts">
      <div class="boost-row">
        <span class="boost-label" id="lblBoost">Speed boost</span>
        <span class="boost-val" id="boostVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblSpeedIn">Speed in</span>
        <span class="readout-val" id="speedInVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblSpeedOut">Speed out</span>
        <span class="readout-val" id="speedOutVal">&mdash;</span>
      </div>
      <div class="readout-row">
        <span class="readout-label" id="lblDefl">Deflection</span>
        <span class="readout-val" id="deflVal">&mdash;</span>
      </div>
    </div>

    <div class="ctrl-group info-text">
      <span id="infoText"></span>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// I18N
// ══════════════════════════════════════════════
const I18N = {
  en: {
    title: 'Gravity Assist Simulator',
    subtitle: 'A moving planet can speed up a spacecraft for free. Increase the planet\u2019s speed to see how.',
    modeExplore: 'Explore',
    modeGame: 'Game',

    infoCrash: 'The spacecraft flew too close and crashed into the planet! Increase the flyby altitude or spacecraft speed to survive the encounter.',

    infoBoost: 'The planet is moving! The spacecraft swung behind it and exits faster \u2014 a free speed boost from the planet\u2019s motion. This is how Voyager reached the outer solar system.',
    infoDefault: 'Drag the arrow body to reposition, or drag the tip to rotate. Increase the planet\u2019s speed to see a bigger boost.',
    infoGame: 'Adjust the velocity arrow and flyby altitude to steer the spacecraft through the target. Click Launch when ready!',
    gameSuccess: 'Great shot!',

    gameCrash: 'Crash! Too close',

    mercury: 'Mercury', venus: 'Venus', earth: 'Earth', mars: 'Mars',
    jupiter: 'Jupiter', saturn: 'Saturn', uranus: 'Uranus', neptune: 'Neptune',
  },
  pl: {
    title: 'Symulator Asysty Grawitacyjnej',
    subtitle: 'Poruszaj\u0105ca si\u0119 planeta mo\u017Ce za darmo przyspieszy\u0107 statek kosmiczny. Zwi\u0119ksz pr\u0119dko\u015B\u0107 planety, aby zobaczy\u0107 jak.',
    modeExplore: 'Eksploracja',
    modeGame: 'Gra',
    planet: 'Planeta',
    planetSpeed: 'Pr\u0119dko\u015B\u0107 planety',
    flybyAlt: 'Wysoko\u015B\u0107 przelotu',
    spacecraftSpeed: 'Pr\u0119dko\u015B\u0107 statku',
    animSpeed: 'Pr\u0119dko\u015B\u0107 animacji',
    launch: 'Start',
    reset: 'Resetuj',
    newTarget: 'Nowy cel',
    speedBoost: 'Przyrost pr\u0119dko\u015Bci',
    speedIn: 'Pr\u0119dko\u015B\u0107 wlotowa',
    speedOut: 'Pr\u0119dko\u015B\u0107 wylotowa',
    deflection: 'Odchylenie',
    crash: 'KATASTROFA',
    stationary: '(nieruchoma)',
    infoCrash: 'Statek kosmiczny przylecia\u0142 za blisko i rozbi\u0142 si\u0119 o planet\u0119! Zwi\u0119ksz wysoko\u015B\u0107 przelotu lub pr\u0119dko\u015B\u0107 statku.',
    infoStationary: 'Planeta jest nieruchoma. Statek wyleci z t\u0105 sam\u0105 pr\u0119dko\u015Bci\u0105 co wlecia\u0142 \u2014 grawitacja zmieni\u0142a jedynie kierunek. Spr\u00F3buj zwi\u0119kszy\u0107 pr\u0119dko\u015B\u0107 planety!',
    infoBoost: 'Planeta si\u0119 porusza! Statek okr\u0105\u017Cy\u0142 j\u0105 i wylecia\u0142 szybciej \u2014 darmowy przyrost pr\u0119dko\u015Bci dzi\u0119ki ruchowi planety. Tak Voyager dotar\u0142 do kra\u0144c\u00F3w Uk\u0142adu S\u0142onecznego.',
    infoDefault: 'Przeci\u0105gnij cia\u0142o strza\u0142ki, aby zmieni\u0107 pozycj\u0119, lub przeci\u0105gnij grot, aby obr\u00F3ci\u0107. Zwi\u0119ksz pr\u0119dko\u015B\u0107 planety, aby zobaczy\u0107 wi\u0119kszy przyrost.',
    infoGame: 'Dopasuj strza\u0142k\u0119 pr\u0119dko\u015Bci i wysoko\u015B\u0107 przelotu, aby poprowadzi\u0107 statek przez cel. Kliknij Start gdy gotowe!',
    gameSuccess: '\u015Awietny strza\u0142!',
    gameMiss: 'Prawie! Spr\u00F3buj ponownie',
    gameCrash: 'Katastrofa! Za blisko',
    clickToDismiss: 'Kliknij, aby kontynuowa\u0107',
    mercury: 'Merkury', venus: 'Wenus', earth: 'Ziemia', mars: 'Mars',
    jupiter: 'Jowisz', saturn: 'Saturn', uranus: 'Uran', neptune: 'Neptun',
  },
};

// ══════════════════════════════════════════════
// PLANET DATA
// ══════════════════════════════════════════════
const PLANET_DATA = [
  { key: 'mercury',  simMass: 12,  simRadius: 7,   defaultSpeed: 4.5, colors: { hi: '#b0b0b0', mid: '#8a8a8a', lo: '#5c5c5c', glow: '150,150,150' } },
  { key: 'venus',    simMass: 24,  simRadius: 12,  defaultSpeed: 3.5, colors: { hi: '#f5e6a3', mid: '#d4b856', lo: '#a08530', glow: '213,184,86' } },
  { key: 'earth',    simMass: 25,  simRadius: 12,  defaultSpeed: 3.0, colors: { hi: '#7ed6f7', mid: '#3aa8d8', lo: '#1a6e8e', glow: '77,201,246' } },
  { key: 'mars',     simMass: 14,  simRadius: 9,   defaultSpeed: 2.5, colors: { hi: '#e8a07a', mid: '#c75b3a', lo: '#8b3a1f', glow: '199,91,58' } },
  { key: 'jupiter',  simMass: 106, simRadius: 40,  defaultSpeed: 1.5, colors: { hi: '#f0c590', mid: '#d4944a', lo: '#a06020', glow: '212,148,74' } },
  { key: 'saturn',   simMass: 78,  simRadius: 37,  defaultSpeed: 1.0, colors: { hi: '#f0dca0', mid: '#c8a84c', lo: '#967830', glow: '200,168,76' } },
  { key: 'uranus',   simMass: 49,  simRadius: 24,  defaultSpeed: 0.5, colors: { hi: '#b8e8f0', mid: '#7cc8d8', lo: '#4a9aaa', glow: '124,200,216' } },
  { key: 'neptune',  simMass: 51,  simRadius: 24,  defaultSpeed: 0.5, colors: { hi: '#7090e0', mid: '#4060c0', lo: '#203880', glow: '64,96,192' } },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const state = {
  lang: 'en',
  mode: 'explore',
  selectedPlanet: 'earth',
  planetMass: 25,
  planetRadius: 12,
  planetColors: { hi: '#7ed6f7', mid: '#3aa8d8', lo: '#1a6e8e', glow: '77,201,246' },
  approachSpeed: 5,
  periapsisAlt: 50,
  planetVel: 0,
  approachAngle: Math.PI,
  vecPfX: 0,
  vecPfY: 0,
  animSpeed: 1,
  playing: false,
  currentIndex: 0,
  trajectory: [],
  closestIndex: 0,
  crashed: false,
  dragMode: null,
  vIn: 0,
  vOut: 0,
  deltaV: 0,
  deflectionAngle: 0,
  gameTarget: null,
  gameResult: null,
  gameLaunched: false,
};

// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const GM_SCALE  = 200;
const V_SCALE   = 1.5;
const SIM_DT    = 0.25;
const MAX_STEPS = 15000;

// ══════════════════════════════════════════════
// I18N FUNCTIONS
// ══════════════════════════════════════════════
function T(key) { return I18N[state.lang][key]; }

function applyTranslations() {
  var l = I18N[state.lang];
  document.title = l.title;
  document.documentElement.lang = state.lang;
  document.getElementById('titleText').textContent = l.title;
  document.getElementById('subtitleText').textContent = l.subtitle;
  document.getElementById('modeExploreBtn').textContent = l.modeExplore;
  document.getElementById('modeGameBtn').textContent = l.modeGame;
  document.getElementById('lblPlanet').textContent = l.planet;
  document.getElementById('lblPlanetSpeed').textContent = l.planetSpeed;
  document.getElementById('lblAnimSpeed').textContent = l.animSpeed;
  document.getElementById('replayBtn').textContent = (state.currentIndex > 0 || state.playing) ? l.reset : l.launch;
  document.getElementById('newTargetBtn').textContent = l.newTarget;
  document.getElementById('lblBoost').textContent = l.speedBoost;
  document.getElementById('lblSpeedIn').textContent = l.speedIn;
  document.getElementById('lblSpeedOut').textContent = l.speedOut;
  document.getElementById('lblDefl').textContent = l.deflection;
  document.getElementById('modeExploreBtn').classList.toggle('active', state.mode === 'explore');
  document.getElementById('modeGameBtn').classList.toggle('active', state.mode === 'game');
  populatePlanetSelect();
  updateReadouts();
  updateInfo();
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'pl' : 'en';
  var flag = document.getElementById('langFlag');
  if (state.lang === 'en') {
    flag.innerHTML = '<rect width="28" height="10" fill="#fff"/><rect y="10" width="28" height="10" fill="#DC143C"/>';
  } else {
    flag.innerHTML = '<rect width="28" height="20" fill="#012169"/><path d="M0 0L28 20M28 0L0 20" stroke="#fff" stroke-width="3"/><path d="M0 0L28 20M28 0L0 20" stroke="#C8102E" stroke-width="1.5"/><path d="M14 0V20M0 10H28" stroke="#fff" stroke-width="5"/><path d="M14 0V20M0 10H28" stroke="#C8102E" stroke-width="3"/>';
  }
  applyTranslations();
}

function populatePlanetSelect() {
  var sel = document.getElementById('planetSelect');
  var cur = sel.value || state.selectedPlanet;
  sel.innerHTML = '';
  PLANET_DATA.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.key;
    opt.textContent = T(p.key);
    sel.appendChild(opt);
  });
  sel.value = cur;
}

// ══════════════════════════════════════════════
// MODE & GAME
// ══════════════════════════════════════════════
function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeExploreBtn').classList.toggle('active', mode === 'explore');
  document.getElementById('modeGameBtn').classList.toggle('active', mode === 'game');

  document.getElementById('grpReadouts').style.display = mode === 'explore' ? '' : 'none';
  document.getElementById('grpNewTarget').style.display = mode === 'game' ? '' : 'none';

  updateLaunchBtn();

  if (mode === 'game') {
    var planet = PLANET_DATA.find(function(p) { return p.key === state.selectedPlanet; });
    state.planetVel = planet.defaultSpeed;
    document.getElementById('planetVelSlider').value = planet.defaultSpeed;
    document.getElementById('planetVelVal').textContent = planet.defaultSpeed;
    generateTarget();
  } else {
    state.gameTarget = null;
    state.gameResult = null;
    state.gameLaunched = false;
  }
  updateInfo();
}

function generateTarget() {
  var planet = PLANET_DATA.find(function(p) { return p.key === state.selectedPlanet; });
  state.planetVel = planet.defaultSpeed;

  var target = null;
  for (var attempt = 0; attempt < 20; attempt++) {
    var solAngle = Math.PI + (Math.random() - 0.5) * 1.0;
    var solAlt = state.planetRadius * (1 + Math.random() * 4);
    var solSpeed = 3 + Math.random() * 5;

    state.approachAngle = solAngle;
    state.periapsisAlt = solAlt;
    state.approachSpeed = solSpeed;
    initVecPosition();
    computeTrajectory();

    if (!state.crashed && state.trajectory.length >= 100) {
      var outStart = state.closestIndex;
      var outLen = state.trajectory.length - outStart;
      var targetIdx = Math.min(
        outStart + Math.floor(outLen * (0.6 + Math.random() * 0.2)),
        state.trajectory.length - 1
      );
      var sf = toSunFrame(targetIdx);
      target = {
        x: sf.x + (Math.random() - 0.5) * 20,
        y: sf.y + (Math.random() - 0.5) * 20,
      };
      break;
    }
  }
  if (!target) target = { x: 150, y: -100 };

  state.gameTarget = target;

  // Reset player to defaults
  state.approachAngle = Math.PI;
  state.periapsisAlt = 50;
  state.approachSpeed = 5;
  state.periapsisAlt = 50;
  state.approachSpeed = 5;

  initVecPosition();
  recompute();
  state.gameResult = null;
  state.gameLaunched = false;
  state.playing = false;
}

function newTarget() { generateTarget(); }

function gameTolerance() {
  return Math.max(20, state.planetRadius * 1.6);
}

function evaluateGame() {
  if (state.mode !== 'game' || !state.gameLaunched || !state.gameTarget) return;

  if (state.crashed) {
    state.gameResult = 'crash';
    showGameOverlay('crash');
    return;
  }

  var tol = gameTolerance();
  var tolSq = tol * tol;
  var gx = state.gameTarget.x, gy = state.gameTarget.y;

  for (var i = 0; i < state.trajectory.length; i++) {
    var sf = toSunFrame(i);
    var dx = sf.x - gx, dy = sf.y - gy;
    if (dx * dx + dy * dy < tolSq) {
      state.gameResult = 'success';
      showGameOverlay('success');
      return;
    }
  }

  state.gameResult = 'miss';
  showGameOverlay('miss');
}

function showGameOverlay(result) {
  var existing = document.querySelector('.result-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.className = 'result-overlay';

  var emoji, msg, bg;
  if (result === 'success') {
    emoji = '\uD83C\uDF89'; msg = T('gameSuccess'); bg = 'rgba(63,185,80,0.88)';
  } else if (result === 'crash') {
    emoji = '\uD83D\uDCA5'; msg = T('gameCrash'); bg = 'rgba(249,117,131,0.88)';
  } else {
    emoji = '\uD83D\uDC4B'; msg = T('gameMiss'); bg = 'rgba(88,166,255,0.88)';
  }

  overlay.style.background = bg;
  overlay.innerHTML =
    '<div class="overlay-emoji">' + emoji + '</div>' +
    '<div class="overlay-msg">' + msg + '</div>' +
    '<div class="overlay-hint">' + T('clickToDismiss') + '</div>';

  overlay.addEventListener('click', function() { overlay.remove(); });
  document.body.appendChild(overlay);
}

// ══════════════════════════════════════════════
// VECTOR POSITION HELPERS
// ══════════════════════════════════════════════
function computeStartDist() {
  var GM = state.planetMass * GM_SCALE;
  var vp = state.planetVel * V_SCALE;
  var vScSun = state.approachSpeed * V_SCALE;
  var vPfX = vScSun * Math.cos(state.approachAngle) - vp;
  var vPfY = vScSun * Math.sin(state.approachAngle);
  var vInf2 = vPfX * vPfX + vPfY * vPfY;
  return Math.max(400, Math.min(2000, Math.ceil(5 * GM / Math.max(vInf2, 1))));
}

function initVecPosition() {
  var startDist = computeStartDist();
  var GM = state.planetMass * GM_SCALE;
  var vp = state.planetVel * V_SCALE;
  var vScSun = state.approachSpeed * V_SCALE;
  var alpha = state.approachAngle;

  var vPfX = vScSun * Math.cos(alpha) - vp;
  var vPfY = vScSun * Math.sin(alpha);
  var vInf = Math.sqrt(vPfX * vPfX + vPfY * vPfY);
  var alphaPf = Math.atan2(vPfY, vPfX);
  var safeVInf = Math.max(vInf, 0.01);

  var rp = state.planetRadius + state.periapsisAlt;
  var b = rp * Math.sqrt(1 + 2 * GM / (rp * safeVInf * safeVInf));

  state.vecPfX = -startDist * Math.cos(alphaPf) - b * Math.sin(alphaPf);
  state.vecPfY = -startDist * Math.sin(alphaPf) + b * Math.cos(alphaPf);
}

function computePeriapsisAltFromPosition() {
  var GM = state.planetMass * GM_SCALE;
  var vp = state.planetVel * V_SCALE;
  var vScSun = state.approachSpeed * V_SCALE;
  var alpha = state.approachAngle;

  var vPfX = vScSun * Math.cos(alpha) - vp;
  var vPfY = vScSun * Math.sin(alpha);
  var vPfMag = Math.sqrt(vPfX * vPfX + vPfY * vPfY);
  if (vPfMag < 0.001) return;

  var vHatX = vPfX / vPfMag;
  var vHatY = vPfY / vPfMag;
  var b = Math.abs(state.vecPfX * vHatY - state.vecPfY * vHatX);

  var vInf2 = vPfMag * vPfMag;
  var k = GM / vInf2;
  var rp = -k + Math.sqrt(k * k + b * b);

  state.periapsisAlt = Math.max(0, rp - state.planetRadius);
}

// ══════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W, H;
var bgStars = [];

var handleScreenX = 0, handleScreenY = 0;
var scStartScreenX = 0, scStartScreenY = 0;
var lastScale = 1;
var cameraFrozen = false;
var frozenScale = 1, frozenCamX = 0, frozenCamY = 0;
var grabOffsetX = 0, grabOffsetY = 0;
var frozenRootX = 0, frozenRootY = 0;
var dragPrevX = 0, dragPrevY = 0;
var targetScreenX = 0, targetScreenY = 0;
var targetGrabOfsX = 0, targetGrabOfsY = 0;
var MIN_ARROW_PX = 55, MAX_ARROW_PX = 175;

function initBgStars(n) {
  bgStars = [];
  for (var i = 0; i < n; i++) {
    bgStars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.3,
      b: Math.random() * 0.4 + 0.2,
    });
  }
}
initBgStars(200);

function resize() {
  var rect = canvas.parentElement.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', function() { resize(); });

// ══════════════════════════════════════════════
// PHYSICS
// ══════════════════════════════════════════════
function computeTrajectory() {
  var startDist = computeStartDist();
  var GM = state.planetMass * GM_SCALE;
  var vp = state.planetVel * V_SCALE;
  var vScSun = state.approachSpeed * V_SCALE;
  var alpha = state.approachAngle;
  var collisionR = state.planetRadius;

  var vPfX = vScSun * Math.cos(alpha) - vp;
  var vPfY = vScSun * Math.sin(alpha);
  var vInfPlanet = Math.sqrt(vPfX * vPfX + vPfY * vPfY);
  var alphaPf = Math.atan2(vPfY, vPfX);
  var safePf = Math.max(vInfPlanet, 0.01);

  var x = state.vecPfX;
  var y = state.vecPfY;
  var vx = safePf * Math.cos(alphaPf);
  var vy = safePf * Math.sin(alphaPf);

  var points = [];
  var minDist = Infinity;
  var closestIdx = 0;
  var crashed = false;

  for (var i = 0; i < MAX_STEPS; i++) {
    var r = Math.sqrt(x * x + y * y);
    points.push({ x: x, y: y, vx: vx, vy: vy });

    if (r < minDist) { minDist = r; closestIdx = i; }

    var rScale = collisionR;
    var substeps = r < rScale * 1.7 ? 32 : r < rScale * 3.3 ? 16 : r < rScale * 6.7 ? 8 : r < rScale * 13 ? 4 : 1;
    var subdt = SIM_DT / substeps;

    for (var s = 0; s < substeps; s++) {
      var xPrev = x, yPrev = y;
      var rs = Math.sqrt(x * x + y * y);
      var rs3 = rs * rs * rs;
      var ax = -GM * x / rs3;
      var ay = -GM * y / rs3;

      x = x + vx * subdt + 0.5 * ax * subdt * subdt;
      y = y + vy * subdt + 0.5 * ay * subdt * subdt;
      var rs1 = Math.sqrt(x * x + y * y);
      var rs1_3 = rs1 * rs1 * rs1;
      var ax1 = -GM * x / rs1_3;
      var ay1 = -GM * y / rs1_3;

      vx += 0.5 * (ax + ax1) * subdt;
      vy += 0.5 * (ay + ay1) * subdt;

      if (rs1 <= collisionR && rs > collisionR) {
        var f = (rs - collisionR) / (rs - rs1);
        x = xPrev + f * (x - xPrev);
        y = yPrev + f * (y - yPrev);
        crashed = true;
        break;
      }
    }
    if (crashed) { points.push({ x: x, y: y, vx: vx, vy: vy }); break; }

    var rEnd = Math.sqrt(x * x + y * y);
    if (rEnd > startDist * 0.9 && i > closestIdx + 50) break;
  }

  state.trajectory = points;
  state.closestIndex = closestIdx;
  state.crashed = crashed;

  computeResults();
}

function planetPos(idx) {
  var vp = state.planetVel * V_SCALE;
  var tRel = (idx - state.closestIndex) * SIM_DT;
  return { x: vp * tRel, y: 0 };
}

function toSunFrame(idx) {
  var p = state.trajectory[idx];
  var vp = state.planetVel * V_SCALE;
  var tRel = (idx - state.closestIndex) * SIM_DT;
  return {
    x: p.x + vp * tRel,
    y: p.y,
    vx: p.vx + vp,
    vy: p.vy,
  };
}

function computeResults() {
  var GM = state.planetMass * GM_SCALE;
  var vp = state.planetVel * V_SCALE;
  var vScSun = state.approachSpeed * V_SCALE;
  var alpha = state.approachAngle;

  // Sun-frame entry speed
  state.vIn = vScSun / V_SCALE;

  if (state.crashed) {
    state.vOut = 0;
    state.deltaV = 0;
    state.deflectionAngle = 0;
    return;
  }

  var vPfX = vScSun * Math.cos(alpha) - vp;
  var vPfY = vScSun * Math.sin(alpha);
  var vInf = Math.sqrt(vPfX * vPfX + vPfY * vPfY);

  if (vInf < 0.01) {
    state.vOut = state.vIn;
    state.deltaV = 0;
    state.deflectionAngle = 0;
    return;
  }

  var alphaPf = Math.atan2(vPfY, vPfX);
  var rp = state.planetRadius + state.periapsisAlt;

  if (rp <= 0.01) {
    state.crashed = true;
    state.vOut = 0;
    state.deltaV = 0;
    state.deflectionAngle = 0;
    return;
  }

  var e = 1 + rp * vInf * vInf / GM;
  var sinHalfDelta = Math.min(1, 1 / e);
  var delta = 2 * Math.asin(sinHalfDelta);

  var L = state.vecPfX * vPfY - state.vecPfY * vPfX;
  var turnSign = L >= 0 ? 1 : -1;

  var outAngle = alphaPf + turnSign * delta;
  var vOutPfX = vInf * Math.cos(outAngle);
  var vOutPfY = vInf * Math.sin(outAngle);

  var vInSunX = vPfX + vp;
  var vInSunY = vPfY;
  var vOutSunX = vOutPfX + vp;
  var vOutSunY = vOutPfY;

  state.vIn = Math.sqrt(vInSunX * vInSunX + vInSunY * vInSunY) / V_SCALE;
  state.vOut = Math.sqrt(vOutSunX * vOutSunX + vOutSunY * vOutSunY) / V_SCALE;
  state.deltaV = state.vOut - state.vIn;

  var da = turnSign * delta * 180 / Math.PI;
  while (da > 180) da -= 360;
  while (da < -180) da += 360;
  state.deflectionAngle = da;
}

// ══════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════
function drawScene() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, W, H);

  var traj = state.trajectory;
  if (traj.length < 2) return;
  var len = traj.length;
  var idx = Math.min(state.currentIndex, len - 1);

  // ── Camera ──
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  var sampleStep = Math.max(1, Math.floor(len / 3000));
  for (var i = 0; i < len; i += sampleStep) {
    var p = toSunFrame(i);
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }
  var pL = toSunFrame(len - 1);
  minX = Math.min(minX, pL.x); maxX = Math.max(maxX, pL.x);
  minY = Math.min(minY, pL.y); maxY = Math.max(maxY, pL.y);

  var plS = planetPos(0);
  var plE = planetPos(len - 1);
  minX = Math.min(minX, plS.x, plE.x);
  maxX = Math.max(maxX, plS.x, plE.x);
  minY = Math.min(minY, plS.y, plE.y, -30);
  maxY = Math.max(maxY, plS.y, plE.y, 30);

  if (state.mode === 'game' && state.gameTarget) {
    var tol = gameTolerance();
    minX = Math.min(minX, state.gameTarget.x - tol);
    maxX = Math.max(maxX, state.gameTarget.x + tol);
    minY = Math.min(minY, state.gameTarget.y - tol);
    maxY = Math.max(maxY, state.gameTarget.y + tol);
  }

  var pad = 100;
  var spanX = (maxX - minX) + 2 * pad;
  var spanY = (maxY - minY) + 2 * pad;
  var scale = Math.min(W / spanX, H / spanY);
  var camX = (minX + maxX) / 2;
  var camY = (minY + maxY) / 2;

  if (cameraFrozen) {
    scale = frozenScale;
    camX = frozenCamX;
    camY = frozenCamY;
  } else {
    lastScale = scale;
    frozenCamX = camX;
    frozenCamY = camY;
  }

  function tx(x) { return W / 2 + (x - camX) * scale; }
  function ty(y) { return H / 2 - (y - camY) * scale; }

  // ── Stars ──
  bgStars.forEach(function(s) {
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,210,220,' + (s.b * 0.3) + ')';
    ctx.fill();
  });

  // ── Planet orbital path (straight dashed line) ──
  var vp = state.planetVel * V_SCALE;
  var pg = state.planetColors.glow;
  if (vp > 0.01) {
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(' + pg + ',0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx(plS.x), ty(plS.y));
    ctx.lineTo(tx(plE.x), ty(plE.y));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Ghost planets ──
  if (vp > 0.01) {
    [plS, plE].forEach(function(pl) {
      ctx.beginPath();
      ctx.arc(tx(pl.x), ty(pl.y), state.planetRadius * scale * 0.8, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + pg + ',0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  // ── Planet ──
  var plNow = planetPos(idx);
  drawPlanet(tx(plNow.x), ty(plNow.y), scale);

  // ── Planet velocity arrow ──
  if (vp > 0.01) {
    var ppx = tx(plNow.x), ppy = ty(plNow.y);
    var pr = Math.max(8, state.planetRadius * scale);
    var arrowLen = Math.min(vp * 10, 60);
    drawArrow(ppx + pr + 6, ppy, ppx + pr + 6 + arrowLen, ppy,
      'rgba(' + pg + ',0.5)', 1.5, 8);
    ctx.font = '9px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(' + pg + ',0.5)';
    ctx.textAlign = 'center';
    ctx.fillText('v\u209A', ppx + pr + 6 + arrowLen / 2, ppy - 10);
  }

  // Drag offset: shift trajectory rendering to stay pinned to frozen root
  var dragOfsX = 0, dragOfsY = 0;
  if (state.dragMode === 'arrow' || state.dragMode === 'translate') {
    var sf0Live = toSunFrame(0);
    dragOfsX = frozenRootX - tx(sf0Live.x);
    dragOfsY = frozenRootY - ty(sf0Live.y);
  }

  // ── Full trajectory (faint) ──
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(255,224,102,0.08)';
  ctx.beginPath();
  for (var i = 0; i < len; i += sampleStep) {
    var p = toSunFrame(i);
    if (i === 0) ctx.moveTo(tx(p.x) + dragOfsX, ty(p.y) + dragOfsY);
    else ctx.lineTo(tx(p.x) + dragOfsX, ty(p.y) + dragOfsY);
  }
  ctx.lineTo(tx(pL.x) + dragOfsX, ty(pL.y) + dragOfsY);
  ctx.stroke();

  // ── Animated trail ──
  if (idx > 0) {
    var trailStep = Math.max(1, Math.floor(idx / 600));
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = 'rgba(255,224,102,0.55)';
    ctx.beginPath();
    for (var i = 0; i <= idx; i += trailStep) {
      var p = toSunFrame(i);
      if (i === 0) ctx.moveTo(tx(p.x) + dragOfsX, ty(p.y) + dragOfsY);
      else ctx.lineTo(tx(p.x) + dragOfsX, ty(p.y) + dragOfsY);
    }
    var pCur = toSunFrame(idx);
    ctx.lineTo(tx(pCur.x) + dragOfsX, ty(pCur.y) + dragOfsY);
    ctx.stroke();
  }

  // ── Game target ──
  if (state.mode === 'game' && state.gameTarget) {
    var gtol = gameTolerance();
    var gx = tx(state.gameTarget.x);
    var gy = ty(state.gameTarget.y);
    targetScreenX = gx;
    targetScreenY = gy;
    var gr = gtol * scale;
    var pulse = 1 + 0.06 * Math.sin(Date.now() / 250);

    ctx.beginPath();
    ctx.arc(gx, gy, gr * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,107,107,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(gx, gy, gr * 0.5 * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,107,107,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(gx, gy, 4 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,107,107,0.8)';
    ctx.fill();

    var ch = gr * 0.35;
    ctx.strokeStyle = 'rgba(255,107,107,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(gx - ch, gy); ctx.lineTo(gx + ch, gy);
    ctx.moveTo(gx, gy - ch); ctx.lineTo(gx, gy + ch);
    ctx.stroke();
  }

  // ── Crash overlay ──
  if (state.crashed && idx >= len - 1) {
    var plCrash = planetPos(len - 1);
    var cx = tx(plCrash.x), cy = ty(plCrash.y);

    var boom = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    boom.addColorStop(0, 'rgba(255,140,50,0.7)');
    boom.addColorStop(0.3, 'rgba(255,80,30,0.4)');
    boom.addColorStop(0.7, 'rgba(255,50,20,0.1)');
    boom.addColorStop(1, 'rgba(255,50,20,0.0)');
    ctx.fillStyle = boom;
    ctx.beginPath();
    ctx.arc(cx, cy, 80, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uD83D\uDCA5', cx, cy);
    ctx.textBaseline = 'alphabetic';
  }

  // ── Velocity arrows (exit) ──
  if (!state.crashed) {
    drawVelocityArrows(len, tx, ty, dragOfsX, dragOfsY);
  }

  // ── Draggable velocity vector (arrow length = speed) ──
  (function() {
    var sf0 = toSunFrame(0);
    var sx, sy;
    if (state.dragMode === 'arrow' || state.dragMode === 'translate') {
      sx = frozenRootX;
      sy = frozenRootY;
    } else {
      sx = tx(sf0.x);
      sy = ty(sf0.y);
    }
    scStartScreenX = sx;
    scStartScreenY = sy;

    var a = state.approachAngle;
    var aLen = MIN_ARROW_PX + (state.approachSpeed - 1) * (MAX_ARROW_PX - MIN_ARROW_PX) / 9;
    var tipX = sx + Math.cos(a) * aLen;
    var tipY = sy - Math.sin(a) * aLen;
    handleScreenX = tipX;
    handleScreenY = tipY;

    var shaftColor = state.dragMode ? '#7dc4ff' : '#58a6ff';

    // Dotted circle guide while dragging
    if (state.dragMode === 'arrow') {
      ctx.setLineDash([3, 5]);
      ctx.strokeStyle = 'rgba(88,166,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(sx, sy, aLen, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    var headAngle = Math.atan2(tipY - sy, tipX - sx);
    var shaftEndX = tipX - 11 * Math.cos(headAngle);
    var shaftEndY = tipY - 11 * Math.sin(headAngle);
    ctx.strokeStyle = shaftColor;
    ctx.lineWidth = 3;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(shaftEndX, shaftEndY);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fillStyle = shaftColor;
    ctx.fill();

    ctx.fillStyle = shaftColor;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - 13 * Math.cos(headAngle - 0.4), tipY - 13 * Math.sin(headAngle - 0.4));
    ctx.lineTo(tipX - 13 * Math.cos(headAngle + 0.4), tipY - 13 * Math.sin(headAngle + 0.4));
    ctx.closePath();
    ctx.fill();

    var perpX = -(tipY - sy);
    var perpY = tipX - sx;
    var perpLen = Math.sqrt(perpX * perpX + perpY * perpY) || 1;
    var midX = (sx + tipX) / 2, midY = (sy + tipY) / 2;
    ctx.font = '11px "Share Tech Mono", monospace';
    ctx.fillStyle = '#58a6ff';
    ctx.textAlign = 'center';
    ctx.fillText('v=' + state.vIn.toFixed(1),
      midX + perpX / perpLen * 14, midY + perpY / perpLen * 14);
  })();

  // ── Spacecraft (drawn LAST among game objects) ──
  if (idx < len) {
    var sc = toSunFrame(idx);
    var screenAngle = Math.atan2(-sc.vy, sc.vx);
    var isDrag = (state.dragMode === 'arrow' || state.dragMode === 'translate');
    var scx = (isDrag && idx === 0) ? frozenRootX : tx(sc.x);
    var scy = (isDrag && idx === 0) ? frozenRootY : ty(sc.y);
    drawSpacecraft(scx, scy, screenAngle);
  }

  // ── Labels ──
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(110,122,138,0.7)';
  var plLabelY = ty(plNow.y) + Math.max(8, state.planetRadius * scale) + 14;
  ctx.fillText(T(state.selectedPlanet).toUpperCase(), tx(plNow.x), plLabelY);

  if (vp < 0.01) {
    ctx.fillStyle = 'rgba(110,122,138,0.35)';
    ctx.fillText(T('stationary'), tx(plNow.x), plLabelY + 13);
  }
}

function drawPlanet(px, py, scale) {
  var r = Math.max(8, state.planetRadius * scale);
  var c = state.planetColors;

  // Atmosphere ring
  ctx.beginPath();
  ctx.arc(px, py, r * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(' + c.glow + ',0.12)';
  ctx.lineWidth = r * 0.15;
  ctx.stroke();

  var glow = ctx.createRadialGradient(px, py, r * 0.3, px, py, r * 3);
  glow.addColorStop(0, 'rgba(' + c.glow + ',0.2)');
  glow.addColorStop(0.5, 'rgba(' + c.glow + ',0.06)');
  glow.addColorStop(1, 'rgba(' + c.glow + ',0.0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(px, py, r * 3, 0, Math.PI * 2);
  ctx.fill();

  var bodyGrad = ctx.createRadialGradient(
    px - r * 0.3, py - r * 0.3, r * 0.1, px, py, r);
  bodyGrad.addColorStop(0, c.hi);
  bodyGrad.addColorStop(0.7, c.mid);
  bodyGrad.addColorStop(1, c.lo);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(' + c.glow + ',0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawSpacecraft(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  var glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 20);
  glow.addColorStop(0, 'rgba(255,224,102,0.45)');
  glow.addColorStop(1, 'rgba(255,224,102,0.0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.moveTo(13, 0);
  ctx.lineTo(-7, -6.5);
  ctx.lineTo(-7, 6.5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawArrow(x1, y1, x2, y2, color, lineW, headSize) {
  var angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'butt';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2 - (headSize - 1) * Math.cos(angle), y2 - (headSize - 1) * Math.sin(angle));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headSize * Math.cos(angle - 0.4), y2 - headSize * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - headSize * Math.cos(angle + 0.4), y2 - headSize * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function drawVelocityArrows(len, tx, ty, ofsX, ofsY) {
  var sl = toSunFrame(len - 1);
  var maxSpeed = Math.max(state.vIn, state.vOut, 0.1);
  var maxArrowPx = Math.min(W, H) * 0.14;
  var arrowK = maxArrowPx / (maxSpeed * V_SCALE);

  if (state.vOut > 0.01) {
    var sx = tx(sl.x) + ofsX, sy = ty(sl.y) + ofsY;
    var ex = sx + sl.vx * arrowK;
    var ey = sy - sl.vy * arrowK;

    var color = '#58a6ff';
    if (state.deltaV > 0.15) color = '#3fb950';
    else if (state.deltaV < -0.15) color = '#f97583';

    drawArrow(sx, sy, ex, ey, color, 2.5, 13);

    ctx.font = '11px "Share Tech Mono", monospace';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    var mx = (sx + ex) / 2, my = (sy + ey) / 2;
    var perpX = -(ey - sy), perpY = ex - sx;
    var perpLen = Math.sqrt(perpX * perpX + perpY * perpY) || 1;
    ctx.fillText('v=' + state.vOut.toFixed(1),
      mx + perpX / perpLen * 14, my + perpY / perpLen * 14);
  }
}

// ══════════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════════
var lastTime = 0;
var stepAccum = 0;

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (state.playing && state.trajectory.length > 0) {
    var baseStepsPerSec = Math.max(30, Math.ceil(state.trajectory.length / 3.5));
    stepAccum += dt * baseStepsPerSec * state.animSpeed;
    var steps = Math.floor(stepAccum);
    stepAccum -= steps;
    if (steps > 0) state.currentIndex += steps;
    if (state.currentIndex >= state.trajectory.length - 1) {
      state.currentIndex = state.trajectory.length - 1;
      state.playing = false;
      updateLaunchBtn();
      evaluateGame();
    }
  }

  drawScene();
  requestAnimationFrame(animate);
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
function replay() {
  if (state.currentIndex > 0 || state.playing) {
    // Reset
    state.currentIndex = 0;
    stepAccum = 0;
    state.playing = false;
    updateLaunchBtn();
  } else {
    // Launch
    state.currentIndex = 0;
    stepAccum = 0;
    state.playing = true;
    if (state.mode === 'game') {
      state.gameLaunched = true;
      state.gameResult = null;
    }
    updateLaunchBtn();
  }
}

function updateLaunchBtn() {
  var btn = document.getElementById('replayBtn');
  btn.textContent = (state.currentIndex > 0 || state.playing) ? T('reset') : T('launch');
}

function recompute() {
  computeTrajectory();

  updateReadouts();
  updateInfo();
  state.currentIndex = 0;
  stepAccum = 0;
  state.playing = false;
  if (state.mode === 'game') {
    state.gameLaunched = false;
    state.gameResult = null;
  }
  updateLaunchBtn();
}

function stepSlider(sliderId, delta) {
  var slider = document.getElementById(sliderId);
  var min = +slider.min, max = +slider.max, step = +slider.step;
  var val = +slider.value + delta;
  val = Math.round(val / step) * step;
  val = Math.max(min, Math.min(max, val));
  val = Math.round(val * 1000) / 1000;
  slider.value = val;
  slider.dispatchEvent(new Event('input'));
}

function selectPlanet(key) {
  var planet = PLANET_DATA.find(function(p) { return p.key === key; });
  if (!planet) return;
  state.selectedPlanet = key;
  state.planetMass = planet.simMass;
  state.planetRadius = planet.simRadius;
  state.planetColors = planet.colors;
  state.planetVel = planet.defaultSpeed;

  document.getElementById('planetVelSlider').value = planet.defaultSpeed;
  document.getElementById('planetVelVal').textContent = planet.defaultSpeed;
  document.getElementById('planetSelect').value = key;

  initVecPosition();
  recompute();

  if (state.mode === 'game') {
    generateTarget();
  }
}

document.getElementById('planetSelect').addEventListener('change', function(e) {
  selectPlanet(e.target.value);
});

document.getElementById('planetVelSlider').addEventListener('input', function(e) {
  state.planetVel = +e.target.value;
  document.getElementById('planetVelVal').textContent = e.target.value;
  initVecPosition();
  recompute();
});

document.getElementById('animSlider').addEventListener('input', function(e) {
  state.animSpeed = +e.target.value;
  document.getElementById('animVal').textContent = (+e.target.value).toFixed(1) + 'x';
});

// ══════════════════════════════════════════════
// DRAG INTERACTION
// ══════════════════════════════════════════════
var ARROW_HIT_DIST = 20;

function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function isNearArrow(pos) {
  // Check near tip (circle)
  var dtx = pos.x - handleScreenX, dty = pos.y - handleScreenY;
  if (dtx * dtx + dty * dty < 25 * 25) return true;
  // Check near shaft (segment)
  var x1 = scStartScreenX, y1 = scStartScreenY;
  var x2 = handleScreenX, y2 = handleScreenY;
  var dx = x2 - x1, dy = y2 - y1;
  var lenSq = dx * dx + dy * dy;
  if (lenSq < 1) return false;
  var t = ((pos.x - x1) * dx + (pos.y - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  var projX = x1 + t * dx, projY = y1 + t * dy;
  var distSq = (pos.x - projX) * (pos.x - projX) + (pos.y - projY) * (pos.y - projY);
  return distSq < ARROW_HIT_DIST * ARROW_HIT_DIST;
}

function freezeCamera() {
  cameraFrozen = true;
  frozenScale = lastScale;
}

function unfreezeCamera() {
  cameraFrozen = false;
}

function handleArrowDrag(pos) {
  var effX = pos.x - grabOffsetX;
  var effY = pos.y - grabOffsetY;
  var dx = effX - frozenRootX;
  var dy = -(effY - frozenRootY);
  var dist = Math.sqrt(dx * dx + dy * dy);

  state.approachAngle = Math.atan2(dy, dx);

  var speed = 1 + (dist - MIN_ARROW_PX) * 9 / (MAX_ARROW_PX - MIN_ARROW_PX);
  state.approachSpeed = Math.max(1, Math.min(10, Math.round(speed * 10) / 10));

  state.currentIndex = 0;
  computePeriapsisAltFromPosition();
  computeTrajectory();
  updateLaunchBtn();
  updateReadouts();
  updateInfo();
}

function isNearTarget(pos) {
  if (state.mode !== 'game' || !state.gameTarget) return false;
  var dx = pos.x - targetScreenX, dy = pos.y - targetScreenY;
  var hitR = Math.max(30, gameTolerance() * lastScale);
  return dx * dx + dy * dy < hitR * hitR;
}

function handleTargetDrag(pos) {
  var sx = pos.x - targetGrabOfsX;
  var sy = pos.y - targetGrabOfsY;
  state.gameTarget.x = frozenCamX + (sx - W / 2) / frozenScale;
  state.gameTarget.y = frozenCamY - (sy - H / 2) / frozenScale;

}

function isNearRoot(pos) {
  var dx = pos.x - scStartScreenX, dy = pos.y - scStartScreenY;
  return dx * dx + dy * dy < 15 * 15;
}

function handleTranslateDrag(pos) {
  var dx = pos.x - dragPrevX;
  var dy = pos.y - dragPrevY;
  dragPrevX = pos.x;
  dragPrevY = pos.y;
  state.vecPfX += dx / frozenScale;
  state.vecPfY -= dy / frozenScale;
  frozenRootX += dx;
  frozenRootY += dy;
  state.currentIndex = 0;
  computePeriapsisAltFromPosition();
  computeTrajectory();
  updateLaunchBtn();
  updateReadouts();
  updateInfo();
}

function startDrag(mode, pos) {
  state.dragMode = mode;
  state.playing = false;
  freezeCamera();
  if (mode === 'arrow') {
    grabOffsetX = pos.x - handleScreenX;
    grabOffsetY = pos.y - handleScreenY;
    frozenRootX = scStartScreenX;
    frozenRootY = scStartScreenY;
  } else if (mode === 'translate') {
    dragPrevX = pos.x;
    dragPrevY = pos.y;
    frozenRootX = scStartScreenX;
    frozenRootY = scStartScreenY;
  } else if (mode === 'target') {
    targetGrabOfsX = pos.x - targetScreenX;
    targetGrabOfsY = pos.y - targetScreenY;
  }
}

function endDrag() {
  if (state.dragMode) {
    state.dragMode = null;
    canvas.style.cursor = 'default';
    unfreezeCamera();
  }
}

canvas.addEventListener('mousedown', function(e) {
  var pos = getCanvasPos(e);
  if (isNearTarget(pos)) {
    startDrag('target', pos);
    canvas.style.cursor = 'move';
    e.preventDefault();
  } else if (isNearRoot(pos)) {
    startDrag('translate', pos);
    canvas.style.cursor = 'move';
    e.preventDefault();
  } else if (isNearArrow(pos)) {
    startDrag('arrow', pos);
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', function(e) {
  var pos = getCanvasPos(e);
  if (state.dragMode === 'arrow') {
    handleArrowDrag(pos);
    e.preventDefault();
  } else if (state.dragMode === 'translate') {
    handleTranslateDrag(pos);
    e.preventDefault();
  } else if (state.dragMode === 'target') {
    handleTargetDrag(pos);
    e.preventDefault();
  } else {
    if (isNearTarget(pos)) canvas.style.cursor = 'move';
    else if (isNearRoot(pos)) canvas.style.cursor = 'move';
    else if (isNearArrow(pos)) canvas.style.cursor = 'grab';
    else canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);

canvas.addEventListener('touchstart', function(e) {
  var pos = getCanvasPos(e);
  if (isNearTarget(pos)) {
    startDrag('target', pos);
    e.preventDefault();
  } else if (isNearRoot(pos)) {
    startDrag('translate', pos);
    e.preventDefault();
  } else if (isNearArrow(pos)) {
    startDrag('arrow', pos);
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  var pos = getCanvasPos(e);
  if (state.dragMode === 'arrow') {
    handleArrowDrag(pos);
    e.preventDefault();
  } else if (state.dragMode === 'translate') {
    handleTranslateDrag(pos);
    e.preventDefault();
  } else if (state.dragMode === 'target') {
    handleTargetDrag(pos);
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchend', endDrag);

// ══════════════════════════════════════════════
// READOUTS & INFO
// ══════════════════════════════════════════════
function updateReadouts() {
  if (state.crashed) {
    document.getElementById('speedInVal').textContent = state.vIn.toFixed(1);
    document.getElementById('speedOutVal').textContent = '\u2014';
    var boostEl = document.getElementById('boostVal');
    boostEl.textContent = T('crash');
    boostEl.style.color = 'var(--loss)';
    document.getElementById('deflVal').textContent = '\u2014';
    return;
  }

  document.getElementById('speedInVal').textContent = state.vIn.toFixed(1);
  document.getElementById('speedOutVal').textContent = state.vOut.toFixed(1);

  var boostEl = document.getElementById('boostVal');
  var dv = state.deltaV;
  boostEl.textContent = (dv >= 0 ? '+' : '') + dv.toFixed(1);
  if (dv > 0.15) boostEl.style.color = 'var(--gain)';
  else if (dv < -0.15) boostEl.style.color = 'var(--loss)';
  else boostEl.style.color = 'var(--text)';

  document.getElementById('deflVal').textContent =
    Math.abs(state.deflectionAngle).toFixed(0) + '\u00B0';
}

function updateInfo() {
  var text;
  if (state.mode === 'game') {
    text = T('infoGame');
  } else if (state.crashed) {
    text = T('infoCrash');
  } else if (state.planetVel < 0.1) {
    text = T('infoStationary');
  } else if (state.deltaV > 0.15) {
    text = T('infoBoost');
  } else {
    text = T('infoDefault');
  }
  document.getElementById('infoText').textContent = text;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
resize();
populatePlanetSelect();
selectPlanet('earth');
applyTranslations();
requestAnimationFrame(animate);
</script>
