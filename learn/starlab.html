          /* Derive luminosity from Stefan-Boltzmann for photospheric stages */
          props.lStart = stefanBoltzmannL(props.rStart, props.tStart);
          props.lEnd = stefanBoltzmannL(props.rEnd, props.tEnd);
          return props;
        }

        /* Determine visual mode for a given stage */
        function getVisualMode(stageId) {
          switch (stageId) {
            case "protostar":
              return "contracting_cloud";
            case "red_giant":
            case "asymptotic_giant_branch":
            case "red_supergiant":
              return "giant_with_orbits";
            case "planetary_nebula":
              return "nebula_shell";
            case "blue_dwarf":
              return "glowing_sphere";
            case "white_dwarf":
              return "compact_remnant";
            case "neutron_star":
              return "compact_remnant";
            case "black_hole":
              return "black_hole_vis";
            case "core_collapse_supernova":
            case "type_ia_supernova":
              return "supernova_flash";
            default:
              return "glowing_sphere";
          }
        }

        /* Absolute durations for stages with known physical timescales */
        function getAbsoluteDuration(stageId, massMsun, totalLife) {
          switch (stageId) {
            case "protostar":
              return Math.min(
                4e7 * Math.pow(massMsun, -2.5),
                1e8,
                0.01 * totalLife,
              );
            case "planetary_nebula":
              return 2e4;
            case "core_collapse_supernova":
              return 1;
            case "type_ia_supernova":
              return 1;
            case "white_dwarf":
              return 1e4;
            case "neutron_star":
              return 1e4;
            case "black_hole":
              return 1e4;
            default:
              return null;
          }
        }

        /* Build the track from current state parameters */
        function buildTrack() {
          const m = state.massMsun;
          const met = state.metallicityMode;
          const bin = state.binaryMode;

          const totalLife = computeLifetime(m, met);
          state.totalLifetimeYears = totalLife;

          /* Select phase template */
          let tpl = null;
          for (let i = 0; i < PHASE_TEMPLATES.length; i++) {
            if (
              m >= PHASE_TEMPLATES[i].massMin &&
              m < PHASE_TEMPLATES[i].massMax
            ) {
              tpl = PHASE_TEMPLATES[i];
              break;
            }
          }
          if (!tpl) tpl = PHASE_TEMPLATES[PHASE_TEMPLATES.length - 1];

          /* Pass 1: compute absolute vs fractional durations */
          let absoluteTotal = 0;
          let fracTotal = 0;
          const stageDurations = [];
          for (let j = 0; j < tpl.stages.length; j++) {
            const s = tpl.stages[j];
            const absDur = getAbsoluteDuration(s.id, m, totalLife);
            if (absDur !== null) {
              stageDurations.push({ abs: absDur });
              absoluteTotal += absDur;
            } else {
              stageDurations.push({ frac: s.frac });
              fracTotal += s.frac;
            }
          }
          const remaining = Math.max(0, totalLife - absoluteTotal);

          /* Pass 2: build track with computed durations */
          const track = [];
          let ageAccum = 0;
          for (let j = 0; j < tpl.stages.length; j++) {
            const s = tpl.stages[j];
            const sd = stageDurations[j];
            const duration =
              sd.abs !== undefined
                ? sd.abs
                : fracTotal > 0
                  ? (sd.frac / fracTotal) * remaining
                  : 0;
            const props = getStageProperties(s.id, m);
            track.push({
              id: s.id,
              ageStartYears: ageAccum,
              ageEndYears: ageAccum + duration,
              radiusRsunStart: props.rStart,
              radiusRsunEnd: props.rEnd,
              tempKStart: props.tStart,
              tempKEnd: props.tEnd,
              luminosityLsunStart: props.lStart,
              luminosityLsunEnd: props.lEnd,
              visualMode: getVisualMode(s.id),
            });
            ageAccum += duration;
          }

          /* Chain properties: each stage starts where the previous ended.
             Skip explosive transitions (supernova) where a jump is physical. */
          for (let k = 1; k < track.length; k++) {
            const prev = track[k - 1];
            const cur = track[k];
            const explosive =
              cur.id === "core_collapse_supernova" ||
              cur.id === "type_ia_supernova";
            if (!explosive) {
              cur.radiusRsunStart = prev.radiusRsunEnd;
              cur.tempKStart = prev.tempKEnd;
              cur.luminosityLsunStart = SB_EXEMPT_STAGES.has(cur.id)
                ? prev.luminosityLsunEnd
                : stefanBoltzmannL(cur.radiusRsunStart, cur.tempKStart);
            }
          }

          state.outcomeId = tpl.outcome;
          state.outcomeUncertain = tpl.uncertain;

          /* Apply binary branch: CO-WD in close binary -> Type Ia path */
          if (bin === "close" && tpl.outcome === "co_white_dwarf") {
            /* Remove the final white_dwarf stage, add accretion + Type Ia */
            const lastStage = track[track.length - 1];
            if (lastStage.id === "white_dwarf") {
              const wdEnd = lastStage.ageEndYears;
              const accDuration = 1000;
              track[track.length - 1].ageEndYears = wdEnd;
              track.push({
                id: "type_ia_supernova",
                ageStartYears: wdEnd,
                ageEndYears: wdEnd + accDuration,
                radiusRsunStart: 0.01,
                radiusRsunEnd: 0.01,
                tempKStart: 1e9,
                tempKEnd: 1e6,
                luminosityLsunStart: 5e9,
                luminosityLsunEnd: 1e5,
                visualMode: "supernova_flash",
              });
              state.outcomeId = "type_ia_outcome";
              state.outcomeUncertain = false;
            }
          } else if (bin === "close" && m >= 10) {
            /* Binary doesn't materially change the massive-star outcome */
          }

          state.track = track;
          state.screenTimeBudgets = computeScreenTimeBudgets(
            track,
            state.playbackSpeed,
          );
        }

        /* Interpolate physical properties at a given age */
        function interpolateAtAge(track, ageYears) {
          if (!track || track.length === 0) {
            return {
              stageIndex: 0,
              stageProgress: 0,
              radiusRsun: 1,
              tempK: 5778,
              luminosityLsun: 1,
            };
          }
          const age = clamp(
            ageYears,
            track[0].ageStartYears,
            track[track.length - 1].ageEndYears,
          );
          for (let i = 0; i < track.length; i++) {
            const s = track[i];
            const isLast = i === track.length - 1;
            if (
              age >= s.ageStartYears &&
              (isLast ? age <= s.ageEndYears : age < s.ageEndYears)
            ) {
              const dur = s.ageEndYears - s.ageStartYears;
              const t = dur > 0 ? (age - s.ageStartYears) / dur : 0;
              const r = logLerp(s.radiusRsunStart, s.radiusRsunEnd, t);
              const tk = logLerp(s.tempKStart, s.tempKEnd, t);
              const lum = SB_EXEMPT_STAGES.has(s.id)
                ? logLerp(s.luminosityLsunStart, s.luminosityLsunEnd, t)
                : stefanBoltzmannL(r, tk);
              return {
                stageIndex: i,
                stageProgress: t,
                radiusRsun: r,
                tempK: tk,
                luminosityLsun: lum,
              };
            }
          }
          /* Past the end */
          const last = track[track.length - 1];
          return {
            stageIndex: track.length - 1,
            stageProgress: 1,
            radiusRsun: last.radiusRsunEnd,
            tempK: last.tempKEnd,
            luminosityLsun: SB_EXEMPT_STAGES.has(last.id)
              ? last.luminosityLsunEnd
              : stefanBoltzmannL(last.radiusRsunEnd, last.tempKEnd),
          };
        }

        /* ============================================================
         *  PLAYBACK ENGINE
         * ============================================================ */

        function computeScreenTimeBudgets(track, speedMode) {
          if (!track || track.length === 0) return [];
          const params = SPEED_PARAMS[speedMode] || SPEED_PARAMS.story;
          const totalTime = params.totalScreenTime;
          const budgets = [];
          const logWeights = [];
          let totalWeight = 0;
          for (let i = 0; i < track.length; i++) {
            const dur = track[i].ageEndYears - track[i].ageStartYears;
            let w = dur > 0 ? Math.max(0.5, Math.log10(dur + 1)) : 0.5;
            /* Give terminal events a boost */
            const sid = track[i].id;
            if (
              sid === "core_collapse_supernova" ||
              sid === "type_ia_supernova" ||
              sid === "neutron_star" ||
              sid === "black_hole" ||
              sid === "white_dwarf" ||
              sid === "planetary_nebula"
            ) {
              w = Math.max(w, 2);
            }
            logWeights.push(w);
            totalWeight += w;
          }
          for (let j = 0; j < track.length; j++) {
            budgets.push(
              Math.max(1.0, (logWeights[j] / totalWeight) * totalTime),
            );
          }
          return budgets;
        }

        function computeAgeStep(dt) {
          if (!state.track || state.track.length === 0) return 0;
          const idx = state.currentStageIndex;
          const stage = state.track[idx];
          const budget = state.screenTimeBudgets[idx] || 2;
          const stageDuration = stage.ageEndYears - stage.ageStartYears;
          if (stageDuration <= 0 || budget <= 0) return stageDuration;

          let rate = stageDuration / budget; /* sim years per real second */

          /* Transition slowdown: last 15% of stage */
          const params =
            SPEED_PARAMS[state.playbackSpeed] || SPEED_PARAMS.story;
          const progress = state.stageProgress;
          if (progress > 0.85) {
            const slowFactor = lerp(
              1,
              params.transitionSlowdown,
              (progress - 0.85) / 0.15,
            );
            rate *= slowFactor;
          }

          /* Supernova hold */
          const sid = stage.id;
          if (
            sid === "core_collapse_supernova" ||
            sid === "type_ia_supernova"
          ) {
            rate = stageDuration / params.snovaHold;
          }

          return dt * rate;
        }

        /* ============================================================
         *  STATE
         * ============================================================ */
        const state = {
          lang:
            navigator.language && navigator.language.startsWith("pl")
              ? "pl"
              : "en",
          mode: "custom",
          realStarId: "sun",
          startFromNow: true,

          massMsun: 1.0,
          massSliderVal: 354,
          metallicityMode: "solar",
          binaryMode: "single",

          track: null,
          totalLifetimeYears: 0,
          outcomeId: "",
          outcomeUncertain: false,
          screenTimeBudgets: [],

          playing: false,
          playbackSpeed: "story",
          currentAgeYears: 0,
          currentStageIndex: 0,
          stageProgress: 0,
          finished: false,
          supernovaTimer: 0,

          radiusRsun: 1,
          tempK: 5778,
          luminosityLsun: 1,
          displayRadiusPx: 60,
          starColor: [255, 255, 200],

          nowAgeYears: 0,
          advancedOpen: false,
          prevVisualMode: "",
          visualTransition: 0,
          prevDisplayRadius: 60,
          prevStarColor: [255, 255, 200],
          prevStageId: "",
          bgStars: [],
          W: 0,
          H: 0,
          animTime: 0,
        };

        /* ============================================================
         *  STATE TRANSITIONS
         * ============================================================ */

        function setMass(m) {
          state.massMsun = clamp(m, 0.08, 100);
          state.massSliderVal = massToSlider(state.massMsun);
          buildTrack();
          resetPlayback();
        }

        function loadRealStar(id) {
          let star = null;
          for (let i = 0; i < REAL_STARS.length; i++) {
            if (REAL_STARS[i].id === id) {
              star = REAL_STARS[i];
              break;
            }
          }
          if (!star) return;
          state.realStarId = id;
          state.massMsun = star.massMsun;
          state.massSliderVal = massToSlider(star.massMsun);
          state.metallicityMode = star.metallicityMode;
          state.binaryMode = star.binaryMode;
          state.nowAgeYears = star.ageYears || 0;
          buildTrack();
          /* Validate preset: check computed stage matches expected */
          if (star.ageYears && star.currentStageId && state.track.length > 0) {
            const interp = interpolateAtAge(state.track, star.ageYears);
            const computedId = state.track[interp.stageIndex].id;
            if (computedId !== star.currentStageId) {
              console.warn(
                "Star preset '" +
                  id +
                  "': expected stage '" +
                  star.currentStageId +
                  "' at age " +
                  star.ageYears +
                  " yr, but computed stage is '" +
                  computedId +
                  "'",
              );
            }
          }
          if (state.startFromNow && star.ageYears) {
            state.currentAgeYears = star.ageYears;
          } else {
            state.currentAgeYears = 0;
          }
          state.finished = false;
          state.playing = false;
          state.supernovaTimer = 0;
          updateDerivedValues();
        }

        function resetPlayback() {
          if (state.mode === "real" && state.startFromNow) {
            let star = null;
            for (let i = 0; i < REAL_STARS.length; i++) {
              if (REAL_STARS[i].id === state.realStarId) {
                star = REAL_STARS[i];
                break;
              }
            }
            state.currentAgeYears = star ? star.ageYears || 0 : 0;
          } else {
            state.currentAgeYears = 0;
          }
          state.finished = false;
          state.playing = false;
          state.supernovaTimer = 0;
          updateDerivedValues();
          updatePlayBtnText();
        }

        const TRANSITION_DURATION = 0.6; /* seconds for visual mode crossfade */

        function updateDerivedValues() {
          if (!state.track || state.track.length === 0) return;
          const interp = interpolateAtAge(state.track, state.currentAgeYears);
          const oldStageIndex = state.currentStageIndex;
          state.currentStageIndex = interp.stageIndex;
          state.stageProgress = interp.stageProgress;
          state.radiusRsun = interp.radiusRsun;
          state.tempK = interp.tempK;
          state.luminosityLsun = interp.luminosityLsun;
          checkZoomTransition(interp.radiusRsun);

          const newVM = state.track[interp.stageIndex].visualMode;
          const oldVM =
            oldStageIndex < state.track.length
              ? state.track[oldStageIndex].visualMode
              : "";

          /* Detect visual mode change and start crossfade */
          if (oldVM && newVM !== oldVM && state.playing) {
            state.prevVisualMode = oldVM;
            state.prevDisplayRadius = state.displayRadiusPx;
            state.prevStarColor = state.starColor.slice();
            state.prevStageId =
              oldStageIndex < state.track.length
                ? state.track[oldStageIndex].id
                : "";
            state.visualTransition = TRANSITION_DURATION;
          }

          state.displayRadiusPx = physicalToDisplayRadius(interp.radiusRsun);
          state.starColor = tempToColor(interp.tempK);
        }

        function jumpToNextPhase() {
          if (!state.track) return;
          const idx = state.currentStageIndex;
          if (idx < state.track.length - 1) {
            state.currentAgeYears = state.track[idx + 1].ageStartYears;
            updateDerivedValues();
          } else {
            /* Already at last stage - go to end */
            state.currentAgeYears =
              state.track[state.track.length - 1].ageEndYears;
            state.finished = true;
            state.playing = false;
            updateDerivedValues();
            updatePlayBtnText();
          }
        }

        /* ============================================================
         *  DISPLAY SCALE
         * ============================================================ */

        function physicalToDisplayRadius(radiusRsun) {
          const h = state.H - TIMELINE_HEIGHT;
          const maxPx = h * 0.42;
          const minPx = 24;
          if (radiusRsun <= 0) return minPx;

          /* Non-linear mapping via log */
          const logR = Math.log10(radiusRsun + 0.001);
          const logMin = Math.log10(1e-6);
          const logMax = Math.log10(1500);
          let t = (logR - logMin) / (logMax - logMin);
          t = clamp(t, 0, 1);
          const px = minPx + (maxPx - minPx) * Math.pow(t, 0.7);
          return clamp(px, minPx, maxPx);
        }

        /* ============================================================
         *  CANVAS SETUP
         * ============================================================ */
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          state.W = rect.width;
          state.H = rect.height;
          canvas.width = state.W * dpr;
          canvas.height = state.H * dpr;
          canvas.style.width = state.W + "px";
          canvas.style.height = state.H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          if (state.bgStars.length === 0) initBgStars(200);
        }

        function initBgStars(count) {
          state.bgStars = [];
          for (let i = 0; i < count; i++) {
            state.bgStars.push({
              x: Math.random(),
              y: Math.random(),
              size: 0.5 + Math.random() * 1.5,
              alpha: 0.3 + Math.random() * 0.7,
              twinkleSpeed: 0.5 + Math.random() * 2,
            });
          }
        }

        /* ============================================================
         *  DRAWING FUNCTIONS
         * ============================================================ */

        function drawStarfield() {
          const W = state.W;
          const H = state.H;
          const time = state.animTime;
          for (let i = 0; i < state.bgStars.length; i++) {
            const s = state.bgStars[i];
            const twinkle =
              0.4 + 0.6 * Math.abs(Math.sin(time * s.twinkleSpeed + i));
            ctx.globalAlpha = s.alpha * twinkle;
            ctx.fillStyle = "#fff";
            ctx.fillRect(s.x * W, s.y * H, s.size, s.size);
          }
          ctx.globalAlpha = 1;
        }

        /* --- Star visual modes --- */

        function drawContractingCloud(cx, cy, radius, color, progress) {
          const cloudR = radius * (3 - 2 * progress);
          for (let i = 3; i >= 0; i--) {
            const r = cloudR * (1 + i * 0.3);
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(0, rgbaStr(color, 0.3 / (i + 1)));
            grad.addColorStop(1, rgbaStr(color, 0));
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
          }
          /* Inner bright core forming */
          const coreR = radius * 0.3 * progress;
          if (coreR > 2) {
            const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
            coreGrad.addColorStop(0, rgbaStr(color, 0.9));
            coreGrad.addColorStop(0.7, rgbaStr(color, 0.3));
            coreGrad.addColorStop(1, rgbaStr(color, 0));
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function drawGlowingSphere(cx, cy, radius, color) {
          /* Outer glow */
          const glowR = radius * 1.6;
          const glow = ctx.createRadialGradient(
            cx,
            cy,
            radius * 0.5,
            cx,
            cy,
            glowR,
          );
          glow.addColorStop(0, rgbaStr(color, 0.15));
          glow.addColorStop(1, rgbaStr(color, 0));
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
          ctx.fill();

          /* Main body with limb darkening */
          const bodyGrad = ctx.createRadialGradient(
            cx - radius * 0.15,
            cy - radius * 0.15,
            0,
            cx,
            cy,
            radius,
          );
          bodyGrad.addColorStop(
            0,
            rgbStr([
              Math.min(255, color[0] + 40),
              Math.min(255, color[1] + 40),
              Math.min(255, color[2] + 40),
            ]),
          );
          bodyGrad.addColorStop(0.7, rgbStr(color));
          bodyGrad.addColorStop(
            1,
            rgbStr([
              Math.round(color[0] * 0.4),
              Math.round(color[1] * 0.4),
              Math.round(color[2] * 0.4),
            ]),
          );
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawGiantWithOrbits(cx, cy, radius, color, massMsun) {
          drawGlowingSphere(cx, cy, radius, color);
          drawOrbitOverlays(cx, cy);
        }

        function drawOrbitOverlays(cx, cy) {
          const starR = state.radiusRsun;
          const orbitData = [
            { au: ORBIT_RADII_AU.mercury, lbl: T("orbitMercury") },
            { au: ORBIT_RADII_AU.earth, lbl: T("orbitEarth") },
            { au: ORBIT_RADII_AU.jupiter, lbl: T("orbitJupiter") },
          ];
          for (let i = 0; i < orbitData.length; i++) {
            const orbitRsun = orbitData[i].au * AU_TO_RSUN;
            /* Show orbit as comparison whenever star is at least 10% of orbit */
            if (starR < orbitRsun * 0.1) continue;
            const dispR = physicalToDisplayRadius(orbitRsun);
            if (dispR < 10 || dispR > state.W * 0.8) continue;

            /* Determine orbit status */
            const ratio = starR / orbitRsun;
            let ringColor, ringAlpha, statusText;
            if (ratio >= 1.0) {
              ringColor = "255,80,60";
              ringAlpha = 0.5;
              statusText = T("orbitEngulfed");
            } else if (ratio >= 0.8) {
              ringColor = "255,180,60";
              ringAlpha = 0.45;
              statusText = T("orbitNear");
            } else {
              ringColor = "255,255,255";
              ringAlpha = 0.2;
              statusText = "";
            }

            ctx.setLineDash([4, 6]);
            ctx.strokeStyle = "rgba(" + ringColor + "," + ringAlpha + ")";
            ctx.lineWidth = ratio >= 1.0 ? 2 : 1;
            ctx.beginPath();
            ctx.arc(cx, cy, dispR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            /* Label with optional status */
            ctx.font = '15px "Share Tech Mono", monospace';
            ctx.textAlign = "center";
            const label = statusText
              ? orbitData[i].lbl + " \u2014 " + statusText
              : orbitData[i].lbl;
            ctx.fillStyle = "rgba(" + ringColor + "," + (ringAlpha + 0.1) + ")";
            ctx.fillText(label, cx, cy - dispR - 6);
          }
          ctx.textAlign = "start";
        }

        function drawNebulaShell(cx, cy, coreRadius, progress) {
          /* Expanding shell */
          const shellR = coreRadius + state.displayRadiusPx * 2 * progress;
          const shellAlpha = 0.6 * (1 - progress * 0.7);
          const colors = [
            [68, 221, 255],
            [100, 255, 180],
            [200, 150, 255],
          ];
          for (let i = 0; i < colors.length; i++) {
            const r = shellR * (0.7 + i * 0.15);
            ctx.strokeStyle = rgbaStr(colors[i], shellAlpha * (1 - i * 0.2));
            ctx.lineWidth = 3 - i;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
          }

          /* Central white dwarf core */
          const cr = Math.max(4, coreRadius * 0.2);
          const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
          coreGrad.addColorStop(0, "rgba(200,220,255,1)");
          coreGrad.addColorStop(0.6, "rgba(170,200,255,0.6)");
          coreGrad.addColorStop(1, "rgba(150,180,255,0)");
          ctx.fillStyle = coreGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, cr, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawCompactRemnant(cx, cy, radius, stageId) {
          const isNS = stageId === "neutron_star";
          const color = isNS ? [220, 220, 255] : [180, 200, 255];
          const r = Math.max(isNS ? 8 : 14, radius);

          /* Glow */
          const glowR = r * 3;
          const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
          glow.addColorStop(0, rgbaStr(color, 0.4));
          glow.addColorStop(0.5, rgbaStr(color, 0.1));
          glow.addColorStop(1, rgbaStr(color, 0));
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
          ctx.fill();

          /* Core */
          const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          coreGrad.addColorStop(0, "#fff");
          coreGrad.addColorStop(0.5, rgbStr(color));
          coreGrad.addColorStop(1, rgbaStr(color, 0.3));
          ctx.fillStyle = coreGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();

          /* Neutron star: rotating beam */
          if (isNS) {
            const angle = state.animTime * 6;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.strokeStyle = rgbaStr([200, 200, 255], 0.4);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(r * 5, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-r * 5, 0);
            ctx.stroke();
            ctx.restore();
          }

          /* Size + magnification label (top-right corner) */
          ctx.font = '15px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.textAlign = "right";
          const sizeDesc = isNS ? T("realSizeNS") : T("realSizeWD");
          const sunPx = physicalToDisplayRadius(1);
          const truePx = state.radiusRsun * sunPx;
          const magFactor = truePx > 0.01 ? Math.round(r / truePx) : 0;
          ctx.fillText(sizeDesc, state.W - 12, 20);
          if (magFactor > 1) {
            ctx.fillText(
              T("magnified") + " ~" + magFactor.toLocaleString() + "x",
              state.W - 12,
              38,
            );
          }
          ctx.textAlign = "start";
        }

        function drawBlackHoleVis(cx, cy, radius) {
          const r = Math.max(20, radius);

          /* Accretion ring (tilted ellipse) */
          const ringR = r * 2.2;
          ctx.save();
          ctx.translate(cx, cy);

          /* Lensing glow arc */
          const lensGrad = ctx.createRadialGradient(
            0,
            0,
            r * 0.8,
            0,
            0,
            ringR * 1.3,
          );
          lensGrad.addColorStop(0, "rgba(255,170,50,0)");
          lensGrad.addColorStop(0.5, "rgba(255,170,50,0.15)");
          lensGrad.addColorStop(0.8, "rgba(255,120,30,0.2)");
          lensGrad.addColorStop(1, "rgba(255,80,20,0)");
          ctx.fillStyle = lensGrad;
          ctx.beginPath();
          ctx.arc(0, 0, ringR * 1.3, 0, Math.PI * 2);
          ctx.fill();

          /* Ring - back half */
          ctx.strokeStyle = "rgba(255,160,60,0.5)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 0, ringR, ringR * 0.3, 0, Math.PI, Math.PI * 2);
          ctx.stroke();

          /* Dark center */
          const darkGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
          darkGrad.addColorStop(0, "#000");
          darkGrad.addColorStop(0.7, "#050508");
          darkGrad.addColorStop(1, "rgba(20,15,30,0.8)");
          ctx.fillStyle = darkGrad;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();

          /* Ring - front half */
          ctx.strokeStyle = "rgba(255,180,80,0.7)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(0, 0, ringR, ringR * 0.3, 0, 0, Math.PI);
          ctx.stroke();

          ctx.restore();

          /* Label with magnification (top-right corner) */
          ctx.font = '15px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.textAlign = "right";
          const bhSunPx = physicalToDisplayRadius(1);
          const bhTruePx = state.radiusRsun * bhSunPx;
          const bhMag = bhTruePx > 0.01 ? Math.round(r / bhTruePx) : 0;
          ctx.fillText(T("realSizeBH"), state.W - 12, 20);
          if (bhMag > 1) {
            ctx.fillText(
              T("magnified") + " ~" + bhMag.toLocaleString() + "x",
              state.W - 12,
              38,
            );
          }
          ctx.textAlign = "start";
        }

        function drawSupernovaFlash(cx, cy, timer) {
          /* timer in seconds since supernova stage started */
          const params =
            SPEED_PARAMS[state.playbackSpeed] || SPEED_PARAMS.story;
          const holdTime = params.snovaHold;
          const t = clamp(timer / holdTime, 0, 1);

          if (t < 0.3) {
            /* Phase 1: Bright expanding white flash */
            const flashP = t / 0.3;
            const flashR = 30 + flashP * state.H * 0.4;
            const flashAlpha = 1 - flashP * 0.3;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
            grad.addColorStop(0, rgbaStr([255, 255, 255], flashAlpha));
            grad.addColorStop(0.4, rgbaStr([255, 240, 200], flashAlpha * 0.6));
            grad.addColorStop(1, rgbaStr([255, 200, 100], 0));
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, flashR, 0, Math.PI * 2);
            ctx.fill();
          } else if (t < 0.7) {
            /* Phase 2: Expanding colored shell */
            const shellP = (t - 0.3) / 0.4;
            const shellR = state.H * 0.2 + shellP * state.H * 0.3;
            const shellAlpha = 0.7 - shellP * 0.4;
            ctx.strokeStyle = rgbaStr([255, 100, 50], shellAlpha);
            ctx.lineWidth = 6 - shellP * 3;
            ctx.beginPath();
            ctx.arc(cx, cy, shellR, 0, Math.PI * 2);
            ctx.stroke();

            /* Inner glow fading */
            const innerR = state.H * 0.1 * (1 - shellP * 0.5);
            const innerGrad = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              innerR,
            );
            innerGrad.addColorStop(
              0,
              rgbaStr([255, 220, 180], 0.5 * (1 - shellP)),
            );
            innerGrad.addColorStop(1, rgbaStr([255, 150, 80], 0));
            ctx.fillStyle = innerGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
            ctx.fill();
          } else {
            /* Phase 3: Shell fading, remnant appearing */
            const fadeP = (t - 0.7) / 0.3;
            const fadingR = state.H * 0.4 + fadeP * state.H * 0.1;
            ctx.strokeStyle = rgbaStr([255, 100, 50], 0.3 * (1 - fadeP));
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, fadingR, 0, Math.PI * 2);
            ctx.stroke();

            /* Show the emerging remnant */
            const remnantAlpha = fadeP;
            ctx.globalAlpha = remnantAlpha;
            const lastStage = state.track[state.track.length - 1];
            if (lastStage && lastStage.id === "black_hole") {
              drawBlackHoleVis(cx, cy, 20);
            } else if (lastStage && lastStage.id === "neutron_star") {
              drawCompactRemnant(cx, cy, 8, "neutron_star");
            }
            ctx.globalAlpha = 1;
          }
        }

        /* --- Timeline --- */

        function computeTimelineSegments(track, totalWidth) {
          if (!track || track.length === 0) return [];
          const segments = [];
          const logWeights = [];
          let totalWeight = 0;
          for (let i = 0; i < track.length; i++) {
            const dur = track[i].ageEndYears - track[i].ageStartYears;
            const w = dur > 0 ? Math.max(0.3, Math.log10(dur + 1)) : 0.3;
            logWeights.push(w);
            totalWeight += w;
          }
          /* Minimum pixel allocation */
          const minTotal = MIN_SEGMENT_PX * track.length;
          const available = Math.max(0, totalWidth - minTotal);
          for (let j = 0; j < track.length; j++) {
            segments.push({
              id: track[j].id,
              ageStart: track[j].ageStartYears,
              ageEnd: track[j].ageEndYears,
              width:
                MIN_SEGMENT_PX +
                (totalWeight > 0
                  ? (logWeights[j] / totalWeight) * available
                  : 0),
            });
          }
          return segments;
        }

        function ageToTimelineX(age, segments, marginLeft) {
          if (!segments || segments.length === 0) return marginLeft;
          let x = marginLeft;
          for (let i = 0; i < segments.length; i++) {
            const s = segments[i];
            if (age <= s.ageEnd) {
              const dur = s.ageEnd - s.ageStart;
              const t = dur > 0 ? clamp((age - s.ageStart) / dur, 0, 1) : 0;
              return x + t * s.width;
            }
            x += s.width;
          }
          return x;
        }

        function drawTimeline() {
          const W = state.W;
          const H = state.H;
          const track = state.track;
          if (!track || track.length === 0) return;

          const tlY = H - TIMELINE_HEIGHT;
          const tlW = W - TIMELINE_MARGIN * 2;

          /* Background panel */
          ctx.fillStyle = "rgba(11, 15, 24, 0.88)";
          ctx.beginPath();
          roundRect(ctx, TIMELINE_MARGIN - 4, tlY, tlW + 8, TIMELINE_HEIGHT, 8);
          ctx.fill();

          const segments = computeTimelineSegments(track, tlW);
          const segY = tlY + 12;
          const segH = 50;
          let x = TIMELINE_MARGIN;

          for (let i = 0; i < segments.length; i++) {
            const seg = segments[i];
            const stageData = STAGES[seg.id];
            /* Colored segment — use temperature-derived color for photospheric stages */
            let segColor;
            if (!NON_PHOTOSPHERE_STAGES.has(seg.id) && track[i]) {
              const midT = Math.sqrt(track[i].tempKStart * track[i].tempKEnd);
              segColor = rgbStr(tempToColor(midT));
            } else {
              segColor = stageData ? stageData.color : "#888";
            }
            ctx.fillStyle = segColor;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(x, segY, seg.width, segH);
            ctx.globalAlpha = 1;

            /* Active stage highlight */
            if (i === state.currentStageIndex && !state.finished) {
              ctx.strokeStyle = "#fff";
              ctx.lineWidth = 3;
              ctx.strokeRect(x + 1.5, segY + 1.5, seg.width - 3, segH - 3);
            }

            /* Stage label (inside segment, two-line if multi-word) */
            if (seg.width > 18) {
              ctx.font = '12px "Share Tech Mono", monospace';
              ctx.fillStyle = "#fff";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              let label = T(seg.id);
              if (seg.width < 70) {
                label = label.substring(0, Math.floor(seg.width / 7));
              }
              const cx = x + seg.width / 2;
              const cy = segY + segH / 2;
              const words = label.split(" ");
              if (words.length >= 2 && seg.width >= 40) {
                ctx.fillText(words[0], cx, cy - 7);
                ctx.fillText(words.slice(1).join(" "), cx, cy + 7);
              } else {
                ctx.fillText(label, cx, cy);
              }
              ctx.textBaseline = "alphabetic";
            }

            /* Vertical separator between phases */
            if (i < segments.length - 1) {
              ctx.strokeStyle = "rgba(255,255,255,0.25)";
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(x + seg.width, segY);
              ctx.lineTo(x + seg.width, segY + segH);
              ctx.stroke();
            }

            /* Age label at end boundary (two lines: number + unit) */
            if (i < segments.length - 1 && seg.width > 30) {
              ctx.font = '11px "Share Tech Mono", monospace';
              ctx.fillStyle = "rgba(255,255,255,0.35)";
              ctx.textAlign = "center";
              const ageParts = formatAgeSplit(seg.ageEnd);
              ctx.fillText(ageParts.num, x + seg.width, segY + segH + 12);
              ctx.fillText(ageParts.unit, x + seg.width, segY + segH + 24);
            }

            x += seg.width;
          }

          /* Hover highlight */
          if (hoverCardVisible && hoverSegIndex >= 0) {
            let hx = TIMELINE_MARGIN;
            for (let hi = 0; hi < hoverSegIndex; hi++) {
              hx += segments[hi].width;
            }
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            if (
              hoverCardTransKey !== null &&
              hoverSegIndex < segments.length - 1
            ) {
              /* Transition: narrow strip around the boundary */
              const bx = hx + segments[hoverSegIndex].width;
              const tz = TRANSITION_ZONE_PX;
              ctx.fillRect(bx - tz, segY, tz * 2, segH);
            } else if (hoverCardPhaseId !== null) {
              /* Single phase */
              ctx.fillRect(hx, segY, segments[hoverSegIndex].width, segH);
            }
          }

          /* Final age label (two lines: number + unit) */
          ctx.font = '12px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.textAlign = "right";
          const finalParts = formatAgeSplit(
            track[track.length - 1].ageEndYears,
          );
          ctx.fillText(finalParts.num, TIMELINE_MARGIN + tlW, segY + segH + 12);
          ctx.fillText(
            finalParts.unit,
            TIMELINE_MARGIN + tlW,
            segY + segH + 24,
          );

          /* Playhead */
          const playX = ageToTimelineX(
            state.currentAgeYears,
            segments,
            TIMELINE_MARGIN,
          );
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.moveTo(playX, segY - 2);
          ctx.lineTo(playX - 5, segY - 10);
          ctx.lineTo(playX + 5, segY - 10);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.6)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(playX, segY);
          ctx.lineTo(playX, segY + segH);
          ctx.stroke();

          /* "Now" marker in real star mode (above bar, pointing down) */
          if (state.mode === "real" && state.nowAgeYears > 0) {
            const nowX = ageToTimelineX(
              state.nowAgeYears,
              segments,
              TIMELINE_MARGIN,
            );
            ctx.fillStyle = var_accent;
            ctx.beginPath();
            ctx.moveTo(nowX, segY - 2);
            ctx.lineTo(nowX - 5, segY - 11);
            ctx.lineTo(nowX + 5, segY - 11);
            ctx.closePath();
            ctx.fill();
            ctx.font = '13px "Share Tech Mono", monospace';
            ctx.fillStyle = var_accent;
            ctx.textAlign = "center";
            ctx.fillText(T("now"), nowX, segY - 14);
          }

          /* Compressed timeline label */
          ctx.font = '11px "Share Tech Mono", monospace';
          ctx.fillStyle = "rgba(255,255,255,0.2)";
          ctx.textAlign = "left";
          ctx.fillText(T("timelineCompressed"), TIMELINE_MARGIN, H - 5);
          ctx.textAlign = "start";
        }

        const var_accent = "#58a6ff";

        function roundRect(context, x, y, w, h, r) {
          context.moveTo(x + r, y);
          context.lineTo(x + w - r, y);
          context.quadraticCurveTo(x + w, y, x + w, y + r);
          context.lineTo(x + w, y + h - r);
          context.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          context.lineTo(x + r, y + h);
          context.quadraticCurveTo(x, y + h, x, y + h - r);
          context.lineTo(x, y + r);
          context.quadraticCurveTo(x, y, x + r, y);
        }

        /* --- Phase label near star --- */
        /* --- Scale ruler landmarks (in Rsun) --- */
        const SCALE_LANDMARKS = [
          { key: "scaleCity", rSun: 2.87e-5 },
          { key: "scaleEarth", rSun: 0.00916 },
          { key: "scaleJupiter", rSun: 0.1005 },
          { key: "scaleSun", rSun: 1 },
          { key: "scaleMercuryOrbit", rSun: 0.39 * AU_TO_RSUN },
          { key: "scaleEarthOrbit", rSun: 1.0 * AU_TO_RSUN },
          { key: "scaleJupiterOrbit", rSun: 5.2 * AU_TO_RSUN },
        ];
        const RULER_LOG_MIN = -5;
        const RULER_LOG_MAX = 3.1;

        function drawScaleRuler(radiusRsun) {
          const starAreaH = state.H - TIMELINE_HEIGHT;
          if (starAreaH < 200) return;
          const rulerX = 18;
          const rulerTop = 30;
          const rulerBot = starAreaH - 20;
          const rulerH = rulerBot - rulerTop;

          /* Ruler line */
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(rulerX, rulerTop);
          ctx.lineTo(rulerX, rulerBot);
          ctx.stroke();

          /* Landmarks */
          ctx.font = '12px "Share Tech Mono", monospace';
          ctx.textAlign = "left";
          for (let i = 0; i < SCALE_LANDMARKS.length; i++) {
            const lm = SCALE_LANDMARKS[i];
            const logR = Math.log10(lm.rSun);
            const t = (logR - RULER_LOG_MIN) / (RULER_LOG_MAX - RULER_LOG_MIN);
            if (t < 0 || t > 1) continue;
            const y = rulerBot - t * rulerH;

            /* Tick */
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.beginPath();
            ctx.moveTo(rulerX - 4, y);
            ctx.lineTo(rulerX + 4, y);
            ctx.stroke();

            /* Label */
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fillText(T(lm.key), rulerX + 8, y + 3);
          }

          /* Current star marker */
          if (radiusRsun > 0) {
            const logStar = Math.log10(radiusRsun);
            const tStar =
              (logStar - RULER_LOG_MIN) / (RULER_LOG_MAX - RULER_LOG_MIN);
            const yStar = rulerBot - clamp(tStar, 0, 1) * rulerH;

            /* Marker triangle */
            ctx.fillStyle = "rgba(255,200,60,0.8)";
            ctx.beginPath();
            ctx.moveTo(rulerX - 7, yStar - 5);
            ctx.lineTo(rulerX, yStar);
            ctx.lineTo(rulerX - 7, yStar + 5);
            ctx.closePath();
            ctx.fill();

            /* Highlight line */
            ctx.strokeStyle = "rgba(255,200,60,0.25)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(rulerX, yStar);
            ctx.lineTo(rulerX + 80, yStar);
            ctx.stroke();
          }
          ctx.textAlign = "start";
        }

        /* --- Child-friendly radius comparison --- */
        const EARTH_RSUN = 0.00916;
        const JUPITER_RSUN = 0.1005;

        function describeRadiusForKids(radiusRsun) {
          if (radiusRsun <= 0) return "";
          if (radiusRsun < EARTH_RSUN * 0.5) return T("compCity");
          if (radiusRsun < JUPITER_RSUN * 0.8) {
            const n = Math.round((radiusRsun * 2) / EARTH_RSUN);
            return T("compEarths").replace("{n}", n);
          }
          if (radiusRsun < 0.8) {
            const n = Math.round(((radiusRsun * 2) / JUPITER_RSUN) * 10) / 10;
            return T("compJupiters").replace("{n}", n);
          }
          const orbitMercury = 0.39 * AU_TO_RSUN;
          const orbitEarth = 1.0 * AU_TO_RSUN;
          const orbitJupiter = 5.2 * AU_TO_RSUN;
          if (radiusRsun >= orbitJupiter) return T("compJupiterOrbit");
          if (radiusRsun >= orbitEarth) return T("compEarthOrbit");
          if (radiusRsun >= orbitMercury) return T("compMercury");
          const n = Math.round(radiusRsun * 2 * 10) / 10;
          return T("compSuns").replace("{n}", n);
        }

        /* --- Zoom badge state --- */
        let zoomBadgeTimer = 0;
        let zoomBadgeText = "";
        let prevScaleRegime = "";

        function getScaleRegime(radiusRsun) {
          if (radiusRsun < EARTH_RSUN * 0.5) return "compact";
          if (radiusRsun < 10) return "stellar";
          return "solar_system";
        }

        function checkZoomTransition(radiusRsun) {
          const regime = getScaleRegime(radiusRsun);
          if (prevScaleRegime && regime !== prevScaleRegime) {
            const oldR = state.prevRadiusForZoom || 1;
            const ratio = oldR > 0 ? radiusRsun / oldR : 1;
            const absRatio = ratio > 1 ? ratio : 1 / ratio;
            if (absRatio > 10) {
              const factor = Math.round(absRatio);
              const dir = ratio < 1 ? T("zoomingIn") : T("zoomingOut");
              zoomBadgeText = dir + " ~" + factor.toLocaleString() + "x";
              zoomBadgeTimer = 3;
            }
          }
          prevScaleRegime = regime;
          state.prevRadiusForZoom = radiusRsun;
        }

        function drawZoomBadge(dt) {
          if (zoomBadgeTimer <= 0) return;
          zoomBadgeTimer -= dt;
          const alpha = clamp(zoomBadgeTimer / 0.5, 0, 1);
          ctx.save();
          ctx.font = '16px "Share Tech Mono", monospace';
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(255,200,60," + 0.7 * alpha + ")";
          const starAreaH = state.H - TIMELINE_HEIGHT;
          ctx.fillText(zoomBadgeText, state.W * 0.5, starAreaH - 20);
          ctx.restore();
          ctx.textAlign = "start";
        }

        function blendColor(a, b, t) {
          return [
            Math.round(lerp(a[0], b[0], t)),
            Math.round(lerp(a[1], b[1], t)),
            Math.round(lerp(a[2], b[2], t)),
          ];
        }

        function drawVisualMode(vm, cx, cy, r, color, stageId) {
          switch (vm) {
            case "contracting_cloud":
              drawContractingCloud(cx, cy, r, color, state.stageProgress);
              break;
            case "giant_with_orbits":
              drawGiantWithOrbits(cx, cy, r, color, state.massMsun);
              break;
            case "nebula_shell":
              drawNebulaShell(cx, cy, r, state.stageProgress);
              break;
            case "compact_remnant":
              drawCompactRemnant(cx, cy, r, stageId);
              break;
            case "black_hole_vis":
              drawBlackHoleVis(cx, cy, r);
              break;
            case "supernova_flash":
              drawSupernovaFlash(cx, cy, state.supernovaTimer);
              break;
            default:
              drawGlowingSphere(cx, cy, r, color);
              break;
          }
        }

        /* --- Main draw composition --- */
        function drawScene() {
          const W = state.W;
          const H = state.H;
          if (W === 0 || H === 0) return;

          /* Clear */
          ctx.fillStyle = "#080c14";
          ctx.fillRect(0, 0, W, H);

          drawStarfield();

          if (!state.track || state.track.length === 0) {
            drawTimeline();
            return;
          }

          const starAreaH = H - TIMELINE_HEIGHT;
          const cx = W * 0.5;
          const cy = starAreaH * 0.5;
          const r = state.displayRadiusPx;
          const color = state.starColor;
          const stage = state.track[state.currentStageIndex];
          const vm = stage.visualMode;
          const inTransition = state.visualTransition > 0;
          const transAlpha = inTransition
            ? clamp(state.visualTransition / TRANSITION_DURATION, 0, 1)
            : 0;

          /* Draw previous visual mode fading out during transition */
          if (inTransition && state.prevVisualMode) {
            ctx.globalAlpha = transAlpha * 0.8;
            drawVisualMode(
              state.prevVisualMode,
              cx,
              cy,
              lerp(r, state.prevDisplayRadius, transAlpha),
              blendColor(color, state.prevStarColor, transAlpha),
              state.prevStageId,
            );
            ctx.globalAlpha = 1;
          }

          /* Draw current visual mode (full opacity, or fading in during transition) */
          if (inTransition) {
            ctx.globalAlpha = 1 - transAlpha * 0.6;
          }
          drawVisualMode(vm, cx, cy, r, color, stage.id);
          ctx.globalAlpha = 1;

          drawScaleRuler(state.radiusRsun);
          drawZoomBadge(state.dt || 0);
          drawTimeline();
        }

        /* ============================================================
         *  UI EVENT WIRING
         * ============================================================ */

        const massSlider = document.getElementById("massSlider");
        const massValEl = document.getElementById("massVal");
        const massFill = document.getElementById("massFill");
        const massTrack = document.getElementById("massTrack");

        function updateMassDisplay() {
          massSlider.value = Math.round(state.massSliderVal);
          massValEl.textContent = formatMass(state.massMsun);
          massFill.style.width = (state.massSliderVal / 1000) * 100 + "%";
          const msTemp = 5778 * Math.pow(state.massMsun, 0.57);
          massFill.style.backgroundColor = rgbaStr(tempToColor(msTemp), 0.6);
        }

        function applyMassSlider(val) {
          state.massSliderVal = clamp(val, 0, 1000);
          state.massMsun = sliderToMass(state.massSliderVal);
          buildTrack();
          resetPlayback();
          updateMassDisplay();
          updateReadouts();
        }

        /* Speed-bar drag interaction for mass */
        (function () {
          let dragging = false;
          function sliderFromX(clientX) {
            const rect = massTrack.getBoundingClientRect();
            return Math.round(
              clamp((clientX - rect.left) / rect.width, 0, 1) * 1000,
            );
          }
          function onDown(e) {
            e.preventDefault();
            dragging = true;
            const t = e.touches ? e.touches[0] : e;
            applyMassSlider(sliderFromX(t.clientX));
          }
          function onMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            applyMassSlider(sliderFromX(t.clientX));
          }
          function onUp() {
            dragging = false;
          }
          massTrack.addEventListener("mousedown", onDown);
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
          massTrack.addEventListener("touchstart", onDown, { passive: false });
          document.addEventListener(
            "touchmove",
            function (e) {
              if (dragging) onMove(e);
            },
            { passive: false },
          );
          document.addEventListener("touchend", onUp);
        })();

        /* Hold-to-repeat for ± buttons */
        (function () {
          const STEP = 20;
          let holdTimer = null;
          let holdInterval = null;
          function startHold(delta) {
            applyMassSlider(state.massSliderVal + delta * STEP);
            holdTimer = setTimeout(function () {
              holdInterval = setInterval(function () {
                applyMassSlider(state.massSliderVal + delta * STEP);
              }, 30);
            }, 300);
          }
          function stopHold() {
            clearTimeout(holdTimer);
            clearInterval(holdInterval);
          }
          const minusBtn = document.getElementById("massDown");
          const plusBtn = document.getElementById("massUp");
          minusBtn.addEventListener("mousedown", function () {
            startHold(-1);
          });
          minusBtn.addEventListener("mouseup", stopHold);
          minusBtn.addEventListener("mouseleave", stopHold);
          plusBtn.addEventListener("mousedown", function () {
            startHold(1);
          });
          plusBtn.addEventListener("mouseup", stopHold);
          plusBtn.addEventListener("mouseleave", stopHold);
          minusBtn.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              startHold(-1);
            },
            { passive: false },
          );
          minusBtn.addEventListener("touchend", function (e) {
            e.preventDefault();
            stopHold();
          });
          plusBtn.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              startHold(1);
            },
            { passive: false },
          );
          plusBtn.addEventListener("touchend", function (e) {
            e.preventDefault();
            stopHold();
          });
        })();

        const massPresetSelect = document.getElementById("massPresetSelect");
        massPresetSelect.addEventListener("change", function () {
          const mass = parseFloat(this.value);
          if (!isNaN(mass)) {
            state.massMsun = mass;
            state.massSliderVal = massToSlider(mass);
            buildTrack();
            resetPlayback();
            updateMassDisplay();
            updateReadouts();
          }
        });

        /* Mode toggle */
        const modeCustomBtn = document.getElementById("modeCustomBtn");
        const modeRealBtn = document.getElementById("modeRealBtn");
        const grpCustom = document.getElementById("grpCustom");
        const grpReal = document.getElementById("grpReal");

        modeCustomBtn.addEventListener("click", function () {
          state.mode = "custom";
          modeCustomBtn.classList.add("active");
          modeRealBtn.classList.remove("active");
          grpCustom.classList.remove("hidden");
          grpReal.classList.add("hidden");
          state.nowAgeYears = 0;
          setMass(state.massMsun);
          updateReadouts();
        });

        modeRealBtn.addEventListener("click", function () {
          state.mode = "real";
          modeRealBtn.classList.add("active");
          modeCustomBtn.classList.remove("active");
          grpReal.classList.remove("hidden");
          grpCustom.classList.add("hidden");
          loadRealStar(state.realStarId);
          updateRealStarBlurb();
          updateReadouts();
        });

        /* Real star select */
        const realStarSelect = document.getElementById("realStarSelect");
        realStarSelect.addEventListener("change", function () {
          loadRealStar(this.value);
          updateRealStarBlurb();
          updateReadouts();
        });

        function updateRealStarBlurb() {
          const blurbEl = document.getElementById("realStarBlurb");
          const blurbKeys = {
            sun: "sunBlurb",
            proxima: "proximaBlurb",
            betelgeuse: "betelgeuseBlurb",
            eta_carinae: "etaCarBlurb",
            barnard: "barnardBlurb",
            trappist: "trappistBlurb",
            sirius: "siriusBlurb",
            vega: "vegaBlurb",
            fomalhaut: "fomalhautBlurb",
            arcturus: "arcturusBlurb",
            rigel: "rigelBlurb",
            antares: "antaresBlurb",
            p_cygni: "pCygniBlurb",
            gamma_velorum: "gammaVelBlurb",
          };
          blurbEl.textContent = T(blurbKeys[state.realStarId] || "sunBlurb");
        }

        /* Start from now / birth */
        const startNowBtn = document.getElementById("startNowBtn");
        const startBirthBtn = document.getElementById("startBirthBtn");

        startNowBtn.addEventListener("click", function () {

        /* Advanced toggle */
        const advancedToggle = document.getElementById("advancedToggle");
        const grpAdvanced = document.getElementById("grpAdvanced");

        advancedToggle.addEventListener("click", function () {
          state.advancedOpen = !state.advancedOpen;
          grpAdvanced.classList.toggle("hidden");
          advancedToggle.textContent = "\u2699";
        });

        /* Metallicity toggle */
        function setActiveBtn(groupIds, activeId) {
          groupIds.forEach(function (id) {
            document
              .getElementById(id)
              .classList.toggle("active", id === activeId);
          });
        }

        const metalIds = ["metalLow", "metalSolar", "metalHigh"];
        const metalModes = {
          metalLow: "low",
          metalSolar: "solar",
          metalHigh: "high",
        };
        metalIds.forEach(function (id) {
          document.getElementById(id).addEventListener("click", function () {
            state.metallicityMode = metalModes[id];
            setActiveBtn(metalIds, id);
            buildTrack();
            resetPlayback();
            updateReadouts();
          });
        });

        /* Binary toggle */
        const binaryIds = ["binarySingle", "binaryClose"];
        const binaryModes = { binarySingle: "single", binaryClose: "close" };
        binaryIds.forEach(function (id) {
          document.getElementById(id).addEventListener("click", function () {
            state.binaryMode = binaryModes[id];
            setActiveBtn(binaryIds, id);

        /* Playback controls */
        const playBtn = document.getElementById("playBtn");
        const nextPhaseBtn = document.getElementById("nextPhaseBtn");
        const resetBtnEl = document.getElementById("resetBtn");

        function updatePlayBtnText() {
          playBtn.textContent = state.playing ? "\u275A\u275A" : "\u25B6";
        }

        playBtn.addEventListener("click", function () {
          if (state.finished) {
            resetPlayback();
          }
          state.playing = !state.playing;
          updatePlayBtnText();
        });

        nextPhaseBtn.addEventListener("click", function () {
          jumpToNextPhase();
          updateReadouts();
        });

        resetBtnEl.addEventListener("click", function () {
          resetPlayback();
          updateReadouts();
        });

        /* Speed toggle */
        const speedIds = ["speedStory", "speedFast", "speedTurbo"];
        const speedModes = {
          speedStory: "story",
          speedFast: "fast",
          speedTurbo: "turbo",
        };
        speedIds.forEach(function (id) {
          document.getElementById(id).addEventListener("click", function () {
            state.playbackSpeed = speedModes[id];
            setActiveBtn(speedIds, id);
            if (state.track) {
              state.screenTimeBudgets = computeScreenTimeBudgets(
                state.track,
                state.playbackSpeed,
              );
            }
          });
