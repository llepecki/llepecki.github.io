        /* Language toggle */
        const langBtn = document.getElementById("langBtn");
        langBtn.addEventListener("click", function () {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        });

        /* ============================================================
         *  READOUTS & TRANSLATIONS
         * ============================================================ */

        function updateReadouts() {
          if (!state.track || state.track.length === 0) return;
          const stage = state.track[state.currentStageIndex];
          document.getElementById("readPhase").textContent = T(stage.id);
          document.getElementById("readAge").textContent = formatAge(
            state.currentAgeYears,
          );
          document.getElementById("readInitMass").textContent = formatMass(
            state.massMsun,
          );

          document.getElementById("readEnding").textContent = T(
            state.outcomeId,
          );

          document.getElementById("readTemp").textContent = formatTemp(
            state.tempK,
          );
          document.getElementById("readRadius").textContent = formatRadius(
            state.radiusRsun,
          );
          document.getElementById("readLuminosity").textContent =
            formatLuminosity(state.luminosityLsun);

          /* Child-friendly scale comparison */
          document.getElementById("readComparison").textContent =
            describeRadiusForKids(state.radiusRsun);

          /* Distance (real stars only) */
          const distRow = document.getElementById("rowDistance");
          if (state.mode === "real" && state.realStarId) {
            let rStar = null;
            for (let i = 0; i < REAL_STARS.length; i++) {
              if (REAL_STARS[i].id === state.realStarId) {
                rStar = REAL_STARS[i];
                break;
              }
            }
            if (rStar && rStar.distanceLy > 0) {
              distRow.classList.remove("hidden");
              document.getElementById("readDistance").textContent =
                rStar.distanceLy.toLocaleString() + " ly";
            } else {
              distRow.classList.add("hidden");
            }
          } else {
            distRow.classList.add("hidden");
          }

          /* Info text */
          const infoEl = document.getElementById("infoText");
          const mInfo = state.massMsun;
          if (state.finished) {
            infoEl.textContent = T("endedText");
          } else if (
            (mInfo >= 8 && mInfo < 10) ||
            (mInfo >= 20 && mInfo < 40)
          ) {
            infoEl.textContent = T("infoBoundaryNote");
          } else if (
            state.binaryMode === "close" &&
            state.outcomeId === "type_ia_outcome"
          ) {
            infoEl.textContent = T("infoBinaryNote");
          } else if (state.binaryMode === "close" && mInfo >= 10) {
            infoEl.textContent = T("infoBinaryMassiveNote");
          } else {
            infoEl.textContent = T("infoIntro");
          }
        }

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          langBtn.textContent = state.lang === "en" ? "PL" : "EN";
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          modeCustomBtn.textContent = T("modeCustom");
          modeRealBtn.textContent = T("modeReal");
          document.getElementById("lblMass").textContent = T("lblMass");
          document.getElementById("lblRealStar").textContent = T("lblRealStar");
          startNowBtn.textContent = T("startNow");
          startBirthBtn.textContent = T("startBirth");
          advancedToggle.textContent = "\u2699";
          document.getElementById("lblMetallicity").textContent =
            T("lblMetallicity");
          document.getElementById("lblMetallicity").title =
            T("metallicityTooltip");
          document.getElementById("lblBinary").textContent = T("lblBinary");
          document.getElementById("lblPlayback").textContent = T("lblPlayback");
          document.getElementById("lblPreset").textContent = T("lblPreset");

          document.getElementById("metalLow").textContent = T("metalLow");
          document.getElementById("metalSolar").textContent = T("metalSolar");
          document.getElementById("metalHigh").textContent = T("metalHigh");
          document.getElementById("binarySingle").textContent =
            T("binarySingle");
          document.getElementById("binaryClose").textContent = T("binaryClose");
          document.getElementById("speedStory").textContent = T("speedStory");
          document.getElementById("speedFast").textContent = T("speedFast");
          document.getElementById("speedTurbo").textContent = T("speedTurbo");

          /* Mass preset dropdown options */
          const presetOpts = massPresetSelect.options;
          for (let pi = 0; pi < presetOpts.length; pi++) {
            const preset = MASS_PRESETS[pi];
            if (preset) {
              presetOpts[pi].textContent =
                T(preset.key) + " (" + formatMass(preset.mass) + ")";
            }
          }

          document.getElementById("lblPhase").textContent = T("lblPhase");
          document.getElementById("lblAge").textContent = T("lblAge");
          document.getElementById("lblInitMass").textContent = T("lblInitMass");
          document.getElementById("lblEnding").textContent = T("lblEnding");
          document.getElementById("lblTemp").textContent = T("lblTemp");
          document.getElementById("lblRadius").textContent = T("lblRadius");
          document.getElementById("lblLuminosity").textContent =
            T("lblLuminosity");
          document.getElementById("lblDistance").textContent = T("lblDistance");
          document.getElementById("lblComparison").textContent =
            T("lblComparison");

          /* Real star select options */
          const nameKeys = {
            sun: "sunName",
            proxima: "proximaName",
            betelgeuse: "betelgeuseName",
            eta_carinae: "etaCarName",
            barnard: "barnardName",
            trappist: "trappistName",
            sirius: "siriusName",
            vega: "vegaName",
            fomalhaut: "fomalhautName",
            arcturus: "arcturusName",
            rigel: "rigelName",
            antares: "antaresName",
            p_cygni: "pCygniName",
            gamma_velorum: "gammaVelName",
          };
          const opts = realStarSelect.options;
          for (let i = 0; i < opts.length; i++) {
            const key = nameKeys[opts[i].value];
            if (key) opts[i].textContent = T(key);
          }

          /* Accessibility attributes */
          langBtn.title = T("ariaSwitchLang");
          canvas.setAttribute("aria-label", T("ariaCanvas"));
          document
            .getElementById("massDown")
            .setAttribute("aria-label", T("ariaDecreaseMass"));
          document
            .getElementById("massUp")
            .setAttribute("aria-label", T("ariaIncreaseMass"));
          document
            .getElementById("massPresetSelect")
            .setAttribute("aria-label", T("ariaStarType"));
          document
            .getElementById("realStarSelect")
            .setAttribute("aria-label", T("ariaRealStar"));
          advancedToggle.setAttribute("aria-label", T("ariaAdvanced"));
          document
            .getElementById("playBtn")
            .setAttribute("aria-label", T("ariaPlay"));
          document
            .getElementById("nextPhaseBtn")
            .setAttribute("aria-label", T("ariaNextPhase"));
          document
            .getElementById("resetBtn")
            .setAttribute("aria-label", T("ariaReset"));

          updateRealStarBlurb();
          updateMassDisplay();
          updateReadouts();

          /* Re-render visible phase card in new language */
          if (hoverCardVisible && hoverSegIndex >= 0) {
            if (hoverCardPhaseId !== null) {
              showPhaseCard(hoverSegIndex);
            } else if (hoverCardTransKey !== null) {
              showTransitionCard(hoverSegIndex);
            }
          }
        }

        /* ============================================================
         *  ANIMATION LOOP
         * ============================================================ */

        let lastTime = 0;
        const DT_CAP = 0.05;

        function animate(timestamp) {
          if (!lastTime) lastTime = timestamp;
          const dt = Math.min((timestamp - lastTime) / 1000, DT_CAP);
          lastTime = timestamp;
          state.animTime += dt;
          state.dt = dt;

          if (state.playing && state.track && !state.finished) {
            const ageStep = computeAgeStep(dt);
            state.currentAgeYears += ageStep;

            /* Check if we reached the end */
            const lastStage = state.track[state.track.length - 1];
            if (state.currentAgeYears >= lastStage.ageEndYears) {
              state.currentAgeYears = lastStage.ageEndYears;
              state.finished = true;
              state.playing = false;
              updatePlayBtnText();
            }

            updateDerivedValues();

            /* Supernova timer */
            const sid = state.track[state.currentStageIndex].id;
            if (
              sid === "core_collapse_supernova" ||
              sid === "type_ia_supernova"
            ) {
              state.supernovaTimer += dt;
            } else {
              state.supernovaTimer = 0;
            }

            updateReadouts();
          }

          /* Tick visual transition timer */
          if (state.visualTransition > 0) {
            state.visualTransition = Math.max(0, state.visualTransition - dt);
          }

          drawScene();
          requestAnimationFrame(animate);
        }

        /* ============================================================
         *  PHASE HOVER CARDS
         * ============================================================ */

        const phaseCardOverlay = document.getElementById("phaseCardOverlay");
        let hoverCardVisible = false;
        let hoverCardPhaseId = null;
        let hoverCardTransKey = null;
        let hoverDebounceTimer = null;
        let hoverSegIndex = -1;
        const HOVER_DEBOUNCE_MS = 80;
        const TRANSITION_ZONE_PX = 6;

        function showPhaseCard(segIndex) {
          const seg = state.track[segIndex];
          if (!seg) return;
          const edu = PHASE_EDUCATION[seg.id];
          if (!edu) return;
          let stageColor;
          if (!NON_PHOTOSPHERE_STAGES.has(seg.id)) {
            const midT = Math.sqrt(seg.tempKStart * seg.tempKEnd);
            stageColor = rgbStr(tempToColor(midT));
          } else {
            stageColor = STAGES[seg.id] ? STAGES[seg.id].color : "#888";
          }
          const dur = seg.ageEndYears - seg.ageStartYears;

          phaseCardOverlay.textContent = "";

          const header = el("div", "pc-header", []);
          header.style.color = stageColor;
          header.textContent = T(seg.id);
          phaseCardOverlay.appendChild(header);

          phaseCardOverlay.appendChild(el("div", "pc-body", [T(edu.descKey)]));

          function stat(lbl, val) {
            return el("div", "pc-stat", [
              el("span", "pc-stat-label", [lbl]),
              el("span", null, [val]),
            ]);
          }
          const stats = [];
          const sid = seg.id;
          if (sid === "planetary_nebula") {
            stats.push(stat(T("phaseCardVisibility"), formatAgeKids(dur)));
            stats.push(
              stat(T("phaseCardCoreTemp"), formatTemp(seg.tempKStart)),
            );
            stats.push(stat(T("phaseCardSize"), T("statNebulaExpands")));
          } else if (
            sid === "core_collapse_supernova" ||
            sid === "type_ia_supernova"
          ) {
            stats.push(
              stat(T("phaseCardPeakDuration"), T("statWeeksToMonths")),
            );
          } else if (sid === "white_dwarf") {
            stats.push(stat(T("phaseCardTimescale"), T("statCoolsBillions")));
            stats.push(stat(T("phaseCardTemp"), formatTemp(seg.tempKStart)));
            stats.push(
              stat(T("phaseCardSize"), formatRadius(seg.radiusRsunStart)),
            );
          } else if (sid === "neutron_star") {
            stats.push(stat(T("phaseCardTimescale"), T("statPersists")));
            stats.push(
              stat(T("phaseCardSize"), formatRadius(seg.radiusRsunStart)),
            );
          } else if (sid === "black_hole") {
            stats.push(stat(T("phaseCardTimescale"), T("statPersists")));
            stats.push(
              stat(T("phaseCardHorizon"), formatRadius(seg.radiusRsunStart)),
            );
          } else {
            stats.push(stat(T("phaseCardDuration"), formatAgeKids(dur)));
            stats.push(
              stat(
                T("phaseCardTemp"),
                formatTemp(seg.tempKStart) +
                  " \u2192 " +
                  formatTemp(seg.tempKEnd),
              ),
            );
            stats.push(
              stat(
                T("phaseCardSize"),
                formatRadius(seg.radiusRsunStart) +
                  " \u2192 " +
                  formatRadius(seg.radiusRsunEnd),
              ),
            );
          }
          phaseCardOverlay.appendChild(el("div", "pc-stats", stats));

          phaseCardOverlay.appendChild(el("div", "pc-wow", [T(edu.wowKey)]));

          positionPhaseCard();
          hoverCardVisible = true;
          hoverCardPhaseId = seg.id;
          hoverCardTransKey = null;
          hoverSegIndex = segIndex;
        }

        function showTransitionCard(segIndex) {
          const from = state.track[segIndex];
          const to = state.track[segIndex + 1];
          if (!from || !to) return;
          const key = from.id + "->" + to.id;
          const edu = TRANSITION_EDUCATION[key];
          if (!edu) return;

          function stageDisplayColor(stage) {
            if (!NON_PHOTOSPHERE_STAGES.has(stage.id)) {
              const midT = Math.sqrt(stage.tempKStart * stage.tempKEnd);
              return rgbStr(tempToColor(midT));
            }
            return STAGES[stage.id] ? STAGES[stage.id].color : "#888";
          }
          const fromColor = stageDisplayColor(from);
          const toColor = stageDisplayColor(to);

          phaseCardOverlay.textContent = "";

          const header = el("div", "pc-header", []);
          const fromSpan = elStyled("span", "color:" + fromColor, [T(from.id)]);
          const arrow = el("span", "pc-arrow", ["\u2192"]);
          const toSpan = elStyled("span", "color:" + toColor, [T(to.id)]);
          header.appendChild(fromSpan);
          header.appendChild(arrow);
          header.appendChild(toSpan);
          phaseCardOverlay.appendChild(header);

          phaseCardOverlay.appendChild(
            el("div", "pc-meta", [T(edu.triggerKey)]),
          );

          phaseCardOverlay.appendChild(el("div", "pc-body", [T(edu.descKey)]));

          positionPhaseCard();
          hoverCardVisible = true;
          hoverCardTransKey = key;
          hoverCardPhaseId = null;
          hoverSegIndex = segIndex;
        }

        function positionPhaseCard() {
          const rect = canvas.getBoundingClientRect();
          const starAreaH = rect.height - TIMELINE_HEIGHT;
          phaseCardOverlay.style.display = "block";
          phaseCardOverlay.style.left =
            Math.max(10, (rect.width - 340) / 2) + "px";
          phaseCardOverlay.style.top =
            Math.max(10, starAreaH * 0.35 - 60) + "px";
          phaseCardOverlay.classList.remove("visible");
          setTimeout(function () {
            phaseCardOverlay.classList.add("visible");
          }, 10);
        }

        function hidePhaseCard() {
          if (!hoverCardVisible) return;
          phaseCardOverlay.classList.remove("visible");
          hoverCardVisible = false;
          hoverCardPhaseId = null;
          hoverCardTransKey = null;
          hoverSegIndex = -1;
          setTimeout(function () {
            if (!hoverCardVisible) {
              phaseCardOverlay.style.display = "none";
            }
          }, 150);
        }

        canvas.addEventListener("mousemove", function (e) {
          if (!state.track || state.track.length === 0) return;
          const rect = canvas.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;
          const tlY = rect.height - TIMELINE_HEIGHT;
          const segY = tlY + 12;
          const segH = 50;

          if (my < segY || my > segY + segH) {
            clearTimeout(hoverDebounceTimer);
            hidePhaseCard();
            canvas.style.cursor = "";
            return;
          }

          const tlW = rect.width - TIMELINE_MARGIN * 2;
          const segments = computeTimelineSegments(state.track, tlW);
          let x = TIMELINE_MARGIN;

          for (let i = 0; i < segments.length; i++) {
            const right = x + segments[i].width;

            /* Transition zone at right boundary */
            if (
              i < segments.length - 1 &&
              segments[i].width > 3 * TRANSITION_ZONE_PX
            ) {
              if (
                mx >= right - TRANSITION_ZONE_PX &&
                mx <= right + TRANSITION_ZONE_PX
              ) {
                const tKey = segments[i].id + "->" + segments[i + 1].id;
                if (hoverCardTransKey === tKey) return;
                clearTimeout(hoverDebounceTimer);
                const idx = i;
                hoverDebounceTimer = setTimeout(function () {
                  showTransitionCard(idx);
                }, HOVER_DEBOUNCE_MS);
                canvas.style.cursor = "pointer";
                return;
              }
            }

            /* Segment interior */
            if (mx >= x && mx < right) {
              if (hoverCardPhaseId === segments[i].id) return;
              clearTimeout(hoverDebounceTimer);
              const idx = i;
              hoverDebounceTimer = setTimeout(function () {
                showPhaseCard(idx);
              }, HOVER_DEBOUNCE_MS);
              canvas.style.cursor = "pointer";
              return;
            }

            x = right;
          }

          clearTimeout(hoverDebounceTimer);
          hidePhaseCard();
          canvas.style.cursor = "";
        });

        canvas.addEventListener("mouseleave", function () {
          clearTimeout(hoverDebounceTimer);
          hidePhaseCard();
          canvas.style.cursor = "";
        });

        canvas.addEventListener("click", function (e) {
          if (!state.track || state.track.length === 0) return;
          const rect = canvas.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;
          const tlY = rect.height - TIMELINE_HEIGHT;
          const segY = tlY + 12;
          const segH = 50;

          if (my < segY || my > segY + segH) return;

          const tlW = rect.width - TIMELINE_MARGIN * 2;
          const segments = computeTimelineSegments(state.track, tlW);
          let x = TIMELINE_MARGIN;

          for (let i = 0; i < segments.length; i++) {
            const right = x + segments[i].width;

            /* Transition zone — jump to the next stage */
            if (
              i < segments.length - 1 &&
              segments[i].width > 3 * TRANSITION_ZONE_PX &&
              mx >= right - TRANSITION_ZONE_PX &&
              mx <= right + TRANSITION_ZONE_PX
            ) {
              state.currentAgeYears = state.track[i + 1].ageStartYears;
              state.finished = false;
              updateDerivedValues();
              return;
            }

            /* Segment interior */
            if (mx >= x && mx < right) {
              if (i === state.currentStageIndex && !state.finished) {
                state.playing = !state.playing;
                updatePlayBtnText();
              } else {
                state.currentAgeYears = state.track[i].ageStartYears;
                state.finished = false;
                updateDerivedValues();
              }
              return;
            }

            x = right;
          }
        });

        /* ============================================================
         *  INITIALIZATION
         * ============================================================ */

        resize();
        setMass(1.0);
        applyTranslations();
        updateReadouts();
        requestAnimationFrame(animate);

        window.addEventListener("resize", resize);
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) lastTime = 0;
        });
      })();
    </script>
  </body>
</html>
