    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0f18;
        --panel: #131825;
        --panel-border: #1e2a3a;
        --text: #c9d1d9;
        --text-dim: #6e7a8a;
        --accent: #58a6ff;
        --gain: #3fb950;
        --loss: #f97583;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Outfit", sans-serif;
        color: var(--text);
      }

      header {
        padding: 20px 28px 16px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      header h1 a {
        color: inherit;
        text-decoration: none;
      }
      header h1 a:hover {
        opacity: 0.7;
      }
      header p {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .main {
        display: flex;
        height: calc(100vh - 80px);
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        background: #080c14;
        min-width: 0;
      }
      .canvas-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .controls {
        width: 300px;
        flex-shrink: 0;
        padding: 20px;
        border-left: 1px solid var(--panel-border);
        display: flex;
        flex-direction: column;
        gap: 22px;
        overflow-y: auto;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
      }

      .mass-bar {
        display: flex;
        align-items: stretch;
        height: 37px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        overflow: hidden;
        background: var(--panel);
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      .mass-bar-btn {
        width: 34px;
        flex-shrink: 0;
        border: none;
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s;
        touch-action: manipulation;
      }
      .mass-bar-btn:hover {
        background: rgba(88, 166, 255, 0.12);
        color: var(--accent);
      }
      .mass-bar-btn:active {
        background: var(--accent);
        color: var(--bg);
      }
      .mass-bar-minus {
        border-right: 1px solid var(--panel-border);
      }
      .mass-bar-plus {
        border-left: 1px solid var(--panel-border);
      }
      .mass-bar-track {
        flex: 1;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        min-width: 0;
      }
      .mass-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0%;
        transition: width 0.05s ease-out;
        pointer-events: none;
      }
      .mass-bar-val {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        color: #fff;
        pointer-events: none;
        letter-spacing: 0.5px;
        z-index: 1;
      }

      .step-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .step-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .step-btn:active {
        background: var(--accent);
        color: var(--bg);
      }

      .type-toggle {
        display: flex;
        gap: 6px;
      }
      .type-btn {
        flex: 1;
        padding: 10px 4px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        cursor: pointer;
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        transition: all 0.2s;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .type-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .type-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(88, 166, 255, 0.08);
      }
      .type-btn:disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .type-btn.full-width {
        width: 100%;
        flex: none;
      }
      #advancedToggle {
        font-size: 18px;
      }

      .star-select {
        width: 100%;
        height: 37px;
        padding: 0 10px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        outline: none;
        cursor: pointer;
      }
      .star-select option {
        background: var(--panel);
        color: var(--text);
      }
      .star-select:focus {
        border-color: var(--accent);
      }

      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2px 0;
      }
      .readout-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
      }
      .readout-val {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        color: var(--text);
      }

      .info-text {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
        border-top: 1px solid var(--panel-border);
        padding-top: 12px;
      }

      .star-blurb {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
        background: rgba(88, 166, 255, 0.06);
        border-left: 2px solid var(--accent);
        padding: 8px 10px;
        border-radius: 3px;
      }

      .ctrl-wrapper {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .ctrl-wrapper.hidden {
        display: none;
      }

      .hidden {
        display: none;
      }

      .header-icon {
        font-size: 18px;
        line-height: 1;
      }

      .phase-card {
        position: absolute;
        z-index: 5;
        background: rgba(19, 24, 37, 0.95);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 14px 16px;
        max-width: 340px;
        pointer-events: none;
        font-family: "Share Tech Mono", monospace;
        font-size: 15px;
        color: var(--text);
        line-height: 1.5;
        opacity: 0;
        transition: opacity 0.15s ease;
        display: none;
      }
      .phase-card.visible {
        opacity: 1;
      }
      .pc-header {
        font-family: "Outfit", sans-serif;
        font-size: 19px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .pc-meta {
        color: var(--text-dim);
        font-size: 15px;
        margin-bottom: 8px;
      }
      .pc-body {
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 10px;
      }
      .pc-stats {
        margin-bottom: 10px;
      }
      .pc-stat {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
      }
      .pc-stat-label {
        color: var(--text-dim);
      }
      .pc-wow {
        border-top: 1px solid var(--panel-border);
        padding-top: 8px;
        margin-bottom: 8px;
        color: var(--star-glow);
        font-size: 15px;
        line-height: 1.5;
      }
      .pc-arrow {
        color: var(--text-dim);
        margin: 0 6px;
      }

      @media (prefers-reduced-motion: reduce) {
        html *,
        html *::before,
        html *::after {
          animation-duration: 0.01ms;
          transition-duration: 0.01ms;
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
          height: auto;
          min-height: 100vh;
        }
        .canvas-wrap {
          min-height: 350px;
          flex: none;
          height: 50vh;
        }
        .controls {
          width: 100%;
          border-left: none;
          border-top: 1px solid var(--panel-border);
          padding: 14px 16px;
          gap: 14px;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/"><span class="header-icon">&#x2B50;</span></a>
          <span id="titleText">Star Lab</span>
        </h1>
        <p id="subtitleText">How stars live and die</p>
      </div>
      <button
        class="lang-btn"
        id="langBtn"
        type="button"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="canvas-wrap">
        <canvas id="canvas" aria-label="Star lifecycle simulation"></canvas>
        <div id="phaseCardOverlay" class="phase-card"></div>
      </div>
      <div class="controls">
        <div class="ctrl-group">
          <div class="type-toggle">
            <button class="type-btn active" id="modeCustomBtn" type="button">
              Custom Star
            </button>
            <button class="type-btn" id="modeRealBtn" type="button">
              Real Star
            </button>
          </div>
        </div>

        <div id="grpCustom" class="ctrl-wrapper">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblMass">Initial Mass</span>
            <div class="mass-bar" id="massBar">
              <button
                class="mass-bar-btn mass-bar-minus"
                id="massDown"
                type="button"
                aria-label="Decrease mass"
              >
                &minus;
              </button>
              <div class="mass-bar-track" id="massTrack">
                <div class="mass-bar-fill" id="massFill"></div>
                <span class="mass-bar-val" id="massVal">1.00 M&#x2609;</span>
              </div>
              <button
                class="mass-bar-btn mass-bar-plus"
                id="massUp"
                type="button"
                aria-label="Increase mass"
              >
                +
              </button>
              <input type="hidden" id="massSlider" value="354" />
            </div>
          </div>
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblPreset">Star Type</span>
            <select
              class="star-select"
              id="massPresetSelect"
              aria-label="Star type preset"
            >
              <option value="1.0">Sun-like (1 M&#x2609;)</option>
              <option value="0.12">Tiny red dwarf (0.12 M&#x2609;)</option>
              <option value="2.5">Bright white (2.5 M&#x2609;)</option>
              <option value="15">Blue giant (15 M&#x2609;)</option>
              <option value="60">Monster star (60 M&#x2609;)</option>
            </select>
          </div>
        </div>

        <div id="grpReal" class="ctrl-wrapper hidden">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblRealStar">Star</span>
            <select
              class="star-select"
              id="realStarSelect"
              aria-label="Real star preset"
            >
              <option value="sun">Sun</option>
              <option value="proxima">Proxima Centauri</option>
              <option value="betelgeuse">Betelgeuse</option>
              <option value="eta_carinae">Eta Carinae A</option>
              <option value="barnard">Barnard's Star</option>
              <option value="trappist">TRAPPIST-1</option>
              <option value="sirius">Sirius A</option>
              <option value="vega">Vega</option>
              <option value="fomalhaut">Fomalhaut</option>
              <option value="arcturus">Arcturus</option>
              <option value="rigel">Rigel</option>
              <option value="antares">Antares</option>
              <option value="p_cygni">P Cygni</option>
              <option value="gamma_velorum">Gamma Velorum</option>
            </select>
          </div>
          <div class="ctrl-group">
            <div class="type-toggle">
              <button class="type-btn active" id="startNowBtn" type="button">
                Start from now
              </button>
              <button class="type-btn" id="startBirthBtn" type="button">
                Start from birth
              </button>
            </div>
          </div>
          <div class="star-blurb" id="realStarBlurb"></div>
        </div>

        <div class="ctrl-group">
          <button
            class="type-btn full-width"
            id="advancedToggle"
            type="button"
            aria-label="Advanced options"
          >
            &#x2699;
          </button>
        </div>
        <div id="grpAdvanced" class="ctrl-wrapper hidden">
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblMetallicity">Metallicity</span>
            <div class="type-toggle">
              <button class="type-btn" id="metalLow" type="button">
                Low metals
              </button>
              <button class="type-btn active" id="metalSolar" type="button">
                Sun-like
              </button>
              <button class="type-btn" id="metalHigh" type="button">
                High metals
              </button>
            </div>
          </div>
          <div class="ctrl-group">
            <span class="ctrl-label" id="lblBinary">Companion</span>
            <div class="type-toggle">
              <button class="type-btn active" id="binarySingle" type="button">
                Single star
              </button>
              <button class="type-btn" id="binaryClose" type="button">
                Close binary
              </button>
            </div>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblPlayback">Playback</span>
          <div class="type-toggle">
            <button
              class="type-btn"
              id="playBtn"
              type="button"
              aria-label="Play"
            >
              &#x25B6;
            </button>
            <button
              class="type-btn"
              id="nextPhaseBtn"
              type="button"
              aria-label="Next phase"
            >
              &#x23ED;
            </button>
            <button
              class="type-btn"
              id="resetBtn"
              type="button"
              aria-label="Reset"
            >
              &#x25A0;
            </button>
          </div>
          <div class="type-toggle">
            <button class="type-btn active" id="speedStory" type="button">
              Story
            </button>
            <button class="type-btn" id="speedFast" type="button">Fast</button>
            <button class="type-btn" id="speedTurbo" type="button">
              Turbo
            </button>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="readout-row">
            <span class="readout-label" id="lblPhase">Phase</span>
            <span class="readout-val" id="readPhase">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblAge">Age</span>
            <span class="readout-val" id="readAge">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblInitMass">Initial mass</span>
            <span class="readout-val" id="readInitMass">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblEnding">Likely ending</span>
            <span class="readout-val" id="readEnding">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblTemp">Temperature</span>
            <span class="readout-val" id="readTemp">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblRadius">Radius</span>
            <span class="readout-val" id="readRadius">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblLuminosity">Luminosity</span>
            <span class="readout-val" id="readLuminosity">&mdash;</span>
          </div>
          <div class="readout-row hidden" id="rowDistance">
            <span class="readout-label" id="lblDistance">Distance</span>
            <span class="readout-val" id="readDistance">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblComparison">Scale</span>
            <span class="readout-val" id="readComparison">&mdash;</span>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="info-text" id="infoText"></div>
        </div>
      </div>
    </main>

        /* Blackbody temperature to RGB (Tanner Helland algorithm) */
        function tempToColor(tempK) {
          const t = clamp(tempK, 1000, 50000) / 100;
          let r, g, b;
          if (t <= 66) {
            r = 255;
            g = 99.4708025861 * Math.log(t) - 161.1195681661;
            b =
              t <= 19 ? 0 : 138.5177312231 * Math.log(t - 10) - 305.0447927307;
          } else {
            r = 329.698727446 * Math.pow(t - 60, -0.1332047592);
            g = 288.1221695283 * Math.pow(t - 60, -0.0755148492);
            b = 255;
          }
          return [
            clamp(Math.round(r), 0, 255),
            clamp(Math.round(g), 0, 255),
            clamp(Math.round(b), 0, 255),
          ];

        /* Compute total lifetime from mass using log-log interpolation */
        function computeLifetime(massMsun, metallicityMode) {
          const m = clamp(massMsun, 0.08, 150);
          const logM = Math.log10(m);
          const anchors = LIFETIME_ANCHORS;
          /* Clamp to table range */
          if (logM <= Math.log10(anchors[0].mass))
            return anchors[0].years * METALLICITY_FACTOR[metallicityMode];
          if (logM >= Math.log10(anchors[anchors.length - 1].mass))
            return (
              anchors[anchors.length - 1].years *
              METALLICITY_FACTOR[metallicityMode]
            );
          for (let i = 0; i < anchors.length - 1; i++) {
            const logM1 = Math.log10(anchors[i].mass);
            const logM2 = Math.log10(anchors[i + 1].mass);
            if (logM >= logM1 && logM <= logM2) {
              const t = (logM - logM1) / (logM2 - logM1);
              const logY1 = Math.log10(anchors[i].years);
              const logY2 = Math.log10(anchors[i + 1].years);
              const years = Math.pow(10, lerp(logY1, logY2, t));
              return years * METALLICITY_FACTOR[metallicityMode];
            }
          }
          return 1e10 * METALLICITY_FACTOR[metallicityMode];
        }

        /* Get stage physical properties based on stage ID and mass.

        function getStageProperties(stageId, massMsun) {
          const m = massMsun;

          const msR = Math.pow(m, 0.8);

            case "main_sequence":

            case "subgiant":

              break;
            case "red_giant": {
              const rgMax = m < 2 ? 120 : 100 + m * 8;

            case "planetary_nebula":

                rStart: 2.5,
                rEnd: 0.04,
                tStart: 30000,
                tEnd: 100000,
              };
              break;
            case "blue_dwarf":
              props = {
                rStart: msR * 0.8,
                rEnd: msR * 0.5,
                tStart: clamp(msT * 1.5, 4000, 6000),
                tEnd: clamp(msT * 2.5, 6000, 8000),
              };

            case "white_dwarf":

            case "red_supergiant": {

              props = {
                rStart: m * 5,
                rEnd: rsgMax,
                tStart: 4500,
                tEnd: 3400,
              };

              props = {
                rStart: m * 2,
                rEnd: m * 5,
                tStart: 25000,
                tEnd: 12000,

            case "unstable_massive_star":

                rStart: m * 3,
                rEnd: m * 8,
                tStart: 30000,
                tEnd: 15000,

              break;
            case "stripped_hot_star":
              props = {
                rStart: m * 0.3,
                rEnd: m * 0.2,
                tStart: 50000,
                tEnd: 80000,
              };
              break;

                rStart: 0.01,
                rEnd: 0.01,
                tStart: 1e9,
                tEnd: 1e6,
                lStart: 1e10,
                lEnd: 1e6,

              return {
                rStart: 0.01,
                rEnd: 0.01,
                tStart: 1e9,
                tEnd: 1e6,
                lStart: 5e9,
                lEnd: 1e5,
              };
            case "neutron_star":
              props = {
                rStart: 1.5e-5,
                rEnd: 1.5e-5,
                tStart: 1e6,
                tEnd: 500000,

            case "black_hole": {
