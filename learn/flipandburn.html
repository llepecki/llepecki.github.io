        /* Flip-and-Burn Reference Solver                 */
        /* ══════════════════════════════════════════════ */

        function computeFlipBurnRef(homeKey, destKey, t0) {
          const home = bodyByKey[homeKey];
          const dest = bodyByKey[destKey];
          const r0 = helioPosition(home, t0);

          const rd0 = helioPosition(dest, t0);
          const dx0 = rd0.x - r0.x,
            dy0 = rd0.y - r0.y;
          const dist0 = Math.sqrt(dx0 * dx0 + dy0 * dy0);

          // Bisection root-finder: f(T) = L(T) - A_REF * T^2 / 4 = 0
          const T_guess = 2 * Math.sqrt(dist0 / A_REF);
          let T_lo = 0;
          let T_hi = Math.max(2 * T_guess, 1 / 365.25);

          function f(T) {
            const rd = helioPosition(dest, t0 + T);
            const dx = rd.x - r0.x,
              dy = rd.y - r0.y;
            const L = Math.sqrt(dx * dx + dy * dy);
            return L - (A_REF * T * T) / 4;
          }

          while (f(T_hi) > 0) {
            T_hi *= 2;
            if (T_hi > 1000) break;
          }

          let T_ref = T_guess;
          for (let i = 0; i < 40; i++) {
            T_ref = (T_lo + T_hi) / 2;
            const fVal = f(T_ref);
            if (Math.abs(fVal) < 1e-6) break;
            if (fVal > 0) T_lo = T_ref;
            else T_hi = T_ref;
          }

          const rdRef = helioPosition(dest, t0 + T_ref);
          const lineX = rdRef.x - r0.x,
            lineY = rdRef.y - r0.y;
          let L = Math.sqrt(lineX * lineX + lineY * lineY);
          if (L < 1e-10) L = 1e-10;
          const ux = lineX / L,
            uy = lineY / L;

          const tFlipRef = T_ref / 2;
          const vPeakRef = A_REF * tFlipRef;

          // Solar clearance (spec 16.7)
          const dotR0Seg = r0.x * lineX + r0.y * lineY;
          const dotSegSeg = lineX * lineX + lineY * lineY;
          const q = Math.max(0, Math.min(1, -dotR0Seg / dotSegSeg));
          const closestX = r0.x + q * lineX;
          const closestY = r0.y + q * lineY;
          const solarClearance = Math.sqrt(
            closestX * closestX + closestY * closestY,
          );

          // Phase angle data
          const thetaHome = Math.atan2(r0.y, r0.x);
          const thetaDest = Math.atan2(rd0.y, rd0.x);
          const thetaDestHit = Math.atan2(rdRef.y, rdRef.x);
          const phaseCurrent = wrapAngle(thetaDest - thetaHome);
          const phaseRequired = wrapAngle(thetaDestHit - thetaHome);
          const phaseError = wrapAngle(phaseCurrent - phaseRequired);

          return {
            T_ref: T_ref,
            r0: r0,
            rdRef: rdRef,
            line: { x: lineX, y: lineY },
            u: { x: ux, y: uy },
            L: L,
            tFlipRef: tFlipRef,
            vPeakRef: vPeakRef,
            dvDepart: vPeakRef,
            dvArrive: vPeakRef,
            solarClearance: solarClearance,
            phaseCurrent: phaseCurrent,
            phaseRequired: phaseRequired,
            phaseError: phaseError,
          };
        }

        const WARP_K = 0.75;

        function computePairSpeedScale(homeKey, destKey) {
          const home = bodyByKey[homeKey],
            dest = bodyByKey[destKey];
          const inner = home.T < dest.T ? home : dest;

          // Desired speed ratio vs Earth: Mercury→1.1, Earth→1.0, Uranus→0.9
          const logT = Math.log(inner.T);
          const ratio =
            logT <= 0
              ? 1 + (0.2 * logT) / Math.log(0.2408)
              : 1 - (0.2 * logT) / Math.log(84.021);

          // Earth-Mars reference speed at original normal warp
          const earthSyn =
            TWO_PI / Math.abs(bodyByKey["earth"].n - bodyByKey["mars"].n);
          const earthWarp = Math.max(1, Math.round(earthSyn * WARP_K));
          const earthSpeed = bodyByKey["earth"].n * earthWarp * SIM_RATE;

          // This pair's base speed at original normal warp
          const synodicRate = Math.abs(home.n - dest.n);
          const synodic = TWO_PI / synodicRate;
          const pairWarp = Math.max(1, Math.round(synodic * WARP_K));
          const pairSpeed = inner.n * pairWarp * SIM_RATE;

          return (ratio * earthSpeed) / pairSpeed;
        }

        function computeWarpLevels(homeKey, destKey) {
          const home = bodyByKey[homeKey];
          const dest = bodyByKey[destKey];
          const synodicRate = Math.abs(home.n - dest.n);
          const synodic = TWO_PI / synodicRate;
          const phaseTolDeg = DIFFICULTY[state.difficulty].PHASE_TOL_DEG;
          const windowDur = (2 * phaseTolDeg * DEG2RAD) / synodicRate;

          const ps = state.pairSpeedScale;
          const MAX_WINDOW_SEC = 8;
          const baseDecel = state.difficulty === "easy" ? 0.5 : 1;
          const windowRealSec = windowDur / (baseDecel * SIM_RATE * ps);
          const decel =
            windowRealSec > MAX_WINDOW_SEC
              ? Math.ceil(windowDur / (MAX_WINDOW_SEC * SIM_RATE * ps))
              : baseDecel;

          return {
            normal: Math.max(1, Math.round(synodic * WARP_K)),
            fast: Math.max(2, Math.round(synodic * 2.5)),
            fastest: Math.max(5, Math.round(synodic * 7.5)),
            decel: decel,
            windowDur: windowDur,
          };
        }

        const BURN_FILL_SEC = 4; // seconds to fill burn meter from 0% to 100%

        // Piecewise log-linear burn meter curve
        // Three segments join at green zone edges p and q:
        //   [0, p] → METER_MIN_G to GREEN_LOW_G  (snail zone)
        //   [p, q] → GREEN_LOW_G  to GREEN_HIGH_G (green zone)
        //   [q, 1] → GREEN_HIGH_G to METER_MAX_G  (death zone)
        // As the green zone shrinks (p→0.5, q→0.5), snail and death zones expand.
        function meterToAccelG(t, p, q) {
          if (q - p < 0.001) {
            // Green zone collapsed — split at midpoint
            if (t <= 0.5) {
              return METER_MIN_G * Math.pow(GREEN_LOW_G / METER_MIN_G, t / 0.5);
            }
            return (
              GREEN_HIGH_G *
              Math.pow(METER_MAX_G / GREEN_HIGH_G, (t - 0.5) / 0.5)
            );
          }
          if (t <= p) {
            return METER_MIN_G * Math.pow(GREEN_LOW_G / METER_MIN_G, t / p);
          }
          if (t <= q) {
            return (
              GREEN_LOW_G *
              Math.pow(GREEN_HIGH_G / GREEN_LOW_G, (t - p) / (q - p))
            );
          }
          return (
            GREEN_HIGH_G *
            Math.pow(METER_MAX_G / GREEN_HIGH_G, (t - q) / (1 - q))
          );
        }

        // Current green zone edges on the meter [0,1], shrinking and bouncing over time
        function getGreenZoneEdges() {
          const diff = DIFFICULTY[state.difficulty];
          if (diff.BURN_SHRINK_SEC === Infinity) return { p: 0.25, q: 0.75 };

          let elapsed = 0;
          if (state.phase === "burn" && state.burn.holding) {
            elapsed = (performance.now() - state.burn.holdStart) / 1000;
          }
          const halfWidth =
            0.25 * Math.max(0, 1 - elapsed / diff.BURN_SHRINK_SEC);

          // Bounce: center oscillates left-right (hard mode)
          let center = 0.5;
          if (diff.BOUNCE_AMP > 0 && diff.BOUNCE_FREQ > 0) {
            center +=
              diff.BOUNCE_AMP * Math.sin(TWO_PI * diff.BOUNCE_FREQ * elapsed);
            // Clamp so edges stay within [0, 1]
            center = Math.max(
              halfWidth + 0.01,
              Math.min(1 - halfWidth - 0.01, center),
            );
          }

          return { p: center - halfWidth, q: center + halfWidth };
        }

        function computeBurnMeterZones() {
          const aLow = GREEN_LOW_G * G_TO_AUYR2;
          const aHigh = GREEN_HIGH_G * G_TO_AUYR2;
          const aFatal = CREW_DEAD_G * G_TO_AUYR2;
          return { aLow: aLow, aHigh: aHigh, aFatal: aFatal };
        }

        function crewSurvivalChance(aReq) {
          const a_g = aReq / G_TO_AUYR2;
          if (a_g <= CREW_SAFE_G) return 1.0;
          if (a_g >= CREW_DEAD_G) return 0.0;
          const x = (a_g - CREW_SAFE_G) / (CREW_DEAD_G - CREW_SAFE_G);
          return 1 - x * x * x;
        }

        /* ══════════════════════════════════════════════ */
        /* Launch Ready Check                             */
        /* ══════════════════════════════════════════════ */

        function isLaunchReady() {
          return state.ref != null && state.missionStarted;
        }

        /* ══════════════════════════════════════════════ */
        /* Transfer Line Geometry                         */
        /* ══════════════════════════════════════════════ */

        function getTransferLinePosition(tau) {
          const ref = state.transfer;
          if (!ref) return { x: 0, y: 0, s: 0 };

          const accel = state.burn.committed ? state.accelFinal : A_REF;
          const T = state.burn.committed ? state.tActual : ref.T_ref;
          const tFlip = T / 2;

          let s;
          if (tau <= tFlip) {
            s = 0.5 * accel * tau * tau;
          } else {
            const dt = T - tau;
            s = ref.L - 0.5 * accel * dt * dt;
          }
          s = Math.max(0, Math.min(ref.L, s));

          return {
            x: ref.r0.x + ref.u.x * s,
            y: ref.r0.y + ref.u.y * s,
            s: s,
          };
        }

        /* ══════════════════════════════════════════════ */
        /* Result Evaluation                              */
        /* ══════════════════════════════════════════════ */

        function evaluateAccelResult(accel) {
          const zones = state.burnZones;
          const a_g = accel / G_TO_AUYR2;

          // Within green zone → success
          if (accel >= zones.aLow && accel <= zones.aHigh) {
            return { type: "success" };
          }

          // Above 20g → certain death
          if (a_g >= CREW_DEAD_G) {
            return { type: "fatal" };
          }

          // Between 1g and 20g → roll dice
          if (a_g >= CREW_SAFE_G) {
            const survival = crewSurvivalChance(accel);
            if (Math.random() < survival) {
              return { type: "close" };
            } else {
              return { type: "fatal" };
            }
          }

          // Below green zone — safe but painfully slow
          if (accel < zones.aLow) {
            return { type: "slow" };
          }

          return { type: "close" };
        }

        function getResultHint() {
          if (state.resultSubtype === "solar") return T("hintSolarFatal");
          if (state.resultType === "fatal") return T("hintHighG");
          if (state.resultType === "close") return T("hintInjured");
          if (state.resultType === "slow") return T("hintSlowTransfer");
          return "";
        }

        function showResultOverlay() {
          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();

          const overlay = document.createElement("div");
          overlay.className = "result-overlay";

          let emoji, msg, bg;
          const result = state.resultType;
          if (result === "success") {
            emoji = "\uD83C\uDF89";
            msg = T("resultSuccess");
            bg = "rgba(63,185,80,0.88)";
          } else if (result === "close") {
            emoji = "\uD83E\uDD15";
            msg = T("resultInjured");
            bg = "rgba(240,180,60,0.92)";
          } else if (result === "slow") {
            emoji = "\uD83D\uDC0C";
            msg = T("resultSlow");
            bg = "rgba(88,166,255,0.88)";
          } else if (result === "fatal") {
            emoji = "\u2620\uFE0F";
            msg = T("resultFatal");
            bg = "rgba(120,10,10,0.95)";
          } else {
            emoji = "\uD83D\uDC4E\uD83C\uDFFB";
            msg = T("resultMiss");
            bg = "rgba(240,180,60,0.92)";
          }

          const hint = getResultHint();
          overlay.style.background = bg;

          const emojiEl = document.createElement("div");
          emojiEl.className = "overlay-emoji";
          emojiEl.textContent = emoji;
          overlay.appendChild(emojiEl);

          const msgEl = document.createElement("div");
          msgEl.className = "overlay-msg";
          msgEl.textContent = msg;
          overlay.appendChild(msgEl);

          if (hint) {
            const subEl = document.createElement("div");
            subEl.className = "overlay-sub";
            subEl.textContent = hint;
            overlay.appendChild(subEl);
          }

          const hintEl = document.createElement("div");
          hintEl.className = "overlay-hint";
          hintEl.textContent = T("clickDismiss");
          overlay.appendChild(hintEl);

          overlay.addEventListener("click", function () {
            overlay.remove();
            state.overlayDismissed = true;
            state.postResultStart = performance.now();
          });
          document.body.appendChild(overlay);
        }

        /* ══════════════════════════════════════════════ */
        /* Canvas Setup                                   */
        /* ══════════════════════════════════════════════ */

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let W = 0,
          H = 0;

        const insetCanvas = document.getElementById("insetCanvas");
        const ictx = insetCanvas.getContext("2d");
        let iW = 150,
          iH = 150;

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          W = rect.width;
          H = rect.height;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const iRect = insetCanvas.parentElement.getBoundingClientRect();
          iW = iRect.width;
          iH = iRect.height;
          insetCanvas.width = iW * dpr;
          insetCanvas.height = iH * dpr;
          insetCanvas.style.width = iW + "px";
          insetCanvas.style.height = iH + "px";
          ictx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener("resize", resize);

        /* ══════════════════════════════════════════════ */
        /* Starfield                                      */
        /* ══════════════════════════════════════════════ */

        let bgStars = [];
        function initBgStars(n) {
          bgStars = [];
          for (let i = 0; i < n; i++) {
            bgStars.push({
              x: Math.random(),
              y: Math.random(),
              r: Math.random() * 1.2 + 0.3,
              b: Math.random() * 0.4 + 0.2,
            });
          }
        }
        initBgStars(200);

        /* ══════════════════════════════════════════════ */
        /* Camera                                         */
        /* ══════════════════════════════════════════════ */

        function computeAutoCamera() {
          const home = bodyByKey[state.homeKey];
          const dest = bodyByKey[state.destKey];
          const maxR = Math.max(home.maxHelioR || 2, dest.maxHelioR || 2);
          const margin = maxR * 1.2;
          return { cx: 0, cy: 0, scale: Math.min(W, H) / 2 / margin };
        }

        function toCanvas(auX, auY) {
          return {
            cx: W / 2 + (auX - state.camera.cx) * state.camera.scale,
            cy: H / 2 - (auY - state.camera.cy) * state.camera.scale,
          };
        }

        function fromCanvas(cx, cy) {
          return {
            x: (cx - W / 2) / state.camera.scale + state.camera.cx,
            y: -(cy - H / 2) / state.camera.scale + state.camera.cy,
          };
        }

        function getCanvasPos(e) {
          const rect = canvas.getBoundingClientRect();
          if (e.touches && e.touches.length > 0) {
            return {
              x: e.touches[0].clientX - rect.left,
              y: e.touches[0].clientY - rect.top,
            };
          }
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function getNearPlanetKey(canvasPos) {
          const keys = [state.homeKey, state.destKey];
          let bestKey = null;
          let bestDist2 = Infinity;
          for (let i = 0; i < keys.length; i++) {
            const body = bodyByKey[keys[i]];
            const pos = helioPosition(body, state.simTime);
            const cc = toCanvas(pos.x, pos.y);
            const dx = canvasPos.x - cc.cx;
            const dy = canvasPos.y - cc.cy;
            const d2 = dx * dx + dy * dy;
            const hitRadius = Math.max(body.radius + 8, 20);
            if (d2 <= hitRadius * hitRadius && d2 < bestDist2) {
              bestDist2 = d2;
              bestKey = keys[i];
            }
          }
          return bestKey;
        }

        /* ══════════════════════════════════════════════ */
        /* Drawing                                        */
        /* ══════════════════════════════════════════════ */

        function drawStarfield() {
          for (let i = 0; i < bgStars.length; i++) {
            const s = bgStars[i];
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, TWO_PI);
            ctx.fillStyle = "rgba(200,210,220," + s.b * 0.3 + ")";
            ctx.fill();
          }
        }

        function drawOrbitGuide(body, alpha) {
          if (body.key === "sun" || !body.guidePath) return;
          const path = body.guidePath;
          if (path.length < 2) return;
          ctx.beginPath();
          const p0 = toCanvas(path[0].x, path[0].y);
          ctx.moveTo(p0.cx, p0.cy);
          for (let i = 1; i < path.length; i++) {
            const p = toCanvas(path[i].x, path[i].y);
            ctx.lineTo(p.cx, p.cy);
          }
          ctx.closePath();
          ctx.strokeStyle = "rgba(" + body.glow + "," + alpha + ")";
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        function drawBody(body, t) {
          const pos = helioPosition(body, t);
          const cc = toCanvas(pos.x, pos.y);
          const r = body.radius;
          if (body.key === "sun") {
            const grad = ctx.createRadialGradient(
              cc.cx,
              cc.cy,
              0,
              cc.cx,
              cc.cy,
              r * 2.5,
            );
            grad.addColorStop(0, "rgba(" + body.glow + ",0.6)");
            grad.addColorStop(1, "rgba(" + body.glow + ",0)");
            ctx.beginPath();
            ctx.arc(cc.cx, cc.cy, r * 2.5, 0, TWO_PI);
            ctx.fillStyle = grad;
            ctx.fill();

            // Solar danger zone ring (easy mode)
            if (state.difficulty === "easy" && state.ref) {
              const killR = SOLAR_KILL_RADIUS * state.camera.scale;
              ctx.beginPath();
              ctx.arc(cc.cx, cc.cy, killR, 0, TWO_PI);
              ctx.strokeStyle = "rgba(255,60,30,0.25)";
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
          ctx.beginPath();
          ctx.arc(cc.cx, cc.cy, r, 0, TWO_PI);
          ctx.fillStyle = body.color;
          ctx.fill();

          if (
            state.phase === "prelaunch" &&
            (body.key === state.draggingKey || body.key === state.dragHoverKey)
          ) {
            ctx.beginPath();
            ctx.arc(cc.cx, cc.cy, r + 4, 0, TWO_PI);
            ctx.strokeStyle =
              body.key === state.draggingKey
                ? "rgba(88,166,255,0.9)"
                : "rgba(88,166,255,0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          if (body.key !== "sun") {
            const label = T(body.key);
            ctx.font = '15px "Share Tech Mono", monospace';
            ctx.fillStyle = "rgba(" + body.glow + ",0.7)";
            ctx.textAlign = "center";
            ctx.fillText(label, cc.cx, cc.cy - r - 5);
          }
        }

        function drawTransferLine() {
          if (!state.transfer) return;
          if (state.phase === "prelaunch") return;

          const ref = state.transfer;
          const p0 = toCanvas(ref.r0.x, ref.r0.y);
          const p1 = toCanvas(ref.rdRef.x, ref.rdRef.y);

          ctx.beginPath();
          ctx.setLineDash([4, 4]);
          ctx.moveTo(p0.cx, p0.cy);
          ctx.lineTo(p1.cx, p1.cy);
          ctx.strokeStyle = "rgba(255,255,255,0.15)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.setLineDash([]);
        }

        function getScAngle() {
          const ref = state.transfer;
          if (!ref) {
            const hv = helioVelocity(bodyByKey[state.homeKey], state.simTime);
            return Math.atan2(-hv.vy, hv.vx);
          }

          const baseAngle = Math.atan2(-ref.u.y, ref.u.x);

          if (
            state.phase === "transit" ||
            state.phase === "captured" ||
            (state.phase === "result" && state.burn.committed)
          ) {
            if (state.flipStartWall === 0) {
              return baseAngle; // before flip: pointing forward
            }
            const flipProgress = Math.min(
              1,
              (performance.now() - state.flipStartWall) /
                (state.flipDurMs || FLIP_ANIM_MS),
            );
            if (flipProgress < 1) {
              return baseAngle + Math.PI * flipProgress; // during flip: rotating
            }
            return baseAngle + Math.PI; // after flip: pointing backward
          }
          if (state.phase === "coasting") {
            return baseAngle + Math.PI;
          }

          return baseAngle; // burn phase: pointing forward
        }

        function drawSpacecraft() {
          if (!state.sc.launched) return;

          // Solar dissolve — ship burning up
          let dissolveProgress = 0;
          if (state.solarDeathStart > 0) {
            dissolveProgress = Math.min(
              1,
              (performance.now() - state.solarDeathStart) / 1600,
            );
            if (dissolveProgress >= 1) return; // fully dissolved
          }

          const cc = toCanvas(state.sc.x, state.sc.y);
          const angle = getScAngle();

          ctx.save();
          ctx.translate(cc.cx, cc.cy);
          ctx.rotate(angle);

          if (dissolveProgress > 0) {
            ctx.globalAlpha = 1 - dissolveProgress;
            // Expanding fire glow
            const fireR = 22 + 38.5 * dissolveProgress;
            const fireGlow = ctx.createRadialGradient(0, 0, 2, 0, 0, fireR);
            fireGlow.addColorStop(
              0,
              "rgba(255,100,30," + 0.7 * dissolveProgress + ")",
            );
            fireGlow.addColorStop(
              0.5,
              "rgba(255,60,10," + 0.4 * dissolveProgress + ")",
            );
            fireGlow.addColorStop(1, "rgba(255,30,0,0)");
            ctx.fillStyle = fireGlow;
            ctx.beginPath();
            ctx.arc(0, 0, fireR, 0, TWO_PI);
            ctx.fill();
          }

          // Capture dissolve — stay hidden through result phase
          if (
            state.phase === "captured" ||
            (state.phase === "result" && state.captureAlpha <= 0)
          ) {
            if (state.captureAlpha <= 0) {
              ctx.restore();
              return;
            }
            ctx.globalAlpha = state.captureAlpha;
          }

          // Glow
          const glow = ctx.createRadialGradient(0, 0, 1.6, 0, 0, 16);
          glow.addColorStop(0, "rgba(255,224,102,0.36)");
          glow.addColorStop(1, "rgba(255,224,102,0.0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, 16, 0, TWO_PI);
          ctx.fill();

          // Triangle wedge
          ctx.fillStyle = "#ffe066";
          ctx.beginPath();
          ctx.moveTo(14.3, 0);
          ctx.lineTo(-7.7, -7.15);
          ctx.lineTo(-7.7, 7.15);
          ctx.closePath();
          ctx.fill();

          // Determine flip state for engine/RCS logic
          let isFlipping = false;
          let flipDone = false;
          if (state.phase === "transit" && state.flipStartWall > 0) {
            const fProg = Math.min(
              1,
              (performance.now() - state.flipStartWall) /
                (state.flipDurMs || FLIP_ANIM_MS),
            );
            isFlipping = fProg < 1;
            flipDone = fProg >= 1;
          }

          // Engine flame: during burn, or during transit when NOT mid-flip
          if (
            state.phase === "burn" ||
            (state.phase === "transit" &&
              !isFlipping &&
              state.solarDeathStart === 0)
          ) {
            const fl = 6.6 + 4.4 * Math.sin(Date.now() / 60);
            ctx.fillStyle = "rgba(255,140,30,0.6)";
            ctx.beginPath();
            ctx.moveTo(-7.7, -4.4);
            ctx.lineTo(-7.7 - fl, 0);
            ctx.lineTo(-7.7, 4.4);
            ctx.closePath();
            ctx.fill();
          }

          // RCS thrusters during flip rotation
          if (state.phase === "transit" && isFlipping) {
            const rcsLen = 3.3 + 2.2 * Math.sin(Date.now() / 40);
            ctx.fillStyle = "rgba(100,180,255,0.5)";
            ctx.beginPath();
            ctx.moveTo(5.5, -7.15);
            ctx.lineTo(5.5, -7.15 - rcsLen);
            ctx.lineTo(2.2, -7.15);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-5.5, 7.15);
            ctx.lineTo(-5.5, 7.15 + rcsLen);
            ctx.lineTo(-2.2, 7.15);
            ctx.closePath();
            ctx.fill();
          }

          // Flash at flip completion
          if (
            state.phase === "transit" &&
            flipDone &&
            state.flipStartWall > 0
          ) {
            const flashAge =
              performance.now() -
              (state.flipStartWall + (state.flipDurMs || FLIP_ANIM_MS));
            if (flashAge >= 0 && flashAge < 300) {
              const flashAlpha = 0.6 * (1 - flashAge / 300);
              ctx.beginPath();
              ctx.arc(0, 0, 27.5, 0, TWO_PI);
              ctx.fillStyle = "rgba(255,255,255," + flashAlpha + ")";
              ctx.fill();
            }
          }

          ctx.restore();
        }

        function drawTrail() {
          const trail = state.sc.trail;
          if (trail.length < 2) return;

          const flipIdx = state.flipTrailIdx || trail.length;
          const step = Math.max(1, Math.floor(trail.length / 2000));

          // Warm segment (acceleration)
          ctx.beginPath();
          const p0 = toCanvas(trail[0].x, trail[0].y);
          ctx.moveTo(p0.cx, p0.cy);
          for (let i = step; i < Math.min(flipIdx, trail.length); i += step) {
            const p = toCanvas(trail[i].x, trail[i].y);
            ctx.lineTo(p.cx, p.cy);
          }
          ctx.strokeStyle = "rgba(255,180,80,0.55)";
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Cool segment (braking)
          if (flipIdx < trail.length) {
            ctx.beginPath();
            const pf = toCanvas(trail[flipIdx].x, trail[flipIdx].y);
            ctx.moveTo(pf.cx, pf.cy);
            for (let j = flipIdx + step; j < trail.length; j += step) {
              const pc = toCanvas(trail[j].x, trail[j].y);
              ctx.lineTo(pc.cx, pc.cy);
            }
            ctx.strokeStyle = "rgba(100,180,255,0.55)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
        }

        function drawScene() {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = "#080c14";
          ctx.fillRect(0, 0, W, H);

          drawStarfield();

          const home = bodyByKey[state.homeKey];
          const dest = bodyByKey[state.destKey];

          drawOrbitGuide(home, 0.25);
          drawOrbitGuide(dest, 0.25);

          drawTransferLine();
          drawTrail();

          drawBody(bodyByKey["sun"], state.simTime);
          drawBody(home, state.simTime);
          drawBody(dest, state.simTime);

          drawSpacecraft();
          updateDataSource();
        }

        /* ══════════════════════════════════════════════ */
        /* Inset Drawing                                  */
        /* ══════════════════════════════════════════════ */

        function drawInset() {
          ictx.clearRect(0, 0, iW, iH);
          ictx.fillStyle = "rgba(8,12,20,0.9)";
          ictx.fillRect(0, 0, iW, iH);

          const cx = iW / 2,
            cy = iH / 2;
          const bodyKey =
            state.phase === "transit" ||
            state.phase === "captured" ||
            state.phase === "coasting" ||
            (state.phase === "result" && state.burn.committed)
              ? state.destKey
              : state.homeKey;
          const body = bodyByKey[bodyKey];

          ictx.beginPath();
          const grad = ictx.createRadialGradient(cx, cy, 0, cx, cy, 16);
          grad.addColorStop(0, body.color);
          grad.addColorStop(1, "rgba(" + body.glow + ",0.1)");
          ictx.arc(cx, cy, 14, 0, TWO_PI);
          ictx.fillStyle = grad;
          ictx.fill();

          ictx.beginPath();
          ictx.arc(cx, cy, 14, 0, TWO_PI);
          ictx.fillStyle = body.color;
          ictx.fill();

          const orbitR = 40;
          ictx.beginPath();
          ictx.arc(cx, cy, orbitR, 0, TWO_PI);
          ictx.strokeStyle = "rgba(255,255,255,0.2)";
          ictx.lineWidth = 1;
          ictx.stroke();

          const scAngle = state.insetScAngle;
          const scX = cx + orbitR * Math.cos(scAngle);
          const scY = cy - orbitR * Math.sin(scAngle);

          // Engine glow during burn/transit
          if (state.phase === "burn" || state.phase === "transit") {
            const flR = 5.5 + 2.2 * Math.sin(Date.now() / 80);
            ictx.beginPath();
            ictx.arc(scX, scY, flR, 0, TWO_PI);
            ictx.fillStyle = "rgba(255,180,50,0.4)";
            ictx.fill();
          }

          // RCS glow during mid-transit flip
          if (
            state.phase === "transit" &&
            state.flipStartWall > 0 &&
            performance.now() - state.flipStartWall <
              (state.flipDurMs || FLIP_ANIM_MS)
          ) {
            const rcsR = 4.4 + 2.2 * Math.sin(Date.now() / 40);
            ictx.beginPath();
            ictx.arc(scX, scY, rcsR, 0, TWO_PI);
            ictx.fillStyle = "rgba(100,180,255,0.4)";
            ictx.fill();
          }

          // Spacecraft wedge on inset — always tangent to orbit direction
          const insetAngle = -(scAngle + Math.PI / 2);

          ictx.save();
          ictx.translate(scX, scY);
          ictx.rotate(insetAngle);
          ictx.fillStyle = "#ffe066";
          ictx.beginPath();
          ictx.moveTo(11, 0);
          ictx.lineTo(-5.5, -5.5);
          ictx.lineTo(-5.5, 5.5);
          ictx.closePath();
          ictx.fill();
          ictx.restore();

          ictx.font = '12px "Share Tech Mono", monospace';
          ictx.fillStyle = "rgba(255,255,255,0.5)";
          ictx.textAlign = "center";
          ictx.fillText(T(bodyKey), cx, iH - 6);
        }

        /* ══════════════════════════════════════════════ */
        /* Burn Interaction                               */
        /* ══════════════════════════════════════════════ */

        function startBurn() {
          if (state.phase !== "prelaunch") return;
          if (!isLaunchReady()) return;

          // Lock reference at launch time
          const ref = computeFlipBurnRef(
            state.homeKey,
            state.destKey,
            state.simTime,
          );
          state.transfer = ref;
          state.ref = ref;
          state.solarClearance = ref.solarClearance;
          state.launchSimTime = state.simTime;
          state.tauSim = 0;

          // Compute burn meter zones
          state.burnZones = computeBurnMeterZones();

          // Place spacecraft at home planet position
          const hp = helioPosition(bodyByKey[state.homeKey], state.simTime);
          state.sc.x = hp.x;
          state.sc.y = hp.y;
          state.sc.launched = true;
          state.sc.trail = [{ x: hp.x, y: hp.y }];

          // Start burn phase
          state.phase = "burn";
          state.burn.holding = true;
          state.burn.holdStart = performance.now();
          state.burn.holdDuration = 0;
          state.burn.accel = 0;
          state.burn.meterFrac = 0;

          updateEngineBtn();
          updateBurnMeter();
        }

        function endBurn() {
          if (state.phase !== "burn" || !state.burn.holding) return;

          state.burn.holding = false;
          state.burn.committed = true;

          const ref = state.transfer;
          let accel = state.burn.accel;
          if (accel < 1) accel = 1; // floor to prevent division by zero
          state.accelFinal = accel;

          // Re-solve intercept for player's chosen acceleration
          // The reference was computed at A_REF — different accel means different
          // transfer time, so the destination planet will be at a different position.
          const r0 = ref.r0;
          const dest = bodyByKey[state.destKey];
          const t0 = state.launchSimTime;

          const T_guess = 2 * Math.sqrt(ref.L / accel);
          let T_lo = 0;
          let T_hi = Math.max(2 * T_guess, 1 / 365.25);

          function fIntercept(T) {
            const rd = helioPosition(dest, t0 + T);
            const dx = rd.x - r0.x,
              dy = rd.y - r0.y;
            const Ld = Math.sqrt(dx * dx + dy * dy);
            return Ld - (accel * T * T) / 4;
          }

          while (fIntercept(T_hi) > 0) {
            T_hi *= 2;
            if (T_hi > 1000) break;
          }

          let T_actual = T_guess;
          for (let i = 0; i < 40; i++) {
            T_actual = (T_lo + T_hi) / 2;
            const fVal = fIntercept(T_actual);
            if (Math.abs(fVal) < 1e-6) break;
            if (fVal > 0) T_lo = T_actual;
            else T_hi = T_actual;
          }

          // Update transfer geometry to actual intercept point
          const rdActual = helioPosition(dest, t0 + T_actual);
          const lineX = rdActual.x - r0.x,
            lineY = rdActual.y - r0.y;
          let L_actual = Math.sqrt(lineX * lineX + lineY * lineY);
          if (L_actual < 1e-10) L_actual = 1e-10;

          ref.rdRef = rdActual;
          ref.line = { x: lineX, y: lineY };
          ref.L = L_actual;
          ref.u = { x: lineX / L_actual, y: lineY / L_actual };

          // Recheck solar clearance with new transfer line
          const dotR0Seg = r0.x * lineX + r0.y * lineY;
          const dotSegSeg = lineX * lineX + lineY * lineY;
          const q = Math.max(0, Math.min(1, -dotR0Seg / dotSegSeg));
          const closestX = r0.x + q * lineX;
          const closestY = r0.y + q * lineY;
          ref.solarClearance = Math.sqrt(
            closestX * closestX + closestY * closestY,
          );
          state.solarClearance = ref.solarClearance;

          state.tauFlip = T_actual / 2;
          state.tActual = T_actual;

          // Evaluate result based on acceleration
          const result = evaluateAccelResult(accel);
          state.resultType = result.type;
          state.resultSubtype = null;

          // Transition to transit — flip happens mid-flight
          state.phase = "transit";
          state.flipStartWall = 0; // flip not started yet
          state.flipAngle = 0;
          state.flipTrailIdx = 0;

          if (state.warpLocked) {
            state.warpLocked = false;
          }

          updateEngineBtn();
        }

        const engineBtn = document.getElementById("engineBtn");

        engineBtn.addEventListener("mousedown", function (e) {
          e.preventDefault();
          startBurn();
        });
        engineBtn.addEventListener("mouseup", function (e) {
          e.preventDefault();
          endBurn();
        });
        engineBtn.addEventListener("mouseleave", function () {
          if (state.burn.holding) endBurn();
        });
        engineBtn.addEventListener(
          "touchstart",
          function (e) {
            e.preventDefault();
            startBurn();
          },
          { passive: false },
        );
        engineBtn.addEventListener(
          "touchend",
          function (e) {
            e.preventDefault();
            endBurn();
          },
          { passive: false },
        );
        engineBtn.addEventListener("touchcancel", function () {
          if (state.burn.holding) endBurn();
        });
        window.addEventListener("blur", function () {
          if (state.burn.holding) endBurn();
        });
        window.addEventListener("keydown", function (e) {
          if (e.code === "Space" && !e.repeat) {
            e.preventDefault();
            startBurn();
          }
        });
        window.addEventListener("keyup", function (e) {
          if (e.code === "Space") {
            e.preventDefault();
            endBurn();
          }
        });

        // --- Planet drag (home or destination) ---
        canvas.addEventListener("mousedown", function (e) {
          if (state.phase !== "prelaunch") return;
          const pos = getCanvasPos(e);
          const key = getNearPlanetKey(pos);
          if (key) {
            state.draggingKey = key;
            canvas.style.cursor = "grabbing";
            e.preventDefault();
          }
        });
        canvas.addEventListener("mousemove", function (e) {
          const pos = getCanvasPos(e);
          if (state.draggingKey) {
            state.dragDeltaT = computeDragDeltaT(pos, state.draggingKey);
            e.preventDefault();
          } else if (state.phase === "prelaunch") {
            const hoverKey = getNearPlanetKey(pos);
            if (hoverKey) {
              canvas.style.cursor = "grab";
              state.dragHoverKey = hoverKey;
            } else if (state.dragHoverKey) {
              canvas.style.cursor = "default";
              state.dragHoverKey = null;
            }
          }
        });
        canvas.addEventListener("mouseup", function () {
          if (state.draggingKey) {
            state.draggingKey = null;
            canvas.style.cursor = "default";
          }
        });
        canvas.addEventListener("mouseleave", function () {
          if (state.draggingKey) {
            state.draggingKey = null;
            canvas.style.cursor = "default";
          }
          state.dragHoverKey = null;
        });
        canvas.addEventListener(
          "touchstart",
          function (e) {
            if (state.phase !== "prelaunch") return;
            const pos = getCanvasPos(e);
            const key = getNearPlanetKey(pos);
            if (key) {
              state.draggingKey = key;
              e.preventDefault();
            }
          },
          { passive: false },
        );
        canvas.addEventListener(
          "touchmove",
          function (e) {
            if (state.draggingKey) {
              state.dragDeltaT = computeDragDeltaT(
                getCanvasPos(e),
                state.draggingKey,
              );
              e.preventDefault();
            }
          },
          { passive: false },
        );
        canvas.addEventListener("touchend", function () {
          if (state.draggingKey) state.draggingKey = null;
        });
        canvas.addEventListener("touchcancel", function () {
          if (state.draggingKey) state.draggingKey = null;
        });

        /* ══════════════════════════════════════════════ */
        /* UI Updates                                     */
        /* ══════════════════════════════════════════════ */

        function updateEngineBtn() {
          const btn = document.getElementById("engineBtn");
          btn.classList.remove("armed", "firing");
          btn.disabled = false;

          if (state.phase === "prelaunch") {
            if (isLaunchReady()) {
              btn.classList.add("armed");
            }
          } else if (state.phase === "burn") {
            btn.classList.add("firing");
          } else {
            btn.disabled = true;
          }
        }

        function updatePrompt() {
          const el = document.getElementById("canvasPrompt");
          el.classList.remove("highlight", "active", "cruise");
          let text = "";

          switch (state.phase) {
            case "prelaunch":
              if (!state.missionStarted) {
                text = T("promptStart");
              } else {
                text = T("promptReady");
                el.classList.add("highlight");
              }
              break;
            case "burn":
              text = T("promptFlip");
              el.classList.add("active");
              break;
            case "transit":
              if (state.flipStartWall === 0) {
                text = T("burning");
                el.classList.add("active");
              } else if (
                performance.now() - state.flipStartWall <
                (state.flipDurMs || FLIP_ANIM_MS)
              ) {
                text = T("flipping");
                el.classList.add("active");
              } else {
                text = T("promptBrake");
                el.classList.add("cruise");
              }
              break;
            case "captured":
              text = "";
              break;
            case "coasting":
              text = T("promptCoast");
              el.classList.add("cruise");
              break;
            case "result":
              if (state.overlayDismissed) text = T("clickDismiss");
              else text = "";
              break;
          }
          el.textContent = text;
          el.style.display = text ? "" : "none";
        }

        function updateStepIndicator() {
          const dots = [
            document.getElementById("stepDot1"),
            document.getElementById("stepDot2"),
            document.getElementById("stepDot3"),
          ];
          const labels = [
            document.getElementById("stepLbl1"),
            document.getElementById("stepLbl2"),
            document.getElementById("stepLbl3"),
          ];

          let step = 0;
          if (state.phase === "prelaunch" || state.phase === "burn") step = 0;
          else if (state.phase === "transit" || state.phase === "coasting")
            step = 1;
          else if (state.phase === "captured") step = 3;
          else if (state.phase === "result" && state.resultType === "success")
            step = 3;
          else step = 2;

          for (let i = 0; i < 3; i++) {
            dots[i].classList.remove("done", "current");
            labels[i].classList.remove("current");
            if (i < step) dots[i].classList.add("done");
            else if (i === step && step < 3) {
              dots[i].classList.add("current");
              labels[i].classList.add("current");
            } else if (step === 3) {
              dots[i].classList.add("done");
            }
          }

          document.getElementById("stepIndicator").style.display =
            state.phase === "result" ? "none" : "flex";
        }

        function updateBurnMeter() {
          const fillEl = document.getElementById("burnFill");
          const targetEl = document.getElementById("burnTarget");

          if (!state.burnZones) {
            targetEl.style.display = "none";
            fillEl.style.width = "0%";
            return;
          }

          const zones = state.burnZones;
          const accel = state.burn.accel;

          const pct = Math.min(100, state.burn.meterFrac * 100);
          fillEl.style.width = pct + "%";

          // Coloring
          fillEl.classList.remove("good", "over", "fatal");
          if (accel >= zones.aLow && accel <= zones.aHigh) {
            fillEl.classList.add("good");
          } else if (accel > zones.aHigh && accel <= zones.aFatal) {
            fillEl.classList.add("over");
          } else if (accel > zones.aFatal) {
            fillEl.classList.add("fatal");
          }

          // Green zone — edges come from the piecewise curve parameterization
          const edges = getGreenZoneEdges();
          if (edges.q - edges.p < 0.005) {
            targetEl.style.display = "none";
          } else {
            targetEl.style.display = "";
            targetEl.style.left = edges.p * 100 + "%";
            targetEl.style.width = (edges.q - edges.p) * 100 + "%";
          }
        }

        function updateReadouts() {
          const ref = state.ref;
          if (!ref) return;

          document.getElementById("missionVal").textContent =
            T(state.homeKey) + " \u2192 " + T(state.destKey);

          // Acceleration readout
          const brakingEl = document.getElementById("brakingVal");
          let a_g;
          if (state.phase === "burn" && state.burn.holding) {
            a_g = state.burn.accel / G_TO_AUYR2;
          } else if (state.burn.committed) {
            a_g = state.accelFinal / G_TO_AUYR2;
          } else {
            a_g = A_REF / G_TO_AUYR2;
          }
          brakingEl.textContent = a_g.toFixed(2) + " g";
          const bc = accelColor(a_g);
          brakingEl.style.color = "rgb(" + bc.r + "," + bc.g + "," + bc.b + ")";

          document.getElementById("dv1Val").textContent =
            (ref.dvDepart * AU_TO_KMS).toFixed(2) + " km/s";
          document.getElementById("dv2Val").textContent =
            (ref.dvArrive * AU_TO_KMS).toFixed(2) + " km/s";

          if (state.difficulty !== "hard") {
            const pDeg = (ref.phaseCurrent / DEG2RAD).toFixed(1);
            const idealDeg = (ref.phaseRequired / DEG2RAD).toFixed(1);
            document.getElementById("phaseVal").textContent =
              pDeg + "\u00b0 / " + idealDeg + "\u00b0";
          } else {
            document.getElementById("phaseVal").textContent = "\u2014";
          }

          let statusText;
          switch (state.phase) {
            case "prelaunch":
              statusText = state.missionStarted
                ? T("goodWindow")
                : T("waiting");
              break;
            case "burn":
              statusText = T("burning");
              break;
            case "transit":
              if (
                state.flipStartWall > 0 &&
                performance.now() - state.flipStartWall >=
                  (state.flipDurMs || FLIP_ANIM_MS)
              ) {
                statusText = T("brakingStatus");
              } else {
                statusText = T("burning");
              }
              break;
            case "coasting":
              statusText = T("coastingStatus");
              break;
            case "result":
              if (state.resultType === "success")
                statusText = T("resultSuccess");
              else if (state.resultType === "slow")
                statusText = T("resultSlow");
              else if (state.resultType === "fatal")
                statusText = T("resultFatal");
              else statusText = T("missed");
              break;
            default:
              statusText = "";
          }
          document.getElementById("statusVal").textContent = statusText;
        }

        function accelColor(a_g) {
          // Smooth gradient: green (0g) → yellow (5g) → orange (10g) → red (20g)
          const t = Math.min(1, Math.max(0, a_g / CREW_DEAD_G));
          let r, g, b, u;
          if (t < 0.25) {
            u = t / 0.25;
            r = Math.round(63 + (200 - 63) * u);
            g = Math.round(185 + (200 - 185) * u);
            b = Math.round(80 * (1 - u));
          } else if (t < 0.5) {
            u = (t - 0.25) / 0.25;
            r = Math.round(200 + (255 - 200) * u);
            g = Math.round(200 - (200 - 140) * u);
            b = 0;
          } else {
            u = (t - 0.5) / 0.5;
            r = 255;
            g = Math.round(140 * (1 - u));
            b = 0;
          }
          return { r: r, g: g, b: b };
        }

        function formatTransferTime(simYears) {
          const totalDays = simYears * 365.25;
          const days = Math.floor(totalDays);
          const hours = Math.floor((totalDays - days) * 24);
          const hStr = (hours < 10 ? "0" : "") + hours;
          if (days >= 365) {
            const yrs = (totalDays / 365.25).toFixed(1);
            return yrs + "yr";
          }
          return days + "d " + hStr + "h";
        }

        function updateAccelDisplay() {
          const accelEl = document.getElementById("accelDisplay");
          const timeEl = document.getElementById("transferTimeDisplay");
          const hudGroup = accelEl.parentElement;
          let a_g, accelText, timeText;

          if (state.phase === "burn" && state.burn.holding && state.transfer) {
            // Live: player is choosing acceleration
            a_g = state.burn.accel / G_TO_AUYR2;
            accelText = a_g.toFixed(2) + " g";
            // Projected transfer time decreases as accel increases
            if (state.burn.accel > 0) {
              const projT = 2 * Math.sqrt(state.transfer.L / state.burn.accel);
              timeText = formatTransferTime(projT);
            } else {
              timeText = state.ref ? formatTransferTime(state.ref.T_ref) : "";
            }
          } else if (state.phase === "transit") {
            // Constant acceleration throughout (symmetric)
            a_g = state.accelFinal / G_TO_AUYR2;
            accelText = a_g.toFixed(2) + " g";
            timeText =
              formatTransferTime(state.tauSim) +
              " / " +
              formatTransferTime(state.tActual);
          } else if (state.phase === "captured") {
            a_g = 0;
            accelText = "0 g";
            timeText = formatTransferTime(state.tActual);
          } else if (state.phase === "result" && state.burn.committed) {
            a_g = state.accelFinal / G_TO_AUYR2;
            accelText = a_g.toFixed(2) + " g";
            timeText = formatTransferTime(state.tActual);
          } else {
            // Prelaunch
            a_g = 0;
            accelText = "0 g";
            timeText = state.ref ? formatTransferTime(state.ref.T_ref) : "";
          }

          accelEl.textContent = accelText;
          timeEl.textContent = timeText;

          const c = accelColor(a_g);
          accelEl.style.color = "rgb(" + c.r + "," + c.g + "," + c.b + ")";
          accelEl.style.textShadow =
            "0 0 10px rgba(" + c.r + "," + c.g + "," + c.b + ",0.4)";

          hudGroup.classList.toggle("paused", !state.playing);
        }

        function updateWarpBtns() {
          const locked = state.warpLocked;
          const playing = state.playing;
          const nBtn = document.getElementById("warpNormalBtn");
          const fBtn = document.getElementById("warpFastBtn");
          const ffBtn = document.getElementById("warpFastestBtn");
          nBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "normal",
          );
          fBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "fast",
          );
          ffBtn.classList.toggle(
            "active",
            playing && !locked && state.warpLevel === "fastest",
          );
          nBtn.textContent =
            playing && state.warpLevel === "normal"
              ? "\u25ae\u25ae"
              : T("warpNormal");
          fBtn.textContent =
            playing && state.warpLevel === "fast"
              ? "\u25ae\u25ae"
              : T("warpFast");
          ffBtn.textContent =
            playing && state.warpLevel === "fastest"
              ? "\u25ae\u25ae"
              : T("warpFastest");
          nBtn.disabled = locked;
          fBtn.disabled = locked;
          ffBtn.disabled = locked;
        }

        /* ══════════════════════════════════════════════ */
        /* Controls                                       */
        /* ══════════════════════════════════════════════ */

        function populateHomeSelect() {
          const sel = document.getElementById("homeSelect");
          sel.textContent = "";
          for (let i = 0; i < PLANET_KEYS.length; i++) {
            const opt = document.createElement("option");
            opt.value = PLANET_KEYS[i];
            opt.textContent = T(PLANET_KEYS[i]);
            if (PLANET_KEYS[i] === state.homeKey) opt.selected = true;
            sel.appendChild(opt);
          }
        }

        function getReachablePlanets(homeKey) {
          const idx = PLANET_KEYS.indexOf(homeKey);
          const lo = Math.max(0, idx - 3);
          const hi = Math.min(PLANET_KEYS.length - 1, idx + 3);
          const result = [];
          for (let i = lo; i <= hi; i++) {
            if (i !== idx) result.push(PLANET_KEYS[i]);
          }
          return result;
        }

        function populateDestSelect() {
          const sel = document.getElementById("destSelect");
          sel.textContent = "";
          const reachable = getReachablePlanets(state.homeKey);
          for (let i = 0; i < reachable.length; i++) {
            const opt = document.createElement("option");
            opt.value = reachable[i];
            opt.textContent = T(reachable[i]);
            if (reachable[i] === state.destKey) opt.selected = true;
            sel.appendChild(opt);
          }
          if (reachable.indexOf(state.destKey) === -1) {
            state.destKey = reachable[0];
            sel.value = state.destKey;
          }
        }

        document
          .getElementById("homeSelect")
          .addEventListener("change", function (e) {
            state.homeKey = e.target.value;
            state.dragDeltaT = 0;
            populateDestSelect();
            recalcMission();
            resetMission();
          });

        document
          .getElementById("destSelect")
          .addEventListener("change", function (e) {
            state.destKey = e.target.value;
            state.dragDeltaT = 0;
            recalcMission();
            resetMission();
          });

        function setDifficulty(d) {
          state.difficulty = d;
          document
            .getElementById("diffEasyBtn")
            .classList.toggle("active", d === "easy");
          document
            .getElementById("diffMediumBtn")
            .classList.toggle("active", d === "medium");
          document
            .getElementById("diffHardBtn")
            .classList.toggle("active", d === "hard");

          state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
          state.timeWarp =
            state.warpLevels[state.warpLevel] || state.warpLevels.normal;
          updateBurnMeter();
          updateReadouts();
        }

        function setWarp(level) {
          if (state.warpLocked) return;
          if (state.playing && state.warpLevel === level) {
            state.playing = false;
          } else {
            state.warpLevel = level;
            state.timeWarp = state.warpLevels[level] || state.warpLevels.normal;
            if (!state.playing) {
              state.playing = true;
              if (!state.missionStarted) state.missionStarted = true;
            }
          }
          updateWarpBtns();
          updateAccelDisplay();
        }

        function resetMission() {
          state.simTime = currentEpochYears();
          state.dragDeltaT = 0;
          state.imcceOffset = null;
          state.imcceFetching = false;
          state.pairSpeedScale = computePairSpeedScale(
            state.homeKey,
            state.destKey,
          );
          state.phase = "prelaunch";
          state.burn = {
            holding: false,
            holdStart: 0,
            holdDuration: 0,
            accel: 0,
            meterFrac: 0,
            committed: false,
          };
          state.sc = { x: 0, y: 0, launched: false, trail: [] };
          state.transfer = null;
          state.burnZones = null;
          state.tauFlip = 0;
          state.tauSim = 0;
          state.launchSimTime = 0;
          state.flipTrailIdx = 0;
          state.accelFinal = 0;
          state.tActual = 0;
          state.flipStartWall = 0;
          state.flipAngle = 0;
          state.flipDurMs = 0;
          state.captureStart = 0;
          state.captureAlpha = 1;
          state.resultType = null;
          state.resultSubtype = null;
          state.solarClearance = Infinity;
          state.solarDeathStart = 0;
          state.insetScAngle = 0;
          state.overlayDismissed = false;
          state.postResultStart = 0;
          state.windowOpenSimTime = 0;
          state.windowWasOpen = false;
          state.warpLocked = false;
          state.phaseAtLaunch = 0;
          state.coastStart = 0;
          state.playing = false;
          state.missionStarted = false;
          state.warpLevel = "normal";
          state.timeWarp = state.warpLevels.normal;
          trailAccum = 0;

          const existing = document.querySelector(".result-overlay");
          if (existing) existing.remove();

          updateEngineBtn();
          updateBurnMeter();
          updateWarpBtns();
          updateReadouts();
          updateAccelDisplay();
          fetchIMCCEPositions();

          document.getElementById("burnFill").style.width = "0%";
          document
            .getElementById("burnFill")
            .classList.remove("good", "over", "fatal");
          document.getElementById("burnTarget").style.display = "none";
        }

        function recalcMission() {
          computeGuidePaths();
          state.pairSpeedScale = computePairSpeedScale(
            state.homeKey,
            state.destKey,
          );
          state.ref = computeFlipBurnRef(
            state.homeKey,
            state.destKey,
            state.simTime,
          );
          state.warpLevels = computeWarpLevels(state.homeKey, state.destKey);
          state.timeWarp = state.warpLevels.normal;
          state.warpLevel = "normal";
          const auto = computeAutoCamera();
          state.camera.targetScale = auto.scale;
          state.camera.cx = auto.cx;
          state.camera.cy = auto.cy;
          state.camera.scale = auto.scale;
          updateReadouts();
          updateBurnMeter();
          updateWarpBtns();
        }

        /* ══════════════════════════════════════════════ */
        /* Localization                                   */
        /* ══════════════════════════════════════════════ */

        function applyTranslations() {
          document.title = T("title");
          document.documentElement.lang = state.lang;
          document.getElementById("titleText").textContent = T("title");
          document.getElementById("subtitleText").textContent = T("subtitle");
          document.getElementById("lblHome").textContent = T("home");
          document.getElementById("lblDest").textContent = T("destination");
          document.getElementById("lblDifficulty").textContent =
            T("difficulty");
          document.getElementById("diffEasyBtn").textContent = T("easy");
          document.getElementById("diffMediumBtn").textContent = T("medium");
          document.getElementById("diffHardBtn").textContent = T("hard");
          document.getElementById("lblTimeWarp").textContent = T("timeWarp");
          document.getElementById("warpNormalBtn").textContent =
            T("warpNormal");
          document.getElementById("warpFastBtn").textContent = T("warpFast");
          document.getElementById("warpFastestBtn").textContent =
            T("warpFastest");
          document.getElementById("lblBurn").textContent = T("burn");
          updateEngineBtn();
          document.getElementById("lblMission").textContent = T("mission");
          document.getElementById("lblBraking").textContent = T("braking");
          document.getElementById("lblDv1").textContent = T("dv1");
          document.getElementById("lblDv2").textContent = T("dv2");
          document.getElementById("lblPhase").textContent = T("phase");
          document.getElementById("lblStatus").textContent = T("status");
          document.getElementById("resetBtn").textContent = T("reset");
          const infoEl = document.getElementById("infoText");
          infoEl.textContent = "";
          const parsed = new DOMParser().parseFromString(
            T("info"),
            "text/html",
          );
          while (parsed.body.firstChild) {
            infoEl.appendChild(parsed.body.firstChild);
          }
          document.getElementById("langBtn").textContent =
            state.lang === "en" ? "PL" : "EN";

          document.getElementById("stepLbl1").textContent =
            "1 " + T("stepLaunch");
          document.getElementById("stepLbl2").textContent =
            "2 " + T("stepFlip");
          document.getElementById("stepLbl3").textContent =
            "3 " + T("stepArrive");

          populateHomeSelect();
          populateDestSelect();
          updateReadouts();
          updateAccelDisplay();
          updateDataSource();
        }

        function toggleLang() {
          state.lang = state.lang === "en" ? "pl" : "en";
          applyTranslations();
        }

        /* ══════════════════════════════════════════════ */
        /* Animation Loop                                 */
        /* ══════════════════════════════════════════════ */

        let lastTimestamp = 0;
        let trailAccum = 0;
        let rafId = 0;

        function animate(timestamp) {
          if (!lastTimestamp) lastTimestamp = timestamp;
          const dtReal = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
          lastTimestamp = timestamp;

          if (state.playing && state.phase !== "result") {
            let dtSim;

            switch (state.phase) {
              case "prelaunch":
                if (!state.draggingKey) {
                  dtSim =
                    dtReal * state.timeWarp * SIM_RATE * state.pairSpeedScale;
                  state.simTime += dtSim;
                }
                state.insetScAngle += dtReal * 2.0;

                // Throttle reference computation (Astronomy Engine is heavier)
                if (timestamp - (state.lastRefCalcMs || 0) > 100) {
                  state.ref = computeFlipBurnRef(
                    state.homeKey,
                    state.destKey,
                    state.simTime,
                  );
                  state.lastRefCalcMs = timestamp;
                }

                updateEngineBtn();
                break;

              case "burn":
                // simTime frozen. Accumulate acceleration from wall-clock.
                if (state.burn.holding) {
                  state.burn.holdDuration =
                    (performance.now() - state.burn.holdStart) / 1000;
                  state.burn.meterFrac = Math.min(
                    1,
                    state.burn.holdDuration / BURN_FILL_SEC,
                  );
                  const edges = getGreenZoneEdges();
                  state.burn.accel =
                    meterToAccelG(state.burn.meterFrac, edges.p, edges.q) *
                    G_TO_AUYR2;
                  updateBurnMeter();
                }
                break;

              case "transit":
                // Solar death freeze — ship frozen, dissolving
                if (state.solarDeathStart > 0) {
                  const deathElapsed =
                    (performance.now() - state.solarDeathStart) / 1000;
                  if (deathElapsed >= 2.0) {
                    state.phase = "result";
                    showResultOverlay();
                  }
                  break;
                }

                // Animate transit: 10s at 0.3g (snail), 4s at 20g (deadly)
                const accelG = state.accelFinal / G_TO_AUYR2;
                const transitSec =
                  10 -
                  (6 * (accelG - METER_MIN_G)) / (METER_MAX_G - METER_MIN_G);
                const cruiseWarp = state.tActual / (transitSec * SIM_RATE);
                dtSim = dtReal * cruiseWarp * SIM_RATE;
                state.tauSim += dtSim;
                state.simTime += dtSim;

                const pos = getTransferLinePosition(state.tauSim);
                state.sc.x = pos.x;
                state.sc.y = pos.y;

                // Trail
                trailAccum += dtSim;
                let trailInterval = state.tActual / 500;
                if (trailInterval < 0.0001) trailInterval = 0.0001;
                while (trailAccum >= trailInterval) {
                  trailAccum -= trailInterval;
                  state.sc.trail.push({ x: pos.x, y: pos.y });
                  if (state.sc.trail.length > 5000) state.sc.trail.splice(0, 1);
                }

                state.insetScAngle += dtReal * 1.5;

                // Trigger flip animation when reaching the flip point
                if (
                  state.tauSim >= state.tauFlip &&
                  state.flipStartWall === 0
                ) {
                  state.flipStartWall = performance.now();
                  state.flipTrailIdx = state.sc.trail.length;
                  // Flip must finish well before arrival — cap at 1/6 of remaining wall-clock time
                  const remainingWallMs =
                    ((state.tActual - state.tauFlip) /
                      (cruiseWarp * SIM_RATE)) *
                    1000;
                  state.flipDurMs = Math.min(FLIP_ANIM_MS, remainingWallMs / 6);
                  state.flipDurMs = Math.max(state.flipDurMs, 100); // floor at 100ms
                }

                // Update flip angle (wall-clock driven within transit)
                if (state.flipStartWall > 0) {
                  const flipElapsed = performance.now() - state.flipStartWall;
                  const flipDur = state.flipDurMs || FLIP_ANIM_MS;
                  state.flipAngle =
                    Math.PI * Math.min(1, flipElapsed / flipDur);
                }

                // Solar proximity check — freeze and dissolve
                const sunDist = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
                if (
                  sunDist < SOLAR_KILL_RADIUS &&
                  state.solarDeathStart === 0
                ) {
                  state.solarDeathStart = performance.now();
                  state.resultType = "fatal";
                  state.resultSubtype = "solar";
                  break;
                }

                // Check completion — ship always reaches destination (symmetric transfer)
                if (state.tauSim >= state.tActual) {
                  if (
                    state.resultType === "success" ||
                    state.resultType === "close" ||
                    state.resultType === "slow"
                  ) {
                    state.phase = "captured";
                    state.captureStart = performance.now();
                    state.captureAlpha = 1;
                  } else {
                    // Fatal from g-force — ship arrives but crew is dead
                    state.phase = "result";
                    showResultOverlay();
                  }
                }
                break;

              case "captured":
                const captureElapsed =
                  (performance.now() - state.captureStart) / 1000;
                const DISSOLVE_DUR = 0.5;
                const POST_CAPTURE_DUR = 2.0;

                if (captureElapsed < DISSOLVE_DUR) {
                  const ct = captureElapsed / DISSOLVE_DUR;
                  if (ct > 0.4) {
                    state.captureAlpha = 1 - (ct - 0.4) / 0.6;
                  }
                } else {
                  state.captureAlpha = 0;
                  state.simTime += dtReal * SIM_RATE * state.pairSpeedScale;
                }

                state.insetScAngle += dtReal * 2.0;

                if (captureElapsed >= DISSOLVE_DUR + POST_CAPTURE_DUR) {
                  state.phase = "result";
                  showResultOverlay();
                }
                break;

              case "coasting":
                // Ship stopped, destination moves away
                state.simTime += dtReal * SIM_RATE * state.pairSpeedScale;
                state.insetScAngle += dtReal * 0.5;
                if ((performance.now() - state.coastStart) / 1000 > 4.0) {
                  state.phase = "result";
                  showResultOverlay();
                }
                break;
            }
          }

          // Keep sim running during result
          if (state.phase === "result") {
            state.simTime += dtReal * SIM_RATE * state.pairSpeedScale;
          }

          // Auto-reset
          if (state.phase === "result" && state.overlayDismissed) {
            if ((performance.now() - state.postResultStart) / 1000 > 3.0) {
              resetMission();
            }
          }

          const auto = computeAutoCamera();
          state.camera.cx = 0;
          state.camera.cy = 0;
          state.camera.scale = auto.scale;

          drawScene();
          drawInset();
          updateReadouts();
          updatePrompt();
          updateStepIndicator();
          updateAccelDisplay();

          rafId = requestAnimationFrame(animate);
        }

        /* ══════════════════════════════════════════════ */
        /* Init                                           */
        /* ══════════════════════════════════════════════ */

        document
          .getElementById("canvas")
          .addEventListener("click", function () {
            if (state.phase === "result" && state.overlayDismissed) {
              resetMission();
            }
          });

        function init() {
          resize();
          recalcMission();
          applyTranslations();
          setDifficulty("easy");
          updateWarpBtns();
          updateEngineBtn();
          updatePrompt();
          updateStepIndicator();
          updateAccelDisplay();
          fetchIMCCEPositions();

          document
            .getElementById("langBtn")
            .addEventListener("click", toggleLang);
          document
            .getElementById("diffEasyBtn")
            .addEventListener("click", function () {
              setDifficulty("easy");
            });
          document
            .getElementById("diffMediumBtn")
            .addEventListener("click", function () {
              setDifficulty("medium");
            });
          document
            .getElementById("diffHardBtn")
            .addEventListener("click", function () {
              setDifficulty("hard");
            });
          document
            .getElementById("warpNormalBtn")
            .addEventListener("click", function () {
              setWarp("normal");
            });
          document
            .getElementById("warpFastBtn")
            .addEventListener("click", function () {
              setWarp("fast");
            });
          document
            .getElementById("warpFastestBtn")
            .addEventListener("click", function () {
              setWarp("fastest");
            });
          document
            .getElementById("resetBtn")
            .addEventListener("click", resetMission);

          rafId = requestAnimationFrame(animate);
        }

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            cancelAnimationFrame(rafId);
            lastTimestamp = 0;
          } else {
            lastTimestamp = 0;
            rafId = requestAnimationFrame(animate);
          }
        });

        init();
      })();
    </script>
  </body>
</html>
