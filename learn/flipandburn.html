<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta

      content="Flip and Burn Transfer Game — time your launch and flip to transfer between neighboring planets on a straight-line Epstein drive trajectory."
    />
    <meta name="author" content="Łukasz Łepecki" />

    <meta property="og:title" content="Flip and Burn Transfer Game" />
    <meta
      property="og:description"
      content="Flip and Burn Transfer Game — time your launch and flip to transfer between neighboring planets on a straight-line Epstein drive trajectory."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://lepecki.com/learn/flipandburn.html"
    />
    <meta property="og:site_name" content="Łukasz Łepecki" />
    <meta
      property="og:image"
      content="https://lepecki.com/assets/img/avatar.webp"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Flip and Burn Transfer Game" />
    <meta
      name="twitter:description"
      content="Flip and Burn Transfer Game — time your launch and flip to transfer between neighboring planets on a straight-line Epstein drive trajectory."
    />
    <title>Flip and Burn Transfer Game</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0f18;
        --panel: #131825;
        --panel-border: #1e2a3a;
        --text: #c9d1d9;
        --text-dim: #6e7a8a;
        --accent: #58a6ff;
        --gain: #3fb950;
        --loss: #f97583;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Outfit", sans-serif;
        color: var(--text);
      }

      header {
        padding: 20px 28px 16px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .header-text {
        flex: 1;
      }
      header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      header h1 a {
        color: inherit;
        text-decoration: none;
      }
      header h1 a:hover {
        opacity: 0.7;
      }
      header p {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .lang-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .main {
        display: flex;
        height: calc(100vh - 80px);
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        background: #080c14;
        min-width: 0;
      }
      .canvas-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .controls {
        width: 300px;
        flex-shrink: 0;
        padding: 20px;
        border-left: 1px solid var(--panel-border);
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
      }

      .type-toggle {
        display: flex;
        gap: 6px;
      }
      .type-btn {
        padding: 10px 4px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        flex: 1;
      }
      .type-btn:hover:not(:disabled) {
        border-color: var(--accent);
      }
      .type-btn.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .type-btn:disabled {
        opacity: 0.3;
        pointer-events: none;
      }
      .type-btn.full-width {
        flex: none;
        width: 100%;
      }

      .planet-select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        outline: none;
      }
      .planet-select:focus {
        border-color: var(--accent);
      }
      .planet-select option {
        background: var(--panel);
        color: var(--text);
      }

      .readouts {
        gap: 6px;
      }
      .readout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
      }
      .readout-label {
        color: var(--text-dim);
      }
      .readout-val {
        color: var(--text);
      }

      /* Engine button */
      .engine-btn {
        width: 100px;
        height: 100px;
        border-radius: 20px;
        border: none;
        outline: none;
        background:
          radial-gradient(
            circle at 38% 32%,
            rgba(255, 255, 255, 0.25),
            transparent 45%
          ),
          radial-gradient(circle, #e53935 0%, #d32f2f 50%, #b71c1c 100%);
        color: transparent;
        font-size: 0;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.3),
          0 0 0 3px rgba(180, 220, 220, 0.5),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 6px 20px rgba(0, 0, 0, 0.5);
        margin: 28px auto 8px;
        display: block;
      }
      .engine-btn.armed {
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.3),
          0 0 0 3px rgba(88, 166, 255, 0.7),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 0 20px rgba(88, 166, 255, 0.3);
        animation: pulseEngine 1.5s ease-in-out infinite;
      }
      .engine-btn.firing {
        background:
          radial-gradient(
            circle at 38% 32%,
            rgba(255, 255, 255, 0.35),
            transparent 45%
          ),
          radial-gradient(circle, #ff7043 0%, #f4511e 50%, #e64a19 100%);
        box-shadow:
          inset 0 -4px 6px rgba(0, 0, 0, 0.2),
          0 0 0 3px rgba(63, 185, 80, 0.7),
          0 0 0 14px #9e9e9e,
          0 0 0 16px #757575,
          0 0 24px rgba(255, 87, 34, 0.5);
        animation: none;
      }
      .engine-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        animation: none;
      }
      .engine-btn:active:not(:disabled) {
        transform: scale(0.96);
      }
      @keyframes pulseEngine {
        0%,
        100% {
          box-shadow:
            inset 0 -4px 6px rgba(0, 0, 0, 0.3),
            0 0 0 3px rgba(88, 166, 255, 0.7),
            0 0 0 14px #9e9e9e,
            0 0 0 16px #757575,
            0 0 0 0 rgba(88, 166, 255, 0);
        }
        50% {
          box-shadow:
            inset 0 -4px 6px rgba(0, 0, 0, 0.3),
            0 0 0 3px rgba(88, 166, 255, 0.9),
            0 0 0 14px #9e9e9e,
            0 0 0 16px #757575,
            0 0 20px 6px rgba(88, 166, 255, 0.35);
        }
      }

      /* Burn meter */
      .burn-meter-wrap {
        position: relative;
        width: 100%;
        height: 40px;
      }
      .burn-meter {
        width: 100%;
        height: 36px;
        margin-top: 0;
        background: var(--panel-border);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .burn-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 4px;
        transition: background 0.15s;
      }
      .burn-fill.over {
        background: var(--loss);
      }
      .burn-fill.good {
        background: var(--gain);
      }
      .burn-fill.fatal {
        background: #8b0000;
      }
      .burn-target {
        position: absolute;
        top: 0;
        height: 100%;
        border-left: 3px solid #1a7f37;
        border-right: 3px solid #1a7f37;
        background: rgba(63, 185, 80, 0.15);
        pointer-events: none;
      }

      .info-text {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
      }

      /* Canvas prompt overlay */
      .canvas-prompt {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 20px;
        border-radius: 8px;
        background: rgba(11, 15, 24, 0.85);
        border: 1px solid var(--panel-border);
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dim);
        text-align: center;
        pointer-events: none;
        transition:
          color 0.3s,
          border-color 0.3s;
        white-space: nowrap;
        z-index: 10;
      }
      .canvas-prompt.highlight {
        color: var(--gain);
        border-color: var(--gain);
        animation: promptPulse 1s ease-in-out infinite;
      }
      .canvas-prompt.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      .canvas-prompt.cruise {
        color: var(--text-dim);
        border-color: var(--panel-border);
      }
      @keyframes promptPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
        }
        50% {
          box-shadow: 0 0 14px 3px rgba(63, 185, 80, 0.3);
        }
      }

      /* HUD group (top-left overlay) */
      .hud-group {
        position: absolute;
        top: 16px;
        left: 16px;
        pointer-events: none;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .met-clock {
        padding: 8px 18px;
        background: rgba(11, 15, 24, 0.88);
        border: 1px solid var(--panel-border);
        font-family: "Share Tech Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--gain);
        text-shadow: 0 0 10px rgba(63, 185, 80, 0.4);
        transition:
          color 0.3s,
          text-shadow 0.3s,
          opacity 0.3s;
        min-width: 110px;
        text-align: center;
      }
      .met-clock.is-top {
        border-radius: 8px 8px 0 0;
        border-bottom: none;
      }
      .met-clock.is-bottom {
        border-radius: 0 0 8px 8px;
        border-top: none;
      }
      .hud-group.paused {
        opacity: 0.7;
      }

      /* Step indicator */
      .step-indicator {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        pointer-events: none;
        z-index: 10;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
      }
      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1.5px solid var(--text-dim);
        background: transparent;
        transition: all 0.3s;
      }
      .step-dot.done {
        background: var(--gain);
        border-color: var(--gain);
      }
      .step-dot.current {
        border-color: var(--accent);
        box-shadow: 0 0 6px rgba(88, 166, 255, 0.5);
      }
      .step-label {
        color: var(--text-dim);
        margin: 0 2px;
      }
      .step-label.current {
        color: var(--accent);
      }

      /* Inset */
      .inset-wrap {
        position: absolute;
        left: 12px;
        bottom: 12px;
        width: 150px;
        height: 150px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
        pointer-events: none;
      }
      .inset-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Data source indicator */
      .data-source {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        z-index: 10;
      }
      .data-source-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #e05030;
        box-shadow: 0 0 6px rgba(224, 80, 48, 0.6);
        transition:
          background 0.4s,
          box-shadow 0.4s;
      }
      .data-source.fetching .data-source-dot {
        background: #d29922;
        box-shadow: 0 0 6px rgba(210, 153, 34, 0.6);
      }
      .data-source.online .data-source-dot {
        background: #3fb950;
        box-shadow: 0 0 6px rgba(63, 185, 80, 0.6);
      }
      .ds-panel {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        z-index: 15;
        display: none;
        background: rgba(19, 24, 37, 0.95);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 14px 16px;
        width: 320px;
        pointer-events: none;
        font-family: "Share Tech Mono", monospace;
        font-size: 15px;
        color: var(--text);
        line-height: 1.5;
      }
      .data-source:hover .ds-panel,
      .data-source:focus-within .ds-panel {
        display: block;
      }
      .ds-header {
        font-family: "Outfit", sans-serif;
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .ds-meta {
        color: var(--text-dim);
        font-size: 13px;
        margin-bottom: 10px;
      }
      .ds-stats {
        margin-bottom: 10px;
      }
      .ds-stat {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
        font-size: 13px;
      }
      .ds-stat-label {
        color: var(--text-dim);
      }
      .ds-desc {
        border-top: 1px solid var(--panel-border);
        padding-top: 8px;
        color: var(--text-dim);
        font-size: 13px;
        line-height: 1.5;
      }

      /* Result overlay */
      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: overlayFadeIn 0.3s ease;
      }
      .overlay-emoji {
        font-size: 72px;
        animation: overlayPop 0.4s ease;
      }
      .overlay-msg {
        font-family: "Outfit", sans-serif;
        font-size: 24px;
        font-weight: 700;
        margin-top: 16px;
        color: #fff;
      }
      .overlay-sub {
        font-family: "Share Tech Mono", monospace;
        font-size: 14px;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.85);
      }
      .overlay-hint {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.5);
      }

      @keyframes overlayFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes overlayPop {
        0% {
          transform: scale(0.3);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (max-width: 700px) {
        .main {
          flex-direction: column;
        }
        .canvas-wrap {
          min-height: 350px;
          flex: 1;
        }
        .controls {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
          border-left: none;
          border-top: 1px solid var(--panel-border);
          padding: 12px 16px;
          gap: 12px;
        }
        .ctrl-group {
          min-width: 140px;
          flex: 1;
        }
        .hud-group {
          top: 10px;
          left: 10px;
        }
        .met-clock {
          font-size: 14px;
          padding: 6px 14px;
          min-width: 90px;
        }
        .data-source {
          top: 10px;
          right: 10px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .engine-btn.armed {
          animation: none;
        }
        .canvas-prompt.highlight {
          animation: none;
        }
        .overlay-emoji {
          animation: none;
        }
        .result-overlay {
          animation: none;
        }
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms;
        }
      }

      .header-emoji {
        font-size: 18px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>
          <a href="/learn/"><span class="header-emoji">&#x1F680;</span></a>
          <span id="titleText">Flip and Burn</span>
        </h1>
        <p id="subtitleText">
          Time your launch and flip to transfer between planets on a
          straight-line Epstein drive trajectory.
        </p>
      </div>
      <button
        type="button"
        class="lang-btn"
        id="langBtn"
        aria-label="Switch language"
        title="Switch language"
      >
        PL
      </button>
    </header>

    <main class="main">
      <div class="canvas-wrap">
        <canvas
          id="canvas"
          aria-label="Flip and burn transfer simulation"
        ></canvas>
        <div class="hud-group">
          <div class="met-clock is-top" id="accelDisplay">0 g</div>
          <div class="met-clock is-bottom" id="transferTimeDisplay"></div>
        </div>
        <div class="canvas-prompt" id="canvasPrompt"></div>
        <div class="step-indicator" id="stepIndicator">
          <span class="step-label current" id="stepLbl1">1 Launch</span>
          <div class="step-dot current" id="stepDot1"></div>
          <span class="step-label" id="stepLbl2">2 Flip</span>
          <div class="step-dot" id="stepDot2"></div>
          <span class="step-label" id="stepLbl3">3 Arrive</span>
          <div class="step-dot" id="stepDot3"></div>
        </div>
        <div class="inset-wrap">
          <canvas
            id="insetCanvas"
            aria-label="Inset planet approach view"
          ></canvas>
        </div>
        <div class="data-source" id="dataSource">
          <span class="data-source-dot"></span>
          <div class="ds-panel" id="dsPanel">
            <div class="ds-header" id="dsHeader"></div>
            <div class="ds-meta" id="dsMeta"></div>
            <div class="ds-stats" id="dsStats"></div>
            <div class="ds-desc" id="dsDesc"></div>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-group">
          <span class="ctrl-label" id="lblHome">Home</span>
          <select
            class="planet-select"
            id="homeSelect"
            aria-label="Home planet"
          ></select>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblDest">Destination</span>
          <select
            class="planet-select"
            id="destSelect"
            aria-label="Destination planet"
          ></select>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblDifficulty">Difficulty</span>
          <div class="type-toggle">
            <button
              type="button"
              class="type-btn active"
              id="diffEasyBtn"
              aria-label="Easy difficulty"
            >
              &#x2605;
            </button>
            <button
              type="button"
              class="type-btn"
              id="diffMediumBtn"
              aria-label="Medium difficulty"
            >
              &#x2605;&#x2605;
            </button>
            <button
              type="button"
              class="type-btn"
              id="diffHardBtn"
              aria-label="Hard difficulty"
            >
              &#x2605;&#x2605;&#x2605;
            </button>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label" id="lblTimeWarp">Time Warp</span>
          <div class="type-toggle">
            <button
              type="button"
              class="type-btn active"
              id="warpNormalBtn"
              aria-label="Normal speed"
            >
              &#x25b6;
            </button>
            <button
              type="button"
              class="type-btn"
              id="warpFastBtn"
              aria-label="Fast speed"
            >
              &#x25b6;&#x25b6;
            </button>
            <button
              type="button"
              class="type-btn"
              id="warpFastestBtn"
              aria-label="Fastest speed"
            >
              &#x25b6;&#x25b6;&#x25b6;
            </button>
            <button
              type="button"
              class="type-btn"
              id="resetBtn"
              aria-label="Reset mission"
            >
              &#x25a0;
            </button>
          </div>
        </div>

        <div class="ctrl-group">
          <button
            type="button"
            class="engine-btn"
            id="engineBtn"
            aria-label="Engine control"
          ></button>
        </div>

        <div class="ctrl-group" id="grpBurnMeter">
          <span class="ctrl-label" id="lblBurn">Burn</span>
          <div class="burn-meter-wrap">
            <div class="burn-meter">
              <div class="burn-target" id="burnTarget"></div>
              <div class="burn-fill" id="burnFill"></div>
            </div>
          </div>
        </div>

        <div class="ctrl-group readouts" id="grpReadouts">
          <div class="readout-row">
            <span class="readout-label" id="lblMission">Mission</span>
            <span class="readout-val" id="missionVal">&mdash;</span>
          </div>
          <div class="readout-row">
            <span class="readout-label" id="lblBraking">Braking</span>
            <span class="readout-val" id="brakingVal">&mdash;</span>
          </div>
          <div class="readout-row">

        function wrapAngle(a) {
          a = a % TWO_PI;
          if (a > Math.PI) a -= TWO_PI;
          if (a < -Math.PI) a += TWO_PI;
          return a;
        }

        function astroPosition(bodyKey, t) {
          const date = new Date(J2000_MS + t * MS_PER_YEAR);
          const time = Astronomy.MakeTime(date);
          const eqj = Astronomy.HelioVector(ASTRO_BODY[bodyKey], time);
          const ecl = Astronomy.RotateVector(EQJ_TO_ECL, eqj);
          return { x: ecl.x, y: ecl.y };
        }

        function helioPositionRaw(body, t) {
          if (body.key === "sun") return { x: 0, y: 0 };
          const pos = astroPosition(body.key, t);
          if (state.imcceOffset && state.imcceOffset[body.key]) {
            pos.x += state.imcceOffset[body.key].x;
            pos.y += state.imcceOffset[body.key].y;
          }
          return pos;
        }

        function helioPosition(body, t) {
          return helioPositionRaw(body, t + state.dragDeltaT);
        }

        function helioVelocity(body, t) {
          if (body.key === "sun") return { vx: 0, vy: 0 };
          const dt = 1e-6;
          const p1 = helioPosition(body, t - dt);
          const p2 = helioPosition(body, t + dt);
          return {
            vx: (p2.x - p1.x) / (2 * dt),
            vy: (p2.y - p1.y) / (2 * dt),
          };
        }

        function computeGuidePaths() {
          const bodies = [bodyByKey[state.homeKey], bodyByKey[state.destKey]];
          for (let b = 0; b < bodies.length; b++) {
            const body = bodies[b];
            if (body.key === "sun") continue;
            const path = [];
            const dt = body.T / GUIDE_SAMPLES;
            let maxR = 0;
            for (let i = 0; i <= GUIDE_SAMPLES; i++) {
              const pos = helioPositionRaw(body, state.simTime + i * dt);
              path.push(pos);
              const r = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
              if (r > maxR) maxR = r;
            }
            body.guidePath = path;
            body.maxHelioR = maxR;
          }
        }

        function computeDragDeltaT(canvasPos, planetKey) {
          const body = bodyByKey[planetKey];
          const world = fromCanvas(canvasPos.x, canvasPos.y);
          const targetAngle = Math.atan2(world.y, world.x);
          const basePos = helioPositionRaw(body, state.simTime);
          const baseAngle = Math.atan2(basePos.y, basePos.x);
          let dAngle = targetAngle - baseAngle;
          while (dAngle > Math.PI) dAngle -= TWO_PI;
          while (dAngle < -Math.PI) dAngle += TWO_PI;
          const n = TWO_PI / body.T;
          return dAngle / n;
        }

        /* ══════════════════════════════════════════════ */
        /* IMCCE Observatory Sync                         */
        /* ══════════════════════════════════════════════ */

        function formatOffsetKm(v) {
          const km = v * KM_PER_AU;
          const sign = km >= 0 ? "+" : "";
          if (Math.abs(km) >= 100)
            return sign + Math.round(km).toLocaleString() + " km";
          return sign + km.toFixed(1) + " km";
        }

        const IMCCE_URL =
          "https://ssp.imcce.fr/webservices/miriade/api/ephemcc.php";
        const IMCCE_PLANETS = [
          "Mercury",
          "Venus",
          "Earth",
          "Mars",
          "Jupiter",
          "Saturn",
          "Uranus",
          "Neptune",
        ];

        function fetchIMCCEPositions() {
          state.imcceFetching = true;
          const t = state.simTime;
          const ep = new Date().toISOString().slice(0, 19);
          const promises = IMCCE_PLANETS.map(function (name) {
            const url =
              IMCCE_URL +
              "?-name=p:" +
              name +
              "&-ep=" +
              ep +
              "&-observer=@sun&-tcoor=2&-rplane=2&-mime=json&-nbd=1&-step=1d";
            return fetch(url).then(function (r) {
              return r.json();
            });
          });
          function afterFetch() {
            computeGuidePaths();
          }
          Promise.all(promises)
            .then(function (results) {
              const offsets = {};
              for (let i = 0; i < results.length; i++) {
                const d = results[i].data;
                if (d && d[0]) {
                  const key = IMCCE_PLANETS[i].toLowerCase();
                  const imcce = {
                    x: parseFloat(d[0].px),
                    y: parseFloat(d[0].py),
                  };
                  const astro = astroPosition(key, t);
                  offsets[key] = {
                    x: imcce.x - astro.x,
                    y: imcce.y - astro.y,
                  };
                }
              }
              if (Object.keys(offsets).length > 0) state.imcceOffset = offsets;
              state.imcceFetching = false;
              afterFetch();
            })
            .catch(function () {
              state.imcceFetching = false;
              afterFetch();
            });
        }

        function updateDataSource() {
          const wrap = document.getElementById("dataSource");
          const online = !!state.imcceOffset;
          const fetching = state.imcceFetching && !online;
          wrap.classList.toggle("online", online);
          wrap.classList.toggle("fetching", fetching);
          let title, meta, desc, color;
          if (online) {
            title = T("dsOnlineTitle");
            meta = T("dsOnlineMeta");
            desc = T("dsOnlineDesc");
            color = "#3fb950";
          } else if (fetching) {
            title = T("dsFetchingTitle");
            meta = T("dsFetchingMeta");
            desc = T("dsFetchingDesc");
            color = "#d29922";
          } else {
            title = T("dsOfflineTitle");
            meta = T("dsOfflineMeta");
            desc = T("dsOfflineDesc");
            color = "#e05030";
          }
          const headerEl = document.getElementById("dsHeader");
          headerEl.textContent = title;
          headerEl.style.color = color;
          document.getElementById("dsMeta").textContent = meta;
          document.getElementById("dsDesc").textContent = desc;
          const statsEl = document.getElementById("dsStats");
          while (statsEl.firstChild) statsEl.removeChild(statsEl.firstChild);
          if (online && state.imcceOffset) {
            const activeKeys = [state.homeKey, state.destKey];
            for (let i = 0; i < activeKeys.length; i++) {
              const k = activeKeys[i];
              const o = state.imcceOffset[k];
              if (!o) continue;
              const row = document.createElement("div");
              row.className = "ds-stat";
              const lbl = document.createElement("span");
              lbl.className = "ds-stat-label";
              lbl.textContent = T(k);
              const val = document.createElement("span");
              val.textContent =
                formatOffsetKm(o.x) + " / " + formatOffsetKm(o.y);
              row.appendChild(lbl);
              row.appendChild(val);
              statsEl.appendChild(row);
            }
          }
        }
